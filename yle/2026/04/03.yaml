      - title: 'Narrin aamulaulu - Katse Johannes-passioon, oppaana Topi Linjama '
        start_time: '2026-04-03T11:00:00+03:00'
        end_time: '2026-04-03T11:55:00+03:00'
        description: |-
          Bachin Johannes-passion ensiesityksestä Leipzigissa pitkänäperjantaina 1724 ei ole säilynyt aikalaiskuvauksia. Voimme siis vain kuvitella, millaisen vaikutuksen kiihkeä ja dramaattinen Jeesuksen kärsimyskertomuksen kuvaus on tehnyt. Ainakin uuden Tuomaskanttorin "työnäyte" on toiminut seurakuntalaisten herättäjänä, heidän uskonsa vahvistajana ja rikastajana.   
          Musiikkitieteilijä Topi Linjaman kanssa Johannes-passiota kuuntelee Outi Paananen. 
