      - title: Radio 1:n pitkäperjantain iltapäivä
        start_time: '2026-04-03T13:00:00+03:00'
        end_time: '2026-04-03T15:00:00+03:00'
        description: |-
          N. klo 13:10: Radiojumalanpalvelukset täyttävät tänä vuonna sata vuotta. Tuottaja-toimittaja Elina Vaittinen Kirkon viestinnästä kertoo satavuotiaiden radiojumalanpalvelusten historiasta ja siitä, missä nyt mennään. Miten radion rooli jumalanpalvelusten välittäjänä on muuttunut vuosikymmenten aikana? Mikä niiden rooli on ollut eri aikoina? Entä millaisia muistoja tai tarinoita liittyy alkuajan radiojumalanpalveluksiin? Jalmari Laine haastattelee.

          N. klo 14: Mari Renko on Lieksassa asuva kolmikymppinen lääkäri, jolta on ilmestynyt kuluvan vuoden aikana jo kolme kirjaa. Elokuussa ilmestynyt romaani "Pitsihuntuun kuiskattu" sijoittuu Mari Rengolle tuttuun toiseen itäsuomalaiseen kaupunkiin, Nurmekseen. Kahdella aikatasolla kulkeva tarina vertaa mm. sitä, millaista on nuorten aikuisten elämä nyt ja toisaalta millaista se oli talvisodan aikaan. Kati Turtola haastattelee.
