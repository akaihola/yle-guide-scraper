      - title: Poiminta Radio 1:n iltapäivästä
        start_time: '2026-04-03T17:00:00+03:00'
        end_time: '2026-04-03T17:20:00+03:00'
        description: |2-
           Suomen itäraja on ainutlaatuinen paikka, jonka erityislaatuisiuus on vain korostunut viimeaikaisten, maailmapoliittisten tapahtumien myötä. Yle Areenassa on nähtävillä  Elina Hyvärisen ohjaama dokumenttielokuva Rajalla, joka on elokuva paremman huomisen toivosta. Se on myös elokuva peloista ja turvattomuuden kokemuksista, joita uusi kylmän sodan aikakausi meissä kaikissa herättää. Elokuva oli teattereihin tullessaan maaliskuussa 2025 Itä-Suomen katsotuin elokuva. Hyvärinen itse on kotoisin Etelä-Karjalasta, Uukuniemeltä. Miia Lahti haastattelee. Haastattelun ensilähetys oli 23.lokakuuta 2025.
