      - title: 'Vakoojat: Kimin kybervakoojat'
        start_time: '2026-04-15T12:05:00+03:00'
        end_time: '2026-04-15T12:50:00+03:00'
        description: |+
          FBI julkaisi joulukuussa 2024 varoituksen, että sadat, elleivät tuhannet, pohjoiskorealaiset kyberagentit jahtaavat koko ajan yhdysvaltalaisia yrityksiä varastaakseen niiden tietoja, kiristääkseen rahaa ja häiritäkseen niiden toimintaa kyberhyökkäyksillä.

          Pohjois-Koreassa diktaattori Kim Jong-unilla on Kimsuky-kybervakoiluryhmän lisäksi käytössään vahva vakooja-arsenaali, kuten asevoimien ulkomaantiedustelupalvelu RGB, vastavakoilua harjoittava, kansalaisia urkkiva ja vankileirejä pyörittävä kotimaan tiedustelupalvelu MSS sekä Etelä-Koreaa seuraava UFD ja sinne agentteja soluttava Virasto 225.

          Kimin kybervakoojista kertoo toimittaja-tietokirjailija Hannu Pesonen. Toimittajana on Raimo Tyykiluoto.

