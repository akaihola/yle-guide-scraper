      - title: 'Radio 1:n iltapäivä: "Tuokaa tilanteeseen jotakin mukananne" – Koreografi, tanssituomari Jukka Haapalainen rohkeudesta, taiteesta ja Tom of Finland- musikaalista'
        start_time: '2026-04-15T13:30:00+03:00'
        end_time: '2026-04-15T15:00:00+03:00'
        description: |
          Juontajana Jarmo Laitaneva.

          N. klo 14 haastattelussa tanssija, koreografi ja kilpatanssituomari Jukka Haapalainen, joka on puolisonsa Sirpa Suutari-Jääskön kanssa Suomen menestynein kilpatanssipari. Viime vuosina Jukka Haapalainen on tehnyt yhä enemmän töitä myös teattereissa. Nyt työn alla on koreografia kuvataiteililja Touko Laaksosesta kertovan Tom of Finland -musikaaliin, jonka harjoitukset ovat juuri alkaneet Hämeenlinnan teatterissa.  Touko Laaksosen taide on rohkeaa, provosoivaa ja eroottista. Miten Haapalainen lähestyy teemoja koreografina? Entä minkälaisia neuvoja opettaja Jukka Haapalainen antaa oppitunneillaan nuorille tanssinopiskelijolle? Haastattelijana Kati Turtola.


          N. klo 14:30 Antti Reini
          Näyttelijä, kirjailija ja muusikko Antti Reini kertoo ikimuistoisen kulttuurikokemuksensa. Marko Miettinen haastattelee.
      - title: 'Kulttuuriykkönen: Museoiksi muutetut taiteilijakodit ja millaisia jälkiä jätämme koteihimme?'
        start_time: '2026-04-15T15:00:00+03:00'
        end_time: '2026-04-15T15:55:00+03:00'
        description: |-
          Millaisia jälkiä taiteilijat jättivät koteihinsa? Mitä esineet, värimaailma ja sisustusratkaisut kertovat heidän elämäntyylistään ja ajatuksistaan? Elämäkertaromaaneista tuttu kirjailija Pirkko Soininen vieraili kirjailija Göran Schildtin Villa Skeppetissä Tammisaaressa, ITE-taiteilija Enni Idin mökissä Padasjoella ja taidemaalari Axel Haartmanin Casa Haartmanissa Naantalissa ja muissa kotimuseoissa. Millaisia uusia havaintoja hän teki näiden taiteilijoiden kodeista ja persoonista? Kuinka moni nykyinen taiteilijakoti avautuu jatkossa museona?

          Tutkija Karoliina Sjö on mukana Turun yliopistossa meneillään olevassa Tarinoiden lehto -hankkeessa. Siinä tutkitaan Kemiönsaarella sijaitsevaa Sagalundin museomiljöötä ja sen kulttuurihistoriaa ja sen perustajajäsenten Nils Oskar Janssonin (1862–1927) ja Adèle Wemanin (1844–1936) elettyjen  elämien sekä ympäristöelämäkertametodologian avulla. Miten yksilön elämä rakentuu suhteessa ympäristöön ja miten tämä eletty elämä tallentuu myöhemmin museotoiminnan tuloksena osaksi kulttuurista muistia? Sjö  on myös tutkinut laajemmin pohjoismaisten kotimuseoiden kulttuurihistoriaa ja erityisesti museoissa säilytettäviä elämänkerronnallisia arkistoaineistoja. 

          Ohjelman vieraina ovat Pirkko Soininen ja Karoliina Sjö.

          Ohjelman juontaa Pia-Maria Lehtola.


          Rentoa puhetta, kiinnostavimmat vieraat ja kulttuurin ajankohtaisaiheet debatoitavina. Suorana maanantaista perjantaihin.
