      - title: 'Havaintoja muutoksesta: Suhteemme kuluttamiseen ja vaatteisiin'
        start_time: '2026-04-15T10:00:00+03:00'
        end_time: '2026-04-15T10:50:00+03:00'
        description: |
          Ylikulutus on suomalaisessakin kulutuskulttuurissa normi. Opitut mallit, rutiinit ja kokemukset vaikuttavat siihen millaisia kulutusvalintoja teemme. Mainonta- ja markkinointi eri alustoilla synnyttää myös turhia tarpeita ja kannustaa ylikuluttamiseen. Vastuullisesti tuotetut vaatteet maksavat aina lähtökohtaisesti enemmän. Kirpputorilla myytävistä vaatteista ainakin osa on ihan uusien vaatteiden hintaluokassa. Kulutuskulttuuria myös vastustetaan eri tavoin korjaamalla vanhoja vaatteita ja ylipäätään pitämällä vaatemäärät maltillisina. Mitkä kaikki seikat vaikuttavat kuluttamiseemme? 
          Toimittaja Satu Kivelän vieraana yliopistotutkija Essi Pöyry Kuluttajatutkimuskeskuksesta ja Tekstiili & Muoti ry:n toimitusjohtaja Marja-Liisa Permikangas.
