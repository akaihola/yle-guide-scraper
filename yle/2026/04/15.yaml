      - title: Klassisen musiikin iltakonsertti
        start_time: '2026-04-15T19:02:00+03:00'
        end_time: '2026-04-15T21:00:00+03:00'
        description: |
          Banffin kansainvälinen jousikvartettikilpailu on yksi maailman arvostetuimmista jousikvartettikilpailuista, joka järjestettiin jo 15. kerran elokuussa 2025. 
          Joka kolmas vuosi Kanadan Kalliovuorilla toteutettavaan kilpailuun voivat osallistua kvartetit, joiden kaikki soittajat ovat alle 35-vuotiaita. Kilpailu onkin erinomainen ponnahduslauta erityisesti Pohjois-Amerikan musiikkimarkkinoille, sillä voittaja saa paketin, joka sisältää 25 000 Kanadan dollarin rahapalkinnon, kiertueen Euroopassa ja Pohjois-Amerikassa sekä residenssit mm Banffissa sekä Eisenstadtin ja Luzernin festivaaleilla. 

          Vuoden 2025 kilpailun voittajaksi valittiin Cincinnatissa toimiva yhdysvaltalainen Poiesis-kvartetti, jonka jäsenet ovat Sarah Ying Ma, viulu, Max Ball, viulu, Jasper de Boor, alttoviulu, ja Drew Dansby, sello. 
          Euroradion konsertti-illassa kuulemme Poiesis-kvartetin esitykset kilpailun toiseksi viimeiseltä kierrokselta sekä finaalista. 


          Ludwig van Beethoven (1770-1827): Andante con moto – Allegro vivace jousikvartetosta nro 9 C-duuri, op. 59/3 “Razumovsky” 

          Béla Bartók (1881-1945): Jousikvartetto nro 5, Sz. 102

          Jerod Impichchaachaaha' Tate (1968): Pisachi (Reveal) 

          Brian Raphael Nabors (1991): Jousikvartetto

          Joe Hisaishi (1950): Phosphorescent Sea -osa jousikvartetosta nro 1

          Kevin Lau (1982): Jousikvartetto nro 7, Surfacing


          Esitykset on äänitetty 30. ja 31.8.2025 Banffin kulttuurikeskuksessa, Kanadassa. Ohjelman toimittaa Ainomaija Pennanen. 
