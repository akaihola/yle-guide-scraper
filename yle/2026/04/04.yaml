          Ohjaus: Sini Pesonen
          Äänisuunnittelu: Hanna-Helena Kinnunen
          Musiikki: Tatu Nenonen ja Epidemic Sound
          Tuotanto: Laura Jaakkola, Yle Draama, 2024.
