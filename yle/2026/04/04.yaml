      - title: 'Luomiskertomus: Kristiina Wallin - Laituri'
        start_time: '2026-04-04T07:30:41+03:00'
        end_time: '2026-04-04T07:54:09+03:00'
        description: |-
          Ymmärrämmekö elämästä jotain olennaista, jos uskallamme ajatella kuoleman vääjäämättömyyttä? Laituri-romaanin meren rannassa asuva kuvataitelija Hanna pohtii mitä ajan kuluminen, takana olevat vuodet ja muistot niin iloisista juhlista kuin elämän menetyksistä lopulta merkitsevät. Hannalle vanheneminen ei ole mikään tragedia vaan enemminkin luopumista. Luopumista jostain sellaisesta, jota aiemmin on pitänyt ihan itsestäänselvyytenä. Mitä elämästä jää jäljelle kun ei enää jaksakaan tehdä kaikkea arkista, matkustaa, innostua uusista asioista, maalata tai tavata ystäviä?

          Luomiskertomuksen vieraana Laituri-romaanin kirjoittanut Kristiina Wallin.

          Toimittaja Jukka Kuosmanen.
