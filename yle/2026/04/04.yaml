          05:37 Spohr: Pianotrio n:o 5 g-molli (Hartley Piano Trio).

          06:08 Fordell: Musica pastorale (Ole Gustavsson, huilu, Anton Kadlick, viulu, ja Jorma Inkala, cembalo).

