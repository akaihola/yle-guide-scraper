          03:05 Schmelzer: Aria Viennese (Armonico Tributo Austria/Lorenz Duftschmid).

          03:20 Falla: Öitä Espanjan puutarhoissa (Jean-Efflam Bavouzet, piano, ja BBC:n FO/Juanjo Mena).

          03:43 Striggio: Missa Ecco si beato giorno (I Fagiolini/Robert Hollingworth).

          04:10 Carbonelli: Sonaatti viululle ja continuolle n:o 4 g-molli (Bojan Cicic ja The Illyria Consort).

          04:21 Caplet: Le Miroir de Jésus (Mystères de Rosaire) (Esther Choi, mezzosopraano, ja Hannoverin tyttökuoro, sekä Teresa Zimmermann, harppu, ja Il Gioco col suono).

          05:24 Chopin: Balladit pianolle n:ot 1-4 (Garrick Ohlsson).

          06:05 de Lalande: Ecce nunc benedicte (Emmanuelle De Negri, sopraano, Dagmar Sasková, sopraano, Sean Clayton, kontratenori, Cyril Auvity, tenori, Andre Morsch, basso, Ensemble Aedes/Mathieu Romano, ja Le Poème Harmonique/Vincent Dumestre). 

