      - title: 'Maailma tarinoina: Jobista self help -kirjallisuuteen - kärsimyksen tarinat'
        start_time: '2026-04-04T12:05:00+03:00'
        end_time: '2026-04-04T13:00:00+03:00'
        description: |-
          Vanhan testamentin Jobin kirja on kärsimystarinoiden klassikko, johon kaunokirjallisuus kautta aikojen on ottanut suhdetta varioiden, toisintaen ja myös kritisoiden. Sen vaikutuksen voi nähdä myös median, self help -kirjallisuuden tai populaarin psykologian narratiiveissa. Mitä hyvää ja haastavaa on tämän päivän trauma- ja tunnustuskulttuurissa? Entä nykykirjallisuuden autofiktiivisessa, kärsimykseen keskittyvässä kerronnassa?

          Marja Vehkasen kanssa kärsimyksen äärelle pysähtyy yleisen kirjallisuustieteen professori Sari Kivistö.
      - title: 'Näistä levyistä en luovu: Markus Sarantola'
        start_time: '2026-04-04T13:00:00+03:00'
        end_time: '2026-04-04T13:55:00+03:00'
        description: |-
          Moni pääsiäiskonserteissa vieraillut on todennäköisesti nähnyt ja kuullut alttoviulisti Markus Sarantolan soittavan – hän arvioi esiintyneensä erilaisissa passioiden esityksissä jo sata kertaa. Lappeenrannan kaupunginorkesterin alttoviulun äänenjohtaja on soittanut myös lukuisissa vanhaan musiikkiin erikoistuneissa orkestereissa. Sarantola on ollut kiinnostunut vanhan musiikin historiatietoisesta tulkinnasta jo nuoruudestaan lähtien. Suuren osan ohjelmassa kuultavista ääniteistä Sarantola on löytänyt ulkomailta ja kirpputoreilta. Joukossa on myös todellisia harvinaisuuksia. Toimittajana on Inari Tilli.
