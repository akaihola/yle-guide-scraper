        description: |+
          Händel: Süsse stille, sanfte Quelle (Suloinen hiljainen, lempeä lähde) (Julianne Baird, sopraano, ja Tempesta di Mare).

          Franck: Andantino quietoso Es-duuri (Tatiana Samouil, viulu, ja David Lively, piano).

          Vaughan Williams: Silent noon (Hiljainen keskipäivä) sarj. The house of life (Elämän talo) (Bryn Terfel, bassobaritoni, ja Malcolm Martineau, piano).

          Bosmans: Nuit calme (Hiljainen yö) (Doris Hochscheid, sello, ja Frans van Ruth, piano).

          R. Strauss: Träumerei am Kamin (Unelmointia takan ääressä), välisoitto oopp. Intermezzo (Wienin filharmonikot/Semjon Bytshkov). 

          Muhly: Quiet music kok. Three etudes (Lavinia Meijer, harppu).

          I. Kuusisto: Hiljainen ilta (Tampereen Filharmoninen kuoro/Heikki Liimola).

          Melartin: Den tysta skogen (Hiljainen metsä) kok. Sju pianostycken (Risto Kyrö, piano).

          Marttinen: Hiljainen laulaja sarj. Elisabetin lauluja (Pia Freund, sopraano, ja Seppo Salovius, piano).

          T. Liu: Birdsong enchoing in quiet valley (Yu Hong Mei, erhu).

          Konsertin on laatinut Inari Tilli.

      - title: 'Marko Gustafsson: Käännekohdissa Jukka Perko'
        start_time: '2026-04-04T17:00:00+03:00'
        end_time: '2026-04-04T17:55:00+03:00'
        description: |
          Nykyään kehoitetaan ihmisiä olemaan itselleen armollisia. Saksofonisti Jukka Perko näkee asian toisin päin. ”Minusta on tärkeämpää olla armollinen toisille ja yrittää ymmärtää ja kuunnella muita, vaikka heillä olisi erilainen arvomaailma”, Perko toteaa.
