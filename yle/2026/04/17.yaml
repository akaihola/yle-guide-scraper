      - title: 'Tiedeykkönen: “Hiipivä pandemia” on vakava terveysuhka. Miten se ratkaistaan?'
        start_time: '2026-04-17T12:05:00+03:00'
        end_time: '2026-04-17T12:55:00+03:00'
        description: |
          Voiko tekoäly auttaa taistelussa antibiooteille vastustuskykyisiä bakteereita vastaan? Mitkä olisivat huippututkijan ratkaisut antibioottiresistenssiin? Tiedeykkönen jatkaa “hiipivän pandemian” seuraamista.

          Edellisen kerran Tiedeykkönen teki antibioottiresistenssistä jakson neljä vuotta sitten. Minkälainen tilanne Suomen osalta on tänään? Tässä jaksossa päivitetään tiedot siitä, mitä uutta tekoäly tuo antibioottiresistenssin hoitoon ja tutkimukseen.

          Haastateltavana jaksossa on mikrobiologian professori Marko Virta, sekä Helsingin yliopiston kansainvälisesti viitatuimpiin tutkijoihin lukeutuva Tommi Vatanen. Vatanen on mikrobiologi, joka käyttää tutkimukseen erilaisia laskennallisia menetelmiä. 

          Toimittaja on Juuso Pekkinen
