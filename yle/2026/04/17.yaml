      - title: Narrin aamulaulu - Oopperan ja tosielämän Herttua Siniparrat
        start_time: '2026-04-17T11:00:00+03:00'
        end_time: '2026-04-17T11:55:00+03:00'
        description: |
          Mies antaa nuorikolleen avaimet kaikkiin linnansa oviin paitsi yhteen. Kun vaimo kuitenkin avaa kielletyn oven, hän löytää sen takaa miehensä edellisten puolisoiden katkaistut päät. Charles Perrault’n 1600-luvun moraliteetissa nuorikko pelastuu, mutta Béla Balázsin näytelmässä viimeisin vaimo jakaa edeltäjiensä kohtalon. Béla Bartók sävelsi oopperansa Herttua Siniparran linna kaimansa teoksen pohjalta. Balázs oli ottanut näytelmäänsä vaikutteita Maurice Maeterlinckin symbolistisesta draamasta Ariane ja Siniparta, jonka puolestaan sävelsi oopperaksi Paul Dukas. Aiheen tunnetuin versio, Charles Chaplinin elokuva Monsieur Verdoux, on kertomus suuren laman aikana työttömäksi jääneestä pankkivirkailijasta, joka toimittaa varakkaat lesket pois päiviltä.
          Siniparta-musiikin äärellä on Outi Paananen.
