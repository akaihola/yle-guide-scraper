      - title: 'Romano mirits: Nuori yrittäjä Ronja Koivisto inspiroi omalla polullaan'
        start_time: '2026-04-26T23:24:10+03:00'
        end_time: '2026-04-26T23:39:02+03:00'
        description: |
          Haastattelimme 25-vuotiasta parturi kampaaja yrittäjää Ronja Koivistoa, joka on toiminut
          yrittäjänä jo kaksi vuotta. Ronja tekee työtään omalta vuokra penkiltään Hiushuone
          Dandy’ssa Helsingin hakaniemessä. Iloinen ja lämminhenkinen Ronja kertoi yrittäjyyden
          polustaan, johon on mahtunut sekä haasteita että oppimista. Hänen mukaansa “ansat ja
          sudenkuopat on käytävä läpi, jotta niistä voi vahvistua”.

          Ronjalla on erityisosaamista kihariin hiuksiin, ja intohimo näkyy vahvasti hänen työssään.
          Yksi uran kohokohdista oli osallistuminen Helsingin Sanomien Kuukausiliitteen Artistit,
          yhteisö, taide ja perinteet -kokonaisuuteen, jossa hän pääsi tekemään hiuksia
          romaanitaiteilijoille – kokemus, joka jäi syvästi mieleen.

          Koko haastattelun ajan Ronjasta välittyi positiivinen, eteenpäin katsova asenne. On
          inspiroivaa nähdä nuori romaaniyrittäjä, joka rohkeasti rakentaa omaa tulevaisuuttaan ja
          kulkee määrätietoisesti kohti omia unelmiaan. Tomittajana Dimitri Grönfors. 
