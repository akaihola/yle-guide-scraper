      - title: Etnokonsertteja
        start_time: '2026-04-26T17:00:00+03:00'
        end_time: '2026-04-26T17:50:35+03:00'
        description: |-
          ETNOKONSERTTEJA: THE KLEZMATICS WOMEXISSA

          The Klezmatics aloitti New Yorkissa neljäkymmentä vuotta sitten opiskelijoiden hauskanpitoprojektina ja kasvoi maailman tunnetuimmaksi klezmer-yhtyeeksi. Yhtye on sekä tuonut itäeurooppalaisten juutalaisten musiikkiperinnettä tutuksi koko maailmalle että uudistanut sitä voimakkaasti, yhdistelemällä sitä jazziin, gospeliin, punkiin ja balkanisointeihin.

          Konsertti on tallennettu viime syksyn Womex-maailmanmusiikkitapahtumasta Tampereelta. Ohjelmassa myös yhtyeen keulakuvan Lorin Sklambergin haastattelu.

          Yhtyeen kokoonpano:
          Lorin Sklamberg - laulu, haitari
          Frank London - trumpetti
          Matt Darriau - klarinetti, kaval
          Lisa Gutkin - viulu
          Paul Morrissett - basso
          Eric Berman - rummut

          Ohjelma:

          Traditional (Klezmer) - Kermeshl in Ades (04:09)
          Frank London - Kats un Moyz (06:17)
          Lluís Llach - Der Yokh (04:47)
          Lorin Sklamberg - Hanukkah Gelt (03:25)
          Frank London - Un du akerst (03:56)
          Traditional (Yiddish) - Shnirele Perele (05:56)
          Traditional (Yiddish) - Ale Brider (03:52)
          Matt Darriau - Lolly Lo (03:01)

          Tuotanto:
          Toimittaja: Tuuli Saksala
          Tuottaja: Elina Roms
          Äänitystuottaja: Speedy Saarinen
          Äänisuunnittelija: Antti Snellman
          Äänitarkkailija: Jari Rantakaulio

          Äänityspaikka: Tampere-talo, iso sali
