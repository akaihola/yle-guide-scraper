      - title: Paljon onnea! -Ylioppilaskunnan soittajat täyttää 100 vuotta
        start_time: '2026-04-30T13:30:00+03:00'
        end_time: '2026-04-30T15:00:00+03:00'
        description: |
          Ylioppilaskunnan soittajat viettää 100-vuotiskevättään. Orkesterin kapellimestari Aku Sorensen ja puheenjohtaja Eevi Hakala ovat Miia Lahden haastateltavina n. klo 14. Miten yhteisöllinen joukko perinteikäs orkesteri on? Vapunpäivänä Ylioppilaskunnan soittajat muuten tahdittavat taas Vanhan ylioppilastalon vapputanssiaisia.

          Sopraano Helena Juntunen on lauantaina kuultavan Oopperaillan vieraana. Ahti Paunu kysyy klo 14:30 Juntuselta, miten paljon oopperalaulaja miettii arjessaan äänensä kuntoa.
      - title: 'Kulttuuriykkönen: Kevään kirjavinkit!'
        start_time: '2026-04-30T15:00:00+03:00'
        end_time: '2026-04-30T15:55:00+03:00'
        description: |-
          Mitkä ovat kevään mielenpainuneimmat kirjat? Kulttuuriykkönen vinkkaa ja analysoi mitä kaunokirjallisuuden maailmassa tapahtuu tänä keväänä. Vieraana kirjallisuustoimittaja Anna Tulusto, kirjailija Vehka Kurjenmiekka sekä Kirjamimmit-someyhteisön ja -lukupiirin Elisa Vlahopoulou.
          Juontajana on Pietari Kylmälä. 

          Rentoa puhetta, kiinnostavimmat vieraat ja kulttuurin ajankohtaisaiheet debatoitavina. Suorana maanantaista perjantaihin.
