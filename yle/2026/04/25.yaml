      - title: 'Oopperailta New Yorkin Metropolitanissa: Kaija Saariahon Innocence'
        start_time: '2026-04-25T19:02:00+03:00'
        end_time: '2026-04-25T21:00:00+03:00'
        description: |-
          Kaija Saariaho: Innocence. Libretto: Sofi Oksanen ja Aleksi Barrière. Musiikinjohto: Susanna Mälkki. Metropolitan-oopperan kuoro ja orkesteri. Rooleissa: Jacquelyn Stucker, sopraano - Morsian. Katheleen Kim, sopraano - Anoppi. Joyce DiDonato, mezzosopraano - Tarjoilija. Miles Mykkanen, tenori - Sulhanen. Rod Gilfry, baritoni - Appi. Stephen Milling, bassobaritoni - Pappi. Lucy Shelton, laulu - Opettaja. Vilma Jää, laulu - Markéta. Beate Mordal, laulaja-näyttelijä - Lilly. Julie Hega, näyttelijä - Iris. Simon Kluth, näyttelijä - Anton. Camilo Delgado Díaz, näyttelijä - Jerónimo. Marina Dumont Anastassiadou, näyttelijä - Alexia. - Äänitetty New Yorkin Metropolitan-oopperassa 18.4. Ohjelman toimittaa Noora Hirn.
