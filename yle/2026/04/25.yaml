        start_time: '2026-04-25T16:07:00+03:00'
        end_time: '2026-04-25T16:59:59+03:00'
        description: |-
          Suesse: Rag teoks. Concerto in three rhythms (Michael Gurt, piano, ja Hot Springs Music Festival Symphony Orchestra/Richard Rosenberg).

          Beach: Pastorale (Ambache-kamariyhtye).

          Delibes: Lakmén ja Mallikan kukkasduetto "Viens Mallika - Dôme épais le jasmin" oopp. Lakmé (Sabine Devieilhe, sopraano, Marianne Crebassa, mezzosopraano, ja Les Siècles/Francois-Xavier Roth).

          Hensel: Allegretto jousikvartetosta Es-duuri (Quatuor Ébène).

          Kuhlau: Scherzo kvintetosta n:o 3 A-duuri (Jean-Pierre Rampal, huilu, ja Juilliard-kvartetti).

          Verdi: Rahvaan ja munkkien kuoro "Spuntato ecco il di d'esultanza" oopp. Don Carlos (Milanon La Scala -oopp. kuoro ja ork./Claudio Abbado).

          Kjerulf: Notturno (Kerava-kvartetti). 

          Tabakova: Longing konsertosta sellolle ja jousille (Kristina Blaumane ja Liettuan kamariork./Maxim Rysanov).

          Hyde: Wet night on a highway (Antonio Oyarzabal, piano).

          Puccini: Calafin aaria "Nessun dorma" oopp. Turandot (Luciano Pavarotti, tenori, John Alldis -kuoro ja Lontoon FO/Zubin Mehta).

          Konsertin on toimittanut Annina Aho.
