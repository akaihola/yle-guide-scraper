        description: |-
          Catherine viettää aikaa Bathin Pumppusalin tanssiaisissa Thorpen sisarusten ja veljensä kanssa. Hänet esitellään viehättävälle Eleanorille, mutta missä on hurmaava herra Tilney? Entä millaisia suunnitelmia Catherinen uusilla ystävillä on hänelle? 

          Kirja - Markku Haussila
          Catherine Morland - Anna Airola
          Rouva Allen - Minna Koskela
          Herra Allen - Santeri Kinnunen
          Henry Tilney - Samuel Kujala
          Isabella Thorpe, Catherinen ystävätär - Pia Andersson
