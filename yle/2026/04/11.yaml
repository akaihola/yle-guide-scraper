      - title: 'Maailma tarinoina: Bergmanin Talven valoa – Kun Jumala vaikenee'
        start_time: '2026-04-11T12:05:00+03:00'
        end_time: '2026-04-11T12:57:00+03:00'
        description: |
          Mitä tapahtuu, kun pappi menettää uskonsa Jumalaan ja kyvyn rakastaa?

          Maailma tarinoina pureutuu Ingmar Bergmanin mestariteokseen Talven valoa (1963), joka on raastava kuvaus yksinäisyydestä, uskon kriisistä ja myötätunnon kaipuusta. Vaikka elokuva on yli 60 vuotta vanha, sen teemat ahdistuksesta, pelosta ja rakkaudettomuudesta ovat polttavan ajankohtaisia.

          Elokuvaohjaaja ja käsikirjoittaja Arto Koskinen ja väitöskirjatutkija Nina Maskulin keskustelevat Marja Vehkasen kanssa siitä, miksi Jumalan hiljaisuus puhutteli Bergmania ja mikä on ihmisen toivo maailmassa, joka tuntuu kylmenevän.
