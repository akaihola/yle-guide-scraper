      - title: 'Kaisa Pulakan aikamatkat: Unettomuus on melankolisten nerojen vaiva - unimatkoja'
        start_time: '2026-04-11T10:25:00+03:00'
        end_time: '2026-04-11T11:00:00+03:00'
        description: |+
          Unettomuus on moderni kansantauti, jolla on pitkä historia. 1800-luvulla unettomuus oli muotia. Se oli vaiva, josta yläluokan miesten sopi valittaa yhdessä ja suureen ääneen. Nykyaika vaatii meitä jopa nukkumaan tehokkaasti ja siksi 2000-luvun unettomat kärsivät ahdistuksesta. 


      - title: 'Virtasen taloushistoria: Kultasormi Aleks. Lampén pelasti konkurssikypsiä metsäteollisuusyhtiöitä '
        start_time: '2026-04-11T11:00:00+03:00'
        end_time: '2026-04-11T11:56:00+03:00'
        description: |+
          Vuorineuvos Lampén oli kultasormi. Hän toimi Kansallis-Osake-Pankin neuvonantajana tehtävänään pelastaa konkurssikypsiä metsäteollisuusyhtiöitä 1930-luvulla. Jo aiemmin Tornatorin toimitusjohtajana hän teki kovaa tulosta. Juha Virtasen haastateltavana on filosofian tohtori, historiantutkija Jyrki Paaskoski. Ohjelma on uusinta joulukuulta 2025.


