          Elgar: Adagio kons. sellolle ja orkesterille e-molli (Paul Watkins ja BBC:n SO/Jiri Belohlavek).

          Dale: True love kuorolle, kahdelle sellolle, kahdelle kontrabassolle ja harpulle (Tenebrae/Nigel Short, sekä yhtye). 

          C. Schumann: Romanssi n:o 3 B-duuri (Lisa Batiashvili, viulu, ja Alice Sara Ott, piano).

          E. Mayer: Finaali sinfoniasta n:o 2 e-molli (Pohjois-Saksan radio-ork./Leo McFall).

          Ellington: Prelude to a kiss (Renée Fleming, sopraano, ja Daniel Barenboim, piano).

          Hahn: Courante teoks. Le Bal de Beatrice d'Este (Ensemble Initium/Nicolas Chalvin).

          Tikanmäki: L'amore elok. Tyttökuningas (The Girl King) (Johanna Rusanen-Kartano, sopraano, ja ork./Anssi Tikanmäki).

          Konsertin on toimittanut Annina Aho.
      - title: 'Marko Gustafsson: Vieraana muusikko, lauluntekijä Samuli Putro'
        start_time: '2026-04-11T17:00:00+03:00'
        end_time: '2026-04-11T17:53:00+03:00'
        description: |
          Samuli Putron elämän käännekohta tapahtui Raahen yläasteen liikuntasalissa. Oli vuosi 1984. 14-vuotias Putro pyöräili kiertoreittiä koululle, toivoen ettei kukaan kaveri tulisi vastaan ja saisi tietää, että hän on menossa Dingon konserttiin. “Kun keikka alkoi, aivoni repesivät. Katsoin Neumannia ja totesin: minä haluan olla tuo!”, Samuli hymyilee muistolleen. Keikan jälkeen hän etsi varastoon unohtuneen kitaran ja alkoi opetella sointuja. Ohjelma on uusinta ajalta 25.12.2025.
