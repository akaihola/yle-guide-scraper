        description: |-
          Carwithen: Suffolk Morris sarj. Suffolk (London Symphony Orchestra/Richard Hickox).

          Le Beau: Romanze G-duuri (Raphaela Gromes, sello, ja Julian Riem, piano).

          Kansansäv.: My love is like a red, red rose (Bryn Terfel, bassobaritoni, London Voices -kuoro ja Lontoon SO/Barry Wordsworth).

