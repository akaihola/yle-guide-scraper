      - title: Maailmanpolitiikan arkipäivää
        start_time: '2026-04-28T20:35:00+03:00'
        end_time: '2026-04-28T21:00:00+03:00'
        description: |-
          Katolilaiset eri puolilla maailmaa ovat kummastelleet presidentti
          Donald Trumpin hyökkäystä paavi Leoa vastaan. Paavi on arvostellut Iranin
          sotaa, minkä jälkeen Trump on syyttänyt paavia heikkoudesta ja Iranin ydinaseen
          sallimisesta.

          Kristittyjä ovat hämmentäneet myös Trumpin some-julkaisut. Yhdessä
          niistä hän esiintyi tekoälyn luomassa kuvassa Jeesus-hahmona. Hän on myös
          uhannut koko Iranin sivilisaation tuholla.

          Ohjelmassa kysytään asiantuntijoilta ja tavallisilta
          katolilaisilta molemmin puolin Atlantin, onko Trump polttanut toimillaan sillat
          kristittyihin kannattajiinsa. Lisäksi kirkkohistorian tuntija arvioi, kuinka
          poikkeuksellisesta selkkauksesta paavin ja Yhdysvaltain presidentin välillä on
          kyse.

          Maailmanpolitiikan arkipäivää -ohjelman ovat toimittaneet Jenna
          Vehviläinen ja Paula Vilén. Äänitarkkailijana on Matias Puumala. Tunnusmusiikki: Petri Alanko, kuva: Tuuli Laukkanen/Yle.
