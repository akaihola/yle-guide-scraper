        start_time: '2026-04-28T13:30:00+03:00'
        end_time: '2026-04-28T15:00:00+03:00'
        description: |-
          Miia Lahti juontaa.
          Näyttelijä Paula Siimeksellä on pitkä ura Kansallisteatterin lavalla. Esiintymislavalla olemisesta Siimes sanoo monen muun näyttelijän tavoin, että se tuntuu kodilta. Kun elämästä ei ikinä muuten tiesä, mitä tapahtuu, käsikirjoitus tuo turvaa. Tänä keväänä Siimes esittää rautarouva Margaret Thactheriä näytelmässä Lady T. Kati Turtola haastattelee Paula Siimesta n. klo 14.

          N. klo 14:30 Yrittäjä Saku Tuominen kertoo häneen erityisesti vaikuttaneesta kulttuurikokemuksesta. Toimittajana Maija Salminen
      - title: 'Kulttuuriykkönen : Paholainen pukeutuu Pradaan 2 - Miten ankara muotimaailma on muuttunut?'
        start_time: '2026-04-28T15:00:00+03:00'
        end_time: '2026-04-28T15:55:00+03:00'
        description: |-
          Vuonna 2006 ensi-iltansa saanut "The Devil Wears Prada" on muotimaailman kulttielokuva, joka paljastaa glamourin takana piilevän kovan todellisuuden. David Frankelin ohjaama elokuva perustuu Lauren Weisbergerin samannimiseen romaaniin vuodelta 2003. Weisberger työskenteli Anna Wintourin assistenttina Vogue-lehdessä, ja teos on hänen omakohtainen selviytymistarinansa muodin ylimmästä portaasta. Vaikka kirjailija on kiistänyt suoran yhteyden. Millä tavalla elokuva kritisoi muotimaailmaa?

          Meryl Streep sai roolistaan Oscar-ehdokkuuden, ja hänen tulkintansa Miranda Priestlysta – jäisestä, kaikkivaltiaasta muotilehden päätoimittajasta – on jo osa elokuvahistoriaa. Elokuva on myös muotielokuva, yli 40 muotisuunnittelijaa, mukaan lukien Prada, Chanel, Valentino, Donna Karan ja Calvin Klein, lainasivat tuotantoon vaatteita ja asusteita.

          Elokuva nosti esiin myös keskustelun naisten johtajuudesta. Miranda Priestley on vaativa, kylmä ja manipuloiva. Onko muotimaailma näin armoton? Liittyykö ankara tyyli Vogue-lehden imagoon maailman hienoimpana muotilehtenä?

          Nyt melkein kaksikymmentä vuotta myöhemmin Meryl Streep, Anne Hathaway, Emily Blunt ja Stanley Tucci palaavat valkokankaalle Paholainen pukeutuu Pradaan jatko-osaan. Millä tavalla oman aikamme muodin näyttämö on nyt osa elokuvaa? Mikä on muuttunut? 

          Ohjelman vieraina ovat elokuvatoimittajat Anna Möttölä, Silja Sahlgren-Fodstad ja muotisuunnittelija Carolina Forss.

          Ohjelman juontaa Pia-Maria Lehtola.




          Rentoa puhetta, kiinnostavimmat vieraat ja kulttuurin ajankohtaisaiheet debatoitavina. Suorana maanantaista perjantaihin.
