      - title: 'Tosi tarina: Addiktio: Henna ja päihteet'
        start_time: '2026-04-20T19:02:00+03:00'
        end_time: '2026-04-20T19:50:00+03:00'
        description: |+
          Tosi tarina -dokumenttisarjassa kuullaan tänään kolmekymppisen Hennan tarina.
          Vaikea lapsuus, huumausaineet ja laitoskierre kuuluvat Hennan menneisyyteen, mutta myös nykyhytkessä on omat haasteensa. Tuen tarve on edelleen suuri kun Henna yrittää luovia pikkulapsiarjen ja adhd:n ristiaallokossa. Toteutus: Pauliina Motturi, Joonatan Kotila ja Sami Hahtala

      - title: 'Ulkolinja-podcast: Kanadalaisia kiinnostaa miten Suomi vastaa Venäjän uhkaan'
        start_time: '2026-04-20T20:05:00+03:00'
        end_time: '2026-04-20T20:25:00+03:00'
        description: |-
          Kanadassa monen katse on nyt kääntynyt kauas Suomeen. Donald Trumpin uudelleenvalinnan jälkeen Kanadassa on havahduttu siihen, että naapurissa on aggressiivinen ja arvaamaton jättiläinen, jonka tukeen ei voi luottaa.  Suomella on vastaavanlaisesta asetelmasta hyvin pitkä kokemus -  oli sitten puhe aseellisesta maanpuolustuksesta tai selviytymisestä ylipäätään. 
          Ulkolinjan Simo Sipola keskusteli Kanadan ja Suomen turvallisuushaasteista kirjailija Stephen Marchen kanssa Torontossa. 

          Toimittaja: Simo Sipola
          Äänisuunnittelija: Ari-Pekka Heikkinen
          Tuottaja: Marko Lönnqvist 

          (julkaistu Yle Areenassa 17.11.2025)
      - title: 'Lehmitytöt 1944 J1: Lehmiä ei jätetä!'
        start_time: '2026-04-20T20:25:00+03:00'
        end_time: '2026-04-20T20:55:00+03:00'
        description: |
          18-vuotias Annikki on muonitustöissä keskisellä kannaksella, kun Neuvostoliiton suurhyökkäys alkaa. Neljä nuorta saa käteensä kepin ja 200-päisen nimettömän lehmälauman, joka pitää ajaa satojen kilometrien päähän Savonlinnaan. 13-vuotias Eila lähtee Säkkijärveltä pakoon Ville-vasikkansa ja Rusina-lehmän kanssa, kun puna-armeija vyöryy päälle. Puoliorvon tytön isoäiti katoaa jo alkumatkasta. 
