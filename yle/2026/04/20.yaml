      - title: 'Keinuva talo - Mika Kauhanen: Estetiikkaa ja eleganssia'
        start_time: '2026-04-20T17:35:00+03:00'
        end_time: '2026-04-20T18:35:00+03:00'
        description: |-
          Musiikin eleganssia ei voi mitata niin kuin tempoa, sävelkorkeutta tai desibeliä. Loputtomaan mittaamiseen ja dataan keskittyvässä maailmassa onkin hyvä paneutua välillä tunteeseen, kokemukseen. Mikä tuntuu elegantilta, on sitä. Ainakin kokijalle itselleen. 

          Jakson uutuuslevyjen estetiikka ulottuu mannermaisesta tyylittelystä tropiikin keinuntaan ja polskan jylhyyteen. Kuulemme myös laulun, jolla on kotiosoite Dublinissa. Toimittajana Mika Kauhanen.
