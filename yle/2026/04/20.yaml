      - title: 'Ulkolinja-podcast: Kanadalaisia kiinnostaa miten Suomi vastaa Venäjän uhkaan'
        start_time: '2026-04-20T20:05:00+03:00'
        end_time: '2026-04-20T20:25:00+03:00'
        description: |-
          Kanadassa monen katse on nyt kääntynyt kauas Suomeen. Donald Trumpin uudelleenvalinnan jälkeen Kanadassa on havahduttu siihen, että naapurissa on aggressiivinen ja arvaamaton jättiläinen, jonka tukeen ei voi luottaa.  Suomella on vastaavanlaisesta asetelmasta hyvin pitkä kokemus -  oli sitten puhe aseellisesta maanpuolustuksesta tai selviytymisestä ylipäätään. 
          Ulkolinjan Simo Sipola keskusteli Kanadan ja Suomen turvallisuushaasteista kirjailija Stephen Marchen kanssa Torontossa. 

          Toimittaja: Simo Sipola
          Äänisuunnittelija: Ari-Pekka Heikkinen
          Tuottaja: Marko Lönnqvist 

          (julkaistu Yle Areenassa 17.11.2025)
