      - title: 'Kulttuuriykkönen: Omaperäinen Kate Bush hämmentää yhä'
        start_time: '2026-04-20T15:00:00+03:00'
        end_time: '2026-04-20T15:55:00+03:00'
        description: |
          Kate Bush hämmästytti kaikki jo ensialbumillaan. Hämmästyttävä ja salaperäinen hän on edelleen, lähes 50 vuotta myöhemmin. Yle Areenassa on nyt nähtävillä uusi Kate Bush -dokkari Kate Bush, popin rajaton taituri (2025)  jossa käydään läpi hänen uraauurtavaa työtään omaleimaisena artistina ja monien nykyartistien esikuvana.  Kulttuuriykkösen keskustelussa etsitään Bushin menestykselle selittäviä tekijöitä hänen elämästään, josta on tehty useita elämäkertoja, sekä hänen huolella tehdyistä taiteellisista valinnoistaan. Keskustelmassa laulaja-kitaristi-lauluntekijä-tuottaja Samuli Sirviö, virtuaalitodellisuustaiteilija Leena Jääskeläinen ja musiikkitoimittaja Susanna Vainiola. Toimittajana on Jonni Roos.
