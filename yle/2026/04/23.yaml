      - title: 'Radio 1:n iltapäivä: miksi heikkojen signaalien havaitseminen on tärkeää? - vieraana tulevaisuusasiantuntija Mikko Dufva'
        start_time: '2026-04-23T13:30:00+03:00'
        end_time: '2026-04-23T15:00:00+03:00'
        description: |+
          Juontajana Miia Lahti.

          N. klo 14 Sitran johtava asiantuntija Mikko Dufva on Samppa Korhosen haastattelussa. Aiheena ovat heikot signaalit ja erilaiset tulevaisuuskuvat.

          N. klo Kirjailija Emmi Itärantaa vavahdutti Tampereen Työväen Teatterin näytelmä Helene, joka kertoo rakastetun, kansainvälisesti tunnetuimman suomalaisen kuvataiteilijan elämästä. Toimittajana Marja Vehkanen.


      - title: 'Kulttuuriykkönen: Mitä kuolleet meille kertovat?'
        start_time: '2026-04-23T15:00:00+03:00'
        end_time: '2026-04-23T15:55:00+03:00'
        description: |
          Onnettomuuksia ja rikoksia yhdistää toisinaan se, että kuolleiden henkilöllisyyttä voi olla vaikea selvittää. Eläkkeelle Helsingin poliisista jäänyt rikoskomisario Ismo Kopra on kirjoittanut tietokirjan Mykkä todistaja, jossa hän kertaa uraansa uhrien tunnistamisessa. Kopra oli mukana muun muassa Thaimaan tsunamin ja Estonian onnettomuuden selvittelytyössä.

          Rikostoimittaja Linda Rantaselta puolestaan ilmestyy tällä viikolla teos Hiljaiset todistajat, mitä ruumiit meille kertovat. Kirjassa esitellään kuolemantapauksia, joissa vasta jälkikäteen on voitu todeta, että kyseess on ollut henkirikos.

          Mitä kuolleet meille kertovat? Miten vainajien tunnistamisprosessi käytännössä toimii? Minkälaiset merkit vainajassa saavat tutkijat epäilemään rikosta? Kuinka kuormittavasta työstä on kyse? Miten aihepiiriä käsitellään suositussa true crime-kulttuurissa? 

          Ohjelmassa ovat vieraana Ismo Kopra ja Linda Rantanen. Heidän lisäkseen keskustelemassa ovat oikeushammaslääkäri Helena Ranta sekä THL:n oikeuslääkäri Ursula Vala. Ville Talola toimittaa. 
