      - title: Faunin iltapäivä
        start_time: '2026-04-23T16:07:00+03:00'
        end_time: '2026-04-23T16:59:00+03:00'
        description: |-
          Saint-Saëns: Joutsen sarj. Eläinten karnevaali (Jan-Erik Gustafsson, sello, ja HKO/Leif Segerstam).

          Liszt: Unkarilainen rapsodia pianolle n:o 11 a-molli (Alexandre Kantorow, piano). 

          Brahms: Unkarilainen tanssi nro 10 F-duuri (Budapestin musiikkijuhlien ork./Ivan Fischer).

          Haydn: Bassoaaria "Schon eilet froh der Ackermann" oratoriosta Vuodenajat (Martti Talvela, basso, ja Wienin sinfonikot/Karl Böhm).

          J.S. Bach: Siciliano Sonaatista nro 2 Es-duuri (Petri Alanko, huilu, ja Anssi Mattila, cembalo).

          Glazunov: Meditaatio viululle ja orkesterille (Chloe Hanslip ja Italiankielisen Sveitsin ork./Aleksandr Vedernikov). 

          Beach: Valse amoureuse sarj. Les rêves de Columbine (Columbinen unet) (Sunhwa Park, piano).

          Verdi: Ebolin huntulaulu "Nei giardin del bello" oopp. Don Carlos (Elina Garanca, mezzosopraano, Jennifer O'Loughlin, sopraano, sekä Cor de la Generalitat Valenciana ja Orquestra de la Comunitat Valenciana/Roberto Abbado).

          Berwald: Adagio kvartetosta pianolle ja puhaltimille Es-duuri (Ronald Brautigam, fortepiano, Lorenzo Coppola, klarinetti, Teunis van der Zwart, käyrätorvi, Donna Agrell, fagotti).

          Price: Juba sinf. n:o 3 c-molli (Philadelphian ork./Yannick Nezet-Seguin).

          Tárrega: Rosita (Timo Korhonen, kitara).

          Aaltio: Spring wonder elok. Metsän tarina (Ork./Panu Aaltio).

          Fall: Achmedin laulu oper. Stambulin ruusu (Fritz Wunderlich, tenori, ja Baijerin valtionork./Hans Moltkau).


          Konsertin on laatinut Ainomaija Pennanen.
