      - title: 'Tuuli Saksalan keidas: Äitiys, menetys ja musiikin voima - Keitaan vieraana Teija Niku'
        start_time: '2026-04-23T17:35:00+03:00'
        end_time: '2026-04-23T18:25:00+03:00'
        description: |-
          Harmonikansoittaja Teija Niku on vieraana Tuuli Saksalan keitaalla. Ohjelmassa soi musiikkia Nikun uudelta "Tovi"-albumilta. Viiden vuoden työn tulos tasapainoilee melankolian ja ilon välähdysten välillä – albumin syntyaikaan mahtuivat pandemia, äidiksi tuleminen ja oman äidin menetys.
      - title: 'Poiminta Radio 1:n iltapäivästä '
        start_time: '2026-04-23T18:25:00+03:00'
        end_time: '2026-04-23T18:35:00+03:00'
        description: |-
          Intohimoinen elokuvaharrastaja Topi Borg tuli jokunen vuosi sitten julkisuudessa tutuksi ollessaan mukaan Kirjolla-ohjelmassa, joka seuraa autisimin kirjolla olevien henkilöiden elämää. Myöhemmin hän on tehnyt myös matkailuaiheista ohjelmaa sisarensa Sointu Borgin kanssa. Tänä keväänä Yle Areenassa on alkanut Topi Borgin elokuvakerho -videopodcast-sarja. Siinä Borg jatsoo joka jaksossa yhden elokuvan vieraansa kanssa ja sarjan seuraajat pääsevät mukaan sohvalle seuraamaan keskusteluita, joita elokuvat vieraissa ja Borgissa herättävät. Topi Borg kertoi elokuvaharrastuksestaan Kati Turtolalle. 
