      - title: 'Marko Gustafsson: Käännekohdissa Anna-Leena Härkönen'
        start_time: '2026-04-23T10:00:00+03:00'
        end_time: '2026-04-23T10:53:00+03:00'
        description: |
          Kirjailija Anna-Leena Härkönen sanoo keräävänsä jatkuvasti materiaalia kirjoihinsa.
          Häräntappoaseesta hän ei jaksaisi puhua enää sanaakaan, mutta kaikesta muusta Anna-Leena Härkönen puhuu mielellään ja suoraan. Hän kysyy tapaamiltaan ihmisiltä suoraan isoja kysymyksiä kuten, mikä on nöyryttävin muistosi. Vastaukset saattavat päätyä hänen tuleviin kirjoihinsa.
