        description: |-
          Sorjonen jäljittää johtolankoja Kotkan pieneen suklaakauppaan, jonka valvontanauhoista voi löytyä ratkaiseva todiste, mutta aika käy vähiin, kun yksi pojista on yhä kaappaajan armoilla. Tiivistyvä tutkinta ja omat virheet ajavat Karin sekä ammatillisesti että henkilökohtaisesti äärirajoille.
