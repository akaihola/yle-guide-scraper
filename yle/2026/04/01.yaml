      - title: 'Radio 1:n iltapäivä: Vieraana Vantaan kaupunginjohtaja Pekka Timonen - mikä tekee kaupungista kulttuurikaupungin?'
        start_time: '2026-04-01T13:30:00+03:00'
        end_time: '2026-04-01T15:00:00+03:00'
        description: |
          Juontajana Jarmo Laitaneva.

          Vantaan kaupungin maine kulttuurin tuottajana on suuren yleisön silmissä vähemmän tunnettu, vaikka vantaalaiset itse monesti kehuvati oman kaupunkinsa kultturellia luonnetta. Viime aikaisista kulttuuriteoista mm. Tikkurilan aseman tienoon Korppi-patsas on hieno kaikille näkyvä taideteos, korttelikinot, Laila Pullisen veistopuisto ja näytelmä. Mikä asema kaupungeilla yleensä on nyt kulttuurin tuottajana? Mihin suuntaan ollaan menossa? N. klo 14 studiovieraana on Vantaan kaupunginjohtaja Pekka Timonen.
      - title: 'Kulttuuriykkönen: Naisvakoojat Suomessa – vaarallisen viekkaita'
        start_time: '2026-04-01T15:00:00+03:00'
        end_time: '2026-04-01T15:55:00+03:00'
        description: |-
          Millaisia naisvakoojia löytyi Suomesta vuosina 1919–1944? Suomen turvallisuuspoliisi herkästi epäili vakoojiksi naisia, jotka olivat hyvännäköisiä ja tykkäsivät juhlia – varsinkin jos he viettivät aikaa sotilaiden kanssa. Ajan hengen mukaisesti epäiltiin, että naiset käyttäisivät salaisuuksien paljastamiseksi seksuaalista viehätysvoimaansa kuten legendaarinen Mata Hari. 

          Piia Vuorisen kirja Vaarallisen viekkaita kertoo huomattavavimmista naisagenteista sekä perusteettomasti epäillyistä seikkailijattarista. Turvallisuuspoliisi näyttäytyy naisvihamielisenä konservatiivisuuden linnakkeena, joka pani paljon aikaa ja resursseja epäiltyjen naisten seurantaan.

          Vieraina ovat historiantutkija Piia Vuorinen sekä professori emeritus Kimmo Rentola.

          Lähetyksen juontaa Nicklas Wancke.
