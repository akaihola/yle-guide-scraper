      - title: 'Vakoojat: KGB:n viimeinen konnankoukku'
        start_time: '2026-04-01T12:05:00+03:00'
        end_time: '2026-04-01T12:50:00+03:00'
        description: |-
          Neuvostoliiton hajoaminen oli usean vuoden prosessi, johon liittyivät neuvostotasavaltojen itsenäisyyspyrkimykset ja vakavat talousvaikeudet. Lopullinen kuolinisku maailman laajimmalle valtiolle oli vanhoillisten kommunistien vallankaappausyritys elokuussa 1991.

          Syksyllä 1991 Neuvostoliitosta jäi jäljelle löyhä valtioliitto, ja joulukuussa koko valtio lakkautettiin. Keskusjohdon korvasi venäläinen mafiakapitalismi ja politbyroon korvasi Venäjän turvallisuuspalvelu FSB, jonka rengiksi lopulta päätyivät vasten tahtoaan jo eliitiksi itsensä määritelleet oligarkit.

          KGB:n talousnerot jatkoivat 1990-luvulla Venäjän turvallisuuspalvelun, FSB:n, suojeluksessa, eivätkä he tyytyneet kätkemään vain kommunistien varoja. Kun tilaisuus tarjoutui, he tarttuivat hanakasti myös Kansainvälisen valuuttarahaston (IMF) ja muiden ulkomaisten rahoituslaitosten Venäjän talouden tervehdyttämiseen ohjaamiin miljardeihin.

          Mutta Neuvostoliiton ryöstäminen oli alkanut jo ennen sen romahtamista, kertoo toimittaja-tietokirjailija Hannu Pesonen. Toimittajana on Raimo Tyykiluoto.
