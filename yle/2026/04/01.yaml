      - title: 'Duo Pietilä & Saunamäki konsertissa: Ajaton Bach & vapaat äänet'
        start_time: '2026-04-01T19:02:00+03:00'
        end_time: '2026-04-01T21:00:00+03:00'
        description: |-
          Nykymusiikkiin ja improvisaatioon erikoistuneet muusikot, Esa Pietilä ja Eero Saunamäki,  yhdistävät voimansa konsertissa, jossa korostuu molempien soittajien rakkaus vanhaan musiikkiin ja varsinkin J.S. Bachin ajattomiin teoksiin. Ajankohtaista kulmaa konsertissa etsitään muun muassa live-elektroniikan avulla. 13.3.2026 Espåoonlahden kirkossa tallennetun konsertin toimittaa Ahti Paunu.

          Esiintyjät:
          Esa Pietilä: tenorisaksofoni, live-elektroniikka
          Eero Saunamäki: saksofonit, nokkahuilut & live-elektroniikka.
