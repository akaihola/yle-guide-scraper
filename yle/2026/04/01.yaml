          P.D.Q. Bach: Presto changio teoks. Concerto for two pianos vs. orchestra (S. 2 are better than one) (Peter Schickele ja Jon Kimura Parker sekä The New York Pick-Up Ensemble/Jorge Mester).

          Borrono: Saltarello de la Preditta (David Russell, kitara).

          Eyck: Engels nachtegaeltje (Englantilainen satakieli) (Dorothee Oberlinger, nokkahuilu). 

          Adams: Hoe-down teoks. Gnarly buttons (Elizabeth Jordan, klarinetti, ja Northern Chamber Orchestra/Stephen Barlow).

          Poulenc: Voyage à Paris (Véronique Gens, sopraano, ja Roger Vignoles, piano). 

          Satie: Quatre préludes flasques pour un chien (Neljä velttoa preludia koiralle) (Pascal Rogé, piano).

          J. Strauss, nuor.: Perpetuum mobile (Ikiliikkuja) (Budapestin musiikkijuhlien ork./Iván Fischer).

          Konsertin on laatinut Eva Tigerstedt.
