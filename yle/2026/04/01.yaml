      - title: 'Duo Pietilä & Saunamäki konsertissa: Ajaton Bach & vapaat äänet'
        start_time: '2026-04-01T19:02:00+03:00'
        end_time: '2026-04-01T21:00:00+03:00'
        description: |
          Nykymusiikkiin ja improvisaatioon erikoistuneet muusikot, Esa Pietilä ja Eero Saunamäki,  yhdistävät voimansa konsertissa, jossa korostuu molempien soittajien rakkaus vanhaan musiikkiin ja varsinkin J.S. Bachin ajattomiin teoksiin. Ajankohtaista kulmaa konsertissa etsitään muun muassa live-elektroniikan avulla. 13.3.2026 Espoonlahden kirkossa tallennetun konsertin toimittaa Ahti Paunu.

          Esiintyjät:
          Esa Pietilä: tenorisaksofoni, live-elektroniikka
          Eero Saunamäki: saksofonit, nokkahuilut & live-elektroniikka

          Ohjelma:

          J.S. Bach: Sarja nro 2 sellolle d-molli BWV 1008: osa 1. Prelude ja osa 6. Gigue (Eero Saunamäki)
          Pietilä/Saunamäki: Motion (duo nokkahuilu + saksofoni) 
          J.S. Bach: Partita nro 2 viululle d-molli BWV 1004: osa 5. Ciaccona (Esa Pietilä) 
          Pietilä/Saunamäki: Drifting Zones (duo nokkahuilu + saksofoni)
          Pietilä/Saunamäki: Kinetics (duo saksofoni + saksofoni) 
          J.S. Bach: Partita huilulle a-molli BWV 1013: osa 1. Allemande ja osa 4. Bourrée angloise (Eero Saunamäki) 
          J.S. Bach: Sarja nro 1 sellolle G-duuri BWV 1007: osa 4. Sarabande (Esa Pietilä) Pietilä/Saunamäki: Breathing Texture (duo saksofoni/nokkahuilu + saksofoni) 
          Pietilä/Saunamäki: Resonant Horizon (duo) 
