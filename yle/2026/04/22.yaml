      - title: 'Konsertteja: Tampere Biennale – Uusinta Ensemble & Ánnámáret'
        start_time: '2026-04-22T19:02:00+03:00'
        end_time: '2026-04-22T21:00:00+03:00'
        description: |-
          Uusinta Ensemble yhdistää tässä konsertissa voimansa Nuorgamin tundralla poroja hoitavan perheensä kanssa asuvan Ánnámáretin eli Anna Näkkäläjärvi-Länsmanin kanssa. Ánnámáretin taide nousee suoraan porosaamelaisten esi-isien nomadisesta kulttuurista. Joiku on saamelaisille puhutun kielen jatke, jossa laulamalla luodaan (tai saamelaisittain ’vastaanotetaan’) äänellinen kuva jostain kohteesta. Konsertin sävellettyjen teosten väleissä kuullaan Ánnámáretin soololuohteja ennen konsertin huipentavaa teosta, jossa ne yhdistyvät nykymusiikin kanssa uudenlaiseksi ilmaisuksi.

          Uusinta Ensemble:
          Aino Szalai, viulu
          Aleksi Kotila, viulu
          Max Savikangas, alttoviulu
          Pinja Nuñez, sello
          Malla Vivolin, huilu
          Sara Antikainen, huilu
          Fanny Söderström, piano
          Helmi Malmgren, klarinetti
          Petteri Kippo, lyömäsoittimet

          Ánnámáret, joiku
          Jouni Hirvelä, elektroniikka

          Ohjelma:

          Anna Näkkäläjärvi-Länsman (*1979): luohtisooloja
