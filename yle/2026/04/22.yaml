      - title: 'Politiikkaradio: Avaako perustustuslain muutos poliisivaltion portit?'
        start_time: '2026-04-22T13:00:00+03:00'
        end_time: '2026-04-22T13:30:00+03:00'
        description: |
          Hallitus haluaa kaventaa suomalaisten yksityisyyden suojaa muuttamalla kiireellisesti perustuslakia. Jatkossa vakavaan rikollisuuteen kohdistuvaa tiedustelua voisi tehdä suomalaiskodeissa ennaltaehkäisevästi ilman konkreettista rikosepäilyä. Onko suomalaisten tingittävä perusoikeuksistaan huume-, jengi- ja terrorismirikosten estämiseksi? Avaako kiirellinen perustuslain muutos poliisivaltion portit? Asiasta keskustelevat perustuslain muutosta valmistelevan parlamentaarisen seurantaryhmän varapuheenjohtaja Onni Rostila (ps.), sekä ryhmän jäsenet Karoliina Partanen (kok.) ja Atte Harjanne (vihr.). Toimittajana on Tapio Pajunen. Suora lähetys.
      - title: 'Radio 1:n iltapäivä: Soittaminen kuuluu kaikille - studiovieraana musiikkipedagogi Markku Kaikkonen'
        start_time: '2026-04-22T13:30:00+03:00'
        end_time: '2026-04-22T15:00:00+03:00'
        description: |-
          Juontajana Jarmo Laitaneva. 

          N. klo 14 studiossa on vieraana musiikkikasvattaja Markku Kaikkonen. Hän on ollut kehittämässä Suomen lisäksi monissa muissakin maissa käytössä olevaa kuvionuottimenetelmää, jonka avulla erityisryhmät opiskelevat musiikkia. Kaikkonen julistaa tasa-arvon sanomaa musiikkikasvatuksessa: musiikki kuuluu kaikille.

          N. klo 14:30  Tampere Biennalen taiteellinen johtaja Minna Leinonen avaa illan konserttia.
      - title: 'Kulttuuriykkönen: Erään perheen kirjeitä sodasta - Millä tavalla pelko, epävarmuus ja kaipaus kuuluu kirjeiden rivien välistä?'
        start_time: '2026-04-22T15:00:00+03:00'
        end_time: '2026-04-22T15:55:00+03:00'
        description: |-
          Mustialan puustellissa ja Hakoisten kartanossa asuneiden Leijonhufvudien yllättäen löytyneet kirjeet vievät 1700- ja 1800-lukujen vaihteeseen ja erään perheen elämään Suomen sodan varjossa. Millä tavalla pelko, epävarmuus ja kaipaus kuuluu kirjeiden rivien välistä?

          Upseeri Axel Leijonhufvud kirjoitti kirjeitä äidilleen ja sisaruksilleen Suomen sodan syttymisen vuonna 1808 aikoihin. Samalta ajalta löytyi myös matkapäiväkirja, jossa perheen Hedda-tyttären tuleva puoliso Gustaf Boije af Gennäs kuvaa kokemuksiaan sotavankina Venäjällä. 

          Hakoisten naisista romaanisarjan kirjoittanut FT Riikka-Maria Rosenbergin ja historian dosentti Sofia Gustafssonin historialliset johdannot taustoittavat Suomen sodan aikaa sekä aatelisten elinpiiriä Hämeessä ja Tukholmassa. Gustafsson on syventynyt tutkimustyössään Suomen 1700-luvun talous- ja sosiaalihistoriaan sekä Helsingin kaupungin ja Viaporin linnoituksen vaiheisiin.

          Ohjelman vieraina ovat historioitsijat Riikka-Maria Rosenberg ja Sofia Gustafsson.

          Ohjelman juontaa Pia-Maria Lehtola.


          Rentoa puhetta, kiinnostavimmat vieraat ja kulttuurin ajankohtaisaiheet debatoitavina. Suorana maanantaista perjantaihin.
