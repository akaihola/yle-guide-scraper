      - title: 'Radio 1:n iltapäivä: Soittaminen kuuluu kaikille - studiovieraana musiikkipedagogi Markku Kaikkonen'
        start_time: '2026-04-22T13:30:00+03:00'
        end_time: '2026-04-22T15:00:00+03:00'
        description: |-
          Juontajana Jarmo Laitaneva. 

          N. klo 14 studiossa on vieraana musiikkikasvattaja Markku Kaikkonen. Hän on kehittänyt Suomen lisäksi monissa muissakin maissa käytössä olevan kuvionuottimenetelmän, jonka avulla erityisryhmät opiskelevat musiikkia. Kaikkonen julistaa tasa-arvon sanomaa musiikkikasvatuksessa: musiikki kuuluu kaikille.

          N. klo 14:30  Tampere Biennalen taiteellinen johtaja Minna Leinonen avaa illan konserttia.
