      - title: 'Vakoojat: Myrkyttäjät ja myrkkytehtaat'
        start_time: '2026-04-22T12:05:00+03:00'
        end_time: '2026-04-22T12:50:00+03:00'
        description: |
          Poloniumia, arsenikkia, pernaruttoa, botuliinia, risiiniä, talliumia, VX:ää, keuhkoruttoa, syanidia, novitšokia, dioksiinia. Suihkeena, luotina, pillerinä, pistoksena. Hammastahnassa, oluessa, teessä, Kiovan kanassa, kirjepaperissa, viskissä, suklaassa, sikareissa tai vaikka kalsareissa.

          Tarjoilijoina ja valmistajina Yhdysvaltojen, Venäjän, Britannian, Etelä-Afrikan, Israelin, Ranskan, Bulgarian, Irakin ja kymmenien muiden maiden tiedustelupalvelut.

          Tiedustelupalvelujen salaisissa operaatioissa käytetyistä myrkyistä ja myrkyttäjistä kertoo toimittaja-tietokirjailija Hannu Pesonen. Toimittajana on Raimo Tyykiluoto.
