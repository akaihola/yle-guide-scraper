      - title: 'Lehmitytöt 1944 J1: Lehmiä ei jätetä!'
        start_time: '2026-04-18T10:25:00+03:00'
        end_time: '2026-04-18T10:55:00+03:00'
        description: |
          18-vuotias Annikki on muonitustöissä keskisellä kannaksella, kun Neuvostoliiton suurhyökkäys alkaa. Neljä nuorta saa käteensä kepin ja 200-päisen nimettömän lehmälauman, joka pitää ajaa satojen kilometrien päähän Savonlinnaan. 13-vuotias Eila lähtee Säkkijärveltä pakoon Ville-vasikkansa ja Rusina-lehmän kanssa, kun puna-armeija vyöryy päälle. Puoliorvon tytön isoäiti katoaa jo alkumatkasta. 
      - title: 'Virtasen taloushistoria: T-Fordista Mustangiin ja sähköponiin, Suomen Ford 100 vuotta'
        start_time: '2026-04-18T11:00:00+03:00'
        end_time: '2026-04-18T11:55:00+03:00'
        description: |-
          Virtasen taloushistoriassa muistellaan ja pohditaan nyt Suomen autoistumisen historiaa. Tasan sata vuotta sitten perustettiin maahantuontiliike Suomen Ford. Haastateltavina Suomen Fordin toimitusjohtaja Johan Lindberg ja tuoreen Fordin historiaa käsittelevän kirjan tekijä, tietokirjailija Juha Partanen. Toimittaja on Juha Virtanen.
