      - title: 'Luomiskertomus: Anna-Leena Härkönen - Mykkien pöytä'
        start_time: '2026-04-18T07:31:00+03:00'
        end_time: '2026-04-18T07:55:00+03:00'
        description: |+
          Anna-Leena Härkösen uuden Mykkien pöytä -romaanin päähenkilö Leni on jäänyt työttömäksi. Joutilaat päivät kuluvat ystäviä tapaillessa ja miessuhteita miettiessä. Kun aikaa on, puistopiknikillekin tulee otettua viiniä ihan termoskannussa. 

          Suhdeseikkailut ja Lenin ystävyyssuhteet ovat kirjan juonta eteenpäin vieviä polkuja. Mukana Lenin valloittavassa tarinassa on myös aikakausilehden lukijakirjeisiin vastaileva Amalia tietää -palstan pitäjä. Kun Lenillä on ongelmia viinin, miesten, rahan ja itsensäkin kanssa, elämän lainalaisuuksia ymmärtävä Amalia kyllä tietää hyvät neuvot, mutta arvaahan sen kuinka pitkälle hyvillä neuvoilla elämässä sitten itse kukin pääsee. 

          Luomiskertomuksen vieraana Mykkien pöytä -romaanin kirjoittanut Anna-Leena Härkönen.

          Toimittaja Jukka Kuosmanen.

