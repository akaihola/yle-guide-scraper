        end_time: '2026-04-18T16:59:59+03:00'
        description: |+
          Madetoja: Tuulinen sää (Helena Juntunen, sopraano, ja Gustav Djupsjöbacka, piano).

          Brahms: Horch, der Wind klagt (Kuuntele, tuuli valittaa) teoks. Zigeunerlieder (Mustalaislauluja)  (RKK/Anders Eby, ja Antti Hotti, piano).

          Malipiero: I cipressi e il vento (Sypressit ja tuuli) teoks. Impressioni dal vero (Kuvauksia elämästä) (Rooman SO/Francesco La Vecchia).

          Quilter: Blow, blow thou winter wind teoks. Three Shakespeare songs (Bryn Terfel, baritoni, ja Malcolm Martineau, piano). 

          Janácek: Lennätti tuuli lehden sarj. Umpeenkasvaneella polulla (Antonín Kubálek, piano).

          Larsson: Kyssande vind (Anne Sofie von Otter, mezzosopraano, ja Bengt Forsberg, piano). 

          Debussy: Ce qu'a vu le vent d'ouest (Mitä länsituuli näki) kok. Preludit 1 (Eero Heinonen, piano).

          Klami: 3 Bf teoks. Merikuvia (RSO/Leif Segerstam).

          Wood: When winds that move not (The King's Singers).

          Lennon/McCartney: The long and winding road (John Bayless, piano).

          Steiner: Tara's theme elok. Gone with the wind (Tuulen viemää) (Hollywood Bowl Orch./John Mauceri).

          Konsertin on laatinut Inari Tilli.

      - title: 'Marko Gustafsson: Käännekohdissa Sofia Ruija'
        start_time: '2026-04-18T17:00:00+03:00'
        end_time: '2026-04-18T17:53:00+03:00'
        description: |
          Kuopiolainen Sofia  Ruija oli 14-vuotias ja tanssinut vasta kaksi vuotta balettia, kun hänet kutsuttiin Suomen Kansallisoopperan balettioppilaitokseen. Hän ilmoitti vanhemmilleen, että muuttaa Helsinkiin. ”En tuntenut Helsingistä ainuttakaan ihmistä, mutta en myöskään epäröinyt lähteä.”  Balettikoululla Sofia nähtiin joka päivä useilla eri tanssitunneilla, mutta siviilielämä oli muihin tanssijoihin verrattuna totaalisen erilainen. ”Minulla oli omaisuus repussa ja perhe toisessa kaupungissa”, Sofia toteaa. 
