      - title: 'Etnokonsertteja: Elaha Soroor & Kefaya'
        start_time: '2026-04-19T17:00:00+03:00'
        end_time: '2026-04-19T17:59:02+03:00'
        description: |
          Afganistanissa syntynyt laulaja-säveltäjä Elaha Soroor tunnetaan afgaaninaisten puolustamisesta. Lontoolaisen Kefaya-yhtyeen kanssa hän esittää afganistanilaisia kansanlauluja ja naisten säveltämiä vastarintalauluja levyltä "Songs of Our Mothers". Kefaya -yhtyeessä soittaat Giuliano Modarelli, kitara, Al MacSween, koskettimet, ja Joost Hendrickx, rummut sekä Gurdain Rayatt tabla. Konsertissa kuullaan mm. kappaleet Jema Nerenji, Do Chasmane Siyah, Charsi ja Gole Sadbarg, joiden kautta aukeavat afganistanilaisten naisten tarinat vapaudesta, toivosta ja rohkeudesta.
