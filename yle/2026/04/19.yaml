        start_time: '2026-04-19T08:06:24+03:00'
        end_time: '2026-04-19T08:59:41+03:00'
        description: |
          Mies antaa nuorikolleen avaimet kaikkiin linnansa oviin paitsi yhteen. Kun vaimo kuitenkin avaa kielletyn oven, hän löytää sen takaa miehensä edellisten puolisoiden katkaistut päät. Charles Perrault’n 1600-luvun satu on moraliteetti, joka on saanut ja saa yhä uusia tulkintoja ja muunnelmia. Oopperoiden Siniparta-musiikin äärellä on Outi Paananen. 
