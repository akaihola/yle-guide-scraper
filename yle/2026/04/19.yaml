      - title: Faunin iltapäivä
        start_time: '2026-04-19T16:07:00+03:00'
        end_time: '2026-04-19T16:59:59+03:00'
        description: |-
          M. Richter: Spring 0 - Spring 1 teoks. Four seasons recomposed (Daniel Hope, viulu, Max Richter, syntetisaattori, ja Konzerthaus Kammerorchester Berlin/André De Ridder).

          Kerschek: Dances with nymphs teoks. Spring kok. The new four seasons (Niklas Liepe, viulu, ja Kölnin radio-ork./Patrick Lange, sekä Nils Liepe, piano). 

          L. Boulanger: Nokturni (Stefan Welsch, sello, ja Ingrid Wendel, piano).

          Verdi: Kohtaus "Ogni suo aver tal femmina - Di sprezzo degno se stesso rende" oopp. La Traviata (Anna Moffo, sopraano, Richard Tucker, tenori, Robert Merrill, baritoni, Anna Reynolds, mezzosopraano, Piero De Palma, tenori, Vito Susca, basso, Franco Ventriglia, basso, sekä Rooman oopperan kuoro ja ork./Fernando Previtali).

          Glazunov: Orientale (Itämaiseen tapaan) teoks. Novelletteja op.15 (Pietarin jousikvartetti).

          Rani: Glass (Mari Samuelsen, viulu, Julien Quentin, piano, ja Scoring Berlin/Jonathan Stockhammer).

          Sveinsson - Birgisson - Holm - Dyrason: Fljótavík (Voces8 sekä Thomas Gould, viulu, Emma Denton, sello, ja Sam Becker, kontrabasso).

          Chaminade: Sérénade aux étoiles (Baldo-Corona Duo). 

          Offenbach: Antonian, Miraclen ja Antonian äidin äänen kohtaus "Ta mere oses-tu l'invoquer - Chere enfant" oopp. Hoffmannin kertomukset (Rosalind Plowright, sopraano, Jose van Dam, baritoni, Jocelyne Taillon, mezzosopraano, sekä Belgian kansallisoopperan ork./Sylvain Cambreling).

          Badarzewska-Baranowska: Douce rêverie (Lempeä uni) (Hiroko Ishimoto, piano).

          Tanzil: Serenade (Ray Chen, viulu, ja Lontoon kuninkaallinen FO/Cristian Macelaru).

          Konsertin on toimittanut Annina Aho.
      - title: 'Etnokonsertteja: Elaha Soroor & Kefaya'
        start_time: '2026-04-19T17:00:00+03:00'
        end_time: '2026-04-19T18:00:00+03:00'
        description: |
          Afganistanissa syntynyt laulaja-säveltäjä Elaha Soroor tunnetaan afgaaninaisten puolustamisesta. Lontoolaisen Kefaya-yhtyeen kanssa hän esittää afganistanilaisia kansanlauluja ja naisten säveltämiä vastarintalauluja levyltä "Songs of Our Mothers". Kefaya -yhtyeessä soittaat Giuliano Modarelli, kitara, Al MacSween, koskettimet, ja Joost Hendrickx, rummut sekä Gurdain Rayatt tabla. Konsertissa kuullaan mm. kappaleet Jema Nerenji, Do Chasmane Siyah, Charsi ja Gole Sadbarg, joiden kautta aukeavat afganistanilaisten naisten tarinat vapaudesta, toivosta ja rohkeudesta.
