      - title: 'Klasariparatiisi - Eva Tigerstedt: Henry Purcell - Hulluuslauluja, kylmänhenkiä ja sfäärien harmoniaa barokin ajan Lontoossa'
        start_time: '2026-04-19T07:00:47+03:00'
        end_time: '2026-04-19T07:57:07+03:00'
        description: |+
          Muusikonpoika Henry Purcell liikkui kansan ja kuninkaallisten keskuudessa, ja teatteri oli hänen toinen kotinsa. 1600-luvun lopun Lontoo oli rujo, räävitön ja kiihkeä, täynnä valtataistelua ja loistoa. Tulipalot ja kulkutaudit eivät silti voineet hillitä kaupungin kasvua.  Täällä Purcell loi ihmeen kauniita lauluja ja värikkästä näyttämömusiikkia, mutta myös omintakeista kirkko- ja juhlamusiikkia. Ne ovat osa aikaansa, mutta koskettavat edelleen.
          Eva Tigerstedt avaa polkuja musiikkiin.


          Ohjelman musiikit:

          Henry Purcell:

          From silent shades and the Elysian groves/ Bess of Bedlam (Varjojen hiljaisuudesta, Elysiumin lehdoista/ Bedlamin Bess) (Catherine Bott, sopraano, David Roblou, cembalo).

          Sweeter than roses, san. Richard Norton (Dorothee Mields, sopraano, ja Lautten Compagney/ Wolfgang Katschner).

           4-ääninen Fantasia jousille B-duuri Z.736 (Fantasia n:o 5) (Fretwork).

          Pakkaskohtaus puolioopperasta Kuningas Arthur, san. John Dryden (Hanna Bayodi, sopraano/Cupido, Peter Harvey, basso/Cold Genius, ja Le Concert Spirituel/ Hervé Niquet).

          Sonaatti kahdelle nokkahuilulle, viola da gamballe ja continuolle g-molli Z.807 (Great Chaconne) (Ricercar Consort/ Philippe Pierlot).

          Music for a while, san. John Dryden ja Nathaniel Lee (Andreas Scholl, kontratenori, ja Accademia Bizantina/Stefano Montanari).

          Percy Mayfield: Hit the road, Jack (Ray Charles ja The Raelets)

          Since the pox (Anna Prohaska, soprano, ja La Folia/ Robin Peter Müller).

          Soul of the world, teoksesta Hail! bright Cecilia, san. Nicholas Brady  (Collegium Vocale/ Philippe Herreweghe).

          Hear my prayer, o Lord (Herra, kuule minun rukoukseni) anthem Z.15, (Vox Luminis/Lionel Meunier).

           O solitude, my sweetest choice (Yksinäisyys, suloinen valittuni) san. Marc-Antoine Girard de Saint-Amant, Katherine Philips (Anne Sofie von Otter, mezzosopraano, ja Jakob Lindberg, teorbi).

