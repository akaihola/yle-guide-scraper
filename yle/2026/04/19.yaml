        start_time: '2026-04-19T10:00:00+03:00'
        end_time: '2026-04-19T10:59:20+03:00'
        description: |-
          Saarnaajana Mari Tiekstra, liturgina Ida Hellemaa
          Urkureina Anna-Maria Lehtoaho ja Minna Raassina
          Tekstinlukijoina Emma Laamanen ja Topi Varjotie

          Suomen Kirkkomusiikkiliiton nuorisokuorotapahtuman suurkuoro, joht. Sirkku Rintamäki ja Ismo Savimäki. Vastausmusiikin esittää Nuorisokuoro Aurora joht. Ismo Savimäki. Ehtoollisen aikana esiintyvät Nuorisokuoro Illusia Oulusta johtajanaan Eeva-Maija Sorvari ja Tyttökuoro Via Lucis Lahdesta johtajanaan Johanna Suomala

          Muut muusikot + soittimet Tarja Viitanen, trumpetti; Sirkku Rintamäki, piano

          Virret: 135; 177; 378: 1–2, 6; 960; 228; 904

          Muu musiikki:
          Te Deum, säv. Merete Kuhlmann, san. Te Deum -hymni 400-luvulta ja suom. Pekka Kivekäs 1994, 2000
          Psalmi 23, sov. Ismo Savimäki
          Täällä Pohjantähden alla, säv. ja san.Lasse Heikkilä Voisinpa Jeesuksestani, toisinto Pohjanmaalta; Jouko Törmälän sovituksen pohjalta muokannut Emilia Soranta; sanat Helmi Mäkeläinen
