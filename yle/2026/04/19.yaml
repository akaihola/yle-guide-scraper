        description: |-
          Osa 3/3. Kirjakauppias Aapeli Muttisella on vuokralla viinatrokari ja velikulta Juutas Käkriäinen kera monilukuisen perheensä. 
          Joel Lehtosen romaanin pohjalta sovittanut ja ohjannut Urpo Lauri. 
          Teos vuodelta 1958.

          Putkinotko-kuunnelma on kuunneltavissa kokonaisuudessaan Yle Areenassa.
