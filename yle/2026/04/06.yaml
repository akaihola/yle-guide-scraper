      - title: 'Keinuva talo - Mika Kauhanen: Kevään kainalossa'
        start_time: '2026-04-06T17:35:00+03:00'
        end_time: '2026-04-06T18:35:00+03:00'
        description: |-
          Nautimme leppoisasti uutta keväistä etnoa Suomesta ja maailmalta. Sulakoon jäät sisältä, ympäriltä ja väleistä. Toisen pääsiäispäivän kunniaksi mukana spirituaalista äänenkuljetusta, kiitollisuutta vihreistä kunnaista ja kaipuuta omaan kotimaahan. Entä mitä popparit Bruce Springsteen ja Peter Gabriel tuovat etnopöytään? Toimittajana Mika Kauhanen.
      - title: 'Luomiskertomus: Laura Andersson - Tähtipölyn bulevardi'
        start_time: '2026-04-06T18:35:00+03:00'
        end_time: '2026-04-06T19:00:00+03:00'
        description: |-
          Tähtipölyyn kirjoitettu -romaanin tarina sijoittuu 1930-luvun Suomeen, jossa elokuvatähdeksi kohonnut Doris Laine kuvaa päivisin Yön valot -nimistä elokuvaa. Doriksen isä on pirtun salakuljettaja ja jos ei isän niin ei tyttärenkään kaikki tekemiset kestä päivänvaloa. Elokuvatähteyden ristipaineissa Doris taiteilee kahden eri roolin välillä: kuinka olla päivisin näyttelijä ja elokuvatähti - öisin kabinettien yksityistanssija Helsingin yön kaikkien paheiden keskellä.

          Luomiskertomuksen vieraana on film noirin pitkien varjojen ympärille kietoutuvan Tähtipölyyn kirjoitettu -romaanin kirjoittanut Laura Andersson.

          Toimittaja Jukka Kuosmanen.
