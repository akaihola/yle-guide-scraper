        start_time: '2026-04-06T22:45:30+03:00'
        end_time: '2026-04-06T23:39:37+03:00'
        description: |-
          Moni pääsiäiskonserteissa vieraillut on todennäköisesti nähnyt ja kuullut alttoviulisti Markus Sarantolan soittavan – hän arvioi esiintyneensä erilaisissa passioiden esityksissä jo sata kertaa. Lappeenrannan kaupunginorkesterin alttoviulun äänenjohtaja on soittanut myös lukuisissa vanhaan musiikkiin erikoistuneissa orkestereissa. Sarantola on ollut kiinnostunut vanhan musiikin historiatietoisesta tulkinnasta jo nuoruudestaan lähtien. Suuren osan ohjelmassa kuultavista ääniteistä Sarantola on löytänyt ulkomailta ja kirpputoreilta. Joukossa on myös todellisia harvinaisuuksia. Toimittajana on Inari Tilli.
