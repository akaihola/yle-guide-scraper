      - title: Poiminta Radio 1:n iltapäivästä
        start_time: '2026-04-06T17:00:00+03:00'
        end_time: '2026-04-06T17:20:00+03:00'
        description: |-
          Koululaisten liikkuminen on viime vuosina ollut erityisen paljon tapetilla. Huolipuhetta liian vähän liikkuvista lapsista on ollut paljon, mutta mediassa on runsaasti myös iloisia uutisia kouluista, joissa järjestetään välituntisin yhteispelejä, tanssihetkiä tai käydään ahkerasti lähimetsässä oppitunneilla. Perusopetuslaki on parhaillaan muuttumassa ja Liikunnallisen elämäntavan edistämistä koskeva säännös astuu voimaan ensi elokuussa. Miten se vaikuttaa kouluissa ja miksi? Kati Turtolan haastateltavana on Opetushallituksen Liikkuva koulu -ohjelman johtava asiantuntija Kirsi Naukkarinen. Ohjelman ensilähetys oli 30.9.2025.
