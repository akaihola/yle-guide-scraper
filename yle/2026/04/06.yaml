      - title: 'Elävä historia: Grönlannin kipeä historia – Tanska kolonisoi ja modernisoi inuiitit rikkinäisiksi'
        start_time: '2026-04-06T12:05:00+03:00'
        end_time: '2026-04-06T12:55:00+03:00'
        description: |-
          Grönlannista tuli Tanskan siirtomaa 1700-luvulla. Kolonialismi päättyi virallisesti vuonna 1953, kun Tanska teki Grönlannista osan itseään. Tanska myös alkoi ajaa Grönlannin modernisaatiota - mutta siihen liittyvät erilaiset sosiaalipoliittiset toimenpiteet rikkoivat monen grönlantilaisen, etenkin lapsen, elämän.

          Haastateltavina tutkija Saana Hansen ja tutkimusprofessori Rauna Kuokkanen. Toimittajana Harri Alanne. Äänisuunnittelijana Mikko Kymäläinen.
      - title: Radio 1:n pääsiäismaanantain iltapäivä
        start_time: '2026-04-06T13:00:00+03:00'
        end_time: '2026-04-06T15:00:00+03:00'
        description: |+
          Radio 1:n pääsiäismaanantain iltapäivä. 

          N. klo 13.10: Kapellimestari Susanna Mälkki työskentelee maailmaa kiertävänä kapellimestarina että tässä tapauksessa erityisesti uusi työ Sibelius-akatemian kapellimestarikoulutuksen professorina. Mitä Susanna Mälkki itse haluaa tuoda kapellimestarikoulutukseen, mitä hän  haluaa painottaa? Susanna Mälkin toinen kotimaa on Ranska, miten Ranska on muuttanut häntä? Jarmo Laitaneva haastattelee. Ohjelman ensilähetys oli 23.2.2026.

          N. klo 14. Maija Kajanto on suosittu hyvän mielen-kirjallisuuden kirjailija. Feel good-kirjojen suosio on noussut huimasti viime vuosina ja sen uskotaan johtuvan mm. rankkojen uutisaiheiden myötä. Kajanto itse kannustaa lukijoita astumaan rohkeasti ulos viihdekaapista. Miia Lahti haastattelee. Ohjelman ensilähetys oli  2.12.2025.


