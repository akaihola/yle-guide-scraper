      - title: Mikael Konttinen ja Aki Eronen - lentävät laulajat
        start_time: '2026-04-06T15:00:00+03:00'
        end_time: '2026-04-06T15:55:00+03:00'
        description: |
          Taitelijatapaamisessa tartutaan lentokoneen ohjaimiin, ja pohditaan mikä yhdistää ja erottaa laulamista ja lentämistä. Syntyykö lentäessä musiikkia ja toisaalta, onko keikkaillessa ikävä lentämään?
          Taitelijatapaamisessa vieraana ovat Disco yhtyeestä tuttu lentokapteeni Aki Eronen sekä laulava perämies Mikael Konttinen. Marko Miettinen toimittaa.
