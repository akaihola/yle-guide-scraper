          Elif Sanchez: Ayrılıq
          Cristina Branco: Verdes são os campos (Mulheres de Abril)
          Parno Grasz: Kánák dikháv voj khélél (Már nem szédülök)
          Kielo Kärkkäinen: Siellä kulkee hän (Kuin tarttuisi kädestä)
          Huippu: Haipakka 
          Johanna Juhola & Lena Jonsson: Itis (Power of polska)
          David Buchbinder, Mark Rubin, Michael Ward-Bergeman: Mississippi (Center of the river)
          Bruce Springsteen: This little light of mine (Live in Dublin)
          Peter Gabriel: Put the bucket down (Bright-side mix)
