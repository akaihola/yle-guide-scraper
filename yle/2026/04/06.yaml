      - title: 'Ulkolinja-podcast: Trumpin myötä seksuaalivähemmistöt ovat Yhdysvalloissa ahtaalla '
        start_time: '2026-04-06T20:02:00+03:00'
        end_time: '2026-04-06T20:23:00+03:00'
        description: |-
          Monissa Yhdysvaltain osavaltioissa seksuaalivähemmistöjen asema on heikentynyt nopeasti ja  voimakkasti.  Konservatiivisessa Tennesseessä on säädetty lukuisia uusia lakeja, joilla on rajoitettu transihmisten ja esimerkiksi drag-esiintyjien oikeuksia. Trumpia tukeva oikeistosiipi perustelee rajoituksia lasten suojelulla. Ulkolinjan Minna Pye tapasi Tennesseessä seksuaalivähemmistöjen edustajia, jotka pelkäävät tulevaa. Moni heistä muuttaa pois Tennesseestä. Tragedioiltakaan ei ole vältytty. 

          Toimittaja: Minna Pye
          Äänisuunnittelija: Anssi Tamminen
          Tuottaja: Marko Lönnqvist
      - title: 'Sukuni murhamysteeri: Löysimme Veikon, mutta kuka kuoli Vuoremijokeen?'
        start_time: '2026-04-06T20:23:00+03:00'
        end_time: '2026-04-06T21:00:00+03:00'
        description: |
          Olemme löytäneet oikean Veikon, mutta kuka oikein kuoli Vuoremijokeen?  Viimeinkin vinkki päätyy umpikujaan, mutta jäljelle jää mystinen Viki, josta ei löydy mitään tietoja.
          Haastateltavana jaksossa:
          Tiedusteluhistorian asiantuntija, poliisi Mikko Porvali
          Tietokirjailija Morten Jentoft
          Asianajaja Marko Tuhkanen
          Toimittaja ja käsikirjoittaja: Hannamari Vallila
