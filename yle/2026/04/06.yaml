      - title: 'Elävä historia: Grönlannin kipeä historia – Tanska kolonisoi ja modernisoi inuiitit rikkinäisiksi'
        start_time: '2026-04-06T12:05:00+03:00'
        end_time: '2026-04-06T12:55:00+03:00'
        description: |-
          Grönlannista tuli Tanskan siirtomaa 1700-luvulla. Kolonialismi päättyi virallisesti vuonna 1953, kun Tanska teki Grönlannista osan itseään. Tanska myös alkoi ajaa Grönlannin modernisaatiota - mutta siihen liittyvät erilaiset sosiaalipoliittiset toimenpiteet rikkoivat monen grönlantilaisen, etenkin lapsen, elämän.

          Haastateltavina tutkija Saana Hansen ja tutkimusprofessori Rauna Kuokkanen. Toimittajana Harri Alanne. Äänisuunnittelijana Mikko Kymäläinen.
