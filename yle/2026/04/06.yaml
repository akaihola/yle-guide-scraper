      - title: 'Keinuva talo - Mika Kauhanen: Kevään kainalossa'
        start_time: '2026-04-06T17:35:00+03:00'
        end_time: '2026-04-06T18:35:00+03:00'
        description: |-
          Nautimme leppoisasti uutta keväistä etnoa Suomesta ja maailmalta. Sulakoon jäät sisältä, ympäriltä ja väleistä. Toisen pääsiäispäivän kunniaksi mukana spirituaalista äänenkuljetusta, kiitollisuutta vihreistä kunnaista ja kaipuuta omaan kotimaahan. Entä mitä popparit Bruce Springsteen ja Peter Gabriel tuovat etnopöytään? Toimittajana Mika Kauhanen.
