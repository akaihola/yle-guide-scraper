      - title: Maailmanpolitiikan arkipäivää
        start_time: '2026-04-07T20:35:00+03:00'
        end_time: '2026-04-07T21:00:00+03:00'
        description: |-
          Eri puolille maailmaa nousee nyt datakeskuksia tekoälybuumin vauhdittamana. Datakeskukset kuluttavat valtavasti energiaa, mikä puolestaan on nostattanut Atlantin molemmin puolin huolta sähkön hinnasta ja lisääntyvistä päästöistä.

           

          Euroopassa kinkkisin tilanne on Irlannissa, jossa datakeskukset vievät jo viidenneksen maan sähköstä. Irlanti keskeytti joksikin aikaa uusien datakeskusten rakentamisen.

           

          Ohjelmassa kuullaan raportti Yhdysvalloista, jossa ympäristöjärjestöt pelkäävät datakeskusten lisäävän fossiilisten polttoaineiden kulutusta ja sen myötä päästöjä.

           

          Energia- ja datakeskusasiantuntijat arvioivat ohjelmassa, kuinka datakeskuksista saataisiin ilmastolle ja tavallisille kansalaisille parempia. Yksi keino olisi ryhtyä vaatimaan datakeskuksilta tarvitsemansa energian tuottamista ja investoimista sähköverkkoihin. Myös ydinenergiaa kannattaisi datakeskusasiantuntijan mukaan pohtia keinoksi täyttää energiasyöppöjen datakeskusten sähköntarvetta.

           

          Ohjelmassa haastateltavan YK:n kansainvälisen ilmastopaneeli IPCC:n varapuheenjohtajan mukaan niin poliittisilla päättäjillä, tavallisilla kuluttajilla kuin datakeskuksilla itsellään on paljon tehtävissä, ja energiankulutusongelma on ratkaistavissa.

           

          Pohjoismaat saavat ohjelmassa kiitosta datakeskusten hukkalämmön hyödyntämisestä. Ohjelmassa kuullaan Haminan hyvistä kokemuksista.

           

          Maailmanpolitiikan arkipäivää -ohjelman ovat toimittaneet Johanna Juntunen ja Paula Vilén. Äänitarkkailijana on Susan Grönholm. Tunnusmusiikki: Petri Alanko, kuva: Tuuli Laukkanen/Yle.
