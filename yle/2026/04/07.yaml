      - title: 'Kaisa Pulakan aikamatkat: Unettomuus on melankolisten nerojen vaiva - unimatkoja'
        start_time: '2026-04-07T12:05:00+03:00'
        end_time: '2026-04-07T12:25:00+03:00'
        description: |+
          Unettomuus on moderni kansantauti, jolla on pitkä historia. 1800-luvulla unettomuus oli muotia. Se oli vaiva, josta yläluokan miesten sopi valittaa yhdessä ja suureen ääneen. Nykyaika vaatii meitä jopa nukkumaan tehokkaasti ja siksi 2000-luvun unettomat kärsivät ahdistuksesta. 


