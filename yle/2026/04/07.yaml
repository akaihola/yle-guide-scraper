      - title: 'Romano mirits: Musiikki juurista voimaa – Anette Åkerlundin elämänmyönteinen tarina'
        start_time: '2026-04-07T20:00:00+03:00'
        end_time: '2026-04-07T20:15:00+03:00'
        description: |
          Romano Mirits-ohjelmassa kuullaan tällä kertaa laulaja ja taiteen parissa monipuolisesti työskentelevä Anette Åkerlund. Haastattelussa Åkerlund kertoo lämpimästi ja iloisesti omasta polustaan musiikin pariin. Kiinnostus laulamiseen ja taiteeseen sai alkunsa jo lapsuudessa, kun kotona musiikki ja kulttuuri olivat vahvasti läsnä vanhempien kautta.

          Keskustelussa Åkerlund pohtii myös romanikulttuurin merkitystä elämässään sekä sitä, miten tärkeää romanikielen säilyminen on tuleville sukupolville. Hänen toiveensa on, että yhä useampi romaninuori oppisi ja käyttäisi romanikieltä ylpeästi osana omaa identiteettiään. Haastattelusta välittyy elämänmyönteinen ja inspiroiva näkökulma taiteeseen, kulttuuriin ja omiin juuriin. 

          Toimittajana Dimitri Grönfors. 
