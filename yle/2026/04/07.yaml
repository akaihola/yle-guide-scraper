      - title: 'Radio 1:n iltapäivä: 20 hengen puvustotiimi ja kymmenet tuhannet teatterivaatteet - studiovieraana on Helsingin kaupunginteatterin puvuston päällikkö Nina Virkki'
        start_time: '2026-04-07T13:30:00+03:00'
        end_time: '2026-04-07T15:00:00+03:00'
        description: |-
          Juontajana Miia Lahti. Teatterin puvustossa tehdään iso osa teatterin taiasta. Helsingin kaupunginteatterissa puvustossa suunnitellaan, valmistetaan ja huolletaan pukuja. Joka vuosi siellä valmistetaan tai muokataan noin 1000 asustetta teatterin produktioita varten. Teatterissa on myös suuri pukuvarasto, jossa on kymmeniä tuhansia teatterivaatteita. Helsingin kaupunginteatterin puvuston päällikkö Nina Virkki tulee studiovieraaksi n. klo 14.

          N. klo 14:30 Dokumentaristi Sami Kieksi kertoo tärkeästä nuoruuden teatteriharrastuksestaan. Toimittajana on Sari Valto.
      - title: 'Kulttuuriykkönen: Panimonjohtaja ja hyväntekijä Anna Sinebrychoffin harvinainen elämä uuden tutkimuksen kohteena'
        start_time: '2026-04-07T15:00:00+03:00'
        end_time: '2026-04-07T15:55:00+03:00'
        description: |-
          Anna Sinebrychoff (1830–1904) hallitsi 1800-luvun lopulla yhtä Suomen menestyksekkäintä yritystä, Sinebrychoffin panimoa, Helsingissä. Hänen elämänsä on nyt uuden tutkimuksen kohteena. Hän oli aikansa edelläkävijä hyväntekeväisyyden ja naisjohtajuuden saralla. Miten hän yhdisti oman hartaan uskonsa ja panimon päihtymystä aiheuttavat juomat? Mitkä olivat hänen luonteenpiirteensä? Millaisesta perheestä hän tuli? 

          Anna Sinebrychoffin elämä liittyy Sinebrychoffin taidemuseon omaan historiaan. Hän asui Bulevardilla talon paraatiasunnossa yli 50 vuotta. Nyt Sinebrychoffin taidemuseon kellaritilassa on esillä näyttely Annan elämästä muotokuvineen, koruineen ja kävelykeppeineen. Millaisen taloudellisen ja henkisen perinnön hän jätti lapsilleen? Miten hän harjoitti hyväntekeväisyyttä? Millä tavalla ortodoksisuus näkyi hänen arjessaan ja suhtautumisessaan lähimmäisiinsä? On harvinaista että tuona aikana nainen maalautti itsestään niin monta potrettia. Näyttelyssä on esillä Albert Edelfeltin ja Gunnard Berndtsonin maalaamia muotokuvia panimonjohtattaresta. 

          Ohjelman vieraina ovat näyttelyn kuraattori Ira Westergård, taidehistorioitsija Hanna Kemppi ja tutkija Alexandra Ramsay.

          Ohjelman juontaa Pia-Maria Lehtola.




          Rentoa puhetta, kiinnostavimmat vieraat ja kulttuurin ajankohtaisaiheet debatoitavina. Suorana maanantaista perjantaihin.
