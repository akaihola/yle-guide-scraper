      - title: 'Radio 1:n iltapäivä: Niilo Seväsen tarinat ammentavat pohjoisesta mytologiasta'
        start_time: '2026-04-27T13:30:00+03:00'
        end_time: '2026-04-27T15:00:00+03:00'
        description: |
          Melodista death metal -musiikkia soittavan Insomnium-yhtyeen basisti ja lauluntekijä Niilo Sevänen rakastaa kirjoittamista ja tarinoiden luomista. Nyt Seväseltä on ilmestynyt toinen romaani, Unten kruunu. Fantasiakirja on jatkoa tarinoille Talven portti ja Ikitalven polku. Niilo Sevänen on saanut kirjoihinsa aikaan ainutlaatuisen fantasiamaailman, jossa yhdistyvät todellinen historia ja mielikuvituselementit. Niilo Sevänen on Jarmo Laitanevan haastattelussa n. klo 14.
      - title: 'Kulttuuriykkönen: Kuinka Michael Jackson esitetään uudessa elokuvassa?'
        start_time: '2026-04-27T15:00:00+03:00'
        end_time: '2026-04-27T15:55:00+03:00'
        description: |-
          Antoine Fuquan ohjaama Michael (2026) seuraa Michael Jacksonin elämänvaiheita valikoiden. Kulttuuriykkösen keskustelussa ruoditaan, kuinka hyvin elokuva onnistuu. Jacksonin uraa leimanneita syytöksiä lasten seksuaalisesta hyväksikäytöstä elokuvassa ei tuoda esiin. Keskustelemassa ovat kulttuuritoimittajat Mikko-Pekka Heikkinen ja Anton Vanha-Majamaa. Toimittajana on Jonni Roos.
