      - title: 'Elävä historia: Suomen kommunistit toimivat sodan jälkeen Moskovan silminä, korvina ja käsinä'
        start_time: '2026-04-27T12:05:00+03:00'
        end_time: '2026-04-27T12:55:00+03:00'
        description: |
          Itä-Euroopan maat luisuivat 1940-luvulla Neuvostoliiton vaikutuspiiriin sikäläisten kommunistipuolueiden  toiminnan seurauksena. Kuinka lähellä tämä kohtalo oli myös Suomessa? 
          Haastateltavat:
          “Suomalaisen kommunismin ruumiinavaus”-tietokirjan kirjoittanut Pekka Virkki seä yliopistotutkija Kasper Brasken, Helsingin yliopisto.
          Toimittajana: Ville Talola
