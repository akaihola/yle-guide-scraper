        end_time: '2026-04-27T19:50:00+03:00'
        description: |
          Dokumentissa seurataan vuoden ajan henkilöä, joka on pelannut omaisuutensa, työnsä ja miltei avioliittonsakin. Ohjelmassa tarkastellaan, mitä ongelmapelaajan mielessä liikkuu ja miltä hänen arkensa näyttää. Toteutus: Katarina Blomqvist. (es. 4.2.2028)
