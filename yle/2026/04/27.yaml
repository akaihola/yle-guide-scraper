      - title: 'Lehmitytöt 1944 J2: Ne ampuu meitä!'
        start_time: '2026-04-27T20:25:00+03:00'
        end_time: '2026-04-27T21:00:00+03:00'
        description: |
          Lehmitytöille tulee järkytyksenä, että vihollinen ampuu suoraan heitä kohti. Rokkalankoskelta Apilan, Helinän ja perheen muiden lehmien kanssa matkaan lähtenyt 14-vuotias Maija oppii nopeasti kuuntelemaan lähestyvien pommikoneiden ääniä.  Ihan päällä lentokonetta ei enää kuule. Eila on onnekas ja pääsee evakkojunaan, mutta Ville-vasikan kohtalona uhkaa olla asemalle jääminen.  
