        start_time: '2026-04-21T13:30:00+03:00'
        end_time: '2026-04-21T15:00:00+03:00'
        description: |
          Juontajana Miia Lahti.

          Ylen satavuotisjuhlan kunniaksi Yle Teema ja Yle Areena esittävät sata kotimaista elokuvaa sadan vuoden ajalta! Kerran kuussa Radio 1.n Iltapäivässä käsitellään yhtä katsojien toive-elokuvaa tai sen genreä laajemmin. Tiistaina 21.4. klo 21:45 Yle Teemalla nähtävä elokuva on Kyyrölän perheen aikamiespojista kertova kauhukomedia Kuutamosonaatti. Suomen Elokuvasäätiön kulttuuriviennin suunnittelija Otto Suuronen keskustelee Jarmo Laitanevan kanssa n. klo 14.

          N. klo 14:30  Emmi Itärannan Lumenlaulaja on uudelleenkirjoitus Kalevalasta, jossa keskiöön nousee Louhi. Kirja lumosi Kalevala-seuran toiminnanjohtajan, dosentti Niina Hämäläisen, jota haastattelee Marja Vehkanen.
      - title: Kulttuuriykkönen
        start_time: '2026-04-21T15:00:00+03:00'
        end_time: '2026-04-21T15:55:00+03:00'
        description: |
          Suomalaisen kiertävän sirkuksen kruununjalokivi Sirkus Finlandia on nähnyt 50 vuoden aikana yhteiskunnan ja sirkustaiteen muutoksen. Enää sirkuksessa ei nähdä norsuja, mutta sirkustaide elää ajassa. Sirkus on aina ollut kansainvälistä ja se näkyy ja kuuluu myös Sirkus Finlandian arjessa. Ja vaikka sirkukseen liittyy paljon romantiikkaa, kiertävän sirkuksen arki on pitkälti työntekoa.

          Kulttuuriykkönen kävi tutustumassa 50-vuotisjuhlakiertueeseen valmistautuvaan Sirkus Finlandiaan. Lähetyksessä ääneen pääsevät sirkuksen johtaja Calle Jernström Jr., Sirkus Finlandian miehensä kanssa perustanut Leena Jurvakainen, jonglööri Sofia Motturi ja klovni Anatoli Akerman.

          Ohjelman toimittaa Pietari Kylmälä.
