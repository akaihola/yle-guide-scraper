      - title: Maailmanpolitiikan arkipäivää
        start_time: '2026-04-21T20:35:00+03:00'
        end_time: '2026-04-21T21:00:00+03:00'
        description: |-
          EU hakee nyt kauppaan uusia suuntia Trumpin epävakauttamana aikana. Tammikuussa unioni sopi neljän Etelä-Amerikan maan kanssa Mercosur-kauppasopimuksen.

          Se astuu voimaan väliaikaisesti toukokuun alussa. Tällöin syntyy maailman suurin vapaakauppa-alue.

          EU valmistelee vapaakauppadiiliä myös Intian, Indonesian ja Australian kanssa. Ohjelmassa haastateltavan asiantuntijan mukaan kauppasopimuksilla EU osoittaa, että sillä on Yhdysvaltain ulkopuolisia kauppasuuntia ja halua purkaa kaupan rajoituksia.

          Mercosur-sopimus on herättänyt vastustusta etenkin EU:n suurimmassa maatalousmaassa Ranskassa. Ohjelmassa käydään kysymässä ranskalaisilta, mikä sopimuksessa hiertää.

          Ohjelmassa haastateltava EU:n entinen kauppaneuvottelija arvioi, että neuvotteluissa onnistuttiin luomaan sopimukseen EU:n maataloutta suojaavia kohtia. Myös suomalainen maatalousekonomisti katsoo sopimuksen Suomen maataloudelle nettovaikutuksiltaan myönteiseksi.

          Maailmanpolitiikan arkipäivää -ohjelman ovat toimittaneet Miina Väisänen ja Paula Vilén. Äänitarkkailijana on Pasi Ilkka. Tunnusmusiikki: Petri Alanko, kuva: Tuuli Laukkanen/Yle.

          Ohjelmasta on poistettu virheellinen ilmaisu Länsi-Ranskassa 20.4.2026 klo 13.15.
