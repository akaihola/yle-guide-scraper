      - title: 'Kaisa Pulakan aikamatkat: Painajainen on rinnan päällä istuva paholainen - unimatkoja'
        start_time: '2026-04-21T12:05:00+03:00'
        end_time: '2026-04-21T12:25:00+03:00'
        description: |+
          Miltä tuntuisi herätä, jos huoneessa olisi läsnä jokin yliluonnollinen pahantahtoinen olento etkä saisi edes huudettua apua? Entisaikoina painajainen tarkoitti tällaista olentoa, mutta nykyään puhutaan unihalvauksista. Yöllisistä sänkyyn tunkeutuvista demoneista on kuitenkin varoiteltu myös Donald Trumpin vaalikampanjassa. Käsikirjoitus ja äänisuunnittelu: Kaisa Pulakka. Lukija: Pietari Kylmälä. Tunnusmusiikki: Joonatan Kotila. Tuottaja: Pertti Ylikojola.

