        end_time: '2026-04-21T16:59:00+03:00'
        description: |-
          J.S. Bach: Allegro brandenburgilaisesta konsertosta n:o 1 (Freiburgin barokkiorkesteri).

          Hahn: Soliloque et forlane (Lawrence Power, alttoviulu, ja Simon Crawford-Phillips, piano).

          Verdi: Herttuan aaria "Questa o quella" oopp. Rigoletto (Luciano Pavarotti, tenori, ja Lontoon SO/Richard Bonynge).

          Bazzini: Calabrese (Vilde Frang, viulu, ja Jose Gallardo, piano).

          Respighi: Intermezzo sarjasta orkesterille Rossinin mukaan (BBC:n FO/Gianandrea Noseda).

          Schubert: Ständchen (Amarcord ja Eric Schneider, piano).

          Händel: Ballo di pastori e pastorelle (Paimenten ja paimenettarien tanssi) oopp. Amadigi di Gaula (Orfeo 55/Nathalie Stutzmann).

          Haydn: Andante trumpettikonsertosta Es-duuri (Jouko Harjanne, trumpetti ja RSO/Jukka-Pekka Saraste).

          Grieg: Keväälle (Juho Pohjonen, piano). 

          Lalo: Romanssi-serenadi (Jean-Jacques Kantorow, viulu, ja Tapiola Sinfonietta/Kees Bakels).

          Chueca - Valverde: Kotiapulaisen aaria "Pobre chica, la que tiene que servir!" zarzuelasta La Gran Via (Teresa Berganza, mezzosopraano, ja Englantilainen kamariork./Garcia Asensio).

          Falla: Nana (Jian Wang, sello, ja Göran Söllscher, kitara).

          Satie (sov. Debussy): Gymnopedie n:o 3 (Orpheus-kamariork.).


          Konsertin on laatinut Ainomaija Pennanen.
