      - title: 'Vakoojat: Operaatio olympiakisat ja Stuxnet – kybermaailman Hiroshima'
        start_time: '2026-04-29T12:05:00+03:00'
        end_time: '2026-04-29T12:50:00+03:00'
        description: |+
          Maailman ensimmäinen teollisuuslaitoksia fyysisesti tuhoava tietokonemato, kybermaailman Hiroshimaksikin kutsuttu Stuxnet-virus, ryömi Iranin huolella vartioituihin ydinlaitoksiin ilmeisesti pienessä USB-muistitikussa. Tämä Yhdysvaltain ja Israelin valmistama kyberase, Stuxnet, iski tietojen mukaan Iraniin kaikkiaan kolme kertaa vuosina 2009 ja 2010. Tämän jälkeen maailmalla ei ollut enää paluuta entiseen.

          Stuxnet tarjosi mallin kokonaan uudenlaiselle kybersodankäynnille, ja sen perillisillä – Flame, Havex, Duqu, Industroyer ja Triton – tehdään tuhoa paraikaa muun muassa puolustussotaa käyvässä Ukrainaassa.. Ei vain ydinlaitoksille, vaan myös sähköverkoille, öljynjalostamoille, sairaaloille ja ylipäänsä mille tahansa teollisuustuotannolle tai vaikkapa lentokentille.

          Stuxnetista ja kybersodankäynnistä kertoo toimittaja-tietokirjailija Hannu Pesonen. Toimittajana on Raimo Tyykiluoto.

