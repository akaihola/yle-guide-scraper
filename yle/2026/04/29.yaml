      - title: 'Ylioppilaskunnan Soittajat – 100 vuotta YStävyyttä '
        start_time: '2026-04-29T19:02:00+03:00'
        end_time: '2026-04-29T21:14:00+03:00'
        description: |-
          Maineikas akateeminen sinfoniaorkesteri Ylioppilaskunnan Soittajat huipentaa juhlavuotensa 100-vuotiskonserttiin Musiikkitalossa.

          Juhlan kunniaksi kaikilla konsertin sävellyksillä ja esiintyjillä on erityinen side päivänsankariin. 

          Lähetyksen lomassa kuullaan orkesterin nykyisten ja entisten soittajien ja kapellimestareiden muistoja YS:stä. Ääneen pääsevät esimerkiksi kapellimestari-viulisti John Storgårds, säveltäjät Lotta Wennäkoski ja Kalevi Aho ja yli 50 vuotta orkesterissa soittanut Gösta Ölander sekä toki soittajia myös nykyorkesterista.

          Ylioppilaskunnan Soittajat
          joht. Aku Sorensen, Petri Sakari ja Mikk Murdvee
          John Storgårds, viulu
          Konserttimestari Darja Gustafsson

          Kalevi Aho: Fanfaari YS:lle
          Elisar Riddelin: Taivaannaula (kantaesitys)
          Lotta Wennäkoski: Het waait
          Ernst Mielck: Konserttikappale viululle ja orkesterille
          Jean Sibelius: Sinfonia nro 1 (klarinettisoolo Elise Rauha)
          Jean Sibelius: Finlandia

          Musiikkitalossa 18.4. äänitetyn konsertin toimittaa Noora Hirn. Äänisuunnittelijana Antti Pohjola ja äänitarkkailijana Antti Snellman.

          Kuva: ©Marko Kaskelin
