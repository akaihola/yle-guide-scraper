      - title: 'Radio 1:n iltapäivä: Säveltäjä, muusikko Maija Ruuskanen on kaikkialla'
        start_time: '2026-04-29T13:30:00+03:00'
        end_time: '2026-04-29T15:00:00+03:00'
        description: |
          Juontajana Jarmo Laitaneva. 

          Klo 14 Studiovieraana säveltäjä, teatterimuusikkko Maija Ruuskanen. Kun katsoo teatteriesityksen tekijätietoja, varsin usein niistä löytyy pianisti, kapellimestari, säveltäjä Maija Ruuskasen nimi. Ruuskanen on monipuolinen muusikko, joka sanoo etsivänsä omaa ääntään eri taiteenlajien reunoilta. Ennen muusikon uraansa Ruuskanen opiskelikin tanssijaksi. Tänä vuonna Ruuskasen musiikkia on voinut kuulla niin sirkuksessa kuin teatteriesityksessäkin. 

          N. klo 14:30 Kenkäsuunnittelija ja yrittäjä Minna Parikka kertoo millaista inspiraatiota keikat ja musikaalit antavat hänen luovaan työhönsä ja minkälainen merkitys kulttuurilla on hänelle. Toimittaja Satu Kivelä Ensilähetys oli viime lokakuussa.
