      - title: 'Ylioppilaskunnan Soittajat – 100 vuotta YStävyyttä '
        start_time: '2026-04-29T19:02:00+03:00'
        end_time: '2026-04-29T21:00:00+03:00'
        description: |-
          Suomen vanhin akateeminen sinfoniaorkesteri huipentaa juhlavuotensa 100-vuotiskonserttiin Musiikkitalossa.

          Juhlan kunniaksi kaikilla konsertin sävellyksillä ja lavalle astuvilla esiintyjillä on erityinen side päivänsankariin. 

          Lähetyksen lomassa kuullaan orkesterin nykyisten ja entisten soittajien muistoja YS:stä.

          Ylioppilaskunnan Soittajat
          joht. Aku Sorensen, Petri Sakari ja Mikk Murdvee
          John Storgårds, viulu

          Kalevi Aho: Fanfaari YS:lle
          Elisar Riddelin: Taivaannaula (kantaesitys)
          Lotta Wennäkoski: Het waait
          Ernst Mielck: Konserttikappale viululle ja orkesterille
          Jean Sibelius: Sinfonia nro 1
          Jean Sibelius: Finlandia

          Musiikkitalossa 18.4. äänitetyn konsertin toimittaa Noora Hirn. Äänisuunnittelijana Antti Pohjola ja äänitarkkailijana Antti Snellman.

          Kuva: ©Marko Kaskelin
