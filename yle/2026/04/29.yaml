      - title: 'Ylioppilaskunnan soittajat – 100 vuotta YStävyyttä '
        start_time: '2026-04-29T19:02:00+03:00'
        end_time: '2026-04-29T21:00:00+03:00'
        description: |
          Suomen vanhimman akateemisen sinfoniaorkesterin juhlakausi huipentuu!

          Mikä voisikaan olla arvokkaampi juhlistus yli vuosisadan jatkuneelle soittamisen riemulle ja niille tuhansille soitinryhmä- ja tieteenalarajat ylittäneille YStävyyssuhteille, jotka Ylioppilaskunnan Soittajien piirissä ovat syntyneet, kuin suurkonsertti Suomen merkittävimmässä konserttisalissa? Juhlan kunniaksi kullakin ohjelmiston teoksella ja lavalle astuvalla esiintyjällä on erityinen side päivänsankariin. 

          Ylioppilaskunnan soittajat
          joht. Aku Sorensen, Markus Lehtinen ja Mikk Murdvee
          John Storgårds, viulu

          Kalevi Aho: Fanfaari YS:lle
          Elisar Riddelin: Tilausteos
          Lotta Wennäkoski: Het waait
          Ernst Mielck: Konserttikappale viululle ja orkesterille
          Jean Sibelius: Sinfonia nro 1
          Jean Sibelius: Finlandia

          Kuva: ©Marko Kaskelin
