      - title: 'Radio 1:n iltapäivä: Nina Tapio – ääni, joka taipuu mihin tahansa'
        start_time: '2026-04-09T13:30:00+03:00'
        end_time: '2026-04-09T15:00:00+03:00'
        description: |-
          Juontajana Miia Lahti.

          Nina Tapio on laulaja, jonka ääni on yksi Suomen tunnetuimmista kevyen musiikin äänistä. Hän ollut mukana nuoruutensa Taikapeili-duossa, Adiemus-ryhmässä ja Rajattomassa. Hän on esiintynyt teatterissa, Euroviisujen taustalaulajana, tehnyt paljon erilaisia soolo-projekteja ja näytellyt ääninäyttelijänä lukuisissa animaatioelokuvissa. Nyt NinaTapiolla on menossa projekti nimeltä "Lohdun lauluja". Nina Tapio on studiovieraana  n. klo 14.

          N. klo 14:30 Ohjaaja, koreografi Marco Bjurström kertoo toimittaja Maija Salmiselle, miten hänen uskonsa suomalaiseen teatteriin nousi uudelle tasolle Kansallisteatterin Täällä Pohjantähden alla -näytelmän takia. 
      - title: 'Kulttuuriykkönen: Roland Barthes ja valokuva - yhä yhdessä'
        start_time: '2026-04-09T15:00:00+03:00'
        end_time: '2026-04-09T15:55:00+03:00'
        description: |
          Ranskalainen kirjallisuudentutkija ja esseisti Roland Barthes kirjoitti uransa loppuvaiheessa tutkielman valokuvasta. Valoisa huone (1979) suomennettiin ensimmäisen kerran jo muutamaa vuotta myöhemmin. Teoksella on ollut suuri merkitys valokuvataiteen piirissä, missä sitä on luettu ja tulkittu ahkerasti. Kirjan julkaisemisen jälkeen valokuva on vakiinnuttanut asemansa hyväksyttynä taiteenlajina perinteisempien ilmaisutapojen, kuten maalaiustaiteen, kuvanveiston tai taidegrafiikan joukossa. Lisäksi valokuvan tekninen toteutustapa on muuttunut digitaaliseksi niin itse valokuvaamisen, kuin kuvien tulostamisenkin osalta. Toisaalta Barthesin työtä koskeva tutkimus ja kriittinen keskustelu ovat olleet vilkasta. Kulttuuriykkösessä keskustellaan siitä, miten maaliskuussa julkaistu uusi suomennos Valoisasta huoneesta päivittää käsityksiämme Barthesista valokuvan teoreetikkona. Haastateltavina suomennoksen tekijät, valoikuvauksen lehtori ja kirjailija Hanna Weselius sekä professori Marjaana Kella. Toimittajana on Jonni Roos.
