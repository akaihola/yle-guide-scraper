        start_time: '2026-04-09T22:31:00+03:00'
        end_time: '2026-04-09T22:59:00+03:00'
        description: |-
          Catherinen viikot ovat vierineet Bathin riennoissa. Hänen mieltään kuitenkin kaihertaa Pumppusalin tanssiaisissa tavattu hurmaava herra, jonka nimi on jäänyt epäselväksi. Ja nyt miestä ei näy enää missään. Catherine ja hänen uusi ystävänsä Isabella törmäävät veljiinsä Jamesiin ja Johniin.

          Kirja - Markku Haussila
          Catherine Morland - Anna Airola
          Rouva Allen - Minna Koskela
          Herra Allen - Santeri Kinnunen
          Henry Tilney - Samuel Kujala
          Isabella Thorpe, Catherinen ystävätär - Pia Andersson
          John Thorpe, Isabellan veli - Joel Hirvonen
          James Morland, Catherinen veli - Eric Barco
          Rouva Morland, Catherinen äiti - Minna Suuronen

          Jane Austenin romaanin pohjalta BBC:lle (2016) dramatisoinut: Hattie Naylor
          Yleisradiolle suomentanut: Kersti Juva
          Ohjaus: Sini Pesonen
          Äänisuunnittelu: Hanna-Helena Kinnunen
          Musiikki: Tatu Nenonen ja Epidemic Sound
          Tuotanto: Laura Jaakkola, Yle Draama, 2024.
      - title: Epäilyttävän uutta - Aki Yli-Salomäki
        start_time: '2026-04-09T23:01:00+03:00'
        end_time: '2026-04-09T23:57:00+03:00'
        description: |-
          Digitaaliseen musiikkiavaruuteen virtaa jatkuvasti uutta kuunneltavaa. Aki Yli-Salomäki poimii virrasta musiikkia, joka heijastelee tätä aikaa ja ympäristöä, on helposti lähestyttävää, mutta silti kunnianhimoista ja uteliasta.
