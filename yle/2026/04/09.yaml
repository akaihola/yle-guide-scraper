      - title: 'Poiminta Radio 1:n iltapäivästä '
        start_time: '2026-04-09T18:25:00+03:00'
        end_time: '2026-04-09T18:35:00+03:00'
        description: |
          Ajallemme on tyypillistä, että psykologista tietoa tarjoillaan meille kaikkialta. Pyrimme kehittämään itseämme lisäämällä ymmärrystämme ihmismielen toiminnasta. Ongelma on vain siinä, että kaikki psykologiaan liittyvä niin sanottu terapiapuhe, mitä somessa ja mediassa pyörii, ei ole totta. Voidaan puhua jopa tiedemyyteistä, joille kukaan meistä ei ole immuuni.. Sari Valto tapasi psykologi Minna Miaon. 
