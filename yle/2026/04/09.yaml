      - title: 'Jazzklubin viikon keikka: Mäensivu – Berliner – McCabe – Wiening April Jazz -festivaalilla.'
        start_time: '2026-04-09T19:02:00+03:00'
        end_time: '2026-04-09T20:00:00+03:00'
        description: |-
          Huippumuusikoista koottu kansainvälinen kvartetti – basisti Kaisa Mäensivu, vibrafonisti Sasha Berliner, saksofonisti Nicole McCabe ja rumpali Mareike Wiening – esiintyi ensimmäistä kertaa yhdessä vuoden 2025 April Jazzissa. Luovuutta ja virtuositeettia huokuva keikka koostuu pääosin kvartetin jäsenten omista sävellyksistä.

          1. Upper Manhattan Medical Group (säv. Billy Strayhorn, sov. Sasha Berliner)
          2. Hues (säv. & sov. Nicole McCabe)
          3. Metropolis Paradise (säv. & sov. Mareike Wiening)
          4. RiChanges (säv. & sov. Mareike Wiening)
          5. To You (säv. & sov. Nicole McCabe)
          6. Midnight Sun (säv. & sov. Kaisa Mäensivu)
          7. We See (säv. Thelonious Monk, sov. Nicole McCabe)
          8. Planchette (säv. & sov. Sasha Berliner)
          9. Gravity (säv. & sov. Kaisa Mäensivu)
          10. Shadow Mind (säv. & sov. Kaisa Mäensivu)

          Kaisa Mäensivu, kontrabasso
          Sasha Berliner, vibrafoni
          Nicole McCabe, saksofoni
          Mareike Wiening, rummut

          Kuva: Haappix.
          Äänitetty Espoon Louhisalissa 24.4.2025.

          Äänisuunnittelija Hannu Perälä, äänitystuottaja Speedy Saarinen.
          Toimittajana Laura Korhonen.
