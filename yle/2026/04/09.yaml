      - title: Faunin iltapäivä
        start_time: '2026-04-09T16:07:00+03:00'
        end_time: '2026-04-09T16:59:00+03:00'
        description: |-
          Vivaldi: Allegro konsertosta kahdelle sellolle, jousille ja continuolle g-molli (Lauri Pulakka ja Markku Luolajan-Mikkola, sello, sekä Kuudennen kerroksen ork./Anssi Mattila, cembalo).

          Satie: Gnossienne n:o 1 (Janne Mertanen, piano).

          Bartók: Ilta kylässä (Chicagon SO/Fritz Reiner).

          Syrjälahti: Keväisessä metsässä (Suvi-Anna Kärkönen, kantele). 

          Tessarini: Alkusoitto jousille ja continuolle D-duuri (Akademie für alte Musik Berlin/Georg Kallweit, viulu). 

          Donizetti: Beppen aaria oopp. Rita (Juan Diego Flórez, tenori, ja Milanon Giuseppe Verdi -SO/Riccardo Frizza).

          Schubert: Allegro vivace - Trio oktetosta jousille ja puhaltimille F-duuri (The Mullova Ensemble).

          F. Hensel: Larghetto (Sarah Cahill, piano). 

          Puccini: Menti all'avviso, resitatiivi ja aaria (Freddie De Tommaso, tenori, ja Lontoon FO/Renato Balsadonna). 

          Gade: Andantino con moto kok. Fantasistykker op.43 (Lauri Sallinen, klarinetti, ja Anna Kuvaja, piano).

          Iradier: La paloma (Lorraine Hunt Lieberson, mezzosopraano, Joseph Kaiser, tenori, sekä Steven Blier ja Michael Barrett, piano).


          Konsertin on laatinut Ainomaija Pennanen.
