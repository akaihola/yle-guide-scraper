        end_time: '2026-04-09T16:59:00+03:00'
        description: |
          Vivaldi: Allegro konsertosta kahdelle sellolle, jousille ja continuolle g-molli (Lauri Pulakka ja Markku Luolajan-Mikkola sekä Kuudennen kerroksen ork./Anssi Mattila, cembalo).

