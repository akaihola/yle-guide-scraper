        start_time: '2026-04-24T11:00:00+03:00'
        end_time: '2026-04-24T11:55:00+03:00'
        description: |
          Huhtikuun 14. päivä virallista syntymäpäiväänsä viettävä, Helsingin yliopiston piirissä toimiva sinfoniaorkesteri on virkeä "vanhus". YS:n virallinen perustamisvuosi on 1926, mutta soittajiston juuret ulottuvat aina vuoteen 1747, jolloin Turun akatemian yhteyteen perustettiin kuninkaan käskykirjeellä Akateeminen Kapelli. YS:n historiaa ja nykyhetkeä tarkastelee Outi Paananen. 
