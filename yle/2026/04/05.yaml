      - title: 'Elävä historia: Juonittelijoita ja esimerkillisiä äitejä - roomattaret vallan liepeillä'
        start_time: '2026-04-05T12:05:00+03:00'
        end_time: '2026-04-05T12:55:00+03:00'
        description: |
          Rooman ensimmäisen keisarin, Augustuksen, perheen naiset osasivat käyttää vaikutusvaltaansa. Vaimo Livia, tytär Julia ja sisar Octavia joutuivat kuitenkin toimimaan myös politiikan pelinappuloina.
          Miten he ilmensivät antiikin naisihannetta – tai sen vastakohtaa? 
          Entä miten myyttien naiset heijastelivat käsityksiä siitä, millainen naisen tulisi olla?
          Haastateltavina ovat historioitsijat Marja-Leena Hänninen ja Elina Pyy. Toimittajana on Riikka Suikkari.
