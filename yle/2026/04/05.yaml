        start_time: '2026-04-05T16:07:00+03:00'
        end_time: '2026-04-05T16:59:59+03:00'
        description: |+
          J.S. Bach: Sinfonia teoks. Oster-Oratorium (Pääsiäisoratorio) (The Brandenburg Consort/Roy Goodman).

          Bridge: Spring song (Kevätlaulu) (Steven Isserlis, sello, ja Stephen Hough, piano).

          Händel: Enkelin aaria "Disserratevi, o porte d'Averno" orat. La Resurrezione (Ylösnousemus) (Cecilia Bartoli, mezzosopraano, ja Les Musiciens du Louvre/Marc Minkowski).

          Müller: Pääsiäissonaatti C-duuri neljille uruille (Guy Bovet, Philippe Laubscher, Ernst Gerber ja André Luy).

          Piazzolla: Primavera portena (Kevät) sarj. Las cuatro estaciones portenas (Buenos Airesin neljä vuodenaikaa) (Otto Tolonen, kitara).

          Debussy: Le printemps (Kevät) (Brigitte Desnoues, sopraano, ja Choeur et Orchestre de l'Université Paris-Sorbonne/Jacques Grimbert).

          J.S. Bach: Adagio teoks. Oster-Oratorium (Pääsiäisoratorio) (Academy of St. Martin-in-the-Fields/Heinz Holliger, oboe).

          Berlioz: Chant de la Fête de Pâques (Pääsiäishymni) teoks. Huit scènes de Faust (Kahdeksan kohtausta Faustista) (Montrealin sinfoniaorkesterin kuoro ja Montrealin SO/Charles Dutoit).

          Vivaldi: Sonaatti jousille ja continuolle Es-duuri (Pyhällä haudalla) (Il Giardino Armonico/Giovanni Antonini).

          Sinding: Frühlingsrauschen (Kevään kohinaa) (Philip Martin, piano).

          Mascagni: Pääsiäishymni "Regina coeli - Inneggiamo, il Signor" oopp. Cavalleria rusticana (Julia Varady, sopraano, sekä Lontoon oopperakuoro ja Lontoon kansallinen FO/Gianandrea Gavazzeni).

          Konsertin on toimittanut Annina Aho.

