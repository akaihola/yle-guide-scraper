        start_time: '2026-04-13T17:35:00+03:00'
        end_time: '2026-04-13T18:35:00+03:00'
        description: |-
          Kansainvälisenä kasvien arvostuspäivänä (International plant appreciation day) etno, folk ja tango versovat kukkeaa kuunneltavaa. On kehäkukkaa, isosamettikukkaa, valkovuokkoa, kirsikankukkaa ja suopursua – sekä laulajina Kieloa, Kanervaa, Rosalíaa ja Violetaa. Kuka heistä sai Grammy-palkinnon opinnäytetyöstään? Toimittajana Mika Kauhanen.
