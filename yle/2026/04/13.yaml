      - title: 'Väkivallan markkinat: Erik Princen ilmavoimat'
        start_time: '2026-04-13T19:02:00+03:00'
        end_time: '2026-04-13T19:50:00+03:00'
        description: |-
          Blackwaterin jälkeen Erik Princellä oli edelleen yksi toteutumaton unelma: omat ilmavoimat. Niitä hän lähti perustamaan salaa jopa omalta firmaltaan, kiinalaiselta FSG:ltä. Alkoi uskomaton, farssin piirteitä omaava saaga, johon liittyy amatöörivalokuvaaja, erinomaisia lakimiehiä ja koodikieltä.

          Vaikka vuosikymmenet ja skandaalit ovat pakottaneet yksityistä turvallisuusalaa siistiytymään, hämäriä diilejä on tarjolla edelleen. Mihin ala suuntaa seuraavaksi? Toimittaja Ippi Arjanteen kanssa muuttuvia konflikteja, tekoälyn roolia ja muita tulevaisuuden skenaarioita pohtii Mikko Räkköläinen. Jakso on julkaistu alunperin kesäkuussa 2023.
      - title: 'Ulkolinja-podcast: Tuhotusta Gazasta vain harva lapsipotilas pääsee hoitoon ulkomaille '
        start_time: '2026-04-13T20:05:00+03:00'
        end_time: '2026-04-13T20:25:00+03:00'
        description: |-
          Gazassa on eri tavoin loukkaantunut noin 40 000 lasta Israelin iskuissa. Hoitoa ei saa, koska terveydenhuolto on käytännössä tuhoutunut. Vain harvat onnistuvat pääsemään ulkomaille hoitoon. Podcastissa seurataan gazalaisia lapsipotilaita Jordaniassa.  
      - title: 'Kaisa Pulakan aikamatkat: Unettomuus on melankolisten nerojen vaiva - unimatkoja'
        start_time: '2026-04-13T20:25:00+03:00'
        end_time: '2026-04-13T21:00:00+03:00'
        description: |+
          Unettomuus on moderni kansantauti, jolla on pitkä historia. 1800-luvulla unettomuus oli muotia. Se oli vaiva, josta yläluokan miesten sopi valittaa yhdessä ja suureen ääneen. Nykyaika vaatii meitä jopa nukkumaan tehokkaasti ja siksi 2000-luvun unettomat kärsivät ahdistuksesta. 


