      - title: 'Elävä historia: Göpeklitepen kivikauden aikainen mysteeri'
        start_time: '2026-04-13T12:05:00+03:00'
        end_time: '2026-04-13T12:55:00+03:00'
        description: |-
          Göpeklitepe ja Karahantepe ovat 12000 vuotta vanhoja kulttuurialueita, joilla kivikauden ihmiset elivät ja tekivät valtavia kivirakennuksia ja yksityiskohtaisia kuusimetrisiä monumentteja. On edelleenkin mysteeri, miksi metsästäjä-keräilijät ryhtyivät moiseen voimanponnistukseen. Olivatko alueet tarkoitettu rituaalikäyttöön, vai olivatko ne varhaisia kaupunkeja? Toimittaja pääsi vierailemaan Kaakkois-Turkin arkeologisilla kaivauksilla.
          Haastateltavina Göpeklitepen ja Karahantepen kenttäarkeologit. Toimittajana Anniina Wallius.
