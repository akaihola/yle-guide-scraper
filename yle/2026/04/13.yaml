      - title: 'Väkivallan markkinat: Erik Princen ilmavoimat'
        start_time: '2026-04-13T19:02:00+03:00'
        end_time: '2026-04-13T19:50:00+03:00'
        description: |-
          Blackwaterin jälkeen Erik Princellä oli edelleen yksi toteutumaton unelma: omat ilmavoimat. Niitä hän lähti perustamaan salaa jopa omalta firmaltaan, kiinalaiselta FSG:ltä. Alkoi uskomaton, farssin piirteitä omaava saaga, johon liittyy amatöörivalokuvaaja, erinomaisia lakimiehiä ja koodikieltä.

          Vaikka vuosikymmenet ja skandaalit ovat pakottaneet yksityistä turvallisuusalaa siistiytymään, hämäriä diilejä on tarjolla edelleen. Mihin ala suuntaa seuraavaksi? Toimittaja Ippi Arjanteen kanssa muuttuvia konflikteja, tekoälyn roolia ja muita tulevaisuuden skenaarioita pohtii Mikko Räkköläinen. Jakso on julkaistu alunperin kesäkuussa 2023.
      - title: Ulkolinja-podcast
        start_time: '2026-04-13T20:05:00+03:00'
