      - title: 'Elävä historia: Ihmiskunnan historian tärkein käänne löytyi Turkin kivisten kukkuloiden sisältä'
        start_time: '2026-04-13T12:05:00+03:00'
        end_time: '2026-04-13T12:47:00+03:00'
        description: |-
          Göpeklitepe ja Karahantepe ovat 12000 vuotta vanhoja kulttuurialueita, joilla kivikauden ihmiset elivät ja tekivät valtavia kivirakennuksia ja yksityiskohtaisia kuusimetrisiä monumentteja. On edelleenkin mysteeri, miksi metsästäjä-keräilijät ryhtyivät moiseen voimanponnistukseen. Olivatko alueet tarkoitettu rituaalikäyttöön, vai olivatko ne varhaisia kaupunkeja? Toimittaja pääsi vierailemaan Kaakkois-Turkin arkeologisilla kaivauksilla.
          Haastateltavina Göpeklitepen ja Karahantepen kenttäarkeologit. Toimittajana Anniina Wallius.
      - title: 'Politiikkaradio: Mikä ratkaisi Unkarin vaalit?'
        start_time: '2026-04-13T13:00:00+03:00'
        end_time: '2026-04-13T13:30:00+03:00'
        description: |
          Politiikkaradio perkaa Unkarin sunnuntaiset vaalit. Miten käy EU:n kiusankappaleelle, pääministeri Viktor Orbánille? Mikä ratkaisi vaalit? 
          Aiheesta ovat keskustelemassa Jean Monnet -professori Katalin Miklóssy Helsingin yliopistosta ja politiikan tutkija, valtio-opin yliopistonlehtori Heino Nyyssönen Turun yliopistosta. Toimittajana on Antti Pilke. Suora lähetys.
      - title: 'Radio 1:n iltapäivä: laulaja-lauluntekijä Vilma Talvitie inspiroituu muukalaisuudesta ja ulkopuolisuudesta'
        start_time: '2026-04-13T13:30:00+03:00'
        end_time: '2026-04-13T15:00:00+03:00'
        description: |
          Juontajana Jarmo Laitaneva.
          N. klo 14 studiossa on vieraana laulaja-lauluntekjä Vilmatalvitie. Kansanmusiikin ja akustisen pop-musiikin rajamailla seikkaileva muusikko on matkustanut ja esiintynyt viime vuosina kaikkiaan yli 30 maassa. Talvitien kulkurielämä on vaikuttanut vahvasti Talvitien omaan musiikkiin ja hän kutsuukin tyyliään nimellä nomadifolk. 
      - title: 'Kulttuuriykkönen: Kevään runonostot'
        start_time: '2026-04-13T15:00:00+03:00'
        end_time: '2026-04-13T15:55:00+03:00'
        description: |-
          Mitä runoudessa on tapahtunut viime kuukausina ja millaiset ilmiöt ovat nousseet säkeissä esiin? Kriitikko Vesa Rantaman esseeteos Runominän vuosi luo katseen nykyrunon väitettyyn vaikeuteen ja antaa vinkkejä runojen lukemiseen. Lähetyksessä keskustellaan runouden paikasta kulttuurikentällä, kirjakaupoissa ja suoratoistopalveluissa. Lähetyksessä on mukana myös muusikko Joska Josafat, jonka Hellaakoski-levytykset ovat tuoneet klassisemman suomalaisen runouden nykypäivään.
          Juontajana on Pietari Kylmälä.

          Rentoa puhetta, kiinnostavimmat vieraat ja kulttuurin ajankohtaisaiheet debatoitavina. Suorana maanantaista perjantaihin.
