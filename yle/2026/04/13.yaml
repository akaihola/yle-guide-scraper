          "Jobin kirja: En ole syyllistynyt vääryyteen"
          Näyttelijä Krista Kosonen lukee Jobin kirjaa (31:1-32:22) VT2028 käännöksen mukaan. 15. jaksossa Job vakuuttaa yhä syyttömyyttään ja nuori Elihu ottaa puheenvuoron.
