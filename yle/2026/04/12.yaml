      - title: Faunin iltapäivä
        start_time: '2026-04-12T16:07:00+03:00'
        end_time: '2026-04-12T16:59:59+03:00'
        description: |+
          Lanner: Marssi bal. Corso Donati (Wienin Concentus Musicus/Nikolaus Harnoncourt).

          W.A. Mozart: Rondo kvartetosta oboelle ja jousille F-duuri (Pauline Oostenrijk ja Utrecht-kvartetti).

          Grieg: Den bergtekne (Lumottu) (Håkan Hagegård, baritoni, ja Bergenin FO/Ole Kristian Ruud). 

          Debussy: Passepied sarj. Suite bergamasque (Amsterdamin kitaratrio).

          Momotenko: Koliskova (Kehtolaulu) (Latvian radion kuoro/Sigvards Klava, sekä Ieva Sablovska, harppu). 

          Florio: Andante kvartetosta neljälle saksofonille (Rascher-kvartetti).

          Le Beau: Ballade b-molli (Ana-Marija Markovina, piano).

          Eller: Romanss teoks. Viis pala keelpilliorkestrile (Viisi kappaletta jousiorkesterille) (Tallinnan kamariork./Tönu Kaljuste).

          Sibelius: Humoreski (Laulu-Miehet/Matti Hyökki).

          Wieniawski (sov. Kreisler): Etydi-kapriisi n:o 4 a-molli (James Ehnes, viulu, ja Eduard Laurel, piano).

          Konsertin on toimittanut Riikka Holopainen. 

