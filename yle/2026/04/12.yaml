      - title: 'Klasariparatiisi: Il Distratto! Haydnin hajamielinen sinfonia puijaa meitä!'
        start_time: '2026-04-12T07:00:42+03:00'
        end_time: '2026-04-12T07:51:35+03:00'
        description: |
          Voiko sinfonia olla hajamielinen? Tai voiko sillä olla rooli näytelmässä? Jospeh Haydn on säveltänyt sinfonian, jonka tuoksinnassa äiti määrää tytärtä, herra ei muista häitään, ja kaikki on sekaisin. Miten asia ratkaistaan musiikissa?

          Eva Tigerstedt avaa polkuja musiikkiin.

          Ohjelman musiikki:

          Joseph Haydn: Sinfonia no 60 C-duuri "Il Distratto" 
          1. Adagio - Allegro di molto
          2. Andante
          3. Menuetti - Trio
          4. Presto
          5. Adagio - Allgero
          6. Finale3 - Prestissimo
          (Il Giardino Armonico/Giovanni Antonini).
