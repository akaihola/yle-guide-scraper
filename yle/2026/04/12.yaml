      - title: Narrin aamulaulu - Piironkiin piilotettuja sävellyksiä
        start_time: '2026-04-12T08:05:35+03:00'
        end_time: '2026-04-12T08:59:00+03:00'
        description: |-
          Sekä Richard Straussin viimeinen laulu että Béla Bartókin ensimmäinen viulukonsertto pysyivät vuosikymmeniä musiikkimaailmalta pimennossa. Taiteilijat, joille teokset oli omistettu, jemmasivat aarteet visusti. Historiaa ihmettelee Outi Paananen. 
          (uusinta vuodelta 2022).
