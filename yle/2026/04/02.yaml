      - title: 'Kulttuuriykkönen: Eero Nelimarkka näki taiteen tehtävän – ei vain estetiikkana, vaan hengellisenä kokemuksena'
        start_time: '2026-04-02T15:00:00+03:00'
        end_time: '2026-04-02T15:55:00+03:00'
        description: |-
          Miksi Eero Nelimarkan teokset puhuttelevat yhä, vuosikymmeniä hänen kuolemansa jälkeen? Syvennymme Eero Nelimarkan (1891–1977) monikerroksiseen maailmaan – mieheen, joka oli yhtä aikaa maalaiskylän poika, sokerileipuri, kansainvälinen taidemaalari ja syvällinen hengellinen etsijä. 

          Nelimarkka ei tyytynyt pintaan. Hänen maalauksensa eivät ole vain kuvia maisemista tai kyläläisistä – ne ovat ikkunoita johonkin syvällisempään. Nelimarkka inspiroitui ruotsalaisesta kuvataiteilijasta, Carl Larssonista ja hänen taiteessaan on varhaisen impressionismin piirteitä.

          Nuorena miehenä hän valloitti Pariisin taidemaailman, mutta palasi Suomeen, jossa hän loi pääosan elämäntyöstään. Miksi? Vastaus löytyy ehkä siitä, miten Nelimarkka näki taiteen tehtävän – ei vain estetiikkana, vaan hengellisen kokemuksen välineenä.

          Keskustelemme vieraiden kanssa Nelimarkan elämästä kolmesta kulmasta: ihminen, joka etsi paikkaansa maailmassa; taiteilija, joka mursi akateemisia normeja; ja hengellinen kulkija, jolle luonto oli pyhä tila ja maalaaminen rukous. Lapsuudesta saakka muotoutunut ja koko elämää leimannut uskonnollinen elämänkatsomus heijastuu maalauksiin kuvauksina työntäyteisestä arjesta ja vakavasta elämään tyytymisestä.   

          Ihminen sisätilassa oli Nelimarkalle  läheinen aihe, kuten tanskalaiselle taidemaalari Vilhelm Hammershøillekin. Maalauksen henkilöt ovat etäännytettyjä, selin katsojaan kuin omissa maailmoissaan. Huoneet muuttuvat teoksissa mielenmaisemiksi, joissa ikkunat ja ovet avautuvat arkikokemusten ulkopuoliseen maailmaan. 

          Ohjelman vieraina ovat kuraattori Riitta Ojanperä, Nelimarkasta kirjoittanut Ateneumin intendentti Marja Lahelma ja filosofian tohtori Ringa Takanen.

          Ohjelman juontaa Pia-Maria Lehtola.



          Rentoa puhetta, kiinnostavimmat vieraat ja kulttuurin ajankohtaisaiheet debatoitavina. Suorana maanantaista perjantaihin.
