      - title: 'Jazzklubin viikon keikka: Silent Music – UMO Helsinki Jazz Orchestra & Anni Elif & Joris Roelofs'
        start_time: '2026-04-02T22:03:00+03:00'
        end_time: '2026-04-02T23:22:00+03:00'
        description: |-
          UMOn perinteisen pääsiäisviikon konsertin solisteina kuullaan useita sävyjä hallitsevaa laulaja-sellisti Anni Elifiä, sekä Friedrich Nietzschen filosofiasta inspiroitunutta säveltäjä-bassoklarinetisti Joris Roelofsia. Ohjelmistossa on sävellyksiä molemmilta solisteilta.

          Kapellimestarina Ed Partyka.
          Äänitetty Musiikkitalon Paavo-salissa 17.4.2025.
      - title: 'Viihdekuunnelma: Kauhua ja kihlauksia'
        start_time: '2026-04-02T23:23:00+03:00'
        end_time: '2026-04-02T23:40:00+03:00'
        description: |-
          Wiltshiren pienessä kylässä asuva nuori Catherine Morland rakastaa lukea kirjoja, etenkin jännittäviä ja romanttisia teoksia. Catherine saa yllättäen kutsun lähteä ystäväpariskunta Allenien kanssa Bathin kylpyläkaupunkiin. Matka on hänen elämänsä ensimmäinen eli suuri mahdollisuus seikkailuun. Säihkyvät tanssiaiset ja uudet tuttavuudet odottavat!

          Kirja - Markku Haussila
          Catherine Morland - Anna Airola
          Rouva Morland, Catherinen äiti - Minna Suuronen
          Herra Morland, Catherinen isä - Robin Svartström
          Rouva Allen - Minna Koskela
