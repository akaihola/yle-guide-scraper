        description: |
          Nykyään kehoitetaan ihmisiä olemaan itselleen armollisia. Saksofonisti Jukka Perko näkee asian toisin päin. ”Minusta on tärkeämpää olla armollinen toisille ja yrittää ymmärtää ja kuunnella muita, vaikka heillä olisi erilainen arvomaailma”, Perko toteaa.
