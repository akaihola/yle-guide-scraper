      - title: 'Politiikkaradio: Syrjäyttääkö Péter Magyar Viktor Orbánin?'
        start_time: '2026-04-08T13:00:00+03:00'
        end_time: '2026-04-08T13:30:00+03:00'
        description: |
          Unkarissa valmistaudutaan propagandan värittämiin parlamenttivaaleihin oppositiopuolue Tiszan johtaessa vaaliviikolla mielipidemittauksia. Päättyykö Unkaria 16 vuotta johtaneen pääministeri Viktor Orbánin itsevaltainen kausi sunnuntain vaaleissa? Pääseekö EU eroon suurimmasta vastarannan kiiskestään? Menettääkö Venäjä ykkösliittolaisensa Euroopassa? Miksi Yhdysvaltain varapresidentti J. D. Vance sekaantuu Unkarin vaaleihin tukemalla Orbania vaaliviikon vierailullaan? Unkarin parlamenttivaaleja analysoivat yliopistonlehtori Heino Nyyssönen Turun yliopistosta, vanhempi yliopistonlehtori Katalin Miklóssy Helsingin yliopistosta ja tutkijatohtori Annastiina Kallius Helsingin yliopistosta. Toimittajana on Tapio Pajunen.
      - title: 'Radio 1:n iltapäivä: Sekunnit-sarjan tähti Leena Pöysti rakastaa lukemista'
        start_time: '2026-04-08T13:30:00+03:00'
        end_time: '2026-04-08T15:00:00+03:00'
        description: |-
          Juontajana Jarmo Laitaneva.
           
          Areenassa starttaa 16.4. Sekunnit-draamasarjan kakkoskausi. Onnettomuustutkintakeskuksen työstä kertovaa jännityssarjaa tähdittää näyttelijä Leena Pöysti. Monessa kotimaisessa tv-sarjassa mukana oleva Pöysti pitää näyttelemisen ryhmätyöluonteesta. Kirjojen lukemista rakastava näyttelijä on myös yksi Suomen tunnetuimmista äänikirjojen lukijoista. Leena Pöysti on studiovieraana n. klo 14.

          N. klo 14:30 Kirjailija Harry Salmenniemen intohimona on japanilainen kirjallisuus. Hän nostaa esiin muun muassa Yasunari Kawabatan Lumen maa teoksen sekä kirjailija Osamu Dazain. Salmenniemi on lukenut samoja teoksia useaan kertaan. Kirjojen lukukokemus muuttuu sen mukaan minkä ikäisenä teoksen on lukenut. Toimittaja Satu Kivelä. Ensilähetys oli 20.11.2025.
      - title: Kulttuuriykkönen
        start_time: '2026-04-08T15:00:00+03:00'
        end_time: '2026-04-08T15:55:00+03:00'
        description: |
          Kulttuuriykkösessä tehdään syväsukellus romanikulttuurin nykytilaan. Miten romanikulttuuri voi Suomessa ja millaisia uusi muotoja se saa?

          Romanien kohtaama syrjintä vaikuttaa romanikulttuurin asemaan ympäri Eurooppaa. Suomessa romanien asema on parempi kuin suurimmassa osassa muista Euroopan maista. Mistä se johtuu? Miltä romanikulttuurin uudet muodot ja siihen kitkeytyvät identiteetit vaikuttavat Suomen perspektiivistä?

          Vieraina ovat muusikko Dimitri Grönfors, muusikko ja toimittaja Mertsi Lindgren, sosionomi Ramona Schwartz, sekä ihmisoikeusvaikuttaja ja Romano missio -järjestön entinen toiminnanjohtaja Mertsi Ärling. 
          Juontajana on Pietari Kylmälä.
