      - title: 'Havaintoja muutoksesta: Koulutus avaa mahdollisuuksia'
        start_time: '2026-04-08T10:00:00+03:00'
        end_time: '2026-04-08T10:50:00+03:00'
        description: |
          Romaninaisten toimijuus on kasvanut parinkymmenen vuoden aikana. Se näkyy niin  kouluttautumisessa kuin järjestötoiminnassa. Rasismin ja syrjinnän vuoksi joidenkin romaninuorten koulutie katkeaa. Esimerkiksi ilman opintoihin kuuluvan työharjoittelun suorittamista ei voi valmistua. Miten romanien toimijuutta yhteiskunnassa voidaan vahvistaa?
          Satu Kivelän vieraana sosionomi Satu Florin ja romanipolitiikan erityisasiantuntijana sosiaali- ja terveysministeriössä työskentelevä Janette Grönfors.
