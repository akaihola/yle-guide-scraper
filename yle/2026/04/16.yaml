      - title: 'Radio 1:n iltapäivä: Anna Kortelainen Olavi Paavolaisesta: "Eräänlainen peritty aarre"'
        start_time: '2026-04-16T13:30:00+03:00'
        end_time: '2026-04-16T15:00:00+03:00'
        description: |+
          Radio 1:n iltapäivässä juontajana Miia Lahti.
          Studiossa vieraana n. klo 14 filosofian tohtori, vapaa tutkija, taidehistorioitsija ja tietokirjailija Anna Kortelainen, joka on käsikirjoittanut Musiikkiteatteri Kapsäkin lavalle esityksen Ilta Rivieralla Olavi Paavolaisen kanssa.Tällä kertaa Kortelainen on myös lavalla, kertojana. Paavolaisen olemus on aina kuulunut Anna Kortelaisen maailmaan aina. Kortelainen itse kertoo: “Eräänlainen peritty aarre, loistelias sekä hahmona että kirjailijana.”
           Kortelainen kertoo rakastavansa omaa työtään kirjailijana ja taidehistorioitsijana ja että on etuoikeus tehdä työtä, jota rakastaa.

      - title: 'Kulttuuriykkönen: The Boys ja poliittinen genreviihde'
        start_time: '2026-04-16T15:00:00+03:00'
        end_time: '2026-04-16T15:55:00+03:00'
        description: |
          Supersankarisarja The Boys on räävitön ja yliampuva. Silti se tuntuu tekevän osuvaa satiiria amerikkalaisen politiikan nykytodellisuudesta.
          Suositun The Boysin viimeinen kausi on juuri alkanut. Toisinajattelijat suljetaan leireille ja ihmisiä pidätetään sen perusteella, mitä he ovat jakaneet somessa. Valtaa pitää megalomaalinen, narsistisen harhainen versio Supermanista. 
          Sarja on kausi kaudelta muuttunut yhä selkeämmin kuvaukseksi Donald Trumpista ja tämän Amerikasta. 

          Mitä tämä laadukas sekä törkeä sarja onnistuu kertomaan politiikasta, mediasta ja vallasta?

          Samaan aikaan juuri käynnissä oleva Marvelin Daredevil: Born Again -sarja käsittelee poliittista korruptiota ja ICE:n tapaisten iskujoukkojen väkivaltaa. 
          Pari vuotta sitten Tähtien sota -sarja Andor kuvasi fasistisen diktatuurin nousua täsmällisen hyvin.

          Onko poliittinen todellisuus Yhdysvalloissa jo niin hurjaa, että sen kommentointi edellyttää supersankareita ja avaruustarinoita? Olisiko West Wingin kaltainen maltillinen poliittinen draama enää edes mahdollinen?

          Supersankarit ovat aina olleet jossain määrin poliittisia, selvimpänä esimerkkinä Kapteeni Amerikka. Minkälaista maailmankuvaa tarjoavat esimerkiksi Marvelin kymmeniä miljardeja tuottaneet supersankarielokuvat?
           
          Keskustelemassa ovat toimittaja-tietokirjailija Matti Rämö, tuottaja-podcastaaja Johannes “Xmies” Naumanen, populaarikulttuurin harrastaja Edina Putsela. Toimittajana on Jussi Ahlroth.
