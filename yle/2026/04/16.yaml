      - title: Tuuli Saksalan keidas
        start_time: '2026-04-16T17:35:00+03:00'
        end_time: '2026-04-16T18:25:00+03:00'
        description: |
          Kun kristinusko saapui, monet pakanalliset jumalat demonisoitiin. Suomessa balttilainen ukkosenjumala muuttui kirosanaksi. Muualla maailmassa - ja kansanmusiikissa kaikkialla - muinaiset jumalat ovat kuitenkin säilyneet elossa suojelijoina, inspiraation lähteinä ja kapinan symboleina.

          Tuuli Saksalan Keitaassa kuullaan artisteja, jotka ammentavat muinaisista jumalista ja rituaaleista.

          Australialainen The Three Seas yhdistää bengalilaista baul-mystiikkaa ja dubia. Tšekkiläinen Tomáš Kočko & ORCHESTR omistaa albuminsa slaavilaiselle ukkosenjumala Perunille ja muinaiselle sadetanssille - samalle jumalalle, josta suomen kielen "perkele" on peräisin. Malilaisessa Tinariwenin musiikissa kuuluu tuaregien näkymätön suojelija Kel Essuf, tyhjyyden väki.

          Walesilainen harpisti Catrin Finch kirjoittaa kirjeen nuorelle itselleen ja kutsuu avuksi walesilaisen kohtalon jumalattaren Arianrhodin. Italialainen Maria Mazzotta tanssii 6000 vuotta vanhan kalliomaalauksen, Tanssivan jumalan, suojissa.

          Lopuksi ukrainalainen Daughters of Donbas kutsuu kaikki jumalat ja suojelijat koolle - heillä on työtä.
