      - title: 'Radio 1:n iltapäivä: vieraana on ohjaaja, koreografi, tanssija ja näyttelijä Samuli Nordberg'
        start_time: '2026-04-14T13:30:00+03:00'
        end_time: '2026-04-14T15:00:00+03:00'
        description: |-
          Juontajana Miia Lahti.
          N. klo 14 studioon tulee vieraaksi koreografi, tanssija, ohjaaja ja näyttelijä Samuli Nordberg, joka toimii parhaillaan myös teatterityön lehtorina Tampereen yliopistossa. Nordberg on toisena ohjaajana tansssiteattteri Tsuumin esityksessä Trust. Teosta kuvataan nopeatempoiseksi esitykseksi, jossa viiden esiintyjän ja muusikon liike sekä puhe ja musiikki liittyvät näyttämöllä yhteiseksi teokseksi. Trustin toista esityskierrosta tulee katsomaan mm 1300 kahdeksasluokkalaista taidetestaajaa. Mitä Norderg ajattelee nuorista kulttuurin kuluttajina?
      - title: 'Kulttuuriykkönen: Tehran TV-sarja ja Iranin todellisuus – missä kulkee faktan ja fiktion raja?'
        start_time: '2026-04-14T15:00:00+03:00'
        end_time: '2026-04-14T15:55:00+03:00'
        description: |-
          Mossadin agentti. Iranin vallankumouskaarti. Ydinohjelma. Salamurhat.

          Israelilainen Tehran-sarja kertoo tarinan, joka tuntuu liian todelliselta ollakseen fiktiota. Ja ehkä se onkin. Samaan aikaan Yhdysvallat ja Israel ovat käyneet sotaa Irania vastaan –  paljon pidempään kuin kukaan uskoi.

          Kulttuuriykkösessä sukelletaan sarjan ja todellisuuden rajapintaan: Miten Mossad toimii? Millainen sortokoneisto Iranissa vallitsee? Miltä tuntuu olla iranilaistaustainen Suomessa, kun Iranin hallinto vakoilee ja uhkailee? Ja miksi Trump laskelmoi niin pieleen?

          Vieraina Ulkopoliittisen instituutin vieraileva johtava asiantuntija Olli Ruohomäki, palkittu ohjaaja ja käsikirjoittaja Hamy Ramezan ja kriitikko Timo Peltonen.

          Ohjelman juontaa NIcklas Wancke.
