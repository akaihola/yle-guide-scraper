        description: |
          Kun Sorjonen pureutuu Waltterin kuntoutuskeskuksen tapahtumiin ja rakentaa "muistipalatsiaan", tutkinta saa uuden suunnan ja menneisyyden salaisuuksien vyyhti alkaa avautua. Samaan aikaan kaappaajan vanki on hengenvaarassa ja tutkijaryhmä kohtaa yllättävän käänteen.

