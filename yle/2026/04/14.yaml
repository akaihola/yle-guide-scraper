      - title: 'Romano mirits: RRT-palvelu tukee romaanitaustaisia vankeja kohti uutta alkua'
        start_time: '2026-04-14T20:00:00+03:00'
        end_time: '2026-04-14T20:15:00+03:00'
        description: |
          Romano Missiolla toimiva RRT-palvelu tarjoaa kulttuurilähtöistä tukea rikos- ja päihdetaustaisille romaanimiehille ja -naisille. Kokonaisuuteen kuuluvat Voittomies-työ, Naisten Kulma sekä vankilatyö rikosseuraamuslaitoksen kanssa.

          Palvelupäällikkö Jani Lindroos korostaa romanitaustaisten työntekijöiden merkitystä:
          luottamus ja kohtaaminen syntyvät eri tavalla, kun kulttuuriosaaminen on läsnä. Työssä
          kohdataan suuria haasteita, kuten päihteiden vaikutus ja ylisukupolviset ongelmat, mutta
          tarvelähtöinen työote ja aito halu auttaa ohjaavat kaikkea toimintaa.

          RRT-palvelu on tärkeä tuki erityisesti nivelvaiheessa, kun vangit palaavat siviiliin ja
          suuntaavat kohti uusia mahdollisuuksia. Toimittajana Dimitri Grönfors. 
      - title: 'Maailman tärkein pieni asia: viherpeukalo Laura Kauppinen'
        start_time: '2026-04-14T20:15:00+03:00'
        end_time: '2026-04-14T20:35:00+03:00'
        description: |-
          Riihimäkeläisen Laura Kauppisen kotona vihervuosi on päässyt tutusti alkuun, kun ikkunoilla on kasvamassa vaikka minkälaisia taimenalkuja. Kasvihuoneet ovat vielä talviteloilla, mutta niillekin on selvät suunnitelmat. 

          Laura Kauppinen on varsinainen viherpeukalo, jolle puutarhan vaaliminen ja sadon kasvattaminen ovat suurta iloa tuova elämäntapa. On tämä ehkä vähän lähtenyt lapasesta, hän sanoo. Keväiset siementilaukset ovat jopa itsehillinnän testi, kun kaikkea ihanaa tekisi mieli.
      - title: Maailmanpolitiikan arkipäivää
        start_time: '2026-04-14T20:35:00+03:00'
        end_time: '2026-04-14T21:00:00+03:00'
        description: |-
          Sananvapauden mallimaana pidetty Yhdysvallat on vajonnut lehdistönvapaustilastossa
          kauas kärjestä. Nykyhallinto suitsii mediaa ja sananvapauden tila kaventuu.
          - Demokratia toimii vain, jos meillä on yhteisesti hyväksytyt faktat.
          Näin sanoo brittiläisen The Guardian -lehden entinen päätoimittaja Alan Rusbridger.
          Hän pitää uutisia yleisenä hyödykkeenä samalla tavoin kuin majakka on meriliikenteelle.
          Luotettava tieto pitää yhteiskunnat pinnalla.
          Yhdysvalloissa teknomiljardöörit ja mediamogulit hakeutuvat läheiseen suhteeseen
          presidentti Donald Trumpin kanssa. Vapaa sana on polvillaan itsevaltiaan edessä.
          Maailmanpolitiikan arkipäivää -ohjelman demokratiasarjan neljäs osa pohtii sananvapauden
          ja demokratian suhdetta.
          Ohjelman toimittaa Sampo Vaarakallio. Äänitarkkailija on Katja Kostiainen. Tunnusmusiikki:
          Petri Alanko, kuva: Tuuli Laukkanen/Yle.
