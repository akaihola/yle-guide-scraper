      - title: 'Kaisa Pulakan aikamatkat: Mummuni näki unessa veljensä kuoleman - unimatkoja'
        start_time: '2026-04-14T12:05:00+03:00'
        end_time: '2026-04-14T12:25:00+03:00'
        description: |+
          Unet tekevät säröjä järkiperäiseen todellisuuteen. Kaisa Pulakan isoäiti näki unessa sukulaistensa kuoleman ja merkittävät poliittiset tapahtumat. 1960-luvulla suomalaiset ratkoivat kollektiivisissa unissaan Kyllikki Saaren murhaa. Miksi unet tuntuvat sisältävän outoja viestejä jostain todellisuuden tuolta puolen? Käsikirjoitus ja äänisuunnittelu: Kaisa Pulakka. Lukija: Pietari Kylmälä. Tunnusmusiikki: Joonatan Kotila. Tuottaja: Pertti Ylikojola.

