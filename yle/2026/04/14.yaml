        description: |+
          J.S. Bach (sov. Brueggen): Preludio partitasta sooloviululle n:o 3 (Bolette Roed, nokkahuilu). 

          Kraus: Aamuhetket karkottavat tähdet näyt. Amphitryon (L' Arte del mondo/Werner Ehrhardt).

          Beethoven: Menuetti Es-duuri (Timo Korhonen, kitara).

          Balakirev: Puutarhassa (Alexander Paley, piano).

          G. Boulanger: Sinulle (Vasile Pantir, viulu, ja Janne Mertanen, piano).

          Eller: Romanss teoks. Viis pala keelpilliorkestrile (Viisi kappaletta jousiorkesterille) (Tallinnan kamariork./Tönu Kaljuste).

          Schubert: Am Bach im Frühling (Keväällä puron rannalla) (Matthias Goerne, baritoni, ja Helmut Deutsch, piano).

          Fauré: Sicilienne (Emmanuel Pahud, huilu, ja Mariko Anraku, harppu).

          Presti: Danse gitane (Olivier Chassain, kitara, ja Stein-Erik Olsen, kitara).

          Bridge: Two old English songs (Kaksi vanhaa englantilaista laulua) (Keski-Pohjanmaan Kamariork./Sakari Oramo).

          Mana-Zucca: Wistaria (Nanette Kaplan Solomon, piano).

