      - title: 'Konsertteja: Avantin Suvisoitto – The Cold Trip'
        start_time: '2026-06-26T20:25:00+03:00'
        end_time: '2026-06-26T21:30:00+03:00'
        description: |-
          Avantin Suvisoiton konsertin molemmat teokset pohjaavat länsimaisen taidemusiikin ikonisten säveltäjien – Franz Schubertin ja Johannes Brahmsin – musiikkiin, mutta siten, että pinnalla niitä eteenpäin kuljettavana voimana ovat vahvat vaikutteet oman aikamme pop-, rock-, ja jazz-musiikeista.

          Bernhard Langin Kylmä matka on Schubertin Winterreisen metateos sopranolle ja mikrotonaalisesti viritetylle kitarakvartetille. Saamme Porvooseen vieraaksi saksalaisen huippusopraanon Johanna Zimmerin, joka jo vuosinaan Neue Vocalsolisten Stuttgartin jäsenenä osoitti voivansa laulaa mitä vaan tuosta noin vaan. Zimmerin kanssa Suvisoitossa esiintyy maamme eturivin kitarataiteilijoista koostuva Kekkonen-kvartetti. 

          Eric Wubbelsin musiikki tulee eurooppalaisista säveltäjistä lähimmäksi kenties juuri Bernhard Langin estetiikkaa. Hänen duonsa viululle ja pianolle ”the children of fire come looking for the fire” on mahdollisesti vahvin tällä vuosisadalla kyseiselle kokoonpanolle kirjoitettu teos ja se muodostaa Langin teoksen kanssa erittäin kiinnostavan parin. 


          Suoran lähetyksen Porvoon Taidetehtaalta toimittaa Ainomaija Pennanen.

          Konserttiohjelma:
          Bernhard Lang: The Cold Trip Part I
          Johanna Zimmer ja Kekkonen-kvartetti

          Eric Wubbels: ”the children of fire come looking for the fire”
          Cecilia Zilliacus ja Emil Holmström

          Esiintyjät:

          Johanna Zimmer, sopraano
          Cecilia Zilliacus, viulu
          Emil Holmström, piano
          Kekkonen-kvartetti:
          Ismo Eskelinen
          Petri Kumela
          Jyrki Myllärinen
          Otto Tolonen

          Kuvassa sopraano Johanna Zimmer © Manu Theobald
