        description: |
          Juontajana Miia Lahti. N. klo 14 Huomaa aina harlekiinit! on  Vladimir Nabokovin viimeinen hänen elinaikanaan julkaistu romaani. Kääntäjä Heikki Karjalainen kertoo Kirjani tarinassa, millaista oli työskennellä romaanin parissa joka on tunnettu vaikeatajuisuudestaan. Toimittaja on Jakke Holvas. N. klo 14:30 Viisitoistavuotiaana nähty horror komedia -show teki vaikutuksen ja sai toimittaja, stand up -koomikko Jukka Lindströmin kiinnostumaan huumorista ja komediasta. Toimittajana on Jari Aula. (Uusinta 5.6.25.)
