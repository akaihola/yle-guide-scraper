      - title: 'Havaintoja muutoksesta: Ystävämme pölyttäjät'
        start_time: '2026-06-10T10:00:00+03:00'
        end_time: '2026-06-10T10:50:00+03:00'
        description: |
          Luonnon ekosysteemien toimivuus on täysin riippuvaista pölyttäjien työstä. Maailman ravintokasveista yli 75 prosenttia on hyönteispölytteisiä.  
          Millainen on suhteemme pölyttäjiin? Miten pörriäisiä voi auttaa? Miten tarhamehiläinen eroaa villeistä lajitovereistaan?
          Toimittaja Satu Kivelä etsii vastauksia yhdessä Luonnonvarakeskuksen tutkija Lotta Kaila ja mehiläistarhaaja Sanna Kängsepin kanssa. 
