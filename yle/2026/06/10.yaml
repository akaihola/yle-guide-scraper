      - title: 'Kotimainen konsertti: Hietsu is Happening! '
        start_time: '2026-06-10T19:02:00+03:00'
        end_time: '2026-06-10T21:12:00+03:00'
        description: |-
          Hietsu is Happening! ylpeänä esittää:

          Minna Canth: Spiritistinen istunto — ilveily kahdessa näytöksessä (holistinen konstruktio)

          Pyörtyykö hienosäärinen herra Orell? Mitä henget oikein yrittävät kertoa? Eivät kai vehnäset pala uuniin?! Miten spirituaalinen jazz tai kambodžalainen klassinen musiikki liittyy tähän kaikkeen? 

          Näihin ajankohtaisiin ja polttaviin kysymyksiin pureudutaan Hietsun Paviljongissa keskiviikkona 10.6., kun valtionpalkittu Hietsu is Happening! -kollektiivi järjestää 10-vuotisjuhlansa kunniaksi tapahtuman, jossa Minna Canthin 1894 kirjoittamasta näytelmästä tehdään uudenlainen kokonaistaideteos. 
          Henkien lisäksi tapahtumasarjan perustaja- ja kuraattorikolmikko, basisti Antti Lötjönen, kitaristi Petri Kumela ja saksofonisti Mikko Innanen on tällä kertaa kutsunut rajan tältä puolelta mukaan mukaan pianisti ja harpisti Iro Haarlan, sellisti Kati Raitisen, rumpali Olavi Louhivuoren ja huilisti Malla Vivolinin sekä näyttelijät Sofia Smedsin, Vesa Vierikon ja Mikko Kauppilan. 

          Suoran lähetyksen Hietsun paviljongista toimittaa Ainomaija Pennanen. 
