      - title: 12 diktaattoria. Kuunkaltainen profeetta Saparmurat Nijazov
        start_time: '2026-06-10T12:05:00+03:00'
        end_time: '2026-06-10T12:50:00+03:00'
        description: |
          Keski-Aasiassa sijaitsevan Turkmenistanin presidentti Saparmurat Nijazov oli Aasian läpitunkevin itsevaltias. Hän johti Turkmeniaa, vanhan Neuvostoliiton raunioista syntynyttä itsenäistä valtiota sen presidenttinä vuodesta 1990 kuolemaansa saakka vuoteen 2006, jolloin kuolema keskeytti hänen elämäntyönsä eli rahan lapioimisen omille tileille. Toimittajana Raimo Tyykiluoto, vieraana Mikko Metsämäki. Kaikki sarjan jaksot ovat kuultavissa Yle Areenassa.
          (julkaistu v. 2018)
