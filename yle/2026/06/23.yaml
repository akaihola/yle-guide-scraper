      - title: 'Maarit Tastula - Yksi maailma, kaksi katsetta: Ville Ranta ja Rebekka Naatus'
        start_time: '2026-06-23T10:00:00+03:00'
        end_time: '2026-06-23T10:55:55+03:00'
        description: |-
          Lapsuus roikkuu meissä kiinni. Kun lestadiolaisperheen tytär Rebekka Naatus oli 11-vuotias, hän koki herätyksen oivaltaessaan, että jonain päivänä jokainen ihminen, myös hän itse, kuolee. Kun isä innosti samana kesänä pitkille juoksulenkeille, Rebekka huomasi, että juokseminen oli hyvä tapa paeta kuoleman ajatuksia. Samaan aikaan toisaalla tuleva sarjakuvapiirtäjä Ville Ranta luki Herman Hesseä ja uskoi, että elämällä oli häntä varten suuri tarkoitus.

          Rebekan ja Villen epätodennäköisessä rakkaustarinassa Ville ostaa vaimolleen vaatteet, koska Rebekkaa ei kiinnosta elämän kaunis turhuus. Masentunut Rebekka yrittää opetella terapiassa, miten puhua tunteista, joista jauhaminen on hänestä turhanpäiväistä, ja panee taas juoksukengät jalkaan. Koska eteenpäin on elävän mieli. Villellä on haave: vetäytyä erakoksi ja pyrkiä kohti yksinkertaista.

          Toimittaja Maarit Tastula
