      - title: 'Radio 1:n iltapäivä: Elokuvat, jotka halusimme nähdä - Täällä Pohjantähden alla'
        start_time: '2026-06-23T13:30:00+03:00'
        end_time: '2026-06-23T15:00:00+03:00'
        description: |-
          Juontajana Miia Lahti. N. klo 14 suomalaisten toive-elokuvien sarjassa Elokuvat, jotka halusimme nähdä on aiheena tänään varsinainen järkäle: Täällä Pohjantähden alla.  Elokuvasta ja sen tekemisestä kertoo Suomen Elokuvasäätiön Otto Suuronen, toimittaja on Jarmo Laitaneva. 
          N. 14:30 Parhaillaan Suomenlinnan kesäteatterissa Missä kuljimme kerran -näytelmää tähdittävä näyttelijä Miiko Toiviainen kertoo, millaiset kulttuurielämykset ovat jääneet hänen mieleensä. Toimittajana Sari Valto. (Ensilähetys olil 11.9.26.)
      - title: 'Kulttuuriykkönen: Steven Spielberg tuo taas avaruuden muukalaiset valkokankaalle'
        start_time: '2026-06-23T15:00:00+03:00'
        end_time: '2026-06-23T15:58:00+03:00'
        description: |
          Steven Spielbergin uusin elokuva on Disclosure Day. Se on kilpajuoksu, jossa yhdellä puolella ovat valtion agentit, jotka haluvat salata tiedon avaruuden muukalaisista ja toisella aktivistit, jotka yrittävät saada ufojen kosmisen viestin koko maailman kuultavaksi. 
          Vauhdikkaassa elokuvassa Spielberg palaa yhden pitkäkestoisimman aiheensa pariin - maapallon ulkopuolisen elämän ja ihmiskunnan kohtaamiseen.
          Miltä elokuva näyttää ja mitä se mahdollisesti kertoo ajastamme sekä Spielbergistä itsestään?
          Uusimman elokuvan lisäksi pohditaan jo 79-vuotiaan mestariohjaajan ainutlaatuista uraa, joka on kestänyt jo yli 50 vuotta. 
          Spielbergistä ja avaruusolioista ovat keskustelemassa elokuvatoimittaja Anna Möttölä, elokuvatoimittaja ja tietokirjailija Matti Rämö sekä elokuvaohjaaja Dome Karukoski. Jussi Ahlroth toimittaa. 
