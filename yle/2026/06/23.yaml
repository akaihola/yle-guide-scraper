      - title: 'Maailman tärkein pieni asia: Hanna Pakarinen'
        start_time: '2026-06-23T20:15:00+03:00'
        end_time: '2026-06-23T20:35:00+03:00'
        description: |-
          Laulaja Hanna Pakarinen saunoo mahdollisimman usein. Se tekee niin hyvää sekä sielulle että ruumiille, hän sanoo. Hän on saunomisessa mukana monin tavoin, sillä hänestä on viime vuosina tullut Suomen Saunaseuran aktiivi, joka edistää sen toimintaa mahdollisimman paljon. Hanna Pakarinen juttelee saunomisesta Suomen Saunaseuralla Helsingin Lauttasaaressa.

          .
