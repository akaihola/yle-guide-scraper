      - title: 'Klasariparatiisi: Hiljaisuuksia'
        start_time: '2026-06-23T11:00:00+03:00'
        end_time: '2026-06-23T11:57:00+03:00'
        description: |
          Hiljaisuus voi olla lempeä ja armollinen, tai ahdistava ja yksinäinen. Se voi myös olla julmaa vallankäyttöä. Aikamme meluisassa ympäristössä hiljaisuudesta voi tulla ylellisyyttä. Musiikissa hiljaisuudet ovat yhtä tärkeitä kuin äänet jotka niitä ympäröivät. Hiljaisuutta pohtivat tutkija Outi Ampuja ja utelias äänimatkailija Eva Tigerstedt. Ohjelma on uusinta vuodelta 2017.
