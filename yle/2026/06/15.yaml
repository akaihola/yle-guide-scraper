      - title: 'Elävä historia: Naimakauppaa, puukkoja ja kannutolkulla viinaa - suomalaisen hääperinteen hurjempi historia'
        start_time: '2026-06-15T12:05:00+03:00'
        end_time: '2026-06-15T12:48:00+03:00'
        description: |-
          Miksi avioliitto oli naimakauppa, miksi morsian teki appivanhemmilleen kuolinpaidat ja miksi häävuoteen alle piilotettiin kirves? 

          Haastateltavina folkloristi Roope Kotiniemi Suomalaisen Kirjallisuuden Seurasta sekä kriminologian ja yleisen oikeustieteen tohtori, yliopistonlehtori Miikka Vuorela Itä-Suomen Yliopistosta. Toimittajana Inkeri Alatalo. 
