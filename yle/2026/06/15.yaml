      - title: 'Asekauppiaat: Pahamaineinen Viktor Bout kuljetti kuolemaa ja ruoka-apua rahtikoneellaan'
        start_time: '2026-06-15T19:02:00+03:00'
        end_time: '2026-06-15T19:44:00+03:00'
        description: |
          Pimeän asekaupan tunnetuimmalle toimijalle Viktor Boutille Neuvostoliiton hajoaminen oli onnenpotku eli miljoonabisnes tarjottimella. Lähes vuosikymmenen ajan Bout kuljetti valtavilla rahtikoneillaan ja samoilla lennoilla niin rynnäkkökivääreitä kuin humanitaarista apua sekä myi aseita saman konfliktin eri osapuolille.

          Jakson asiantuntijoina: väitöskirjatutkija Mikko Räkköläinen Tampereen yliopistosta ja yliopistonlehtori Risto Marjomaa Helsingin yliopistosta. 
      - title: Mannerheimin agentti
        start_time: '2026-06-15T20:05:00+03:00'
        end_time: '2026-06-15T20:25:00+03:00'
        description: |
          Jakso 3/10: Erikoistehtävä.
          Tahvanainen nousee erehdyksessä junaan, joka on täynnä loikkareiksi värvättyjä metsätyömiehiä matkalla Neuvostoliittoon. Miten Tahvanainen onnistuu pakenemaan tilanteesta ja saa lopuksi erikoistehtävän?

          Jakson asiantuntija on Erkki Hautamäki, joka on tutkinut Vilho Tahvanaisen arvoitusta vuosikymmenien ajan.
      - title: 'Lehmitytöt 1944 J9: Uusi elämä alkaa'
        start_time: '2026-06-15T20:25:00+03:00'
        end_time: '2026-06-15T20:52:00+03:00'
        description: |
          Maassa on rauha ja lehmät ovat turvassa, mutta lehmiä ajaneet tytöt saavat kiitoksensa hitaasti. Henkiinjääneillä ei ole varaa valittaa kohtaloaan. Lehmitytöt sopeutuvat elämään uusilla kotiseuduilla ja löytävät vähitellen paikkansa maailmassa.  Elämä olisi muodostunut hyvin erilaiseksi ilman sotaa. Tapahtumista on yli 80 vuotta, mutta Lahja, Annikki, Eila ja Maija  eivät unohda kesää 1944. 
