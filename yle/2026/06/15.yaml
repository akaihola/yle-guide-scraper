      - title: 'Lehmitytöt 1944 J9: Uusi elämä alkaa'
        start_time: '2026-06-15T20:25:00+03:00'
        end_time: '2026-06-15T21:00:00+03:00'
        description: |
          Maassa on rauha ja lehmät ovat turvassa, mutta lehmiä ajaneet tytöt saavat kiitoksensa hitaasti. Henkiinjääneillä ei ole varaa valittaa kohtaloaan. Lehmitytöt sopeutuvat elämään uusilla kotiseuduilla ja löytävät vähitellen paikkansa maailmassa.  Elämä olisi muodostunut hyvin erilaiseksi ilman sotaa. Tapahtumista on yli 80 vuotta, mutta Lahja, Annikki, Eila ja Maija  eivät unohda kesää 1944. 
