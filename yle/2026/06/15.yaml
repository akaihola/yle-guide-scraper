      - title: 'Radio 1:n iltapäivä: Maanantaimuseo - Tehdas- ja alkoholimuseo Rajamäen Ryyppi'
        start_time: '2026-06-15T13:30:00+03:00'
        end_time: '2026-06-15T15:00:00+03:00'
        description: |+
          Maanantaisin museoiden ovet ovat usein yleisöltä säpissä, siksi me vierailemme tästä lähtien museoissa juuri maanantaisin. Ensimmäisen Maanantaimuseo-ohjelman kohde on Tehdas- ja alkoholimuseo Rajamäen Ryyppi. Toimittaja Marko Miettinen tapaa vastaavan oppaan Petri Lehtosen. Juontajana iltapäivässä on Joni Timonen.

