          Kotimaiseen musiikkiin kannattaa luottaa, kun haetaan kesäfiilistä maalla. Katsomme hiljaista kylätietä ja ruuhkaa kesätorin parkkipaikalla, käymme saunassa vihtomassa, ihailemme poutapilviä ja kesäiltaa laiturin päässä, ja perhoset tanssivat kun farkut vaihtuvat verkkarihousuun. Tähän kesään ehdimme mukaan! Toimittajana Mika Kauhanen.
