      - title: 12 diktaattoria. Opettaja Robert Mugabe
        start_time: '2026-06-03T12:05:00+03:00'
        end_time: '2026-06-03T12:48:00+03:00'
        description: |
          Robert Mugabe aloitti uransa vapaustaistelijana ja Afrikan sankarina, mutta tämä WHO:n
          hyväntahdonlähettilääksikin hetkeksi nimetty opettaja turmeltui yhdeksi aikamme pahimmista tyranneista ja johti kansakuntansa tuhoon. Mugaben aikakaudella Zimbabwe koki henkisen ja taloudellisen romahduksen. Toimittajana Raimo Tyykiluoto, vieraana tietokirjailija Hannu Pesonen. Kaikki sarjan jaksot ovat kuultavissa Yle Areenassa.
          (julkaistu v. 2018)
      - title: 'Politiikkaradio: Onko tukipolitiikka syy maatalouden päästöihin?'
        start_time: '2026-06-03T13:00:00+03:00'
        end_time: '2026-06-03T13:30:00+03:00'
        description: |
          Valtaosa vuosittaisista maataloustuista on ympäristön kannalta joko haitallisia, tai päästöjen vähentämisen kannalta tehottomia, väittää uunituore Kalevi Sorsa -säätiön raportti. Onko tukipolitiikka ydinsyy 30 vuotta kasvaneisiin maatalouden päästöihin? Maataloustukien ympäristövaikutuksista keskustelevat maataloustukiraportin kirjoittaja Antti Ronkainen, MTK:n toiminnanjohtaja Jyrki Wallin, neuvotteleva virkamies Heini Lehtosalo maa- ja metsätalousministeriöstä sekä ekonomisti Päivi Kujala Pellervon taloustutkimuksesta. Toimittajana on Tapio Pajunen.
