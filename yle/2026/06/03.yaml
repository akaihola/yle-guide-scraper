        description: |
          Kansainvälinen säveltäjärostrum eli nykytaidemusiikin euroviisut pidettiin pari viikkoa sitten Riiassa, Latviassa, joten nyt on Rostrum-illan vuoro!

          Säveltäjä Lauri Supponen ja toimittaja Ainomaija Pennanen kuuntelevat ja kommentoivat säveltäjärostrumin valittuja ja suositeltuja teoksia. 

          Suora lähetys Pasilasta.  
