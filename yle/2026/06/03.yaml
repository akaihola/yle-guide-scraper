      - title: 'Havaintoja muutoksesta: Hyvän elämän moninaiset paikat'
        start_time: '2026-06-03T10:00:00+03:00'
        end_time: '2026-06-03T10:50:00+03:00'
        description: |
          Monella on omakohtaisia tai perheen ja suvun kautta juuria maaseudulle. Suomessa on yli 500 000 mökkiä, joista osaa käytetään ympäri vuoden. Lähes miljoona kaupunkilaista haaveilee maalle muuttamisesta. Tätä kehystä vasten tuntuu aika kummalliselta, että tässä ajassa julkisissa puheenvuoroissa korostuu vastakkainasettelu maaseudun ja kaupungin välillä ja joskus myös vuorovaikutustilanteissa ihmisten kesken. Mitä vastakkainasettelusta seuraa? Millaisia tulevaisuuksia on mahdollista kuvitella?
          Toimittaja Satu Kivelä etsii vastauksia kysymyksiin yhdessä Siirtolaisuusinstituutin vastaavan tutkijan Tomas Hanell ja Helsingin yliopiston Ruralia-instituutin tutkijatohtorin Annamari Kiviahon kanssa.
