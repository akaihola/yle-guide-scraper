      - title: 'Elävä historia: Miten avoimesti lesbosta taiteilijaparista tuli sota-Suomen keulakuva?'
        start_time: '2026-06-28T12:05:00+03:00'
        end_time: '2026-06-28T12:55:00+03:00'
        description: |-
          Konsertteja fasismin varjossa ja huippudiplomaattivierailuja kesämökillä. Lähes avoimesti elänyt superkuuluisa lesbopari pääsi vallanpitäjien sisäpiireihin ja toimi Suomen kulttuurilähettiläinä aikana, jolloin fasismi nousi ja homoseksuaalisuus oli rikos. Kuolemansa jälkeen heidät unohdettiin nopeasti. Olivatko Kerttu Wanne ja Astrid kansallismielisiä, vai oliko nationalismin myötäily seksuaalivähemmistönä ennemminkin selviytymistaktiikka? Toimittajana Noora Hirn.
      - title: 'Välilevyjä retkellä: Erilaiset vedet'
        start_time: '2026-06-28T13:00:00+03:00'
        end_time: '2026-06-28T13:57:00+03:00'
        description: |-
          Taidemusiikin tarinoita kertoo ja purkaa Kare Eskola. Kesän ensimmäiset kolme ohjelmaa ovat uusintoja Välilevyjen aiemmilta retkiltä. Tässä jaksossa toimittaja Kare Eskola ja säveltäjä Olli Virtaperko melovat eteläsavolaista vesireittiä, jonka aika on muuttanut kulkuväylästä ja työmaasta viihdekeskukseksi.
