      - title: 'Maisteri Lindgrenin musiikkiesitelmä: Seikkailija Lilly Kajanus-Blenner - Suomen ensimmäinen harpputaiteilija'
        start_time: '2026-06-28T08:05:35+03:00'
        end_time: '2026-06-28T08:59:00+03:00'
        description: |
          "Suurin mysteeri on tietysti se, kuinka Ariel sai alkunsa 1913. Lilly asui silloin Pietarissa pienessä yksiössä, jossa oli kolmijalkainen sänky, pieni pöytä ja harppu, antoi soittotunteja ja konsertoi. Kesätöitä hän hankki erilaisten jännittävien paikkojen orkestereista. Ensimmäinen kiinnitys vei hänet Kaspianmeren rannalle Bakuun, toinen Mustanmeren rannalle Jaltalle." - Minna Lindgren esitelmöi. Ohjelma on uusinta kesältä 2024.
