        description: |-
          Weber: Alkusoitto ja marssi näyt. Turandot, Kiinan prinsessa (Uuden-Seelannin SO/Antoni Wit).

          Grainger: Air et finale sur des danses norvegiennes (Air ja Finaali norjalaisista tansseista) sarj. La Scandinavie (Andreas Brantelid, sello, ja Christian Ihle Hadland, piano).

          Beach: Three Shakespeare songs (Emma Kirkby, sopraano, ja James Lisney, piano).

          Ginastera: Impresiones de la puna (Tunnelmakuvia ylänköarolta) (Sharon Bezaly, huilu, ja Australian kamariork./Richard Tognetti).

          Smyth: Scherzo teoks. Symphonic serenade D-duuri (BBC:n FO/Odaline de la Martinez).

          Schubert: Nachthelle (Yön kirkkaus) (Neill Archer, tenori, The King's Singers sekä Roger Vignoles, piano).

          Farrenc: Menuetti triosta Es-duuri op.44 (Romain Guyot, klarinetti, Francois Salque, sello, ja Brigitte Engerer, piano).

          Sibelius: Maalaisnäkymä sarj. viululle ja orkesterille op.117 (Jari Valo ja Keski-Pohjanmaan kamariork./Juha Kangas).

          Konsertin on toimittanut Riikka Holopainen.
