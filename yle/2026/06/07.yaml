          Tunnistetut roolisuoritukset:
          Kustaa - Vilho Siivola
          Mari - Tyyne Haarla
          Kertoja - Sasu Haapanen

          Lisäksi: 
          Rantalan vaari, Viinu, ajuri, ajurin vaimo, tohtori ja tohtorinna.

          Ensilähetys: 1949.
