      - title: 'Radio 1:n iltapäivä:  Mikä on kirjojen ulkoasun ja visuaalisen ilmeen vaikutus lukukokemukseen?'
        start_time: '2026-06-01T13:30:00+03:00'
        end_time: '2026-06-01T15:00:00+03:00'
        description: |+
          Juontajana Jarmo Laitaneva. Mikä on kirjojen ulkoasun ja visuaalisen ilmeen vaikutus lukukokemukseen? Fantasia-kirjallisuus on jo vuosia ollut nousussa. Onko kirjan kannella suurempi merkitys, jos kyseessä on  fantasia-kirja? N. klo 14 Jarmo Laitanevan studiovieraina ovat kuvittaja ja graafikko Kaisu Sandberg sekä kirjailija Ursula Mursu. WSOY:n kuvittajana työskentelevä Sandberg kerää harrastuksenaan kirjojen erikoispainoksia, Ursula Mursu puolestaan on erityisen innostunut Diana Wynne Jonesin fantasiakirjojen maailmaan

      - title: 'Kulttuuriykkönen: Sinäkin voit elää keskiaikaa'
        start_time: '2026-06-01T15:00:00+03:00'
        end_time: '2026-06-01T15:58:00+03:00'
        description: |
          Kesä tuo mukanaan keskiaikatapahtumia ja mahdollisuuksia keskiajan harrastamiseen. Keskiajan harrastaminen on historian elämistä omakohtaisesti. 1300-luvun vaatteissa ja sen ajan ruokaa syöden voi paitsi oppia historiaa, myös elää ja tuntea sitä. Kun mennään harrastamisen syvään päätyyn, tutkitulla tiedolla on tärkeä rooli ja monet harrastuksen myötä kehittyvät ajanmukaiset taidot syventävät kokemuksen imua. Kulttuuriykkösen keskustelussa keskiajan harrastajat Mervi Pasanen ja Jenni Lares, sekä kirkkohistorian professori Tuomas Heikkilä avaavat keskiajan lumoa. Toimittajana on Jonni Roos. 
