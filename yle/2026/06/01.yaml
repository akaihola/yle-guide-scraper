      - title: 'Keinuva talo - Mika Kauhanen: Valmis mutta aina kesken'
        start_time: '2026-06-01T17:35:00+03:00'
        end_time: '2026-06-01T18:35:00+03:00'
        description: |-
          Viikonloppuna pidettiin pitkin Suomea ylioppilasjuhlia ja valmistujaisia – elämän merkityksellisiä hetkiä. Valmistuneet ja heidän läheisensä olivat mielessä jakson sommitelmassa, joka samalla vie meidät kotimaisen lauletun folkin moninaisuuteen. 

          Löytyisikö listalta voimalauluja seuraaviin askeliin? Sellaisia kuin Pystyn mihin vaan, Älä pelkää tai Tuulet suotuisat. Kaikki valmistuminen on aina väliaikaista, mutta se on oikeastaan lohdullista. Toimittajana Mika Kauhanen.
