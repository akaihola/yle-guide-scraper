      - title: Mannerheimin agentti
        start_time: '2026-06-01T20:05:00+03:00'
        end_time: '2026-06-01T20:23:00+03:00'
        description: |
          Jakso 1/10: Särö suuremmassa kertomuksessa.

          Kuka oli vuonna 1971 Erikoistehtävä-kirjan julkaissut Vilho Tahvanainen? 

          Arto Koskinen kertoo, kuinka törmäsi Tahvanaisen tapaukseen yhdessä tuottaja Jan Wellmannin kanssa vuonna 1998. Mikä sai Koskisen penkomaan kiistanalaisen hahmon väitteitä? Minkälainen on ollut tutkijoiden suhtautuminen Tahvanaiseen? Jaksossa kuullaan myös Tahvanaisen itsensä kertomana tarina siitä, kuinka hänestä tuli Svinhufvudin ja Mannerheimin luottomies.
      - title: 'Lehmitytöt 1944 J7: Minäkö olen nyt evakko?'
        start_time: '2026-06-01T20:23:00+03:00'
        end_time: '2026-06-01T20:46:00+03:00'
        description: |-
          Loppukesällä jokaisessa Suomen kunnassa ratkotaan siirtoväen asioita. Miten tulijat asutetaan? Maija saapuu perille Paimioon ja huomaa saaneensa uuden identiteetin. Paikalliset supisevat, että evakkoja viedään kuin herroja pääovesta.  Myös Lahja pääsee junaan, ja saapuu perille Perniöön. Enää Annikki kulkee lehmälauman kanssa pitkin maanteitä jalan. Eilan ja Ville-vasikan tiet eroavat.
      - title: Politiikkaradio
        start_time: '2026-06-01T21:00:00+03:00'
        end_time: '2026-06-01T21:30:00+03:00'
      - title: 'Tiedeykkönen: Nuoret löysivät Jeesuksen! Uskonelämä uskontososiologian silmin'
        start_time: '2026-06-01T21:30:30+03:00'
        end_time: '2026-06-01T22:20:00+03:00'
        description: |
          Jo jonkin aikaa on puhuttu poikien ja nuorten miesten kasvavasta kiinnostuksesta kristinuskoa kohtaan. Nyt tutkimuksissa on alkanut näyttää siltä, että tyttöjen uskonnollisuus kasvaa Suomessa kovaa vauhtia.

          Jaksossa avataan sitä, mitä tutkimusten perusteella on tiedetty yksilön uskonelämästä Miten esimerkiksi yhteiskunnalliset kriisit, sukupuoli, perhetausta tai varallisuus vaikuttavat uskonnollisuuteen?

          Toimittaja: Juuso Pekkinen
          Haastateltava: Kati Tervo-Niemelä, Itä-Suomen yliopisto
          Äänisuunnittelija: Mikko Kymäläinen
