      - title: 'Elävä historia: Suomi sai Porkkalan takaisin 70 vuotta sitten – alueen kohtalo oli vaiettu puheenaihe'
        start_time: '2026-06-01T12:05:00+03:00'
        end_time: '2026-06-01T12:55:00+03:00'
        description: |-
          Suomi joutui jatkosodan jälkeen vuokraamaan Porkkalanniemen Neuvostoliitolle 50 vuodeksi. Miksi alue palautettiin etuajassa ja minkä vuoksi Porkkalan kohtalo oli meillä vaiettu puheenaihe vielä vuosikymmeniä palautuksen jälkeenkin? 
          Toimittaja: Anna-Kaisa Brenner, äänisuunnittelija: Mikko Kymäläinen, tuottaja: Jenni Stammeier
