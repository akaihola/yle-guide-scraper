      - title: 'Aristoteleen kantapää: Upupa epops ja Gorilla gorilla – eliöiden tieteelliset nimet pyrkivät olemaan kuvaavia'
        start_time: '2026-06-30T12:35:00+03:00'
        end_time: '2026-06-30T13:00:00+03:00'
        description: |
          Pasi Heikura syventyy eliölajien ihmeellisten nimien maailmaan oppaanaan Helsingin yliopiston kasvitieteen professori Jouko Rikkinen. Ohjelmassa nautitaan myös superluksukkaasta äänentoistosta ja selvitetään mitä tapahtuu, kun puolueen kuntohuippu osuu lankulle liian aikaisin. 
          Ohjelman ovat toimittaneet Pasi Heikura ja Tina Cavén.
      - title: 'Radio 1:n iltapäivä: haastattelussa käsikirjoittaja, ohjaaja Markus Lehmusruusu -  miten oravaa ohjataan?'
        start_time: '2026-06-30T13:30:00+03:00'
        end_time: '2026-06-30T15:00:00+03:00'
        description: |
          Juontajana Jarmo Laitaneva. N. klo 14 käsikirjoittaja-ohjaaja Markus Lehmusruusun käsikirjoittama ja ohjaama elokuva, Orava, vie aikamatkalle tulevaisuuteen. Huhtikuun alussa ensi-iltansa saanut suomalais-eurooppalainen elokuva vie katsojansa maailmaan, jossa luonto on hävinnyt miltei kokonaan. Mikä inspiroi Lehmusruusua kirjoittamaan maailman viimeisestä oravasta? Toimittajana Miia Lahti. (Ensilähetys oli 31.3.26.) . N. klo 14:30 Näyttelijä-laulaja-muusikko Reeta Vestman kertoo lempielokuvastaan. Toimittajana Maija Salminen.
