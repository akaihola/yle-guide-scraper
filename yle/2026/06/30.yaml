          Debussy: La Plus que lente (Vilde Frang, viulu ja Jose Gallardo, piano).

          Sibelius: Pieni sarja (RSO/Jorma Panula).

          Gossec: Gavotti D-duuri (Gunilla von Bahr, huilu, ja Musica Vitae/Jan-Olav Wedin).

          Hatshaturjan: Sapelitanssi (Total Cello Ensemble).

          Vivaldi: 3. osa konsertosta viululle, jousille ja continuolle g-molli (Kesä) (Gil Shaham, ja Orpheus-kamariork.).

