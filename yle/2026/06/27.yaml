      - title: 'Uutispodcast: Suomi hakee kritisoituun YK:n turvallisuusneuvostoon – miksi?'
        start_time: '2026-06-27T21:01:00+03:00'
        end_time: '2026-06-27T21:25:00+03:00'
        description: |-
          YK:n turvallisuusneuvostoa on viime vuosina kritisoitu siitä, ettei se kykene tekemään päätöksiä ja ratkomaan tämän ajan isoja kriisejä. Samalla Yhdysvaltain presidentti Donald Trump on häärännyt omaa rauhanneuvostoaan. Miksi Suomi haluaa silti nyt jäseneksi? Atte Uusinokan haastateltavana ovat YK:n turvallisuusneuvosto -kampanjan päällikkö Satu Suikkari-Kleven sekä yliopistonlehtori, dosentti Anna Kronlund Turun yliopistosta. 
      - title: 'Klassikkokuunnelma: Työmiehen perhe'
        start_time: '2026-06-27T21:51:00+03:00'
        end_time: '2026-06-27T22:15:00+03:00'
        description: |-
          Jakso 6/22: Mari on yksin
          Hella Wuolijoen kirjoittama ja ohjaama sarja kertoo Kustaa Rantasen työläisperheen tarinan Suomen yhteiskuntahistorian avainkohtien kautta. Sarja alkaa 1800-luvun lopusta ja kattaa vuodet aina sen tekohetkeen 1950-luvun alkuun saakka. Kysymykset niin torppareiden asemasta, kaupungistumisesta, kansalaissodasta kuin lapualaisvuosistakin tulivat käsitellyiksi Rantasen perheen vaiheiden kautta. 
      - title: 'Klassikkokuunnelma: Työmiehen perhe'
