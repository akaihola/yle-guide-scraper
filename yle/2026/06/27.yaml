      - title: 'Hanna Tikanderin toiset todellisuudet: “Ei tätä työtä voi tehdä, jos ei ole sydän auki”'
        start_time: '2026-06-27T10:25:00+03:00'
        end_time: '2026-06-27T11:00:00+03:00'
        description: |-
          Pia löysi tarot-kortit ja henkisen maailman, kun hän oli viulistina Italiassa. Hän sai lahjaksi kortit siskoltaan ja ryhtyi syventymään tarot-korttien merkitykseen. Viulistin ura jäi, kun Pian kertoman mukaan kortit alkoivat välittää henkioppailta viestejä ja henkinen maailma vei mennessään. Tarot-kortit antavat Pian mukaan kanavan henkiselle kasvulle ja reitin itsetuntemukseen. Kun Pia pudottelee studiossa kortteja, on hänellä isoa kerrottavaa Hannallekin.
      - title: 'Virtasen taloushistoria: T-Fordista Mustangiin ja sähköponiin, Suomen Ford 100 vuotta'
        start_time: '2026-06-27T11:00:00+03:00'
        end_time: '2026-06-27T11:52:00+03:00'
        description: |-
          Virtasen taloushistoriassa muistellaan ja pohditaan nyt Suomen autoistumisen historiaa. Tasan sata vuotta sitten perustettiin maahantuontiliike Suomen Ford. Haastateltavina Suomen Fordin toimitusjohtaja Johan Lindberg ja tuoreen Fordin historiaa käsittelevän kirjan tekijä, tietokirjailija Juha Partanen. Toimittaja on Juha Virtanen. Ohjelma on uusinta viime huhtikuulta.
