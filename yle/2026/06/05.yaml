        start_time: '2026-06-05T19:02:00+03:00'
        end_time: '2026-06-05T21:00:00+03:00'
        description: |-
          Tapiolan kuoro on Ylen vuoden nuorisokuoro 2025–2026. Valinnassa kiinnitettiin huomiota kuoron sekä sen johtajan pitkäjänteiseen työhön korkeatasoisen lapsikuorotaiteen hyväksi.

          Kallion kirkossa 4. kesäkuuta tallennetussa konsertissa kuoro esittää 4. kansainvälisen sävellyskilpailunsa voittajateokset. Kuoroa johtaa Pasi Hyökki. Konsertin toimittaa Inari Tilli.
