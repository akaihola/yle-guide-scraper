      - title: 12 diktaattoria. Opettaja Robert Mugabe
        start_time: '2026-06-05T21:31:00+03:00'
        end_time: '2026-06-05T22:12:53+03:00'
        description: |
          Robert Mugabe aloitti uransa vapaustaistelijana ja Afrikan sankarina, mutta tämä WHO:n
          hyväntahdonlähettilääksikin hetkeksi nimetty opettaja turmeltui yhdeksi aikamme pahimmista tyranneista ja johti kansakuntansa tuhoon. Mugaben aikakaudella Zimbabwe koki henkisen ja taloudellisen romahduksen. Toimittajana Raimo Tyykiluoto, vieraana tietokirjailija Hannu Pesonen. Kaikki sarjan jaksot ovat kuultavissa Yle Areenassa.
          (julkaistu v. 2018)
      - title: 'Tuuli Saksalan keidas: Festivaalien kesävieraita eli Suomen suvi täyttyy maailman äänistä'
        start_time: '2026-06-05T22:26:00+03:00'
        end_time: '2026-06-05T23:15:00+03:00'
        description: |-
          Tuuli Saksalan Keitaalla otetaan vastaan kesävieraita! Suomen festivaalikesä tuo maahan taiteilijoita ympäri maailman.

          Bosnialainen Divanhana tuo modernia sevdalinkaa Haapavesi Folk Festivaalille. Tansanialainen The Zawose Queens, itäisen Afrikan kiinnostavin yhtye, saapuu Flow-festivaalille elokuussa. Helsingin juhlaviikoilla kuullaan portugalilaista fadoa ja beniniläistä Angelique Kidjoa, aseistariisuva esiintyjä, joka palaa jälleen Suomeen.

          Kotimaisista vieraista kuullaan karjalankielisen musiikin lipunkantaja Loimolan Voima sekä Suistamon Sähkö, jotka vievät kuulijan Karjalaan.

          Samalla ihmetellään kesäöitä Eino Leinon Nocturnesta Pekka Kuusiston tulkintaan. Kesäyö tiivistää ajatuksen onnesta – ne eivät ole nukkumista varten vaan haaveilua ja seikkailua.
