      - title: 'Radio 1:n iltapäivä: Kirjani tarina - vieraana kirjailija Olli Jalonen'
        start_time: '2026-06-05T13:30:00+03:00'
        end_time: '2026-06-05T15:00:00+03:00'
        description: |-
          Juontajana Airik Hodge. Tarkkanäköinen Puhdas viiruinen elämä -romaani kertoo kuinka vuoden 1918 sisällissodan kipeiden muistojen kanssa eläminen vaikuttavat Hämeenlinnan Rinkelinmäellä asuvien ihmisten elämään. Omaa arkeaan elävät romaanin henkilöt eivät tule edes ajatelleeksi kuinka vähän heidän elämänsä tapahtumissa on kyse heidän omista valinnoistaan, kun ensimmäisen maailmansodan tapahtumien vaikutukset saapuvat Hämeenlinnaan asti.

          Toimittaja Jukka Kuosmanen vieraana n. klo 14 on Puhdas viiruinen elämä -romaanin kirjoittanut kirjailija Olli Jalonen.

          N. klo 14:30 Tapiolan kuoro on Ylen vuoden nuorisokuoro 2025–2026. Perjantai-iltana Yle Radio 1:ssä kuullaan Kallion kirkossa 4. kesäkuuta tallennettu konsertti. Kuulokurkistus illan konserttiin. 
