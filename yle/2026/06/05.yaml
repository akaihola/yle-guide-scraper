      - title: 'Maisteri Lindgrenin musiikkiesitelmä: Miksi säveltäjä Amanda Maier menestyi puolisoaan paremmin?'
        start_time: '2026-06-05T11:00:00+03:00'
        end_time: '2026-06-05T11:55:00+03:00'
        description: |-
          "Jos luette jostain, että Amanda Maier oli ensimmäinen nainen, joka valmistui kapellimestariksi Ruotsissa, olette joutunut väärän tiedon, englanniksi jos haluatte fake news, uhriksi. Musikdirektör ei ole kapellimestari, mutta Amanda oli ensimmäinen nainen, joka tuon tuottajatutkinnon suoritti – ja siis kruununprinssin kehotuksesta. Maierin valmistuminen tirehtöörilinjalta herätti huomiota Ruotsin lehdistössä." - Minna Lindgren esitelmöi.
