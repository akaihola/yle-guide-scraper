      - title: 'Elävä historia: Suursodan alla - muistuttaako nykyhetki aikaa ennen ensimmäistä maailmansotaa?'
        start_time: '2026-06-08T12:05:00+03:00'
        end_time: '2026-06-08T12:55:00+03:00'
        description: |-
          Norjalainen historiantutkija Odd Arne Westad esittää, että nykyhetki muistuttaa aikaa ennen ensimmäistä maailmansotaa. Westadin mielestä historiasta pitäisi nyt ottaa opiksi, jotta uusi suursota voitaisiin estää. Mitä mieltä Westadin ajatuksista ovat Helsingin yliopiston taloushistorian professori Jari Eloranta ja sotien ja väkivallan historiaan perehtynyt yliopistonlehtori Risto Marjomaa?
          Toimittajana Harri Alanne.
