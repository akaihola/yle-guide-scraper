      - title: 'Lehmitytöt 1944 J8: Vihdoinkin perillä!'
        start_time: '2026-06-08T20:25:00+03:00'
        end_time: '2026-06-08T21:00:00+03:00'
        description: |
          Annikki on kulkenut jalan satoja kilometrejä ja näky alkaa olla sen mukainen.  Perille  Savonlinnaan saapuminen on  valtava pettymys. Onko lehmitytöillä mitään arvoa, kun lasti on saatu perille? Annikilla alkaa uusi ja nöyryyttävä matka kohti omaa elämää. Aseet vaikenevat ja jotain muutakin sykähdyttävää tapahtuu. Sota-ajan teinit pääsevät vihdoinkin tanssimaan, ja Eilasta tulee Miss Kemiö.
