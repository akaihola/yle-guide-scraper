        end_time: '2026-06-08T18:35:00+03:00'
        description: |-
          Miltä kesä tuntuu ja kuulostaa rannoilla? Haemme tuntumaa ensin Välimeren kohteista ja lopulta Karibialta asti. Tulee myös kysyttyä, mitä yksityisyys rannalla tarkoittaa, mitkä ovat rannan ihanteelliset mitat, pitääkö rannan välttämättä olla hiekkaranta, ja millaisia unelmia ranta voi herättää? Vamos a la playa! Toimittajana Mika Kauhanen.
