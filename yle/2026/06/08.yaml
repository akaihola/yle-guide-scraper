        start_time: '2026-06-08T19:02:00+03:00'
        end_time: '2026-06-08T19:50:00+03:00'
        description: |
          Vain harva tietää, mitä Minnesota-hoito todella on. Tämä dokumentti on harvinainen tilaisuus päästä seuraamaan kuntoutusjaksoa muilta suljettuun yhteisöön. Mitä siellä tapahtuu – niin hoidossa kuin toipujien mielissä? Mukana on iso joukko kuntoutujia, joita on suistanut sivuraiteille esimerkiksi alkoholi, huumeet tai rahapelit. Toteutus: Päivi Leino, Joonatan Kotila, Lasse Nousiainen, Sami Hahtala.
