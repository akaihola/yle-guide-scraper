      - title: Marko Gustafsson:Käännekohdissa Atso Almila
        start_time: '2026-06-25T10:00:00+03:00'
        end_time: '2026-06-25T10:53:00+03:00'
        description: |-
          Almila kuvailee, että kapellimestarilla täytyy olla näkemystä ja toimia kuin majakkana toimiva metronomi, joka lyö tarkasti. "Yleisö saattaa rakastaa teatraalista huitomista, mutta on onkin yllättävän haastavaa opettaa sitä, mitä on lyödä tarkasti ", Almila paljastaa. Hän kokee tekevänsä palvelutyötä, jossa autetaan orkesteria soittamaan mahdollisimman hyvin. 
