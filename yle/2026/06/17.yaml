      - title: Kotimainen konsertti
        start_time: '2026-06-17T19:02:00+03:00'
        end_time: '2026-06-17T21:00:00+03:00'
        description: |-
          Brittein saarten musiikillinen aarrearkku pullistelee rikkauksista: kun renessanssimestari Thomas Tallisin messu soi puhdasta hartautta, tunnetaan Max Richterin eteeriset sävelet elokuvien ja tv-sarjojen taustalta. Henry Purcellin Didon kuolinaaria riipaisee syvältä, muttei niin syvältä kuin John Tavenerin Song for Athene, joka säesti kyyneleitä prinsessa Dianan hautajaisissa.

          Maailman konserttitalojen vakionimi Barry Douglas tuo kelttiläiskappaleiden helmiin pohjoisirlantilaista autenttisuutta. Ilta huipentuu Frank Bridgen romanttiseen pianokvintettoon; intohimoisten melodioiden tulvaan.

          Henry Purcell: Sonaatti nro 12 D-duuri
          Thomas Tallis: Messu, 4-ääninen
          Max Richter: On the nature of daylight
          Henry Purcell: Dido’s Lament ”When I’m laid in Earth”
          John Tavener: Song for Athene

          väliaika

          Celtic Airs pianolle:
          Carrickfergus (sovittanut Barry Douglas)
          Madam Cole (sov. Edward Bunting)
          Mountains of Mourne (sov. Barry Douglas)
          My Lagan Love (sov. Barry Douglas)

          Frank Bridge: Pianokvintetto d-molli 

          Esiintyjät:

          Hanna Lammi, sopraano
          Key Ensemble, kuoro
          Jutta Seppinen, kuoronjohto

          Ioana Cristina Goicea, viulu
          Elina Vähälä, viulu
          Hartmut Rohde, alttoviulu
          Senja Rummukainen, sello
          Barry Douglas, piano
          Kiril Kozlovsky, urut

          Kuva: Laura Merz: "Soittajat"
