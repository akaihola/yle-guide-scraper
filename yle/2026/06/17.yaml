      - title: 'Havaintoja muutoksesta: Neulomisen ja kädentaitojen kulttuuria'
        start_time: '2026-06-17T10:00:00+03:00'
        end_time: '2026-06-17T10:50:00+03:00'
        description: |
          Kädentaidot liittyvät niin itsensä ilmaisemiseen, luovuuteen, huoltovarmuuteen kuin kestävään kehitykseenkin. Miten käsillä tekemisen taidot vaikuttavat meihin ja kulttuuriimme?  Millainen merkitys kädentaidoilla on tulevaisuudessa? 
          Toimittaja Satu Kivelä keskustelee aiheesta Taitoliiton toiminnanjohtaja Minna Hyytiäisen ja tekstineuloja Teija Alangon kanssa. Ohjelma on uusinta ajalta 4.2.2026.
