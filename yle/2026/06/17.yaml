      - title: 12 diktaattoria. Voitelija Saddam Hussein
        start_time: '2026-06-17T12:05:00+03:00'
        end_time: '2026-06-17T12:50:00+03:00'
        description: |
          Irakin diktaattori Saddam Hussein oli kuumaverinen idealisti ja kylmäverinen pyöveli ja ehkä juuri siksi pysyi Lähi-idän valtapelin keskiössä vuosina 1979 – 2003. Saddam halusi olla arabien sankari ja valloittaja, mutta hänen pitkälle hallintokaudelleen oli tyypillistä häikäilemätön sorto, sadistinen julmuus, rikollinen korruptio, tarpeettomat sodat, joukkomurhat sekä henkilökultti. Saddamin tie päättyi hirttolavalle, ja ennen kuin kuolema saapui, hän ehti vielä haukkua pyövelit, kertoo Kauppalehden uutispäällikkö Mikko Metsämäki. Toimittajana Raimo Tyykiluoto.
          (v, 2018)
