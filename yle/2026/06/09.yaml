      - title: 'Radio 1:n iltapäivä: Elokuvat, jotka halusimme nähdä - Le Havre'
        start_time: '2026-06-09T13:30:00+03:00'
        end_time: '2026-06-09T15:00:00+03:00'
        description: |+
          Juontajana Miia Lahti.
          Yle tarjoaa satavuotisjuhliensa kunniaksi yleisölle juhlavuoden aikana sata kotimaista elokuvaa, jotka yleisö on itse voinut valita. Suomen Elokuvasäätiön kulttuuriviennin suunnittelija Otto Suuronen keskustelee Jarmo Laitanevan kanssa kerran kuukaudessa otsikolla Elokuvat, jotka halusimme nähdä, aina yhdestä elokuvasta ja sen tyylilajista. Nyt puheenaiheena on palkittu Aki Kaurismäen Le Havre. Le Havre nähdään ensi lauantaina Yle Teemalla ja se esitetään samana päivänä myös Sodankylän elokuvajuhlilla.

          N. klo 14:30 Toimittaja ja kirjailija Mira Selander kertoo Ettore Scolan Erityinen päivä -elokuvasta, joka teki häneen erityisen vaikutuksen. Toimittajana Satu Kivelä.


      - title: 'Kulttuuriykkönen: Millä tavalla Aino, Alvar ja Elissa Aalto halusivat tuoda hyvinvoinnin rationalistiseen aikakauteen? '
        start_time: '2026-06-09T15:00:00+03:00'
        end_time: '2026-06-09T15:58:00+03:00'
        description: |-
          Aalto Design – Hyvinvoinnin muodot näyttely Arkkitehtuuri- ja designmuseossa tarkastelee Aino, Alvar ja Elissa Aallon työtä hyvinvoinnin näkökulmasta. Millä tavalla näyttely nostaa esiin, kuinka poikkeuksellista Aaltojen ajattelu oli tehokkuutta ja rationalismia korostaneessa ajassa? Millä tavalla tämä radikaali suuntaus näkyi arkisissa tiloissa? Mistä he saivat tuolloin inspiraationsa? Aalloille suunnittelun lähtökohta oli kokonaisvaltainen ihminen, psyyke ja keho.
          He ajattelivat että hyvinvointi syntyy tasapainosta ihmisen, luonnon ja rakennetun ympäristön välillä. Millä tavalla arkkitehtuuri ja muotoilu vastasivat tähän tarpeeseen?
           
          Monitaiteinen näyttely keskittyy suunnittelun ja hyvinvoinnin suhteeseen. Linda Bergroth vastaa näyttelyarkkitehtuurista, joka antaa Aallon designille uutta valoa ja henkisempää lähentymistapaa.

          Näyttelyn kuraattorit Jutta Tynkkynen ja Petteri Kummala avaavat millaisia keinoja Aallot käyttivät luodessaan hyvinvointia tukevia ympäristöjä ja mitä opittavaa meillä voisi olla heiltä tänään. 

          Ohjelman juontaa Pia-Maria Lehtola.


          Rentoa puhetta, kiinnostavimmat vieraat ja kulttuurin ajankohtaisaiheet debatoitavina. Suorana maanantaista perjantaihin.
