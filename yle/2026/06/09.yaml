      - title: 'Maarit Tastula - Yksi maailma, kaksi katsetta: Riina Tanskanen ja Merai Käyhkö'
        start_time: '2026-06-09T10:00:00+03:00'
        end_time: '2026-06-09T10:55:55+03:00'
        description: |-
          Onko ryysyistä helppo kurottaa rikkauksiin? Onko talonmiehen tyttären tie yliopistoon kuin matka outoon maailmaan, jossa kokee olevansa ulkopuolinen ja muita huonompi? 

          Moni lähtee elämään takamatkalta, jota paremmista lähtökohdista ponnistava ei edes huomaa. Silti monet ajattelevat yhä, että menestys on vain yksilöstä itsestään kiinni. Pikkukaupunkien tytöt kahdessa sukupolvessa, sarjakuvataiteilija Riina Tanskanen Imatralta ja yliopistonlehtori Mari Käyhkö Savonlinnasta, vertailevat kokemuksiaan  luokkahypyn mahdollisuuksista kahdella eri vuosikymmenellä ja pohtivat, katsooko media ja politiikka alentuvalla katseella syrjäseutujen ihmisiä

          Toimittaja Maarit Tastula
