      - title: 'Maailmanpolitiikan arkipäivää: Horjuuko Hizbollahin asema Libanonissa sodan keskellä?'
        start_time: '2026-06-09T20:35:00+03:00'
        end_time: '2026-06-09T21:00:00+03:00'
        description: |-
          Libanon on joutunut vaikean humanitaarisen kriisin keskelle, Israelin käydessä sotaa Hizbollahia vastaan. Maan väestöstä jopa viidennes on joutunut maan sisäisiksi pakolaisiksi. Osa majoittuu teltoissa pääkaupungissa Beirutissa.

          Libanonissa nähdään jo merkkejä Hizbollahin tuen horjumisesta sodan tuhojen keskellä. Ohjelmassa haastateltava libanonilaisprofessori arvioi, että Libanonin hallitus ei kuitenkaan kykene riisumaan Hizbollahia aseista, koska sisällissodan riski on olemassa.

          Ohjelmassa jututetaan myös tunnettua kristittyä libanonilaistoimittajaa, jota Hizbollah on yrittänyt surmata. Hän uskoo, että menossa on Hizbollahin viimeinen taisto.

          Israel on tällä viikolla edennyt joukkoineen syvemmälle Libanoniin sitten vuoden 2000 ja vallannut strategisesti tärkeän Beaufortin linnan. Israelilainen ulkopolitiikan kommentaattori arvioi, että pääministeri Benjamin Netanjahua motivoi moni asia operaatioon, esimerkiksi halu sabotoida Iranin ja Yhdysvaltain rauhanneuvottelut.

          Yhdysvaltalaisasiantuntijan mukaan Yhdysvaltain presidentin Donald Trumpin ja Netanjahun välille on syntynyt railo suhtautumisessa rauhaan.

          Maailmanpolitiikan arkipäivää -ohjelman ovat toimittaneet Antti Kuronen ja Paula Vilén. Äänitarkkailijana on Matias Puumala. Tunnusmusiikki: Petri Alanko, kuva: Tuuli Laukkanen/Yle.
