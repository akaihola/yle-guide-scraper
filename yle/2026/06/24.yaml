      - title: 'Radio 1:n iltapäivä: Vanhat  kirjat vetävät Sastamalaan - studiovieraana toiminnanjohtaja Päivi Mäki-Kerttula'
        start_time: '2026-06-24T13:30:00+03:00'
        end_time: '2026-06-24T15:00:00+03:00'
        description: |+
          Jalmari Laine on juontajana. Mikä vanhoissa kirjoissa saa tuhansittain ihmisiä kokoontumaan vuosittain Sastamalaan yhtenä kesäisenä viikonloppuna? Miten tärkeä on kirja esineenä? Vai onko tarina tärkeintä? Vanhan kirjallisuuden päivät keräävät kirjojen ja erityisesti vanhojen kirjojen ystävät Pirkanmaalle, Sastamalaan perinteisesti näin kesä-heinäkuun vaihteessa. Klo 14 tapahtuman toiminnanjohtaja Päivi Mäki-Kerttula on Joni Timosen studiovieraana.  N. klo 14:30 Riikka Holopaisen haastattelussa oli Riihimäen kesäkonserttien taiteellinen johtaja, pianisti, säveltäjä ja kapellimestari Tuomas Turriago.

