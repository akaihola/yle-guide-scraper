      - title: Maailmanpolitiikan arkipäivää
        start_time: '2026-06-16T20:35:00+03:00'
        end_time: '2026-06-16T21:00:00+03:00'
        description: |-
          EU:ssa tuli tällä viikolla voimaan maahanmuutto- ja turvapaikkapolitiikkaa kiristävä sopimus. Tavoitteena on ehkäistä laitonta maahantuloa sekä toisaalta jakaa jäsenmaissa tasaisemmin vastuuta turvapaikanhakijoista.

           

          Tutkijapiireissä seurataan nyt tarkasti, onnistuuko maahanmuuttopaketti lisäämään EU-maiden välistä solidaarisuutta maahanmuuttokysymyksissä. Etelä-Euroopan maat ovat jo pitkään vaatineet tasapuolisempaa vastuunjakoa turvapaikanhakijoista.

           

          Pakti-nimellä tunnettu maahanmuuttosopimus mahdollistaa nopeammat raja- ja turvapaikkamenettelyt. Asiantuntijoiden mukaan niissä piilee vaara, ettei turvapaikanhakijoiden yksilölliset oikeudet välttämättä toteudu.

           

          Ohjelmassa kuullaan, mitä Brysselissä vuosia asunut paperiton marokkolaissiirtolainen ajattelee uudistuksista.

           

          Lisäksi selviää, miksi Espanja on laillistamassa puoli miljoonaa paperitonta ja kulkee samalla vastavirtaan EU-maiden valtavirran kanssa.

           

          Maailmanpolitiikan arkipäivää -ohjelman ovat toimittaneet Hannele Muilu, Maija Salmi ja Paula Vilén. Äänitarkkailijana on Katri Koivula. Tunnusmusiikki: Petri Alanko, kuva: Tuuli Laukkanen/Yle.
