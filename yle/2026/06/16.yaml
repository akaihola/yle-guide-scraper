      - title: 'Romano mirits:  ”Nuoriso-ohjaajan pitää olla nuorten puolella, mutta myös kasvattajan roolissa”'
        start_time: '2026-06-16T20:00:00+03:00'
        end_time: '2026-06-16T20:15:00+03:00'
        description: |
          Tenho Keväänranta työskentelee Kurikan kaupungissa nuoriso-ohjaajana. Lapsena Ruotsissa asunut Keväänranta kertoo, että Tukholmassa Rinkebyn ala-asteella lapsia ei eroteltu – ei suomalaisina eikä romaneina. Perheen muutettua Kurikkaan tilanne muuttui.
           
          Niin henkinen kuin fyysinen vahvuus löytyi Ilmajoen kisailijoiden painisalilta. Samoin luottamus pääväestön ihmisiin. Hengellisen heräämisen jälkeen Keväänranta kutsuttiin Espanjaan turistikirkon nuorisotyötä perustamaan. Sieltä palaamisen jälkeen polku johti lastensuojelutyöhön ja nuoriso-ohjaajaksi.
           
          Romano miritsin on toimittanut Jaakko Laakso.
