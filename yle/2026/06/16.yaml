        start_time: '2026-06-16T11:00:00+03:00'
        end_time: '2026-06-16T11:57:00+03:00'
        description: |
          Suhde vanhoihinkin ystäviin, musiikkeihin, voi muuttua. Voi ilmetä uusia puolia, suhde voi syventyä.
          Joskus kolahtaa kerralla. Jokin suhde kehittyy pikkuhiljaa, sille on annettava aikaa. Se voi vaatia ponnisteluja. 
          Tämähän pätee aika monessa asiassa, tässä maailmassa. 

          Eva Tigerstedt avaa polkuja musiikkiin.


