        description: |-
          Miia Lahti juontaa. Tanssilavakulttuuri on nosteessa. Lavoilla järjestettävät tanssikurssit houkuttelevat mukaan uusia tanssijoita ja suosittujen tanssiorkestereiden perässä saatetaan ajaa pitkiäkin matkoja. N. klo 14 studiovieraana on perinteikkään Pavin tanssilavan toiminnanjohtaja Karoliina Inkilä. N. klo 14:30 laulaja, lauluntekijä Esa Eloranta kertoo mieleenpäinuvimmasta keikkakokemukusestaan. Toimittajana Marko Gustafsson.
      - title: 'Kulttuuriykkönen: Lapsiköyhyyden historiaa ja nykypäivää'
        start_time: '2026-06-16T15:00:00+03:00'
        end_time: '2026-06-16T15:58:00+03:00'
        description: |
          Lasten osattomuus ja köyhyys paljastavat millaisia asioita yhteiskuntamme arvostaa. Lapsena koettu köyhyys vaikuttaa ihmisen elämään monilla tavoin. Millaista on suomalainen lapsiköyhyys? Miten se on muuttunut eri aikoina?
          Kulttuuriykkösessä keskustellaan teoksesta nimeltä Ryysyläisyydestä osattomuuteen – köyhyys lasten ja nuorten kertomana 1800-luvulta nykypäivään. Sen toimittajista ja kirjoittajista studiossa ovat tutkimuspäällikkö Anna-Maria Isola Itä-Suomen yliopistosta ja Turun yliopiston Suomen historian professori Kirsi Vainio-Korhonen.
          Juontajana on Pietari Kylmälä.
