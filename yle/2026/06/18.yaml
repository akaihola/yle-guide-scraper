        description: |
          Pimeän asekaupan tunnetuimmalle toimijalle Viktor Boutille Neuvostoliiton hajoaminen oli onnenpotku eli miljoonabisnes tarjottimella. Lähes vuosikymmenen ajan Bout kuljetti valtavilla rahtikoneillaan ja samoilla lennoilla niin rynnäkkökivääreitä kuin humanitaarista apua sekä myi aseita saman konfliktin eri osapuolille.

          Jakson asiantuntijoina: väitöskirjatutkija Mikko Räkköläinen Tampereen yliopistosta ja yliopistonlehtori Risto Marjomaa Helsingin yliopistosta. 
