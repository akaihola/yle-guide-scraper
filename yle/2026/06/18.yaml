      - title: 'Maailma tarinoina: Nummisuutarit on komediaa syvimmässä merkityksessään'
        start_time: '2026-06-18T12:05:00+03:00'
        end_time: '2026-06-18T13:00:00+03:00'
        description: |-
          Aleksis Kiven Nummisuutarit on Suomen esitetyimpiä puhenäytelmä, joka tänäkin kesänä pyörii kesäteatterilavoilla. Se kantaa yli 160 vuoden takaa katsojien eteen kysymykset ihmisyydestä, yhteisöstä ja yksilön paikasta maailmassa. Vaikka näytelmä nimensämukaisesti kuvaa yhteisön elämää, sen keskushenkilönä voi nähdä harjastukkaisen, usein lapsekkaana hölmönä pidetyn Eskon. Millaisia kerroksia hahmossa on nähtävissä tämän päivän valossa? Millaista Kiven kieli on näyttämöllä, näyttelijöiden suussa? Millainen ihmiskuva näytelmästä paistaa? 
          Nummisuutareiden kerroksia purkavat Marja Vehkasen johdattelemana ohjaaja Samuli Reunanen ja teatterintutkija Topi Vainikainen.
