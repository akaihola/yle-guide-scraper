      - title: 'Tinder-lääkäri 3/3: Lääkäri katoaa jäljettömiin'
        start_time: '2026-06-18T17:05:00+03:00'
        end_time: '2026-06-18T17:30:00+03:00'
        description: |
          Kolme vuotta ensitreffien jälkeen Linda saa tietää järkyttävän totuuden lääkäri Aronin menneisyydestä. Hän tekee vihdoin rikosilmoituksen – mutta kun poliisin pitäisi kuulustella Aronia, käy ilmi, ettei kukaan tiedä, missä hän on.

          Alkaa epätoivoinen etsintä. Linda, toimittajat ja poliisi eri maissa yrittävät jäljittää miestä, joka saattaa edelleen työskennellä lääkärinä jossakin Euroopassa. Samalla Linda kamppailee syyllisyyden kanssa: olisiko muita uhreja voinut välttää, jos hän olisi puhunut aikaisemmin?
