      - title: 'Radio 1:n iltapäivä: Siirtolapuutarhaelämä on urbaania mökkielämää'
        start_time: '2026-06-18T13:30:00+03:00'
        end_time: '2026-06-18T15:00:00+03:00'
        description: |-
          Suomen ensimmäinen siirtolapuutarha perustettiin vuonna 1916 Tampereen Hatanpäälle. Tällä hetkellä Suomessa on kaikkiaan n. 60 siirtolapuutarhaa. Mikä siirtolapuutarhaelämässä viehättää? Miia Lahden studiovieraana n. klo 14 on Suomen Siirtolapuutarhaliiton liittosihteeri Tina Wessman. Näyttelijä Eija Ahvon kulttuurikokemus opintomatkalla Ghanassa oli veret seisauttava. Toimittajana on Inari Tilli. (Ensilähetys oli 2.10.26.)
      - title: 'Kulttuuriykkönen: Ruokailun, juomien ja kattauksen kulttuurihistoriaa 1700-luvulta omaan aikaamme'
        start_time: '2026-06-18T15:00:00+03:00'
        end_time: '2026-06-18T15:58:00+03:00'
        description: |-
          Millainen on juomien historia 1700-luvulta omaan aikaamme? Juhlavat juomat, kuten viini, samppanja ja väkevät viinit ovat syntyneet historiallisissa olosuhteissa hyvin erityisillä tavoilla. Samppanja syntyi vahingossa ranskalaisten ja englantilaisten yhteistyössä. Miten tietty juoma syntyi, miten sitä tarjoiltiin ja millaisista laseista? Miksi samppanjaa juodaan sekä laakeista että huilumaisista laseista? Historian aikana olutta juotiin litratolkulla, koska se oli puhtaampaa kuin vesi.

          Miten kahvi tuli Suomeen? Kustaa III keitti salaa kahvia Tukholman linnassa. Miksi puhumme sekä kahvipannusta ja kahvikannusta? Euroopassa on kaksi erilaista teekulttuuria. Englannissa kaadetaan maitoa teehen ja Venäjällä vadelmahilloa. Millaista on kova tee? Mitä kaikkea esineistöä teen valmistamiseen löytyy historian saatosta ja antiikkiliikkeistä? 

          Millainen on posliinin historia? Sitä kutsuttiin pitkään valkoiseksi kullaksi, koska sen valmistaminen oli niin kallista. Miksi Meissenin posliinin syntytarina on niin erikoinen? 

          Keskustelemme myös eri ruokalajien synnystä. Miksi hienon pihvin nimi on Chateaubriand ja kuka keksi ilmavan jälkiruoan Pavlovan? Mitkä ovat kuuluisat alkuruoat, pääruoat ja jälkiruoat? Miten kattaukset kuvaavat omaa aikaansa?

          Ohjelman vieraina ovat antiikkiasiantuntijat Maria Ekman ja Bernt Morelius.

          Ohjelman juontaa Pia-Maria Lehtola.

          Rentoa puhetta, kiinnostavimmat vieraat ja kulttuurin ajankohtaisaiheet debatoitavina. Suorana maanantaista perjantaihin.
