      - title: Emma
        start_time: '2026-06-18T22:31:00+03:00'
        end_time: '2026-06-18T22:59:00+03:00'
        description: |
          Osa2/8 Lehtolapsi  
          Emma on varma, että hänen suunnitelmansa kirkkoherra Eltonin ja Harriet Smithin liitosta etenee. Harriet Smith saa kuitenkin kosintakirjeen aivan toiselta mieheltä. Neiti Bates on myös saanut kirjeen sisarentyttäreltään Jane Fairfaxilta, joka saapuu Emman mielestä epäilyttävän yllättäen Highburyyn. Herra Knightley alkaa epäillä onko Emma todellinen ystävä Harrietille. 
