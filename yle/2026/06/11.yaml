        end_time: '2026-06-11T22:25:21+03:00'
        description: |
          Vain harva tietää, mitä Minnesota-hoito todella on. Tämä dokumentti on harvinainen tilaisuus päästä seuraamaan kuntoutusjaksoa muilta suljettuun yhteisöön. Mitä siellä tapahtuu – niin hoidossa kuin toipujien mielissä? Mukana on iso joukko kuntoutujia, joita on suistanut sivuraiteille esimerkiksi alkoholi, huumeet tai rahapelit. Toteutus: Päivi Leino, Joonatan Kotila, Lasse Nousiainen, Sami Hahtala.
      - title: 'Viihdekuunnelma: Emma'
        start_time: '2026-06-11T22:29:34+03:00'
        end_time: '2026-06-11T22:48:08+03:00'
        description: |
          Osa 1/8. Amorin asialla
          Highburyn kylässä asuvan nuoren Emma Woodhousen mieluisin ajanviete on järjestellä muiden ihmissuhdeasioita, mutta osaako hän todella toimia amorin apulaisena? Emma päättää vakuuttaa epäilijänsä, etenkin naapurissa asuvan herra Knightleyn, ja järjestää kodissaan Hartfieldissa juhlat. Juhliin kutsutaan Emman suunnitelmiin sopivat kohteet: nuori kirkkoherra Elton ja läheisen tyttökoulun sievä Harriet Smith.  
