      - title: 'Maailma tarinoina: Beckettin Leikin loppu – mitä tapahtuu kun mitään ei enää odoteta?'
        start_time: '2026-06-11T12:05:00+03:00'
        end_time: '2026-06-11T13:00:00+03:00'
        description: |-
          Samuel Beckettin näytelmätekstit tekee mieli kytkeä kunkin ajan kriiseihin, mutta itse tekstit pakenevat osoittelevuutta ja merkityksellistämistä. Absurdin teatterin merkittävimpiin kirjoittajiin lukeutuvan Beckettin tekstin aukkoisuus ja huokoisuus ovat sekä haaste että vapaus, ja kieli nousee keskiöön eri merkityksessä kuin realistisen teatterin perinteessä. Hänen taiteellisen työnsä alla lepäsi historian hirveyksien aiheuttama hämmennys, eksistentialistinen filosofia ja jumalan kuolema, joiden voisi väittää värittävän näytelmät pessimistiseksi – mutta onko niissä sijaa myös toivolle ja lämmölle? Missä pisteessä Beckettin myöhemmin yhä karsitummaksi ja riisutummaksi käyvä tyyli on vuonna 1957 ilmestyneen Leikin loppu -näytelmän kohdalla? 

          Absurdin draaman maailmaa avaavat Marja Vehkasen vieraina dramaturgi, näytelmäkirjailija Ilja Lehtinen ja teatteritieteen professori Hanna Korsberg.
