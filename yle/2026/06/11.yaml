      - title: Tuuli Saksalan keidas
        start_time: '2026-06-11T17:35:00+03:00'
        end_time: '2026-06-11T18:25:00+03:00'
        description: |-
          Millaisia loitsuja tämä maailma tarvitsee? Lempeitä vai voimakkaita?

          Tuuli Saksalan vieraana on muusikko Vilma Jää, joka viime aikoina on tehnyt töitä muun muassa Metropolitan Oopperassa ja Venetsian biennaalissa. Kansainvälisen kiireen keskellä hän istahtaa hetkeksi Keitaalle kertomaan uudesta Loitsui ja taikoi -albumistaan.

          Jää on kaivanut esiin suomalaisia loitsuja ja muokannut niistä voimakasta nykymusiikkia. Uudella albumilla kuullaan ilmastokriisiloitsuja, mielenterveysloitsuja ja liekkilettiset lemmennostajat.

          Vilma Jää kertoo, miten hän löysi tiensä kansanperinteen pariin, miksi karjankutsut ja karjalainen laulutyyli tuntuvat hänen ääneltään, ja miten ADHD on muovannut hänen luovuuttaan.

          Loitsut eivät vaadi selityksiä - ne vain ovat. Ne tarjoavat rauhaa kaaoksessa ja tavan kommunikoida, kun sanat eivät riitä.
