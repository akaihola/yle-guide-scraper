      - title: Marko Gustafsson
        start_time: '2026-06-13T17:05:00+03:00'
        end_time: '2026-06-13T17:58:00+03:00'
        description: |
          Huipputrumpetisti Jukka Eskola tekee jopa 200 keikkaa vuodessa ja harjoittelee silti joka päivä. "Rakastan soittamista, mutta joskus toivon, että tulisi aika, jolloin ei tarvitsisi enää pitää niin kurinalaisesti kiinni soittokunnosta", Eskola pohtii. 
          "Trumpetti on vaan niin armoton soitin, että jos haluaa soittaa hyvin, on treenattava joka päivä.",  Jukka toteaa.  
