      - title: Faunin iltapäivä
        start_time: '2026-06-13T16:07:00+03:00'
        end_time: '2026-06-13T16:59:59+03:00'
        description: |-
          Respighi: Gagliarda sarj. Antiche arie e danze per liuto n:o 1 (Vanhoja aarioita ja tansseja) (Los Angelesin kamariork./Neville Marriner).

          Falla: Serenata andaluza (Miguel Baselga, piano).

          Dudley: Medhel an gwyns (Esther Abrami, viulu, ja Itävallan radion SO/Irene Delgado-Jimenez).

          Grandval: Invocation teoks. Deux pieces (Luigi Magistrelli, klarinetti, ja Claudia Bracco, piano).

          Massenet: Des Grieux'n uni "Instant charmant - En fermant les yeux je voix" oopp. Manon (Benjamin Bernheim, tenori, ja Prahan kamarifilharmonia/Emmanuel Villaume).

          Almila: Allegretto scherzando konsertosta kahdelle klarinetille ja puhallinorkesterille (Kimmo Kokkonen ja Asko Heiskanen sekä Kuopion konservatorion puhallinork./Antti Meurman).

          Pejacevic: Allegretto grazioso kvartetosta pianolle ja jousille d-molli (Oliver Triendl ja Quatuor Sine Nomine).

          Gipps: Scherzo konsertosta käyrätorvelle ja orkesterille (David Pyatt ja Lontoon FO/Nicholas Braithwaite).

          Sohlström: Elegia (Kari Lindstedt, sello, ja Seppo Murto, urut).

          Gounod: Siebelin kukkalaulu "Faites-lui mes aveux - Fanée! helas! - C'est en vous que j'ai foi" oopp. Faust (Elina Garanca, mezzosopraano, ja Filarmonica del Teatro Comunale di Bologna/Yves Abel).

          L. Boulanger: D'un jardin clair (Valoisa puutarha) (Margit Rahkonen, piano).

          M. Richter: Summer 1 teoks. Four seasons recomposed (Daniel Hope, viulu, Max Richter, syntetisaattori, ja Konzerthaus Kammerorchester Berlin/André De Ridder).

          Konsertin on toimittanut Annina Aho.
