      - title: 'Keinuva talo - Mika Kauhanen: Kesäfiilis klubilla'
        start_time: '2026-06-22T17:35:00+03:00'
        end_time: '2026-06-22T18:35:00+03:00'
        description: |-
          Kuuma kesäpäivä on takana, hyvä illallinen syötynä ja pimeä laskeutunut. Tekee mieli jatkaa iltaa. Siispä klubille jännittävän musiikin vietäväksi!

          Tiskijukalla on valikoimassaan Natacha Atlasin uutuus, analoginen retrotuokio, Lontoon parhaat, rytmejä Balkanilta, Lattareista ja arabien Pariisista, sekä eteerinen alku uudelle päivälle.

          Toimittajana Mika Kauhanen.
