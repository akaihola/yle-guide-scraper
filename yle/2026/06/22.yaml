      - title: 'Asekauppiaat:  Kuinka AK-47 muutti Afrikan historian'
        start_time: '2026-06-22T19:02:00+03:00'
        end_time: '2026-06-22T19:50:00+03:00'
        description: |-
          Aseen ei tarvitse olla erityisen hyvä, jotta sillä voi hallita. Siksi neuvostoliittolainen rynnäkkökivääri AK-47 valloitti maailman. Näitä toimintavarmoja ja edullisia aseita myi myös Viktor Bout Liberian ja Sierra Leonen sotaherroille, jotka tarvitsivat kättä pidempää timanttikaivosten vartioimiseen. Boutin uskaliaat bisnekset päättyivät lopulta kansainvälisen operaation jälkeen pidätykseen vuonna 2008. 

          Jakson asiantuntijavieraana: yliopistonlehtori Risto Marjomaa Helsingin yliopistosta.
          (v. 2024)
      - title: Mannerheimin agentti
        start_time: '2026-06-22T20:05:00+03:00'
        end_time: '2026-06-22T20:25:00+03:00'
        description: |
          Jakso 4/10: Mannerheimin salainen yhteys.
          Tahvanainen palaa Karjalaan taskussaan Svinhufvudin allekirjoittama henkilökortti ja tehtävänään toimia kuriirina salaisessa viestien vaihdossa Neuvostoliittoon. Keväällä 1933 hänen on palattava takaisin Helsinkiin, jossa hän saa uuden tehtävän matkustaa Viroon tapaamaan Mannerheimin ystäviä. 
