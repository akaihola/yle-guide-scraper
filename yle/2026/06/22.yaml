      - title: 'Tuntematon Baltia: Viro suurlähettiläämme silmin'
        start_time: '2026-06-22T17:05:00+03:00'
        end_time: '2026-06-22T17:30:00+03:00'
        description: |
          Suomen Viron-suurlähettiläs Vesa Vasara valottaa Viron nykytilannetta. Viro on suuntautunut määrätietoisesti Länsi-Eurooppaan, EU:hun ja Natoon. Energiapolitiikka on murroksessa ja koulutusjärjestelmässä tapahtuu myös uudistuksia. Toimittajana on Jari Aula. (es. 2024)
