        start_time: '2026-06-22T13:30:00+03:00'
        end_time: '2026-06-22T15:00:00+03:00'
        description: |-
          Juontajana Jalmari Laine. Maanantai on päivä, jolloin museoiden ovet ovat yleisöltä kiinni, mutta me vierailemme museoissa jatkossa juuri maanantaisin. Marko Miettinen pääsi museokierrokselle arkistopunkkari Teijo Hintikan kanssa Punkmuseoon.
      - title: 'Kulttuuriykkönen: James Bond – kuka on paras ja kuka seuraava?'
        start_time: '2026-06-22T15:00:00+03:00'
        end_time: '2026-06-22T15:58:00+03:00'
        description: |-
          Vakoilijaikoni James Bond on seikkaillut valkokankaalla yli 60 vuotta, eikä eläkeikä näytä häämöttävän. Bond-sarja on yksi maailman tuottoisimmista elokuvasarjoista. James Bondista on julkaistu myös videopelejä ja sarjakuvia.

          Bondia ovat näytelleet mm. Sean Connery, Roger Moore, Pierce Brosnan ja Daniel Craig. Paraikaa etsitään seuraavaa Bondia ja spekulointi käy kuumana kuka valitaan. Kulttuuriykkösessäkin spekuloidaan, mutta puhutaan myös James Bondista kulttuurihistoriallisena ilmiönä ja arvioidaan Bond-näyttelijöitä ja -elokuvia parhaimmasta huonoimpaan. 

          Vieraina ovat Maiju Kannisto Turun yliopistosta, Antti Korpisaari Helsingin yliopistosta, Pirita Maunula, joka on ollut perustamassa Suomen suurinta James Bond-aiheista nettisivustoa. ja etäyhteydellä Benjamin Kalliomäki, joka tekee James Bond -fanielokuvia.

          Lähetyksen juontaa Nicklas Wancke.
