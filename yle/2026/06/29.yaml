      - title: 'Kulttuuriykkönen: Politiikan kova kieli pehmeni kaveruudeksi yhteisellä matkalla Mongoliaan '
        start_time: '2026-06-29T15:00:00+03:00'
        end_time: '2026-06-29T15:58:00+03:00'
        description: |-
          Kansanedustajat Atte Kaleva ja Timo Harakka julkaisivat toukokuussa yhteisen stautspäivirtyksen, jossa he kertoivat olevansa parlamentaarissa tehtävissä matkalla Mongoliaan. Matka Pekingistä Ulaanbaatariin kesti 30 tuntia ja se taittui sulassa sovussa yhteisessä makuuvaunussa. 

          Eduskunnan istuntoja ja kyselytunteja seuratessa syntyy usein vaikutelma, että edustajat eivät erityisemmin pidä toisistaan. Keskustelu on kärjistynyttä, värittynyttä ja polarisoivaa. Kulissien takana todellisuus on monesti toinen.

          Miksi politiikan kieli on kovaa, mikä sitä ohjaa ja mikä vastuu kansakunnan arvokkaimmalla keskustelufoorumilla, eduskunnalla, on yleisessä yhteiskunnallisessa keskustelussa? Onko politiikan keskustelukulttuuri rikki?

          Junamatkatoverit SDP:n Timo Harakka ja Kokoomuksen Atte Kaleva ovat keskustelemassa aiheesta. Ville Talola toimittaa. 
