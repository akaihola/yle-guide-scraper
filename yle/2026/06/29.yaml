      - title: 'Väkivallan markkinat: Kuinka Yhdysvallat aseisti vahingossa Talibania'
        start_time: '2026-06-29T19:02:00+03:00'
        end_time: '2026-06-29T19:50:00+03:00'
        description: |-
          Kaksikymmentä vuotta sotaa tarkoittaa todella montaa laukaistua ohjusta ja ammuttua laukausta. Ja kun aseita kuluu, niitä on ostettava lisää – ja maksettava myös asemiehille palkkaa. Yhdysvallat laittoi Afganistanin sotaan yli 2,3 miljardia dollaria. Lopputuloksena oli entistä vahvempi Taliban, jolle Yhdysvallat jätti 7 miljardin dollarin arvosta sotakalustoa.

          Jaksossa asiantuntijavieraana: Olli Ruohomäki, Ulkopoliittisen instituutin vieraileva johtava asiantuntija ja Ulkoministeriön kehityspolitiikan neuvonantaja.
          (v. 2024)
