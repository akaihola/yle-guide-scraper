      - title: 'Tuntematon Baltia: Latvia - runon ja laulun maa'
        start_time: '2026-06-29T17:05:00+03:00'
        end_time: '2026-06-29T17:30:00+03:00'
        description: |-
          Suomentaja Mirja Hovila on käynyt Latviassa lukemattomia kertoja 1990-luvulta saakka. Latvian laulujuhlaperinteestä syntyi Hovilalle niin suuri innostus Latviaan ja latvian kieleen, että hän opiskeli latvian kielen kääntäjäksi. Toimittaja on Jari Aula.
          (es. 2024)
      - title: Yksi on hyvää seuraa
