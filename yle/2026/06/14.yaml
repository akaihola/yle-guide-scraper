        end_time: '2026-06-14T13:57:00+03:00'
        description: |-
          Taidemusiikin tarinoita kertoo ja purkaa Kare Eskola. Kesän ensimmäiset kolme ohjelmaa ovat uusintoja Välilevyjen aiemmilta retkiltä. Tässä jaksossa etsitään Vantaanjoen fyysiset ja kulttuuriset lähteet pyörällä ja reppulautalla.
