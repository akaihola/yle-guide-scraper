          Hämäläinen: Suvimarssi (Matti Lehtinen, baritoni, Karjalan yhteiskoulun oppilaskuoro ja Radion viihdeork./Kalervo Hämäläinen).  

          Lanner: Die Schmetterlinge (Perhoset) (Ensemble Wien).

          Mendelssohn: Auf Flügeln des Gesanges (Laulun siivin) (Barbara Bonney, sopraano, ja Geoffrey Parsons, piano).

          Netzel: Cantabile ma non troppo lento sonaatista e-molli op.66 (Ola Karlsson, sello, ja Lucia Negro, piano).

          Fougstedt: Sommarvisa (Kesälaulu) (RKK/Timo Nuoranne).

          Linsén: Kezäpäiväne Karjalan mäjel (Jaakko Kortekangas, baritoni, ja Ilkka Paananen, piano).

          Granados: Intermezzo oopp. Goyescas (John Williams ja Timothy Kain, kitara).

          Karjalainen: Paimenpojan karkelo sarj. Kesäisiä kuvia (Aale Lindgren, oboe, ja Mikko Niemi, piano).

          P.J. Hannikainen: Hämyssä kesäisen yön - Iltalaulu (Tapiolan kuoro/Erkki Pohjola).

          Aaltoila: Akselin ja Elinan häävalssi (HKO/Leif Segerstam).

          Konsertin on toimittanut Inari Tilli.
