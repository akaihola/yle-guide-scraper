      - title: 'Maisteri Lindgrenin musiikkiesitelmä: L. Onervan ja L. Madetojan myrskyisät vuodet Lallukan taiteilijakodissa'
        start_time: '2026-06-14T08:05:35+03:00'
        end_time: '2026-06-14T08:58:43+03:00'
        description: |-
          "Juhlarunon Onerva kirjoitti Nikkilän mielisairaalassa. Ja nyt pikkurouva Saimaan rannalla kysyy huolestuneena, miksi työkykyinen L. Onerva oli Nikkilässä ja miksi Leevi Madetoja ei tunnistanut itseään muotokuvastaan eikä ymmärtänyt olleensa oman potrettinsa julkistamistilaisuudessa. Hyviä kysymyksiä, sanon, kuten on tapana sanoa, kun ei tiedä, mitä vastaisi. Turvaudun hätäpäissäni musiikkiin saadakseni lisäaikaa." - Minna Lindgren esitelmöi.
