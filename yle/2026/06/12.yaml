      - title: 'Tinder-lääkäri 2/3: Salaiset treffit sairaalassa'
        start_time: '2026-06-12T17:05:00+03:00'
        end_time: '2026-06-12T17:30:00+03:00'
        description: |
          Linda alkaa tavata lääkäri Aronia yhä uudelleen – usein keskellä yötä, sairaalassa, kesken hänen päivystysvuoronsa. Aron salakuljettaa Lindan sisään takaovesta, ja Linda odottaa lääkärien lepohuoneessa seinän takana, kun Aron hoitaa potilaita.

          Sitten tapahtuu jotain, joka muuttaa kaiken: Linda saa viestin, joka paljastaa, kuinka pitkälle lääkärin vallankäyttö todella ulottuu.
