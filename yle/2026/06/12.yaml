      - title: 'Kotimainen konsertti: Naantalin musiikkijuhlat – Harmonikan hurmio'
        start_time: '2026-06-12T19:02:00+03:00'
        end_time: '2026-06-12T21:00:00+03:00'
        description: |-
          Janne Valkeajoki on hurmannut niin kriitikot kuin yleisöt soittamalla harmonikkaa kuin kapellimestari orkesteria. Valkeajoen sovitukset saivat varauksetonta hehkutusta jopa The New York Timesilta, joka nosti hänen viimeisimmän albuminsa vuoden 2024 parhaiden levyjen listalle. Nyt niitä kuullaan elävänä Rymättylän kirkossa.

          Konsertin kaikki kappaleet palautuvat Ranskaan: Magnus Lindbergin Accordeon Jubilée kumartaa pariisilaisten pianosäveltäjien suuntaan, kun taas Claude Debussyn suosikkikappaleet kohoavat korkeimpiin sfääreihin Valkeajoen omina sovituksina. Aurinkokuninkaan lempisäveltäjän ja Versailles’n hovin seremoniamestarin Jean-Philippe Rameaun musiikki soi harmonikalla hämmentävän hienosti. 

          Konserttiohjelma:

          Magnus Lindberg:
          Accordion Jubilees I-VI (2003/2018)
          Claude Debussy:
          Des pas sur la neige
          Minstrels
          La fille aux cheveux de lin
          Jean-Philippe Rameau:
          Nouvelles Suites de Pièces de Clavecin (1726-1727) sarja a-molli
          I Allemande
          II Courante
          III Sarabance
          IV Les Trois Mains
          V Fanfarinette
          VI La Triomphante
          VII Gavotte et six Doubles

          Janne Valkeajoki, harmonikka 

          Kuva: © Pietari Purovaara
