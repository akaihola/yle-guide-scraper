      - title: 'Tiedeykkönen: Me vs. muut – ryhmään kuuluminen määrittää meitä salaa,  mutta  voimme kurottaa sen yli'
        start_time: '2026-06-12T12:05:00+03:00'
        end_time: '2026-06-12T12:55:00+03:00'
        description: |-
          Ihmisellä on voimakas tarve kuulua ryhmään – olla me. Miten yhteistyötä rakennetaan yli ryhmärajojen?

          Asiantuntijoina on sosiaalipsykologian apulaisprofessori Katarina Pettersson Helsingin yliopistosta, filosofi, apulaisprofessori Frank Martela Aalto-yliopiston Tuotantotalouden laitokselta ja väitöskirjatutkija Emil Salovuori Kuopion ja Turun yliopistosta. Toimittajana on Pirjo Koskinen. 
