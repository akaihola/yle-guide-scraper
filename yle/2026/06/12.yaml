      - title: 'Maisteri Lindgrenin musiikkiesitelmä: L. Onervan ja L. Madetojan myrskyisät vuodet Lallukan taiteilijakodissa'
        start_time: '2026-06-12T11:00:00+03:00'
        end_time: '2026-06-12T11:55:00+03:00'
        description: |-
          "Tuon juhlarunon Onerva kirjoitti Nikkilän mielisairaalassa. Ja nyt pikkurouva Saimaan rannalla kysyy huolestuneena, miksi työkykyinen L. Onerva oli Nikkilässä ja miksi Leevi Madetoja ei tunnistanut itseään muotokuvastaan eikä ymmärtänyt olleensa oman potrettinsa julkistamistilaisuudessa. Hyviä kysymyksiä, sanon, kuten on tapana sanoa, kun ei tiedä, mitä vastaisi. Turvaudun hätäpäissäni musiikkiin saadakseni lisäaikaa." - Minna Lindgren esitelmöi.
