      - title: 'Maailma tarinoina: Miksi Mulholland Drive vainoaa meitä yhä?'
        start_time: '2026-06-04T12:05:00+03:00'
        end_time: '2026-06-04T13:00:00+03:00'
        description: |-
          David Lynch edusti amerikkalaistaiteilijoiden sukupolvea, joka koki vetoa itämaiseen henkisyyteen vaihtoehtona aiemmille uskomuksille ja arvoille. Tämä näkyi ohjaajan elämässä ja tuotannossa, kuten elokuvassa Mulholland drive, joka sekin nyrjäyttää katsojan odotukset elokuvakerronnasta unenomaisella maailmallaan. Miten Lynchin taidetta voi tulkita myytin ja rituaalin käsitteiden kautta? Miksi Lynch kuvasi henkisessä hajoamispisteessä olevia naisia ja Hollywoodin pimeää puolta? Voiko ohjaajaa kritisoida kulttuurisesta omimisesta tai seksismistä?

          David Lynchin omaleimaista tyyliä ja vaikuttimia sen taustalla hahmottavat Marja Vehkasen vieraina kirjailija, toimittaja Jani Saxell ja sosiaali- ja kulttuuriantropologi Emmi Huhtaniemi.
