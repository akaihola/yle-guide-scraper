      - title: 'Radio 1:n iltapäivä: Suomijazz täyttää 100 vuotta - vieraana Suomen Jazzliiton pj Jari Perkiömäki'
        start_time: '2026-06-04T13:30:00+03:00'
        end_time: '2026-06-04T15:00:00+03:00'
        description: |+
          Radio 1:n iltapäivässä onnitellaan satavuotiasta Suomijazzia. Iltapäivän vieras on Suomen Jazzliiton pj Jari Perkiömäki. Hän tuntee jazzin Suomeen rantautumisen historian ja on seurannut kotimaisen jazzin kehitystä vuosikymmenten aikana monessa eri roolissa. Perkiömäki on ensimmäinen Sibelius-Akatemian jazzosastolta tohtoroitunut jazzmuusikkoja on itse elänyt monia jazzin kehityksen vuosikymmeniä aktiivisena toimijana kentällä. Hän toimi myös 5-vuotiskauden Taideyliopiston rehtorina. Haastattelijana Kati Turtola.

          N. klo 14:30  Taiteilija Anssi Kasitonni kertoo erityisen vaikuttavista kulttuurikokemuksistaan. Toimittajana Marko Miettinen. Miia Lahti juontaa.


      - title: 'Kulttuuriykkönen: Leena Lehtolainen aloitti kirjailijanuransa jo 12-vuotiaana - Miten nykyään tullaan kirjailijaksi?'
        start_time: '2026-06-04T15:00:00+03:00'
        end_time: '2026-06-04T15:58:00+03:00'
        description: |
          Leena Lehtolainen on ollut kirjailija 50 vuoden ajan. Hänen uransa käynnistyi nuorten kirjasta, mutta parhaiten Lehtolainen tunnetaan dekkareistaan. Lehtolainen ei ole aktiivinen somessa, vaan tapaa lukijoita mieluiten tapahtumissa.
          Linnea Kuuluvainen puolestaan on julkaissut kaksi romaania.Hänelle sosiaalinen media on nykyään tärkeä väline, jonka kautta voi jakaa ajatuksiaan ja tavoittaa lukijoita.
          Miten kustannusmaailma on muuttunut, miten nykyään aloitetaan kirjailijanura? Näihin kysymyksiin on vastaamassa myös Tammen kotimaisen kirjallisuuden kustantaja Petra Maisonen.
          Ohjelman juontaa Miia Gustafsson.
