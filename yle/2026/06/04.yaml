        start_time: '2026-06-04T21:31:00+03:00'
        end_time: '2026-06-04T22:20:00+03:00'
        description: |
          Mikä saa meidät käyttäytymään niin kuin me käyttäydymme? Mikä saa meidät tuntemaan, niin kuin me tunnemme? Keski-ikäinen, korsolainen koomikko ja nuori, Oulusta kotoisin oleva sarjakuvablogisti vaikuttavat ehkä pintapuolisesti tarkasteltuina olevan hyvin kaukana toisistaan, eivätkä pelkästään elämänkokemuksiltaan, vaan myös luonteenpiirteiltään, mutta heitä yhdistää ainakin yksi yhteinen kokemus: lapsuus alkoholistiperheessä. Toteutus: Pauliina Motturi, Kai Rantala ja Hannu Karisto. (es. 5.2.2015)
