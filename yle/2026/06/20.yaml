      - title: 'Musiikkikamari: Klassisen musiikin helmiä'
        start_time: '2026-06-20T19:02:00+03:00'
        end_time: '2026-06-20T21:00:00+03:00'
        description: |+
          Merikanto: Hennan keinulaulu (Campanella/Aino Loppela).

          Palmgren: Kesäkuu "Juhannussalon ympärillä", sarjasta Aurinkoa ja pilviä (Izumi Tateno, piano).

          Kansanlaulu (sov. Alfven): Uti vår hage (Alankomaiden nuorisokuoro/Eric Ericson).

          I. Hannikainen: Helvin ja Heikuran duetto "Oli juhla ja juhannusilta" näyt. Talkootanssit (Merja Wirkkala, sopraano, ja Juha Kotilainen, baritoni, sekä RSO/Petri Sakari).

          O. Merikanto: Mä oksalla ylimmällä (Izumi Tateno, piano).

          Pylkkänen: Sydänsuvella sarj. Kesäisiä kuvia (RSO/Petri Sakari). 

          Mendelssohn: Osia näytelmämus. Kesäyön unelma (Kathleen Battle, sopraano, Frederica von Stade, mezzosopraano, Judi Dench, puhe, sekä Tanglewoodin musiikkijuhlien kuoro ja Bostonin SO/Seiji Ozawa).

          Beethoven: Sinfonia n:o 6 F-duuri (Pastoraali) (RSO/Sakari Oramo).

