        start_time: '2026-06-20T15:00:00+03:00'
        end_time: '2026-06-20T15:20:00+03:00'
        description: |
          Osa 3/8 Jouluaatto 
          Herra Elton tuo Hartfieldiin sana-arvoituksen ja Emma uskoo, että sen tarkoitus on kertoa Harrietille kirkkoherran tunteista. Herra ja rouva Weston kutsuvat ystäviään jouluillalliselle, joille kaikkien ihmetykseksi herra Westonin poika Frank ei pääse. Menomatkalla herra Knightley kiinnittää huomiota herra Eltonin käytökseen ja paluumatkalla Emmalle selviää mistä käytöksessä onkaan todella kyse.    
