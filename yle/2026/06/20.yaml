      - title: 'Virtasen taloushistoria: Operaatio Esteri 1967'
        start_time: '2026-06-20T11:00:00+03:00'
        end_time: '2026-06-20T11:55:00+03:00'
        description: |
          Operaatio Esteri 1967 - miksi, miten ja mitä siitä eli vuoden 1967 devalvaatiosta seurasi? Kuinka devalvaatiot toisen maailmansodan jälkeen piristivät Suomen taloutta? Miten valuutan kellutus eroaa devalvaatiosta? Vieraana tohtori Antti Suvanto. Toimittaja on Juha Virtanen.
