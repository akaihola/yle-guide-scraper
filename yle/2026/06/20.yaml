        start_time: '2026-06-20T16:07:00+03:00'
        end_time: '2026-06-20T16:59:59+03:00'
        description: |-
          O. Merikanto: Onnelliset (YL/Matti Hyökki, sekä Christoffer Sundqvist, klarinetti).

          Nykänen (sov.): Jo joutui armas aika (Jukka Nykänen, piano). 

          Andrée: Allegro grazioso pastorale teoks. Sommarminnen (Kesämuistoja) (David Bergström ja Mattias Johansson, viulu, Bengt Ersson, alttoviulu, Lars-Erik Persson, sello, sekä Mats Larsson, kontrabasso).

          Backer-Gröndahl: Sommervise (Kesälaulu) (Islannin SO/Bjarte Engeset).

          Linsén: Kesäpäivä Kangasalla (Matti Lehtinen, baritoni, ja Pentti Koskimies, piano).

          Peterson-Berger: Sommarsång (Suvilaulu) sarj. Frösöblomster (Frösön kukkia) (Berliinin valtionoopperan ork./Armas Järnefelt).

          Brynnel: Midsommarvals (Sunniva Brynnel, harmonikka, Timo Alakotila, piano, Risto Salmi, sopraanosaksofoni, Hannu Rantanen, kontrabasso).

          Kilpinen: Kesäyö (Soile Isokoski, sopraano, ja Marita Viitasalo, piano).

          M. Richter: Summer 3 teoks. Four seasons recomposed (Daniel Hope, viulu, Max Richter, syntetisaattori, ja Konzerthaus Kammerorchester Berlin/André De Ridder).

          A. Merikanto: Kesäyö (Tuuli Takala, sopraano, ja Tuula Hällström, piano).

          Piazzolla: Verano porteno (Kesä) teoks. Las cuatro estaciones portenas (Buenos Airesin neljä vuodenaikaa) (Tianwa Yang, viulu, ja Nashvillen SO/Giancarlo Guerrero).

          O. Merikanto: Kesäillan valssi (Pekka Kuusisto, viulu, ja Jaakko Kuusisto, piano).

          Konsertin on toimittanut Annina Aho.
