      - title: 'Urkuyö & Aaria: Juhannusiltamat'
        start_time: '2026-06-19T19:02:00+03:00'
        end_time: '2026-06-19T20:15:00+03:00'
        description: |
          Mari Palo, sopraano, Marko Hilpo, piano, Esa Pietilä, saksofoni. Ohjelmassa kuullaan kesäistä laulu- ja instrumentaalimusiikkia. Mukana on Ralf Gothóninin sovituksia suomalaisista kansanlauluista, Oskar Merikannon rakastettuja yksinlauluja sekä tietysti iki-ihana Kesäillan valssi. Konsertissa kuullaan myös Esa Pietilän soolosaksofonille säveltämä Sphere sekä Astor Piazzollan ja Johan Sebastian Bachin musiikkia. Kesäillan tunnelmissa myös yleisö pääsee laulamaan muusikoiden kanssa yhteislaulujen merkeissä. Nauhoitettu 20.6. Espoon tuomiokirkossa. Konsertin toimittaa Charlotta Hagfors. Uusinta vuodelta 2024.
