      - title: 'Tiedeykkönen: Miksi osa vihaa ja osa rakastaa liikuntaa? Liikuntapsykologia löytää yllättäviä vastauksia'
        start_time: '2026-06-19T12:05:00+03:00'
        end_time: '2026-06-19T12:55:00+03:00'
        description: |-
          Mistä kaikesta liikunnan merkityksellisyys kumpuaa? Entä miten lapsuuden koululiikuntakokemukset voivat vaalia tai vaurioittaa liikuntasuhdetta. Haastateltavana liikuntapsykologian professori Noora Ronkainen Bernin yliopistosta ja apulaisprofessori Mikko Huhtiniemi Jyväskylän yliopistosta. Toimittajana on Jaro Asikainen.
      - title: 'Tuntematon Baltia: Viro - sittenkin melko kaukainen'
        start_time: '2026-06-19T13:00:00+03:00'
        end_time: '2026-06-19T13:30:00+03:00'
        description: |
          Toimittaja Annina Wallius kertoo Viron arkipäivästä ja eroista Suomeen verrattuna. Virossa elämänlaatu on kohentunut huomattavasti sitten neuvostoaikojen ja talous porskuttaa. Välimatkaa Suomeen on silti - Viroa ei kuitenkaan vielä voi pitää Pohjoismaana. Toimittajana on Jari Aula.
      - title: 'Radio 1:n iltapäivä: Kirjani tarina - kirjailija Laura Anderssonin Tähtipölyyn kirjoitettu -romaani'
        start_time: '2026-06-19T13:30:00+03:00'
        end_time: '2026-06-19T15:00:00+03:00'
        description: |+
          Juontajana Jalmari Laine. Laura Anderssonin kirja Tähtipölyyn kirjoitettu puhaltaa tähtipölyä ja glamouria vanhan Helsingin ylle.  Film noirin pitkien varjojen ja suomifilmin glamourin ympärille kietoutuvan romaanin kirjoittanut Laura Andersson on Kirjani tarina -ohjelman vieraana. Toimittajana Jukka Kuosmanen. N. klo 14:30  Päivi Pälvimäki on Suomen Ladun avovesiuintivastaava, joka ui avovesissä vuoden ympäri. Pari vuotta sitten ilmestyneessä kirjassaan Uintiretkellä avovesissä Pälvimäki antaa mm. vinkkejä siihen, miten retkeillä uiden.  Miia Lahti toimittaa. Haastattelu on ote 26.5. kuullusta ohjelmasta.


