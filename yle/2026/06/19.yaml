        description: |
          Mari Palo, sopraano, Marko Hilpo, piano, Esa Pietilä, saksofoni. Ohjelmassa kuullaan kesäistä laulu- ja instrumentaalimusiikkia. Mukana on Ralf Gothóninin sovituksia suomalaisista kansanlauluista, Oskar Merikannon rakastettuja yksinlauluja sekä tietysti iki-ihana Kesäillan valssi. Konsertissa kuullaan myös Esa Pietilän soolosaksofonille säveltämä Sphere sekä Astor Piazzollan ja Johann Sebastian Bachin musiikkia. Kesäillan tunnelmissa myös yleisö pääsee laulamaan muusikoiden kanssa yhteislaulujen merkeissä. Nauhoitettu 20.6.2024 Espoon tuomiokirkossa. Konsertin toimittaa Charlotta Hagfors. Uusinta vuodelta 2024.
