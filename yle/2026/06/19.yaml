      - title: 'Maisteri Lindgrenin musiikkiesitelmä: Sekaisin chalumeausta'
        start_time: '2026-06-19T11:00:00+03:00'
        end_time: '2026-06-19T11:55:00+03:00'
        description: |-
          "Te ette innostu, huomaan. Pilli kuin pilli, te sanotte, ja niinhän ihmiskunta on etupäässä ajatellut, sillä näitä erilaisia suoria soivia pillejä on tosiaan vielä 1600-luvulla niin villi sekamelska, että vain hullu musiikkitieteilijä alkaa niitä luokitella löytämättä silti jokaiselle omaa lokeroa. Jos pommeriperhe jäi vaivamaan mieltänne, voitte oikoen ajatella, että koko suku on nykyisen oboen esi-isiä. Tai äitejä, esiäitejä, sanokaamme siis esivanhempia. Toinen on tilanne chalumeaun kohdalla." - Minna Lindgren esitelmöi.
