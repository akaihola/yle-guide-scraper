          Juontajana Miia Lahti.
          Nousevan artistin on erottauduttava muusta massasta yksilöllisellä tyylillään. Nuori musiikintekijä Alma Alanko haluaa tehdä popmusiikkkia, joissa lauletaan vakavista asioista. Taiteilijaperheen kasvatti kertoo inspiroituvansa ihmisistä, kirjoista, hyvästä musiikista ja kiinnostavista sanoista. Alma Alanko on studiovieraana n. klo 14.

