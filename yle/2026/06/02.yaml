      - title: Maailmanpolitiikan arkipäivää
        start_time: '2026-06-02T20:35:00+03:00'
        end_time: '2026-06-02T21:00:00+03:00'
        description: |-
          Afrikassa terveysviranomaiset kamppailevat estääkseen ebolaepidemian laajenemisen. Epäiltyjä tartuntoja on raportoitu jo noin tuhat, pääasiassa Kongon demokraattisessa tasavallassa. Maailman terveysjärjestö, WHO on varoittanut viruksen leviävän nyt nopeasti.

          Afrikan tartuntatautiviraston tavoite on, ettei virus leviäisi kolmea maata, Kongon demokraattista tasavaltaa, Ugandaa ja Etelä-Sudania pidemmälle. Afrikkalaisvirologi arvioi ohjelmassa leviämisriskejä.

          Keski-Afrikassa sijaitsevassa Kongon demokraattisessa tasavallassa on menossa jo seitsemästoista ebolaepidemia kuluneen 50 vuoden aikana. Tästä huolimatta alueella on tietovajetta viruksen tarttumisesta. Esimerkiksi perinteiset hautauskäytännöt edesauttavat ebolan leviämistä.

          Ohjelmassa otetaan yhteyksiä Kongon demokraattiseen tasavaltaan ja kuullaan kahdelta avustustyöntekijältä, miten he vaikeassa tilanteessa toimivat.

          Nyt leviävään ebolavirustyyppiin, Bundibugyoon, ei ole olemassa lääkehoitoa eikä rokotetta. Kansainvälisen rokoteallianssin, Gavin johtaja arvioi ohjelmassa, milloin tähän virustyyppiin voisi olla saatavilla rokote.

          Maailmanpolitiikan arkipäivää -ohjelman on toimittanut Paula Vilén. Äänitarkkailijana on Laura Koso. Tunnusmusiikki: Petri Alanko, kuva: Tuuli Laukkanen/Yle.
