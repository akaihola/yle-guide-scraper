      - title: 'Maarit Tastula - Yksi maailma, kaksi katsetta: Hannele Törrönen ja Johanna Annola'
        start_time: '2026-06-02T10:00:00+03:00'
        end_time: '2026-06-02T10:55:55+03:00'
        description: |
          Hannele Törrönen ja Johanna Annola: Äpärä! Aviottomat lapset ja yli sadan vuoden häpeä

          Olisi ollut parempi, jos et olisi koskaan syntynyt, muisteli aviottomana syntynyt lapsi äitinsä sanoja. Myös yhteisö tuomitsi usein lapsen  äpäräksi tai pikkuhuoraksi. Psykoterapeutti Hannele Törrönen syntyi itse aviottomana lapsena 1950-luvun Suomeen ja oli edeltäjiään onnekkaampi. Biologinen isä piti yhteyttä ja maksoi elatusmaksuja eikä äiti lapsineen joutunut köyhäinhoidon asiakkaaksi tai langenneiden naisten taloon, kuten historioitsija Johanna Annolan tutkimat naiset yli sata vuotta sitten. 

          Miehet joutuivat harvoin vastuuseen lapsistaan, kun taas raskaana oleva nainen menetti usein työnsä. Äidit saattoivat viedä hautaan tiedot lapsen isästä. DNA-testien avulla moni yrittää nyt selvittää biologista alkuperäänsä. mutta voi törmätä yhä vaikenemisen muuriin.  
