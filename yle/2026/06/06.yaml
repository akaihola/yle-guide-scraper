      - title: 'Kirjani tarina: Olli Jalonen - Puhdas viiruinen elämä'
        start_time: '2026-06-06T07:30:41+03:00'
        end_time: '2026-06-06T07:53:02+03:00'
        description: |-
          Tarkkanäköinen Puhdas viiruinen elämä -romaani kertoo kuinka vuoden 1918 sisällissodan kipeiden muistojen kanssa eläminen vaikuttavat Hämeenlinnan Rinkelinmäellä asuvien ihmisten elämään. Omaa arkeaan elävät romaanin henkilöt eivät tule edes ajatelleeksi kuinka vähän heidän elämänsä tapahtumissa on kyse heidän omista valinnoistaan, kun ensimmäisen maailmansodan tapahtumien vaikutukset saapuvat Hämeenlinnaan asti.

          Toimittaja Jukka Kuosmanen vieraana on Puhdas viiruinen elämä -romaanin kirjoittanut kirjailija Olli Jalonen.
