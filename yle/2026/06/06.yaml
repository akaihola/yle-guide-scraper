        description: |
          Osa 1/8. Amorin asialla
          Highburyn kylässä asuvan nuoren Emma Woodhousen mieluisin ajanviete on järjestellä muiden ihmissuhdeasioita, mutta osaako hän todella toimia amorin apulaisena? Emma päättää vakuuttaa epäilijänsä, etenkin naapurissa asuvan herra Knightleyn, ja järjestää kodissaan Hartfieldissa juhlat. Juhliin kutsutaan Emman suunnitelmiin sopivat kohteet: nuori kirkkoherra Elton ja läheisen tyttökoulun sievä Harriet Smith.  
