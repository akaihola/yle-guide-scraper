        start_time: '2026-06-06T16:07:00+03:00'
        end_time: '2026-06-06T16:59:59+03:00'
        description: |-
          Kats-Chernin: Eliza Aria bal. Wild swans (Villijoutsenet) (Angèle Dubeau, viulu, ja La Pietà).

          Mana-Zucca: Wistaria (Nanette Kaplan Solomon, piano).

          Stravinsky: Anne Truloven resitatiivi ja aaria "No word from Tom - Quietly, night, o find him" oopp. The Rake's Progress (Hulttion tie) (Helena Juntunen, sopraano, ja RSO/Pietro Rizzo).

          Belli: Telemachus teoks. Ithaca suite (Eldbjörg Hemsing, viulu, ja Olivia Belli, piano).

          Gabrieli: Sonaatti n:o 13 (Empire Brass Quintet sekä Bostonin SO:n ja New Yorkin FO:n jäseniä/Rolf Smedvig, trumpetti). 

          Wagenseil: Allegro assai sonaatista kolmelle sellolle ja kontrabassolle n:o 1 D-duuri (Piccolo Concerto Wien/Roberto Sensi).

          Puccini: Rinuccion aaria "Avete torto - Firenze e come un albero fiorito" oopp. Gianni Schicchi (Vittorio Grigolo, tenori, ja Parman Teatro Region ork./Pier Giorgio Morandi).

          V. Aulin: Romanza (Romanssi) (Lucia Negro, piano).

          C. Shaw: And the swallow (United Strings of Europe/Julian Azkoul).

          Tuntematon: Cockleshells (David Douglass, viulu, Paul O'Dette, arkkiluuttu, ja Andrew Lawrence-King, harppu).

          Beethoven (sov.): Bonnie laddie, highland laddie (Komea poika, ylämaan poika) kok. 25 Schottische Lieder (Carolyn Watkinson, altto, Christian Altenburger, viulu, Julius Berger, sello, ja Helmut Deutsch, piano).

          Somervell: Allegro kons. pianolle ja orkesterille a-molli (Highland) (Martin Roscoe ja BBC:n Skotlannin SO/Martyn Brabbins).

          Konsertin on toimittanut Annina Aho.
