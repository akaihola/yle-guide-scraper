        description: |
          Monille varakkaille rahan kuluttaminen aiheuttaa maksamisen tuskaa. Ostoksesta saatu mielihyvä jää usein pienemmäksi kuin sen maksamisen aiheuttama mielipaha. 
          Miten säästeliääseen elämään tottunut ihminen voi oppia uusille tavoille eli kuluttamaan?
          Aalto-yliopiston kauppakorkeakoulun rahoituksen professori Vesa Puttonen on kirjoittanut aiheesta kirjan nimeltään Miten miljoona hankitaan ja kulutetaan.
