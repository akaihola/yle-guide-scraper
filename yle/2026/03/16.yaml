      - title: 'Elävä historia: Syntiä vai luonnollisuutta - kuinka alastomuudesta ja seksistä tuli häpeällistä'
        start_time: '2026-03-16T12:05:00+02:00'
        end_time: '2026-03-16T12:55:00+02:00'
        description: |
          Raamatun luomiskertomuksessa Aatami ja Eeva huomaavat olevansa alasti ja kauhistuvat. Apuun tulee viikunapuu, joka tarjoaa alastomien vartaloiden peitteeksi lehtiään. Tästä mytologisesta tarinasta alkaa alastomuuden ja seksin kauhistelu. 

          Kristinusko istutti alastomuuden häpeän myös kansoihin, jotka olivat eläneet lämpimässä ja tarvinneet vain vähän vaatteita suojakseen. Heille uskoteltiin, että vaatteet tekevät ihmisestä sivistyneen. 

          Viktoriaaninen aika suhtautui alastomaan kehoon lähes hysteerisesti. Erityisesti naisten oli peitettävä vartalonsa, jottei heidän hallitsemattomana pidetty seksuaalisuutensa olisi vietellyt miehiä. Mutta millainen suhde alastomuuteen ja seksiin Euroopassa oli ennen viktoriaanista aikaa, 1600- ja 1700-luvuilla? 

          Häpeä ei ollut ainoa syy peittää keho vaatteilla. 1600-luvulla ymmärrys ihmiskehosta perustui humoraaliteoriaan, jossa esimerkiksi liiallisen peseytymisen uskottiin olevan haitallista. Usein syyt paksuihin vaatekerroksiin olivat myös käytännöllisiä: Asunnot olivat kylmiä, eikä edes seksin vuoksi tarvinnut riisuutua, sillä alushousut olivat vasta tulossa. 

          Entä miten oli mahdollista, että alastomuus oli kuitenkin sallitua veisto- ja maalaustaiteessa, porvariskotien seinillä ja kirkkojen pyhimyskuvissa? Ja mikä alastomuudessa eri aikakausina on ollut niin kiusallista?

          Asiantuntijat: Kulttuurihistorian dosentti Anu Korhonen, sekä taidehistorioitsija FT Ville Hakanen 

          Toimittaja: Liisa Vihmanen
          Äänisuunnittelu: Katri Koivula
          Arkistotoimittaja: Outi Kortelainen
      - title: 'Politiikkaradio: Varautuiko Suomi vuosikausia menneisyyden sotiin?'
        start_time: '2026-03-16T13:00:00+02:00'
        end_time: '2026-03-16T13:30:00+02:00'
        description: |
          Toinen maailmansota alkoi kaksitasolentokonein ja päättyi neljässä vuodessa suihkuhävittäjiin ja raketteihin. Venäjän hyökkäys Ukrainassa käynnistyi perinteisin taktiikoin, jotka menettivät parissa vuodessa merkityksensä. Ollaanko Suomessa varauduttu läpi 2000-luvun sotaan jollaisia ei enää käydä?

          Olisiko kansakunnan vähät varat pitänyt laittaa kalliiden F-35 hävittäjien ja monitoimikorvettien sijaan drooneihin tai muihin sotateknologioihin?

          Hukkasiko Suomi 2020-luvulla strategisen punaisen langan? Miksi yhden totuuden maana tunnetun Suomen pitäisi ottaa mallia Ruotsista?

          Putoaako Puolustusvoimat teknologisen kehityksen kyydistä ellei diginatiivia upseerisukupolvea päästetä päättämään?

          Vieraana on Koneiden sota -kirjan tekijä, Puolustusvoimien entinen tutkimusjohtaja Jyri Kosola. Toimittajana on Tapio Pajunen.
      - title: 'Radio 1:n iltapäivä: Sampo Marjomaa ihmettelee nyt katsojien kanssa kansanperinnettä'
        start_time: '2026-03-16T13:30:00+02:00'
        end_time: '2026-03-16T15:00:00+02:00'
        description: |-
          Juontajana Jalmari Laine. Sampo Marjomaa käsikirjoitti ja juonsi sarjan "Koti, uskonto ja Marjomaa". Marjomaan mukaan kansakunnallamme on sykkivät ja mehukkaat juuret, mutta suhtautumisessamme niihin on parantamisen varaa. Uudessa tv-sarjassaan Marjomaa puhaltaa pölyjä pois vanhoista tarinoista. Kati Turtola haastattelee. 
      - title: 'Kulttuuriykkönen: Mitä tapahtuu kun ihmismieli on uusi taistelukenttä? '
        start_time: '2026-03-16T15:00:00+02:00'
        end_time: '2026-03-16T15:55:00+02:00'
        description: |-
          Tulevaisuuden taistelutantereet ovat juoksuhautojen sijaan yhä enenevässä määrin ihmisten korvien välissä. Tässä yhteydessä puhutaan kasvavassa määrin kognitiivisesta turvallisuudesta, jolla tarkoitetaan yhteiskunnan kykyä suojautua ihmismieleen kohdistuvalta vaikuttamiselta. 

          Kyse ei ole vain väärästä tiedosta, vaan siitä, miten informaatio muokkaa käsityksiämme todellisuudesta, synnyttää tunteita ja ohjaa päätöksiä. Digitaalisessa ympäristössä mielipiteisiin voidaan vaikuttaa nopeammin ja tarkemmin kuin koskaan – algoritmien, sosiaalisen median, disinformaation ja tekoälyn avulla.

          Aiheesta julkaistaan tässä kuussa artikkeliteos, jonka kirjoittajista ovat lähetyksessä keskustelemassa Jyväskylän yliopiston tutkijatohtori Teemu Häkkinen, yliopistotutkija Niina Meriläinen Tampereen yliopistosta sekä Maanpuolustuskorkeakoulun apulaisprofessori Matti Puranen. Ville Talola toimittaa.
