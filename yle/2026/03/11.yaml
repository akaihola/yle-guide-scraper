        start_time: '2026-03-11T22:21:00+02:00'
        end_time: '2026-03-11T22:55:45+02:00'
        description: |-
          Voiko kukaan saada hiljaisen todistajan puhumaan? Nuori Sorjonen saa uransa ensimmäisen murhatapauksen: kadoksissa ollut poika löytyy, mutta trauma on sulkenut hänet omaan maailmaansa. Karin on löydettävä uusi tapa lähestyä uhria ja onnistuessaan hänen unelmansa toteutuu – ensimmäinen oikea rikostutkinta. 

          Päärooleissa:
          Kari Sorjonen: Elias Gould
          Outi Lanki: Maria Sid
          Heikkinen: Samuli Niittymäki
          Pauliina Rajala: Anna Böhm
          Pietari: Kristo Salminen
          Waltteri: Vertti Uusitalo
          Kristian: Kuura Rossi

          Muissa rooleissa:
          Sari Puumalainen, Janne Reinikainen, Hannes Suominen, Saara Kotkaniemi, Tatu Siivonen, Eino Heiskanen, Anni Turunen, Katariina Havukainen, Marc Gassot, Reidar Palmgren, Ville Virkkunen, Peter Kanerva, Jasmin Hamid, Hilma Kotkaniemi, Arttu Kapulainen, Minka Kuustonen, Tarja Heinula, Tobias Holmberg, Aarne Lehti, Jarno Kovamäki, Sanna Maksimainen, Maria Nieminen, Juha Nurmela, Saaga Salo, Olli Sultiala, Matti Halonen, Pekka Ruohoranta, Nika Savolainen, Kari Kaarila, Kirsi Ryyppö, Ilkka Hautala, Edvin Salo, Henna Valkeamäki, Maija Paunio, Anni Turunen. 
      - title: 'Ulkolinja-podcast: El Salvadorissa keskenmenosta voi saada murhatuomion'
        start_time: '2026-03-11T23:25:19+02:00'
        end_time: '2026-03-11T23:38:58+02:00'
        description: |
          El Salvadorissa on maailman tiukimpiin kuuluva aborttilaki, joka kieltää raskauden keskeytyksen kaikissa tilanteissa, myös silloin, kun kyse on raiskauksesta tai raskaus vaarantaa äidin hengen. Tuomiot ovat usein vuosikymmenten mittaisia, ja tuomion voi saada myös keskenmenon tai synnytyskomplikaatioiden vuoksi.

          Maija Salmi tapasi El Salvadorissa syyttömänä seitsemän vuotta vankilassa istuneen Marian ja paikallisen asianajajan, joka puolustaa naisia yhä vaikeammaksi muuttuneessa ihmisoikeustilanteessa.

          Toimittaja: Maija Salmi
          Äänisuunnittelija: Anssi Tamminen 
          Tuottaja: Marko Lönnqvist 
