      - title: 'Radio 1:n iltapäivä: Studiovieraana matkailun tutkija ja höyrylaivan kapteeni  Mikko Manka - interrail-muistoista, kulttuurimatkoista ja höyrylaivoista'
        start_time: '2026-03-11T13:30:00+02:00'
        end_time: '2026-03-11T15:00:00+02:00'
        description: |-
          Juontajana Joni Timonen. Kevät kolkuttelee ovella ja matkakuume saattaa alkaa vaivata. Avartaako matkailu edelleen? Minkälaiset matkat jäävät mieleemme? Miksi interrail oli aikoinaan niin vaikuttava elämys? Väitöskirjatutkija Mikko Manka selvittää tutkimuksissaan suomalaisen matkailun historiatutkimusta, matkailun ja kulttuurin kytköstä sekä kirjoittanut mm. kirjan Interrail-muistoista. 
      - title: 'Kulttuuriykkönen: Bride ja feministinen Frankenstein'
        start_time: '2026-03-11T15:00:00+02:00'
        end_time: '2026-03-11T15:55:00+02:00'
        description: |-
          Maggie Gyllenhaal on ohjannut railakkaan punk-henkisen uusintaversion The Bride of Frankensteinista. The Bride! on alleviivatun voimakkaasti #metoo-elokuva.
          Keskustelua elokuvasta, naisnäkökulmasta Frankensteinin tarinaan, Frankensteinin morsiamen hahmon historiasta, #metoosta elokuvissa sekä tämän elokuvan suhteesta alkuperäiseen The Bride of Frankensteiniin. 
          Keskustelemassa kirjailija Tiina Raevaara, elokuvatutkija Jari Sedergren, kirjallisuuden tutkija, feministisen kauhupiirin jäsen Noora Vaakanainen.
          Jussi Ahlroth toimittaa.
