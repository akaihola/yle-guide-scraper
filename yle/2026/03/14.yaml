      - title: 'Kalle Haatanen: Ristiretkien historiaa'
        start_time: '2026-03-14T14:00:00+02:00'
        end_time: '2026-03-14T14:55:00+02:00'
        description: |-
          Ensimmäinen ristiretki (1096-1099) oli ristiretkistä ainoa, joka saavutti alkuperäisen tavoitteensa, Jerusalemin valloituksen.

          Ristiretket eivät olleet vain kirkon ja kuninkaiden projekteja. Monille tavallisille ihmisille matka itään merkitsi myös pyhiinvaellusta, katumusta ja hengellistä koettelua.

          Ristiretket ovat vaikuttaneet laajasti käsitykseemme keskiajasta, ja aikakauden perintö elää vieläkin käsityksissämme pyhästä maasta.

          Sini Kangas on perehtynyt ristiretkiin, väkivaltaan ja valtarakenteisiin keskiajan eurooppalaisissa yhteiskunnissa.
