      - title: 'Luomiskertomus: Matti Lainen - Verilinja'
        start_time: '2026-03-14T07:30:41+02:00'
        end_time: '2026-03-14T07:52:08+02:00'
        description: |-
          Verilinja-romaanin tarinassa turvayhtiön suojelema henkilö murhataan. Myöhemmin käy ilmi, että turvapalveluja tarjoava yhtiö ei olekaan sitä mitä voisi olettaa. Vakoilutrillerimäisen romaanin Suomesta aina Berliiniin ja Sveitsiin ulottuvat valehenkilöllisyydet, pimeät rahansiirrot ja hämärät kuolemat tekevät Verilinjasta monella tapaa kovan toiminnan miesten ja naisten leikkikentän. 

          Luomiskertomuksen vieraana on Verilinja-romaanin kirjoittanut kirjailija näyttelijä Matti Laine. 

          Verilinja on Kovaset-sarjan toinen osa.


          Toimittaja Jukka Kuosmanen.
          Kuva: Bazar / Ville Juurikkala
