      - title: Maailmanpolitiikan arkipäivää
        start_time: '2026-03-14T10:00:00+02:00'
        end_time: '2026-03-14T10:25:00+02:00'
        description: |-
          Onko Yhdysvallat luisunut silmiemme edessä fasismiin? Ainakin fasismitutkija Jason Stanley
          on sitä mieltä.

          Yhdysvaltalainen filosofian professori Jason Stanley lähti kotimaansa kehitystä pakoon
          Toronton yliopistoon Kanadaan.

          - Lähdin Yhdysvalloista protestina sille, että fasismi otti siellä vallan.

          Stanleyn mielestä Donald Trumpin hallinnon metodit ovat fasismin pelikirjasta. Valkoinen
          ylivalta, haikailu myyttiseen menneisyyteen ja johtajakultti ovat tuttuja fasismin historiasta.

          Professori Jason Stanley katsoo Euroopan olevan naiivi suhteessaan Yhdysvaltoihin
          uskossaan siihen, että USA on edelleen demokratia.

          Stanley patistaa Eurooppaa ottamaan itseään niskasta kiinni ja irrottamaan kytköksensä
          Yhdysvaltoihin. Euroopan hän näkee demokratian viimeisenä linnakkeena.

          Maailmanpolitiikan arkipäivää -ohjelman demokratiasarjan kolmannessa osassa kuullaan
          filosofi Jason Stanleyn painavia ajatuksia fasismista. Ohjelman toimittaa Sampo Vaarakallio.

          Otteet Stanleyn kirjasta “Näin toimii fasismi” lukee Leonard Wilhelmus. Äänitarkkailija on
          Matias Puumala. Tunnusmusiikki: Petri Alanko, kuva: Tuuli Laukkanen/Yle.
