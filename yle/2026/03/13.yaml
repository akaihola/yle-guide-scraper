        description: |-
          Suomalaistutkimus hälventää maanviljelijöihin kohdistuvia syytöksiä. Pellot ovat parempia hiilinieluja kuin aiemmin on luultu. Millaisella mittausmenetelmällä tähän tulokseen on päädytty? Ilmatieteen laitoksen ilmastontutkimuksen toimialajohtaja Jari Liski ja vanhempi tutkija, matemaatikko Julius Vira. Toimittajana Minna Korhonen.
