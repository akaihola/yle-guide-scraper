      - title: 'Tiedeykkönen: Positiivinen ilmastouutinen: Pellot ovatkin parempia hiilinieluja kuin on luultu'
        start_time: '2026-03-13T12:05:00+02:00'
        end_time: '2026-03-13T12:55:00+02:00'
        description: |-
          lmastojutut ovat usein syyllistäviä ja jopa masentavia. Tällä kertaa saamme toiveikkaita tutkimustuloksia, joista on konkreettista hyötyä etenkin maanviljelijöille. He saavat helposti lokaa niskaansa ilmastoasioissa. Suomalainen huippututkimus paljastaa hienoja tuloksia peltojen hiilinieluvaikutuksesta. 

          Haastateltavat: Ilmatieteen laitoksen ilmastontutkimuksen toimialajohtaja Jari Liski ja vanhempi tutkija, matemaatikko Julius Vira
          Toimittaja: Minna Korhonen
          Äänisuunnittelija: Joonatan Kotila
      - title: 'Politiikkaradio: Puheet päreiksi'
        start_time: '2026-03-13T13:00:00+02:00'
        end_time: '2026-03-13T13:30:00+02:00'
        description: |
          Mikä on päivänpolitiikan sana? Suomen kielen dosentti Vesa Heikkinen ja Politiikkaradion toimittaja Tapio Pajunen analysoivat politiikan kielen ajankohtaisuuksia ja valitsevat päivänpolitiikan sanan. Voit ehdottaa päivänpolitiikan sanoja verkkolomakkeella, sähköpostitse, tai Bluesky:ssa ja X:ssä @tapiopajunen ja @tosentti. Puheet päreiksi -ohjelmaa esitetään Politiikkaradiossa perjantaisin.
      - title: 'Radio 1:n iltapäivä: Luomiskertomus - kirjailija Matti Laine'
        start_time: '2026-03-13T13:30:00+02:00'
        end_time: '2026-03-13T15:00:00+02:00'
        description: |-
          Juontajana Miia Lahti. Kirjailija näyttelijä Matti Laineen Verilinja-romaanin vakoilutrilleirimäinen tarina sijoittuu maailmaan, jossa kehenkään ei voi luottaa. Kovaset-sarjan toisessa osassa päähenkilö Kata Kovasen vastuulla oleva turvattava henkilö murhataan ja tapahtumat lähtevät liikkeelle. Myöhemmin käy ilmi, että Katan työpaikka, turvapalveluja tarjoava Armadillo-yhtiö, ei olekaan sitä miltä näytti. 

          Romaanin Ouluun, Berliiniin ja Sveitsiin ulottuvan vainoharhaisen tunnelman valehenkilöllisyydet, pimeät rahansiirrot ja hämärät kuolemat tekevät Verilinjasta monella tasolla sekä Stieg Larssonin että John le Carrén  kirjojen sukulaisen. 

          Luomiskertomuksen vieraana on Verilinja- romaanin kirjoittanut Matti Laine. 
          Toimittajana Jukka Kuosmanen. 
