        description: |
          Kun 10-vuotias Arto Noras esiintyi orkesterin solistina, arvosteluissa todettiin, että poika soittaa ihan hyvin, kun ottaa huomioon iän. "Nyt kun on täyttämässä 84 vuotta, niin sanotaan, että ottaen iän huomioon, hän soittaa ihan käyvästi. Näin se kaari menee. Soittoelämä alkaa ja se loppuu, mutta arvostelut pysyy samoina." Sellisti Arto Norasta haastattelee Outi Paananen. 
