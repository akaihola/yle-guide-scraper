        description: |-
          Monikymmenvuotisen Yle-uransa hiljan päättänyt Jari Aula, elävä radioklassikko ja juontajakonkari toi ohjelmaan muassaan "ajolistan" joka herkistää ja nostaa tunteet sekä muistot pintaan. Jonain toisena aikakautena ja toisenlaisissa maailmanpoliittisissa olosuhteissa kappalevalikoima olisi voinut olla toisenlainenkin, toteaa slavisti Aula salamyhkäisesti. Toimittajana Jalmari Laine.

