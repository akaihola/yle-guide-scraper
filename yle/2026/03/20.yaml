      - title: Narrin aamulaulu - Baritoni Harri Nikkonen (1933-1993), luonneroolien mestari
        start_time: '2026-03-20T11:00:00+02:00'
        end_time: '2026-03-20T11:55:00+02:00'
        description: |
          Kansallisoopperan kantaviin voimiin 1960-87 kuulunut Harri Nikkonen osasi asettua yhtä lailla koomisten kuin vakavienkin roolihahmojensa nahkoihin. Lavatyöskentelyn kruunasivat loistokas italialaistyyppinen baritoniääni ja suvereeni muusikkous. 

          Outi Paananen penkoo Ylen arkistoja ja soittaa Harri Nikkosen äänitteitä.
          (uusinta vuodelta 2023).

          Ohjelmassa kuullaan otteita seuraavista Ylen ohjelmista:
          Muistellessa. Oopperalaulaja Harri Nikkonen kertoo muusikonurastaan. 
          Haastattelijana Paavo Helistö.
          Haastattelu tehtiin taiteilijan kotona 20.10.1992.
          Ensilähetys 17.12.1992

          Suomalaisen oopperan kevät 5/13: Kansallisoopperan näyttämöltä. 
          Oopperan omia nauhoituksia vuosilta 1961-1973. Harri Nikkonen.
          Harri Nikkosta muistelevat kollegat Heljä Angervo ja Hannu Heikkilä. 
          Toimittajana Eeva Hirvensalo
          Ensilähetys 19.3.2002

          Terveysasema
          Ohjaus Anssi Mänttäri
          Käsikirjoitus Anssi Mänttäri ja Esko Raento
          Terveydenhoitaja Kanerva Laakso - Marjut Sariola
          Ensilähetys 18.4.1989

          Ohjelmassa kuultavat Harri Nikkosen esitykset:

          kansanlaulu – sov. Oskar Merikanto: 
          Lypsäjän laulu
          Piano: Jussi Törnwall
          Ylen äänite vuodelta 1980

          Ruggero Leoncavallo (suomennos nimeämätön):
          Tonion prologi oopperasta Pajatso
          Piano: Hannu Bister
          Ylen äänite vuodelta 1976

          Gioachino Rossini: 
          Basilion juoruaaria oopperasta Sevillan parturi
          Pianisti: nimeämätön
          Äänitetty Sibelius-Akatemian oppilasnäytteissä vuonna 1957

          Domenico Cimarosa (suomennos nimeämätön):
          Katkelma intermezzosta ”Il maestro di cappella” (Kapellimestari) 
          Radio-orkesteri, joht. Ulf Söderblom
          Ylen äänite vuodelta 1961

          Modest Musorgski (orkestrointi: Ahti Karjalainen)
          (Arseni Golenishtshev-Kutuzov – suomennos V. Arti):
          Kehtolaulu, 1. laulu sarjasta Kuoleman lauluja ja tansseja
          RSO, joht. Ilpo Mansnerus
          Ylen äänite vuodelta 1984

          Katkelma ohjelmasta Harri Nikkosen rooleja: 
          Giacomo Puccinin Gianni Schicchi
          (suomennos nimeämätön)
          Piano: Meri Louhos
          Ylen tallenne vuodelta 1966

          Giuseppe Verdi: 
          Jagon Credo oopperasta Otello
          (suomennos nimeämätön)
          Piano: Hannu Bister
          Ylen äänite vuodelta 1976

          Modest Musorgski (orkestrointi: Ahti Karjalainen)
          (Arseni Golenishtshev-Kutuzov – suomennos V. Arti):
          Ripaska, 3. laulu sarjasta Kuoleman lauluja ja tansseja
          RSO, joht. Ilpo Mansnerus
          Ylen äänite vuodelta 1984
