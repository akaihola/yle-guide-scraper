      - title: 'Tuuli Saksalan keidas: Polku edessämme eli maaliskuun parasta maailmanmusiikkia'
        start_time: '2026-03-20T22:26:00+02:00'
        end_time: '2026-03-20T23:15:00+02:00'
        description: |-
          Tuuli Saksalan Keidas vie kuulijat matkalle, jossa polku avautuu askel askeleelta. Ohjelmassa kuullaan maaliskuun 10 parasta maailmanmusiikkialbumia Euroopan radioiden WMCE-listan perusteella.

          Matkalla kohdataan malilainen kitaravirtuoosi Mama Sissoko ja hänen timanttisormensa, kansainvälinen Monoswezi-kollektiivi, joka yhdistää Mosambikin, Norjan, Ruotsin ja Zimbabwen, sekä kaksi suomalaista menestystä: Maria Kalaniemi & Pekko Käppi laulavat Kalevalaa ruotsiksi ja Tuuletar haltioittaa Maammo-albumillaan.

          Crossing – The Song for a Friend
          Mama Sissoko – Commissariat
          Monoswezi – Mude
          Nancy Vieira & Fred Martins – Nao sou daqui
          Maria Kalaniemi & Pekko Käppi – Sångarstenen
          Stelios Petrakis – Muixaranga
          Tuuletar – Kieluvainen
          Altin Gün – Gönül Dağı
          Raül Refree & Maria Mazzotta – San Paolo di Galatina
          Canzoniere Grecanico Salentino – Kali Nifta
