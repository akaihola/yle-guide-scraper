      - title: Narrin aamulaulu - Baritoni Harri Nikkonen (1933-1993), luonneroolien mestari
        start_time: '2026-03-20T11:00:00+02:00'
        end_time: '2026-03-20T11:55:00+02:00'
        description: |
          Kansallisoopperan kantaviin voimiin 1960-87 kuulunut Harri Nikkonen osasi asettua yhtä lailla koomisten kuin vakavienkin roolihahmojensa nahkoihin. Lavatyöskentelyn kruunasivat loistokas italialaistyyppinen baritoniääni ja suvereeni muusikkous. Outi Paananen penkoo Ylen arkistoja ja soittaa Harri Nikkosen äänitteitä.
          (uusinta vuodelta 2023).
