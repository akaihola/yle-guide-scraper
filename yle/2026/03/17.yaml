        description: |2

          Valkoiseen merenrantataloon laskettiin vettä ja sinne asettuivat asumaan delfiini ja nainen. Naisen oli tarkoitus opettaa delfiinille ihmisten kieltä. 1960-luvulla tehtyyn tieteelliseen kokeeseen kaikessa kauhistuttavuudessaan palataan näytelmässä Peter asui talossa - delfiini pisteestä pisteeseen. Delfiinithän yrittivät tuloksetta kommunikoida ihmisten kanssa myös Linnunradan käsikirja liftareille - teoksessa, mutta niiden maailmanlopun varoituksia eivät pöljät ihmiset ymmärtäneet.

          Kissankehdossa erilajiset olennot kohtaavat poplauluissa ja kommunikoivat vaihtelevalla menestyksellä. Sanoja haetaan avuksi ja lohduksi myös kirjailijoilta ja runoilijoilta

