      - title: 'Radio 1:n iltapäivä: Elokuvat, jotka halusimme nähdä - Neitoperho'
        start_time: '2026-03-17T13:30:00+02:00'
        end_time: '2026-03-17T15:00:00+02:00'
        description: |-
          Juontajana Miia Lahti. Ylen satavuotisjuhlan kunniaksi Yle Teema ja Yle Areena esittävät sata kotimaista elokuvaa sadan vuoden ajalta. Elokuvat on koottu yleisön toiveiden perusteella. Kerran kuukaudessa tiistaisin Radio 1:n iltapäivässä keskustellaan valituista elokuvista ja ilmiöistä niiden ympäriltä. Tämän tiistai-illan elokuva on Auli Mantilan Neitoperho, jota pidetään yhtenä kaikkien aikojen tinkimättömimmistä ja vahvimmista suomalaisista elokuvista. Jarmo Laitanevan haastattelussa on Elokuvasäätiön kulttuuriviennin suunnittelija Otto Suuronen.

          Värttinästäkin tuttu laulaja Karoliina Kantelinen pohtii omaa kulttuurikokemustaan ja huomaa, että hänestä vaikuttavinta on kun saman kokemuksen jakaa samalla hetkellä iso joukko ihmisiä ja kokemukseen liittyy tiettyä yllätyksellisyyttä. Toimittajana Marja Vehkanen. Ensilähetys oli viime heinäkuussa.
      - title: 'Kulttuuriykkönen: Punainen Beethoven – Šostakovitšin ja Stalinin vaarallinen tanssi'
        start_time: '2026-03-17T15:00:00+02:00'
        end_time: '2026-03-17T15:55:00+02:00'
        description: |-
          Sarjakuvataiteilija Aapo Kukko on tehnyt muhkean sarjakuvateoksen Neuvostoliiton kuuluisimman säveltäjän Dmitri Šostakovitšin elämänvaiheista, hänen ajastaan ja aikalaisistaan. Dmitri Šostakovitš eli aikana, jolloin musiikki oli paitsi taidetta myös politiikkaa. Ajoittain hän oli sekä Neuvostoliiton oma tähti että kommunismin keulakuva lännessä. Josif Stalin saattoi kuitenkin hetkenä minä hyvänsä kääntyä häntä vastaan. Tällaisessa ilmapiirissä ei ollut helppoa olla taiteilija ja säveltäjä.

          Teoksessaan Punainen Beethoven Aapo Kukko nostaa keskiöön nousee etenkin Šostakovitšin ja Stalinin kiikkerän suhteen, joka ei tunnu päättyvän edes toisen kuolemaan. 

          Miten Aapo Kukko on onnistunut vangitsemaan sarjakuvateokseensa Šostakovitšin elämän ja Neuvostoliiton karun todellisuuden? Mitä sarjakuvan muoto mahdollistaa Šostakovitšin tarinan esille tuomisessa? Miten tarina resonoi tähän päivään? Onko Punainen Beethoven sarjakuvasinfonia?

          Haastateltavina ovat sarjakuvataiteilija Aapo Kukko, sarjakuvaneuvos Ville Hänninen.
          Lähetyksen juontaa Nicklas Wancke.
