      - title: 'Kulttuuriykkönen: Katarina Wennstamin kirja Kuolleet naiset eivät anna anteeksi ja historiallinen feminismi'
        start_time: '2026-03-09T15:00:00+02:00'
        end_time: '2026-03-09T15:55:00+02:00'
        description: |-
          Katarina Wennstamin Kuolleet naiset eivät anna anteeksi on historiallinen romaani, joka sijoittuu 1800-luvun lopun Tukholmaan, Södermalmiin. Uudenvuodenyönä 1896 löytyy nuori nainen, joka on kuollut laittoman sikiönlähdetyksen seurauksiin. Ompelijatar Hildur löytää talon sisäpihalla kuolleen piian.  Neljä erilaista naista alkaa tutkimaan tätä traagista tapahtumaa. Tuohon aikaan miehet hallitsivat yhteiskuntaa ja naisen asema oli heikko. Millä tavalla tämä romaani nostaa esille naisen asemaa tuohon aikaan? Miten sikiönlähdetys vaikutti naisen terveyteen? Miten yhteiskunta suhtautui yksinhuoltajanaisiin? Miten naiset auttoivat toisiaan? Millaista oli elää salaisuuden kanssa? Miten romaani kuvaa historiallista feminismiä? Mitkä oikeudet tuon ajan naisilla oli?

          Katarina Wennstam on yksi Ruotsin suosituimmista rikoskirjailijoista ja hän on myös toiminut SVT:llä rikostoimittajana. Hän on erityisen kiinnostunut naisten oikeuksista ja on myös vaikuttanut useisiin lakimuutoksiin Ruotsissa. Vuonna 2019 hänelle myönnettiin Ruotsin YK-liiton ihmisoikeuspalkinto. Kuolleet naiset eivät anna anteeksi on ollut hitti Ruotsissa ja siitä on parhaillaan tekeillä tv-sarja.

          Ohjelman vieraina ovat kirjailija Katarina Wennstam, tutkija Merja Pyykkönen, kirjallisuudentutkija Agneta Rahikainen ja filosofian tohtori Helena Ruuska.

          Ohjelman juontaa Pia-Maria Lehtola.



          Rentoa puhetta, kiinnostavimmat vieraat ja kulttuurin ajankohtaisaiheet debatoitavina. Suorana maanantaista perjantaihin.
