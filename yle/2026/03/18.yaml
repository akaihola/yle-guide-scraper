        description: |+
          Tulevaisuus ei ole lukittu, vaikka siltä joskus saattaa monikriisien aikakaudella tuntua. Millainen voima toisenlaisten tulevaisuuksien ja maailmojen kuvittelemisella voi olla? Millaisia utopioita tieteessä, taiteessa ja arjessa luodaan?
