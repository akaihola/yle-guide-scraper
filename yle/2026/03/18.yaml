      - title: 'Radio 1:n iltapäivä: sarjakuvataiteilja JP Ahonen piirsi tummanpuhuvaan värityskirjaan suomalaiset taiteen klassikot'
        start_time: '2026-03-18T13:30:00+02:00'
        end_time: '2026-03-18T15:00:00+02:00'
        description: |-
          Juontajana Jarmo Laitaneva. Studiovieraana sarjakuvataiteilija JP Ahonen, jonka piirroksissa suomalaiset kuvataiteen klassikot saavat pilke silmäkulmassa tummanpuhuvan sävyn. Dark Ateneun -värityskirjassa Ahonen on piirtänyt Ateneumin taideaarteisiin sekä rock-festivaalien mutaiset olosuhteet että Tuonelan virran rannalla auringon polttaman Lemminkäisen.

          Näyttelijä-ohjaaja Mikko Koukiin kolahti lukiolaisena Ryhmäteatterin yhteishenki. Narikkatöiden ja kahvin kaatamisen lomassa hän näki siellä Arto Mellerin näytelmän Sopimus Mr Evergreenin kanssa ja halusi sen jälkeen yhä vahvemmin teatterialalle.Toimittajana Janne Palkisto.
      - title: 'Kulttuuriykkönen: Kirjallisuuden unohdetut lajit, antiikista omaan aikaamme'
        start_time: '2026-03-18T15:00:00+02:00'
        end_time: '2026-03-18T15:55:00+02:00'
        description: |-
          Miksi ja miten kokonaiset kirjallisuuden lajit kuolevat? Vaikuttivatko ympäristö, yhteiskunta, nopeampi elämänrytmi vai opettajat tähän katoon? Millä tavalla mikroskooppi vaikutti kirjallisuuteen? Entä teollistuminen, maallistuminen ja sensuuri? Kadonneita kirjallisuuden lajeja ovat lohduttava consolatio, aistikas gaseeli ja yöllinen nokturno. Millaisia ne olivat ja mikä vaikutti niiden katoamiseen? Miksi yhden kadonneen kirjallisuuden lajin nimi on niin kohtalokas ja dramaattinen kuin kirjakirous? Silti nämä historialliset tekstityypit syntyvät uudelleen ajassamme vaikka netissä affirmaatiolauseiden muodossa tai popmusiikin kertosäkeessä. 

          Kadonneet kirjallisuuden lajit-teos nostaa esille 30 tarinaa kadonneista kirjallisuuden lajeista antiikin ajasta 1800-luvulle. Millä tavalla voisimme elävöittää ajatteluamme ja ilmaisuamme katsomalla taaksepäin? Mitä nuo vanhat kirjallisuuden tyypit kertoivat aikansa ihmisistä ja heidän ajatuksistaan?

          Ohjelman vieraina ovat professori Sari Kivistö ja tutkijatohtori Erika Pihl Tampereen yliopistosta.

          Ohjelman juontajana on Pia-Maria Lehtola.
