      - title: 'Kuunnelma: Nuori Sorjonen - hiljainen uhri J2'
        start_time: '2026-03-18T22:21:00+02:00'
        end_time: '2026-03-18T23:00:00+02:00'
        description: |+
          Kadonneen Kristianin kohtalo tuo rikostutkintaan uuden ulottuvuuden. Sorjonen koettaa selvittää, mitä Waltterin sekavissa puheissa piilee ja miten kolme poikaa liittyvät toisiinsa – ennen kuin on liian myöhäistä. 

          Päärooleissa:
          Kari Sorjonen: Elias Gould
          Outi Lanki: Maria Sid
          Heikkinen: Samuli Niittymäki
          Pauliina Rajala: Anna Böhm
          Pietari: Kristo Salminen
          Waltteri: Vertti Uusitalo
