      - title: Martha Argerichin ja Gabriela Monteron konsertti Lissabonista
        start_time: '2026-03-18T19:02:00+02:00'
        end_time: '2026-03-18T20:20:00+02:00'
        description: |-
          Euroradiokonsertissa lavalla on kaksi tunnettua pianistia Latinalaisesta Amerikasta. Argentiinalainen Martha Argerich ja venezuelalainen Gabriela Montero soittavat duona Mozartin, Schubertin, Schumannin ja Rahmaninovin musiikkia. Konsertti on äänitetty Gulbenkian-säätiön suuressa salissa marraskuussa 2024. Toimittajana on Ainomaija Pennanen. 
