      - title: 'Elävä historia: Syntiä vai luonnollisuutta - kuinka alastomuudesta ja seksistä tuli häpeällistä'
        start_time: '2026-03-22T12:05:00+02:00'
        end_time: '2026-03-22T12:55:00+02:00'
        description: |-
          Raamatun luomiskertomuksessa Aatami ja Eeva huomaavat olevansa alasti ja kauhistuvat. Apuun tulee viikunapuu, joka tarjoaa alastomien vartaloiden peitteeksi lehtiään. Tästä mytologisesta tarinasta alkaa alastomuuden ja seksin kauhistelu. 

          Viktoriaaninen aika suhtautui alastomaan kehoon lähes hysteerisesti. Erityisesti naisten oli peitettävä vartalonsa, jottei heidän hallitsemattomana pidetty seksuaalisuutensa olisi vietellyt miehiä. Mutta millainen suhde alastomuuteen ja seksiin Euroopassa oli ennen viktoriaanista aikaa, 1600- ja 1700-luvuilla? 

          Haastateltavina kulttuurihistorian dosentti Anu Korhonen ja taidehistorioitsija Ville Hakanen. Toimittajana on Liisa Vihmanen.
