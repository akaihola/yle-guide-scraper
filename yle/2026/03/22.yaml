      - title: 'Elävä historia: Syntiä vai luonnollisuutta - kuinka alastomuudesta ja seksistä tuli häpeällistä'
        start_time: '2026-03-22T12:05:00+02:00'
        end_time: '2026-03-22T12:55:00+02:00'
        description: |
          Raamatun luomiskertomuksessa Aatami ja Eeva huomaavat olevansa alasti ja kauhistuvat. Apuun tulee viikunapuu, joka tarjoaa alastomien vartaloiden peitteeksi lehtiään. Tästä mytologisesta tarinasta alkaa alastomuuden ja seksin kauhistelu. 

          Kristinusko istutti alastomuuden häpeän myös kansoihin, jotka olivat eläneet lämpimässä ja tarvinneet vain vähän vaatteita suojakseen. Heille uskoteltiin, että vaatteet tekevät ihmisestä sivistyneen. 

          Viktoriaaninen aika suhtautui alastomaan kehoon lähes hysteerisesti. Erityisesti naisten oli peitettävä vartalonsa, jottei heidän hallitsemattomana pidetty seksuaalisuutensa olisi vietellyt miehiä. Mutta millainen suhde alastomuuteen ja seksiin Euroopassa oli ennen viktoriaanista aikaa, 1600- ja 1700-luvuilla? 

          Häpeä ei ollut ainoa syy peittää keho vaatteilla. 1600-luvulla ymmärrys ihmiskehosta perustui humoraaliteoriaan, jossa esimerkiksi liiallisen peseytymisen uskottiin olevan haitallista. Usein syyt paksuihin vaatekerroksiin olivat myös käytännöllisiä: Asunnot olivat kylmiä, eikä edes seksin vuoksi tarvinnut riisuutua, sillä alushousut olivat vasta tulossa. 

          Entä miten oli mahdollista, että alastomuus oli kuitenkin sallitua veisto- ja maalaustaiteessa, porvariskotien seinillä ja kirkkojen pyhimyskuvissa? Ja mikä alastomuudessa eri aikakausina on ollut niin kiusallista?

          Asiantuntijat: Kulttuurihistorian dosentti Anu Korhonen, sekä taidehistorioitsija FT Ville Hakanen 

          Toimittaja: Liisa Vihmanen
          Äänisuunnittelu: Katri Koivula
          Arkistotoimittaja: Outi Kortelainen
      - title: 'Välilevyjä: Kantele jos uskallat'
        start_time: '2026-03-22T13:00:00+02:00'
        end_time: '2026-03-22T13:57:00+02:00'
        description: |-
          Suomen valtio viisaudessaan ja kulttuurirakkaudessaan päätti lakkauttaa Kanteleliiton toiminta-avustuksen. Siinä on yksi hyvä puoli: asiaan liittyvän uutisoinnin takia kansallissoittimemme merkitystä pohditaan enemmän kuin aikoihin - myös Välilevyissä.

          Ohjelman mittaan selviää, että aikojen kuluessa kantele on ollut paljon eri asioita, aina tarpeen mukaan, kuten vahvan symbolin kuuluu.

          1. Heikki Valpola: Kantona (Elisa Kerola)
          2. Gillian Stevens: Till by turning, 7. osa kantelekonsertosta Sounds from solitude (Timo Väänänen ja yhtye)
          3. Hanna Ryynänen: Aava
          4. Lauri Porra: Matkantekijä
          5. Lauri Porra: Wings over snow
          6. Leonid Bashmakov: Etydi nro 1 (Ritva Koistinen)
          7. Arja Kastinen: Laski
          8. Adina Dumitrescu: Optimism, teoksesta Tuned to the real world (Eva Alkula, Jenny Vartiainen ja Heidi Äijälä)
          9. Ruttusound: Suruvaippa
          10. J.S. Bach: Osia sonaatista huilulle ja continuolle nro 1 C-duuri (Sami Junnonen ja Heidi Äijälä)
          11. J-P Piirainen: Here & Now
          12. Maija Kauhanen & Johannes Geworkian Hellman: Birds of Passage
