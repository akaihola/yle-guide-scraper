        start_time: '2026-03-22T15:00:00+02:00'
        end_time: '2026-03-22T15:41:00+02:00'
        description: |
          Osa 1/2. Juulia on avioitunut vanhan tilanomistajan, viinaanmenevän Aadolfin kanssa suvun rahojen ja perinnön toivossa. Maria Jotunin näytelmään perustuva farssimainen kuvaus naisen ja miehen avioliitosta ja taloudellisesta eriarvoisuudesta - sekä ahneudesta.

          Teos on vuodelta 1972.

          Kuunnelma on puolitoistatuntisena versiona kuunneltavissa Yle Areenassa.
