      - title: Tuuli Saksalan keidas
        start_time: '2026-03-27T22:23:00+02:00'
        end_time: '2026-03-27T23:12:15+02:00'
        description: |+
          Akrobaattista laulua ja musiikillista taikuutta – Keitaan vieraana Tuuletar

          Tuuli Saksalan studiossa vierailevat Tuulettaren Venla Ilona Blom ja Sini Koskelainen juuri oikeaan aikaan – yhtyeen kolmas studioalbumi Maammo keikkuu kahden merkittävän maailmanmusiikkilistan kärkikymmenikössä!

          Tuulettaren musiikkia on kuultu Game of Thronesin trailerissa, ja vaikka siitä kysytään jatkuvasti – ja se välillä ärsyttääkin – on sillä ollut myös hyviä puolia yhtyeen kansainväliselle uralle. Miten musiikkia ylipäätään kaupitellaan maailmanmarkkinoilla?

          Ohjelmassa kuullaan musiikkia Maammo-albumilta sekä Venlan ja Sinin omat valinnat: The Breathin ja Celenkan kappaleita.

