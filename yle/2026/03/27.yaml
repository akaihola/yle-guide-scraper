      - title: 'Narrin aamulaulu - Katse Matteus-passioon, oppaana Topi Linjama '
        start_time: '2026-03-27T11:00:00+02:00'
        end_time: '2026-03-27T11:55:00+02:00'
        description: |
          Bachin Matteus-passio hämmästyttää yhä väkevyydellään. "Matteus-passiolla on kyky koskettaa ihmisenä olemisen perusteita, moraalia ja kuolevaisuutta", toteaa musiikkitieteilijä Topi Linjama. Alun perin liturgiseen käyttöön sävelletty teos on "Bachin äärimmäinen yritys todistaa Lutherin väite, jonka mukaan nuotit herättävät sanat eloon", kirjoittaa puolestaan kapellimestari John Eliot Gardiner Bach-elämäkerrassaan. Toimittajana Outi Paananen. 

           
