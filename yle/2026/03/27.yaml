      - title: 'Radio 1:n iltapäivä: Luomiskertomuksessa  Laura Anersson - Tähtipölyn bulevardi'
        start_time: '2026-03-27T13:30:00+02:00'
        end_time: '2026-03-27T15:00:00+02:00'
        description: |2-
           Juontajana Miia Lahti.

          Kirjailija Laura Anderssonin uuden Tähtipölyyn kirjoitettu -romaanin tarina sijoittuu 1930-luvun Suomeen ja kieltolakiin on mukana juonen käänteissä. Elokuvatähdeksi nousseen Doris Laineen isä on nimittäin pirtun salakuljettaja. Jos ei isän niin ei Doriksenkaan kaikki tekemiset kestä päivänvaloa. Päivisin Doris kuvaa Yön valot -nimistä elokuvaa. Sitä tehdessään Doris taiteilee kahden eri roolin välillä: kuinka olla päivisin näyttelijä ja elokuvatähti - öisin kabinettien yksityistanssija Helsingin yön kaikkien paheiden keskellä. Film noirin pitkien varjojen ja suomifilmin glamourin ympärille kietoutuvan romaanin kirjoittanut Laura Andersson on nyt Luomiskertomuksen vieraana. Toimittajana Jukka Kuosmanen.  
