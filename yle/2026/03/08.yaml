      - title: 'Romano mirits: Lyhytelokuva Svalke ta jang on ison joukon yhteinen ponnistus'
        start_time: '2026-03-08T23:24:25+02:00'
        end_time: '2026-03-08T23:39:06+02:00'
        description: |
          Henry Lindgren halusi tehdä romanikielisen elokuvan muun muassa siksi, että romanien innostus kieltään kohtaan kasvaisi ja toisaalta pääväestö tulisi tietoiseksi siitä, että Suomen romaneilla on oma kieli. Svalke ta Jang –lyhytelokuva sai ensi-iltansa viime vuoden lopulla ja kilpaili myös Oulun kansainvälisillä lasten ja nuorten elokuvafestivaaleilla.
           
          Toimittaja Jaakko Laakso tapasi Oulussa elokuvan ohjanneen, käsikirjoittaneen ja tuottaneen Henry Lindgrenin sekä elokuvassa näytelleet Jane Lindgrenin ja Maria Lindgrenin.
