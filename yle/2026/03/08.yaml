      - title: 'Sari Valto: Näin otat oman taloutesi hanskaan ja jopa vaurastut'
        start_time: '2026-03-08T22:20:34+02:00'
        end_time: '2026-03-08T23:15:08+02:00'
        description: |-
          Sosioekonominen lapsuustaustamme vaikuttaa suuresti siihen, miten pitkälle kouluttaudumme ja millaiseen tulotasoon yllämme. On kuitenkin mahdollista vaurastua hitaasti mutta varmasti, vaikka olisikin lähtöisin vaatimattomista oloista eikä olisi perinyt penniäkään vanhaa rahaa. Sari Valton vieraana on mies, joka tähän on yltänyt. Esa Juntunen on kerännyt satojen tuhansien eurojen potin ilman hokkuspokkustemppuja. Hän kertoo nyt, miten vaurastuminen voi onnistua keneltä tahansa.
