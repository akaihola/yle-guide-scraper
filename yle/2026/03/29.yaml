      - title: Etnokonsertteja Tansaniasta Taiwaniin
        start_time: '2026-03-29T17:00:00+03:00'
        end_time: '2026-03-29T18:00:00+03:00'
        description: |-
          Etnokonsertissa esiintyvät tansanialainen The Zawose Queens, kolumbialainen Yeison Landero sekä taiwanilainen 3PEOPLEMUSIC. Konsertit on taltioitu EBUn studiolla Womex-festivaalilla Tampere-talossa 23.-25.10.2025. Toimittajana on Miika Lauriala. 


          Keski-Tansaniasta, gogo-kansan perinteistä polyfonista laulua ja polyrytmejä esittävät sisarukset Pendo ja Leah Zawose, eli The Zawose Queens. 

          Leah Zawose: Dunia Hii
          Leah Zawose: Asante Sana
          Leah Zawose: Maisha


          Kolumbialainen Yeison Landero jatkaa isoisänsä Andrés Landeron, cumbian kuninkaan, perintöä. 
          Landero luo omaa uutta cumbiaa, ja hänet tunnetaan nimellä cumbian perillinen. 

          Cumbia on kolumbialaisen kansanmusiikin laji, joka syntyi Karibian meren rannikolla alkuperäiskansojen intiaanien ja Afrikasta tuotujen orjien tanssimusiikkina. Cumbiassa yhdistyivät intiaanien melodiat ja harmoniat, afrikkalaisten rummut ja rytmit sekä espanjalaisten kansanlaulut ja costeño-tanssit. Vaikutteita on myös 1800-luvun alun Kolumbian itsenäisyyssotien lauluista. Nykyisin cumbia tunnetaan parhaiten katutanssina. 

          Landero: Campesino Cimarrón
          Pacheco: Teofilo el Gaitero
          Landero: Noche de Cumbia
          Landero: Martha Cecilia


          Taiwanilainen 3PEOPLEMUSIC -trio soittaa kiinalaisia perinneinstrumentteja. 

          Jing-Mu Kuo, guzheng -sitrasoitin 
          Pang I Tung, shongruan-kielisoitin
          Jen Chung, dizi -poikkihuilu ja Xiao -bambuhuilu

          Chung: Dark Sky 
          Kuo: Island 
          Chung: Three Different Romances in a Roll 
