        description: |-
          Hadar: Erev shel shoshanim (Tiellä ken vaeltaa) (Sheku Kanneh-Mason, sello, Oliver Janes, klarinetti, ja Birminghamin SO:n sellot).

          Reger: Palmsonntagsmorgen (Palmusunnuntaiaamu) (Consortium/Andrew-John Smith).

          Belli: Sapias (Mari Samuelsen, viulu, Julien Quentin, piano, ja Scoring Berlin/Jonathan Stockhammer).

          Dvorák: Scherzo pianokvintetosta A-duuri (Menahem Pressler ja Emerson-kvartetti). 

          Pauline Viardot: Les filles de Cadiz (Cadizin tytöt) (Cristina Bayon, sopraano, ja Jesús Pineda, kitara).

          Liszt: Liebestraum n:o 3 (Jussi Makkonen, sello, ja Rait Karm, piano).

          R. Schumann: Lebhaft teoks. Konzertstück neljälle käyrätorvelle ja orkesterille F-duuri (Markus Maskuniitty, Martin Schöpfer, Kristofer Öberg, Monica Berenguer Caro sekä Tukholman FO/Sakari Oramo).

          Makaroff: Lintu lauleli lehossa (Kuopion nuorisokuoro/Jussi Mattila).

          Carreño: Un rêve en mer (Unelma merellä) (Sarah Cahill, piano).

          Kats-Chernin: Re-invention n:o 1 sarj. Re-inventions (Angèle Dubeau, viulu, ja La Pietà).

          Bonds: Young love in spring sarj. Songs of the seasons (Lawrence Brownlee, tenori, ja Kevin J. Miller, piano).

