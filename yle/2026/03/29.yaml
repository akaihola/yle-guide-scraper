      - title: 'Romano mirits: Pirkanmaan Romanit ry tekee romanityötä urheilun avulla'
        start_time: '2026-03-29T23:24:51+03:00'
        end_time: '2026-03-29T23:38:57+03:00'
        description: |-
          Romanityössä voidaan käyttää monenlaisia menetelmiä eriarvoisuuden vähentämiseksi ja esimerkiksi yhteisöllisyyden lisäämiseksi. Pirkanmaan Romanien keskeiseksi työtavaksi tavoitteidensa saavuttamiseksi on valikoitunut liikunta ja urheilu. Yhdistys pyörittää Tampereen seudulla salibandy- ja lentopallovuoroa sekä järjestää turnauksia. Salibandyvuorolla treenaava joukkue, Sbc Tamu, pelaa miesten kuutosdivisioonaa ja tavoittelee nousua vitosdivariin. Tärkein tavoite toiminnassa on koota erityisesti nuoria romaneja matalan kynnyksen liikuntaharrastuksen avulla yhteen ja terveellisten elämäntapojen pariin.

          Sbc Tamun treeneissä vieraili toimittaja Jaakko Laakso 
