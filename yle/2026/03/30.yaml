          Näyttelijä Krista Kosonen lukee Jobin kirjaa (29:1-30:31) VT2028 käännöksen mukaan. 14. jaksossa Job kaipaa entisiä aikoja ja kokee Jumalan paiskanneen hänet liejuun.
