      - title: 'Väkivallan markkinat: Sotilaspalvelualan sakein firma: Wagner'
        start_time: '2026-03-30T19:02:00+03:00'
        end_time: '2026-03-30T19:50:00+03:00'
        description: |-
          Pakkorekrytointeja vankilasta, salamurhattuja toimittajia, pääkallologon kanssa televisiossa machoilevia sotureita: Wagner on nostanut palkka-armeijat otsikoihin, mutta alunperin se luotiin vaikuttamaan salaa paikoissa, missä Venäjällä ei ollut virallista läsnäoloa.

          Jaksossa perehdytään venäläisen palkka-armeijan omalaatuisen perustajan Jevgeni Prigožinin nousuun pikkurikollisesta upporikkaaksi oligarkiksi ja Putinin kokiksi. Wagnerin nopeaa kehityspolkua Syyrian ja Afrikan kautta Ukrainaan avaa asiantuntija Mikko Räkköläinen. Jakso on julkaistu alunperin kesäkuussa 2023.
