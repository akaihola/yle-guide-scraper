      - title: 'Elävä historia: Juonittelijoita ja esimerkillisiä äitejä - roomattaret vallan liepeillä'
        start_time: '2026-03-30T12:05:00+03:00'
        end_time: '2026-03-30T12:55:00+03:00'
        description: |-
          Rooman ensimmäisen keisarin, Augustuksen, perheen naiset osasivat käyttää vaikutusvaltaansa. Vaimo Livia, tytär Julia ja sisar Octavia joutuivat kuitenkin toimimaan myös politiikan välikappaleina.
          Miten he ilmensivät antiikin naisihannetta – tai sen vastakohtaa? Entä miten myyttien naiset heijastelivat käsityksiä siitä, millainen naisen tulisi olla?
          Haastateltavat: antiikin historian dosentti Marja-Leena Hänninen, historian dosentti Elina Pyy
          Toimittaja: Riikka Suikkari
          Äänisuunnittelija: Katja Kostiainen
