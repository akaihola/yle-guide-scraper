        start_time: '2026-03-30T13:30:00+03:00'
        end_time: '2026-03-30T15:00:00+03:00'
        description: |+
          Jarmo Laitaneva juontajana.
          Aki Hyyppä on toiminut Akru Ankan päätoimittajana 15 vuotta. Hän pitää tärkeänä sitä, että sarjakuvalehden kieli on monipuolista, älykästä ja humoristista. Gradunsa Hyyppä kirjoitti Aku Ankan huumorin kielellisistä keinoista. Luvassa puhetta  sarjakuvasta, lukemisesta ja kielestä.

