      - title: 'Etnokonsertteja: Fatima Szalayn Transilvanialaiset tanssit '
        start_time: '2026-03-15T17:00:00+02:00'
        end_time: '2026-03-15T17:59:57+02:00'
        description: |-
          Unkarilainen Fatima Szalay (s. 1995) yhtyeineen esittää vanhoja unkarilaisia ja naapurimaiden kansanlauluja (romanialaiset, mustalaiset, kroaatit, turkkilaiset). Luvassa on myös transilvanialaisia tansseja ja balladeja koboz-luutulla säestettynä. Konsertti on talltioitu 24.7.2025 Glatt & Verkehrt -festivaalilta Itävallasta. Kuva: Sascha Osaka / Glatt&Verkehrt. 

          Yhtyeen nuoret muusikot ovat valmistuneet Franz Lisztin musiikkiakatemiasta Budapestistä: 

          Fatima Szalay, laulu 
          Bendegúz Avas, klarinetti
          Pál Danhauser, viulu
          Bálint Dombi, alttoviulu 
          Máté Tóth, kontrabasso
          Kinga Korsós, koboz-luuttu 

          Konsertissa kuultavat kappaleet: 

          Az ifjú boszorkány éneke (Laulu nuoresta noidasta)
          Török dalok (Turkkilaisia lauluja)
          Gyimesi ballada és táncok (Balladi ja tanssimusiikkia Gymesistä)
          Szőke herceg (Prinssi Hurmaava)
          Három cigány (Kolme mustalaista)
          Oj Savice (Sava- ja Tonava-jokien laulu)
          Te nyavalyás! (Sinä roisto!)
          Psyché dala/Greensleeves (sisältää Sándor Weöresin ja Sapfon runoja)
          Na csinger tut (encore) 

          Konsertin on toimittanut Miika Lauriala. 
