      - title: 'Uutispodcast: Norjassa on “vakoojien kaupunki”, jossa näkyy Venäjän valmistautuminen sotaan'
        start_time: '2026-03-15T21:00:08+02:00'
        end_time: '2026-03-15T21:24:16+02:00'
        description: |
          Kirkkoniemi on pieni kaupunki Pohjois-Norjassa, josta puhutaan jopa vakoojien keskittymänä. Norjan turvallisuuspoliisi on esimerkiksi varoittanut venäläisten vakoiluoperaatioista alueella, maan puolustusvoimissa taas on puhuttu Venäjän maahyökkäyksen uhasta juuri pohjoisessa. Ylen Pohjoismaiden-kirjeenvaihtaja Jenny Matikainen lähti Kirkkoniemeen selvittämään mitä siellä sotaisasta rajanaapurista ajatellaan – ja ovatko puheet vakoilukaupungista totta? Juontajana Reetta Rönkä.

          Voit lähettää palautetta ja juttuvinkkejä uutispodcast@yle.fi.
      - title: 'Klasariparatiisi - Eva Tigerstedt: Vesielementtejä'
        start_time: '2026-03-15T21:25:04+02:00'
        end_time: '2026-03-15T22:18:56+02:00'
        description: |
          Vesi. Kaksi vetyatomia ja yksi happiatomi yhdessä molekyylissä. Vesi kiertää maapallolla ja ilmakehässä monenlaisissa muodoissa. Ilman sitä emme eläisi. Ja mihin kaikkeen se onkaan taiteilijoita inspiroinut. 
          Veden lorinat ja aaltoilut, lumen ja jään ritinät ja rapinat, pilvien sävyt ja liikkeet.Veden voima ja lempeys.  Ne ovat innoittaneet monia säveltäjiä säveltämään mitä ihmeellisintä musiikkia. 
          Eva Tigerstedt avaa polkuja musiikkiin.


          Ohjelman musiikit:

          Michelangelo Falvetti: Il Diluvio universale (Vedenpaisumus) (Namurin kamarikuoro ja Cappella Mediterranea/Leonardo Garcia Alarcon).

          Antonio Vivaldi: Konsertto viululle, jousille ja continuolle Es-duuri RV253 op.8/5 (La tempesta di mare, Myrsky merellä) (Fabio Biondi, viulu, ja Europa Galante).

          Mikel Urquiza: Elurretan (Lumessa), trio mandoliinille, kitaralle ja harpulle
          (Ensemble C Barré/Sebastien Boin).

          Claude Debussy: Nuages (Pilviä), teoksesta Trois Nocturnes (Ranskan radion filharmoninen orkesteri/Mikko Franck).

          Outi Tarkiainen: Jään lauluja, orkesterille (Radion sinfoniaorkesteri/ Nicholas Collon).

          Edvard Grieg: Puro (Alice Sara Ott, piano).
      - title: 'Sari Valto: Elämme itsekkyyden aikaa'
        start_time: '2026-03-15T22:20:09+02:00'
        end_time: '2026-03-15T23:13:26+02:00'
        description: |-
          Yksilökeskeinen kultturi on mennyt liian pitkälle ja olemme siirtyneet itsekkyyden aikaan. Olemme siis luoneet kulttuurin, joka tuottaa pahoinvointia. Näin toteaa psykologian emeritaprofessori Liisa Keltikangas-Järvinen.
          Ratkaisu voisi olla se, että palauttaisimme klassiset hyveet olemassaolomme perustaksi. Arvopuhe on tyhjää, mutta hyveiden tavoittelu on konkreettista. Hyveiden puolesta puhuu filosofi Antti Kylliäinen.
