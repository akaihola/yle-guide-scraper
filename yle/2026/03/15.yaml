      - title: 'Klasariparatiisi - Eva Tigerstedt: Vesielementtejä'
        start_time: '2026-03-15T07:00:30+02:00'
        end_time: '2026-03-15T07:54:22+02:00'
        description: |
          Vesi. Kaksi vetyatomia ja yksi happiatomi yhdessä molekyylissä. Vesi kiertää maapallolla ja ilmakehässä monenlaisissa muodoissa. Ilman sitä emme eläisi. Ja mihin kaikkeen se onkaan taiteilijoita inspiroinut. 
          Veden lorinat ja aaltoilut, lumen ja jään ritinät ja rapinat, pilvien sävyt ja liikkeet.Veden voima ja lempeys.  Ne ovat innoittaneet monia säveltäjiä säveltämään mitä ihmeellisintä musiikkia. 
          Eva Tigerstedt avaa polkuja musiikkiin.


          Ohjelman musiikit:

          Michelangelo Falvetti: Il Diluvio universale (Vedenpaisumus) (Namurin kamarikuoro ja Cappella Mediterranea/Leonardo Garcia Alarcon).

          Antonio Vivaldi: Konsertto viululle, jousille ja continuolle Es-duuri RV253 op.8/5 (La tempesta di mare, Myrsky merellä) (Fabio Biondi, viulu, ja Europa Galante).

          Mikel Urquiza: Elurretan (Lumessa), trio mandoliinille, kitaralle ja harpulle
          (Ensemble C Barré/Sebastien Boin).

