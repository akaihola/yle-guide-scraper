      - title: 'Maailma tarinoina: Tšehov, Vanja-eno ja luonnon hätähuuto'
        start_time: '2026-03-19T12:05:00+02:00'
        end_time: '2026-03-19T13:00:00+02:00'
        description: |-
          Anton Tsehovin Vanja-eno -näytelmään heijastuu kirjoittajansa perehtyneisyys luonnontieteisiin ja rakkaus luontoon, vaikka ihminen tunteineen ja ajatuksineen onkin keskiössä. Voidaanko Tsehovia pitää ekologina ennen ekologiaa, kuten on väitetty? Mikä kaikki vaikutti siihen, että Tsehov antoi tilaa ihmisen ja luonnon suhteen kuvaamiselle sekä proosassa että draamassa? 

          Ihmisen paikkaa suhteessa luontoon tsehovilaisittain hahmottelevat Marja Vehkasen johdattamana venäläisen kirjallisuuden vanhempi yliopiston lehtori Tintti Klapuri ja ympäristöfilosofian dosentti Leena Vilkka.
