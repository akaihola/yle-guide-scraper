          C. Stamitz: Trio kahdelle huilulle ja continuolle G-duuri (Camerata Köln).

          Shostakovitsh (sov. Laritshev): Johdanto musiikista elokuvaan Paarma (John Williams ja Timothy Kain, kitara).

          Monn: Konsertto sellolle, jousille ja cembalolle (Jian Wang ja Salzburgin Mozarteumin akateeminen kamariork.).

