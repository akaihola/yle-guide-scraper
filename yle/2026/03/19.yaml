      - title: 'Maailma tarinoina: Tšehovin Vanja-eno – luonnon hätähuuto ihmiskeskeisessä tarinassa'
        start_time: '2026-03-19T12:05:00+02:00'
        end_time: '2026-03-19T13:00:00+02:00'
        description: |-
          ​Anton Tšehovin Vanja-eno -näytelmään heijastuu kirjoittajansa kiinnostus ja perehtyneisyys luonnontieteisiin sekä pohdinnat ihmisen ja luonnon suhteesta, vaikka ihminen tunteineen ja ajatuksineen onkin draaman keskiössä. Mikä kaikki vaikutti siihen, että Tšehov antoi tilaa ihmisen ja luonnon suhteen kuvaamiselle sekä proosassa että draamassa? Millainen on ihmisen paikka suhteessa luontoon Vanja-enossa ja laajemminkin kirjailijan tuotannossa?
          Marja Vehkasen kanssa pohtimassa ovat venäläisen kirjallisuuden vanhempi yliopistonlehtori Tintti Klapuri sekä ympäristöfilosofian dosentti Leena Vilkka.
