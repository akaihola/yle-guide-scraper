      - title: 'Radio 1:n iltapäivä: Juha-Pekka Hotinen on mies monen audiodraaman takana'
        start_time: '2026-03-19T13:30:00+02:00'
        end_time: '2026-03-19T15:00:00+02:00'
        description: |
          Juontajana Miia Lahti. N. klo 14 studiossa on vieraana käsikirjoittaja Juha-Pekka Hotinen, jonka aloitteesta Ylellä on tehty jo useita audiodraamoja kuuluisien muusikoiden tai taiteilijoiden elämästä. Nyt hän on käsikirjoittanut audiodraaman Ville Leino – taiteilija kaukalossa. Yle Areenassa kuultavissa oleva sarja kertoo Leinosta, joka NHL-uran jälkeen mm. rakentaa ystävänsä kanssa omannäköisensä vaatebisneksen.

          N. klo 14:30 Stand up- koomikko Anitta Ahonen tykkää aina ehtiessään käydä katsomassa teatteriesityksiä. Hän nostaa Sari Valton haastattelussa esille esityksen, jota jäi miettimään pitkäksi aikaa. 
      - title: Kulttuuriykkönen
        start_time: '2026-03-19T15:00:00+02:00'
        end_time: '2026-03-19T15:55:00+02:00'
        description: |
          40 vuotta sitten julkaistu Maus on sarjakuvaromaanin uranuurtaja. Art Spiegelmanin romaani kokoaa hänen puolanjuutalaisten vanhempiensa kokemukset holokaustissa ja näyttää kuinka vaikea äärimmäisestä traumasta on kertoa.

          Millaisena Maus näyttää holokaustin historian ja miten se esittää historiallisen muistin toiminnassa? Millaisiin asioihin sarjakuva kykenee?

          Mausista ovat keskustelemassa sarjakuvataiteilija Matti Hagelberg, toimittaja ja kirjailija Irene Zidan ja kriitikko Vesa Kataisto. Juontaja on Pietari Kylmälä.
