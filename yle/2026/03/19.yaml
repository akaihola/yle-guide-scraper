      - title: 'Poiminta Radio 1:n iltapäivästä '
        start_time: '2026-03-19T18:25:00+02:00'
        end_time: '2026-03-19T18:35:00+02:00'
        description: |
          Sari Valto haastattelee filosofi Sami Syrjämäkeä, joka on tutkinut sitaattikulttuuria ja kirjoittanut aiheesta kirjan Säädyllistä ajattelua – Kun tolkun ihminen kohtaa Orwellin. 

          “Ole se muutos, jonka haluat maailmassa nähdä.” Tämä ylevä lause on paljon käytetty sitaatti Mahatma Gandhilta. Paitsi ettei Gandhi koskaan ole sanonut aivan niin. Hän on kyllä sanonut seuraavasti: “Kun ihminen muuttaa omaa luontoaan, myös maailman suhtautuminen häneen muuttuu. Meidän ei tarvitse odottaa, mitä muut tekevät.” Tämä lause ei olekaan enää niin simppeli ja iskevä. Iskulauseen omaisilla sitaateilla tehostetaan usein omaa sanomaa ja pyritään saamaan sille auktoriteettia kuuluisalta ihmiseltä. Ensilähetys oli 13.3.2026.
