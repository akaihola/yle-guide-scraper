      - title: 'Jazzklubin viikon keikka: Rob Luft Quartet Tampere Jazz Happeningissä.'
        start_time: '2026-03-19T19:02:00+02:00'
        end_time: '2026-03-19T20:00:00+02:00'
        description: |
          Brittiläinen Rob Luft on viimeisen vuosikymmenen aikana saanut mukavan jalansijan eurooppalaisella jazzkentällä. John Surmanin ja Django Batesin projekteissa kannuksia hankkinut kitaristi kiertää maailmaa yli kymmenessä kokoonpanossa ja kerää omaan musiikkiinsa vaikutteita esimerkiksi pohjoismaisesta jazzperinteestä sekä arabialaisesta musiikista. Suomessa pari kertaa aiemmin vieraillut Luft avasi Tampere Jazz Happeningin viime vuoden kattauksen omalla kvartetillaan, jonka setti tarjosi mm. egyptiläisestä kansanperinteestä ja 60-luvun puolalaisesta elokuvamusiikista tislattuja tunnelmia.

          Rob Luft kitara, Joe Wright saksofoni, Tom McCredie basso, Jay Davis rummut.

          1. Echoes Of Silence (säv. Rob Luft)
          2. Komorebi (Luft)
          3. Another Blue World (Luft)
          4. Lamma Bada Yatathanna (arabialainen kansansävelmä)
          5. One Day In Romentino (Luft)
          6. Rosemary's Baby (Krysztof Komeda)
          7. Berlin (Anders Christensen)

          Äänitetty Paja Kongresissa 31.10.2025.
          Äänisuunnittelija Antti Pohjola, äänitystuottaja Speedy Saarinen.

          Kuva: Maarit Kytöharju / Tampere Jazz Happening
          Toimittajana Markus Partanen
