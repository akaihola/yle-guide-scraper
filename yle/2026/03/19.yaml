      - title: 'Väkivallan markkinat: Voiko aseellisella turvaamisella tehdä rahaa Suomessa?'
        start_time: '2026-03-19T21:31:00+02:00'
        end_time: '2026-03-19T22:01:19+02:00'
        description: |-
          Juhani Mäkinen on kantanut asetta sekä asevoimissa että urakoitsijan roolissa monella kriisialueella. Alan parhaat ja pahimmat puolet nähtyään hän kyllästyi ja perusti oman firman. Kun alaa hallitsevat yhdysvaltalaiset jättiyritykset, mitä suomalaiselle yritykselle on tarjolla? 

          Mikko Räkköläisen kanssa avataan sotilaspalvelualan rakenteellisia ongelmia ja kierretään veroja. Jakso on julkaistu alunperin kesäkuussa 2023.
      - title: 'Viihdekuunnelma: Lordi Arthur Savilen rikos'
        start_time: '2026-03-19T22:35:00+02:00'
        end_time: '2026-03-19T23:01:53+02:00'
        description: |-
          Osa 2/3. Lordi Arthur saa kuulla seurapiirien suosimalta kädestäennustajalta, että hänen kohtalonsa on joutua murhaajaksi. Järkyttynyt herrasmies lykkää tulevia häitään, sillä ennen avioitumistaan hän haluaa selvitä kiusallisesta velvollisuudestaan. Kuunnelma on Oscar Wilden novellista sovitettu salonkikomedia, jossa "loordilliseen" keskustelunsävyyn sekoittuu pisteliäitä nokkeluuksia. Lopulta rikoksesta määrättävä rangaistus lienee yksi pahimmista mahdollisista - wildemaiseen tyyliin.

          Oscar Wilden aiheen mukaan kirjoittanut Basil Dawson. Radioteatterille suomentanut Albin Ahonen. Ohjaus: Aimo Hiltunen.

          Henkilöt: 
          Herttuatar - Hilkka Helinä. 
          Lordi Arthur - Jussi Jurkka. 
          Lordi Augustus Surbiton, Lordi Arthurin veli - Toivo Mäkelä. 
          Lady Coniston - Pia Hattara. 
          Neiti Sybil Merton, Lordi Arthurin kihlattu - Marita Nordberg.
          Lady Clem - Alice Lyly. 
          Herra Podgers, kädestäkatsoja - Tauno Kajander. 
          Pestle, apteekkari - Matti Aulos. 
          Kreivi Ruvalov - Rauno Ketonen. 
          Herra Winckelkopf, anarkisti - Heikki Savolainen. 
          Jane-serkku, Lordi Arthurin enon tytär - Sirkka-Liisa Wilén. 
          Baker, lordi Arthurin palvelija - Leo Jokela. 
          Herra Mansfield, Lady Clemin asiainhoitaja - Leevi Kuuranne. 
          Herra Button, rikoskomisario - Kaarlo Halttunen.
          Ensilähetys: 1961.
      - title: Epäilyttävän uutta - Aki Yli-Salomäki
        start_time: '2026-03-19T23:03:00+02:00'
        end_time: '2026-03-19T23:59:00+02:00'
        description: |-
          Digitaaliseen musiikkiavaruuteen virtaa jatkuvasti uutta kuunneltavaa. Aki Yli-Salomäki poimii virrasta musiikkia, joka heijastelee tätä aikaa ja ympäristöä, on helposti lähestyttävää, mutta silti kunnianhimoista ja uteliasta.
