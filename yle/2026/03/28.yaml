        description: |-
          Wiltshiren pienessä kylässä asuva nuori Catherine Morland rakastaa lukea kirjoja, etenkin jännittäviä ja romanttisia teoksia. Catherine saa yllättäen kutsun lähteä ystäväpariskunta Allenien kanssa Bathin kylpyläkaupunkiin. Matka on hänen elämänsä ensimmäinen eli suuri mahdollisuus seikkailuun. Säihkyvät tanssiaiset ja uudet tuttavuudet odottavat!

