        start_time: '2026-03-28T21:51:00+02:00'
        end_time: '2026-03-28T22:30:00+02:00'
        description: |
          Osa 1/2. Juulia on avioitunut vanhan tilanomistajan, viinaanmenevän Aadolfin kanssa suvun rahojen ja perinnön toivossa. Maria Jotunin näytelmään perustuva farssimainen kuvaus naisen ja miehen avioliitosta ja taloudellisesta eriarvoisuudesta - sekä ahneudesta.

          Teos on vuodelta 1972.

          Kuunnelma on puolitoistatuntisena versiona kuunneltavissa Yle Areenassa.
      - title: Keinuva talo - Mika Kauhanen
        start_time: '2026-03-28T22:40:00+02:00'
        end_time: '2026-03-28T23:39:30+02:00'
        description: |
          Maailmassa julkaistaan niin paljon musiikkia, että tarvitsemme suodattimia. Keinuvan talon tuntosarvina, ukkosenjohdattimena ja kalaverkkona toimii korttelin oma etnomusikologi Mika Kauhanen. Balkanin rytmeistä Välimeren tunnelmiin, kaihoisista lauluista huimimpaan pelimannisvengiin. Transglobal World Music Chartin jäsen lupaa tuoreita musiikkivalintoja ja kiinnostavia haastatteluvieraita nykykansanmusiikin ja maailmanmusiikin vaiheilta.
