      - title: 'Marko Gustafsson: Käännekohdissa Esa Eloranta'
        start_time: '2026-03-28T17:00:00+02:00'
        end_time: '2026-03-28T17:53:00+02:00'
        description: |-
          Muusikko Esa Elorannalla on takanaan kymmenien vuosien ja satojen itselle ja muille artisteille tehtyjen laulujen taival. ”Vasta nyt viimeisimmällä levylläni olen uskaltanut tehdä juuri niin kuin haluan, enkä ajattele esimerkiksi radion soittolistoille pääsyä”, Esa toteaa. Esa ihastui vaimonsa runoihin ja päätti tehdä niistäkin lauluja. ”Niissä ylitin oman häpeän kynnykseni ja onneksi uskalsin!”, Esa hymyilee.
