      - title: 'Radio 1:n iltapäivä: Miksi lukemisen arvostus on nyt tärkeämpää kuin koskaan? Vieraana Maria Lassila-Merisalo'
        start_time: '2026-03-26T13:30:00+02:00'
        end_time: '2026-03-26T15:00:00+02:00'
        description: |-
          Juontajana Miia Lahti.

          N. klo 14 studiovieraana on tietokirjailija ja tutkija Maria Lassila-Merisalo, joka aloitti kirjallisuusjärjestö Sanaston puheenjohtajana tammikuussa. Lassila-Merisalo sanoo uskovansa sivistykseen ja lukemisen arvoon. Hän uskoo, että yhteiskunnallisesti vaikeanakin aikana yhteistyö ja yhtäläisyyksien etsiminen erojen sijaan luo toiveikkuutta.

          N. klo 14:30 näyttelijä, ohjaaja ja kirjailija Jani Toivola kertoo näkemästään ja kokemastaan vahvasta esityksestä, joka jäi erityisesti hänen mieleensä. Marko Gustafsson toimittajana.
      - title: Runoilijan kuolema - kirjailijat Marja-Liisa Vartio ja Pentti Saarikoski teatterilavoilla
        start_time: '2026-03-26T15:00:00+02:00'
        end_time: '2026-03-26T15:55:00+02:00'
        description: |-
          Marja-Liisa Vartio ja Pentti Saarikoski olivat yksiä tunnetuimmista moderneista runoilijoista ja heidän elämänsä ovat saaneet tulkinnat teatterilavoilla. Veden ja maan välillä on Sinna Virtasen ohjaama näytelmä Vartiosta Lahden kaupunginteatterissa. Poet of Finland taas perustuu Tuula-Liina Variksen muistelmateokseen hänen avioliitostaan Pentti Saarikosken kanssa. Sen on kirjoittanut Aina Bergroth ja ohjannut Riikka Oksanen.

          Näytelmät avaavat näkökulman sotien jälkeiseen Suomeen ja sen erityisesti sukupuolirooleihin. Kummassakin näytelmässä esiin nousee myös kysymys runoilijan kuolemasta: mitä viimeisellä hetkellä tapahtuu ja mitä elämästä muistetaan?

          Kulttuuriykkösen vieraina ovat teatteriohjaajat Sinna Virtanen ja Riikka Oksanen. Ohjelman juontaa Pietari Kylmälä.


          Rentoa puhetta, kiinnostavimmat vieraat ja kulttuurin ajankohtaisaiheet debatoitavina. Suorana maanantaista perjantaihin.
