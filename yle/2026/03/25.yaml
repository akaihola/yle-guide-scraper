      - title: 'Vakoojat: Mestarivakooja Mannerheim'
        start_time: '2026-03-25T12:05:00+02:00'
        end_time: '2026-03-25T12:49:00+02:00'
        description: |
          Carl Gustaf Emil Mannerheim (1867–1951) tunnetaan Suomessa ennen kaikkea sotilasjohtajana, poliittisena vaikuttajana ja presidenttinä, mutta hänen uransa alkuvaiheisiin liittyy myös vakoojan rooli.

          Mannerheim oli oman aikansa huippuvakooja maailman mittapuissakin. Kenttätyössä eli fyysisessä vakoilussa kenties vain James Bond -hahmon esikuvana pidetty, tunnustettu Sidney Reilly saattoi yltää vastaavanlaisiin saavutuksiin, mutta häneltäkin puuttui Mannerheimin kaltainen kyky pukea sanoiksi, kuviksi ja piirroksiksi näkemänsä.

          Venäjän keisarikunnan armeijan upseerin Carl Mannerheimin salaisesta tiedustelumatkasta Kiinaan vuosina 1906–1908 kertoo toimittaja-tietokirjailija Hannu Pesonen. Toimittajana on Raimo Tyykiluoto.
      - title: 'Politiikkaradio: Avaako EU-komissio uusia fossiilitukia?'
        start_time: '2026-03-25T13:00:00+02:00'
        end_time: '2026-03-25T13:30:00+02:00'
        description: |
          Persianlahdella sijaitsevan Hormuzinsalmen sulku ampaisi fossiilienergian maailmanmarkkinahinnat taivaisiin. EU-maissa poliitikot virittelevät jo öljyn ja kaasun hintaan vaikuttavia tukipaketteja. Mitä tekee EU? Avataanko tukipakettihanat myös Brysselissä? Brysselin radiostudiossa aiheesta keskustelevat europarlamentaarikot Maria Ohisalo (vihr. / greens), Aura Salla (kok. / epp) ja Maria Guzenina (sd. / s&d). Toimittajana on Tapio Pajunen.
      - title: 'Radio 1:n iltapäivä: Lukeva elämäntapa kaikille – Lukukeskuksen toiminnanjohtaja Emmi Jäkkö studiossa'
        start_time: '2026-03-25T13:30:00+02:00'
        end_time: '2026-03-25T15:00:00+02:00'
        description: |-
          Juontajana Jarmo Laitaneva. 

          Lukeminen on ikkuna uusiin maisemiin, keino päästä matkalle liikkumatta metriäkään ja tärkeä taito saada tietoa. Lukutaito edistää yhteiskunnallista tasa-arvoa ja demokratiaa. Lukukeskus on järjestö, joka edistää kansalaisten tasa-arvoista oikeutta lukemiseen ja lukutaitoon sekä toimii lukevan elämäntavan puolestapuhujana. Lukukeskuksen lukutaitotyö tavoittaa vuosittain yli 3 miljoonaa suomalaista. N. klo 14 studiovieraana on Lukukeskuksen toiminnanjohtaja Emmi Jäkkö.

          N. klo 14:30 mukana RSO:n illan konsertin tunnelmassa.
      - title: 'Kulttuuriykkönen: Kolme kiinnostavaa designnäyttelyä: Markku Pirin lasit, Tarmo Thorströmin pitsit ja Domus Primavera LOKAL-galleriassa'
        start_time: '2026-03-25T15:00:00+02:00'
        end_time: '2026-03-25T15:55:00+02:00'
        description: |-
          Suomen lasimuseo, Riihimäellä on täyttynyt muotoilija Markku Pirin iloisen värikkäästä maailmasta. Laajaan tuotantoon kuuluu kodintekstiilejä, muotia, lasiteoksia, kaakeleita, teatteripuvustuksia ja hotellisisustuksia. Pirin tuotannossa näkyy pohjoismaisen muotoilun niukkuus ja kansainväliset vaikutteet, erityisesti Italian fantasiamaailma. Suomen lasimuseon näyttelyssä on esillä Markku Pirin lasituotanto ja monimateriaaliset kokonaisuudet. Värin lisäksi keskiössä on valo. Markku Piri pohtii teostensa kautta taiteilijana ja ihmisenä oloa ja miten ne vaikuttavat toisiinsa.

          Pitsitaiteilija Tarmo Thorströmiä kutsutaan Raumalaisen pitsin suurlähettilääksi. Suomen käsityön museon aulagalleriassa, Jyväskylässä on esillä hänen keskeisimpiä töitään. Hän on pitsinnypläykseen erikoistunut Suomen ainoa käsityömestari. Kansainvälinen ulottuvuus on ollut mukana Thorströmin työskentelyssä. Pitsi - Uudelleentulkittuna -näyttely syntyi jo huhtikuussa 2025 Espanjan Kataloniassa, jossa Thorströmillä oli kutsuttuna yksityisnäyttely Arenys de Marin museossa. Sieltä näyttely kulki Tanskaan Tønderin kansainvälisille pitsifestivaaleille.

          Helsinkiläisen Lokal-gallerian kevätnäyttely tutkii esineiden olemusta, niiden energiaa ja henkeä. Taide on tapa elää, se on itsessään jonkinlainen kokonaisolemisen tila, todetaan näyttelyssä. Millä tavalla kotimme voivat heijastaa jotakin tästä tilasta? Millä tavalla paikat voivat ravita meitä? Lokalin kevätnäyttely kuvastaa vuodenajan vaihtumista. Miltä koti näyttää kevätpäiväntasauksen ympärillä tapahtuvan muodonmuutoksen keskellä? Domus Primavera- näyttely kokoaa yhteen erilaisia materiaaleja, paperia, puuta, keramiikkaa, vesivärejä, tekstiiliä ja lasia.

          Ohjelman vieraina ovat galleristi Katja Hagelstam, muotoilija Markku Piri ja pitsitaiteilija Tarmo Thorström.

          Ohjelman juontaa Pia-Maria Lehtola.

          Rentoa puhetta, kiinnostavimmat vieraat ja kulttuurin ajankohtaisaiheet debatoitavina. Suorana maanantaista perjantaihin.
