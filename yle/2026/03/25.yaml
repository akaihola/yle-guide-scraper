      - title: 'Vakoojat: Mestarivakooja Mannerheim'
        start_time: '2026-03-25T12:05:00+02:00'
        end_time: '2026-03-25T12:50:00+02:00'
        description: |
          Carl Gustaf Emil Mannerheim (1867–1951) tunnetaan Suomessa ennen kaikkea sotilasjohtajana, poliittisena vaikuttajana ja presidenttinä, mutta hänen uransa alkuvaiheisiin liittyy myös vakoojan rooli.

          Mannerheim oli oman aikansa huippuvakooja maailman mittapuissakin. Kenttätyössä eli fyysisessä vakoilussa kenties vain James Bond -hahmon esikuvana pidetty, tunnustettu Sidney Reilly saattoi yltää vastaavanlaisiin saavutuksiin, mutta häneltäkin puuttui Mannerheimin kaltainen kyky pukea sanoiksi, kuviksi ja piirroksiksi näkemänsä.

          Venäjän keisarikunnan armeijan upseerin Carl Mannerheimin salaisesta tiedustelumatkasta Kiinaan vuosina 1906–1908 kertoo toimittaja-tietokirjailija Hannu Pesonen. Toimittajana on Raimo Tyykiluoto.
