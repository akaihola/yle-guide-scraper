        start_time: '2026-03-23T21:30:30+02:00'
        end_time: '2026-03-23T22:20:00+02:00'
        description: |-
          Betoni aiheuttaa enemmän hiilipäästöjä kuin koko lentoliikenne, ja jo lähitulevaisuudessa betonia voi olla maapallolla enemmän kuin kaikkea elollista yhteensä. Miten maailman yleisin rakennusmateriaali saadaan ympäristöystävällisemmäksi? Ovatko 3D-tulostetut betonitalot tulevaisuutta? Haastateltavina: Anssi Laaksonen, betoni- ja siltarakenteiden professori, Tampereen yliopisto sekä Jouni Partanen, konetekniikan emeritusprofessori, Aalto-yliopisto. Toimittajana Aapo Laakso. Äänisuunnittelu: Katri Koivula.
