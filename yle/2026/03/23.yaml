        description: |-
          Teologi ja taiteilija Juhani Koivumäki kirjoitti kirjan kokemuksistaan ja mielensä liikkeistä, kun hän vetäytyi retriittiin kolmeen erilaiseen luostariin. Kirja "Kiusauksia hiljaisuudessa — Mitä oivalsin kolmella matkallani eri uskontokuntien luostareihin" on rouhea ja intiimi päiväkirja kolmelta kuukauden mittaiselta luostarimatkalta. Juhani Koivumäki kuvaa kirjassaan matkojaan, kuinka meditoidessa ajatukset valtasi ikävä Suomeen jäänyttä rakastettua kohtaan tai mielenrauhaa tavoitellessa vierellä kolisivat norsun kettingit ja intialaiset arjen äänet? Koivumäki on Jarmo Laitanevan haastattelussa n. klo 14.
