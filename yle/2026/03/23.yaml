      - title: 'Keinuva talo - Mika Kauhanen: Helmenkalastajan hullut päivät Italiassa'
        start_time: '2026-03-23T17:35:00+02:00'
        end_time: '2026-03-23T18:35:00+02:00'
        description: |-
          Pizzica-musiikin kehto Salento, totta kai, mutta myös Campania ja Calabria, Sardinia ja Sisilia. Ympäri Italiaa nousee jatkuvasti uusia kiinnostavia tulokkaita maailmanmusiikkilistoille, samalla kun saapasmaan vanhat mestarit luovat nahkansa tuoreiksi. Juuri nyt Italia on luultavasti maista parhain maailmanmusiikin helmenkalastajalle. Millainen tyylillinen nauha pitää noita helmiä yhdessä? Toimittajana Mika Kauhanen.
