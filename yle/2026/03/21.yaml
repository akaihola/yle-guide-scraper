        description: |+
          Chueca: Alkusoitto zarzuelasta Agua, azucarillos y aguardiente (Englantilainen kamariork./Enrique Garcia Asensio).

          Linnala: Valkeat joutsenet (Laulu-Miehet/Matti Hyökki, ja Tuomas Katajala, tenori).

          Rejcha: Andante kvintetosta klarinetille ja jousille B-duuri (Charles Neidich ja L'Archibudelli).

          Kosenko: Sumnyj ja (Olen surullinen) (Olga Pasitshnyk, sopraano, ja Natalija Pasitshnyk, piano).

          Blomdahl: Adagio näyt. Vaknatten (Keski-Pohjanmaan Kamariork./Juha Kangas).

          Carreño: Balladi op.15 (Clara Rodriguez, piano).

          Islandsmoen: Det lysned i skoven (Njål Sparbo, baritoni, sekä Atle Sponberg ja Christina Dimbodius, viulu, Jon Sönstebö, alttoviulu, Mihai Fagarasan, sello, ja Magnus Söderberg, kontrabasso). 

          M. Albéniz: Sonaatti Es-duuri (Nicanor Zabaleta, harppu).

          Beethoven: Kolme equalea (Westfalenin pasuunakvartetti).

          Benda: Allegro triosonaatista kahdelle viululle ja continuolle E-duuri (David Oistrah ja Igor Oistrah viulu, sekä Vladimir Jampolski, piano).

          Kansanlaulu: Tuonne taakse metsämaan (Klemetti-Opiston Kamarikuoro/Harald Andersén).

          Rautio: Cancan divertimentosta n:o 1 (Martti Rousi, sello, ja Juhani Lagerspetz, piano). 

