          Henkilöt:
          Tuomari Kaarlo Kristian Soratie, ent. Carl Christian Sanmark - Joel Rinne.  Professori Magnus Norko - Oiva Sala. Toimittaja Purtiainen - Heimo Lepistö. Isäntä ja kunnallisneuvos Ali-Lehtonen - Matti Aulos. Hulda Juurakko - Hilkka Helinä. Neiti Constance Sanmark - Anni Hämäläinen.
          Kauppaneuvos Kaavio - Kauko Käyhkö. Kauppaneuvoksetar Kaavio - Ritva Arvelo. Neito Matero, näyttelijätär - Mai-Brit Heljo. Alinen - Mauno Hyvönen. Neiti Sinijärvi - Aino Lehtimäki.  Miina - Litja Ilmari. Rouva Kronenström - Alice Lyly.
          Äänite vuodelta 1956.
      - title: Keinuva talo - Mika Kauhanen
        start_time: '2026-03-21T22:40:00+02:00'
        end_time: '2026-03-21T23:39:30+02:00'
        description: |
          Maailmassa julkaistaan niin paljon musiikkia, että tarvitsemme suodattimia. Keinuvan talon tuntosarvina, ukkosenjohdattimena ja kalaverkkona toimii korttelin oma etnomusikologi Mika Kauhanen. Balkanin rytmeistä Välimeren tunnelmiin, kaihoisista lauluista huimimpaan pelimannisvengiin. Transglobal World Music Chartin jäsen lupaa tuoreita musiikkivalintoja ja kiinnostavia haastatteluvieraita nykykansanmusiikin ja maailmanmusiikin vaiheilta.
