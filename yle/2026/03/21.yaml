      - title: 'Marko Gustafsson: Käännekohdissa: Heli Isomäki'
        start_time: '2026-03-21T17:00:00+02:00'
        end_time: '2026-03-21T17:49:00+02:00'
        description: |
          Neuropsykologi Heli Isomäki löysi itsestään yllättävän ominaisuuden. 
          “En tunnistanut ihmisen pahuutta. Olin elänyt vain hyvien ihmisten ympäröimänä ja pahan kohtaaminen ja käsitteleminen on ollut minulle suurin opetus työssäni”, Isomäki toteaa. “Pahuuden kohtaamisessa olen lisännyt hyvyyttä. Se on ollut työni fokus.” Heli jatkaa. Heli Isomäki kertoo, ettei ole pitkän psykologin uransa aikana koskaan tavannut ihmistä, joka ei muuttuisi hyvän kosketuksesta. 
