          Henkilöt:
          Tuomari Kaarlo Kristian Soratie, ent. Carl Christian Sanmark - Joel Rinne.  Professori Magnus Norko - Oiva Sala. Toimittaja Purtiainen - Heimo Lepistö. Isäntä ja kunnallisneuvos Ali-Lehtonen - Matti Aulos. Hulda Juurakko - Hilkka Helinä. Neiti Constance Sanmark - Anni Hämäläinen.
          Kauppaneuvos Kaavio - Kauko Käyhkö. Kauppaneuvoksetar Kaavio - Ritva Arvelo. Neito Matero, näyttelijätär - Mai-Brit Heljo. Alinen - Mauno Hyvönen. Neiti Sinijärvi - Aino Lehtimäki.  Miina - Litja Ilmari. Rouva Kronenström - Alice Lyly.
          Äänite vuodelta 1956.
          Kuunnelma löytyy Yle Areenasta puolitoistatuntisena versiona.
      - title: 'Keinuva talo - Mika Kauhanen: Malja Irlannille ja hyviä uutuuksia'
        start_time: '2026-03-21T22:40:00+02:00'
        end_time: '2026-03-21T23:39:30+02:00'
        description: |-
          St. Patrick’s Day 17. maaliskuuta on kansan kulttuurin karnevaali Irlannissa. Pyhän Patrikin päivän aattona Keinuva talo näyttää jo vihreää valoa ja julistaa etkot alkaneiksi! Jakson ensimmäinen puolikas mennään svengaavan irkkumusiikin tahdissa, mutta aikaa jää myös muille hyville uutuuksille meiltä ja maailmalta. Kotimaisista lautasella Vilma Jää, Vilma Talvitie sekä Maria Kalaniemi ja Pekko Käppi. Toimittajana Mika Kauhanen.

          Connla: Pilot (River waiting)
          Eoghan Ó Ceannabháin: Cat agus gealach (The deepest breath)
          Michel Balatti, Tom Stearn, Tola Custy: Balatti’s downfall (The North wind)
          Aoife Ni Bhriain & Cormac McCarthy: Coffee club (Cosán casta)
          The Haar: The rocky road to Dublin (The lost day)
          Kim Carnie & Seckou Keita: Òran na bèiste maoile (A’Chailleach)
          Dorota Barová: Na chvili (Píseň pro mi)
          Vilma Jää: Mieli musta
          Vilma Talvitie & Pekko Käppi: Kiltti Annikki
          Maria Kalaniemi & Pekko Käppi: Skogens släkte (Tåreportens pärla)
          António Zambujo & Caetano Veloso: Oração ao tempo
