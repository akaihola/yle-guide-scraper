      - title: 'Virtasen taloushistoria: Miksi rahan kuluttaminen aiheuttaa tuskaa?'
        start_time: '2026-03-21T11:00:00+02:00'
        end_time: '2026-03-21T11:52:00+02:00'
        description: |
          Monille varakkaille rahan kuluttaminen aiheuttaa maksamisen tuskaa. Ostoksesta saatu mielihyvä jää usein pienemmäksi kuin sen maksamisen aiheuttama mielipaha. 
          Miten säästeliääseen elämään tottunut ihminen voi oppia uusille tavoille eli kuluttamaan?
          Aalto-yliopiston kauppakorkeakoulun rahoituksen professori Vesa Puttonen on kirjoittanut aiheesta kirjan nimeltään Miten miljoona hankitaan ja kulutetaan.
      - title: Päivän mietelause ja Turun tuomiokirkon kello lyö 12
        start_time: '2026-03-21T11:57:00+02:00'
        end_time: '2026-03-21T12:00:00+02:00'
        description: |
          Juhani Ahon lastut ovat lyhyitä kirjoitelmia. Lastussa “Kosteikko, kukkula, saari…” Aho rinnastaa maiseman elettyyn elämään. Joskus elämä tuntuu tasaiselta ja yksitoikkoiselta kuin Pohjanmaan nevat. Päivän mietelauseen on valinnut Riikka Kaihovaara. 
