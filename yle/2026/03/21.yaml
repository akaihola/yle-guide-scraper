      - title: 'Luomiskertomus: Esa Sirén - Taisteluosasto Rasi'
        start_time: '2026-03-21T07:31:00+02:00'
        end_time: '2026-03-21T07:55:00+02:00'
        description: |
          Kirjailija Esa Sirénin Taisteluosasto Rasi -sotaromaani sijoittuu jatkosodan kesään 1943. Asemasotavaiheessa rintamalinjat ovat paikoillaan, mutta taistelut Laatokan itäpuolella jatkuvat kun taisteluosasto Rasi saa järjettömältä kuulostavan käskyn tehtäväkseen. Tositapahtumiin perustuvassa kirjassa seikkailee myös myöhemmin kaukopartiokirjoillaan mittavan uran tehnyt Reino Lehväslaiho. 

          Kirjailija Esa Sirén on vieraana Luomiskertomuksessa. 

          Toimittaja Jukka Kuosmanen.
