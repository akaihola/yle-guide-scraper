      - title: Oopperagaala Riiassa, Turandot Lontoossa sekä Tarmo Peltokosken haastattelu
        start_time: '2026-03-21T19:03:01+02:00'
        end_time: '2026-03-21T21:09:23+02:00'
        description: |
          Oopperaillassa vieraillaan tällä kertaa mm. Latvian kansallisoopperassa sekä Wienin valtionoopperassa. Suomalaisväriä esiintyjäkattaukseen tuovat sopraano Camilla Nylund sekä kapellimestari Tarmo Peltokoski, joka on myös haastatteluvieraana. Lisäksi keskitytään tarkemmin Giacomo Puccinin viimeiseksi jääneeseen oopperaan Turandot, josta kuunnellaan Lontoon Covent Gardenissa 1.4.2025 äänitettyä esitystä. Toimittajana Ahti Paunu.

          Ohjelmassa kuultavat musiikit:

          Camille Saint-Saëns: Delilan aaria “Mon cœur s’ouvre à ta voix” oopp. Simson ja Delila (Zanda Švēde, mezzosopraano, ja Latvian kansallisoopperan orkesteri, joht. Mārtiņš Ozoliņš).

          Gaetano Donizetti: Adinan ja Nemorinon duetto “Una parola, o Adina” oopp. Lemmenjuoma (Annija Kristiāna Ādamsone, sopraano, Liparit Avetisyan, tenori, ja Latvian kansallisoopperan orkesteri, joht. Mārtiņš Ozoliņš).

          Richard Strauss: Arabellan ja Zdenkan kohtaus “Er ist der richtige nicht für mich” oopp. Arabella (Camilla Nylund ja Sabine Devieilhe, sopraano, ja Wienin valtionoopperan orkesteri, joht. Christian Thielemann).

          Richard Wagner: Alkusoitto oopp. Tristan ja Isolde (Toulousen Orchestre National du Capitole, joht. Tarmo Peltokoski).

          ------

          Giacomo Puccini: kohtauksia oopp. Turandot (libretto: Giuseppe Adami ja Renato Simoni)

          Turandot - Sondra Radvanovsky, sopraano
          Calaf - SeokJong Baek, tenori
          Liù - Gemma Summerfield, sopraano
          Timur - Adam Pałka, basso
          Ping - Hansung Yoo, baritoni
          Pang - Aled Hall, tenori
          Pong - Michael Gibson, tenori
          Mandariini - Ossian Huskinson, baritoni

          Lontoon kuninkaallisen oopperan kuoro ja orkesteri, joht. Rafael Payare
