        description: |-
          Elokuvaohjaaja Selma Vilhusesta sanotaan, että hän on yksi kotimaisen elokuvataiteen kirkkaimmista nimistä. Tänä talvena suomalaisohjaaja on saanut osakseen erityisen paljon suitsutusta. Hänen ohjaamansa laulaja Kaija Koosta kertova elokuva "Kaunis, rietas, onnellinen" on kerännyt kehuja sekä yleisöltä että kriitikoilta. Selma Vilhunen sanoo, että hänellä on työhönsä kutsumus. Hän on Miia Lahden haastattelussa n. klo 14.
      - title: 'Kulttuuriykkönen: Suomalainen metsä eri kulttuurien puristuksessa'
        start_time: '2026-03-24T15:00:00+02:00'
        end_time: '2026-03-24T15:55:00+02:00'
        description: |-
          Teemu Kaskinen julkaisi viime vuonna romaanin nimeltä Yö ja usva, joka tekee selvää siitä miten selluteollisuus ja metsäntutkimus yhdessä tekivät Suomesta tehometsätalouden mallimaan. Avohakkuiden täplittämä metsämaisema on tästä elävä esimerkki. Vaikka teos on painava puheenvuoro suomalaisten pyhän lehmän, eli selluteollisuuden ympäristörikoksia vastaan, se jäi julkisuudessa vähälle huomiolle. Mistä tämä kertoo?

          Kiista metsien käytöstä kuitenkin jatkuu ilmastonmuutoksen vaivaamassa metsien maassa. Metsä on keskeinen osa suomalaisten itseymmärystä, mutta suomalaisten metsäsuhde myös muuttuu yhteiskunnan elämäntapojen ja elinkeinojen mukana. Metsämuseo Lustossa on tutkittu suomalaisten metsäsuhdetta tarkasti ja se näyttää hyvin moninaiselta vuonna 2026. Miten metsäelinkeinot ja metsänsuojelu sopivat samaan kuvaan?

          Kulttuuriykkösessä metsäkulttuurista ovat keskustelemassa kirjailija Teemu Kaskinen, Metsämuseo Luston tutkimuspäällikkö Reetta Karhunkorva sekä Suomen suurimpiin metsänomistajiin kuuluvan Finsilva Oy:n toimitusjohtaja Juha Hakkarainen.

          Juontajana on Pietari Kylmälä.

          ***

          Rentoa puhetta, kiinnostavimmat vieraat ja kulttuurin ajankohtaisaiheet debatoitavina. Suorana maanantaista perjantaihin.
