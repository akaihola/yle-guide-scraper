      - title: 'Maailman tärkein pieni asia: legoharrastaja Mika Karttunen'
        start_time: '2026-03-24T20:15:00+02:00'
        end_time: '2026-03-24T20:35:00+02:00'
        description: |-
          Miltä näyttää noin puoli miljoonaa legopalikkaa yhdessä paikassa? Sen tietää hämeenlinnalainen Mika Karttunen. Hän on vuosien kuluessa rakentanut valtavan legokaupungin, jonka vaikutteet ovat tulleet eri puolilta maailmaa. Karttunen kertoo olleensa legojen ystävä jo pienestä pitäen.
      - title: Maailmanpolitiikan arkipäivää
        start_time: '2026-03-24T20:35:00+02:00'
        end_time: '2026-03-24T21:00:00+02:00'
        description: |+
          Iranin sota on läikkynyt koko Lähi-idän ja Persianlahden alueelle. Talousvaikutukset ulottuvat halki maailman, sillä Iran on tulpannut maailman öljykuljetuksille keskeisen Hormuzinsalmen.

          Ohjelmassa haastateltavana suomalaisen merikapteenin mukaan Hormuzinsalmen tilanne on nyt paljon vaarallisempi kuin Irakin sodan aikana vuonna 2003. Tankkerialuksilla ei ole ilman sotalaivojen suojaa minkäänlaisia keinoja suojautua Iranin ohjus- ja drooni-iskuilta.

          Arvostelijoiden mukaan Trumpin hallinto lähti sotaan ilman selkeää tavoitetta ja syytä. Ohjelmassa haastateltavien yhdysvaltalaisten sotilasasiantuntijoiden mukaan Valkoinen talo oletti Iranin sodasta pikaoperaatiota. Se ei myöskään yrittänyt saada sodalle sen enempää liittolaisten kuin yhdysvaltalaistenkaan tukea.

          Ohjelmassa kuullaan, millaisen pakolaiskriisin sota on aiheuttanut Libanonissa. Noin miljoona ihmistä on joutunut pakenemaan Israelin ilmaiskuja.

          Sota huolettaa myös itäisellä Välimerellä: Kreikka on jo lisännyt panostuksia alueensa puolustukseen konfliktin vuoksi. Kreikkalaisista osa haluaa Yhdysvaltain tukikohdat pois maasta.

          Maailmanpolitiikan arkipäivää -ohjelman ovat toimittaneet Sara Saure, Erja Tuomaala ja Paula Vilén. Äänitarkkailijana on Laura Koso. Tunnusmusiikki: Petri Alanko, kuva: Tuuli Laukkanen/Yle.

