        description: |-
          Elokuvaohjaaja Selma Vilhusesta sanotaan, että hän on yksi kotimaisen elokuvataiteen kirkkaimmista nimistä. Tänä talvena suomalaisohjaaja on saanut osakseen erityisen paljon suitsutusta. Hänen ohjaamansa laulaja Kaija Koosta kertova elokuva "Kaunis, rietas, onnellinen" on kerännyt kehuja sekä yleisöltä että kriitikoilta. Selma Vilhunen sanoo, että hänellä on työhönsä kutsumus. Hän on Miia Lahden haastattelussa n. klo 14.
