      - title: Maailmanpolitiikan arkipäivää
        start_time: '2026-03-31T21:35:00+03:00'
        end_time: '2026-03-31T22:00:00+03:00'
        description: |-
          Valko-Venäjän itsevaltainen johtaja Aljaksandr Lukašenka on vuoden sisään vapauttanut satoja poliittisia vankeja. Vastineeksi Yhdysvallat on hellittänyt Valko-Venäjän pakotteita. Maailmanpolitiikan arkipäivää -ohjelma tarkastelee, millaista peliä Lukašenka pelaa Donald Trumpin ja Vladimir Putinin välissä. 

          Valko-Venäjää vuodesta 1994 kovaotteisesti hallinnut Lukašenka käyttää poliittisia vankeja pelimerkkeinä ostaakseen myönnytyksiä Yhdysvalloilta. Samaan aikaan sortotoimet Valko-Venäjällä jatkuvat. Ihmisoikeusjärjestö Vjasna sanoo, että varovaisestikin arvioiden Valko-Venäjällä on edelleen yli 900 poliittista vankia. 

          Ohjelmassa kuulemme vankeudesta vapautettujen valkovenäläisten kokemuksia, muun muassa Nobel-palkitun ihmisoikeusaktivistin Ales Bjaljatskin mietteitä. 

          Pohdimme myös politiikan tutkija Artjom Šraibmanin kanssa, miten pitkälle Lukašenka voi mennä neuvotteluissa Yhdysvaltain kanssa ja millaiseen asemaan Venäjän hyökkäyssota Ukrainassa on asettanut Valko-Venäjän. 

          Ohjelman on toimittanut Heikki Heiskanen. Äänitarkkailijana on Juha Hjelm. Tunnusmusiikki: Petri Alanko, kuva: Tuuli Laukkanen/Yle.
