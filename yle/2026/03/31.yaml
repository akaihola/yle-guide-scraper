        description: |-
          Juontajana Jarmo Laitaneva. Käsikirjoittaja-ohjaaja Markus Lehmusruusun käsikirjoittama ja ohjaama elokuva, Orava, vie aikamatkalle tulevaisuuteen. Huhtikuun alussa ensi-iltansa saava suomalais-eurooppalainen elokuva vie katsojansa maailmaan, jossa luonto on hävinnyt miltei kokonaan. Mikä inspiroi Lehmusruusua kirjoittamaan maailman viimeisestä oravasta? Lehmusruusu on monen kollegansa tavoin ohjannut elokuvien lisäksi myös tv-sarjoja. Miten ne ohjaajan näkökulmasta katsottuna eroavat toisistaan? 
