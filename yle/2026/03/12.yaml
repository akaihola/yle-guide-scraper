      - title: 'Epäilyttävän uutta - Aki Yli-Salomäki: Vakauden olemus'
        start_time: '2026-03-12T11:00:00+02:00'
        end_time: '2026-03-12T11:57:00+02:00'
        description: |-
          Arjessa vakaus on usein huomaamatonta, kunnes se ei enää kanna.
          Musiikissa vakaus voi olla yhtä lailla perusta, jota vasten liike, jännite ja hiljaisuus piirtyvät esiin. Jaksossa kuullaan monenlaisia pysyvyyden muotoja: syntikoiden ja jousien kerrostumia, tasapainoisia sointipintoja sekä lähes liikkumattomia äänitiloja.

          Ohjelman on suunnitellut ja toteuttanut Aki Yli-Salomäki.

          Jaksossa soinut musiikki

          Jesse Watt: Water, The Fallen Will Rise Again…

          Sid Acharya: An Inquiry Into the Unexplained, The Resonance of Motion. 
          After Dark, Between Us.

          Luminous Hymn: Soul - Antidote, Sleep, Meditation.

          Christian Reindl (feat. Daniela Mars): Aether, Mistral.

          Dickon Hinchliffe: Opening, In a Cab, I win, Goodnight (elokuvasta Daddio).

          Äänikuormasta pudonneita

          Julia Sinclair & Marijn Cinjee: Wind Takes Flight
          Ganavya: Nilam
          Tim Hecker: Shards
          Dickon Hinchliffe: Prisoner 95 (Original Television Soundtrack)
          Giannis Gogos: Light Within
