      - title: 'Jazzklubin viikon keikka: Dee Dee Bridgewater Quartet Novi Sad -festivaalilla Serbiassa.'
        start_time: '2026-03-12T19:02:00+02:00'
        end_time: '2026-03-12T20:00:00+02:00'
        description: |-
          April Jazziin huhtikuussa Espoo Big Bandin solistiksi saapuva amerikkalaislaulaja Dee Dee Bridgewater esiintyi viime syksynä omalla We Exist! -kvartetillaan Serbiassa Novi Sadin jazzfestivaalilla. 75-vuotiaan legendan toimintaan on aina kuulunut aktivismi ja yhteiskunnallinen vaikuttaminen, mikä kuului myös Serbian kansallisteatterissa äänitetyn konsertin ohjelmistossa: mukana oli mm. Nina Simonen sekä Roberta Flackin poliittisia kappaleita sekä yksi Bob Dylanin uskonnollisen tuotannon laulu.

          1. People Make The World Go Round (säv. & san. Thom Bell & Linda Creed, sov. Cecil Bridgewater)
          2. The Danger Zone (Percy Mayfield)
          3. Tryin' Times (Roberta Flack & Donny Hathaway)
          4. Mississippi Goddam (Nina Simone)
          5. Throw It Away (Abbey Lincoln)
          6. And It’s Supposed To Be Love (Abbey Lincoln)
          7. Gotta Serve Somebody (Bob Dylan)

          Dee Dee Bridgewater, laulu
          Carmen Staaf, piano
          Rosa Brunello, basso
          Julie Saury, rummut

          Äänitetty Serbian kansallisteatterissa 12.10.2025.
          Kuva: Niccolo Bruna

          Toimittajana Markus Partanen.
