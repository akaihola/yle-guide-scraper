      - title: 'Maailma tarinoina: All is lost – purjehtija merihädässä opettaa stoalaista tyyneyttä'
        start_time: '2026-03-12T12:05:00+02:00'
        end_time: '2026-03-12T13:00:00+02:00'
        description: |
          Robert Redfordin tulkitsema purjehtija elokuvassa All is lost näyttää, miten merihädässä Intian valtamerellä toimitaan stoalaisen, käytännönläheisen filosofian mukaisesti. Samoin tulisi stoalaisittain suhtautua mihin tahansa haasteeseen, jonka elämä eteen heittää, ja jopa rakastaa kohtaloaan. Toisaalta elokuvan purjehtijan voi nähdä edustavan myös hyvin epästoalaisia piirteitä. Miten stoalaiset suhtautuivat omaisuuteen, kuten purjeveneisiin, matkailusta ja elämyshakuisuudesta puhumattakaan? Miksi stoalaisuudesta on tullut muotifilosofia, ja mistä sen mukaan onni on tehty?

          Stoalaiseen ajatteluun elokuvan kehystämänä uivat Marja Vehkasen luotsaamana kirjailija-kääntäjä, teologian tohtori Juhana Torkki ja filosofian tohtori Tommi Kakko.
      - title: 'Politiikkaradio: Sysääkö sota Iranissa Euroopan öljykriisiin?'
        start_time: '2026-03-12T13:00:00+02:00'
        end_time: '2026-03-12T13:30:00+02:00'
        description: |
          Sota Iranissa uhkaa sysätä Eurooppaa kohti uutta öljykriisiä. Saksassa puretaan öljyn hätävarastoja ja Tanskassa kehotetaan ihmisiä olemaan ajamatta autoa. Iranin mukaan Hormuzinsalmen läpi ei tule litraakaan öljyä. Kuinka pahasti Iranin sota iskee Eurooppaan? Strasbourgin radiostudiossa aiheesta keskustelevat europarlamentaarikot Pekka Toveri (kok. / epp), Li Andersson (vas. / left) ja Katri Kulmuni (kesk. / re). Toimittaajana on Tapio Pajunen.
      - title: 'Radio 1:n iltapäivä: "Miksi seuraan somea?" – Tutkija Hanna Reinikainen selvittää vaikuttaja-seuraaja-suhteen saloja'
        start_time: '2026-03-12T13:30:00+02:00'
        end_time: '2026-03-12T15:00:00+02:00'
        description: |
          Miia Lahti juontaa. Vietämme yhä enemmän aikamme sosiaalisen median parissa. Onko some kulttuuria? Mikä sosiaalisen median vaikuttajien videoissa, teksteissä ja tekemisissä meitä houkuttaa ja koukuttaa. Mikä kiinnostaa meitä juuri nyt ja mihin suuntaan kiinnostuksemme on menossa? Hanna Reinikainen työskentelee tutkijatohtorina Helsingin yliopiston Kuluttajatutkimuskeskuksessa ja tutkii parhaillaan  niin sanottua kirjasomea ja haastattelee somevaikuttajia, jotka tuottavat kirja-aiheisia sisältöjä erityisesti TikTokiin ja Instagramiin. Toimittajana Kati Turtola.

          Tampere-talo -konsernin toimitusjohtaja Paulina Ahokas kertoo Sari Valton haastattelussa, miten hän jo nuorena oivalsi, että haluaa tehdä työtä, jossa voi tarjota ihmisille mahdollisuuksia saada elämyksiä kulttuurin ja taiteen parissa. 
      - title: 'Kulttuuriykkönen: Parhaat Oscar-elokuvat arvioitavana'
        start_time: '2026-03-12T15:00:00+02:00'
        end_time: '2026-03-12T15:55:00+02:00'
        description: |-
          Elokuva-alan suurimmat palkinnot, Oscarit, jaetaan sunnuntain ja maanantain 15.–16. maaliskuuta 2026 välisenä yönä Suomen aikaa Los Angelesin Dolby-teatterissa.  Kulttuuriykkösessä puhutaan Oscar-ehdokkaista ja veikataan voittajia. Paikalla on leffaraatimme, johon kuuluvat Silja Sahlgren-Fodstad, Matti Rämö ja Olli Kangassalo.

          Ensisijaisesti fokuksemme on parhaan elokuvan Oscar-ehdokkaissa ja niitä on kymmenen. Lähetyksessä keskitytään erityisesti seitsemään elokuvaan ja ne ovat Marty Supreme - unelmoi isosti, Sentimental Value, Sinners, the Secret Agent, Train Dreams, Hamnet ja F1. Ehdokkaiden joukosta löytyy kolme elokuvaa, joita olemme käsitelleet jo aikaisemmissa leffaraadeissa tai on käsitelty Kulttuuriykkösessä lähetyksen verran. Ne kolme ovat One Battle after Another, Bugonia ja Frankenstein. Arviot niistä löytyy aikaisemmista podcasteista.

          Ohjelman juontaa Nicklas Wancke.
