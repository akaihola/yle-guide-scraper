      - title: 'Marko Gustafsson: Käännekohdissa: Matti Liimatainen'
        start_time: '2026-03-12T10:00:00+02:00'
        end_time: '2026-03-12T10:53:00+02:00'
        description: |
          Greenpeacen metsävastaavan Matti Liimataisen ura alkoi 1980-luvun lopulla Talaskankaan aarniometsissä. “Olin 14 kun liityin paikalliseen luontokerhoon ja 15-vuotiaana hiihdin poliiseja pakoon Talaskankaalla, kun yritimme estää hakkuut ” Matti muistelee.  Nuori luontoaktivisti päätyi muiden mukana putkaan, mutta se ei lannistanut Liimataista.
          “Oivalsin siellä, että metsäyhtiöiden ja viranomaisten lausunnot suhteessa siihen mitä metsissä tehtiin eivät pitäneet paikkaansa. Ja näin on valitettavan usein edelleen.” Matti Liimatainen toteaa.
