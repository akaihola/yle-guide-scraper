      - title: 'Tuuli Saksalan keidas: Ei kone kaikkea osaa'
        start_time: '2026-03-12T17:35:00+02:00'
        end_time: '2026-03-12T18:25:00+02:00'
        description: |-
          Tuuli Saksala pohtii tekoälyn ja luovan työn suhdetta. Miksi annamme koneelle ne kiinnostavimmat työt?

          Luominen ei ole datan prosessointia. Se horjuu, epäröi ja yllättää. Brasilialainen Lucas Santtana vertaa luomisprosessiaan transsitilaan, sukeltamiseen. Salsan legenda Willie Colónin ja Rubén Bladesin Pedro Navaja kertoo tarinan kadulta - täynnä ironiaa, tragiikkaa ja sellaista älyttömyyttä, jota tekoäly ei ymmärrä.

          Ohjelmassa myös musiikkia Etno-Emma-palkitulta duolta Hilda Länsman ja Tuomas Norvio.

