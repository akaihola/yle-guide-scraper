      - title: 'Radio 1:n iltapäivä: "Miksi seuraan somea?" – Tutkija Hanna Reinikainen selvittää vaikuttaja-seuraaja-suhteen saloja'
        start_time: '2026-03-12T13:30:00+02:00'
        end_time: '2026-03-12T15:00:00+02:00'
        description: |
          Miia Lahti juontaa. Vietämme yhä enemmän aikamme sosiaalisen median parissa. Onko some kulttuuria? Mikä sosiaalisen median vaikuttajien videoissa, teksteissä ja tekemisissä meitä houkuttaa, kiinnostaa ja kouluttaa. Mikä kiinnostaa meitä juuri nyt ja mihin suuntaan kiinnostuksemme on menossa? Hanna Reinikainen työskentelee tutkijatohtorina Helsingin yliopiston Kuluttajatutkimuskeskuksessa ja tutkii parhaillaan  niin sanottua kirjasomea ja haastattelee somevaikuttajia, jotka tuottavat kirja-aiheisia sisältöjä erityisesti TikTokiin ja Instagramiin. Toimittajana Kati Turtola.

          N. 14:30 Tampere-talo -konsernin toimitusjohtaja Paulina Ahokas kertoo Sari Valton haastattelussa, miten hän jo nuorena oivalsi, että haluaa tehdä työtä, jossa voi tarjota ihmisille mahdollisuuksia saada elämyksiä kulttuurin ja taiteen parissa. 
