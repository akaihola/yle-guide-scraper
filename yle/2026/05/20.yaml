        end_time: '2026-05-20T08:00:00+03:00'
        description: |+
          Tshaikovski - Wild: Pienten joutsenten tanssi bal. Joutsenlampi (Earl Wild, piano). 

          Pärt: Kuus, kuus kallike (Tallinnan kamariorkesteri ja Viron filharmonian kamarikuoro/Tönu Kaljuste).   

          J.S. Bach: Vivace konsertosta kahdelle viululle, jousille ja continuolle d-molli (Hilary Hahn ja Margaret Batjer, viulu, sekä Los Angelesin kamariork./Jeffrey Kahane).

          Massenet: Meditaatio oopp. Thaïs (Michala Petri, alttonokkahuilu, ja Lars Hannibal, kitara).

          Viviani: Sonaatti trumpetille ja continuolle nro 2 kokoelmasta Capricci armonici da chiesa e da camera (Andreas Lackner, trumpetti,  Katalin Sebella, fagotti, Wolfgang Zerer, urut, Roberto Sensi, viola da gamba ja Luciano Contini, arkkiluuttu).

          Mendelssohn: Frühlingslied (Kevätlaulu) (Dietrich Fischer-Dieskau, baritoni, ja Wolfgang Sawallisch, piano).

          Bruch: Alkusoitto oopp. Die Loreley (Bambergin sinfonikot/Robert Trevino).

          Busoni: Albuminlehti (Sharon Bezaly, huilu, ja Roland Pöntinen, piano).

          Albéniz: Kastilia (Xuefei Yang, kitara).

          Kats-Chernin: Eliza Aria bal. Villijoutsenet (Angèle Dubeau, viulu, ja La Pietà).

          Popper: Espanjalainen tanssi nro 3 (Helen Linden, sello, ja Folke Gräsbeck, piano).

          J. Gade: Tango jalousie (Wienin filharmonikot/Sakari Oramo, viulu).

