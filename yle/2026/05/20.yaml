      - title: 'Kulttuuriykkönen: Eveliina Talvitien romaani Matleena kertoo suomalaisen muodin kulta-ajasta'
        start_time: '2026-05-20T15:00:00+03:00'
        end_time: '2026-05-20T15:55:00+03:00'
        description: |-
          Eveliina Talvitien ompelijatrilogian toinen osaa kertoo porilaisesta ompelijasta Matleenasta. Ajankuva on 1960-1980-luvut, jolloin Suomi-muoti otti ensimmäiset vahvat askeleensa. Talvitien romaanista tehdään parhaillaan näyttämösovitusta Porin Teatteriin. Puvustajana on Pasi Räbinä. Matleenan innostamana Eveliina Talvitie myös ompelutti retrohenkisen nimikkovaatteen romaanihenkilölleen. Millä tavalla kirjailijan omat porilaiset juuret näkyvät hänessä tänään? Nykyään hän asuu sekä Tallinnassa että Ateenassa. Miten dramaturgi näkee romaanin visuaaliset elementit lavalla? Trilogia käsittelee myös ylisukupolvisia traumoja ja haavoja. Miten tulkita rivien väliset tunnelmat?

          Ohjelman vieraina ovat kirjailija Eveliina Talvitie ja dramaturgi Minna Nurmelin.

          Ohjelman juontaa Pia-Maria Lehtola.

          Rentoa puhetta, kiinnostavimmat vieraat ja kulttuurin ajankohtaisaiheet debatoitavina. Suorana maanantaista perjantaihin.
