      - title: '12 diktaattoria: Suuri leijona Hastings Banda'
        start_time: '2026-05-20T12:05:00+03:00'
        end_time: '2026-05-20T12:44:00+03:00'
        description: |-
          Malawin diktaattori, tohtori Hastings "yksi puolue, yksi johtaja ja pulinat pois" Banda, retosteli syöttävänsä poliittiset vastustajansa krokotiileille. 
          Bandan aikana Malawi oli Afrikan Kainuu, jonne sopi hyvin oma savupirtin pojasta jylhäksi maanisäksi noussut Kekkonen, joka näytti muille torpan paikan, kertoo toimittaja, tietokirjailija Hannu Pesonen. Toimittajana Raimo Tyykiluoto. Koko sarja on kuunneltavissa Yle Areenassa.
          (julkaistu v. 2018)
