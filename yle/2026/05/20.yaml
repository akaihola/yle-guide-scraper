          Lehár: Vergissmeinnicht (Lemmikki) (Robert McDuffie, viulu, ja Cincinnati Pops/Erich Kunzel).

          Sibelius: Kuusi (Janne Mertanen, piano).

          Konsertin on laatinut Ainomaija Pennanen.
