      - title: 'Havaintoja muutoksesta: Kintsugia, keramiikkaa ja iloa '
        start_time: '2026-05-20T10:00:00+03:00'
        end_time: '2026-05-20T10:50:00+03:00'
        description: |
          Käsillä tekemisen tarve näkyy keramiikka- ja kintsugikursseilla. Kintsugi on vanha japanilainen korjausmenetelmä, jossa rikkoutuneen esineen osat liitetään uudelleen yhteen japaninlakalla, kullalla tai hopealla. Millaisia merkityksiä keramiikkataide tai kintsugi luovat? Mitä käsillä tekemisen prosessit opettavat meille?
          Toimittaja Satu Kivelä etsii vastauksia yhdessä suunnittelija ja keramiikkataiteilija Tero Kuitusen ja kintsugitaitaja Katja Seppisen kanssa.
