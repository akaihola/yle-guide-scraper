        end_time: '2026-05-17T16:59:59+03:00'
        description: |-
          J. Strauss, nuor.: Caramellon laguunivalssi "Ach wie so herrlich zu schaun" oper. Eine Nacht in Venedig (Yö Venetsiassa) (Fritz Wunderlich, tenori, ja Berliinin sinfonikot/Fried Walter).

          Liszt: Etydi n:o 5 E-duuri (Metsästys) teoks. Grandes etudes de Paganini (Earl Wild, piano).

          Dvorák: Vanha kirje kirjan välissä teoks. Sypressejä (Emerson-kvartetti).

          Whitacre: Water night (The Eric Whitacre Singers/Eric Whitacre).

          Pernambuco: Sons de carrilhoes (Pepe Romero, kitara).

          Granados: Masurkka sarj. Escenas romanticas (Romanttisia kohtauksia) (Alicia de Larrocha, piano).

          Debussy: Pantomime (Natalie Dessay, sopraano, ja Philippe Cassard, piano).

          Tabakova: Preludi teoks. Suite in old style (Sarja vanhaan tyyliin) (Liettuan kamariork./Maxim Rysanov, alttoviulu, sekä Vaiva Eidukaityte-Storastiene, cembalo).

          Florio: Andante kvartetosta neljälle saksofonille (Rascher-kvartetti).

          Pejacevic: Liebeslied (Ingeborg Danz, altto, ja Brandenburgisches Staatsorchester Frankfurt/Howard Griffiths). 

          Caplet: À la francaise C-duuri teoks. Deux divertissements (Elizabeth Hainen, harppu).

          Konsertin on toimittanut Laura Korhonen.
