        start_time: '2026-05-17T08:05:35+03:00'
        end_time: '2026-05-17T08:59:36+03:00'
        description: |
          Risto Laurialan intohimo musiikkiin ja pianonsoittoon syttyi pikkupoikana Oulussa, eikä se ole sammunut. Konsertteja, sekä omia resitaaleja että konsertteja kamarimusiikkona, on tasaiseen tahtiin. Takana on kuusi vuosikymmentä ammattipianistina, ja edelleen kulkee, voi Risto Laurialasta
          todeta. Toimittajana Outi Paananen.
