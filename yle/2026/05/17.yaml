      - title: 'Klasariparatiisi: Mariannan talossa'
        start_time: '2026-05-17T07:00:47+03:00'
        end_time: '2026-05-17T07:54:38+03:00'
        description: |
          Se, missä kerroksessa asuu, kertoo sosiaalisesta asemasta. Näin oli ainakin 1700-luvun puolivälissä Wienissä. Keitä asui suuressa talossa keskellä kaupunkia, ja miten asiaan liittyy musiikki....ja Marianna?

          Eva Tigerstedt avaa polkuja musiikkiin.

          Ohjelman musiikit:

          Marianna Martines: Sol che un instante, aaria kantaatista "Il primo amore" (Nuria Rial, sopraano, ja  La Floridiana-orkesteri/Nicoleta Paraschivescu).

          Joseph Haydn: Andante, sonaatista A-duuri Hob. XVI:12 (Tuija Hakkila, fortepiano).

          Nicola Porpora: Alto Giove (Philippe Jaroussky, kontratenori, ja Venetsian barokkiorkesteri/Andrea marcon).

          Marianna Martines: Allegro con spirito, Alkusoitosta C-duuri (La Floridiana-orkesteri/Nicoleta Paraschivescu).

          Marianna Martines: Kantaatti "Orgoglioso fiumicello" (Anna Bonitatibus, mezzo-sopraano, ja La Floridiana-orkesteri/Nicoleta Paraschivescu).
