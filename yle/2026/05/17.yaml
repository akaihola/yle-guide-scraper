        description: |
          Intialaisen tabla-rummunsoittaja Suranjana Ghoshin (s. 1972) Teental-yhtye yhdistää pohjois-intialaisen klassisen musiikin pohjoismaiseen jazziin ja kansanmusiikkiin. Konsertti on taltioitu Sävjan kulttuurikeskuksessa Uppsalassa 16.9.2025. Toimittajana on Miika Lauriala. 
      - title: 'Jazzklubi: "Turha stressata asioista, joita et voi hallita" – Mamba Assefan resepti elämään ja musiikkiin'
        start_time: '2026-05-17T18:00:06+03:00'
        end_time: '2026-05-17T19:00:00+03:00'
        description: |-
          Lyömäsoittaja, rumpali ja tuottaja Abdissa "Mamba" Assefa kertoo Jazzklubin studiossa, miten improvisaatio yhdistää sekä musiikkia että ruoanlaittoa - ja miksi elämässä kannattaa olla joustava. "Mä oon keittiössä hyvin luova. Mä katson kaapit läpi ja improvisoin. Se maustaminen on yhtä kuin lyömäsoittajan taito, ne pienet detaljit." Kuuntelukerho on poikkeuksellisesti katselukerho. Keskustelemme Yle Areenasta löytyvästä Quincy Jones -dokumentista. Toimittajat ovat Laura Korhonen ja Eero Koski.
