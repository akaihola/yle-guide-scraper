      - title: 'Uutispodcast: Käärijä-ilmiö ei ollut sattumaa – näin se syntyi'
        start_time: '2026-05-17T21:00:33+03:00'
        end_time: '2026-05-17T21:24:50+03:00'
        description: |-
          Jakso on uusinta keväältä 2023. Silloin Suomi pukeutui vihreään ja hoilasi cha cha cha, kun Käärijä osallistui Euroviisuihin. Mikä Käärijä-ilmiössä oli tarkasti suunniteltua ja mikä sattumaa? Miten rakennettiin brändi, jolla myytiin kaikkea kääretortusta kahvakuulaan?

          Reetta Röngän vieraana Käärijä eli Jere Pöyhönen. Lisäksi ilmiötä avaavat biisintekijä Johannes Naukkarinen, Monsp Recordsin Ida Karimaa ja UMK:n Tapio Hakanen.
