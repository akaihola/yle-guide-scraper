      - title: 'Romano mirits: Jasmine Valentin'
        start_time: '2026-05-17T23:26:00+03:00'
        end_time: '2026-05-17T23:39:30+03:00'
        description: |+
          Jasmine Valentin on monelle tuttu ja vuosikymmenien takaa, kun hän edusti Suomea Euroviisuissa vuonna 1996. Sen jälkeen on tapahtunut paljon Jasminen elämässä. Hän on ollut jo kolmevuosikymmentä taitava ja pidetty muusikko, joka on ollut monessa mukana niin kotimaassa kuin ulkomaillakin. Viime vuonna tuli mukaan myös uudenlainen taidekokonaisuus, jossa yhdistyvät lapset. nukketeatteri, musiikki ja oman suvun historia ja tarina. Toimittajana Janette Grönfors.

