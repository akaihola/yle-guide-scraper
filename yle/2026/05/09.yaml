        start_time: '2026-05-09T10:25:00+03:00'
        end_time: '2026-05-09T11:00:00+03:00'
        description: |
          Pitkällä taipaleella oppii tuntemaan matkaseuralaisensa, vaikka oltaisiin eri lajia.  Annikki huomaa, että johtavasta lehmästä on apua kaikille, ja kotioloissa kipakka Helinä tekee vaikutuksen Maijaan.  Lahjan seurueessa kulkee takapuoleen ammuttu hännätön lehmä, mutta naapurin Ida ei siitä luovu. Lehmät ja tytöt lohduttavat toisiaan, mutta huoli perheestä kasvaa. Näkeekö äitiä enää koskaan?
