        description: |
          Graun: Allegro konsertosta C-duuri (Dorothee Oberlinger, nokkahuilu, Hiro Kurosaki, viulu, ja Ensemble 1700).

          Mendelssohn: Lied ohne Worte n:o 2 (Sanaton laulu) a-molli (Arto Satukangas, piano).

          Le Beau: Finaali kvartetosta pianolle ja jousille f-molli (Kaleidoscope Chamber Collective).

          Grieg: Nokturno teoks. Lyrisk svit (Lyyrinen sarja) (Kölnin radion SO/Eivind Aadland).

          Wagner: Elisabethin tervehdys "Dich, teure Halle, grüss ich wieder" oopp. Tannhäuser (Karita Mattila, sopraano, ja RSO/Jukka-Pekka Saraste). 

          Balakirev: Chant du pecheur (Kalastajan laulu) (Liisa Pohjola, piano).

          Dvorák: Oi ihana ruusu teoks. Sypressejä (Cyprise) (Emerson-kvartetti).

          Bellini: Arturon aaria "A te, o cara, amor talora" sekä Arturon, Elviran, Giorgion ja Valtonin kvartetto "Senza occaso quest'aurora" oopp. Puritaanit (Luciano Pavarotti, tenori, Arleen Auger, sopraano, Reid Bunger ja Herbert Lackner, basso, sekä Wienin valtionoopperan kuoro ja ork./Nicola Rescigno).

          Severac: Valse romantique sarj. En vacances (Lomalla) (Lily Laskine, harppu).

          Raitio: Valssi orkesterille (Tapiola Sinfonietta/Tuomas Hannikainen).

          Anonyymi 1600-luvulta: Zacaras por primer tono (Villancico/Peter Pontvik). 

          Chapí: Luisan aaria "Carceleras" zarzuelasta Las hijas de Zebedeo (Teresa Berganza, mezzosopraano, ja Englantilainen kamariork./Enrique García Asensio). 

          Konsertin on laatinut Ainomaija Pennanen. 
