      - title: Faunin iltapäivä
        start_time: '2026-05-14T16:07:00+03:00'
        end_time: '2026-05-14T16:59:00+03:00'
        description: |
          Graun: Allegro konsertosta nokkahuilulle, viululle, jousille ja continuolle C-duuri (Dorothee Oberlinger, nokkahuilu, Hiro Kurosaki, viulu, Ensemble 1700).

          Mendelssohn: Lied ohne Worte n:o 2 (Sanaton laulu) a-molli (Arto Satukangas, piano).

          Le Beau: Finaali kvartetosta pianolle ja jousille (Kaleidoscope Chamber Collective).

          Grieg: Nokturno Lyyrisestä sarjasta (Kölnin radion SO/Eivind Aadland).

          Wagner: Elisabethin tervehdys "Dich, teure Halle, grüss ich wieder" oopp. Tannhäuser (Karita Mattila, sopraano, ja RSO/Jukka-Pekka Saraste). 

          Balakirev: Chant du pecheur (Kalastajan laulu) (Liisa Pohjola, piano).

          Dvorák: Oi ihana ruusu (Emerson-kvartetti).

          Bellini: Arturon aaria ja kvartetto oopp. Puritaanit (Luciano Pavarotti, tenori, Arleen Auger, sopraano, Reid Bunger ja Herbert Lackner, basso, sekä Wienin valtionoopperan kuoro ja ork./Nicola Rescigno).

          Severac: Romanttinen valssi (Lily Laskine, harppu).

          Raitio: Valssi orkesterille (Tapiola Sinfonietta/Tuomas Hannikainen).

          Anonyymi 1600-luvulta: Zacaras por primer tono (Villancico/Peter Pontvik). 

          Chapí: Luisan aaria zarzuelasta Las Hijas de Zebedeo (Teresa Berganza, mezzosopraano, Englantilainen kamariork./Enrique García Asensio). 


          Konsertin on laatinut Ainomaija Pennanen. 
