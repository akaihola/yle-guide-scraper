      - title: Tuuli Saksalan keidas
        start_time: '2026-05-14T17:35:00+03:00'
        end_time: '2026-05-14T18:25:00+03:00'
        description: |-
          Takatukka-ilmiö - Keitaan vieraana Antti Paalanen

          Tuuli Saksalan keitaalle saapuu vieraaksi kansanmuusikko Antti Paalanen, joka nousi kertaheitolla tutuksi suurelle yleisölle UMK-finaalista ja sen kestohitistä "Takatukka". Miten UMK-kokemus muutti hänen elämänsä? Millainen filosofia hänellä on kampaustyylistään? Voiko öristä ilman alkoholia? Ja miten tähän kaikkeen liittyy enkelikivet? Paalanen pohtii myös, miten pienestä pojasta, joka unelmoi rokkistarasta, tuli haitaristi. Ohjelmassa kuullaan haitaristin tuoreimpia biisejä sekä hänen valitsemiaan musiikillisia tuliaisia. 
      - title: 'Poiminta Radio 1:n iltapäivästä '
        start_time: '2026-05-14T18:25:00+03:00'
        end_time: '2026-05-14T18:35:00+03:00'
        description: |-
          Ylen show-tuottaja Matti Myllyaho työskentelee koko vuoden Uuden musiikin kilpailun lähetyksien sekä Euroviisujen parissa. Hän on parhaillaan mukana myös Wienissä. Tällä kertaa Myllyaho on tuottajan työn lisäksi lavalla mustiin pukeutuneena, kameroilta piilossa. Myllyaholla onkin hyvin monipuolinen kokemus Euroviisuista ja Uuden musiikin kilpailuista jo usean vuoden ajalta. Miia Lahti haastattelee.  (Ohjelma on ote 10.3.2026 kuullusta haastattelusta.)
      - title: 'Luomiskertomus: Mariia Niskavaara kirjoitti näynomaisen tarinan lihansyöjien kaupungista'
        start_time: '2026-05-14T18:35:00+03:00'
        end_time: '2026-05-14T19:00:00+03:00'
        description: |-
          Mariia Niskavaaran esikoisromaani "Ester, teurastaja" on näkyjen varaan kirjoitettu kertomus lihansyöjien kaupungista. Siellä kaikki, mikä on todellista, kaunista ja merkittävää, kiertyy lihan ja lihanjalostuksen ympärille. Niskavaara kertoo, että tapahtumat ja henkilöt  syntyivät vahvoina mielikuvina ennen sanoiksi pukemista. Päähenkilö, Ester on ammatiltaan teurastaja, ja hän kokee työnsä esteettisesti kiehtovaksi. Liitto keinosiementäjän kanssa kulkee kohti unelmaa omasta lapsesta, ja unelma omalla tavallaan toteutuukin.  Toimittajana on Jonni Roos. 
