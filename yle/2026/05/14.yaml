        description: |-
          Thaimaa on yksi suosituimipia suomalaisten matkakohteita. Suomalaisia turisteja vierailee Thaimaassa vuosittain noin 100 000. Kirjailija Esa Mäkijärvi halusi syventää tuntemustaan Thaimaan kulttuurista ja kulki sinne keittiön kautta. Mäkijärvi kirjoitti kirjan thaimaalaisesta keittiöstä. Kati Turtola haastattelee. Ohjelma on uusinta maaliskuulta.
