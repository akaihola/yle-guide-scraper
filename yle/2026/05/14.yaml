      - title: 'Maailma tarinoina: Kokuho - kabukin mestari: kun perinnetaide laajenee elämänfilosofiaksi'
        start_time: '2026-05-14T12:05:00+03:00'
        end_time: '2026-05-14T13:00:00+03:00'
        description: |-
          Sang-il Leen ohjaama elokuva Kokuho - kabukin mestari on ollut Japanissa poikkeuksellinen katsojamenestys. Shūichi Yoshidan romaaniin perustuva elokuva on ystävysten kilpailun sävyttämä kasvutarina kabukinäyttelijöiksi. 
          Elokuva antaa runsaasti tilaa japanilaisen perinteisen teatterimudon, kabukin, kuvaukselle. Mitä on kabukin brutaali kauneus? Miten Japanissa ajattelu ikävaiheista, taidoista ja kukoistuksesta poikkeaa länsimaisesta ajattelusta?
          Kabukin historiaa, elementtejä ja symboliikkaa sekä taiteelle omistautumisen tietä avaa henkilökohtaistenkin kokemusten kautta Japanin tutkimuksen tohtori Minna Eväsoja.
      - title: Radio 1:n helatorstain iltapäivä
        start_time: '2026-05-14T13:00:00+03:00'
        end_time: '2026-05-14T15:00:00+03:00'
        description: |
          N. klo 13:10 Jumppatytöt-teatteriesityksestä on kasvanut parissa vuodessa huima ilmiö. Inkeri Hyvösen, Katariina Havukaisen ja Ella Lahdenmäen käsikirjoittama ja ohjaama teos perustuu heidän omiiin kokemuksiiinsa ja se antaa äänen sadoilletuhansille suomalaisille tytöille ja naisille, joita voimistelu on liikuttanut. Miia Lahti haastatteli Inkeri Hyvöstä, Katariina Havukaista ja Ella Lahdenmäkeä. Ohjelman ensilähetys oli 18.12.2025. 


          N. klo 14 Jussi-palkittu elokuvaohjaaja, käsikirjoittaja Aleksi Salmenperä on Jarmo Laitanevan studiovieraana. Miten Aleksi Salmenperä valitsee aiheensa? Miettiikö Salmenperä työskennellessään sitä, miten paljon katsojien kipupisteitä voi koskettaa? Ohjelman ensilähetys oli 4.3.2026.
      - title: 'Taiteilijatapaaminen: Kimmo Schroderus ja Anssi Kasitonni'
        start_time: '2026-05-14T15:00:00+03:00'
        end_time: '2026-05-14T15:55:00+03:00'
        description: |-
          Jos satut samaan tilaan kuvanveistäjä Kimmo Schroderuksen ja monialataiteilija Anssi Kasitonnin kanssa, intohimoinen keskustelu autoista on hyvin todennäköistä. Taiteilijatapaamisessa nämä kaksi tunnettua taiteilijaa avaavat autointoiluaan ja sitä miten se on vaikuttanut heidän luomaansa taiteeseen. 
          Toimittajana Marko Miettinen.
