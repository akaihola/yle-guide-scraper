      - title: 'Lehmitytöt 1944 J3: Nyt väsyvät lehmät ja niiden ajajat'
        start_time: '2026-05-04T20:25:00+03:00'
        end_time: '2026-05-04T21:00:00+03:00'
        description: |
          Juhannusta vietetään apeissa tunnelmissa.  Viipurin menetys lisää pelkoa, mitä seuraavaksi? Koivistosta lähteneen 15-vuotiaan Lahjan vastuulla ovat perheen lehmät Käki ja Oma. Kengät kuluvat puhki ja sorkat ovat verillä. Matkalaiset väsyvät, mutta levätä ei ehdi, kun vihollinen lähestyy. Lehmitytöt ovat omillaan eikä tarjolla ole varusteita tai ruokaa. Yöt vietetään ladoissa ja taivasalla. 
