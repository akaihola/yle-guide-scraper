      - title: 'Keinuva talo - Mika Kauhanen: Elämä junamatkana'
        start_time: '2026-05-04T17:35:00+03:00'
        end_time: '2026-05-04T18:35:00+03:00'
        description: |-
          Pohjois-Amerikan juurimusiikissa kauas kaipaava ei katsele merta vaan rautatietä. Perinteessä on kokonainen lajityyppi junakappaleille, train songs, joita ovat laatineet niin bluesin, bluegrassin, kantrin kuin gospelin tekijät. Toimittaja Mika Kauhanen kuljettaa ja kuuluttaa pysäkit, deltan alkulähteiltä aina nykypäivän artisteihin. Minkälaisia merkityksiä junille ja rautatielle on lauluissa annettu?
