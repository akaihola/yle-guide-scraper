      - title: 'Klasariparatiisi - Eva Tigerstedt: Olipa kerran Dresden, jalokivi Elbe-joen rannalla'
        start_time: '2026-05-24T07:00:47+03:00'
        end_time: '2026-05-24T07:55:50+03:00'
        description: |+
          Toisen maailmansodan lopulla Dresdenin kaupunki pommitettiin tuusan nuuskaksi. Paitsi että tuhannet ihmiset kuolivat, tuhoutui myös loistelias vanha kaupunki ja satoja vuosia kulttuurihistoriaa. Kaupungin kimmeltävä kulta-aika oli 1700-luvulla, kun taidokkaat muusikot ja säveltäjät tekivät Dresdenin musiikkielämästä Euroopan korkeatasoisimman. Arkkitehtuuri ja taide oli myös huippuluokkaa.
          Miten Dresdenistä tuli sellainen jalokivi, ja miten loisto loppui?

          Eva Tigerstedt avaa polkuja musiikkiin.

          Ohjelman musiikit:

          Johann Adolf Hasse:  Alkusoitto oopperasta Ciro riconosciuto (Cappella Gabetta/ Andres Gabetta).

          Walther von der Vogelweide: Under der linden (Lehmuksen alla) (Uli Kontu-Korhonen, sopraano ja Oliphant-yhtye).

          Antonio Scandello: Ein Henlein weis (Amarcord).

          Heinrich Schütz:  Ein Kind ist uns geboren  (Lapsi on meille syntynyt) (Hanna Herfurtner, sopraano, David Erler, kontratenori, Stephan Scherpe, tenori, Jakob Ahles, basso, ja Lautten Compagney/ Wolfgang Katschner).

          Carlo Pallavicino: Sdegni, furori barbari, oopperasta L’ Antiope (Lea Desandre mezzosopraano, ja Ensemble Jupiter/ Thomas Dunford).

          Antonio Vivaldi: Konsertto g-molli RV107 op.44/13, huilulle, oboelle, viululle, fagotille ja continuolle (Münchenin barokkisolistit/ Dorothea Seel).

          Jan Dismas Zelenka: Da pacem Domine (Anna Herra rauha) ZWV167 kahdelle kuorolle, orkesterille ja continuolle (Ensemble Inegal- vokaaliyhtye, ja Prahan barokkisolistit/ Adam Viktora).

          Johann Adolf Hasse: Requiem Es-duuri, osat Agnus Dei, Lux aeterna, Requiem Aeternam
          Simona Houda-Saturova, sopraano, sekä Dresdenin Kamarikuoro ja barokkiorkesteri/ Hans-Christoph Rademann).

