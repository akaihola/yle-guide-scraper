      - title: 'Klassikkokuunnelma: Taistelu  Heikkilän talosta.'
        start_time: '2026-05-24T15:00:00+03:00'
        end_time: '2026-05-24T15:47:00+03:00'
        description: |
          Rikoksen ja rangaistuksen ympärille kiertyvä tarina kertoo Heikkilän talon vahvasta emännästä ja heikosta isännästä sekä heidän välienselvittelystään, joka päättyy tragediaan. Johannes Linnankosken samannimiseen novelliin perustuva tarina kuvaa myös vuosisadan vaihteen suomalaista maatalousyhteiskuntaa ja sen jakoa talollisiin ja renkeihin.

          Kuunnelman on Johannes Linnankosken novellin mukaan Yleisradiolle kirjoittanut Antero Alpola. Ohjaus: Markus Rautio.
          Henkilöt:
          Isäntä - Kaarlo Halttunen.  Emäntä - Kirsti Ortola. Sisäkkö - Martta Kontula. Nainen - Elsa Turakainen.  Väliportin Matti - Unto Salminen.  Mies - Oke Tuuri.  Tuomari - Artturi Laakso. 
          Nimismies - Eino Kaipainen.  Kirkkoherra - Helge Ranin.  Kertoja - Lauri Kuosmanen.
          Kuuntelijan toiveuusinta on vuodelta 1948. 
