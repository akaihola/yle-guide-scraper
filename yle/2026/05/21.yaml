          Barrios: Cueca (John Williams). 

          Grieg: Solnedgang (Auringonlasku) kok. Romansseja ja balladeja Andreas Munchin runoihin (Håkan Hagegård, baritoni, ja Warren Jones, piano).

          Chaminade: Concertino huilulle ja orkesterille (Sharon Bezaly ja Haagin Residentie-ork./Neeme Järvi). 

          Leonard (sov. Isserlis): Aasi ja ajaja (Steven Isserlis, sello, ja Thomas Adès, piano). 

          Konsertin on toimittanut Riikka Holopainen.
