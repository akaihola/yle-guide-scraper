      - title: '12 diktaattoria: Suuri leijona Hastings Banda'
        start_time: '2026-05-22T21:31:00+03:00'
        end_time: '2026-05-22T22:25:00+03:00'
        description: |-
          Malawin diktaattori, tohtori Hastings "yksi puolue, yksi johtaja ja pulinat pois" Banda, retosteli syöttävänsä poliittiset vastustajansa krokotiileille. 
          Bandan aikana Malawi oli Afrikan Kainuu, jonne sopi hyvin oma savupirtin pojasta jylhäksi maanisäksi noussut Kekkonen, joka näytti muille torpan paikan, kertoo toimittaja, tietokirjailija Hannu Pesonen. Toimittajana Raimo Tyykiluoto. Koko sarja on kuunneltavissa Yle Areenassa.
          (julkaistu v. 2018)
      - title: 'Tuuli Saksalan keidas: Kimppakämppiä ja kohtaamisia - toukokuun parasta maailmanmusiikkia'
        start_time: '2026-05-22T22:26:00+03:00'
        end_time: '2026-05-22T23:15:00+03:00'
        description: |-
          Musiikin avulla voi matkustaa Andien ylängöille, sumuisille saarille tai Kalkutan ruuhkaisille kaduille. Silti mielenkiintoisin matka laulun siivittämänä tehdään jokaisen omaan mieleen. Tuuli Saksalan keidas avaa maailman ihmeitä musiikin keinoin.
