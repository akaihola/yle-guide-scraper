      - title: 'Konsertteja: Bösendorfer 1882 -konserttisarja: Guts!-kvartetti & Emil Holmström'
        start_time: '2026-05-22T19:02:00+03:00'
        end_time: '2026-05-22T21:00:00+03:00'
        description: |-
          Bösendorfer – 1882 on konserttisarja, jossa esitetään merkittävää 1800-luvun ohjelmistoa ajanmukaisessa ympäristössä ja mahdollisuuksien mukaan ajanmukaisin soittimin. Konserttisarjan keskipisteenä on Bösendorfer-flyygeli vuodelta 1882 ja alkuperäiseen kuntoon entisöity vuonna 1886 valmistunut loistelias Angelicum-sali Helsingin Ritarikadulla.

          Kevätkauden päätöskonsertissa esiintyy vuonna 2025 perustettu suomalainen jousikvartetti Guts!, joka on ottanut haasteekseen esittää kvartettiohjelmistoa periodisoittimin ja historiallisia esityskäytäntöjä tarkoin tutkien. Angelicum-saliin he tuovat eri vuosisatoja peilaavan ohjelman ja yhdistävät lopulta voimansa Emil Holmströmin kanssa Robert Schumannin ikivihreän pianokvinteton parissa.

          28. huhtikuuta Angelicum-salissa tallennetun konsertin toimitta Lotta Emanuelsson. Äänisuunnittelijana on Antti Pohjola ja äänitarkkailijana Hannu Huhtala.

          ​
          Konserttiohjelma:

          Johann Sebastian Bach: Contrapunctus 1 Kunst der Fugesta
          Sofia Gubaidulina: Reflections on the Theme B-A-C-H
          Johann Sebastian Bach: Koraaleja
          Johann Gottlieb Goldberg: Sonata a quattro c-molli, DürG 14
          Robert Schumann: Pianokvintetto Es-duuri, op. 44

          Esiintyjät:

          Guts!-kvartetti:
          Irma Niskanen & Mathieu Garguillo, viulu
          Hanna Pakkala, alttoviulu
          Juuli Holma, sello

          Emil Holmström, piano

          ​
