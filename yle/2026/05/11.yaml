      - title: 'Keinuva talo - Mika Kauhanen: Viulu on unelmapeli'
        start_time: '2026-05-11T17:35:00+03:00'
        end_time: '2026-05-11T18:35:00+03:00'
        description: |-
          Kansanmusiikissa viulu on kuningassoitin. Musiikintekijälle se on lyömätön peli välittää unelmia, haaveita ja tunnelmia, ja herättää niille vastakaikua meissä kuulijoissa. Jakson mittaan kuulemme etnon ykkösviulisteja muun muassa Pohjoismaista, Britteinsaarilta, Pohjois-Amerikasta ja Itä-Euroopasta. Selviää myös se, mitkä 80-luvun TV-sarjat ovat antaneet innoitusta nykykansanmusiikin tekijöille. Toimittajana Mika Kauhanen.
