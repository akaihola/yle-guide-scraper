        start_time: '2026-05-11T19:02:00+03:00'
        end_time: '2026-05-11T19:50:00+03:00'
        description: |
          Ensio Sandell on elänyt kaikki elämänsä 86 vuotta Suomen läntisimmällä saarella Emskärissä. Kesällä hyvän sään aikana Ahvenanmaalla sijaitsevalla saarella vierailee muitakin, mutta kun tulee talvi, niin ainoa savu nousee Ension mökin piipusta. Kaikki muut ovat muuttaneet pois tai kuolleet. 
          Toimittaja: Mervi Leino. (es. 25.3.2024)
