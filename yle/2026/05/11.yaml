      - title: 'Radio 1:n iltapäivä: Teatteriohjaaja Mikko Roiha jatkaa naisten sotakokemusten tutkimista'
        start_time: '2026-05-11T13:30:00+03:00'
        end_time: '2026-05-11T15:00:00+03:00'
        description: |
          Teatteriohjaaja Mikko Roihan töissä on viime vuosina tarkasteltu sotien aiheuttamia olosuhteita erityisesti naisten näkökulmasta. Omaleimainen teatteriohjaaja Mikko Roiha asuu sekä Suomessa että Berliinissä ja työskentelee teattereissa eri puolilla Suomea. Tuorein Roihan työ on usean eri teatterin yhteistuotantona toteutettu Väylä, joka perustuu Rosa Liksomin samannimiseen romaaniin. Tarinassa raskaasta tapaileesta, kun nuoret tytöt veivät karjaa Ruotsiin Lapin sodan aikana.  Mikko Roiha on studiovieraana n. klo 14. Jarmo Laitaneva juontaa.
      - title: 'Kulttuuriykkönen: Unelmana oma kulttuuritalo '
        start_time: '2026-05-11T15:00:00+03:00'
        end_time: '2026-05-11T15:55:00+03:00'
        description: |-
          Kulttuurikentän veteraanit ovat lähteneet pääkaupungilta maakuntaan ja perustaneet kulttuuritaloja, kirjakauppoja ja residenssejä Pyhtäälle, Ruovedelle, Varkauteen ja nyt myös tuoreimpana Forssaan. Millaisia tarinoita ja visioita löytyy näiden unelmien taustalta? Keskusteluun osallistuvat Pyhtään kulttuuritalon perustajista tapahtumatuottaja Vesa Ristimäki, Vinhan kirjakaupasta kirja-alan monitoimija Pasi Vainio ja toukokuussa residenssin Forssassa aloittanut muusikko Jonna Tervomaa. Ohjelmassa vieraillaan myös Varkaudessa, jossa osuuskunta Kovameno Kirsi Kikke Heikkinen ja A.W. Yrjänä aloitteesta on avannut kulttuuritalo Tyyskän.     
          Toimittajana Minna Joenniemi 
