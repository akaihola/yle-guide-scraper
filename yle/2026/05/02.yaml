          00:41 W.A. Mozart: Kvartetto pianolle ja jousille g-molli (Leonard Bernstein, piano, ja Juilliard-kvartetti).

          01:09 Holst: Planeetat (Wienin filharmonikot ja Wienin valtionoopperan kuoron naisäänet/Herbert von Karajan).

          01:58 Pierné: Poème symphonique d-molli (Jean-Efflam Bavouzet, piano, ja BBC:n FO/Juanjo Mena). 

