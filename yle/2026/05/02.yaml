      - title: 'Luomiskertomus: Peter Lindholm - Irti'
        start_time: '2026-05-02T07:30:40+03:00'
        end_time: '2026-05-02T07:52:14+03:00'
        description: |-
          Elokuvaohjaaja Peter Lindholmin esikoisromaani syntyi alun perin sormiharjoituksena. Kustantaja näki 20:n sivun näytteessä kuitenkin jotain muuta ja tilasi romaanin heti seuraavana aamuna. Lopputulos on intuitiivisesti ja ei-kronologisessa järjestyksessä kirjoitettu 254-sivuinen Irti-romaani, joka kertoo mainosohjaaja Stefanista.

          Vaikka Stefanilla on takanaan hienoja vuosia, palkintoja, hulppeita matkoja ja töitä ulkomailla nyt kotona lojuvat vain erojen jälkeiset iänikuiset purkamattomat pahvilaatikot. Nuori tytär saa kuitenkin paatuneen mainosohjaajan etsimään elämälleen uutta suuntaa. Ensin pitäisi kuitenkin tyhjentää ne kodin pahvilaatikot ja uskaltaa käydä läpi niissä sisällä olevat kaikki muistot – hyvät ja huonot.

          Luomiskertomuksen vieraana Irti -romaanin kirjoittanut Peter Lindholm.

          Toimittaja Jukka Kuosmanen.
