      - title: 'Marko Gustafsson: Käännekohdissa Arttu Unkari'
        start_time: '2026-05-02T17:00:00+03:00'
        end_time: '2026-05-02T17:53:00+03:00'
        description: |
          Arttu Unkari nautti työstään alakoulun opettajana, mutta Isämies -kirjasarja mahdollisti päivätyöstä luopumisen ja hän lopetti opettajan hommat. 
          Unkari oli noin vuoden päätoimisena kirjailijana ja huomasi voivansa varsin huonosti. Kun hän palasi takaisin alakoulun opettajaksi, niin myös ahdistus katosi. Arttu Unkarin suosittua Isämies - sarjaa on myyty jo yli 300 000 kappaletta.
