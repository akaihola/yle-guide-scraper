          Schubert: Adagio teoks. Fantasia pianolle C-duuri op.15 (Wanderer) (Ralf Gothóni, piano). 

          Musorgski: Pesnja Mefistofelja o blohe (Mefistofeleen laulu kirpusta) (Martti Talvela, basso, ja Ralf Gothóni, piano). 

          Anonyymi: Poloneesi (Anna-Maaria Oramo, cembalo).

          Madetoja: Lakeus sarj. Pohjalaisia (RSO/Jorma Panula).

          A. Scarlatti: Kevään aaria "Canta dolce il rosignolo" serenatasta La gloria di primavera (Simone Kermes, sopraano, ja Le Musiche Nove/Claudio Osele).

          Kreisler: Liebesleid (Lemmentuskaa) (Ruggiero Ricci, viulu, ja Brooks Smith, piano).

          R. Schumann: Dein Angesicht (Rakkaat kasvosi) (Christoph Pregardien, tenori, ja Michael Gees, piano).

          Lumbye: Columbine (Tanskan radion SO/Gennadi Rozhdestvenski).

          Konsertin on laatinut Heikki Puskala.
