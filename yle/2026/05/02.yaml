      - title: 'Klassikkokuunnelma: Työmiehen vaimo 1/2'
        start_time: '2026-05-02T21:51:00+03:00'
        end_time: '2026-05-02T22:30:00+03:00'
        description: |-
          Osa 1/2. "Teidän lakinne ja oikeutenne, niitähän minun pitikin ampua." Minna Canthin Työmiehen vaimo on väkevä kuvaus epätasa-arvosta ja naisen alisteisuudesta miehelle 1800-luvun lopun Suomessa. Näytelmän muotoon kirjoitetussa tarinassa juhlitaan alkuun Johannan ja Riston häitä. Ihanteellisuus riisutaan jo häämusiikin soidessa, kun Riston teot ja mieltymykset alkavat paljastua vastavihitylle nuorikolle. Miten päästä miehen valtaa karkuun? Entä auttaako joku naisia ahdingossa? Canth kohahdutti radikaalilla teoksellaan vuonna 1885. 
          Teos vuodelta 1963.
      - title: Keinuva talo - Mika Kauhanen
        start_time: '2026-05-02T22:40:00+03:00'
        end_time: '2026-05-02T23:39:30+03:00'
        description: |
          Maailmassa julkaistaan niin paljon musiikkia, että tarvitsemme suodattimia. Keinuvan talon tuntosarvina, ukkosenjohdattimena ja kalaverkkona toimii korttelin oma etnomusikologi Mika Kauhanen. Balkanin rytmeistä Välimeren tunnelmiin, kaihoisista lauluista huimimpaan pelimannisvengiin. Transglobal World Music Chartin jäsen lupaa tuoreita musiikkivalintoja ja kiinnostavia haastatteluvieraita nykykansanmusiikin ja maailmanmusiikin vaiheilta.
