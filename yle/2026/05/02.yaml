      - title: 'Oopperailta: Händeliä Pariisissa, Aamutähti Helsingissä sekä Helena Juntusen haastattelu'
        start_time: '2026-05-02T19:02:00+03:00'
        end_time: '2026-05-02T20:57:00+03:00'
        description: |-
          Oopperaillassa käydään tällä kertaa mm. Pariisissa kuuntelemassa Händeliä sekä Salzburgissa nautiskelemassa Mozartin sävelistä. Lisäksi tutustutaan tarkemmin Suomen kansallisoopperassa alkuvuodesta ensi-iltansa saaneeseen Sebastian Fagerlundin uutuusteokseen Aamutähti, josta kuunnellaan 10.2. taltioitua esitystä. Haastatteluvieraana on sopraano Helena Juntunen. Ohjelman toimittaa Ahti Paunu.
