        description: |-
          Bizet: Menuetti sarj. L'Arlesienne (Arlesitar) n:o 2 (New Yorkin FO/Leonard Bernstein).

          Warlock: There is a lady sweet and kind (Benjamin Luxon, baritoni, ja David Willison, piano).

