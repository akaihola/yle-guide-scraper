      - title: Maailmanpolitiikan arkipäivää
        start_time: '2026-05-26T20:35:00+03:00'
        end_time: '2026-05-26T21:00:00+03:00'
        description: |-
          Venäjän hyökkäyssota aiheuttaa ihmisuhrien lisäksi valtavia ympäristövahinkoja Ukrainassa. 

          Ukrainalaiset ympäristöaktivistit syyttävät Venäjää tahallisesta luonnon tuhoamisesta. Sota on kasvattanut vaatimuksia, että luonnontuhonta lisättäisiin Kansainvälisen rikostuomioistuimen ICC:n tuomiovallan alle. 

          Maailmanpolitiikan arkipäivää -ohjelma tarkastelee, millaisia tuhoja sota on aiheuttanut Ukrainassa. Sota kärjistää jo neuvostoajalta periytyviä ympäristöngelmia, kun taisteluja käydään idässä perinteisellä raskaan teollisuuden alueella. Maaperään leviävät raskasmetallit ja räjähteet taas uhkaavat maataloutta mustan mullan alueestaan tunnetussa Ukrainassa.

          Ohjelman ovat toimittaneet Maxim Fedorov ja Heikki Heiskanen. Äänitarkkailijana on Panu Willman. Tunnusmusiikki: Petri Alanko, kuva: Tuuli Laukkanen/Yle.
