      - title: 'Radio 1:n iltapäivä: Päivi Pälvimäki ui vapaissa vesissä'
        start_time: '2026-05-26T13:30:00+03:00'
        end_time: '2026-05-26T15:00:00+03:00'
        description: |+
          Miia Lahti juontaa. Suomalaiseen kesään liittyy olennaisesti vesi ja uinti. Uintimahdollisuudet vapaissa vesissä ovat Suomessa ainutlaatuisia: meillä on lukemattomia järviä, lampia ja jokia sekä kilometreittäin merenrantaa, josta pääsee kastautumaan. Jokaisenoikeudet antavat meille lähes ainutlaatuisen luvan pulahtamiseen. Päivi Pälvimäki on Suomen Ladun avovesiuintivastaava, joka ui avovesissä vuoden ympäri. Pari vuotta sitten ilmestyneessä kirjassaan Uintiretkellä avovesissä Pälvimäki antaa mm. vinkkejä siihen, miten retkeillä uiden. Pälvimäki tulee Radio 1:n iltapäivän vieraaksi n. klo 14.


      - title: 'Kulttuuriykkönen: Ensimmäinen William Morrisin tuotantoa esittelevä näyttely Suomessa'
        start_time: '2026-05-26T15:00:00+03:00'
        end_time: '2026-05-26T15:55:00+03:00'
        description: |-
          Brittiläisen taiteilijan ja kirjailijan William Morrisin tummat ja utuiset kukalliset kuosit syntyivät 1800-luvulla. Tänään näitä kuoseja löytyy tapeteissa, lautasliinoissa ja kännykän kuorissa. William Morris on taas muodissa, ja se näkyy varsinkin Tukholman katukuvassa ja kodeissa. Morrisin mielestä hyvä design kuuluu kaikille. Hän oli Arts & Crafts -liikkeen keulakuva ja korosti käsityön merkitystä.

          Didrichsenin taidemuseo, Helsingissä avaa 29. toukokuuta ensimmäisen William Morrisin (1834–1896) tuotantoa esittelevän näyttelyn Suo­messa. Näyttelyn esineet ja luonnokset tulevat William Morris Galleryn ja William Morris Societyn kokoelmista. 

          Näyttely syventyy myös Morrisin ja suomalaistaiteilijoiden välisiin verkostoihin. Näyttelyssä liikutaan unen­omaisessa puutarhassa, historiassa ja legendojen maailmassa. Ohjelmassa avataan Arts & Crafts-liikkeen syntyä, sen ideologiaa ja tyylin erityispiirteitä. Mikä oli William Morrisin rooli tämän liikkeen synnyssä? Miten suomalaiset muotoilijat ottivat vastaan tämän uuden suuntauksen ja miten tämä näkyi porvoolaisen 1897 perustetun Iris-tehtaan tuotannossa?
           
          Ohjelman vieraina ovat antiikkiasiantuntija Maria Ekman ja Didrichsenin taidemuseon johtaja Anna-Maria Wiljanen.

          Ohjelman juontaa Pia-Maria Lehtola

          WILLIAM MORRIS 29.5.–30.8.2026 Didrichsenin taidemuseo

          Rentoa puhetta, kiinnostavimmat vieraat ja kulttuurin ajankohtaisaiheet debatoitavina. Suorana maanantaista perjantaihin.
