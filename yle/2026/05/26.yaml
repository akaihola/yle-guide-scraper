        end_time: '2026-05-26T12:25:00+03:00'
        description: |
          Sigmund Freudin Unien tulkinta mullisti modernin psykiatrian ja samalla se mullisti myös käsitykset taiteesta. Taiteenlaijeista varsinkin elokuvilla tuntuu olevan ertityisen läheinen suhde niin psykoanalyysin kuin unienkin kanssa. Selkounien näkijä puolestaan on omien uniensa käsikirjoittaja ja ohjaaja. 
