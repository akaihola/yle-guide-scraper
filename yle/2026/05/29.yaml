      - title: 'Narrin aamulaulu - Jukka-Pekka Saraste: "Kapellimestari on säveltäjän puolestapuhuja"'
        start_time: '2026-05-29T11:00:00+03:00'
        end_time: '2026-05-29T11:55:00+03:00'
        description: |
          Vuosikymmenet erilaisten orkestereiden edessä ovat sytyttäneet Jukka-Pekka Sarasteessa halun auttaa nuorempia. Sarasteen perustama LEAD! Foundation tarjoaa uransa alussa oleville muusikoille ja kapellimestareille poikkeuksellisen laaja-alaista mentorointia. Projektit tapahtuvat eri puolilla maailmaa, mutta kesäisin kokoonnutaan Fiskarsiin. Yksi Sarasteen neuvoista on, "ettei hidasta karriääriä kannata pelätä, onpahan enemmän aikaa kehittyä."  
          Toimittajana Outi Paananen. 
