      - title: 'Narrin aamulaulu - Jukka-Pekka Saraste: "Kapellimestari on säveltäjän puolestapuhuja"'
        start_time: '2026-05-29T11:00:00+03:00'
        end_time: '2026-05-29T11:55:00+03:00'
        description: |
          Kun on viettänyt vuosikymmenet erilaisten orkestereiden edessä, on syttynyt halu auttaa nuoria. Näin tuumaa Jukka-Pekka Saraste, jonka perustama LEAD! Foundation tarjoaa uransa alussa oleville muusikoille ja kapellimestareille poikkeuksellisen laaja-alaista mentorointia. Pienimuotoista LEAD!-laboratoriotoimintaa järjestetään eri puolilla maailmaa, mutta kesäisin kokoonnutaan yhdessä Fiskarsiin. Yksi Sarasteen neuvoista on, ettei hidasta uraa kannata pelätä, onpahan enemmän aikaa kehittyä.  
          Kapellimestarin tapasi Outi Paananen.  
