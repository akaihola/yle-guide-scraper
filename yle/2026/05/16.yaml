        description: |-
          Schütz: Selve beate, se sospirando (Autuaat metsät) (The Consort of Musicke/Anthony Rooley). 

          Wunderer: Waldruhe (Metsänrauha) (Detmoldin käyrätorvikvartetti).

          Liszt: Konserttietydi n:o 4 (Metsän huminaa) (Jorge Bolet, piano).

          Islandsmoen: Det lysnet i skogen (Islannin SO/Bjarte Engeset).

          Söderman: Flickan i skogen (Tyttö metsässä) (Anne Sofie von Otter, mezzosopraano, ja Bengt Forsberg, piano).

          Kuula: Intermezzo op.16 (Keski-Pohjanmaan Kamariork./Juha Kangas).  

          Collan: Metsän yksinäisyys (Matti Lehtinen, baritoni, ja Pentti Koskimies, piano).

          Alfvén: Aftonen (Ilta) (Ruotsin radiokuoro/Peter Dijkstra).

          Sibelius: Skogsrået (Metsänhaltija) (Camilla Tilling, sopraano, ja Paul Rivinius, piano).  

          Gubaidulina: Metsän musikantit teoks. Musikaaliset leikkikalut (Claire-Marie Le Guay, piano).

          Geminiani: Finaali balettipantom. La foresta incantata (Lumottu metsä) (La Stagione Frankfurt/Michael Schneider).

          Konsertin on laatinut Inari Tilli.
