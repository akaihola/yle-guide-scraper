      - title: Marko Gustafssonin vieraana Suomen jääkiekkomaajoukkueen päävalmentaja Antti Pennanen
        start_time: '2026-05-16T17:00:00+03:00'
        end_time: '2026-05-16T17:53:00+03:00'
        description: |
          Valmennusuransa  vaikeina hetkinä Antti Pennanen hakeutui terapiaan ja ajatteli löytävänsä sieltä uusia valmennuskeinoja, mutta löysikin itsensä. "Menin terapeutille sillä ajatuksella, että hän tekee minusta paremman valmentajan. Voi kuinka väärässä olinkaan", Pennanen nauraa. Valmentajan tehtävä on auttaa pelaajia pelaamaan paremmin  ja Antti Pennanen tajusi terapiassa, että ensin on opittava tuntemaan itsensä ennen kuin voi auttaa muita. Ohjelma on uusinta ajalta 5.2.2026.
