      - title: 'Lehmitytöt 1944 J5: Vastuu painaa pientä kulkijaa'
        start_time: '2026-05-16T10:25:00+03:00'
        end_time: '2026-05-16T11:00:00+03:00'
        description: |
          Neuvostoliiton hyökkäys pysähtyy, mutta siitä  lehmitytöt eivät tiedä mitään. Suurena huolenaiheena on lehmien hyvinvointi, eivätkä kaikki pärjää. Utareet laahaavat maata, lehmiä jää jälkeen ja niiden jalat kipeytyvät. Vasikoita syntyy tienvarteen, ja ne pitää jättää yksin kuolemaan emälehmien huutaessa perään. Annikin pieni seurue kokee suuren järkytyksen, kun pojat katoavat kesken matkan.  
      - title: 'Virtasen taloushistoria: Sääntelystä markkinatalouteen'
        start_time: '2026-05-16T11:00:00+03:00'
        end_time: '2026-05-16T11:52:00+03:00'
        description: |
          Pankkiiri Jukka Keitele muistelee 1980-luvun omituisia vuosia. Verotuksen vuoksi yritykset tekivät huonotuottoisia investointeja. Voittojen ja osinkojen sijasta rahat piilotettiin kirjanpitoon. Sääntelystä siirryttiin askel askeleelta markkinatalouteen. Hyvin pitkään säilyi sääntö, jonka mukaan ulkomaalaiset eivät saaneet ostaa vapaasti suomalaisia pörssiosakkeita. Ja jos joku suomalainen halusi ostaa ulkomaista yhtiötä, piti saada lupa viedä valuuttaa maasta. Toimittaja on Juha Virtanen. Ohjelma on uusinta lokakuulta 2025.
