        description: |
          Viulisti Linda Lampenius kertoo valitsemistaan levyistä, joita nyt kuunnellaan. Lindan levyvalinnat kertovat hyvin laajasta musiikkimausta ja monen tyylilajin hallitsemisesta. Ooppera ja klassinen musiikki ovat kuitenkin viulistin elämän suurimpia rakkauksia. Toimittaja on Miikkapekka Heikkilä.
