      - title: 'Vakoojat: Rautarouva Thatcherin ristiretkeä Falklandinsaarille edelsi Britannian MI6 epäonnistuminen'
        start_time: '2026-05-15T21:41:00+03:00'
        end_time: '2026-05-15T22:15:00+03:00'
        description: |
          Falklandinsaarten sota oli 1980-luvun alkupuolen kuohuttavimpia tapahtumia dramaattisten meritaistelujensa takia ja siksi, että ensi kertaa sitten toisen maailmansodan läntisen Euroopan suuri sotilasmahti oli ”oikeassa sodassa” eikä vain siirtomaidensa itsenäistymisliikkeitä kukistamassa.

          Sota oli kuitenkin häkellyttävä esimerkki tiedustelun molemminpuolisesta epäonnistumisesta. Niin britit kuin argentiinalaisetkin tekivät suuria strategisia virhearvioita, jotka johtuivat epäonnistumisista tiedustelutiedon keruussa, analysoinnissa ja johtopäätöksissä, kertoo toimittaja-tietokirjailija Hannu Pesonen. Toimittajana on Raimo Tyykiluoto.
      - title: Tuuli Saksalan keidas
        start_time: '2026-05-15T22:26:00+03:00'
        end_time: '2026-05-15T23:16:46+03:00'
        description: |-
          Takatukka-ilmiö - Keitaan vieraana Antti Paalanen

          Tuuli Saksalan keitaalle saapuu vieraaksi kansanmuusikko Antti Paalanen, joka nousi kertaheitolla tutuksi suurelle yleisölle UMK-finaalista ja sen kestohitistä "Takatukka". Miten UMK-kokemus muutti hänen elämänsä? Millainen filosofia hänellä on kampaustyylistään? Voiko öristä ilman alkoholia? Ja miten tähän kaikkeen liittyy enkelikivet? Paalanen pohtii myös, miten pienestä pojasta, joka unelmoi rokkistarasta, tuli haitaristi. Ohjelmassa kuullaan haitaristin tuoreimpia biisejä sekä hänen valitsemiaan musiikillisia tuliaisia. 
