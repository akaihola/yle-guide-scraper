      - title: 'Keinuva talo - Mika Kauhanen: Uusia musiikillisia paljastuksia'
        start_time: '2026-05-18T17:35:00+03:00'
        end_time: '2026-05-18T18:35:00+03:00'
        description: |
          Kaikkea on paljon! Niin myös uusia etnolevyjä niinkin laajalla toimialueelta kuin koko maailma. Olisipa hienoa, jos joku valitsisi edustavan valikoiman koko porukalle kuunneltavaksi, ja kertoisi taustatkin. Meillä Ylellä on sellainen julkinen palvelu!

          Tällä kierroksella musiikintekijöitä ovat innoittaneet mm. ihmisen äänen vapautuminen kielloista, ristiriitaisten naimakauppojen perintö, kansallisen identiteetin häilyvyys ja maailman pohjoisin majakka. Tietoiskuna toimittaja Mika Kauhanen johdattelee aavikkobluesin perusteisiin.
