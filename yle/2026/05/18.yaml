        start_time: '2026-05-18T19:02:00+03:00'
        end_time: '2026-05-18T19:50:00+03:00'
        description: |-
          Kaksiosaisessa Koukussa reseptilääkkeisiin -dokumentissa toimittaja Ina Mikkola tutkii sitä, mihin, miten, miksi ja millaisissa tilanteissa ihmiset jäävät lääkekoukkuun. Mikä terveydenhuollossa on mennyt vikaan, että ihminen jää koukkuun lääkärin määräämiin reseptilääkkeisiin? Toteutus: Ina Mikkola, Joonatan Kotila ja Sami Hahtala.
