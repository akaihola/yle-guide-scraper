      - title: Iltahartaus
        start_time: '2026-05-18T18:50:00+03:00'
        end_time: '2026-05-18T19:00:00+03:00'
        description: |-
          "Nyt minä ymmärrän"
          Näyttelijä Krista Kosonen lukee Jobin kirjaa (41:1-42:17) VT2028 käännöksen mukaan. 
          Viimeisessä jaksossa Job ymmärtää kaiken olevan Jumalan vallassa.
          Sarja päättyy.

          Viikon päästä Raamatunluennassa alkaa Matteuksen evankeliumi UT2020 käännöksen mukaan. Lukijaa näyttelijä Krista Kosonen.
