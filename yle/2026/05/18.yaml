      - title: 'Kulttuuriykkönen: Miksi Trump on Jeesus? – meemit vallankäytön välineenä'
        start_time: '2026-05-18T15:00:00+03:00'
        end_time: '2026-05-18T15:55:00+03:00'
        description: |
          Mitä viestiä halutaan välittää Donald Trump Jeesuksena -meemillä tai Trump Lego-hahmona-videolla? Ja kenelle?

          Meemit ovat internetissä nopeasti leviäviä kuvia, videoita tai ideoita, jotka toimivat usein vitsinä tai oivaltavana kommenttina. Ne leviävät sosiaalisessa mediassa jäljittelyn kautta ja perustuvat ajankohtaisiin tapahtumiin.

          Asiantuntijoiden mukaan meemit ja huumori ovat tehokkaimpia vaikuttamisen muotoja sosiaalisessa mediassa. Kulttuuriykkösessä pohditaan voiko meemeillä muuttaa maailmaa, mistä saa tehdä meemin, missä menee raja – vai onko rajaa olemassakaan.

          Haastateltavina ovat journalismin ja sosiaalisen median tutkija Margareta Salonen Jyväskylän yliopistosta, taiteilija Jenna Jauhiainen ja tutkijatohtori Joonas Koivukoski Helsingin yliopistosta.

          Lähetyksen juontaa Nicklas Wancke.
