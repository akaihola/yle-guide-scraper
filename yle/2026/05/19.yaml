      - title: 'Kaisa Pulakan aikamatkat: Unikirjoja ja unisymboleja - unimatkoja'
        start_time: '2026-05-19T12:05:00+03:00'
        end_time: '2026-05-19T12:25:00+03:00'
        description: |-
          Unien selittämisen oppaina on tuhansien vuosien ajan käytetty unikirjoja. Unikirjat tietävät, mitä tarkoittaa, jos uneksit faaraorotista tai temppeliryöstöstä tai jos puet viittasi unessa väärin päin. Erityisen kiinnostava on suomalaisen tietäjän Hätämaan Jussin unikirja, josta selviää muun muassa se, että tyttöjen näkeminen unessa merkitsee panettelua takanapäin, kun taas alastomista tytöistä uneksiminen tarkoittaa äkkiarvaamatonta hauskuutta. 
