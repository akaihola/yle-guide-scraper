      - title: 'Kulttuuriykkönen: Unkarilaisen nobelistin László Krasznahorkain kirjoissa ollaan reunalla'
        start_time: '2026-05-19T15:00:00+03:00'
        end_time: '2026-05-19T15:55:00+03:00'
        description: |-
          Unkarilainen nobelisti László Krasznahorkai on tullut suomalaiselle yleisölle tunnetuksi Unkarin köyhää maaseutua ja pikkukaupunkeja kuvaavista äärimmäisen kunnianhimoisista romaaneistaan. Hänen uusin romaanisuomennoksensa Seiobo tuolla alhaalla on episodiromaani taiteilijoista eri aikakausina. Mitä Krasznahorkai kertoo elämästämme ajasta ja millaisten äärimmäisten kysymysten ääreen hänen lukemisensa voi johtaa? Entä millaisia johtapäätöksiä Unkarista ja eurooppalaisista reuna-alueista voi Krasznahorkaita lukiessa tehdä?
          Krasznahorkaista, taiteesta ja Euroopasta ovat Kulttuuriykkösessä keskustelemassa suomentaja Minnamari Sinisalo, Nuori Voima -lehden päätoimittaja Johanna Osváth ja runoilija Erkka Filander.
          Juontajana Pietari Kylmälä


          Rentoa puhetta, kiinnostavimmat vieraat ja kulttuurin ajankohtaisaiheet debatoitavina. Suorana maanantaista perjantaihin.
