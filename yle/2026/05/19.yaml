        description: |+
          Juontajana Miia Lahti.

          N. klo 14 Suomen Elokuvasäätiön kulttuuriviennin suunnittelija Otto Suuronen keskustelee Jarmo Laitanevan kanssa kotimaisista elokuvista, joissa kuvataan maaseutua, suomalaista mielenmaisemaa ja muuttoliikettä. Esimerkkinä Markku Pölösen ohjaama draamakomedia Kivenpyörittäjän kylä.

