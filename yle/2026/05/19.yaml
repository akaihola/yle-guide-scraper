      - title: Maailmanpolitiikan arkipäivää
        start_time: '2026-05-19T20:35:00+03:00'
        end_time: '2026-05-19T21:00:00+03:00'
        description: |-
          Hormuzinsalmen sulku on tulpannut myös merkittävän osan lannoitteiden pääsystä maailmanmarkkinoille. Maailman ruokaohjelma, WFP varoittaa, että sulun seurauksena nälkää näkevien määrä voi maailmassa kasvaa jopa 45 miljoonalla.

          WFP:n apulaispääjohtaja kertoo ohjelmassa, mitkä alueet ovat nyt haavoittuvaisimmassa asemassa.

          Ohjelmassa kuullaan agroekologian ja kestävän ruoantuotannon asiantuntijoilta, miten riippuvaisuutta Persianlahden lannoitetuotannosta voitaisiin vähentää ja ruokaturvaa samalla parantaa.

          Lisäksi käydään Kanta-Hämeessa Mustialan opetus- ja tutkimustilalla kuulemassa, miten lannoitteiden saatavuusshokki näkyy suomalaisviljelijälle.

          Maailmanpolitiikan arkipäivää -ohjelman on toimittanut Paula Vilén. Äänitarkkailijana on Matias Puumala. Tunnusmusiikki: Petri Alanko, kuva: Tuuli Laukkanen/Yle.
