      - title: Kansainvälinen säveltäjärostrum 2026 & Ylen edustusteokset
        start_time: '2026-05-08T19:02:00+03:00'
        end_time: '2026-05-08T21:00:00+03:00'
        description: |
          Kansainvälinen säveltäjärostrum järjestetään 12.–15. toukokuuta Riiassa, Latviassa. Katselmus järjestetään nyt jo 72. kerran.

          Yle osallistuu tapahtumaan tänäkin vuonna ja lähettää rostrumiin aikamme suomalaista musiikkia, jota on äänitetty menneen vuoden aikana eri puolilla Suomea.

          Ainomaija Pennasen toimittamassa suorassa ohjelmassa paljastetaan Ylen edustusteokset säveltäjähaastatteluineen. 
