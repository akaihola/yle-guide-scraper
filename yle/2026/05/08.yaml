      - title: Narrin aamulaulu - Mikki-hiiri, Sairas karhunpoika ja Jori Malmstén
        start_time: '2026-05-08T11:00:00+03:00'
        end_time: '2026-05-08T11:55:00+03:00'
        description: |
          Jori Malmstén kertoi "storeja" eli musiikkisatuja alunperin pojalleen. Niistä ensimmäinen "Sairas karhunpoika" päätyi levylle 1930. Mikkihiiri ja susihukka (1934) saavutti niin suuren suosion, että Markus-setä kyllästyi sen soittamiseen Lastentunnilla ja pyysi Joria säveltämään uusia lauluja. 
          Rakastettujen lastenlauluklassikoiden historiaa valottaa Maisa Krokfors. Toimittajana Outi Paananen. 
          (Uusinta vuodelta 2024).
