        start_time: '2026-05-07T13:30:00+03:00'
        end_time: '2026-05-07T15:00:00+03:00'
        description: |-
          Miia Lahti juontajana. Hanna Visala Visala on Yle Uutisten ulkomaantoimittaja ja sotareportteri, joka on raportoinut muun muassa Ukrainasta, Georgiasta, Saksasta ja Yhdysvalloista. Ensi syksynä hän aloittaa työnsä Yle uutisten Itä-Euroopan-kirjeenvaihtajana Varsovassa. Miten Visala valmistautuu tulevaan pestiinsä? Hanna Visala on studiovieraana n. klo 14. 

          N. klo 14:30 Sari Valto kysyy esikoiskirjailija Amani Al-mehseniltä, minkälaisia kulttuurielämyksiä hän erityiseisti kaipaa.
