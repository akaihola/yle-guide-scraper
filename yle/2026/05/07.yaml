      - title: 'Maailma tarinoina: Saarikosken myöhäistuotannossa maailmankatsomuksesta päästetään irti'
        start_time: '2026-05-07T12:05:00+03:00'
        end_time: '2026-05-07T13:00:00+03:00'
        description: |-
          Pentti Saarikoski etsi läpi tuotantonsa vastauksia suuriin kysymyksiin. Runoilijan lyyriseksi testamentiksi tituleeratussa Tiarnia-sarjassa palataan antiikin myytteihin samalla kun “filosofiat ja politiikat taittuvat kuin kuivat oksat”. Mihin Saarikosken loppuvaiheen runoissa nojataan? Miten runoilijalegendan yhä teatterilavoilla asti kuvattu elämä vaikuttaa runojen vastaanottoon?
          Marja Vehkasen kanssa erityisesti Tiarnia-sarjan Hämärän tanssit -runoelman maalaamissa maisemissa samoilevat kirjailija-kääntäjä Ville-Juhani Sutinen ja kirjailija, kotimaisen kirjallisuuden yliopiston lehtori ja dosentti Vesa Haapala.
