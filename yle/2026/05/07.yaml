      - title: 'Marko Gustafsson: Käännekohdissa Ile Kallio'
        start_time: '2026-05-07T10:00:00+03:00'
        end_time: '2026-05-07T10:53:00+03:00'
        description: |
          “Musiikilla on vastustamaton voima. Se tulee ihmisen sisälle, halusi ihminen sitä tai ei”,  toteaa Legendaarisen Hurriganes-yhtyeen kitaristi Ile Kallio.  Ile oli vasta 16-vuotias kun Remu Aaltonen pyysi hänet yhtyeeseen. “Olin vielä silloin liian nuori siihen touhuun, mutta sitten kun Remu pyysi kolmen vuoden kuluttua uudelleen olin jo niin sanotusti valmis, vaikka valmishan ihminen ei ole koskaan”, Ile naurahtaa.
