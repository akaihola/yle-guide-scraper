      - title: 'Radio 1:n iltapäivä: Hanna Visala aloittaa syksyllä Ylen Itä-Euroopan-kirjeenvaihtajana'
        start_time: '2026-05-07T13:30:00+03:00'
        end_time: '2026-05-07T15:00:00+03:00'
        description: |-
          Miia Lahti juontajana. Hanna Visala Visala on Yle Uutisten ulkomaantoimittaja ja sotareportteri, joka on raportoinut muun muassa Ukrainasta, Georgiasta, Saksasta ja Yhdysvalloista. Ensi syksynä hän aloittaa työnsä Yle uutisten Itä-Euroopan-kirjeenvaihtajana Varsovassa. Miten Visala valmistautuu tulevaan pestiinsä? Hanna Visala on studiovieraana n. klo 14. 

          N. klo 14:30 Sari Valto kysyy esikoiskirjailija Amani Al-mehseniltä, minkälaisia kulttuurielämyksiä hän erityiseisti kaipaa.
      - title: 'Kulttuuriykkönen: Kaatuuko suomalainen muotoilu Pikachuun?'
        start_time: '2026-05-07T15:00:00+03:00'
        end_time: '2026-05-07T15:55:00+03:00'
        description: |-
          Minne katosi kuuluisa suomalainen muotoilu? Onko se rappiolla, jos se ei näy yritysten tuotemallistoissa? Iittala lanseerasi vappuna Iittala X Pokemon -tuotesarjan, joka juhlistaa japanilaisten Pokemon-hahmojen 30-vuotista taivalta. Pokemon-hahmo Pikachu otettiin koristamaan alunperin Afredo Häberlin suunnitteleman Origo-sarjan rajoitettua erikoiserää. Vastaanotto on ollut ristiriitainen: muotoiluasiantuntija Kaj Kalin pitää yhteistyötä epätoivoisena yleisön kalasteluna ja suomalaisen muotoiluperinteen väheksymisenä,  ja monet yleisön edustajat ovat sosiaalisissa medioissa kummastelleet Iittalan valintaa. Toisaalta Iittala tiedottaa erikoiserän menneen hetkessä kaupaksi. Kulttuuriykkösessä keskustellaan muotoilun kansallisesta merkityksestä, siitä mitä muotoiluala tarvitsisi kukoistaakseen, sekä siitä, miten suuret yritykset näkevät muotoilun roolin. Keskustelemassa muotoiluasiantuntija Kaj Kalin, Hakola-yhtiön luova johtaja Annaleena Hakola, sekä arkkitehti, professori ja Kone Oyj:n entinen muotoilujohtaja Anne Stenros.
