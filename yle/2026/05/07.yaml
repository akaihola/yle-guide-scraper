        end_time: '2026-05-07T18:35:00+03:00'
        description: |-
          Kenkäsuunnittelija ja yrittäjä Minna Parikka matkustaa työnsä puolesta ympäri maailmaa. Suurkaupungeissa hän haluaa käydä katsomassa joko musikaaleja tai stadionkonsertteja. Muun muassa Billie Eilishin stadionkeikka Amsterdamissa teki häneen suuren vaikutuksen.
          Minna kertoo millaista inspiraatiota keikat ja musikaalit antavat hänen luovaan työhönsä ja minkälainen merkitys kulttuurilla on hänelle. Toimittaja Satu Kivelä. Ensilähetys oli viime lokakuussa. 
