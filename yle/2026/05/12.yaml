      - title: 'Radio 1:n iltapäivä: Keskiyön auringon antamia makuja – Piia Rantala-Korhonen kertoo pohjoisen ruokakulttuurin lumosta'
        start_time: '2026-05-12T13:30:00+03:00'
        end_time: '2026-05-12T15:00:00+03:00'
        description: |-
          Juontajana Miia Lahti.
          N. klo 14 studiovieraana Oulun kulttuurisäätiön toimitusjohtaja, ruoka-aktivisti Piia Rantala-Korhonen, jolle  arktinen ruokakulttuuri on sydämen asia. Rantala-Korhoselta on juuri ilmestynyt kirja Hyvää Oulua, joka nostaa vuoden 2026 kulttuuripääkaupunki Oulun seudun ruokakulttuuria.

          N. klo 14:30 Show-tuottaja Matti Myllyaho työskenteli talvella UMK:n kulisseissa ja hän on valmistatutunut nyt koko kevään tämän viikon Euroviisuihin. Myllyaholla itsellään on hyvin monipuolinen kokemus UMK:sta ja Euroviisuista, silllä  hän on olllut mukana myös esiintymässä Käärijän tanssijana. (Ohjelma on ote 10.3.2026 kuullusta haastattelusta.)
      - title: 'Kulttuuriykkönen: Italia kutsui Mira Selanderia, Emma Varilaa ja Toni Räisälää. Syntyi kaksi kirjaa.'
        start_time: '2026-05-12T15:00:00+03:00'
        end_time: '2026-05-12T15:55:00+03:00'
        description: |-
          Toimittaja Mira Selander julkaisee esikoisromaaninsa Vapauden oppitunnit. Se kertoo yksinäisen keski-ikäisen naisen muutosta Sisiliaan ja siitä, mitä hän oppii siellä deittailusta ja elämänilosta ylipäänsä. Mille Italia on symboli? Miten rosoinen ja elämäniloinen maa sopii suomalaiselle? Onko ulkomaille muutto mahdollisuus luoda uusi identiteetti, aloittaa puhtaalta pöydältä? 

          Emma Varila ja Toni Räisälä myivät asuntonsa Suomesta ja jättivät työnsä. Italian kutsua ei voinut enää vastustaa. Miten tämä matka muutti heitä? Mitä he ajattelevat Italiasta nyt matkan tehtyään? Matkasta syntyi visuaalinen päiväkirja Italiasta, automatkasta kaikkien 20 alueen halki. He vangitsivat kirjaansa maan estetiikkaa, maisemia ja matkalla kohdattuja oivalluksia ja ihmisten tarinoita.

          Ohjelman vieraina ovat kirjailijat Mira Selander, Emma Varila ja Toni Räisälä.

          Ohjelman juontaa Pia-Maria Lehtola.


          Rentoa puhetta, kiinnostavimmat vieraat ja kulttuurin ajankohtaisaiheet debatoitavina. Suorana maanantaista perjantaihin.
