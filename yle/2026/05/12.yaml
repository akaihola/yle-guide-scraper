      - title: Maailmanpolitiikan arkipäivää
        start_time: '2026-05-12T20:35:00+03:00'
        end_time: '2026-05-12T21:00:00+03:00'
        description: |-
          Pakistan on ottanut rauhanvälittäjän roolin Iranin sodassa. Sillä on hyvät suhteet sekä Iraniin että Yhdysvaltoihin ja onnistuikin samaan aikaan tulitauon.

           

          Hormuzinsalmen sulku on iskenyt voimakkaasti Pakistanin talouteen, ja säästötoimena maassa on siirrytty nelipäiväiseen työviikkoon. Ohjelmassa kuullaan raportti Pakistanista, mitä sikäläiset ajattelevat tilanteesta ja kotimaansa välittäjäroolista.

           

          Valtion vaikean taloustilanteen ohella Pakistania motivoi rauhanvälittämiseen pyrkimys kohottaa omaa imagoaan maailmannäyttämöllä. Rauhanponnisteluja läheltä seuraavan pakistanilaisen toimittajan mukaan Pakistan olisi jo onnistunut muuttamaan julkikuvaansa terrorismintukijasta vakauden tuottajaksi.

           

          Ohjelmassa haastateltavien asiantuntijoiden mukaan imagomuutosta rauhantekijäksi kuitenkin hankaloittaa Pakistanin konfliktit rajanaapurien Afganistanin ja Intian kanssa.

           

          Maailmanpolitiikan arkipäivää -ohjelman ovat toimittaneet Maija Liuhto ja Paula Vilén. Äänitarkkailijana on Katja Kostiainen. Tunnusmusiikki: Petri Alanko, kuva: Tuuli Laukkanen/Yle.
