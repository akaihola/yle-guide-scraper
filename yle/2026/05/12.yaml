      - title: 'Kaisa Pulakan aikamatkat: Syntisiä unia ja unissasaarnaajia - unimatkoja'
        start_time: '2026-05-12T12:05:00+03:00'
        end_time: '2026-05-12T12:25:00+03:00'
        description: |-
          Martti Luther rukoili jumalalta unettomia öitä, että pääsisi miettimästä sitä, ovatko unet jumalan vai paholaisen lähettämiä. Uniin ja niiden merkitykseen on suhtauduttu eri aikoina eri tavoilla - niitä on pidetty pätevänä todistusaineistona oikeudessa ja toisaalta petollisina syntin houkuttajina. 1900-luvun alkupuolen Suomessa julkisuuteen nousivat unissasaarnaajat. (läh. 12.12.2023)
