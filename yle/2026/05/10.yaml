      - title: 'Elävä historia: Lähi-idän surkeasti epäonnistuneet ristiretket – kun väkivalta oli keino hyvittää syntejä'
        start_time: '2026-05-10T12:05:00+03:00'
        end_time: '2026-05-10T12:55:00+03:00'
        description: |
          Jerusalem on aina ollut kristittyjen tärkein pyhiinvaelluskohde, mutta vuonna 1096 kristityt lähtivät paitsi pyhiinvaellukselle, myös valloittamaan kristinuskon pyhiä paikkoja, jotka olivat tuolloin muslimien hallussa. Seuraavan parin sadan vuoden aikana kristittyjen armeijat lähtivät monta kertaa Lähi-itään. Myöhemmin näitä sotaretkiä on alettu kutsua ristiretkiksi.
          Miksi ristiretkille lähdettiin? Mitä niillä tapahtui? Miksi lähes kaikki Lähi-itään suuntautuneet ristiretket epäonnistuivat?
          Haastateltavina historiantutkija Sini Kangas ja keskiajan kulttuurihistorian dosentti Miikka Tamminen Tampereen yliopistosta.
          Toimittajana Harri Alanne
