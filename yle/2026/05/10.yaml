          Parkinson: Äideistä parhain (Sibelius-lukion kamarikuoro/Marjukka Riihimäki). 

          Grieg: Bedstemors menuet (Isoäidin menuetti) sarj. Lyriske stykker (Lyyrisiä kappaleita) (Emil Gilels, piano).

          Rahmaninov: Bogoroditse devo, raduisja (Iloitse, Jumalan äiti) teoks. Vigilia (Suomalainen kamarikuoro/Eric-Olof Söderström).

          Bull: Adagio religioso (Äidin rukous) (Arve Tellefsen, viulu, ja Trondheimin SO/Eivind Aadland).

          Stenhammar: Dottern sade till sin gamla moder (Sanoi tyttö äidillensä) (Anne Sofie von Otter, mezzosopraano, ja Bengt Forsberg, piano).

          Andersson - Ulvaeus - Anderson: Mamma mia (Asya Fateyeva, saksofoni, ja Lautten Compagney/Wolfgang Katschner).

          I. Kuusisto: Alfhild (Jorma Hynninen, baritoni, sekä yhtye/Ilkka Kuusisto).

          Kantelinen: Mother of mine elok. Äideistä parhain (Mother of mine) (London Orchestra/Matt Dunkley).

          Konsertin on toimittanut Annina Aho.
