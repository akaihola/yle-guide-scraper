      - title: 'Klasariparatiisi - Eva Tigerstedt: Kaksi mielikuvaa merestä'
        start_time: '2026-05-10T07:00:45+03:00'
        end_time: '2026-05-10T07:54:44+03:00'
        description: |-
          Meri on vanha, meri on jatkuvasti liikkeessä. Miltä kuulostavat kaksi merisävellystä, jotka syntyivät samoihin aikoihin, 1900-luvun alussa? Claude Debussyn La Mer ja Jean Sibeliuksen Aallottaret luovat molemmat vahvan ja huumaavan mielikuvan samasta asiasta. Niissä on eroja, mutta myös yhtäläisyyksiä. Molempiin voi upota.
          Eva Tigerstedt avaa polkuja musiikkiin.

          Ohjelman musiikit:

          Jean Sibelius: Aallottaret
          (Halle-orkesteri/ Mark Elder).

          Claude Debussy: La Mer, kolme sinfonista luonnosta orkesterille
          1. De l'aube a midi sur la mer (Merellä aamunkoitosta keskipäivään)
          2. Jeux de vagues (Aaltojen leikkiä)
          3. Dialogue du vent et de la mer (Tuulen ja meren vuoropuhelu)
          (Ranskan radion filharmoninen orkesteri/ Mikko Franck).
