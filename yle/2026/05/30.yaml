          Puccini: Storiella d'amore (Pieni rakkaustarina) (Plácido Domingo, tenori, ja Julius Rudel, piano).

          Cooper: Firedove (Elena Urioste, viulu, The Pembroke College Chapel Choir ja Anna Lapwood, urut).

          Chaminade: Toccata (Marie-Catherine Girod, piano).

          Tanzil: Remembering (Berliinin saksalainen SO/Anna Handler).

          Konsertin on toimittanut Annina Aho.
