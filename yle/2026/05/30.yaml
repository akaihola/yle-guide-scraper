      - title: 'Luomiskertomus: Tuomo Pirttimaa – Lyijykausi Salametsästäjän elämä'
        start_time: '2026-05-30T07:30:41+03:00'
        end_time: '2026-05-30T07:53:51+03:00'
        description: |-
          Kirjailija Tuomo Pirttimaan Lyijykausi Salametsästäjän elämä -romaani perustuu todellisen henkilön tarinaan. Kehnot kortit elämässään saaneesta ja salametsästyksestä vankilassakin istuneesta Unto Ekistä tuli myöhemmin tunnettu eräkirjailija.

          Pohjois-Suomen erämaat tuntenut Ek miettii, että hän syntyi liian myöhään eikä hänenlaisilleen miehille ole maailmassa enää käyttöä. 1930-luvulla syntyneen työteliään, mutta viinaan menevän miehen elämänkaaren lisäksi romaani kertoo aikojen murroksesta ja Suomesta, jota ei enää ole.

          Luomiskertomuksen vieraana kirjailija Tuomo Pirttimaa. 

          Toimittaja Jukka Kuosmanen.
