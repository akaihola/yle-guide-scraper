      - title: Beethovenia Wienissä, Figaron häät Promeilla sekä Waltteri Torikan haastattelu
        start_time: '2026-05-30T19:03:00+03:00'
        end_time: '2026-05-30T21:06:20+03:00'
        description: |-
          Tällä kertaa Oopperaillassa käydään mm. Wienin valtionoopperassa kuuntelemassa Beethovenia ja Barcelonan Liceussa kuuntelemassa Ponchiellia. Tarkemmin uppoudutaan Mozartin Figaron häihin, jonka myötä vieraillaan Lontoon Promeilla. Haastatteluvieraana on Waltteri Torikka, joka debytoi Figaron häiden Kreivin roolissa ensi kesänä Savonlinnassa. Oopperaillan toimittaa Ahti Paunu.
