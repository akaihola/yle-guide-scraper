      - title: 'Klassikkokuunnelma: Työmiehen vaimo 2/2'
        start_time: '2026-05-03T15:00:00+03:00'
        end_time: '2026-05-03T15:45:00+03:00'
        description: |-
          Osa 2/2. "Teidän lakinne ja oikeutenne, niitähän minun pitikin ampua." Minna Canthin Työmiehen vaimo on väkevä kuvaus epätasa-arvosta ja naisen alisteisuudesta miehelle 1800-luvun lopun Suomessa. Näytelmän muotoon kirjoitetussa tarinassa juhlitaan alkuun Johannan ja Riston häitä. Ihanteellisuus riisutaan jo häämusiikin soidessa, kun Riston teot ja mieltymykset alkavat paljastua vastavihitylle nuorikolle. Miten päästä miehen valtaa karkuun? Entä auttaako joku naisia ahdingossa? Canth kohahdutti radikaalilla teoksellaan vuonna 1885. 

          Kuunnelma vuodelta 1963.

          Työmiehen vaimo on kokonaisuudessaan kuunneltavissa Yle Areenassa.
