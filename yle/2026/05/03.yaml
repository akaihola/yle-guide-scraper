      - title: 'Romano mirits: Tarja Manner laulaja ja muusikko'
        start_time: '2026-05-03T23:26:00+03:00'
        end_time: '2026-05-03T23:39:30+03:00'
        description: |
          Muusikko ja laulaja Tanja Mannerin tie musiikin pariin alkoi jo viiden vanhana lastenkodissa. Kitara ja laulaminen antoivat suunnan elämälle, vaikka moni ei aluksi uskonut hänen mahdollisuuksiinsa. Tanja halusi kuitenkin näyttää, että hänestä todella on artistiksi. 1990-luvun alkupuolella hän sai levytysmahdollisuuden suomalaisissa iskelmäpiireissä, julkaisi musiikkia Finnlevyn kautta ja kiersi tanssilavoja oman, tunnistettavan soundinsa voimin. Poikkeuksellisen äänen omaava Tanja jatkaa yhä musiikin parissa – omalla rohkealla tiellään, uskoen tekemiseensä silloinkin, kun muut eivät uskoneet. Lämminhenkinen ja inhimillinen haastattelu muistuttaa, että unelmiin kannattaa tarttua,
          vaikka lähtökohdat olisivat vaatimattomat. Toimittajana on Dimitri Grönfors.
