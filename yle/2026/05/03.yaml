        start_time: '2026-05-03T16:07:00+03:00'
        end_time: '2026-05-03T16:59:59+03:00'
        description: |-
          Bernstein: Alkusoitto musik. Wonderful town (Birmingham Contemporary Music Group/Simon Rattle).

          Josef Strauss: Dorfschwalben aus Österreich (Itävallan kyläpääskysiä) (Rita Streich, sopraano, ja Berliinin radion SO/Kurt Gaebel).

          Melartin (sov.): Tän kylän ämmät (Sauli Tiilikainen, baritoni, ja Pentti Kotiranta, piano). 

          Chabrier: Danse villageoise (Kylätanssi) (Angela Hewitt, piano).

          Kreek: Meil aiaäärne tänavas (Kylätiellä) (Viron radion kuoro/Toomas Kapten).

          Ballard: Branles de village (Göran Söllscher, kitara).

          Brahms: Intermezzo b-molli (Radu Lupu, piano).

          Schubert: Die Stadt (Kaupunki) kok. Schwanengesang (Joutsenlaulu) (Dietrich Fischer-Dieskau, baritoni, ja Gerald Moore, piano).

          Bartók: Este a székelyeknél (Ilta kylässä) sarj. Magyar képek (Unkarilaisia kuvia) (Chicagon SO/Fritz Reiner).

          Korngold: Mariettas Lied (Nicola Benedetti, viulu, ja Bournemouthin SO/Kirill Karabits).

          Sieczynski: Wien, du Stadt meiner Träume (Wien, unelmieni kaupunki) (Elisabeth Schwarzkopf, sopraano, ja Lontoon Philharmonia-ork./Otto Ackermann).

          Konsertin on laatinut Inari Tilli.
