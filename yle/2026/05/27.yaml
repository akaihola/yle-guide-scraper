      - title: 12 diktaattoria. Messias Mobutu Sese Seko
        start_time: '2026-05-27T12:05:00+03:00'
        end_time: '2026-05-27T12:50:00+03:00'
        description: |-
          Kongoa ja sittemmin Zairea yli 30 vuotta hallinnut diktaattori Mobutu Sese Seko oli tyylipuhtaasti kaikkea sitä, mitä afrikkalaiset tarkoittavat puhuessaan vahvoista miehistä Big Man. Mobutu oli myös aika mukavuudenhaluinen, eikä hän ilmeisesti sinänsä nauttinut tappamisesta tai tarpeettomasta piinaamisesta, mikä on aika monien diktaattorien innoittaja urallaan. Kyllä valta turmelee mutta kyllä se väsyttääkin, kertoo toimittaja, tietokirjailija Hannu Pesonen. Toimittajana Raimo Tyykiluoto. Kaikki sarjan uudet osat ovat jo kuultavissa Yle Areenassa.
          (julkaistu v. 2018)
