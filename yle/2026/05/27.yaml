      - title: 12 diktaattoria. Messias Mobutu Sese Seko
        start_time: '2026-05-27T12:05:00+03:00'
        end_time: '2026-05-27T12:50:00+03:00'
        description: |-
          Kongoa ja sittemmin Zairea yli 30 vuotta hallinnut diktaattori Mobutu Sese Seko oli tyylipuhtaasti kaikkea sitä, mitä afrikkalaiset tarkoittavat puhuessaan vahvoista miehistä Big Man. Mobutu oli myös aika mukavuudenhaluinen, eikä hän ilmeisesti sinänsä nauttinut tappamisesta tai tarpeettomasta piinaamisesta, mikä on aika monien diktaattorien innoittaja urallaan. Kyllä valta turmelee mutta kyllä se väsyttääkin, kertoo toimittaja, tietokirjailija Hannu Pesonen. Toimittajana Raimo Tyykiluoto. Kaikki sarjan uudet osat ovat jo kuultavissa Yle Areenassa.
          (julkaistu v. 2018)
      - title: 'Politiikkaradio: Onko Trump hyväksymässä tappionsa Hormuzinsalmessa?'
        start_time: '2026-05-27T13:00:00+03:00'
        end_time: '2026-05-27T13:30:00+03:00'
        description: |
          Huhut Yhdysvaltain ja Iranin sovusta aseleponeuvotteluissa pyörivät villeinä. Yhdysvaltain ulkoministerin Marco Rubion mukaan maailma saattaa kuulla hyviä uutisia. Heitetäänkö Hormuzinsalmeen maailmankaupan pelastusrengas, vai pakottaako kiire Trumpin hyvästä diilistä pahaan diiliin? Iranin ja Yhdysvaltain neuvotteluita arviovat Risto E. J. Penttilä European Business Leaders' Convention -verkostosta sekä Ulkopoliittisen instituutin vanhempi tutkija Toni Alaranta. Toimittajana on Tapio Pajunen. Suora lähetys.
      - title: 'Radio 1:n iltapäivä:  Tietoisuuden mysteeri – vieraana mielenfilosofi ja tietoisuustutkija Paavo Pylkkänen'
        start_time: '2026-05-27T13:30:00+03:00'
        end_time: '2026-05-27T15:00:00+03:00'
        description: |-
          Juontajana Jarmo Laitaneva. 

          N. klo 14. Miten tietoisuus syntyy? Se on tieteen ja filosofian suurin mysteeri. Kumpuaako tietoisuus biologisesti aivoista vai kvanttimaailmasta tai toisista ulottuvuuksista? Vai onko tietoisuus illuusiota tai aivoista riippumaton asia? Descartes sanoi “ajattelen, siis olen”, mutta miten voin tietää, oletko sinä oikeasti olemassa? Toimittajana Samppa Korhonen.
      - title: 'Kulttuuriykkönen: The Mandalorian and Grogu - Tähtien sota tulee taas'
        start_time: '2026-05-27T15:00:00+03:00'
        end_time: '2026-05-27T15:55:00+03:00'
        description: |-
          The Mandalorian and Grogu on ensimmäinen Tähtien sota -elokuva seitsemään vuoteen. Edellisen elokuvan jälkeen kaukaisessa galaksissa on seikkailtu lähinnä tv-sarjoissa, vaihtelevalla menestyksellä. 
          Nyt Tähtien sota siis palaa valkokankaalle. Sankarit ovat The Mandalorian -tv-sarjasta tuttuja: Pedro Pascalin esittämä jäyhän kunniallinen "Mandalorian" sekä pieni Grogu. 
          Miltä tämä uusi Tähtien sodan aikakausi näyttää ja miten franchisella muuten menee? Aiheesta ovat keskustelemassa sarjakuvataiteilija Petri Hiltunen, toimittaja ja Star Wars -bloggaaja Aki Jörgensen, sekä Star Wars -harrastaja Linnea Peurakoski. Jussi Ahlroth toimittaa.
