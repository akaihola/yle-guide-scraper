      - title: 'Kulttuuriykkönen: The Mandalorian and Grogu - Tähtien sota tulee taas'
        start_time: '2026-05-27T15:00:00+03:00'
        end_time: '2026-05-27T15:55:00+03:00'
        description: |-
          The Mandalorian and Grogu on ensimmäinen Tähtien sota -elokuva seitsemään vuoteen. Edellisen elokuvan jälkeen kaukaisessa galaksissa on seikkailtu lähinnä tv-sarjoissa, vaihtelevalla menestyksellä. 
          Nyt Tähtien sota siis palaa valkokankaalle. Sankarit ovat The Mandalorian -tv-sarjasta tuttuja: Pedro Pascalin esittämä jäyhän kunniallinen "Mandalorian" sekä pieni Grogu. 
          Miltä tämä uusi Tähtien sodan aikakausi näyttää ja miten franchisella muuten menee? Aiheesta ovat keskustelemassa sarjakuvataiteilija Petri Hiltunen, toimittaja ja Star Wars -bloggaaja Aki Jörgensen, sekä Star Wars -harrastaja Linnea Peurakoski. Jussi Ahlroth toimittaa.
