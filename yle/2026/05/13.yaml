      - title: 'Vakoojat: Rautarouva Thatcherin ristiretkeä Falklandinsaarille edelsi Britannian MI6 epäonnistuminen'
        start_time: '2026-05-13T12:05:00+03:00'
        end_time: '2026-05-13T12:50:00+03:00'
        description: |
          Falklandinsaarten sota oli 1980-luvun alkupuolen kuohuttavimpia tapahtumia dramaattisten meritaistelujensa takia ja siksi, että ensi kertaa sitten toisen maailmansodan läntisen Euroopan suuri sotilasmahti oli ”oikeassa sodassa” eikä vain siirtomaidensa itsenäistymisliikkeitä kukistamassa.

          Sota oli kuitenkin häkellyttävä esimerkki tiedustelun molemminpuolisesta epäonnistumisesta. Niin britit kuin argentiinalaisetkin tekivät suuria strategisia virhearvioita, jotka johtuivat epäonnistumisista tiedustelutiedon keruussa, analysoinnissa ja johtopäätöksissä, kertoo toimittaja-tietokirjailija Hannu Pesonen. Toimittajana on Raimo Tyykiluoto.
