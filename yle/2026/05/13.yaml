      - title: 'Vakoojat: Rautarouva Thatcherin ristiretkeä Falklandinsaarille edelsi Britannian MI6 epäonnistuminen'
        start_time: '2026-05-13T12:05:00+03:00'
        end_time: '2026-05-13T12:50:00+03:00'
        description: |
          Falklandinsaarten sota oli 1980-luvun alkupuolen kuohuttavimpia tapahtumia dramaattisten meritaistelujensa takia ja siksi, että ensi kertaa sitten toisen maailmansodan läntisen Euroopan suuri sotilasmahti oli ”oikeassa sodassa” eikä vain siirtomaidensa itsenäistymisliikkeitä kukistamassa.

          Sota oli kuitenkin häkellyttävä esimerkki tiedustelun molemminpuolisesta epäonnistumisesta. Niin britit kuin argentiinalaisetkin tekivät suuria strategisia virhearvioita, jotka johtuivat epäonnistumisista tiedustelutiedon keruussa, analysoinnissa ja johtopäätöksissä, kertoo toimittaja-tietokirjailija Hannu Pesonen. Toimittajana on Raimo Tyykiluoto.
      - title: 'Politiikkaradio: Varautuiko Suomi vuosikausia menneisyyden sotiin?'
        start_time: '2026-05-13T13:00:00+03:00'
        end_time: '2026-05-13T13:30:00+03:00'
        description: |
          Onko Suomessa varauduttu läpi 2000-luvun menneisyyden sotiin? Olisiko kansakunnan vähät varat pitänyt laittaa F-35 hävittäjien ja monitoimikorvettien sijaan muihin sotateknologioihin? Vieraana on Koneiden sota -kirjan tekijä, Puolustusvoimien entinen tutkimusjohtaja Jyri Kosola. Toimittajana on Tapio Pajunen.
      - title: 'Radio 1:n iltapäivä: Kirjailija Tapani Bagge - Lastenkirjan tehtävä on tuoda iloa maailmaan'
        start_time: '2026-05-13T13:30:00+03:00'
        end_time: '2026-05-13T15:00:00+03:00'
        description: |
          Juontajana Jarmo Laitaneva.

          N. klo 14 kirjailija Tapani Bagge on tuottelias kirjailija, joka kirjoittaa monipuolisesti eri genrejä: sekä nykypäivään että menneisyyteen sijoittuvia dekkarieita, tietokirjoja sekä lasten- ja nuortenkirjoja. Hänen tunnistettava kynänjälkensä ja huumorinsa näkyvät kaikissa teoksissa ikäryhmästä riippumatta.  Tapani Bagge keskustelee R1:n iltapäivässä erityisesti lapsille ja nuorille kirjoittamisesta. Bagge muistaa omista lapsuuden lukuhetkistään, kuinka tuputtava sanoma sai hylkäämään kirjan välittömästi. Jos kirjassa on opetettavaa, sen pitää tulla tarinan kautta niin, että lukija saa itse oivaltaa – tai olla oivaltamatta. Kati Turtola haastattelee.

          N. klo 14:30 Kansanedustaja Fatim Diarra (vihr.) on aktiivinen teatterissa kävijä. Viime aikoina eritoten helsinkiläisen Q-teatterin ohjelmisto on tehnyt häneen vaikutuksen. Toim. Jalmari Laine. 
      - title: 'Kulttuuriykkönen: Euroviisumeditaatio eurooppalaisuudesta'
        start_time: '2026-05-13T15:00:00+03:00'
        end_time: '2026-05-13T15:55:00+03:00'
        description: |
          Euroviisut kertovat Euroopasta paljon: ne ovat musiikkitapahtuma, kulttuurisen vaihdon hetki, poliittinen tapahtuma ja naiivin yhteenkuuluvuuden sekamelska. Runoilija Satu Erran tuore esseekokoelma purkaa muun muassa hänen vakavan-hauskaa suhtautumistaan Euroviisuihin. Eurooppalainen yhdessä oleminen on vaikeaa, mutta auttavatko Viisut siihen vaivaan?
          Keskustelemassa on myös mediataiteilija Mia Wennerstrand, joka on ollut jo pitkään kiinnostunut eurooppalaisen politiikan monista kasvoista, sekä Euroviisu-tutkija Mari Pajala Turun yliopistosta.
          Juontajana Pietari Kylmälä.
