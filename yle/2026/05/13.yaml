      - title: 'Latvian radion kuoro Helsingissä: Mielen kirkautta'
        start_time: '2026-05-13T19:02:00+03:00'
        end_time: '2026-05-13T21:00:00+03:00'
        description: |
          Latvian radion kuoro juhlistaa huhtikuussa 80 vuotta täyttävää latvialalaissäveltäjää Pēteris Vasksia. Vasksin musiikille on luonteenomaista rauhoittava, mielen kirkastava tunnelma. Juhlakattauksen täydentää urkuri Tuomas Pyrhönen soittamalla Vasksin laulun rauhalle. Helsingin Musiikkitalossa 26.4.2026 tallennetun konsertin toimittaa Riikka Holopainen.

          Konserttiohjelma:

          Latvian radion kuoro
          Sigvards Klava, johtaja
          Tuomas Pyrhönen, urut

          Pēteris Vasks:
          Angele Dei
          Mūsu māšu vārdi
          Actus Caritatis
          Māte saule
          Cantus ad pacem, Tuomas Pyrhönen (urut)
          The Fruit of Silence
          Cosa devo fare?
          Pater noster
          Zīles ziņa
