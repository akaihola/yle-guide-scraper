        description: |
          Muurahaiset ovat erittäin sosiaalisia. Lepakoilla on vastavuoroista auttamista. Ihminen pitää enemmän heistä, jotka osoittavat hyviä aikomuksia. Ostrakismia eli yksilön sulkemista lauman ulkopuolle esiintyy kaikilla lajeilla. Miksi? Millaista on mukaanottava yhteistyö?
