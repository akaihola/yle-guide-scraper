      - title: 'Klasariparatiisi: Erkki Melartin, musiikin suurihminen'
        start_time: '2026-05-31T07:00:47+03:00'
        end_time: '2026-05-31T07:55:13+03:00'
        description: |
          Erkki Melartinille elämä ja säveltäminen, opettaminen ja ennakkoluuloton avoimuus maailmaa kohtaan oli kaikki yhtä ja samaa jalostumista. Ilman hänen tulisieluista toimintaansa, Suomen musiikkielämä olisi todennäköisesti hyvin erilainen. Sitäpaitsi hän sävelsi hienoa musiikkia.

          Ohjelman musiikit:

          Erkki Melartin:

          Prinsessa Ruusunen-orkesterisarjasta: Häämarssi (ote) ja Kuutamobaletti (Tampere Filharmonia/Leif Segerstam).

          Solitude - Yksinäisyys pianosarjasta Der traurige Garten (Ralf Gothoni, piano).

          Finale – Vivace jousitriosta op.133 (Annemarie Åström, viulu, Atte Kilpeläinen, alttoviulu, ja Tomas Nuñez-Garcés, sello).

          Traumgesicht op.70 (Radion sinfoniaorkesteri/Hannu Lintu).


          Eva Tigerstedt avaa polkuja musiikkiin.
