      - title: 'Sari Valto: Elämme itsekkyyden aikaa'
        start_time: '2026-05-31T22:18:29+03:00'
        end_time: '2026-05-31T23:11:45+03:00'
        description: |-
          Yksilökeskeinen kultturi on mennyt liian pitkälle ja olemme siirtyneet itsekkyyden aikaan. Olemme siis luoneet kulttuurin, joka tuottaa pahoinvointia. Näin toteaa psykologian emeritaprofessori Liisa Keltikangas-Järvinen.
          Ratkaisu voisi olla se, että palauttaisimme klassiset hyveet olemassaolomme perustaksi. Arvopuhe on tyhjää, mutta hyveiden tavoittelu on konkreettista. Hyveiden puolesta puhuu filosofi Antti Kylliäinen.
