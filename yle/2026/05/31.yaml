        description: |
          Kolumbialainen laulaja Totó la Momposina menehtyi toukokuussa 2026. Totó la Momposina oli sukujuuriltaan sekä Kolumbian alkuperäiskansaa että afro-kolumbialainen. Hän nosti afrokolumbialaisen perinnemusiikin ja rytmit kansainväliseen tietoisuuteen. Kuulemme Totó la Momposina konsertin WOMAD-festivaalilta 31.5.2015. Toimittajana on Miika Lauriala. 
