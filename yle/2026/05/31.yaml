      - title: 'Uutispodcast: Parhaat 2026: Miksi naisten parisuhdesurmia on vaikea estää?'
        start_time: '2026-05-31T21:01:13+03:00'
        end_time: '2026-05-31T21:22:27+03:00'
        description: |-
          Parisuhdesurmat ovat Suomessa yleisempiä kuin muissa Pohjoismaissa, ja erityisesti naisuhrien määrä on kasvanut viime vuosina. Myös tänä vuonna Suomessa on uutisoitu useasta tapauksesta, joissa naisen surmasta epäillään entistä tai nykyistä kumppania. Miten parisuhdesurmia voidaan estää? Reetta Röngän vieraana kriminologian tutkijatohtori Karoliina Suonpää Helsingin yliopistosta. Jakso on uusinta helmikuulta 2026.
