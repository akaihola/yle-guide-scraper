        description: |
          Varaslähtönä kesään kuullaan uusintana Hietsu is Happening! -kesäkonsertti kesäkuulta 2025. Konsertin ohjelmisto on komea kattaus klassista, jazzia ja kansanmusiikkia. On sooloa, duoa, trioa, kvartettia ja ilta huipentuu, kun koko porukasta kootaan lopussa suuri Hietsun Orkesteri. Veikko Lavin hengessä käymme löysin rantein silakka-apajalle ja jokainen HiH!-minen todellakin on laulun arvoinen! Uusinta, ensilähetys 11.6.2025
