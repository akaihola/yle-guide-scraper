      - title: 'Tuuli Saksalan keidas: Vappukeidas – työn ja vapauden lauluja'
        start_time: '2026-05-01T22:24:00+03:00'
        end_time: '2026-05-01T23:13:00+03:00'
        description: |-
          Vappu on paitsi kevään ja ylioppilaiden, myös juuriltaan työväen juhla. Tuuli Saksalan keitaalla soi työlauluja ja työväenlauluja. Miltä ne kuulostavat juuri nyt tässä ajassa? Ja voisiko niistä oppia jotain?

          Työlaulut ovat rytmittäneet raskaita ja yksitoikkoisia töitä, niitä on laulettu yksin ja yhdessä. Työväenlaulut taas puhuvat työtä tekevän väen puolesta – niillä halutaan saada työläisen ääni kuuluviin ja kertoa raskaista olosuhteista, pienistä palkoista ja yhteenkuuluvuudesta.

          Työväenlaulujen tarina alkaa Ranskan vallankumouksesta, ja monesta on tullut aikaa kestäviä klassikoita, joista tehdään aina uusia tulkintoja. Ohjelmassa kuullaan muun muassa Bob Marleyn laulu työstä, ikoninen Bella Ciao sekä kotimaisia tulkintoja Celenkalta, Paleface ja Laulavalta Unionilta ja Veljeksiltä Chydeniukselta. 

          Bob Marley and the Wailers: Work
          Soul Captain Band: Vapauden kaiho
          Jukka Ahti: Vapauden aamu
          Victor Jara: Manifiesto
          Mon Laferte & Co: El Derecho de vivir en Paz
          A Sud di Bella Ciao: Bella ciao
