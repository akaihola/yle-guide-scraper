        description: |-
          Mitä olisi stadilainen vappu ilman Mantan lakitusta, piknikkiä Ullanlinnanmäellä tai Helsingin kaupunginorkesterin vappumatineaa? Tänä vuonna vappuhuiskat heilahtelevat tähtisolisti Maria Ylipään tahdittamina.

