      - title: 'Tiedeykkönen: Rikosten ehkäisemisen keinot kriminologin ja psykologin näkökulmasta'
        start_time: '2026-05-01T12:05:00+03:00'
        end_time: '2026-05-01T12:55:00+03:00'
        description: |-
          Lähes kaikilla vangeilla on päihdeongelma ja persoonallisuushäiriö. Miten rikollisuuden kierrettä voi ehkäistä ja miten siitä pääsee pois? Entä voiko vankila sittenkin vähentää uusintarikollisuutta? 

          Tehokas kriminaalipolitiikka vaatii tutkittua tietoa siitä, millaiset rangaistukset ja millainen sosiaalipolitiikka on oikeasti tehokasta. 

          Asiantuntijoina kriminologian professori Janne Kivivuori Kriminologian ja oikeuspolitiikan instituutista Helsingin yliopistosta sekä psykologi, tutkimuspäällikkö Marko Manninen Terveyden ja hyvinvoinnin laitokselta. Toimittajana on Pirjo Koskinen. 

          Toimittajana Pirjo Koskinen.
