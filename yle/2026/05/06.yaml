      - title: 'Havaintoja muutoksesta: Digitalisaatio ja itsepalvelu'
        start_time: '2026-05-06T10:00:00+03:00'
        end_time: '2026-05-06T10:50:00+03:00'
        description: |
          Yhteiskuntamme digitalisoituu monin tavoin myös julkisten palveluiden osalta. Kansalaiset myös palvelevat itseään verkossa. Kansalaisia koskevia päätöksiä tehdään algoritmien avulla. Millaisia piiloon jääviä vaikutuksia digitaalisen itsepalvelun kasvamisella on? Voiko digitalisaatio lisätä eriarvoisuutta?
          Toimittaja Satu Kivelä etsii vastauksia yhdessä tutkija Hannele Palukan, politiikan tutkija Anne Kosken ja kanssatutkija, kokemusnäyttelijä kokemusasiantuntijuuden kautta Päivi Haaksiluodon kanssa. 
