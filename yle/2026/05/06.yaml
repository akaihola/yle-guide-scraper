      - title: 'Vakoojat: Vuosisadan huijari ja vakooja Reinhard Gehlen palveli Hitleriä, CIA:ta, BND:tä ja ilmeisesti myös KGB:tä'
        start_time: '2026-05-06T12:05:00+03:00'
        end_time: '2026-05-06T12:50:00+03:00'
        description: |
          Reinhard Gehlen oli natsihallinnon vakoilujohtaja, joka selvisi toisen maailmansodan jälkeisestä ajasta kavalalla röyhkeydellä sekä olemalla taitava huijari ja valehtelija.

          Vuosisadan vakoojaksi itsensä vaatimattomasti määritellyt Reinhard Gehlen oli ensin Hitlerin supervakooja vuodesta 1942, sitten toisen maailmansodan jälkeen seuranneen kylmän sodan alku­aikana Yhdysvaltain keskustiedustelupalvelun, CIA:n, tärkein luottomies Keski-Euroopan asioissa, jonka jälkeen ura urkeni vielä liittokansleri Konrad Adenauerin johtaman Länsi-Saksan ensimmäisenä suurena vakoilujohtajana. Gehlen oli yhteydessä myös Neuvostoliittoon vähintäänkin välikäsien kautta.

          Reinhard Gehlenin värikkäästä elämästä kertoo toimittaja-tietokirjailija Hannu Pesonen. Toimittajana on Raimo Tyykiluoto.
