      - title: 'Murha Ahvenanmaalla: Hylätty konsulaatti'
        start_time: '2026-05-06T22:21:00+03:00'
        end_time: '2026-05-06T23:00:00+03:00'
        description: |
          Myrskyisellä Ahvenanmaalla surun murtama, helsinkiläinen rikostutkija Pekka Jaakkola (Pelle Heikkilä) kohtaa arvoituksellisen murhan, joka johdattaa hänet syvälle vakoilun ja petoksen verkkoihin. Avukseen hän saa sokean, mutta äänianalyysissä mestarillisen Astrid Lindholmin (Laura Malmivaara). 

          Kun Maarianhaminassa sijaitsevassa Venäjän konsulaatissa tapahtuu mystinen kuolema, käynnistyy tapahtumien vyöry, jossa panokset kasvavat nopeasti. Demilitarisoitu Ahvenanmaa ei olekaan se lintukoto, jollaiseksi se on mielletty. Myrskytuuleen kätkeytyneet salaisuudet alkavat paljastua ja kun tapahtumat Itämerellä huipentuvat – lopulta käsissä on koko saariston tulevaisuus.

          Sarja on suomenkielinen käännös alunperin BBC:llä esitetylle "Murder in Åland" -audiodraamalle, jonka Yle on tuottanut yhdessä BBC:n kanssa. Sarjasta julkaistaan samalla ruotsinkielinen versio.

          Du kan också lyssna på den svenskspråkiga versionen av serien på:
          https://arenan.yle.fi/1-77085191

          Päärooleissa: 
          Pekka - Pelle Heikkilä
          Astrid - Laura Malmivaara
          Mikael - Santtu Karvonen
          Fagerrud- Jaana Saarinen.


          Muissa rooleissa:
          Pääru Oja, Satu Tuuli Karhu, Thomas Dellinger, Olli Rahkonen, Joel Hirvonen, Asta Sveholm, Akseli Kouki, Anna Victoria Eriksson, Mikko Kouki, Riitta Havukainen, Kari-Pekka Toivonen, Sanna Stellan ja Pihla Penttinen.

          Käsikirjoitus: Satu Rasila, Akseli Kouki ja Mikko Kouki
          Ohjaus: Mikko Kouki
          Äänisuunnittelu: Samuli Welin ja Steve Bond
          Tuottajat: Alex Hollands ja Jenni Kaunisto
          Tuotanto: Goldhawk Productions, Yle ja BBC Radio 4
