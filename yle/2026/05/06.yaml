        end_time: '2026-05-06T21:00:00+03:00'
        description: |
          Emilia Hoving, kapellimestari. - J. S. Bach: Osia konsertosta kahdelle viululle d-molli BWV 1043 (Helmi-Lilja Lindholm, viulu ja Else Lipasti, viulu). Louis Spohr: 1. osa klarinettikonsertosta nro 4 e-molli (Jino Pieviläinen, klarinetti). Georges Hüe: Fantaisie huilulle ja orkesterille (Olivia Mikkonen, huilu). Victor Herbert (sov. Jerome Cohen): Art Is Calling for Me operetista The Enchantress (Hanna Hasu, sopraano). Bruce Broughton: Tuubakonsertto (Einari Järvinen, tuuba). Marcel Bitsch: Concertino fagotille ja orkesterille (Pekko Aakko, fagotti). Alexander Arutjunjan: Trumpettikonsertto Es-duuri (Viggo Sundqvist, trumpetti). 
          Henryk Wieniawski: Polonaise brillante D-duuri (Vilma Tikkanen, viulu). Charles Gounod: Margaretan jalokiviaaria oopperasta Faust (Kristianna Woller, sopraano). Suoran lähetyksen Musiikkitalosta juontavat Riikka Holopainen ja Elo Umukoro.
