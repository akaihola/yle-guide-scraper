          Henryk Wieniawski: Polonaise brillante D-duuri (Vilma Tikkanen, viulu). Charles Gounod: Margaretan jalokiviaaria oopperasta Faust (Kristianna Woller, sopraano). Suoran lähetyksen Musiikkitalosta juontavat Riikka Holopainen ja Elo Umukoro.
