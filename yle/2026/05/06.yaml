      - title: 'Vakoojat: Vuosisadan huijari ja vakooja Reinhard Gehlen palveli Hitleriä, CIA:ta, BND:tä ja ilmeisesti myös KGB:tä'
        start_time: '2026-05-06T12:05:00+03:00'
        end_time: '2026-05-06T12:50:00+03:00'
        description: |
          Reinhard Gehlen oli natsihallinnon vakoilujohtaja, joka selvisi toisen maailmansodan jälkeisestä ajasta kavalalla röyhkeydellä sekä olemalla taitava huijari ja valehtelija.

          Vuosisadan vakoojaksi itsensä vaatimattomasti määritellyt Reinhard Gehlen oli ensin Hitlerin supervakooja vuodesta 1942, sitten toisen maailmansodan jälkeen seuranneen kylmän sodan alku­aikana Yhdysvaltain keskustiedustelupalvelun, CIA:n, tärkein luottomies Keski-Euroopan asioissa, jonka jälkeen ura urkeni vielä liittokansleri Konrad Adenauerin johtaman Länsi-Saksan ensimmäisenä suurena vakoilujohtajana. Gehlen oli yhteydessä myös Neuvostoliittoon vähintäänkin välikäsien kautta.

          Reinhard Gehlenin värikkäästä elämästä kertoo toimittaja-tietokirjailija Hannu Pesonen. Toimittajana on Raimo Tyykiluoto.
      - title: 'Politiikkaradio: Heikentääkö USA:n sotilaiden vähentäminen Saksassa Natoa vai Yhdysvaltoja?'
        start_time: '2026-05-06T13:00:00+03:00'
        end_time: '2026-05-06T13:30:00+03:00'
        description: |
          Yhdysvaltain presidentti Donald Trump päätti vetää 5 000 amerikkalaissotilasta pois Saksasta. Päätöstä edelsi Trumpin pettymys Euroopan tukeen Iranin sodassa, sekä toistuva uhkailu sotilaiden kotiuttamisista, mikäli Nato-maat eivät panosta omaan puolustukseensa. Rapauttaako päätös Natoa, vai osuuko se Yhdysvaltojen omaan nilkkaan? Kysymystä arvioivat Ulkopoliittisen instituutin johtava tutkija Ville Sinkkonen ja ulkopolitiikan asiantuntija, tietokirjailija Henri Vanhanen. Toimittajana on Tapio Pajunen.
      - title: Studiovieraana Ursan tiedeviestijä Anne Liljeström
        start_time: '2026-05-06T13:30:00+03:00'
        end_time: '2026-05-06T15:00:00+03:00'
        description: |
          Juontajana Jarmo Laitaneva.

          N. klo 14: Yhdysvaltain avaruushallinnon Nasan ennätyksellinen Artemis II -lento herätti monen mielenkiinnon avaruutta kohtaan. Artemis II kiersi Kuun ja kuljetti ihmisen kauemmas Maasta kuin koskaan aiemmin eli noin 407 000 kilometrin päähän. Mikä on Kuu-lentojen tulevaisuus? Matkaako ihminen Marsiin jo muutaman vuoden kuluttua, kuten suunnitelmat lupaavat? Samppa Korhosella on Radio 1:n iltapäivässä studiovieraana Ursan tiedeviestijä Anne Liljeström.
      - title: 'Kulttuuriykkönen: Euphoria-tv-sarjailmiö ja millaista nykyaikaa se peilaa?'
        start_time: '2026-05-06T15:00:00+03:00'
        end_time: '2026-05-06T15:55:00+03:00'
        description: |-
          HBO:n Euphoria on esteettinen mutta myös ahdistava sukellus nykynuorten elämään, jossa ei säästetä katsojaa. Sarjan keskiössä on Zendayan näyttelemä Rue Bennett, narkomaani, joka tasapainoilee riippuvuuden, mielenterveyden ja toipumisen kuilun reunalla.

          Ohjaaja Sam Levinsonin luomus ei ole perinteinen teini-draama. Taiteellinen ja synkkä tv-sarja käsittelee päihderiippuvuutta, seksuaalisuutta, traumaa ja identiteettiä.

          Sarjan vahvuus on sen rehellisyydessä – se ei moralisoi vaan näyttää. Jokainen hahmo kantaa omia haavojaan: Cassie etsii hyväksyntää väärissä paikoissa, Jules navigoi transnuoren identiteettiään, Nate kamppailee myrkyllisen maskuliinisuuden kanssa.

          Euphoria on jakanut mielipiteitä – toisille se on tärkeä, validoiva teos, toisille liian graafinen. Miten sarja sijoittuu televisiohistoriaan ja millä tavalla se on avannut uudenlaisen keskustelun nuorten haavoittuvuudesta ja meidän kaikkien vastuusta?

          Ohjelman vieraina ovat elokuvatoimittajat Tero Kartastenpää, Leena Virtanen ja Svenska Ylen toimittaja Jenny Jägerhorn.

          Ohjelman juontaa Pia-Maria Lehtola.




          Rentoa puhetta, kiinnostavimmat vieraat ja kulttuurin ajankohtaisaiheet debatoitavina. Suorana maanantaista perjantaihin.
