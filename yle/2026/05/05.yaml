      - title: Maailmanpolitiikan arkipäivää
        start_time: '2026-05-05T20:35:00+03:00'
        end_time: '2026-05-05T21:00:00+03:00'
        description: |-
          Politiikan tutkijat ovat mananneet jo tovin demokratialle loppua ja suoranaista kuolemaa. Itsevaltaisten johtajien aika vauhdittaa kansanvallan murenemista.

          Cambridgen yliopiston politiikan tutkimuksen emeritusprofessori David Runciman arvelee paradoksaalisesti, että meidän aikamme demokratia on vaikeuksissa, koska maailma on lopulta tullut demokraattisemmaksi.

          Edustuksellinen ja puolueisiin perustuva perinteinen demokratia on vaikeuksissa, mutta ihmiset etsiytyvät toistensa tykö verkossa ja löytävät siellä demokraattisia tapoja ratkoa ja vatvoa asioita.

          "Maailma, jossa elämme, on liian nopea ja mutkikas demokratialle", David Runciman sanoo.

          Autoritaarisuuskin lisääntyy. Erityisen suuri uhka demokratialle ovat verkkoa ja sen keskusteluja hallinnoivat teknologiajätit, joita johdetaan kuin diktatuureja.

          Maailmanpolitiikan arkipäivää -ohjelman demokratiasarjan viides ja viimeinen osa pohtii sitä, millaisessa tilassa länsimainen demokratia on.

          Ohjelman toimittaa Sampo Vaarakallio. Äänitarkkailijana on Pasi Ilkka. Tunnusmusiikki: Petri Alanko, kuva: Tuuli Laukkanen/Yle.
