      - title: 'Marko Gustafsson: Käännekohdissa Irina Björklund'
        start_time: '2026-05-28T10:00:00+03:00'
        end_time: '2026-05-28T10:53:00+03:00'
        description: |
          Näyttelijä, muusikko Irina Björklund luottaa luonnon ohjaukseen.
          Jokaisella meistä on vaisto, mikä kehottaa tekemään asioita, mutta harvempi meistä kykenee toimimaan luottaen sydämensä ääneen. Irina Björklund on aina tehnyt valintansa luottaen intuitioon. Parhaiten hän kuulee sydämensä  äänet luonnossa.
