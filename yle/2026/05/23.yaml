      - title: 'Lehmitytöt 1944 J6: Iloisia jälleennäkemisiä'
        start_time: '2026-05-23T10:25:00+03:00'
        end_time: '2026-05-23T11:00:00+03:00'
        description: |-
          Lehmitytöt pääsevät vihdoinkin turvallisimmille alueille. Odottavatko äiti ja pikkusisaret tulijoita? Matkan edetessä asenteet kiristyvät siirtoväkeä kohtaan – toisaalta lehmitytöt kohtaavat myös vieraanvaraisuutta. Jotkut lehmitytöistä ja lehmistä pääsevät vihdoin junaan, mutta niissäkään ei ole turvallista matkustaa.  Eila saapuu perille Perniöön. Löytyykö isoäiti vihdoinkin?       
