        start_time: '2026-05-23T16:07:00+03:00'
        end_time: '2026-05-23T16:59:59+03:00'
        description: |-
          Händel: Saban kuningattaren tulo orat. Salomo (Les Concerts du Monde/Keith Clark).

          Deutscher: The lonely pine-tree (Yksinäinen mänty) (Alma Deutscher, piano). 

          Puccini: Mimin, Rodolfon, Musettan ja Marcellon kvartetto "Addio, dolce svegliare" oopp. La Bohème (Mirella Freni, sopraano, Nicolai Gedda, tenori, Mariella Adani, sopraano, Mario Sereni, baritoni, sekä Rooman oopperan kuoro ja ork./Thomas Schippers).

          Tschetschulin: Berceuse (Annemarie Åström, viulu, ja Sonja Fräki, piano). 

          Fauré: Après un rêve (Unen jälkeen) (Gregory Hustis, käyrätorvi, ja Steven Harlos, piano).

          Gjeilo: The ground (Tenebrae, Ola Gjeilo, piano, ja Chamber Orchestra of London).

          Chaminade: La lisonjera (Mairittelija) (Peter Jacobs, piano).

          R. Strauss: Oktavianin, Marsalkattaren ja Sophien tertsetto "Marie Theres'! - Hab mir's gelobt - Ist ein Traum, kann nicht wirklich sein" oopp. Ruusuritari (Anne-Sofie von Otter, mezzosopraano, Renée Fleming ja Heidi Grant Murphy, sopraano, sekä Metropolitan-oopperan ork./James Levine).

          Nava d'Adda: Scherzo pianotriosta Es-duuri (La Gaia Scienza).

          Dale: There will come (Steven Isserlis, sello, ja Philharmonia Orchestra/Michael Collins).

          Portman: Flight (Jess Gillam, saksofoni, ja Anna Lapwood, urut).

          Abrami: Transmission (Esther Abrami, viulu, ja Itävallan radion SO/Irene Delgado-Jimenez).

          Konsertin on toimittanut Annina Aho.
      - title: 'Marko Gustafsson: Käännekohdissa Vesa Vierikko'
        start_time: '2026-05-23T17:00:00+03:00'
        end_time: '2026-05-23T17:53:00+03:00'
        description: |
          Vesa Vierikon elämänfilosofian mukaan ihmiset ovat traagisuudessaan koomisia ja  hauskoja. Hän nauraa ihmisille ja itselleen. Hänestä ne ihmiset, jotka ottavat itsensä liian vakavasti, ovat hankalia ja jopa vaarallisia. Näyttelijäntyöstä puhuttaessa Vesa vakavoituu. Hän sanoo, että näyttelijän on oltava roolihenkilönsä, ajatuksia myöten. Muuten hahmo ei ole uskottava.
