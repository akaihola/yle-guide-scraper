      - title: 'Klassikkokuunnelma: Ihmiset suviyössä, osa 2/2.'
        start_time: '2026-05-23T21:51:00+03:00'
        end_time: '2026-05-23T22:30:00+03:00'
        description: |
          Radionovelli.  F. E. Sillanpään aiheiden mukaan Yleisradiolle kirjoittanut Aarne Laurila. Ohjaus Urpo Lauri.
          Henkilöt:
          Telirannan isäntä ja emäntä - Matti Aulos ja Hilkka Helinä. Vanhaemätä - Emma Väänänen.
          Helka, hänen tyttärentyttärensä - Eija Inkeri.  Arvid - Rauno Ketonen. Syrjämäen Jalmari - Pentti Irjala. Hilja, hänen vaimonsa - Terttu Soinvirta. Mettälän Jukka - Vilho Ruuskanen. Santra, hänen vaimonsa - Aino Lehtimäki. Eräs isäntämies - Kauko Käyhkö. Nokia - Martti Katajisto.
          Ponttoonipäälikkö - Kauko Kokkonen. Taiteilija - Mauno Hyvönen. Kortsaanin äijä - Keijo Komppa.
          Kunnanlääkäri - Tauno Kajander. Manu, tervapolttaja - Reimo Valkama. Kertojat: Aimo Hiltunen ja Unto Salminen.
          Äänite vuodelta 1960.      
      - title: Keinuva talo - Mika Kauhanen
        start_time: '2026-05-23T22:40:00+03:00'
        end_time: '2026-05-23T23:39:30+03:00'
        description: |
          Maailmassa julkaistaan niin paljon musiikkia, että tarvitsemme suodattimia. Keinuvan talon tuntosarvina, ukkosenjohdattimena ja kalaverkkona toimii korttelin oma etnomusikologi Mika Kauhanen. Balkanin rytmeistä Välimeren tunnelmiin, kaihoisista lauluista huimimpaan pelimannisvengiin. Transglobal World Music Chartin jäsen lupaa tuoreita musiikkivalintoja ja kiinnostavia haastatteluvieraita nykykansanmusiikin ja maailmanmusiikin vaiheilta.
