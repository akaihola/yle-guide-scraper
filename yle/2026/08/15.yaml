      - title: 'Kirjani tarina: Joel Haahtela - Talvikappeli'
        start_time: '2026-08-15T07:31:00+03:00'
        end_time: '2026-08-15T07:55:00+03:00'
        description: |+
          Talvikappelin tarina kattaa kaiken olennaisen elämästä: taiteen tekemisen salat, rakkauden ihmellisyyden ja kuoleman teemat. Kirjailija Joel Haahtela tietää tarkasti miksi sijoitti uusimman romaaninsa tapahtumat juuri 1300-luvun Italiaan ja ruton keskelle. Silti hän pitää kaikkien lukuisten omien romaanien kirjoittamisen jälkeenkin kirjailijan työssä onnistumista mahdottomuutena.

          Toimittaja Jukka Kuosmasen vieraana kirjailija Joel Haahtela

