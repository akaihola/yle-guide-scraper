      - title: 'Virtasen taloushistoria: Valmisvaatteita ja deodoranttia - kuluttamisen muutos'
        start_time: '2026-08-15T11:00:00+03:00'
        end_time: '2026-08-15T11:52:00+03:00'
        description: |
          Valmisvaatteita ja deodoranttia - kuluttamisen muutos. Haastateltavana on tutkijatohtori Matleena Frisk. Toimittaja on Juha Virtanen. Ohjelma on uusinta helmikuulta 2026.
      - title: 'Maailma tarinoina: Shakespearen Kesäyön unelmassa rakkaus ja mielikuvitus ovat liittolaiset'
        start_time: '2026-08-15T12:05:00+03:00'
        end_time: '2026-08-15T13:00:00+03:00'
        description: |-
          Kesäyön unelma on noin 31-vuotiaan Shakespearen käsialaa. Komediassa punoutuu yhteen useampikin juonikuvio ja lopussa koittaa näytelmä näytelmässä -rakenne, jossa kiteytyy kirjailijalle tyypillinen kyky tehdä nopeita leikkauksia koomisesta traagiseen. Nuori Shakespeare tarttuu unen värittämässä näytelmässä rakkauden eri sävyhin ja lajeihin sekä vallan ja sukupuolen kysymyksiin. Miten näytelmän kautta voidaan tarkastella vastasyttynyttä ja kauan pitkässä liitossa kytenyttä rakkautta? Miten se johdattelee pohtimaan rakkautta laajempana, mullistavana kokonaisuutena? 

          Shakespearen luomassa kehikossa rakkauden ulottuvuuksia hahmottavat Marja Vehkasen kanssa filosofi, kirjailija ja käsikirjoittaja Pärttyli Rinne ja vanhempi yliopistonlehtori, Shakespeare-tutkija ja kääntäjä Nely Keinänen.
      - title: Rehtorin tyttäret 3/5.
        start_time: '2026-08-15T15:00:00+03:00'
        end_time: '2026-08-15T15:25:00+03:00'
        description: |-
          Osa 3/5 Sodassa menehtyneen rehtori Sipolan perhe kohtaa uuden elämänvaiheen. Jokaisen olisi nyt huolehdittava itsestään. Vanhimmat tyttäret Raija, Pirkko, Sirkka ja Satu alkavat huushollaamaan ja äiti hakeutuu opettajan töihin. Pienimmät Kaarina sekä kuopus Jorma saavat vielä temmeltää vapaasti. Sarja vuodelta 1959.
      - title: 'Aristoteleen kantapää: Kivien ja mineraalien nimissä vuorottelevat tunnetut geologit ja paikannimet'
        start_time: '2026-08-15T15:30:00+03:00'
        end_time: '2026-08-15T15:55:00+03:00'
        description: |-
          Aristoteleen kantapää kaivautuu Pasi Heikuran johdolla mineraalien ja kivien nimistöön. Sinne hänet johdattavat geotieteiden tutkijat Elina Lehtonen ja Jussi Heinonen. Ohjelman ovat toimittaneet Pasi Heikura ja Tina Cavén. Ohjelma on uusinta.
      - title: Faunin iltapäivä
        start_time: '2026-08-15T16:07:00+03:00'
        end_time: '2026-08-15T16:59:59+03:00'
        description: |-
          Leiviskä: Humoreski sarj. n:o 2 (Sinfonia Lahti/Dalia Stasevska).

          Hahn: La fête de Terpsichore (Terpsikhoren juhlat) sarj. Le rossignol éperdu (Hämmentynyt satakieli) (Earl Wild, piano).

          Koch: De vilda svanarna (Villijoutsenet) (Anne Sofie von Otter, mezzosopraano, ja Bengt Forsberg, piano).

          Belli: Sapias (Mari Samuelsen, viulu, Julien Quentin, piano, ja Scoring Berlin/Jonathan Stockhammer).

          Grandval: Romanssi (Jeremy Polmear, oboe, Naomi Butterworth, sello, ja Diana Ambache, piano).

          Respighi: I pini di Villa Borghese (Villa Borghesen pinjat) sinf. runosta Pini di Roma (Rooman pinjoja) (Rooman Santa Cecilia -akatemian ork./Antonio Pappano).

          Vasks: Vasara (Kesä) (Latvian radion kuoro/Sigvards Klava). 

          Beach: Largo konsertosta pianolle ja orkesterille cis-molli (Danny Driver ja BBC:n Skotlannin SO/Rebecca Miller). 

          R. Schumann: Wanderlied (Vaelluslaulu) (Peter Schreier, tenori, ja Christoph Eschenbach, piano).

          Huré: Vocalise-Étude (Harry White, alttosaksofoni, ja Edward Rushton, piano).

          Nyman: The heart asks pleasure first (Gautier Capucon, sello, Jerome Ducros, piano, sekä Pariisin kamariork./Adrien Perruchon).

          V. Aulin: Romanza (Romanssi) (Lucia Negro, piano).

          Tabakova: Orpheus' Comet (Hallé-ork./Delyana Lazarova).

          Konsertin on toimittanut Annina Aho. 
      - title: 'Marko Gustafsson: Käännekohdissa Pelle Miljoona'
        start_time: '2026-08-15T17:05:00+03:00'
        end_time: '2026-08-15T17:58:00+03:00'
        description: |-
          “Olet kaunis, olet rohkea, olet  vapaa, syntynyt voittamaan!”, Pelle Miljoona lauloi 80-luvun alussa ja valoi  toivoa ahdistuneisiin nuoriin. Hän ei kadehdi nuoruutta tällä maailma ajalla. Syyksi Pelle Miljoona  pohtii maailman menoa, joka hänen mielestään on äitynyt aivan karmeaksi. Hän pohtii myös sitä, ettei  musiikin voimaa ei enää käytetä yhteisten asioiden puolesta puhumiseen. “Jengi tekee biisejä parisuhteistaan ja omista pienistä ympyröistään, minkä kyllä ymmärrän tässä kaoottisessa maailmassa”, Pelle toteaa Marko Gustafssonin haastattelussa.
