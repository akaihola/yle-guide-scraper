  '':
    programmes:
      - title: 'Kirjani tarina: Linnea Kuuluvainen - Hukkumisleikki'
        start_time: '2026-08-01T07:31:00+03:00'
        end_time: '2026-08-01T07:55:00+03:00'
        description: |-
          Nuori Juulia kamppailee äidin kuoleman, itsetuhoisten ajatusten ja uuden orastavan parisuhteen kanssa. Juulia ei kuitenkaan tiedä onko hän oikeasti rakastunut, kelpaako suhteeseen ihan omana itsenään vai vain kivana tyttöystävänä ilman omaa menneisyyttään.

          Kirjailija Linnea Kuuluvaisen romaani Hukkumisleikki kietoo yhteen surun ja rakkaussuhteen trillerimäiseksi tarinaksi.

          Toimittaja Jukka Kuosmanen.
      - title: Aamuhartaus
        start_time: '2026-08-01T08:25:00+03:00'
        end_time: '2026-08-01T08:35:00+03:00'
        description: |-
          Seurakunnan johtaja Aulis Pettersson, Baptistikirkko, Turku
      - title: 'Maailman tärkein pieni asia: Petri Kotwica'
        start_time: '2026-08-01T08:40:00+03:00'
        end_time: '2026-08-01T09:00:00+03:00'
        description: |
          Ohjaaja Petri Kotwica on harrastanut taekwondoa jo vuosikymmeniä. Toimittajana Maija Salminen.
      - title: Muistojen bulevardi
        start_time: '2026-08-01T09:04:00+03:00'
        end_time: '2026-08-01T09:59:00+03:00'
        description: |-
          Giraud: Sous le ciel de Paris (Juliette Greco).
          Gershwin: I got plenty o' nuttin' (Frank Sinatra).
          Taube: Min älskling (Sven-Bertil Taube).
          Scott: A taste of honey (Peggy Lee).
          Goodman: Swingtime in the rockies (Benny Goodman).
          Walker: Mr. Bojangles (Lasse Mårtenson). 
          Kern: All the things you are (Jack Leonard).
          Mardel/Marnay: Les amoureux (Vicky Leandros).
          Berlin: Blue skies (Ella Fitzgerald).
          Sciorilli: Nainen mä oon enkä pyhimys (Carola).
          Simone: I want a little sugar in my bowl (Nina Simone).
          Carrillo: Sabor a mi (Mina).
          Simon: American tune (Paul Simon).

          Konsertin on laatinut Pasi Hiihtola. 
      - title: 'Hanna Tikanderin toiset todellisuudet: “Universumin sanoitus tulee energiahoitajan kautta”'
        start_time: '2026-08-01T10:25:00+03:00'
        end_time: '2026-08-01T11:00:00+03:00'
        description: |
          Katja on käynyt jo vuosia energiahoidoissa, jotta voisi purkaa omia tunnemaailman traumojaan. Energiahoidon avulla Katja kertoo saaneensa viestejä edesmenneeltä isältään sekä henkimaailmalta ohjeistusta uuden työpaikan haussa.

          Vuosien mittaan hän on huomannut, että hoidoista ja henkistymisestä ei välttämättä kannata kertoa aivan kaikille, koska kritiikkiä tulee. Katja ei tästä välitä, sillä hän kokee saavansa henkimaailmasta lohtua ja rakkaudellisuutta.
      - title: 'Virtasen taloushistoria: Lahti. Suomi. Miten radio ja tv mullistivat elämämme?'
        start_time: '2026-08-01T11:00:00+03:00'
        end_time: '2026-08-01T11:52:00+03:00'
        description: |-
          Lahti. Suomi. Miten radio ja tv mullistivat elämämme? Vieraana on Radio- ja tv-museo Mastolan museonjohtaja Tuulia Tuomi
      - title: Päivän mietelause ja Turun tuomiokirkon kello lyö 12
        start_time: '2026-08-01T11:57:00+03:00'
        end_time: '2026-08-01T12:00:00+03:00'
        description: |-
          Vuoden 1776 Yhdysvaltain itsenäisyysjulistus oli yksi ensimmäisistä poliittisista asiakirjoista, jossa esitettiin nykyaikaisten ihmisoikeuksien periaatteita. Päivän mietelauseen on valinnut Jussi Pylväs.
      - title: 'Maailma tarinoina: Mies vailla menneisyyttä näyttää Kaurismäen katseen asunnottomuuteen'
        start_time: '2026-08-01T12:05:00+03:00'
        end_time: '2026-08-01T13:00:00+03:00'
        description: |-
          Aki Kaurismäen Mies vailla menneisyyttä (2002) kuvaa muistinsa menettänyttä miestä, joka päätyy helsinkiläiseen konttikylään asunnottomien keskuuteen. Elokuva sysää hahmottamaan kaarta Suomen asunnottomuuden vähentämisen menestystarinasta kohti tämän päivän tilannetta, jossa asunnottomien määrä on jälleen nousussa. Miten elokuvassa kuvataan kodin rajoja ja merkitystä? Millainen on Kaurismäen katse ihmiseen järjestelmän rattaissa ja sen ulkopuolella? 
          Kaurismäen kerronnan raameissa asunnottomuuden ja kodin monitahoista vyyhtiä purkavat  Marja Vehkasen kanssa arkkitehti, taiteilija ja tutkija Helmi Kajaste ja asunnottomuustutkija, yliopisto-opettaja Veera Niemi.
      - title: 'Näistä levyistä en luovu: Olavi Uusivirta'
        start_time: '2026-08-01T13:00:00+03:00'
        end_time: '2026-08-01T13:55:00+03:00'
        description: |-
          Olavi Uusivirta aloitti rokkariuransa 10-vuotiaana hajoittamalla kitaransa, kuten Kurt Cobain. "Se oli hyvälaatuinen kitara jonka sain kummivanhemmiltani, anteeksi".
      - title: 'Kalle Haatanen: Rohdot'
        start_time: '2026-08-01T14:00:00+03:00'
        end_time: '2026-08-01T14:55:00+03:00'
        description: |-
          Filosofista keskustelua totuudesta, kauneudesta, hyvästä ja pahasta.
      - title: Rehtorin tyttäret 1/5.
        start_time: '2026-08-01T15:00:00+03:00'
        end_time: '2026-08-01T15:25:00+03:00'
        description: |-
          Osa1/5 Sodassa menehtyneen rehtori Sipolan perhe kohtaa uuden elämänvaiheen. Jokaisen olisi nyt huolehdittava itsestään. Vanhimmat tyttäret Raija, Pirkko, Sirkka ja Satu alkavat huushollaamaan ja äiti hakeutuu opettajan töihin. Pienimmät Kaarina sekä kuopus Jorma saavat vielä temmeltää vapaasti. Sarja vuodelta 1959.
      - title: 'Aristoteleen kantapää: Karsikot, pitämyspuut, pyhä paju – katajaisen kansan puuperinne on monipuolista'
        start_time: '2026-08-01T15:30:00+03:00'
        end_time: '2026-08-01T15:55:00+03:00'
        description: |-
          Pasi Heikura ja tietokirjailija Reetta Ranta tutustuvat suomalaiseen puita käsittelevään kansanperinteeseen ja puuaiheisiin sanontoihin. Ohjelma on uusinta.
      - title: Faunin iltapäivä
        start_time: '2026-08-01T16:07:00+03:00'
        end_time: '2026-08-01T16:59:59+03:00'
        description: |-
          Peterson-Berger: Intåg i sommarhagen (Tulo Sommarhageniin) kok. Frösöblomster (Frösön kukkia) (Helsingborgin SO/Okko Kamu).

          Mayer: Scherzo kvartetosta pianolle ja jousille G-duuri (Mariani-pianokvartetti).

          Massenet: Athanaëlin aaria "Voilà donc la terrible cité" oopp. Thaïs (George London, bassobaritoni, ja Columbia-SO/Jean Morel).

          Zimmer: Cornfield chase (Anna Lapwood, urut).

          Porra: A song for summer teoks. Seasons in Moominvalley (Muumilaakson vuodenajat) (Antti Kujanpää, piano, Kasmir Uusitupa, viulu, Hanna Hohti, alttoviulu, ja Markus Hohti, sello).

          Bush: This woman's work (Jess Gillam, sopraanosaksofoni, ja BBC:n konserttiork./Richard Balcombe).

          Walker: Give me your stars (Voces8).

          Debussy: Rêverie (Christian Lindberg, pasuuna, ja Per Lundberg, piano).

          Berlioz: L'île inconnue (Tuntematon saari) sarj. Les nuits d'été (Kesäyöt) (Veronique Gens, sopraano, ja Loiren alueen kansallinen ork./John Axelrod).

          Farrenc: Venez dans la prairie (Baldo-Corona Duo). 

          Shaw: The beech tree sarj. Plan and elevation (Norjan kamariork./Pekka Kuusisto, viulu).

          Hamilton: Cry me a river (Sheku Kanneh-Mason, sello, ja Harry Baker, piano).

          Tanzil: Serenade (Ray Chen, viulu, ja Lontoon kuninkaallinen FO/Cristian Macelaru).

          Konsertin on toimittanut Annina Aho. 
      - title: 'Marko Gustafsson: Käännekohdissa Hanna Ryti'
        start_time: '2026-08-01T17:05:00+03:00'
        end_time: '2026-08-01T17:58:00+03:00'
        description: |
          Hanna Ryti on yksi miljoonista suomalaisista, johon 90-luvun lama jätti pysyvän jäljen. Hänen vanhempansa erosivat ja äiti oli yksinhuoltajana tosi tiukilla. Edelleen Rytin omassa ajattelussa on läsnä hänen äitinsä hokema, huomenna, tai viimeistään ensi viikolla kaikki romahtaa. Vuonna 2025 Hanna Rytiltä ilmestyi Kaatuminen-romaani, joka käsittelee laman vaikutuksia ihmisiin.
