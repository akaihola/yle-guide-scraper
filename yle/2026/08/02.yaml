        description: |-
          Miten nuori Suomi kohtasi kymmeniätuhansia pakolaisia heti itsenäistymisensä jälkeen? Historian dosentti Seija Jalagin ja tutkija Katja Hyry kertovat Itä-Karjalan kansannousun synnyttämän pakolaisyhteisön vaiheista. Toimittaja Henna-Leena Kallio, äänisuunnittelija Laura Koso.
