      - title: 'Romanitarinoita: Romanigospelin vahva naisääni – Leila Hedman'
        start_time: '2026-08-02T23:12:00+03:00'
        end_time: '2026-08-02T23:37:00+03:00'
        description: |
          Leila Hedman on yksi romanigospelin naisäänistä, joka ei unohdu. 1980-luvulla levytetty ensimmäinen äänite nousi aikansa myydyimpien joukkoon.
          Tässä jaksossa kuullaan tarinoita kuorovuosista, studion jännityksestä ja laulun ilosta – sekä toivosta, että ääni saa vielä jatkua.
          Leilan lämmin läsnäolo ja vuosikymmenten kokemus välittyvät koskettavasti koko keskustelun ajan.
