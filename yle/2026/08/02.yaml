      - title: Etnokonsertti Fatima Szalayn Transilvanialaiset tanssit
        start_time: '2026-08-02T17:06:00+03:00'
        end_time: '2026-08-02T18:00:00+03:00'
        description: |
          Fatima Szalay yhtyeineen esittää unkarilaisia kansanlauluja. Luvassa on myös transilvanialaisia tansseja ja balladeja koboz-luutulla säestettynä sekä romanialaisia ja turkkilaisia kansanlauluja. Konsertti on taltioitu 24.7.2025 Glatt & Verkehrt -festivaalilta Itävallasta. 
           
