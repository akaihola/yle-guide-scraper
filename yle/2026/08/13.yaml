  '':
    programmes:
      - title: Aamuhartaus
        start_time: '2026-08-13T06:50:00+03:00'
        end_time: '2026-08-13T06:59:59+03:00'
        description: |-
          "Minä olen kanaanilainen nainen"
          Kouluttaja, rovasti Mika Aspinen Vantaalta kutsuu loppukesän torstaiaamuissa eläytymään Raamatun henkilöiden sisäiseen matkaan. Neljännessä jaksossa vuorossa on Kanaanilainen nainen (Matt. 15:21-28). 4/6.
      - title: Aamusoitto
        start_time: '2026-08-13T07:06:00+03:00'
        end_time: '2026-08-13T08:00:00+03:00'
        description: |+
          Rameau: Alkusoitto komediabal. Platée (Les Talens Lyriques/Christophe Rousset).

          Coste: Meulan (Jouni Stenroos, kitara).

          Sinding (sov. Piper): Itämainen tanssi (Les Siecles -ork./Francois-Xavier Roth).  

          Balakirev: Puutarhassa (Alexander Paley, piano).

          Godard: Valssi sarjasta B-duuri (William Bennett, huilu, ja Englantilainen kamariork./Steuart Bedford).

          Massenet: Nuit d'Espagne (Philippe Jaroussky, kontratenori, ja Jerome Ducros, piano).

          Nielsen: Turha serenadi (Chicago Pro Musica).

          Ravel: Narrin aamulaulu (Seattlen SO/Ludovic Morlot).

          Henselt: Muisto (Esther Budiardjo, piano).

      - title: Radio 1:n aamu
        start_time: '2026-08-13T08:07:00+03:00'
        end_time: '2026-08-13T09:00:00+03:00'
        description: |-
          Ajatuksia tarjoileva aamulähetys, jollaista et kuule mistään muualta. Radio 1:n aamu kutsuu lempeän rytmikkäälle matkalle maailman ympäri. Matkalla soivat eri aikakausien ja kulttuurien sävyttämät popin, jazzin, maailmanmusiikin ja instrumentaalimusiikin helmet. Juontajana Jarmo Laitaneva.
      - title: 'Marko Gustafsson: Käännekohdissa Pelle Miljoona'
        start_time: '2026-08-13T10:00:00+03:00'
        end_time: '2026-08-13T10:53:00+03:00'
        description: |-
          “Olet kaunis, olet rohkea, olet  vapaa, syntynyt voittamaan!”, Pelle Miljoona lauloi 80-luvun alussa ja valoi  toivoa ahdistuneisiin nuoriin. Hän ei kadehdi nuoruutta tällä maailma ajalla. Syyksi Pelle Miljoona  pohtii maailman menoa, joka hänen mielestään on äitynyt aivan karmeaksi. Hän pohtii myös sitä, ettei  musiikin voimaa ei enää käytetä yhteisten asioiden puolesta puhumiseen. “Jengi tekee biisejä parisuhteistaan ja omista pienistä ympyröistään, minkä kyllä ymmärrän tässä kaoottisessa maailmassa”, Pelle toteaa Marko Gustafssonin haastattelussa.
      - title: 'Maailma tarinoina: Shakespearen Kesäyön unelmassa rakkaus ja mielikuvitus ovat liittolaiset'
        start_time: '2026-08-13T12:05:00+03:00'
        end_time: '2026-08-13T13:00:00+03:00'
        description: |-
          Kesäyön unelma on noin 31-vuotiaan Shakespearen käsialaa. Komediassa punoutuu yhteen useampikin juonikuvio ja lopussa koittaa näytelmä näytelmässä -rakenne, jossa kiteytyy kirjailijalle tyypillinen kyky tehdä nopeita leikkauksia koomisesta traagiseen. Nuori Shakespeare tarttuu unen värittämässä näytelmässä rakkauden eri sävyhin ja lajeihin sekä vallan ja sukupuolen kysymyksiin. Miten näytelmän kautta voidaan tarkastella vastasyttynyttä ja kauan pitkässä liitossa kytenyttä rakkautta? Miten se johdattelee pohtimaan rakkautta laajempana, mullistavana kokonaisuutena? 

          Shakespearen luomassa kehikossa rakkauden ulottuvuuksia hahmottavat Marja Vehkasen kanssa filosofi, kirjailija ja käsikirjoittaja Pärttyli Rinne ja vanhempi yliopistonlehtori, Shakespeare-tutkija ja kääntäjä Nely Keinänen.
      - title: Kulttuuriykkönen
        start_time: '2026-08-13T15:00:00+03:00'
        end_time: '2026-08-13T15:58:00+03:00'
        description: |-
          Rentoa puhetta, kiinnostavimmat vieraat ja kulttuurin ajankohtaisaiheet debatoitavina. Suorana maanantaista perjantaihin.
      - title: 'Tuuli Saksalan keidas: Keitaan kesämatkat – Napoli-sarja'
        start_time: '2026-08-13T17:35:00+03:00'
        end_time: '2026-08-13T18:25:00+03:00'
        description: |
          Musiikin avulla voi matkustaa Andien ylängöille, sumuisille saarille tai Kalkutan ruuhkaisille kaduille. Silti mielenkiintoisin matka laulun siivittämänä tehdään jokaisen omaan mieleen. Tuuli Saksalan keidas avaa maailman ihmeitä musiikin keinoin.
      - title: Iltahartaus
        start_time: '2026-08-13T18:50:00+03:00'
        end_time: '2026-08-13T19:00:00+03:00'
        description: |-
