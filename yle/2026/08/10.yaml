      - title: 'Faijan vika valhe: Mitä kommunistinen vakooja tarvitsee'
        start_time: '2026-08-10T17:05:00+03:00'
        end_time: '2026-08-10T17:30:00+03:00'
        description: |
          Kuka oli Leo Fahler, isoisä, josta muu suku ei koskaan puhunut? Axa lukee yli 150 sivua kirjeenvaihtoa ja alkaa ymmärtää, miten Leon luonne muovautui jatkosodan tykkipatterissa. Sodan jälkeisenä aikana vyyhti käy yhä kummallisemmaksi. Kävikö Leo piiritetyssä Leningradissa? Miksi hänestä tuli vakooja, ja kenelle hän oikein vakoili?
