          "Matteuksen evankeliumi: Kanaanilaisnaisen usko"
          Näyttelijä Krista Kosonen lukee Matteuksen evankeliumia (15:21-16:28) UT2020 käännöksen mukaan. 12. jaksossa Jeesus parantaa monia ja ruokkii tuhansia vuorella sekä puhuu ensimmäistä kertaa lähestyvästä kuolemastaan.
