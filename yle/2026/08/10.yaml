        start_time: '2026-08-10T19:02:00+03:00'
        end_time: '2026-08-10T19:50:00+03:00'
        description: |+
          Israelista on tullut lyhyessä ajassa maailman johtavia aseteollisuuden ja -teknologian valtioita. Militarismin ja asetuotannon peruskivet muurattiin kuitenkin jo vuosikymmeniä ennen kuin Israelin valtio oli olemassa. 

          Jakson asiantuntijavieraana: Hannu Juusola, Helsingin yliopiston Lähi-idän tutkimuksen professori. Jakso on äänitetty syyskuussa 2024.

      - title: 'Ulkolinja-podcast: Italiassa mafiaperheiden naiset pakenevat henkensä kaupalla '
        start_time: '2026-08-10T20:05:00+03:00'
        end_time: '2026-08-10T20:25:00+03:00'
        description: |-
          Italiassa yhä useampi mafiaperheessä elävä nainen päättää jättää rikollisen yhteisön taakseen. Irtautuminen on hankalaa ja usein myös vaarallista vaikka myös apua on tarjolla. 
      - title: 'Hanna Tikanderin toiset todellisuudet:  “Mä uskon, et kivet on tietoisia olentoja”'
        start_time: '2026-08-10T20:25:00+03:00'
        end_time: '2026-08-10T21:00:00+03:00'
        description: |
          Heidi sanoo olevansa kivihihhuli, ja paljastaa kantavansa itselleen tärkeitä kiviä mukanaan rintsikoissa. Kiviin ja kristalleihin Heidi tutustui ollessaan vaatesuunnittelijana Yhdysvalloissa. Heidi kokee, että hänen ensimmäisellä ametistillaan oli iso rooli siinä, että haave perheestä toteutui. 
          Heidi kertoo kokeneensa, miten juuri oikean kiven löytäminen herättää vahvoja tunteita, ihon kihelmöintiä ja jopa itkua. 
