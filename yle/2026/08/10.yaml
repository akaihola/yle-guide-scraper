        start_time: '2026-08-10T11:00:00+03:00'
        end_time: '2026-08-10T11:57:00+03:00'
        description: |-
          Tuntsan syrjäisessä erämaassa musiikkitoimittaja Kare Eskolan maastopyörävaellus piirtää itärajan näkyviin. Ja kun kirkas joki muuttuu tekojärveksi, koskematon alkumetsä kaivokseksi ja pokasaha metsäkoneeksi, piirtyy näkyviin myös kiistelty raja luonnon ja luonnottoman välillä. Jos lapinnoita Akmeeli Lokan rannalla heräisi transsista, johon 1600-luvulla vajosi, näkisikö hän maansa samoin kuin retkeilijä nyt? Elokuun kolmet Välilevyt on tehty kesän aikana retkillä.
