      - title: 'Virtasen taloushistoria: Taide ja raha - muumit liiketoimintana'
        start_time: '2026-08-03T10:00:00+03:00'
        end_time: '2026-08-03T10:54:00+03:00'
        description: |-
          Ensimmäisen muumikirjansa “Muumit ja suuri tuhotulva” Jansson kirjoitti talvisodan aikana, puhtaaksikirjoitti ja kuvitti jatkosodan jälkeen ja kirja ilmestyi vuonna 1946. Muumit ovat olleet jo pitkään hahmoja, jotka eivät elä vain kirjoissa, vaan myös mukeissa ja lukuisissa muissa tuotteissa kuten paidoissa ja pyjamissa. Millaista on tekijänoikeuksiin liittyvä liiketoiminta? Haastavana on Moomin Characters’in toimitusjohtaja Roleff Kråkström ja toimittajana on Juha Virtanen.

          Ohjelma on uusinta tammikuulta 2026.
