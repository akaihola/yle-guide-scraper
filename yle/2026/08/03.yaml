      - title: 'Väkivallan markkinat: Mistä laittomat aseet tulevat Suomeen?'
        start_time: '2026-08-03T19:02:00+03:00'
        end_time: '2026-08-03T19:50:00+03:00'
        description: |+
          Poliisin haaviin laittomat aseet päätyvät useimmiten jonkin muun rikoksen yhteydessä. Myös “Mikan” aseista poliisi takavarikoi lopulta osan, mutta hän hankki tilalle uusia ja pääsi osingoille isommista asekaupoista. Kun huumekauppa muuttui ammattimaisemmaksi, vastaan tuli tilanteita, jolloin Mika veti liipaisimesta.

          Jakson lopussa kuullaan yksityiskohtaista väkivallanteon kuvausta, joka saattaa järkyttää kuulijaa.

          Jakson asiantuntijavieraana: Poliisihallituksen entinen ylitarkastaja Reima Pensala. 

      - title: Mannerheimin agentti
        start_time: '2026-08-03T20:05:00+03:00'
        end_time: '2026-08-03T20:25:00+03:00'
        description: |+
          Jakso 10/10: Ei-toivottu henkilö.
          Mitä tapahtui Tahvanaiselle kirjan julkaisun jälkeen? Pidettiinkö Kekkosen johdolla salainen tapaaminen ja miten Tahvanaisesta tuli persona non grata? Koskinen matkustaa toimittaja Paavo Einin luokse, joka haastatteli Tahvanaista vuonna 1971. Oliko kyseessä vain Tahvanaisen mustamaalaaminen?

      - title: 'Hanna Tikanderin toiset todellisuudet: “Universumin sanoitus tulee energiahoitajan kautta”'
        start_time: '2026-08-03T20:25:00+03:00'
        end_time: '2026-08-03T21:00:00+03:00'
        description: |
          Katja on käynyt jo vuosia energiahoidoissa, jotta voisi purkaa omia tunnemaailman traumojaan. Energiahoidon avulla Katja kertoo saaneensa viestejä edesmenneeltä isältään sekä henkimaailmalta ohjeistusta uuden työpaikan haussa.

          Vuosien mittaan hän on huomannut, että hoidoista ja henkistymisestä ei välttämättä kannata kertoa aivan kaikille, koska kritiikkiä tulee. Katja ei tästä välitä, sillä hän kokee saavansa henkimaailmasta lohtua ja rakkaudellisuutta.
