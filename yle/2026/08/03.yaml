        description: |-
          "Matteuksen evankeliumi: Johannes Kastajan kuolema"
          Näyttelijä Krista Kosonen lukee Matteuksen evankeliumia (14:1-15:20) UT2020 käännöksen mukaan. 11. jaksossa Johannes Kastaja mestataan ja Jeesus ruokkii tuhansia ihmisiä viidellä leivällä sekä kahdella kalalla.
