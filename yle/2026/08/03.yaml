        description: |
          Axalle Thyra Fahler oli sydämellinen isomummu, joka tarjosi synttäreillään siskonmakkarasoppaa. Mutta tutkimusmatkan varrella Thyrasta selviääkin toinen puoli. Tämä oli nähnyt villin lännen ja tragedian toisensa perään. Eikä Thyra pelännyt lyödä nyrkkiä pöytään, kun sulhasehdokas Jussi Fahler kärähti kulkurielämän syrjähypyistä.
