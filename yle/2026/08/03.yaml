        start_time: '2026-08-03T17:35:00+03:00'
        end_time: '2026-08-03T18:35:00+03:00'
        description: |-
          Aloitamme parhaista kotimaisista ennen lähtökuulutusta radio-interrailille Eurooppaan. Jakson aikana kohtaamme ilkikurisen katastrofin, harmonisen puutarhan, ranskalaisen kapinamielen ja katalaanirumban kuninkaat. Entä millaisen ilmiasun musiikissa saavat sellaiset suuret tärkeät sanat kuin totuus ja toivo? Toimittajana Mika Kauhanen.
