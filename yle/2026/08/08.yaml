        start_time: '2026-08-08T07:31:00+03:00'
        end_time: '2026-08-08T07:55:00+03:00'
        description: |-
          Seitsemän tornin varjoissa -romaanissa nuori Blanka Berger seikkailee Lyypekissä. 1600-luvun Hansa-kaupungeissa vaara väijyy joka kulmassa ja kun rutto leviää Blanka taistelee selviytymisestään. Elämän ja kuoleman kysymysten lisäksi neuvokkaalla Blankalla on edessään vaikeita valintoja myös rakkauden suhteen.

          Toimittaja Jukka Kuosmasen vieraana kirjailija Ulla Rask.
