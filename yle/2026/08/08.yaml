        description: |
          Neuropsykologi Heli Isomäki löysi itsestään yllättävän ominaisuuden. 
          “En tunnistanut ihmisen pahuutta. Olin elänyt  vain hyvien ihmisten ympäröimänä ja pahan kohtaaminen ja käsitteleminen  on ollut minulle suurin opetus työssäni”, Isomäki toteaa. 
          Heli Isomäki kertoo, ettei ole pitkän psykologin uransa aikana koskaan tavannut ihmistä, joka ei muuttuisi hyvän kosketuksesta.
          Ohjelma on uusinta ajalta 19.3.2026.
