      - title: 'Hanna Tikanderin toiset todellisuudet:  “Mä uskon, et kivet on tietoisia olentoja”'
        start_time: '2026-08-08T10:25:00+03:00'
        end_time: '2026-08-08T11:00:00+03:00'
        description: |
          Heidi sanoo olevansa kivihihhuli, ja paljastaa kantavansa itselleen tärkeitä kiviä mukanaan rintsikoissa. Kiviin ja kristalleihin Heidi tutustui ollessaan vaatesuunnittelijana Yhdysvalloissa. Heidi kokee, että hänen ensimmäisellä ametistillaan oli iso rooli siinä, että haave perheestä toteutui. 
          Heidi kertoo kokeneensa, miten juuri oikean kiven löytäminen herättää vahvoja tunteita, ihon kihelmöintiä ja jopa itkua. 
      - title: 'Virtasen taloushistoria: Taide ja raha - muumit liiketoimintana'
        start_time: '2026-08-08T11:00:00+03:00'
        end_time: '2026-08-08T11:52:00+03:00'
        description: |-
          Ensimmäisen muumikirjansa “Muumit ja suuri tuhotulva” Jansson kirjoitti talvisodan aikana, puhtaaksikirjoitti ja kuvitti jatkosodan jälkeen ja kirja ilmestyi vuonna 1946. Muumit ovat olleet jo pitkään hahmoja, jotka eivät elä vain kirjoissa, vaan myös mukeissa ja lukuisissa muissa tuotteissa kuten paidoissa ja pyjamissa. Millaista on tekijänoikeuksiin liittyvä liiketoiminta? Haastavana on Moomin Characters’in toimitusjohtaja Roleff Kråkström ja toimittajana on Juha Virtanen.

          Ohjelma on uusinta tammikuulta 2026.
