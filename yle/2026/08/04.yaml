        description: |-
          Amerikkalaiskirjailija Ben Lernerin tuore romaani “Puhtaaksikirjoitus” kuvaa vanhempien avuttomuutta, kun heidän tyttärensä kärsii syömishäiriöstä.

          Kirjasta keskustelevat Lernerin suomentaja Markku Päkkilä sekä kaksi vanhemmuus-asiantuntijaa, Väestöliitosta Laura Huuskonen sekä vanhemmuudesta kirjan kirjoittanut erityisopettaja Aulikki Uski.

          Kulttuuriykkösen juontaa Jakke Holvas.
