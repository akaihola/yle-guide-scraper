        end_time: '2026-08-04T19:45:00+03:00'
        description: |-
          Nora ja Kalle palaavat Suomeen, normaali elämä tuntuu oudon etäiseltä, kun he yrittävät sopeutua arkeen. Nora käy läpi tunteitaan ja muistojaan, kun hän astuu terapeutin vastaanotolle. Voiko hän todella palata entiseen elämäänsä?
      - title: 'Romanitarinoita: Sävelten takana – sydän, joka palvelee – Kyösti Florin'
        start_time: '2026-08-04T20:00:00+03:00'
        end_time: '2026-08-04T20:25:00+03:00'
        description: |
          Tämän jakson vieraana on säveltäjä, sanoittaja Kyösti Florin – henkilö, jonka äänessä ja sanoissa kaikuu elämänmittainen kiitollisuus. Hän on vuosikymmenten ajan kirjoittanut lauluja, joiden voima on koskettanut syvältä. Haastattelussa välittyy rauhallinen ja pohdiskeleva olemus, joka tuo levollisuutta ympärilleen.
          Kyösti Florinin musiikki ja tekstit ovat monelle tuttuja – ne ovat syntyneet rukouksen, elämänkokemuksen ja nöyryyden kautta, Ja ehkä juuri siksi, yhdessäolonne jättää lämpimän jäljen.
