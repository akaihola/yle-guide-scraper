      - title: 'Tiedetrippi: Tiedemaailman huijarit'
        start_time: '2026-08-04T13:00:00+03:00'
        end_time: '2026-08-04T13:30:00+03:00'
        description: |-
          Koska tiedettä tekevät ihmiset, aika ajoin tutkijoiden joukosta paljastuu huijareita. Tiedemaailman liepeillä vaanii myös toimijoita, joiden toiminta täyttää monissa tapauksissa rikollisjärjestöjen tunnusmerkit. Tiedealan slangissa puhutaan paperitehtaista tai paperimyllyistä sekä saalistajajulkaisuista.
          (19.1.2026)
