      - title: 'Maarit Tastula - Yksi maailma, kaksi katsetta: Wilma Heltelä ja Heli Rantanen'
        start_time: '2026-08-04T10:00:00+03:00'
        end_time: '2026-08-04T10:55:55+03:00'
        description: |
          Kun Heli Rantanen heitti viimeisen heittonsa Atlantassa vuonna 1996, hän purskahti itkuun. Hän oli juuri saanut tietää olevansa keihäänheiton olympiavoittaja. Se oli itsetunnon romahduksen ja loukkaantumisen jälkeen suuri työvoitto. Kun Wilma Murto puolestaan voitti Euroopan mestaruuden vuonna 2022, hän pääsi viimeisten hyppyjen aikana sellaiseen olotilaan, jossa ainoa ajatus oli: hypätkää te muut ihan mitä vain, minä tulen perästä ja hyppään yli ja ohi.

          Voitonjuhlien jälkeen onnistumisen pakko alkoi ahdistaa mieltä. Wilman MM-pronssi tuntui jo pettymykseltä, tuli loukkaantumiskierre, ja syömishäiriö, ja Wilma jäi pitkälle sairaslomalle diagnoosina  keskivaikea masennus. Heli joutui lopettamaan uransa vakaviin loukkaantumisiin, putosi tyhjän päälle ja masentui hänkin. Tärkein läksy opittavaksi on ollut ajatus, että urheilija on arvokas ja rakastettu silloinkin, kun urheilussa ei tule menestystä.
          Toimittaja Maarit Tastula
