      - title: 'Maailma tarinoina: Osuuko Kärpästen herra poikien nykytodellisuuteen?'
        start_time: '2026-08-22T12:05:00+03:00'
        end_time: '2026-08-22T13:00:00+03:00'
        description: |-
          William Goldingin Kärpästen herra -klassikkoromaanissa poikajoukko äityy hirmutekoihin saarella ilman aikuisia. II maailmansodan hirveyksien jälkeen ilmestynyt teos maalasi synkän ihmiskuvan, jossa väkivaltaisuus saa herkästi otteen ja leviää. Onko romaani niin ajankohtainen kuin on väitetty? Miten sen kautta päästään kiinni nykynuorten, erityisesti poikien, todellisuuteen sekä aikuisten, sosiaalisen median ja koulun rooliin? 
          Kärpästen herran kautta nuorten maailmaan uppoutuvat Marja Vehkasen vieraina helsinkiläisen Vuoniityn peruskoulun suomen kielen ja kirjallisuuden sekä median opettaja, luokanohjaaja Arto Alho sekä yhteiskuntatieteiden tohtori Antti Kivijärvi Nuorisotutkimusseurasta.
