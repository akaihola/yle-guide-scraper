      - title: 'Konsertteja: Sibelius-kilpailun voittaja Sueye Park BBC:n Proms-festivaalilla'
        start_time: '2026-08-26T19:02:00+03:00'
        end_time: '2026-08-26T21:00:00+03:00'
        description: |-
          Vuoden 2025 Sibelius-kilpailun voittaja Sueye Park tekee BBC Proms-debyyttinsä kapellimestari John Storgårdsin ja BBC:n filharmonisen orkesterin solistina soittamalla minkäpä muun kuin Sibeliuksen viulukonserton. Konsertti päätyy Richard Straussin sinfoniseen runoon "Also sprach Zarathustra", jonka oistava orkesteraalinen auringonnousu tuli kuuluisaksi Stanley Kubrickin elokuvassa "2001: Avaruusseikkailu".

          Esiintyjät:

          BBC:n filharmoninen orkesteri
          John Storgårds, viulu
          Sueye Part, viulu

          Ohjelma:
          Betsy Jolas: Tales of a Summer Sea
          Jean Sibelius: Viulukonsertto d-molli op. 47
          Johann Sebastian Bach: Largo sooloviulusonaatista nro 3 C-duuri  
          Richard Strauss: Also sprach Zarathustra
