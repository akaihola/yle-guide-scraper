      - title: 'Konsertteja: Häähumua! BRQ Vantaa'
        start_time: '2026-08-19T19:02:00+03:00'
        end_time: '2026-08-19T21:00:00+03:00'
        description: |-
          Häähumua 1700-luvun Tukholmassa ja Leipzigissa! Kaikki tässä konsertissa kuultava laulumusiikki on alun perin esitetty osana hääjuhlallisuuksia.

          J.H. Roman oli "Ruotsin musiikin isä", jonka sukujuurten arvellaan olleen kuitenkin lähtöisin Suomesta. Bröllopsmusik -kantaatti esitettiin luultavasti vuonna 1728 eräiden Ruotsin hovin piirissä pidettyjen häiden kunniaksi. Konsertissa kuultava katkelma kantaatin alusta säteilee onnea ja toiveikkuutta uuden elämänvaiheen alkaessa.

          J.S. Bachin hääkantaatti O Holder Tag esitettiin ensi kertaa Leipzigissa oletettavasti 1740-luvun alussa. Koska kantaatin säilynyt nuottimateriaali on poikkeuksellisen viimeistelty ja kaunis, on arveltu, että säveltäjä tunsi hääparin henkilökohtaisesti ja antoi nuottikäsikirjoituksen heille lahjaksi.Kantaatin maallinen teksti käsittelee musiikin kykyä liikuttaa, lumota, lohduttaa ja virkistää kuulijaa; avioparin syvä ja vilpitön rakkaus rinnastetaan musiikin väkevään voimaan.

          9.8.2026 Vantaalla Pyhän Laurin kirkossa tallennetun konsertin toimittaa Noora Hirn.

          Esiintyjät:

          Tuuli Lindeberg sopraano
          Ensemble Nylandia
          Matias Häkkinen, cembalo ja musiikillinen johtaja

          Ohjelma:

          Johan Helmich Roman (1694–1758): Bröllopsmusik 

          Johann Sebastian Bach (1685–1750): Kantaatti O holder Tag, erwünschte Zeit, BWV 210


          J.S. Bach: Orkesterisarjasta nro 2 h-molli BWV 1067:
          osa 4 Bourrée I–II

          J.S. Bach: Kantaatista O holder Tag:
          osa 3 Rezitativ: Doch, haltet ein, ihr muntern Saiten
          osa 4  Aria: Ruhet hie, matte Töne

          J.S. Bach: Sonaatista huilulle ja basso continuolle e-molli, BWV 1034: 
          osa 3 Andante

          J.S. Bach: Kantaatista O holder Tag:
          osa 5 Rezitativ: So glaubt man denn, dass die Musik verführe
          osa 6 Aria: Schweigt, ihr Flöten, schweigt, ihr Töne
          osa 7 Rezitativ: Was Luft? was Grab?
          osa 8 Aria: Großer Gönner, dein Vergnügen

          J.S. Bach: Orkesterisarjasta nro 2 h-molli BWV 1067:
          osa 1 Ouverture

          J.S. Bach: Kantaatista O holder Tag:
          osa 9 Rezitativ: Hochteurer Mann, so fahre ferner fort
          osa 10 Aria: Seid beglückt

