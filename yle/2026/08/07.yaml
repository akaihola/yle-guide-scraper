        start_time: '2026-08-07T16:07:00+03:00'
        end_time: '2026-08-07T16:59:00+03:00'
        description: |+
          Händel (sov. Savall): Air teoksesta Water music (Vesimusiikkia), sarjasta n:o 1 F-duuri (Le Concert des Nations/Jordi Savall). 

          Kuula: Purjein kuutamolla (Soile Isokoski, sopraano, ja Marita Viitasalo, piano).

          Vivaldi: Allegro viulukonsertosta A-duuri "Kaiku" (Katherine Kyme ja Lisa Weiss, viulu, sekä Philharmonia-barokkiork./Nicholas McGegan).

          Mozart: Zerlinan aaria oopp. Don Giovanni (Kathleen Battle, sopraano, ja Metropolitan-oopperan ork./James Levine).

          Liszt: Consolation n:o 4 Des-duuri (Jorge Bolet, piano).

          Sibelius: Balladi (Tempo di minuetto) Karelia-sarjasta (HKO/Okko Kamu).

          O. Merikanto: Pai, pai paitaressu (Aulikki Eerola, sopraano, ja Pertti Eerola, piano).

          Chaminade: Concertino huilulle ja orkesterille (Sharon Bezaly ja Haagin Residentie-ork./Neeme Järvi). 

          Sallinen: On kolme unta sisäkkäin teoks. Neljä laulua unesta sopraanolle ja orkesterille (Karita Mattila ja Sinfonia Lahti/Ulf Söderblom)

          Ravel: La vallée des cloches (Kellojen laakso) sarj. Miroirs (Kuvajaisia) (Pierre-Laurent Aimard, piano).

