      - title: 'Konsertteja: Tahdon! Häämusiikkia Kuhmon Kamarimusiikista'
        start_time: '2026-08-07T19:02:00+03:00'
        end_time: '2026-08-07T21:00:00+03:00'
        description: |-
          Konsertti tulvillaan rakkautta! Toivo Kuulan ja Felix Mendelssohnin häämarssit, Jean Sibeliuksen Romanssi ja Edvard Griegin Rakastan sinua kietoutuvat César Franckin A-duuri sonaatin ympärille. Franck sävelsi sonaattinsa 63-vuotiaana ystävänsä 28-vuotiaan viulistin Eugène Ysaÿen häälahjaksi. Sonaattia pidetään yhtenä parhaista koskaan kirjoitetuista viulu-piano-sonaateista. Kuhmon kirkossa 21.7.2026 tallennetun konsertin toimittaa Ainomaija Pennanen.

          Esiintyjät:
          Susanne Kujala, urut 
          Arttu Kataja, baritoni
          Antti Tikkanen ja Kaija Saarikettu, viulu 
          Anna Laakso, Pauliina Tukiainen ja Sophia Rahman, piano

          Kuva: © Jonas Kukkonen
      - title: 'Pieleen mennyt historia: Nälkä on vallan puutetta, ei ruoan puutetta'
        start_time: '2026-08-07T21:31:00+03:00'
        end_time: '2026-08-07T22:25:00+03:00'
        description: |-
          Miksi nälästä ei vieläkään ole päästy eroon? Miten nälän syyt ovat muuttuneet eri aikoina? Näitä kysymyksiä pohtivat talous- ja sosiaalihistorian dosentti Antti Häkkinen, ympäristötutkija Ville Lähde, historianopettaja Lasse Hongisto ja toimittaja Jussi Nygren.
          (2024)
      - title: Tuuli Saksalan keidas
        start_time: '2026-08-07T22:26:00+03:00'
        end_time: '2026-08-07T23:15:00+03:00'
        description: |-
          Musiikin avulla voi matkustaa Andien ylängöille, sumuisille saarille tai Kalkutan ruuhkaisille kaduille. Silti mielenkiintoisin matka laulun siivittämänä tehdään jokaisen omaan mieleen. Tuuli Saksalan keidas avaa maailman ihmeitä musiikin keinoin.
