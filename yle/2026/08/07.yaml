      - title: 'Faijan vika valhe: Unelmien roviolta kasvoi poika'
        start_time: '2026-08-07T17:05:00+03:00'
        end_time: '2026-08-07T17:30:00+03:00'
        description: |
          Vastoin kaikkia todennäköisyyksiä Jussi Fahler ja hänen vaimonsa Thyra pääsivät presidentti Relanderin linnanjuhliin. Sitten kaikki meni kammottavalla tavalla pieleen. Surun, köyhyyden ja sairauden varjosta kasvoi kuitenkin veijarimainen nuori poika, joka taisi Kallion katujen oppimäärän ja tähtäsi yliopistoon. Hän oli Axan isoisä Leo Fahler.
