        start_time: '2026-08-09T10:00:00+03:00'
        end_time: '2026-08-09T10:59:20+03:00'
        description: |-
          Sohvakirkko Viikin kirkosta Helsingistä: Yhdessä rukoillen ja etsien

          Elokuun Sohvakirkossa keskustellaan siitä, mikä motivoi tekemään töitä seurakunnan luottamushenkilönä ja miten Seurakuntavaaleissa rakennetaan kirkon tulevaisuutta. Kuinka eri tavoin ajattelevat voivat löytää yhteisen tien eteenpäin?
          Keskustelijoina ovat seurakuntavaalien projektipäällikkö Annmari Salmela ja nuori kirkollinen vaikuttaja Eelis Mäkipää. Juontaja-liturgeina Elina Vaittinen ja Kristiina Hyppölä.
          Muusikot: Make Perttilä, kitarat ja laulu, Teri Mantere, piano ja laulu ja Laura Airola viulu, kelttiharppu ja nyckelharpa.

          Virret: 914, 276

          Muu musiikki: 
          Elämä on nyt, säv. Pekka Simojoki, san. Anna-Mari Kaskinen
