      - title: 'Välilevyjä retkellä: Paratiisi jossa ei voinut elää'
        start_time: '2026-08-09T13:00:00+03:00'
        end_time: '2026-08-09T13:57:00+03:00'
        description: |-
          Kun musiikkitoimittaja Kare Eskola jatkaa itärajan-retkeään Sallasta pohjoiseen, metsät ja suot näyttävät paratiisilta. 1950-luvun asutustilalliselle sama paratiisi oli epäonnistunut ihmiskoe. Reitillä näkee muistomerkkejä siitä, miten maailman muutos on välillä vienyt mielekkyyden työltä maan, metsän ja porojen parissa. Luontoa on jäljellä, mutta riittääkö se? Elokuun kolmet Välilevyt on tehty kesän aikana retkillä.
