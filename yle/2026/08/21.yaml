      - title: 'Konsertteja: Kynttiläkonsertti – Rakkauden nuottikirjasta – BRQ Vantaa'
        start_time: '2026-08-21T19:02:00+03:00'
        end_time: '2026-08-21T21:00:00+03:00'
        description: |
          Sopraano Tuuli Lindeberg ja cembalisti Matias Häkkinen esittävät musiikkia, joka on liittynyt avioelämään ja kotimusisointiin.

          J. S. Bachin toisen vaimon, Anna Magdalena Bachin nuottikirja vuodelta 1725 on kokoelma kosketinsoitinsooloja ja lauluja, jotka Bachin perheenjäsenet yhdessä keräsivät. On todennäköistä, että Bachin perhe soitti ja lauloi kirjan ohjelmistoa kotonaan.

          1730-luvun puolivälissä Leipzigissa, aivan muutaman korttelin päässä Bacheista, asuivat professori Johann Christoph Gottsched ja tämän vaimo Luise. Luise oli taitava kirjoittaja ja luutisti, hän opiskeli myös sävellystä Bachin oppilaan Johann Ludwig Krebsin johdolla. Luise Gottsched sävelsi nyt konsertissa kuultavan kantaatin mahdollisesti omiin häihinsä tai ainakin aivan avioliiton alkuvuosina.

          Suomalaista väriä ohjelmaan tuo muutama laulu Ulrica Elisabet Tauben nuottikirjasta (1767 – n.1772), joka toimi teini-ikäisen Ulrican oppikirjana musiikkiopinnoissa. Laadukasta musiikkikoulutusta pidettiin tuohon aikaan nuorelle aatelistytölle tärkeänä, jotta voisi päästä hyviin naimisiin. Ulrica asui nuoruutensa vanhempiensa kanssa Laajasalossa Degerön kartanossa, ja nuottikirjaa säilytetään nykyisin Porvoossa. 9.8. Vantaalla Pyhän Laurin kirkossa tallennetun konsertin toimittaa Noora Hirn.

          Esiintyjät:

          Matias Häkkinen cembalo
          Tuuli Lindeberg sopraano

          Ohjelma:

          Johann Sebastian Bach (1685–1750): 
          Partita kosketinsoittimelle III a-molli, BWV 827
          I Fantasia
          II Allemande

          Lauluja Anna Magdalena Bachin nuottikirjasta (1725):
          Bist du bei mir
          Willst du dein Herz mir schenken
          Gedenke doch, mein Geist

          Bach: Partitasta kosketinsoittimelle III:
          III Courante

          Anna Magdalena Bachin nuottikirjasta:
          Rezitativ: Ich habe genug & Aria: Schlummert ein

          Bach: Partitasta kosketinsoittimelle III:
          IV Sarabande

          Lauluja Ulrica Elisabet Tauben nuottikirjasta (1767):
          Kärleks pris: Du ljufva Lag
          Säg mig trogne herde hwar 
          Ack min herde om du visste

          J. S. Bach: Partitasta kosketinsoittimelle III:
          V Burlesca
          VI Scherzo

          Luise Adelgunde Victoria Gottsched (1713–1762):
          Kantaatista Seyd gegrüsst ihr schönen Stunden (n.1735?):
          2. Rezitativ: Wer ist mir an Vergügen gleich?
          3. Aria Sey stets die Meine, wie ich der Deine

          J. S. Bach: Partitasta kosketinsoittimelle III:
          VII Gigue

          Kuva: © Heikki Tuuli
