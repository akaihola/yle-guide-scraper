      - title: 'Epäilyttävän uutta - Aki Yli-Salomäki: Tämä ei ole ääniraita elämälle – tämä on tauko siitä'
        start_time: '2026-08-06T11:00:00+03:00'
        end_time: '2026-08-06T11:57:00+03:00'
        description: |
