      - title: 'Maailma tarinoina: Kokuho - kabukin mestari: kun perinnetaide laajenee elämänfilosofiaksi'
        start_time: '2026-08-06T12:05:00+03:00'
        end_time: '2026-08-06T13:00:00+03:00'
        description: |-
          Sang-il Leen ohjaama elokuva Kokuho - kabukin mestari on ollut Japanissa poikkeuksellinen katsojamenestys. Shūichi Yoshidan romaaniin perustuva elokuva on ystävysten kilpailun sävyttämä kasvutarina kabukinäyttelijöiksi. 
          Elokuva antaa runsaasti tilaa japanilaisen perinteisen teatterimudon, kabukin, kuvaukselle. Mitä on kabukin brutaali kauneus? Miten Japanissa ajattelu ikävaiheista, taidoista ja kukoistuksesta poikkeaa länsimaisesta ajattelusta?
          Kabukin historiaa, elementtejä ja symboliikkaa sekä taiteelle omistautumisen tietä avaa henkilökohtaistenkin kokemusten kautta Japanin tutkimuksen tohtori Minna Eväsoja.
      - title: 'Tiedetrippi: Muovinen maailmamme'
        start_time: '2026-08-06T13:00:00+03:00'
        end_time: '2026-08-06T13:30:00+03:00'
        description: |-
          Maailman muovijätteestä kierrätetään vain yhdeksän prosenttia; puolet kipataan suoraan kaatopaikoille ja viidesosa käsitellään niin huolimattomasti, että muovijätettä päätyy myös luontoon. Esimerkiksi Tyynenmeren jätepyörteessä arvioidaan kelluvan yli 2,5 miljoonaa kiloa muovijätettä.
