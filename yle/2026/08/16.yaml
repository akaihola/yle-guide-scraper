      - title: 'Romanitarinoita: Leif Isberg – musiikin kautta kutsumuksessaan'
        start_time: '2026-08-16T23:12:00+03:00'
        end_time: '2026-08-16T23:37:00+03:00'
        description: |
          Leif Isberg on pitkän linjan gospelmuusikko ja kuoronjohtaja, jonka sydän sykkii hengelliselle työlle. Oman soitto- ja laulutaitonsa itse opetellut Isberg on kiertänyt esiintymässä eri puolilla Suomea, aina suurimpia festivaaleja myöten, muun muassa Taivasta tuulee -yhtyeen kanssa. Hän kokee kutsumuksensa olevan musiikin kautta palvelemisessa – niin kauan kuin henki pihisee.

          Isberg on ollut vuosia mukana Elämä ja Valo ry:n toiminnassa, erityisesti Keuruun hengellisessä kesäkonferenssissa, jossa hän on johtanut kuoroa ja ollut mukana järjestämässä tilaisuuksia. Hän puhuu kiitollisuudella saamastaan lahjasta ja pitää tärkeänä sen käyttämistä: "Nämä ovat minun jalkani ja käteni – niin kauan kuin pystyn palvelemaan, teen tätä työtä."
          Leifin elämässä yhdistyvät musiikki, usko ja palava halu tuoda ihmisille toivoa ja valoa.
