      - title: 'Elävä historia: Wartholm – linna joka katosi'
        start_time: '2026-08-16T12:05:00+03:00'
        end_time: '2026-08-16T12:55:00+03:00'
        description: |-
          Jossain Uudellamaalla on ollut keskiaikainen Wartholmin linna, joka on kadonnut ja säilyttänyt arvoituksensa vuosisatojen ajan. Toimittaja Sakari Silvola lähtee etsimään sitä ja päätyy keskelle 1300-luvun puulinnojen unohtunutta aikakautta ja Ruotsin hämmästyttäviä valtataisteluita. Olisiko Wartholm voinut olla Helsingissä, Sipoossa tai Porvoossa?
      - title: 'Välilevyjä retkellä: Luonnoton luonto'
        start_time: '2026-08-16T13:00:00+03:00'
        end_time: '2026-08-16T13:57:00+03:00'
        description: |-
          Tuntsan syrjäisessä erämaassa musiikkitoimittaja Kare Eskolan maastopyörävaellus piirtää itärajan näkyviin. Ja kun kirkas joki muuttuu tekojärveksi, koskematon alkumetsä kaivokseksi ja pokasaha metsäkoneeksi, piirtyy näkyviin myös kiistelty raja luonnon ja luonnottoman välillä. Jos lapinnoita Akmeeli Lokan rannalla heräisi transsista, johon 1600-luvulla vajosi, näkisikö hän maansa samoin kuin retkeilijä nyt?
