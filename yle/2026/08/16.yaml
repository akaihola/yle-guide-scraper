      - title: Haagan seurakunnan jumalanpalvelus Huopalahden kirkosta Helsingistä
        start_time: '2026-08-16T10:00:00+03:00'
        end_time: '2026-08-16T10:59:20+03:00'
        description: |-
          Liturgina ja saarnaajana seurakuntapastori Piia Ahtee. Kanttorina ja urkurina Anna Marte. Virret: 923; 288; 277:5; 930; 222:2,4,5 (vuorovirtenä; sov. Juhani Haapasalo); 903:1,6.
      - title: Muistojen bulevardi
        start_time: '2026-08-16T11:00:00+03:00'
        end_time: '2026-08-16T11:59:00+03:00'
      - title: 'Elävä historia: Wartholm - linna, joka katosi'
        start_time: '2026-08-16T12:05:00+03:00'
        end_time: '2026-08-16T12:55:00+03:00'
        description: |-
          Keskiaikaiset puulinnat ovat tuhoutuneet, emmekä tiedä, missä sijaitsi asiakirjoissa mainittu Wartholm. Voisiko se olla Helsingin Vartiokylässä? Sipoossa tai Porvoossa? Toimittajana Sakari Silvola.
      - title: 'Välilevyjä retkellä: Luonnoton luonto'
        start_time: '2026-08-16T13:00:00+03:00'
        end_time: '2026-08-16T13:57:00+03:00'
        description: |-
          Tuntsan syrjäisessä erämaassa musiikkitoimittaja Kare Eskolan maastopyörävaellus piirtää itärajan näkyviin. Ja kun kirkas joki muuttuu tekojärveksi, koskematon alkumetsä kaivokseksi ja pokasaha metsäkoneeksi, piirtyy näkyviin myös kiistelty raja luonnon ja luonnottoman välillä. Jos lapinnoita Akmeeli Lokan rannalla heräisi transsista, johon 1600-luvulla vajosi, näkisikö hän maansa samoin kuin retkeilijä nyt? Elokuun kolmet Välilevyt on tehty kesän aikana retkillä.
      - title: 'Viikon luontoääni: Mustaleppälintu'
        start_time: '2026-08-16T15:55:00+03:00'
        end_time: '2026-08-16T16:00:00+03:00'
        description: |-
          Viikon luontoäänen esittelee Juha Laaksonen.
      - title: Faunin iltapäivä
        start_time: '2026-08-16T16:07:00+03:00'
        end_time: '2026-08-16T16:59:59+03:00'
        description: |-
          Fauré: Le jardin de Dolly (Dollyn puutarha) sarj. Dolly (Amsterdamin kitaratrio).

          Crusell: Romanssi kvartetosta klarinetille ja jousille n:o 1 Es-duuri (Kari Kriikku ja Avanti!).

          Kauppi: Hän kulkevi kuin yli kukkien (Tero Hannula, baritoni, ja Meri Louhos, piano).

          Saint-Saëns: Marssi-Scherzo sinfoniasta n:o 1 Es-duuri (Malmön SO/Marc Soustrot).

          Morel: Allegro sonatiinista kitaralle (Ricardo Gallén).

          V. Hannikainen: Vanha muisto (Radiosekstetti 2020). 

          L. Solberg: Norönnamarsj (Norjalainen marssi) (Liepajan SO/Paul Mann). 

          Korngold: Sommer (Kesä) sarj. Einfache Lieder (Yksinkertaisia lauluja) (Camilla Tilling, sopraano, ja Paul Rivinius, piano).

          Carr-Boyd: Fandango (Sydney Mandolins/Adrian Hooper).

          Schubert: Allegro vivace - Trio oktetosta F-duuri (Emma Johnson, klarinetti, Philip Gibbon, fagotti, ja Michael Thompson, käyrätorvi, Chris West, kontrabasso, sekä Carducci Quartet).

          Sibelius: Scène romantique teoks. Viisi romanttista kappaletta op.101 (Janne Mertanen, piano).

          Konsertin on toimittanut Tuomas Niemelä. 
