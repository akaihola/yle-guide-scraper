      - title: 'Romanitarinoita: Kyösti Roth – Elämäntyö, joka jätti jäljen osa 1'
        start_time: '2026-08-18T20:00:00+03:00'
        end_time: '2026-08-18T20:25:00+03:00'
        description: |
          Kyösti Roth – Elämäntyö, joka jätti jäljen

          Kyösti Roth on nimi, jonka vaikutus kuuluu ja näkyy edelleen suomalaisessa romanigospelissa. Hän oli mukana jo silloin, kun hengellinen romanimusiikki löysi oman äänensä 1970-luvulla – ja hän oli sen tyylin luoja. Roth aloitti musiikkiuransa ravintolamuusikkona, mutta hänen tiensä vei gospelmusiikin pariin, jossa hän teki elämänmittaisen työn.
          Hän on säveltänyt, sanoittanut tai sovittanut yli 2000 levytettyä kappaletta, ollut mukana yli 80 eri artistin levyillä ja esiintynyt jopa yli 1500 tilaisuudessa vuodessa.
          Hänen lahjakkuutensa on ainutlaatuista, mutta ehkä vieläkin puhuttelevampaa on hänen syvä kiitollisuutensa siitä lahjasta, jonka on saanut. Tämä ei ollut hänelle vain ura – se oli kutsumus, elämäntyö. Hän ei tehnyt musiikkia vain itseään varten, vaan ihmisille.
          Kyösti Roth on ollut tienraivaaja, näkijä ja esikuva – eikä häntä voi korvata. Hän on yksi ja ainoa.
