      - title: 'Faijan vika valhe: Faijan kuolinvuoteella'
        start_time: '2026-08-14T17:05:00+03:00'
        end_time: '2026-08-14T17:30:00+03:00'
        description: |-
          On aika vastata siihen todelliseen kysymykseen, jota on vältelty kaksi vuotta. Kuka oli Mika
          Fahler, Axan faija? Miksi hänen oli niin vaikea kertoa totuutta ja miksi hän ei koskaan
          puhunut isästään? Axa lähtee suvun syntymaisemiin Satakuntaan ja vierailee muistoissaan
          faijan kuolinvuoteella.
