      - title: Radio 1:n aamu
        start_time: '2026-08-14T08:07:00+03:00'
        end_time: '2026-08-14T09:00:00+03:00'
        description: |-
          Ajatuksia tarjoileva aamulähetys, jollaista et kuule mistään muualta. Radio 1:n aamu kutsuu lempeän rytmikkäälle matkalle maailman ympäri. Matkalla soivat eri aikakausien ja kulttuurien sävyttämät popin, jazzin, maailmanmusiikin ja instrumentaalimusiikin helmet. Juontajana Jalmari Laine.
      - title: Maisteri Lindgrenin musiikkiesitelmä
        start_time: '2026-08-14T11:00:00+03:00'
        end_time: '2026-08-14T11:55:00+03:00'
      - title: 'Tiedeykkönen: Väärinymmärretty kissa - moni tulkitsee kissan eleet protestina turhaan'
        start_time: '2026-08-14T12:05:00+03:00'
        end_time: '2026-08-14T12:55:00+03:00'
        description: |
          Kissa eleet ovat paljon hienovaraisempia kuin ymmärrämme. Mitä kissa tarvitsee, ja mistä tiedämme, voiko se hyvin? Asiantuntijoina on eläinlääkäri Johanna Lankila, kissa-asiantuntija, eläintenhoidon  opettaja Päivi Ylikorpi sekä eläinten käyttäytymistieteen tohtori Helena Telkänranta. Toimittajana on Pirjo Koskinen. 
      - title: Kulttuuriykkönen
        start_time: '2026-08-14T15:00:00+03:00'
        end_time: '2026-08-14T15:58:00+03:00'
        description: |-
          Rentoa puhetta, kiinnostavimmat vieraat ja kulttuurin ajankohtaisaiheet debatoitavina. Suorana maanantaista perjantaihin.
      - title: Iltahartaus
        start_time: '2026-08-14T18:50:00+03:00'
