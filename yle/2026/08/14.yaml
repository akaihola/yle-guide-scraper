      - title: 'Pieleen mennyt historia: Inflaatio syö rahan arvon, mutta öljyää taloutta '
        start_time: '2026-08-14T21:31:00+03:00'
        end_time: '2026-08-14T22:25:00+03:00'
        description: |
          Milloin inflaation historia alkoi? Mikä inflaatiota aiheuttaa ja milloin se on vaarallista? Näitä kysymyksiä pohtivat taloushistorian professori emeritus Sakari Heikkinen, historianopettaja Lasse Hongisto ja toimittaja Jussi Nygren.
      - title: Tuuli Saksalan keidas
        start_time: '2026-08-14T22:26:00+03:00'
        end_time: '2026-08-14T23:15:00+03:00'
        description: |-
          Musiikin avulla voi matkustaa Andien ylängöille, sumuisille saarille tai Kalkutan ruuhkaisille kaduille. Silti mielenkiintoisin matka laulun siivittämänä tehdään jokaisen omaan mieleen. Tuuli Saksalan keidas avaa maailman ihmeitä musiikin keinoin.
