      - title: Aamusoitto
        start_time: '2026-08-14T07:06:00+03:00'
        end_time: '2026-08-14T08:00:00+03:00'
        description: |+
          D. Scarlatti: Sonaatti G-duuri (David Russell, kitara).

          Baltzar: Muunnelmia viululle ja continuolle (Battalia).

          Crusell (sov. Lind): Marssi vaskikvintetille (Heimo Savolainen, flyygelitorvi, Jorma Rautakoski, trumpetti, Esa Tukia, käyrätorvi, Pertti Hostikka, pasuuna, ja Eino Talo-Eskola, tuuba).

          Kuula: Metsän kuninkaalle (YL/Pasi Hyökki).

          Mendelssohn: Nokturni näyt. Kesäyön unelma (Orpheus-kamariorkesteri).

          Darzins: Valse melancolique (Detroitin SO/Neeme Järvi).

          Vaughan Williams: Menuetti ja musette konsertosta oboelle ja jousille a-molli (John Williams ja Lontoon kuninkaallinen FO/Paavo Berglund).

          Sanz (sov. Lagoya): Canarios (Alexandre Lagoya, kitara, ja St. Martin-in-the-Fields/Kenneth Sillito).

          Beethoven: Mefiston kirppulaulu (Petteri Salomaa, baritoni, ja Tuija Hakkila, fortepiano).

          Popper: Espanjalainen tanssi nro 4 (Helen Lindén, sello, ja Folke Gräsbeck, piano).

          Hahn: Iberienne teoks. Le bal de Beatrice d'Este (Ensemble Initium/Nicolas Chalvin).

          Saint-Saëns: Hääkakku (Heini Kärkkäinen, piano, ja Tapiola Sinfonietta/Jean-Jacques Kantorow).

      - title: Radio 1:n aamu
        start_time: '2026-08-14T08:07:00+03:00'
        end_time: '2026-08-14T09:00:00+03:00'
        description: |-
          Ajatuksia tarjoileva aamulähetys, jollaista et kuule mistään muualta. Radio 1:n aamu kutsuu lempeän rytmikkäälle matkalle maailman ympäri. Matkalla soivat eri aikakausien ja kulttuurien sävyttämät popin, jazzin, maailmanmusiikin ja instrumentaalimusiikin helmet. Juontajana Jalmari Laine.
      - title: Maisteri Lindgrenin musiikkiesitelmä
        start_time: '2026-08-14T11:00:00+03:00'
        end_time: '2026-08-14T11:55:00+03:00'
      - title: 'Tiedeykkönen: Väärinymmärretty kissa - moni tulkitsee kissan eleet protestina turhaan'
        start_time: '2026-08-14T12:05:00+03:00'
        end_time: '2026-08-14T12:55:00+03:00'
        description: |
          Kissa eleet ovat paljon hienovaraisempia kuin ymmärrämme. Mitä kissa tarvitsee, ja mistä tiedämme, voiko se hyvin? Asiantuntijoina on eläinlääkäri Johanna Lankila, kissa-asiantuntija, eläintenhoidon  opettaja Päivi Ylikorpi sekä eläinten käyttäytymistieteen tohtori Helena Telkänranta. Toimittajana on Pirjo Koskinen. 
      - title: Kulttuuriykkönen
        start_time: '2026-08-14T15:00:00+03:00'
        end_time: '2026-08-14T15:58:00+03:00'
        description: |-
          Rentoa puhetta, kiinnostavimmat vieraat ja kulttuurin ajankohtaisaiheet debatoitavina. Suorana maanantaista perjantaihin.
      - title: Iltahartaus
        start_time: '2026-08-14T18:50:00+03:00'
        end_time: '2026-08-14T19:00:00+03:00'
        description: |-
          Perheneuvoja Anja Nwose, Forssa
          Jumala on uskollinen lohduttaja. Psalmi 51 puhuttelee elämän kolhimaa.
      - title: 'Konsertteja: Entisajan salonkikonsertti Uudenkaupungin Crusell-viikolla'
        start_time: '2026-08-14T19:02:00+03:00'
        end_time: '2026-08-14T21:00:00+03:00'
        description: |
          Sopraano Helena Juntunen ja harpisti Laura Hynninen konsertoivat Uudenkaupungin Crusell-viikolla. Entisajan salonkikonsertin tyyliin toteutettava konsertti soitetaan 1800-luvun yksityiskodissa  joka sijaitsee säveltäjä Bernhard Crusellin (1775–1838) syntymäkorttelissa Myllykadun ja Alisenkadun kulmassa. Ohjemassa on kotimiljööseen sopivia lauluja sekä Juntusen kertomuksia elämästään juhlittuna oopperalaulajana. 31.7. Uudenkaupungin Uta-salissa tallennertun konsertin juontaa ja toimittaa Ainomaija Pennanen.
