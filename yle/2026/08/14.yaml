      - title: 'Konsertteja: Entisajan salonkikonsertti Uudenkaupungin Crusell-viikolla'
        start_time: '2026-08-14T19:02:00+03:00'
        end_time: '2026-08-14T21:00:00+03:00'
        description: |
          Sopraano Helena Juntunen ja harpisti Laura Hynninen konsertoivat Uudenkaupungin Crusell-viikolla. Entisajan salonkikonsertin tyyliin toteutettava konsertti soitetaan 1800-luvun yksityiskodissa  joka sijaitsee säveltäjä Bernhard Crusellin (1775–1838) syntymäkorttelissa Myllykadun ja Alisenkadun kulmassa. Ohjemassa on kotimiljööseen sopivia lauluja sekä Juntusen kertomuksia elämästään juhlittuna oopperalaulajana. 31.7. Uudenkaupungin Uta-salissa tallennetun konsertin juontaa ja toimittaa Ainomaija Pennanen.
