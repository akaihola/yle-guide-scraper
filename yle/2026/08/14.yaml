      - title: 'Tiedeykkönen: Väärinymmärretty kissa - moni tulkitsee kissan eleet protestina turhaan'
        start_time: '2026-08-14T12:05:00+03:00'
        end_time: '2026-08-14T12:55:00+03:00'
        description: |
          Kissa eleet ovat paljon hienovaraisempia kuin ymmärrämme. Mitä kissa tarvitsee, ja mistä tiedämme, voiko se hyvin? Asiantuntijoina on eläinlääkäri Johanna Lankila, kissa-asiantuntija, eläintenhoidon  opettaja Päivi Ylikorpi sekä eläinten käyttäytymistieteen tohtori Helena Telkänranta. Toimittajana on Pirjo Koskinen. 
