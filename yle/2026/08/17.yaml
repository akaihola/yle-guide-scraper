          Näyttelijä Krista Kosonen lukee Matteuksen evankeliumia (17:1-18:20) UT2020 käännöksen mukaan. 13. jaksossa Jeesus nousee vuorelle ja kokee muodonmuutoksen oppilaidensa edessä.
