      - title: 'Väkivallan markkinat: Kun koko maa on valjastettu palvelemaan asetuotantoa '
        start_time: '2026-08-17T19:02:00+03:00'
        end_time: '2026-08-17T19:50:00+03:00'
        description: |
          Miehitys tarjoaa testikentän esimerkiksi tekoälyä hyödyntävälle aseistukselle. 90-luvulla Israelin armeijasta alettiin kehittää start up -koneistoa, jonka hedelmistä nauttivat niin asetuottajat kuin somejätitkin – ja myös Suomi. Vaikka asekauppa on osa Suomen ulkopolitiikkaa, miksi asehankinnan perusteena käytetään vain teknistä suorituskykyä?

          Jakson asiantuntijavieraina: Lähi-idän instituutin tutkija ja Helsingin yliopiston väitöskirjatutkija Antti Tarvainen, Tampereen yliopiston rauhan- ja konfliktintutkimuskeskuksen väitöskirjatutkija Kari Paasonen. Jakso on äänitetty syyskuussa 2024.
