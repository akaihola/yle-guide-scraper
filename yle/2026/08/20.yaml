      - title: Rehtorin tyttäret 3/5.
        start_time: '2026-08-20T22:31:00+03:00'
        end_time: '2026-08-20T22:59:00+03:00'
        description: |-
          Osa 3/5 Sodassa menehtyneen rehtori Sipolan perhe kohtaa uuden elämänvaiheen. Jokaisen olisi nyt huolehdittava itsestään. Vanhimmat tyttäret Raija, Pirkko, Sirkka ja Satu alkavat huushollaamaan ja äiti hakeutuu opettajan töihin. Pienimmät Kaarina sekä kuopus Jorma saavat vielä temmeltää vapaasti. Sarja vuodelta 1959.
