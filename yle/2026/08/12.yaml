      - title: 'Konsertti: Meidän Festivaali – Aphrodite, Maija ja Lauri'
        start_time: '2026-08-12T19:02:00+03:00'
        end_time: '2026-08-12T21:00:00+03:00'
        description: |-
          Tuusulan kirkossa kolme vahvaa ja persoonallista muusikkoa nähdään ensimmäisen kerran yhdessä.

          Maija Kauhanen on yksi tämän hetken omaleimaisimmista suomalaisista muusikoista – esiintyjä, jonka työssä kansanmusiikin perinne elää vahvana mutta jatkuvasti muuntuvana. Lauri Porra puolestaan tunnetaan laaja-alaisena säveltäjänä ja muusikkona, jonka tekemisessä yhdistyvät eri musiikilliset maailmat klassisesta kokeilevampiin suuntiin. Aphrodite Patoulidou on kansainvälisesti esiintyvä sopraano, joka liikkuu luontevasti oopperan, nykymusiikin ja muiden esittävien taiteiden rajapinnoilla.

          Konsertin ohjelma rakentuu eri tyylien ja ilmaisutapojen rinnakkaisuudesta. Illassa kohtaavat kolme vahvaa taiteilijaa, joiden erilaiset taustat ja estetiikat törmäävät ja alkavat vähitellen löytää yhteisen suunnan. Musiikkia kuullaan niin Suomesta kuin Kreikastakin ja tyylisuunnat vaihtelevat aina kansanmusiikista vanhaan musiikkiin. Tuusulan kirkossa 28.7. tallennetun konsertin toimittaa Eero Koski.

