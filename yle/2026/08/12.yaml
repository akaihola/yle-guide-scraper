      - title: Radio 1:n aamu
        start_time: '2026-08-12T08:07:00+03:00'
        end_time: '2026-08-12T09:00:00+03:00'
        description: |-
          Ajatuksia tarjoileva aamulähetys, jollaista et kuule mistään muualta. Radio 1:n aamu kutsuu lempeän rytmikkäälle matkalle maailman ympäri. Matkalla soivat eri aikakausien ja kulttuurien sävyttämät popin, jazzin, maailmanmusiikin ja instrumentaalimusiikin helmet. Juontajana Jarmo Laitaneva.
      - title: Muistojen bulevardi
        start_time: '2026-08-12T09:04:00+03:00'
        end_time: '2026-08-12T09:59:00+03:00'
        description: |+
          Henderson: You're the cream in my coffee (Nat King Cole and His Trio).
          Hatch: Vihreämmältä ruoho näyttää (Tuulikki Eloranta).
          Virta: Punatukkaiselle tytölleni (Olavi Virta).
          Mareš: Červencové ráno (Marta Kubišová & Waldemar Matuška).
          Hietanen/Wesslin: Lapin kesä (Vesa-Matti Loiri).
          Porter: Let's do it (Billie Holiday).
          Gonzalez Castillo: Silbando (Carlos Gardel).
          Harrison: Here comes the sun (Nina Simone).
          Lord Melody/Sir Lancelot: Shame and scandal in the family (Sir Lancelot).
          Groundstroem: I love you teddy bear (Tasavallan Presidentti).
          Kansansäv.: Scarborough fair (Sergio Mendes & Brasil '66).
          Kern: Look for the silver lining (Chet Baker).
          Goffin/King: Lainaa vain (Maarit).
          Francois/Revaux: A mi manera (Gipsy Kings).
          Shatrov: Mandshurian Beat (The Sounds).

          Konsertin laati Tuuli Saksala.

      - title: 'Havaintoja muutoksesta: Uusi elämänvaihe'
        start_time: '2026-08-12T10:00:00+03:00'
        end_time: '2026-08-12T10:50:00+03:00'
        description: |
          Lasten muuttaminen omilleen lapsuudenkodistaan on iso mullistus. Millaisia normeja kulttuurissamme liittyy lasten itsenäistymiseen? Millaisia muutoksia uusi elämänvaihe saa aikaan suhteessa aikuistuvaan lapseen, omaan itseen, aikaan ja arkeen?
          Toimittaja Satu Kivelä etsii vastauksia yhdessä Mira Selanderin ja  Ani Kellomäen kanssa, jotka ovat molemmat toimittajia ja kirjailijoita.
      - title: Klassinen kattaus
        start_time: '2026-08-12T11:00:00+03:00'
        end_time: '2026-08-12T11:57:00+03:00'
      - title: Kulttuuriykkönen
        start_time: '2026-08-12T15:00:00+03:00'
        end_time: '2026-08-12T15:58:00+03:00'
        description: |-
          Rentoa puhetta, kiinnostavimmat vieraat ja kulttuurin ajankohtaisaiheet debatoitavina. Suorana maanantaista perjantaihin.
      - title: 'Laura Korhosen Jazzklubi: Rakkautta ja elämää jazzklassikoiden lyriikoissa'
        start_time: '2026-08-12T17:35:00+03:00'
        end_time: '2026-08-12T18:35:00+03:00'
        description: |
          Mitä klassikoiksi nousseiden jazzkappaleiden sanoitukset haluavat meille kertoa? No rakkaudesta tietenkin, mutta siinäkin sävyjä voi olla lukuisia. Tällä kertaa korvat höristetään ennen kaikkea laululyriikoille. Ohjelman ensilähetys oli vuonna 2025.
      - title: Iltahartaus
        start_time: '2026-08-12T18:50:00+03:00'
        end_time: '2026-08-12T19:00:00+03:00'
        description: |-
          Toimittaja, muusikko Ariel Neulaniemi, Seinäjoki
      - title: 'Konsertti: Meidän Festivaali – Aphrodite, Maija ja Lauri'
        start_time: '2026-08-12T19:02:00+03:00'
        end_time: '2026-08-12T21:00:00+03:00'
        description: |-
          Tuusulan kirkossa kolme vahvaa ja persoonallista muusikkoa nähdään ensimmäisen kerran yhdessä.

          Maija Kauhanen on yksi tämän hetken omaleimaisimmista suomalaisista muusikoista – esiintyjä, jonka työssä kansanmusiikin perinne elää vahvana mutta jatkuvasti muuntuvana. Lauri Porra puolestaan tunnetaan laaja-alaisena säveltäjänä ja muusikkona, jonka tekemisessä yhdistyvät eri musiikilliset maailmat klassisesta kokeilevampiin suuntiin. Aphrodite Patoulidou on kansainvälisesti esiintyvä sopraano, joka liikkuu luontevasti oopperan, nykymusiikin ja muiden esittävien taiteiden rajapinnoilla.

          Konsertin ohjelma rakentuu eri tyylien ja ilmaisutapojen rinnakkaisuudesta. Illassa kohtaavat kolme vahvaa taiteilijaa, joiden erilaiset taustat ja estetiikat törmäävät ja alkavat vähitellen löytää yhteisen suunnan. Musiikkia kuullaan niin Suomesta kuin Kreikastakin ja tyylisuunnat vaihtelevat aina kansanmusiikista vanhaan musiikkiin. Tuusulan kirkossa 28.7. tallennetun konsertin toimittaa Eero Koski.
