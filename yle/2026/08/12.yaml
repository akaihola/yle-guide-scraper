      - title: 'Havaintoja muutoksesta: Uusi elämänvaihe'
        start_time: '2026-08-12T10:00:00+03:00'
        end_time: '2026-08-12T10:50:00+03:00'
        description: |
          Lasten muuttaminen omilleen lapsuudenkodistaan on iso mullistus. Millaisia normeja kulttuurissamme liittyy lasten itsenäistymiseen? Millaisia muutoksia uusi elämänvaihe saa aikaan suhteessa aikuistuvaan lapseen, omaan itseen, aikaan ja arkeen?
          Toimittaja Satu Kivelä etsii vastauksia yhdessä Mira Selanderin ja  Ani Kellomäen kanssa, jotka ovat molemmat toimittajia ja kirjailijoita.
