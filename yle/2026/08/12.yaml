      - title: 'Laura Korhosen Jazzklubi: Rakkautta ja elämää jazzklassikoiden lyriikoissa'
        start_time: '2026-08-12T17:35:00+03:00'
        end_time: '2026-08-12T18:35:00+03:00'
        description: |
          Mitä klassikoiksi nousseiden jazzkappaleiden sanoitukset haluavat meille kertoa? No rakkaudesta tietenkin, mutta siinäkin sävyjä voi olla lukuisia. Tällä kertaa korvat höristetään ennen kaikkea laululyriikoille. Ohjelman ensilähetys oli vuonna 2025.
      - title: Iltahartaus
