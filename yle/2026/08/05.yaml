      - title: 'Konsertteja: Philharmonia-orkesteri & Rouvali & Montero Mikkelin Musiikkijuhlilla'
        start_time: '2026-08-05T18:00:00+03:00'
        end_time: '2026-08-05T20:00:00+03:00'
        description: |-
          Mikkelin Musiikkijuhlien residenssiorkesteri Philharmonia Orchestra esiintyy osana vuoden 2026 vierailuaan poikkeuksellisesti myös Helsingin Musiikkitalolla. Konsertin johtaa orkesterin ylikapellimestari Santtu-Matias Rouvali, solistina on venezuelalainen pianistitähti Gabriela Montero.

          Ohjelmassa on Suomen kantaesitys Monteron pianokonsertosta nro 1, "Latin Concerto" ja Camille Saint-Saënsin kolmas sinfonia op. 78, jossa soivat Musiikkitalon urut. Konsertissa on tilaisuus kuulla myös Monteron kansainväliseksi tavaramerkiksi muodostuneita improvisaatioita.

          Suoran lähetyksen Helsingin Musiikkitalosta toimittaa Lotta Emanuelsson.
