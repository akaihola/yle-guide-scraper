        description: |-
          Nora ja Kalle palaavat Suomeen, normaali elämä tuntuu oudon etäiseltä, kun he yrittävät sopeutua arkeen. Nora käy läpi tunteitaan ja muistojaan, kun hän astuu terapeutin vastaanotolle. Voiko hän todella palata entiseen elämäänsä?
      - title: Mannerheimin agentti
        start_time: '2026-08-05T23:17:30+03:00'
        end_time: '2026-08-05T23:39:30+03:00'
        description: |+
          Jakso 10/10: Ei-toivottu henkilö.
          Mitä tapahtui Tahvanaiselle kirjan julkaisun jälkeen? Pidettiinkö Kekkosen johdolla salainen tapaaminen ja miten Tahvanaisesta tuli persona non grata? Koskinen matkustaa toimittaja Paavo Einin luokse, joka haastatteli Tahvanaista vuonna 1971. Oliko kyseessä vain Tahvanaisen mustamaalaaminen?

