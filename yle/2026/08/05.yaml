        description: |
          Perheystävällisyys työelämässä on asennetta, käytänteitä ja kulttuuria. Miten perheystävällinen työkulttuuri rakennetaan?
          Toimittaja Satu Kivelän vieraana Mothers in Business -yhdistyksen toiminnanjohtaja Jenny Söderman ja Great Place to Work Suomen toimitusjohtaja Kirsi Ilmasti. Ohjelma on uusinta ajalta 11.3.2026.
