        start_time: '2026-08-05T12:05:00+03:00'
        end_time: '2026-08-05T12:50:00+03:00'
        description: |-
          Miksi nälästä ei vieläkään ole päästy eroon? Miten nälän syyt ovat muuttuneet eri aikoina? Näitä kysymyksiä pohtivat talous- ja sosiaalihistorian dosentti Antti Häkkinen, ympäristötutkija Ville Lähde, historianopettaja Lasse Hongisto ja toimittaja Jussi Nygren.
          (2024)
      - title: 'Tiedetrippi: Propagandan kolme sävyä'
        start_time: '2026-08-05T13:00:00+03:00'
        end_time: '2026-08-05T13:30:00+03:00'
        description: |-
          Propaganda tarkoittaa harkittua ja systemaattista tiedon levittämistä, joka pyrkii vaikuttamaan yleiseen mielipiteeseen ja ihmisten asenteisiin. Kun musta propaganda on tehokasta, kukaan ei voi olla oikein varma, mikä sen lähde loppujen lopuksi on.
          (26.1.2026)
