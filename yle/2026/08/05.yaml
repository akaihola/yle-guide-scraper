        start_time: '2026-08-05T17:05:00+03:00'
        end_time: '2026-08-05T17:30:00+03:00'
        description: |-
          Viime aikoina on virinnyt keskustelu siitä, kuka vanhenevan väestön oikein hoitaa: oma perhe vai julkinen sektori. Saako Suomessa elää hyvää vanhuuden? Leonard Wilhelmuksen vieraana emeritaprofessori Marja Jylhä.
