      - title: 'Hanna Tikanderin toiset todellisuudet: “Kun työskentelen henkimaailman kanssa, en ole köyhä enkä kipee”'
        start_time: '2026-07-04T10:25:00+03:00'
        end_time: '2026-07-04T11:00:00+03:00'
        description: |
          Artturi sanoo olevansa henkiparannusenergian välittäjä ja transsimeedio. Vaipuessaan transsitilan hän kertoo välittävänsä viestejä henkimaailmasta. 
          Artturi kuvailee, että transsissa ollessaan hän on kuin toisessa huoneessa, eikä muista jälkikäteen, mitä viestejä hän on välittänyt. 
          Vaikka hän sanoo työskentelevänsä välittäjänä näkyvän ja näkymättömän maailman välillä, valtaa hänet silti välillä epäilys, voiko se kaikki olla totta.
      - title: 'Virtasen taloushistoria: Korkea peli - riskinottaja Walter Ahlström'
        start_time: '2026-07-04T11:00:00+03:00'
        end_time: '2026-07-04T11:52:00+03:00'
        description: |-
          Walter Ahlströmin isästä Antti Ahlströmistä on sanottu, että hänellä ei ollut koskaan rahaa. Aina kun yhtiön kassa kasvoi, rahat pantiin uusiin investointeihin. Poika Walter jatkoi kovaa riskinottoa ja laajensi yhtiötä.

          Ahlströmin suvun ja yhtiön juuret ovat Noormarkun ruukissa. Suku on sitoutunut pitämään alueen hyvässä kunnossa ja yleisö pääsee tutustumaan paitsi suomalaiseen teollisuushistoriaan, myös arkkitehtuurin ja muotoilun historiaan. 

          Haastateltavina ovat historioitsija, filosofian tohtori Sakari Siltala, joka on kirjoittanut Walter Ahlströmin elämäkerran ja Walter Ahlström -säätiön hallituksen puheenjohtaja, professori Markku Wilenius. Toimittaja on Juha Virtanen.
