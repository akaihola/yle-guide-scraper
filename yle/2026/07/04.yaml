        description: |
          Osa 5/8 Sietämätön nainen!
          Juuri kun Emman uudesta tuttavuudesta Frank Churchillistä on tullut mieluisa ystävä, joutuu Frank lähtemään Highburysta. Samalla kylään saapuu vähemmän mieluisa tuttavuus, kirkkoherra Eltonin tuore vaimo. Emma järjestää Eltoneille päivälliset ja saa rouva Eltonista uuden kilpailijan asioiden järjestelemisen suhteen. Onneksi herra Weston ilmaantuu paikalle tuoden iloisia uutisia. 
