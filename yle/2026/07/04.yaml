        start_time: '2026-07-04T07:31:00+03:00'
        end_time: '2026-07-04T07:55:00+03:00'
        description: |-
          Persikankukkien aikaan -romaani kertoo suomalaisesta Emmasta, joka pakenee ihmissuhdeongelmiaan isoäitinsä Dalian luo Italiaan. Nopeatempoisen tapahtumien käänteissä risteävät Rooman ulkopuolella sijaitsevan pikkukaupungin arki ja päähenkilö Emman rakkaushaaveet. Oman lisämausteensa tarinaan tuovat ruokavaikuttaja Emman taikomat italialaisen keittiön aidot reseptit ja isoäidin nuoruuden muistot.

          Toimittaja Jukka Kuosmasen vieraana on kirjailija Vera Vala.
