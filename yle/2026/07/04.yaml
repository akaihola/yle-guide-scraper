      - title: 'Keinuva talo - Mika Kauhanen: Aikamatka Euroopan etnovuoteen 1993'
        start_time: '2026-07-04T22:40:00+03:00'
        end_time: '2026-07-04T23:39:30+03:00'
        description: |
          1990-luku oli etnossa seikkailujen ja kokeilujen aikaa! Soundia dominoivat pop- ja rock-pohjaiset groovet sekä afrikkalainen vaikutus, mutta myös isoilla karttavedoilla laaditut fuusiot olivat suosituimmillaan. Esimerkiksi intialainen eksotiikka kiehtoi sekä muusikoita että kuuntelijoita, sillä maailmaa ei vielä oltu reppureissattu halki. Samaan aikaan Britannian ja Irlannin folk löysivät paljon ystäviä.

          Keinuvassa talossa tsuumataan siihen, millainen kansanmusiikki ja maailmanmusiikki innosti yleisöjä vuosikymmeniä sitten. Nostalginen minisarja kattaa vuodet 2003, 1993, 1983 ja 1973. Toimittajana Mika Kauhanen. Uusinta kesäkuulta 2023.
