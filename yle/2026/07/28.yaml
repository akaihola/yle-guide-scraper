      - title: 'Tiedetrippi: Kissani Lotta ja muut vieraslajit'
        start_time: '2026-07-28T13:00:00+03:00'
        end_time: '2026-07-28T13:30:00+03:00'
        description: |-
          Söpö kotikissa paljastuu hurjaksi pedoksi, kun se pääsee luontoon. Suomessa vapaana kulkevat kissat tappavat arviolta yli miljoona eläintä joka kuukausi. Vieraslaji tarkoittaa eläintä, joka on levinnyt luontaisesta ympäristöstään uudelle alueelle ihmisen mukana. Mitä sellaisesta voi seurata?
          (2025)
      - title: 'Radio 1:n iltapäivä: Elokuvaohjaaja Selma Vilhunen kertoo tarinoita rakkaudesta ja yhteisöistä'
        start_time: '2026-07-28T13:30:00+03:00'
        end_time: '2026-07-28T15:00:00+03:00'
        description: |-
          Juontajana Miia Lahti. Elokuvaohjaaja Selma Vilhusesta sanotaan, että hän on yksi kotimaisen elokuvataiteen kirkkaimmista nimistä. Viime talvena suomalaisohjaaja sai osakseen runsaasti suitsutusta. Hänen ohjaamansa ja Ilona Ahdin käsikirjoittama laulaja Kaija Koosta kertova elokuva "Kaunis, rietas, onnellinen" on kerännyt kehuja sekä yleisötä että kriitikoilta. Selma Vilhunen oli Miia Lahden haastattelussa Radio 1:n iltapäivässä  maaliskuussa.

          N. klo 14:30 hallinto- ja palvelupäällikkö Essi Lamppu on Juha Virtasen haastattelussa turkulaisista historianharrastajan kulttuurielämyksistä.
      - title: 'Kulttuuriykkönen: Kesän julkeat tuijottajat herättävät pohtimaan: miten ihmistä, taidetta ja näyttelijöitä saa katsoa?'
        start_time: '2026-07-28T15:00:00+03:00'
        end_time: '2026-07-28T15:58:00+03:00'
        description: |-
          Tarkkailevia miehiä tanssilattian laidalla, väheksyviä katseita työpaikan kokouksessa, ahdistavia kokemuksia silmin raiskaamisesta. Katsommeko toisia entistä vihamielisemmin? Keskustelemassa teatteriohjaaja Minna Harjuniemi, taidehistorioitsija Johanna Lindfors ja psykoterapeutti Heli Paatero. Jakke Holvas juontaa.
