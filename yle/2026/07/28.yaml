          Goldberg: Gigue Sonaatista kahdelle viululle ja continuolle C-duuri (London Baroque/Charles Medlam).

          Heiniö: Afrikan aamu sarj. Täällä, kaikkialla (Polyteknikkojen Kuoro/Saara Aittakumpu). 

          Glinka - Balakirev: Leivo (Jevgeni Kisin, piano). 

          Ries: Rondo (Allegretto) sekstetosta g-molli (Charlotte Cassedanne-Yoran, harppu, Fritz Walther, piano, Uli Mehlhardt, klarinetti, Christian Lampert, käyrätorvi, Wolfgang Buttler, fagotti, ja Timm-Johannes Trappe, kontrabasso). 

          Müller-Hermann: Adagio molto cantabile sonaatista viululle ja pianolle d-molli (Daniel Gaede ja Oliver Triendl).

          Mozart: Taminon aaria oopperasta Taikahuilu (Peter Schreier, tenori, ja Dresdenin valtionorkesteri/Otmar Suitner).

          Fauré - Messager: Souvenirs de Bayreuth (Bayreuthin muistoja) (Jean-Philippe Collard ja Bruno Rigutto, piano).

          Dvorák: Allegro vivo jousikvintetosta n:o 3 Es-duuri (Raphael-yhtye).

          Toimittaja Lotta Emanuelsson
