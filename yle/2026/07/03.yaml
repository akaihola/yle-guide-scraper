        start_time: '2026-07-03T12:05:00+03:00'
        end_time: '2026-07-03T12:55:00+03:00'
        description: |-
          Tietämys lihavuuden monimutkaisesti biologiasta lisääntyy. Siitä huolimatta lihavia syyllistetään ja tämä aiheuttaa heille häpeää. Miten paljon geenit, aivokemia ja suolistomikrobit vaikuttavat? Haasteltavina lihavuuslääkäri Kirsi Pietiläinen sekä tutkijatohtori Johanna Matilainen Helsingin yliopistosta ja tutkijatohtori Julia Lautaoja-Kivipelto Oulun yliopistosta. Toimittajana Minna Korhonen.
