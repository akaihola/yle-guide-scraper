      - title: 12 diktaattoria.Valtionpää Francisco Franco
        start_time: '2026-07-03T21:31:00+03:00'
        end_time: '2026-07-03T22:25:00+03:00'
        description: |-
          Kenraali Francisco Franco, Espanjan generalissimo vuodesta 1939 vuoteen 1975, on tietyllä tavalla unohdettu tyranni, sillä hänen tekonsa jäävät Adolf Hitlerin ja Josif Stalinin varjoon. Hän kuitenkin oli yksi historian todellisista hirviöistä. Tämä fasistinen sotaherra pääsi Hitlerin avittamana valtaan 1930-luvulla julman sisällissodan kautta ja jatkoi Espanjan siviiliväestön terrorisointia kuolemaansa asti. Kauheita rikoksia ympäröi yhä hiljaisuus, kertoo tietokirjailija, filosofi Leif Sundström. Toimittajana Raimo Tyykiluoto.
          (v. 2018)
      - title: 'Tuuli Saksalan keidas: Peléstä Mbappéen: Jalkapallon soundtrack'
        start_time: '2026-07-03T22:26:00+03:00'
        end_time: '2026-07-03T23:15:00+03:00'
        description: |
          Tiesitkö, että brasilialainen jalkapallolegenda Pelé teki yli sata laulua, useat salanimellä? Tai että suomenjuutalaiseen perinteeseen kuuluu satiiri jalkapallotähdistä jo vuodelta 1910? Tuuli Saksalan Keitaalla kuullaan Pelén ja espanjalaisen puolustajan Sergio Ramoksen omia lauluja, Lionel Messin ja Kylian Mbappén suosikkilauluja sekä legendaarisia jalkapallobiisejä. Peléstä Mbappéen - Jalkapallon soundtrack MM-kisojen hengessä.
