      - title: Jousikvartettokutsut – Viitasaaren Musiikin aika
        start_time: '2026-07-03T19:02:00+03:00'
        end_time: '2026-07-03T21:00:00+03:00'
        description: |
          Saksalainen Fabrik Quartet kantaesittää yhdessä kitaristi Petri Kumelan kanssa suomalaisen Sebastian Hillin Herbarium-teoksen. Kumelan tilaama ja Kumelalle omistettu sävellys on saanut inspiraationsa yhdysvaltalaisen runoilija Emily Dickinsonin herbaariosta, johon säilötyt kasvit on prässätty, kuivattu ja säilötty, pysäytetty ajan kulusta hiljaisiksi muistoiksi. Musiikissa nämä ”säilötyt hetket” heräävät uudelleen eloon: hauraina, fragmentaarisina ja ajoittain intensiivisesti purkautuvina. Teoksen jokainen osa pohjautuu yhteen kasviin ja sen symboliikkaan. 

          Konsertin muissa teoksissa päädytään vaihtelevien soittotyylien osittaisiin totuuksiin, levottomaan värimyrskyyn sekä ihmeelliseen kaninkoloon, joka johtaa unenomaisille jousikvartettokutsuille.

          Suoran lähetyksen Viitasaaren kirkosta toimittaa Ainomaija Pennanen.

          Fabrik Quartet:
          Federico Ceppetelli, viulu
          Muzi Lyu, viulu
          Jacobo Díaz Robledillo, alttoviulu
          Elena Cappelletti, sello

          Petri Kumela, kitara

          Konserttiohjelma:

          Georgia Koumará: Down the Rabbit hole

          Alex Paxton: Flowers

          -väliaika-

          Sebastian Hilli: Herbarium (2026, kantaesitys)
          I Jasmine
          II Violet
          III Ghost Pipe
          IV Poison Ivy
          V  Sarracenia

          George Lewis: String Quartet 4.5 ”Partial Truth”
