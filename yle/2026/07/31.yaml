      - title: 'Konsertteja: Crusell-viikko – Femme Fatale, Säveltäjänaisia ja rakkautta puupuhallinmusiikissa'
        start_time: '2026-07-31T19:02:00+03:00'
        end_time: '2026-07-31T21:00:00+03:00'
        description: |
          Konsertin verran musiikkia, joka saa miehet polvilleen! Ranskalaisten säveltäjänaisten mestariteoksia täydentävät kotimaiset helmet. Suoran lähetyksen Uudenkaupungin Wallilan kartanosta toimittaa Ainomaija Pennanen.

