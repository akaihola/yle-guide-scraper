        start_time: '2026-07-31T10:00:00+03:00'
        end_time: '2026-07-31T10:55:00+03:00'
        description: |-
          Filosofista keskustelua totuudesta, kauneudesta, hyvästä ja pahasta.
      - title: 'Maisteri Lindgrenin musiikkiesitelmä: Francesca Caccini aloitti uransa suoraan huipulta'
        start_time: '2026-07-31T11:00:00+03:00'
        end_time: '2026-07-31T11:55:00+03:00'
        description: |-
          "Etsiessään Francescalle töitä Guilio Caccini kävi siis kauppaa tyttärellään. Buonarroti auttoi häntä tässä pelissä, eikä mistään lähteistä selviä, oliko Francescalla oikeus sanoa mielipiteensä. Hänestä tehtiin haluttava tuote korkeimpien aatelisten silmissä, ja haluttavuutta voitiin lisätä monin eri keinoin. Tässähän ei sinänsä ole mitään kummallista tämän päivän nuorille taiteilijoille, joiden on osattava brändätä itsensä ja rakennettava houkuttelevaa imagoa etupäässä pystyvideoiden, pukeutumisen ja sosiaalisen median avulla." - Minna Lindgren esitelmöi.
      - title: 'Tiedeykkönen: Mitä tarvitaan lamaan? Taloudellisten kriisien anatomiaa'
        start_time: '2026-07-31T12:05:00+03:00'
        end_time: '2026-07-31T12:55:00+03:00'
        description: |+
          Taantuma, osittainen lama vai lama? Tiedeykkönen avaa talouskriisien olemusta makrotaloustieteen näkökulmasta! Lisäksi jaksossa puhutaan talousennustemalleista.

          Haastateltavina ovat Helsingin yliopiston empiirisen makrotaloustieteen professori Antti Ripatti ja Hankenin taloustieteen apulaisprofessori Julia Salmi.

          Toimittaja: Juuso Pekkinen
          Äänisuunnittelija: Juha Sarkkinen

      - title: 'Tiedetrippi: Rahamies Isaac Newton'
        start_time: '2026-07-31T13:00:00+03:00'
        end_time: '2026-07-31T13:30:00+03:00'
        description: |-
          Isaac Newton keksi liikkeen ja painovoiman lait, kehitti matemaattisia laskutapoja ja tutki valon luonnetta. Hänen työnsä muutti tavan, jolla ymmärrämme maailmaa. Moni ei kuitenkaan tiedä, että professori Newton ajoi takaa rahanväärentäjiä 1700-luvun Lontoon hämyisillä kaduilla, Englannin rahapajan palveluksessa.
          (5.1.2026)
      - title: 'Radio 1:n iltapäivä: Kirjani tarina - Linnea Kuuluvainen'
        start_time: '2026-07-31T13:30:00+03:00'
        end_time: '2026-07-31T15:00:00+03:00'
        description: |-
          Juontajana Kati Turtola. N. klo 14 Kirjani tarina. Nuori Juulia kamppailee äidin kuoleman, itsetuhoisten ajatusten ja uuden orastavan parisuhteen kanssa. Juulia ei kuitenkaan tiedä onko hän oikeasti rakastunut, kelpaako suhteeseen ihan omana itsenään vai vain kepeänä kivana tyttöystävänä ilman omaa vaikeaa menneisyyttään.

          Kirjailija Linnea Kuuluvaisen romaani Hukkumisleikki kietoo yhteen surun ja rakkaussuhteen trillerimäiseksi tarinaksi.

          Toimittaja Jukka Kuosmanen.
