          Mendelssohn: Auf Flügeln des Gesanges (Laulun siivin) (Barbara Bonney, sopraano, ja Geoffrey Parsons, piano).

          Chopin: Nokturni n:o 20 cis-molli (Katia Skanavi, piano).

          Mahler: Adagietto sinfoniasta nro 5 cis-molli (RSO/Jukka-Pekka Saraste).

          Bizet: Toreadorin aaria oopp. Carmen (Aarne Vainio, bassobaritoni, Suomen Kansallisoopperan kuoro, Malmi Vilppula ja Marja Eskola, sopraano, Maiju Kuusoja, altto, Eero Rousti, basso, sekä RSO/Paavo Berglund).

          Linkola: Häävalssi sarj. Häämusiikkia (Kaartin soittokunta/Raine Ampuja).

          Kilpinen: Laululle (Matti Lehtinen, baritoni, ja Hermann Hoppe, piano).

          Carreño: Balladi op.15 (Clara Rodriguez, piano).

          W.A. Mozart: Papagenon aaria oopp. Taikahuilu (Bryn Terfel, bassobaritoni, ja Skotlantilainen kamariork./Charles Mackerras).

          Orff: O fortuna kant. Carmina burana (Shinyukai Choir, Berliinin tuomiokirkon ja valtion poikakuoro sekä Berliinin filharmonikot/Seiji Ozawa).

