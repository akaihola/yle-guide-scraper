      - title: Mannerheimin agentti
        start_time: '2026-07-08T23:20:00+03:00'
        end_time: '2026-07-08T23:40:00+03:00'
        description: |
          Jakso 6/10: Tahvanainen koulutetaan radistiksi.
          Tahvanaisen kirjan mukaan hänet koulutettiin radistiksi Saksassa, jotta yhteydenpito Neuvostoliiton johtoon olisi helpompaa. Olisiko yhteydenpito radioteitse ollut teknisesti mahdollista Helsingistä Moskovaan 1930-luvulla?

          Koskinen keskustelee radiotekniikan asiantuntijoiden kanssa sen aikaisen radiotekniikan mahdollisuuksista. 
