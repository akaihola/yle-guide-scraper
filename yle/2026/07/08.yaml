        start_time: '2026-07-08T19:02:00+03:00'
        end_time: '2026-07-08T21:00:00+03:00'
        description: |-
          Harpisti-säveltäjä Laura Hynnisen kaunis, salaperäinen ja leikkisä musiikki täyttää Sysmän Teatteritalon elämyksellisessä konsertissa, johon äänisuunnittelija Viljami Mehto toteuttaa yleisöä ympäröivän surround-äänentoiston. Musiikin keskiössä on harppu, jonka sointimaailmaa Hynninen laajentaa live-elektroniikalla ja monipuolisella äänenkäytöllään. 2.7. Sysmän Teatteritalossa tallennetun konsertin toimittaa Riikka Holopainen.
