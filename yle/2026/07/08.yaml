        description: |
          Moderni elämä on jatkuvaa kilpajuoksua ajan kanssa. Miten verkkaistaa tahtia kiihtyvässä maailmassa? Mitä hitaampi kulttuuri mahdollistaa? 
          Toimittaja Satu Kivelä keskustelee aiheesta tutkija Eeva Houtbeckersin ja Frantsilan kehityspäällikkö Jupiter Cormierin kanssa. Ohjelma on uusinta ajalta 25.3.2026.
