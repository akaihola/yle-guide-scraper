        start_time: '2026-07-08T12:05:00+03:00'
        end_time: '2026-07-08T12:50:00+03:00'
        description: |-
          Chilessä sotilaskaappauksen kulku 11. syyskuuta 1973 sekä sitä seuranneet murhat ja karkotukset nostivat komentaja kapteeni Augusto Pinochetin aikansa voimakkaimmaksi oikeistolaisen sotilasdiktatuurin symboliksi.
          12 diktaattoria sarjaa toimittaa Raimo Tyykiluoto. 
          (v. 2018)
      - title: 'Radio 1:n iltapäivä: Lapualaisoopperassa kummittelee kesällä Mustikkamaalla -  ohjaajat Anna Kankila ja Ronja Louhivuori studiovieraina'
        start_time: '2026-07-08T13:30:00+03:00'
        end_time: '2026-07-08T15:00:00+03:00'
        description: |
          Juontajana Jarmo Laitaneva. Helsingissä Mustikkamaan kesäteatterissa tänä kesänä esitettävä Lapualaisoopperan kummitus on innoittunut vuonna -66 kantaesityksensä saaneesta Lapualaisoopperasta. Ylioppilasteatteri juhlii satavuotisuuttaan nostamalla vuoden aikana teatterin historian keskeisiä hetkiä, eri produktioita ja avauksia ja tänään (8.7.) ensi-illassa oleva Lapualaisoopperan kummitus on yksi näistä juhlavuoden tapauksista. Esityksen ohjaajat Anna Kankila ja Ronja Louhivuori ovat Jalmari Laineen haastattelussa.
          N. klo 14:30 Muusikot kertovat toisinaan, miten läheinen suhde heillä on omaan soittimeensa. Radion sinfoniaorkesterin käyrätorven soittaja, unkarilaissyntyinen József Hárs kertoo Lotta Emmanuelssonille työtoveruudestaan käyrätorven kanssa ja siitä, minkäalainen soittimen luonne oikein on. Haastattelu on uusinta viime syksyltä.
