      - title: 'Marko Gustafsson: Käännekohdissa Hanna Ryti'
        start_time: '2026-07-30T10:00:00+03:00'
        end_time: '2026-07-30T10:53:00+03:00'
        description: |
          Hanna Ryti on yksi miljoonista suomalaisista, johon 90-luvun lama jätti pysyvän jäljen. Hänen vanhempansa erosivat ja äiti oli yksinhuoltajana tosi tiukilla. Edelleen Rytin omassa ajattelussa on läsnä hänen äitinsä hokema, huomenna, tai viimeistään ensi viikolla kaikki romahtaa. Vuonna 2025 Hanna Rytiltä ilmestyi Kaatuminen-romaani, joka käsittelee laman vaikutuksia ihmisiin.
      - title: 'Epäilyttävän uutta - Aki Yli-Salomäki: Sykkiviä jousia ja paikkojen kaikuja'
        start_time: '2026-07-30T11:00:00+03:00'
        end_time: '2026-07-30T11:57:00+03:00'
        description: |-
          Milloin viimeksi löysit musiikkia, joka tuntuu ystävän halaukselta? Aki Yli-Salomäki poimii digitaalisen sävelavaruuden katkeamattomasta virrasta uutta musiikkia, jonka ääressä aika pysähtyy ja mieli saa levätä.
