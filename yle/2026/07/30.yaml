      - title: 'Maailma tarinoina: Mies vailla menneisyyttä näyttää Kaurismäen katseen asunnottomuuteen'
        start_time: '2026-07-30T12:05:00+03:00'
        end_time: '2026-07-30T13:00:00+03:00'
        description: |-
          Aki Kaurismäen Mies vailla menneisyyttä (2002) kuvaa muistinsa menettänyttä miestä, joka päätyy helsinkiläiseen konttikylään asunnottomien keskuuteen. Elokuva sysää hahmottamaan kaarta Suomen asunnottomuuden vähentämisen menestystarinasta kohti tämän päivän tilannetta, jossa asunnottomien määrä on jälleen nousussa. Miten elokuvassa kuvataan kodin rajoja ja merkitystä? Millainen on Kaurismäen katse ihmiseen järjestelmän rattaissa ja sen ulkopuolella? 
          Kaurismäen kerronnan raameissa asunnottomuuden ja kodin monitahoista vyyhtiä purkavat  Marja Vehkasen kanssa arkkitehti, taiteilija ja tutkija Helmi Kajaste ja asunnottomuustutkija, yliopisto-opettaja Veera Niemi.
      - title: 'Tiedetrippi: Homo Sapiens - viimeinen ihminen'
        start_time: '2026-07-30T13:00:00+03:00'
        end_time: '2026-07-30T13:30:00+03:00'
        description: |-
          Me nykyihmiset olemme viimeinen ja ainoa jäljellä oleva ihmislaji. Emme kuitenkaan ole aina olleet täällä yksin, mistä kertoo esimerkiksi neandertalinihmisen merkit Eurooppalaisten ihmisten perimässä. Miten ihmislaji on kehittynyt tällaiseksi – ja millaiseksi ehkä kehitymme?
          (2025)
      - title: 'Radio 1:n iltapäivä:  "Tuokaa tilanteeseen jotakin mukananne" – Koreografi, tanssituomari Jukka Haapalainen rohkeudesta, taiteesta ja Tom of Finland- musikaalista'
        start_time: '2026-07-30T13:30:00+03:00'
        end_time: '2026-07-30T15:00:00+03:00'
        description: |2
           Tanssija, koreografi ja kilpatanssituomari Jukka Haapalainen on puolisonsa Sirpa Suutari-Jääskön kanssa Suomen menestynein kilpatanssipari. Haapalainen on tuttu suurelle yleisölle paitsi kilpa-tanssijan urastaan, myös Tanssii tähtien kanssa -ohjelman tuomaroinnista. Viime vuosina Jukka Haapalainen on tehnyt yhä enemmän töitä myös teattereissa. Parhaillaan hän työskentelee Hämeenlinnan teatterissa kuvataiteililja Touko Laaksosesta kertovan Tom of Finland- musikaalin parissa. Haastattelijana Kati Turtola.( Haastattelun ensilähetys oli 15.4.26)
      - title: 'Kulttuuriykkönen: Miten aikuisena oppii Suomen kielen?'
        start_time: '2026-07-30T15:00:00+03:00'
        end_time: '2026-07-30T15:58:00+03:00'
        description: |
          Turkulaistunut brittiopiskelija Alicia Iredale on asunut Suomessa kuusi vuotta. Niiden kuluessa hän on opetellut kärsivällisesti suomen kieltä. Opiskelun vaiheista kertovat nettivideot ihastuttavat sosiaalisessa mediassa kymmenien tuhansien seuraajien joukkoa - eikä vähiten suomenkielisiä suomalaisia, joille Iredalen havainnot tuottavat oivalluksen hetkiä omasta kielestään

          Saksalaistaustainen toimittaja ja tietokirjailija Roman Schatz ja unkarilaistaustainen yliopistolehtori Katalin Miklossy ovat asuneet Suomessa jo lähes 40 vuotta, muutettuaan maahan kielen suhteen täysin ummikkoina. 

          Kaikkia kolmea yhdistää sanastonsa ja kielioppinsa puolesta vaikeaksi koetun suomen kielen sujuva hallinta. Alicia Iredale, Roman Schatz ja Katalin Miklossy kertovat ohjelmassa omasta opinpolustaan, kokemusistaan suomalaisten keskuudessa vieraskielisinä suomen puhujina sekä ajatuskiaan siitä, miten suomea tulisi ulkomaalaisille opettaa.

          Ville Talola toimittaa.
