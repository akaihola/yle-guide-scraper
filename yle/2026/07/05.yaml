      - title: 'Maisteri Lindgrenin musiikkiesitelmä: Kaija Saariahon ooppera Adriana Mater'
        start_time: '2026-07-05T08:05:44+03:00'
        end_time: '2026-07-05T08:59:23+03:00'
        description: |-
          "Saariahon ja Maaloufin oopperat ovat täydellinen vastakohta oman aikansa elokuville, kirjallisuudelle ja musiikille. Nykyään on tarve pitää herpaantumatta yleisön mielenkiinto yllä, jolloin tuloksena on vauhtia, yllättäviä käänteitä, sivujuonia ja cliff hangereitä, suomeksi jos haluatte rotkolla roikkumisia, ja vastaanottaja vajoaa helposti kanava-, some- ja nettisurffailuun, suomeksi jos haluatte, verkkolainelautailuun. Lyhytjänteisyyden seurauksena yksikään ajatus ei ehdi hahmottua kokonaisuudeksi, kun jo siirrytään seuraavaan ärsykkeeseen." - Minna Lindgren esitelmöi.
