      - title: 'Elävä historia: Puola - keskieurooppalainen suurvalta ja Suomen sokea piste'
        start_time: '2026-07-05T12:05:00+03:00'
        end_time: '2026-07-05T12:55:00+03:00'
        description: |-
          Puola - keskieurooppalainen suurvalta ja Suomen sokea piste

          Puolalaiset tietävät, mitä tarkoittaa, kun maa miehitetään. He tietävät myös sen, kuinka muut ottavat ja jakavat maat. Se on tapahtunut Puolalle kuusi kertaa. 

          Puolan historia on täynnä dramatiikkaa. Se on tarina siitä, kuinka suurvalta kerta toisensa jälkeen tulee muiden syömäksi ja katoaa kartalta.  

          Puolan Kansantasavalta oli Moskovalle vaikea rasti. Toisen maailmasodan jälkeen maahan istutettu kommunismi ei itänyt. Puolasta ei tullut Neuvostoliittoa, vaan se säilytti oman eurooppalaisen kulttuurinsa ja katolisen uskon. 

          Suomessa Puola on ollut huonoiten tunnettu Itämeren valtio. Siitäkin huolimatta, että Suomen ja Puolan historiassa on monta yhtymäkohtaa. 

          Haastateltavana FM Toni Stenström
          Toimittajana Liisa Vihmanen
