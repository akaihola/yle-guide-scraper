      - title: 'Klasariparatiisi- Eva Tigerstedt: Vettä vaan'
        start_time: '2026-07-05T07:00:50+03:00'
        end_time: '2026-07-05T07:54:45+03:00'
        description: |
          Vesi voi olla metafora musiikin virtailulle, liikkeelle, kerroksellisuudelle, välkkeelle tai helinälle.  Samalla vesi on arkinen, joka paikassa läsnäoleva aine. Se on myös elämän elinehto, aine, joka tekee elämän pallollamme mahdolliseksi. Sitä on arvioitu olleen pallollamme noin 4,4 miljardia vuotta. Sen olomuodot ovat lukemattomat. Utelias äänimatkailija Eva Tigerstedt kuulostelee vettä.
          Ohjelma on uusinta vuodelta2015

          Ohjelmassa kuullaan otteita seuraavista teoksista:

          Kaija Saariaho: Mer indigo, oopperasta Kaukainen rakkaus (Berliinin radiokuoro ja Berliinin saksalainen sinfoniaorkesteri, joht. Kent Nagano)

