      - title: 'Marko Gustafsson: Käännekohdissa: Jarkko Martikainen'
        start_time: '2026-07-09T10:00:00+03:00'
        end_time: '2026-07-09T10:53:00+03:00'
        description: |
          “Isä soitti minulle ja aloitti puhelun kysymällä oletko muistanut olla kiitollinen. Hän viittasi siihen, että olen saanut tehdä juuri niitä asioita joita olen pienestä pitäen rakastanut”, Jarkko Martikainen sanoo. Kiitollisuuden lisäksi myös tinkimättömyys on aina ollut Martikaisen tekemisiä leimaava piirre.  “Olen ollut huono lähtemään mukaan projekteihin, jotka eivät ole riittävän merkityksellisiä.” 
