      - title: 'Maailma tarinoina: Mummola - sukupolvien ja ihanteiden ristivetoa joulupöydässä'
        start_time: '2026-07-09T12:05:00+03:00'
        end_time: '2026-07-09T13:00:00+03:00'
        description: |-
          Tia Kouvon elokuva Mummola on rakkaudenosoitus epätäydelliselle perheelle, jossa kaikki yrittävät parhaansa mukaan tulla toimeen toistensa kanssa. Miksi juhlapyhät nostavat esiin perheen jännitteet? Onko nykyinen tunteista puhumisen eetos tai jopa edellytys tie parisuhde- ja perheonneen? Mistä syntyy "virtahepo olohuoneessa" ja miten sen kanssa voi elää? 

          Elokuvan innoittamana perhedynamiikasta, vaikenemisen kulttuurista ja sen purkamisesta keskustelevat Marja Vehkasen kanssa ohjaaja-käsikirjoittaja Tia Kouvo ja  psykoterapeutti, tietokirjailija Katriina Järvinen.
      - title: 'Radio 1:n iltapäivä: Huumorintajun historia'
        start_time: '2026-07-09T13:30:00+03:00'
        end_time: '2026-07-09T15:00:00+03:00'
        description: |-
          Juontajana Tatu Tamminen. Huumorintajun historia

          Se, mikä on ollut hauskaa, on vaihdellut ajan saatossa. Pitkään ihmisiä nauratti esimerkiksi sadistinen huumori, huono-osaisille hekottaminen, kun taas nykyisin suositaan empaattista huumoria. Yksi asia on kuitenkin naurattanut kaikkina aikoina ja kaikissa kulttuureissa: pieruhuumori. Miten käsityksemme hauskasta on muuttunut, ja miksi suolikaasut ovat huumorintajumme ytimessä? Samppa Korhosen haastateltavana maailman tiettävästi ainoa huumorin filosofian dosentti Jarno Hietalahti.
          N. 14:30 Sari Valto haastattelee filosofi Frank Martelaa siitä, miten voimme muokata oloamme onnellisemmaksi. Ensilähetys 8.10.2025.
