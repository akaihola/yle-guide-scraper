      - title: 'Marko Gustafsson: Käännnekohdissa Juha-Pekka Koskinen'
        start_time: '2026-07-23T10:00:00+03:00'
        end_time: '2026-07-23T10:55:00+03:00'
        description: |+
          Juha-Pekka Koskinen on yli kuudellakymmenellä teoksellaan suomen tuotteliaimpia kirjailijoita. J P Koskisen mielessä kiehuu tarina, jota ei vielä ole olemassa, mutta se on pakko synnyttää ja saattaa valmiiksi. Hänelle kirjoittaminen on parhaimmillaan ja myös pahimmillaankin sitä, että ei muista syödä eikä nukkua. 


