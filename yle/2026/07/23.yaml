        start_time: '2026-07-23T22:31:00+03:00'
        end_time: '2026-07-23T22:59:00+03:00'
        description: |
          Osa 7/8 Huviretki 
          Emma ja hänen ystäväpiirinsä päättävät tehdä retken läheiselle Box Hillille. Huviretken tunnelma on kuitenkin vaisu eikä se parane Emman ikävän käytöksen myötä. Herra Knightley moittii Emmaa ajattelemattomuudesta. Myöhemmin Emma saa kuulla, että Jane Fairfax aikoo lähteä Highburysta, samoin herra Knightley. Emma jää kaksin iäkkään isänsä kanssa ja joutuu kohtaamaan omat virheensä. 
