      - title: 'Maailma tarinoina: Prometheus, Chaplin ja Jokeri - mitä triksterit kertovat ihmisyydestä?'
        start_time: '2026-07-23T12:05:00+03:00'
        end_time: '2026-07-23T13:00:00+03:00'
        description: |-
          Mitä yhteistä on sarjakuvista, elokuvista ja tv-sarjoista tutulla Jokerilla, Charles Chaplinin kulkuri-hahmolla, Andy Kaufmanilla tai kreikkalaisen mytologian Prometheuksella? Kaikkia näitä voi pitää trikstereinä, eli kujeilijoina, jotka haastavat sääntöjä, auktoriteetteja ja moraalikäsityksiä. Mikään ei pidättele monikasvoisia trikstereitä, ei edes sukupuoli. Miten triksterit liittyvät psykiatri Carl Gustav Jungin käsitykseen ihmisyydestä? Ketkä voisi nähdä trikstereinä tosielämän puolella?
          Marja Vehkasen kanssa kujeilijoiden ydintä ja moninaisuutta hahmottaa trikstereistä kirjaansa viimeistelevä huumorin filosofian dosentti Jarno Hietalahti.
      - title: 'Tiedetrippi: Hakkapeliittojen legenda'
        start_time: '2026-07-23T13:00:00+03:00'
        end_time: '2026-07-23T13:30:00+03:00'
        description: |-
          1600-luvulla Ruotsi oli sotilasvaltio, joka käytti käytännössä kaikki resurssinsa verisiin valloitussotiin, joissa myös suomalaiset ratsusotilaat, hakkapeliitat, niittivät mainetta. Hakkapeliitat eivät olleet asevelvollisia eivätkä palkkasotilaita, vaan talonpoikien tie rikkauksiin: vastineeksi ratsusotilaan varustamisesta Ruotsin kuningas myönsi varustajalle verovapauden.
          (28.7.2025)
      - title: 'Radio 1:n iltapäivä: Studiovieraana Joroisten Musiikkipäivien taiteellinen johtaja, oopperalaulaja Jussi Merikanto'
        start_time: '2026-07-23T13:30:00+03:00'
        end_time: '2026-07-23T15:00:00+03:00'
        description: |
          Savolainen Joroisten kunta on yksi niitä suomalaisia pieniä paikkakuntia, joiden elämä vilkastuu selvästi kesälomakaudella. Seudulla on runsaasti mökkiläisiä, jotka näkyvät raitilla kesäaikaan. Lisäksi pitäjän kulttuurielämä elävöityy kesällä. Joroisilla järjestetään perinteikästä musiikkitapahtumaa, Joroisten Musiikkipäiviä, jonka konserttisaleina toimivat seudun kartanot ja kirkot. Vuodesta 1977 saakka järjestetyn Joroisten Musiikkipäivien taiteellinen johtaja Jussi Merikanto on Joni Timosen haastattelussa.

          N. klo 14:30 tietokirjailija Markku Laukkanen kertoo sykähdyttävästä kulttuurielämyksestään Juha Virtaselle. Ensilähetys 29.1.2026.
      - title: 'Kulttuuriykkönen: Miten meidät laitetaan yhteiskunnassa arvojärjestykseen?'
        start_time: '2026-07-23T15:00:00+03:00'
        end_time: '2026-07-23T15:58:00+03:00'
        description: |+
          Suomessa puhutaan paljon tuloeroista, varallisuudesta ja hyvinvoinnista. Mutta ihmisten paikka yhteiskunnassa ei määräydy pelkästään rahan perusteella. Asemaan vaikuttavat myös koulutus, ammatti, arvostus, vaikutusvalta, näkyvyys ja kokemus siitä, tuleeko nähdyksi ja tunnustetuksi.

          Millaisille portaille suomalaiset tässä yhteiskunnassa asettuvat? Kuka saa arvostusta, kuka jää näkymättömäksi ja kuinka helposti ihmiset voivat liikkua yhteiskunnallisesta asemasta toiseen?
          Keskustelun pohjalla on Tampereen yliopiston sosiaalipolitiikan professori Juho Saaren teos Ihmisiä yhteiskunnan portailla, joka tarkastelee suomalaisen yhteiskunnan hierarkioita huomattavasti laajemmin kuin pelkkien tulojen tai varallisuuden näkökulmasta.

          Mukana keskustelemassa ovat Suomen sosiaali ja terveys ry SOSTEn erikoistutkija Anne Järvinen, käyttäytymistaloustieteen tutkija Jori Grym Hankenin kauppakorkeakoulusta, sosiologian professori Jani Erola sekä etäyhteyden päässä Tampereelta Juho Saari. Ville Talola toimittaa.

