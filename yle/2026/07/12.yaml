      - title: 'Elävä historia: Irtolaisia ja vittuvelkaisia -  kun Suomea siivottiin sopeutumattomista'
        start_time: '2026-07-12T12:05:00+03:00'
        end_time: '2026-07-12T12:55:00+03:00'
        description: |-
          Millaisesta Suomesta 1900-luvun työlaitokset kertovat, millaisia kohtaloita suljetut laitokset kätkivät sisäänsä ja miten niissä elettiin? Ojentuiko isänmaamme? Asiantuntijana työlaitosten toimintaan perehtynyt historiantutkija ja kriminologian dosentti Katariina Parhi.


          Toimittaja on Leena Peltokangas ja äänisuunnittelija Panu Willman.

          Lukijoina Antti Palomaa ja Kirsi Matson-Mäkelä. 
