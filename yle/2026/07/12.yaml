      - title: 'Maisteri Lindgrenin musiikkiesitelmä: Tuonelan joutsenen matka oopperan alkusoitosta modernismin helmeksi'
        start_time: '2026-07-12T08:05:37+03:00'
        end_time: '2026-07-12T08:59:41+03:00'
        description: |-
          "Kun Sibelius nimesi vuonna 1895 entisen oopperansa alkusoiton Tuonelan joutseneksi, hän teki teidän laiskalle tyttärellennekin selväksi, että teos edustaa symbolismia. Silloin tiedämme, että musiikki ei kuvaa joutsenta, vaan sitä, mitä joutsen symboloi. Jos englannintorven soolo saa teidät kuvittelemaan joutsenen laulua, ette ole koskaan kuullut sen rääkäisyä tai puheliasta ääntä." - Minna Lindgren esitelmöi.
