      - title: Viitasaaren Musiikin aika – Avantgarden ilmansuuntia
        start_time: '2026-07-10T19:02:00+03:00'
        end_time: '2026-07-10T21:00:00+03:00'
        description: |
          Saksalais-espanjalainen barokkisoittimilla esiintyvä Continuum XXI -yhtye on tullut tunnetuksi barokin ajan ja uusimman musiikin yhdistämisestä. Konsertissa kuulemme kantaesityksenä Lauri Supposen yhtyeelle säveltämän teoksen lounas – southwest, joka pyrkii syventämään kokemusta lounas-ilmansuunnalle sijoittuvan maailman musiikista. Teos on Musiikin ajan, barcelonalaisen Mixtur-festivaalin ja Viron nykymusiikkikeskuksen yhteistilaus. Lisäksi ohjelmassa on musiikkia aina 1600-luvulta nykypäivään, useilta säveltäjiltä kuten Händel, Scelsi, Ligeti, Arroyo ja Monteverdi. Teosten väleissä kuullaan improvisoituja osuuksia. 4.7. Viitasaaren kirkossa tallennetun konsertin toimittaa Ainomaija Pennanen

          Esiintyjät:
          Continuum XXI:
          Moisés Maroto, nokkahuilu
          Marta Ramírez, barokkiviulu
          Marina Cabello, viola da gamba
          Dario Tamayo, cembalo / urut
          Ana Simón, lyömäsoittimet
          Alberto Arroyo, joht.

          Ohjelma:
          Georg Friedrich Händel: Trio Sonata in B flat major HWV 388
          Andante-Allegro-Larghetto-Allegro

          Lauri Supponen: lounas – southwest (kantaesitys)

          Alberto Arroyo: Qué extraño pájaro 

          György Ligeti: Continuum 

          Giacinto Scelsi/Continuum XXI: Improvisaatio 

          Nicola Matteis: ”Diverse bizzarrie sopra la Vecchia Sarabanda o pur Ciaccona”

          -väliaika- 

          Alberto Arroyo: collapse

          Claudio Monteverdi:Sinfonia e Ballo (teoksesta Ballo del Ingrate)

          Giacinto Scelsi: Quays

          György Ligeti (Alberto Arroyo/Moisés Maroto): Musica ricercata

          Kuva: © Klaus Gigga
