      - title: 'Tiedeykkönen: Miksi tekoäly estää tieteellistä ajattelua?'
        start_time: '2026-07-10T12:05:00+03:00'
        end_time: '2026-07-10T12:55:00+03:00'
        description: |-
          Mikä tiedettä ohjaa ja ottaako tekoäly kuljettajan paikan? Mitä käy asiantuntijuudelle tai oppimiselle?

          Asiantuntijoina yhteissuunnittelun professori Sampsa Hyysalo Aalto-yliopistosta sekä tieteen ja teknologian tutkimuksen professori Petri Ylikoski Helsingin yliopistosta.
          Toimittajana Aapo Laakso. 
          Äänisuunnittelijana Matias Puumala
      - title: 'Tiedetrippi: Kun ihminen lähtee tähtiin'
        start_time: '2026-07-10T13:00:00+03:00'
        end_time: '2026-07-10T13:30:00+03:00'
        description: |-
          Maailman rikkain ihminen Elon Musk haluaa valloittaa Mars-planeetan. Voi olla, että ihmiskunnan kannattaa pyrkiä Marsiin, mutta kannattaako ihmisen yrittää asua siellä – tai ylipäätään millään planeetalla? Tulevaisuuden ihmiskunta saattaa kukoistaa avaruudessa kelluvissa valtavissa megasatelliittikaupungeissa.
          Toimittaja Henry Tikkanen.
          (17.2.2025)
      - title: 'Radio 1:n iltapäivä: Kirjani tarina: Jarkko Volanen kertoo romaanistaan Vainovalkeat'
        start_time: '2026-07-10T13:30:00+03:00'
        end_time: '2026-07-10T15:00:00+03:00'
        description: |-
          Juontajana Tatu Tamminen. Kirjailija Jarkko Volasen Vainovalkeat-romaani kertoo millaista on elää ilman demokratiaa. Tarina sijoittuu Medaljonkikaupunkiin, jossa ihmisiä katoaa kaduilta ja kodeista. Kirjailija Jarkko Volanen toimittaja Jukka Kuosmasen vieraana. Ohjelma on uusinta helmikuulta 2026.
          N. klo 14.30 Tanssija, koreografi Sofia Ruija kertoo merkityksellisimmistä kulttuurikokemuksistaan ja 
          siitä mitä tanssi ja musiikki hänelle merkitsee. Toimittaja Marko Gustafsson.
