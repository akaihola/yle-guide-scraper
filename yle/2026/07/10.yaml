        start_time: '2026-07-10T17:05:00+03:00'
        end_time: '2026-07-10T17:30:00+03:00'
        description: |
          Oulun yliopiston historian professori Kari Alenius kertoo Liettuan värikkäästä historiasta. Liettua on ollut myös kuningaskunta ja merkittävä valtio historian kuluessa. Puola ja Liettua ovat olleet valtioliitossa ja maiden välille on syntynyt läheinen suhde. Liettualaiset tuntevat hyvin historiansa ja ovat siitä myös ylpeitä. Toimittajana on Jari Aula. (es. 2024)
