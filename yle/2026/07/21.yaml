      - title: 'Maarit Tastula - Yksi maailma, kaksi katsetta: Pekka Raudaskoski'
        start_time: '2026-07-21T10:00:00+03:00'
        end_time: '2026-07-21T10:55:55+03:00'
        description: |-
          Lääkäri Pekka Raudaskoski on elänyt lähes sata vuotta. Elämään ovat mahtuneet Suomen historian suuret käänteet: sodat ja pula-ajat. Pakkohuutokaupassa kotinsa menettäneet vanhemmat antoivat lapselle lahjan: he hautasivat oman katkeruutensa ja valoivat lapsiin uskon paremmasta tulevaisuudesta.

          Lääkärinä Raudaskoski näki Suomen silloin, kun sosiaaliturvaa ei vielä ollut. Hän hoiti potilaita, joille oli tehty laittomia abortteja, ennen kuin abortti laillistettiin, ja poliopotilaita, ennen kuin rokotteet keksittiin. Hän maksoi itse niiden köyhien lääkkeet, joiden rahat eivät riittäneet. Siksi  hänen onkin vaikea ymmärtää abortin vastustajia, rokotekriitikoita ja valtiovaltaa, joka nostaa terveyspalveluiden hintoja niin, että osalla kansasta ei ole niihin enää varaa. Sadan vuoden taisteluissa saavutettu sosiaaliturva uhkaa murentua. Raudaskoski herää öisin painajaisuniin  ja miettii, oliko taistelu turha?

          Toimittaja Maarit Tastula
