        start_time: '2026-07-21T20:35:00+03:00'
        end_time: '2026-07-21T21:00:00+03:00'
        description: |-
          Venäjän Ukrainaa vastaan käymä hyökkäyssota heijastuu myös Itämerelle, josta on tullut yksi Venäjän ja lännen vastakkainasettelun näyttämöistä. 

          Jännitteitä nostavat Venäjän varjolaivasto ja hybridioperaatioiden uhat. Epämääräiset tankkerit herättävät huolta ympäristökatastrofin vaarasta, mutta Itämeren antavaltioiden on yhä vaikea puuttua tankkeriliikenteeseen kansainvälisillä vesillä.

          Yksi mysteereistä on ollut meren pohjassa kulkevien Nord Stream -kaasuputkien räjäytys syksyllä 2022. Heinäkuun alussa Saksan syyttäjät nostivat tapauksesta sotarikossyytteen Italiassa pidätettyä ukrainalaismiestä vastaan. Tapaus aiheuttaa jännitteitä Ukrainan ja Saksan suhteisiin, sillä Saksan viranomaiset katsovat sen kohdistuneen Saksalle kriittisen tärkeään infrastruktuuriin. Venäjän johto sen sijaan yhä haaveilee kaasuputkien palauttamisesta käyttöön. Ohjelman ovat toimittaneet Teemu Juhola, Erja Tuomaala ja Heikki Heiskanen. Äänitarkkailijana on Marko Vierikko. Tunnusmusiikki: Petri Alanko, kuva: Tuuli Laukkanen/Yle.
