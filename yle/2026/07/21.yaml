        description: |
          Juontajana Jalmari Laine. Yle tarjoaa satavuotisjuhliensa kunniaksi yleisölle juhlavuoden aikana sata kotimaista elokuvaa, jotka yleisö on itse voinut valita. Suomen Elokuvasäätiön kulttuuriviennin suunnittelija Otto Suuronen keskustelee Jarmo Laitanevan kanssa kerran kuukaudessa otsikolla Elokuvat, jotka halusimme nähdä, aina yhdestä elokuvasta ja sen tyylilajista. Nyt puheenaiheena on palkittu Aki Kaurismäen Le Havre. Ohjelman ensilähetys oli 9.6.26.
          N. klo 14:30 Apteekkimuseon yleisötyön tuottaja Tuula Hänninen. kertoo millaisia kulttuurikokemuksia voi saada apteekista? Toimittajana on Juha Virtanen
