      - title: 'Radio 1:n iltapäivä: Elokuvat, jotka halusimme nähdä: Aki Kaurismäen Le Havre'
        start_time: '2026-07-21T13:30:00+03:00'
        end_time: '2026-07-21T15:00:00+03:00'
        description: |
          Juontajana Jalmari Laine. Yle tarjoaa satavuotisjuhliensa kunniaksi yleisölle juhlavuoden aikana sata kotimaista elokuvaa, jotka yleisö on itse voinut valita. Suomen Elokuvasäätiön kulttuuriviennin suunnittelija Otto Suuronen keskustelee Jarmo Laitanevan kanssa kerran kuukaudessa otsikolla Elokuvat, jotka halusimme nähdä, aina yhdestä elokuvasta ja sen tyylilajista. Nyt puheenaiheena on palkittu Aki Kaurismäen Le Havre. Ohjelman ensilähetys oli 9.6.26.
          N. klo 14:30 Apteekkimuseon yleisötyön tuottaja Tuula Hänninen. kertoo millaisia kulttuurikokemuksia voi saada apteekista? Toimittajana on Juha Virtanen
      - title: 'Kulttuuriykkönen: Miksi roolipelaaminen on suositumpaa kuin koskaan'
        start_time: '2026-07-21T15:00:00+03:00'
        end_time: '2026-07-21T15:58:00+03:00'
        description: |-
          Vasta vähän yli 50 vuotta vanha kulttuurin, taiteen ja viihteen laji on nyt suositumpi kuin koskaan. 
          Tänään keskustellaan siitä, miksi roolipelit ovat nyt niin suosittuja ja myös siitä, mitä peleistä kannattaa kulttuuria seuraavan ihmisen tietää, vaikka ei niitä itse pelaisikaan. 
          Eli mitä uutta ja kiinnostavaa roolipeleissä on nyt meneillään, ja miten nämä uudet käänteet kytkeytyvät laajempiin kulttuurin ilmiöihin. 
          Puhutaan lisäksi vielä kotimaisista roolipeleistä, Youtubesta, rahasta ja ruotsalaisesta firmasta, joka tekee pelejä isoista tunnetuista fantasia- ja scifi-maailmoista. 
          Keskustelemassa ovat tutkija ja pelikirjoittaja Jukka Särkijärvi, kirjailija Vehka Kurjenmiekka ja pelintekijä Juhana Pettersson. Ohjelman juontaa Jussi Ahlroth.
