        description: |
          Humperdinck: Tähtien tanssi näyt. Sinilintu (Bambergin sinfonikot/Karl Anton Rickenbacher).

          Pandolfi Mealli: Sonaatti viululle ja continuolle (Tähti) (Andrew Manze, viulu, ja Richard Egarr, cembalo).

          J. Haydn: Bonafeden aaria "Che mondo amabile" oopp. Il mondo della luna (Kuun maailma) (Thomas Quasthoff, bassobaritoni, ja Freiburgin barokkiork./Gottfried von der Goltz).

          Janacek: Kuuvalssi sarj. orkesterille oopperasta Herra Broucekin retket (BBC:n Skotlannin SO/Ilan Volkov).

          Linnavuori: Minä laulan sun iltasi tähtihin (Petteri Salomaa, baritoni, ja Ilmo Ranta, piano).

          Rautavaara: Stars swarming (Tähtien parvet) teoksesta A Tapestry of life (Elämän kuvakudos) (HKO/Leif Segerstam).

          Sibelius: Soluppgång (Auringonnousu) (Karita Mattila ja Birminghamin SO/Sakari Oramo).  

          Moberg: Soluppgång (Auringonnousu) teoksesta Tondikt n:o 1 (Sävelruno n:o 1) (Göteborgin SO/Johannes Gustavsson).

          Gade: Im Wald (Ars Nova Copenhagen/Paul Hillier). 

          Severac: Kylpijöitä auringonpaisteessa (Izumi Tateno, piano).

          R. Schumann: Rose, Meer und Sonne kok. Zwölf Gedichte aus Liebesfrühling (Anne Sofie von Otter, mezzosopraano, ja Bengt Forsberg, piano).

          Konsertin on laatinut Eva Tigerstedt
