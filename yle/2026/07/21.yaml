      - title: 'Klasariparatiisi: Kivisellä kamaralla'
        start_time: '2026-07-21T11:00:00+03:00'
        end_time: '2026-07-21T11:57:00+03:00'
        description: |
          Maa jolla astelemme tuntuisi olevan vakaa ja varma. 
          Mutta valtavat voimat muokkaavat jatkuvasti kalliota ja kiveä, siirtää mannerlaattoja, syöksee tulta.
          Utelias äänimatkailija tepastelee maanpinnalla ja kuulostelee, josko musiikista voisi löytää kivien ja maakerrostumien värejä ja muodostelmia.

          Eva Tigerstedt tieteen, taiteen ja musiikin risteyksessä, äänisuunnittelijana Anders Wiksten.

          Ohjelma on uusinta vuodelta 2020.

          Ohjelmassa kuullaan otteita seuraavista teoksista:

          Magnus Lindberg: Related rocks kahdelle pianolle, kahdelle lyömäsoittajalle ja elektroniikalle (Ictus-yhtye).

          Mathew Whittall: the return of light  (Helsingin kamarikuoro ja Tapiola Sinfonietta/Nils Schweckendiek).

          Jean Sibelius: Sinfonia no 5 (Birminghamin sinfoniaorkesteri/Sakari Oramo).

          Olivier Messiaen: Kanjoneista tähtiin (Roger Muraro, piano, ja Ranskan radion filharmoninen orkesteri/Myung-Whun Chung). 

          Takashi Yoshimatsu:  Konsertto sopraanosaksofonille ja orkesterille (Nobuya Sugawa, (opraanosaksofoni, ja BBC:n filharmoninen orkesteri/Yutaka Sado).

          Anna Thorvaldsdottir: Metacosmos (Helsingin kaupunginorkesteri/ Peter Rundel). 

          Kaija Saariaho:  Six Japanese gardens lyömäsoittimille ja elektroniikalle (Florent Jodelet, lyömäsoittimet).

          Akira Nishimura: Kala (Keiko Abe, marimba ja Kroumata-lyömäsoitinyhtye). 
