      - title: 'Asekauppiaat: Mitä varten aseita oikeasti ostetaan?'
        start_time: '2026-07-06T19:02:00+03:00'
        end_time: '2026-07-06T19:50:00+03:00'
        description: |-
          Valtion aseisiin käyttämä raha ei tule erillisestä universumista, vaan samasta kukkarosta, josta maksetaan myös peruskoulut ja synnytysosastot. On kuitenkin itsestään selvää, että valtioilla on armeijat, joille ostetaan aseita - aina uusia ja parempia. Ja jos tämän pohjalta kysyy miksi, paljastuu ideologia nimeltä militarismi.

          Jakson asiantuntijavieraana: poliittisen historian tutkija Noora Kotilainen Helsingin yliopistosta. Ampumaradalla Ippiä opastaa Osuvan kouluttaja Mikael Immonen.

          (v. 2024)
      - title: Mannerheimin agentti
