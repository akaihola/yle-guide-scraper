      - title: Mannerheimin agentti
        start_time: '2026-07-06T20:05:00+03:00'
        end_time: '2026-07-06T20:25:00+03:00'
        description: |
          Jakso 6/10: Tahvanainen koulutetaan radistiksi.
          Tahvanaisen kirjan mukaan hänet koulutettiin radistiksi Saksassa, jotta yhteydenpito Neuvostoliiton johtoon olisi helpompaa. Olisiko yhteydenpito radioteitse ollut teknisesti mahdollista Helsingistä Moskovaan 1930-luvulla?

          Koskinen keskustelee radiotekniikan asiantuntijoiden kanssa sen aikaisen radiotekniikan mahdollisuuksista. 
      - title: 'Hanna Tikanderin toiset todellisuudet: “Kun työskentelen henkimaailman kanssa, en ole köyhä enkä kipee”'
        start_time: '2026-07-06T20:25:00+03:00'
        end_time: '2026-07-06T20:46:00+03:00'
        description: |
          Artturi sanoo olevansa henkiparannusenergian välittäjä ja transsimeedio. Vaipuessaan transsitilan hän kertoo välittävänsä viestejä henkimaailmasta. 
          Artturi kuvailee, että transsissa ollessaan hän on kuin toisessa huoneessa, eikä muista jälkikäteen, mitä viestejä hän on välittänyt. 
          Vaikka hän sanoo työskentelevänsä välittäjänä näkyvän ja näkymättömän maailman välillä, valtaa hänet silti välillä epäilys, voiko se kaikki olla totta.
