      - title: 'Elävä historia: Irtolaisia ja vittuvelkaisia -  kun Suomea siivottiin sopeutumattomista'
        start_time: '2026-07-06T12:05:00+03:00'
        end_time: '2026-07-06T12:55:00+03:00'
        description: |-
          Millaisesta Suomesta 1900-luvun työlaitokset kertovat, millaisia kohtaloita suljetut laitokset kätkivät sisäänsä ja miten niissä elettiin? Ojentuiko isänmaamme? Asiantuntijana työlaitosten toimintaan perehtynyt historiantutkija ja kriminologian dosentti Katariina Parhi.


          Toimittaja on Leena Peltokangas ja äänisuunnittelija Panu Willman.

          Lukijoina Antti Palomaa ja Kirsi Matson-Mäkelä. 
      - title: 'Tiedetrippi: Miekkapyhimys Mushashin opetukset'
        start_time: '2026-07-06T13:00:00+03:00'
        end_time: '2026-07-06T13:30:00+03:00'
        description: |-
          1600-luvulla Japanissa vaikuttanut Miyamoto Musashi on luultavasti historian tunnetuin samurai. Legendojen mukaan Musashi oli voittamaton miekkamies ja nykyään hän on suuresti arvostettu japanilainen miekkapyhimys eli kensei. Musashi ei kuitenkaan jäänyt historiaan vain taitojensa vuoksi vaan siksi, että hän kirjoitti oppimansa jälkipolville muistiin. Toimittajana Henry Tikkanen.
          (20.1.2025)
      - title: 'Radio 1:n iltapäivä: Maanantaimuseo - Suomen ilmailumuseo'
        start_time: '2026-07-06T13:30:00+03:00'
        end_time: '2026-07-06T15:00:00+03:00'
        description: |-
          Juontajana Jarmo Laitaneva. Monesti museoiden ovet ovat kiinni maanantaisin, mutta me vierailemme museossa juuri näin viikon ensimmäisenä päivänä. Mieti museota, jonka esineet ovat kymmenien metrien kokoisia. Sellaisia löytyy Suomen ilmailumuseosta, joka on nykyisessä muodossaan enää vähän aikaa avoinna, sillä uusi nousee hyvää vauhtia ihan naapuriin. Marko Miettisen haastateltavana on museojohtaja Pia Illikainen n. klo 14. 
      - title: 'Kulttuuriykkönen: Unelmatehdas Kulosaaressa - Fennada-Filmin tarina '
        start_time: '2026-07-06T15:00:00+03:00'
        end_time: '2026-07-06T15:58:00+03:00'
        description: |
          Osa suomalaista Hollywoodia sijaitsi vuosikausien ajan Helsingin Kulosaaressa. Siellä saattoi törmätä kuvausryhmiin ja koko kansan rakastamiin filmitähtiin ja jopa vapaana tallustavaan sirkuskarhuun. Usea kotimainen elokuva filmattiin siellä vanhaan tennishalliin rakennetussa studiossa. Ulkoapäin rakennus näytti ränsistyneeltä ja sortumaisillaan olevalta. Sisällä tehtiin unelmia. Laajaan arkisto- ja muistiaineistoon perustuva Unelmatehdas Kulosaaressa. Fennada-Filmi Oy:n tarina on kiehtova kertomus sodanjälkeisestä kotimaisesta elokuvasta ja elokuvakulttuurista. Millä tavoin rahaa tahkottiin Suomessa elokuva-alalla? Millaiset aiheet olivat suosiossa? Miten suomalainen elokuva löysi katsojia ulkomailta?

          Haastateltavina ovat elokuvatutkija Juha Seitajärvi Taide- ja kulttuurivirastosta sekä mediahistorian dosentti Kimmo Laine Turun yliopistosta.

          Ohjelman juontaa Nicklas Wancke.
