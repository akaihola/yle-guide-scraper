      - title: 'Radio 1:n iltapäivä: Maanantaimuseo - Suomen ilmailumuseo'
        start_time: '2026-07-06T13:30:00+03:00'
        end_time: '2026-07-06T15:00:00+03:00'
        description: |-
          Juontajana Jarmo Laitaneva. Monesti museoiden ovet ovat kiinni maanantaisin, mutta me vierailemme museossa juuri näin viikon ensimmäisenä päivänä. Mieti museota, jonka esineet ovat kymmenien metrien kokoisia. Sellaisia löytyy Suomen ilmailumuseosta, joka on nykyisessä muodossaan enää vähän aikaa avoinna, sillä uusi nousee hyvää vauhtia ihan naapuriin. Marko Miettisen haastateltavana on museojohtaja Pia Illikainen n. klo 14. 
