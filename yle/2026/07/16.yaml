        end_time: '2026-07-16T20:57:00+03:00'
        description: |-
          Tuuli Saksala ja Kare Eskola jatkavat suoraa lähetystä Kaustiselta. Ohjelmassa festivaalihuumaa, nauhoitteita festivaalin keikoilta ja Näppäreitä. Vieraina Nordik Tree, Johanna Juhola, Oona Sinkko sekä Maria Kalaniemi ja Pekko Käppi, jotka kertovat Kalevala-duoprojektistaan. Lähetyksessä selviää myös, miksi Kaustinen on niin tärkeä festivaali.
      - title: 'Viihdekuunnelma: Emma'
        start_time: '2026-07-16T22:31:00+03:00'
        end_time: '2026-07-16T22:59:00+03:00'
        description: |
          Osa 6/8 Tunnustuksia
          Viimein pariskunta Westonit pääsevät järjestämään omat tanssiaisensa ja Emma tapaa jälleen mieluisan ystävänsä Frank Churchillin. Harriet Smithin iltaa Westoneilla uhkaa karu kohtalo, mutta onneksi herra Knightley on paikalla. Samoin myöhemmin onneksi paikalla on Frank Churchill, kun Harriet on jälleen pinteessä. Kaikkien koettelemustensa jälkeen Harriet tunnustaa Emmalle, että hänen ihailuillaan on uusi kohde.
