      - title: 'Radio 1:n iltapäivä: Paljon onnea satavuotias Suomijazz'
        start_time: '2026-07-16T13:30:00+03:00'
        end_time: '2026-07-16T15:00:00+03:00'
        description: |-
          Juontajana Tatu Tamminen. Tänä vuonna tulee kuluneeksi sata vuotta siitä, kun jazz symbolisesti rantautui höyrylaiva Andanian mukana Suomeen. Eri puolilla maata on runsaasti konsertteja ja tapahtumia, jotka juhlistavat merkkivuottammin tänä kesänä julkaistiin myös verkkosivusto, jossa esitellään suomalaisen jazzin tarinaa. Suomijazzin syntymäpäivähaastattelussa on Jazzliiton puheenjohtaja, saksofonisti, musiikin tohtori Jari Perkiömäki. Kati Turtola haastattelee. Ohjelma on uusinta kesäkuulta.
      - title: 'Kulttuuriykkönen: Perinteet käsissä Kaustisen kansanmusiikkifestivaaleilla'
        start_time: '2026-07-16T15:00:00+03:00'
        end_time: '2026-07-16T15:58:00+03:00'
        description: |-
          Suorassa lähetyksessä Kaustiselta syvennytään kansanmusiikkifestivaalin teemaan perinteet käsissä. Luvassa on hyviä ja huonoja uutisia. Soitinrakentajat alkavat olla uhanalainen laji. Kansallispukujen rintamalta sen sijaan kuuluu hyviä uutisia. Nuoret ja miehet ovat tarttuneet neulaan ja lankaan. Kansallispukupoliisit ovat rentoutuneet. Torstaina Kaustisella järjestetään maailman suurin perinnepukujen ja -asujen kokoontuminen. Toimittajana on Minna Joenniemi.  
