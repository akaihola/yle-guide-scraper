      - title: Tuuli Saksalan keidas
        start_time: '2026-07-16T17:35:00+03:00'
        end_time: '2026-07-16T18:25:00+03:00'
        description: |-
          Keidas lähetetään suorana Kaustisen kansanmusiikkijuhlilta ja Tuuli Saksala saa juontajaparikseen Kare Eskolan. Ohjelmassa festivaalihuumaa ja musiikkia festivaalin konserteista. Vieraina romanimusiikin ikoni Hilja Grönfors sekä "koodinmurtaja" Roope Aarnio, joka esittelee 1700-luvun Rinta-Nikkolan arvoituksellista nuottikirjaa ja soittaa esimerkkejä. Mukana menossa myös Maria Kalaniemen ja Pekko Käpin Kalevala-duoprojekti.
