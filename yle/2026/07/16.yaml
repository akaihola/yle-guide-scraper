      - title: 'Maailma tarinoina: Interstellar ja ihmisen paikka maailmankaikkeudessa'
        start_time: '2026-07-16T12:05:00+03:00'
        end_time: '2026-07-16T13:00:00+03:00'
        description: |-
          Christopher Nolanin Interstellar (2014) on scifi-spektaakkeli, jossa avaruuden ja ajan ulottuvuudet, suhteellisuusteoria ja musta aukko limittyvät ympäristökatastrofiin, sekulaariin pelastuskertomukseen sekä kosmisen yksinäisyyden ja yhteyden kaipuun kuvaukseen. Elokuva sysää pohtimaan, onko ihmisen pelastautuminen toiselle planeetalle parempi pitää vain scifi-tarinana? Voiko Interstellaria tulkita simulaatioteorian valossa? Miten Maan ulkopuolisen elämän mahdollisuus vaikuttaa maailmankatsomukseen ja ihmisen rooliin osana maailmankaikkeutta? 
          Avaruudellisella ajatusmatkalla Marja Vehkasen kanssa ovat astrofyysikko Sissi Enestam ja teologian tohtori Vesa Nissinen.
      - title: 'Tiedetrippi: Kuka keksi työn?'
        start_time: '2026-07-16T13:00:00+03:00'
        end_time: '2026-07-16T13:30:00+03:00'
        description: |-
          Metsästäjä-keräilijät hankkivat ravintonsa suoraan luonnosta metsästämällä, kalastamalla ja keräilemällä. Meidän lajimme, homo sapiens eli tällä tavalla satojen tuhansien vuosien ajan. Tämä tarkoittaa sitä, että suurimman osan lajimme olemassaolon ajasta työn käsite ja vaade on ollut hyvin erilainen kuin se on nykypäivänä. Miten työ siis keksittiin?
          (23.6.2025)
      - title: 'Radio 1:n iltapäivä: Paljon onnea satavuotias Suomijazz'
        start_time: '2026-07-16T13:30:00+03:00'
        end_time: '2026-07-16T15:00:00+03:00'
        description: |
          Juontajana Joni Timonen. Tänä vuonna tulee kuluneeksi sata vuotta siitä, kun jazz symbolisesti rantautui höyrylaiva Andanian mukana Suomeen. Eri puolilla maata on runsaasti konsertteja ja tapahtumia, jotka juhlistavat merkkivuottammin tänä kesänä julkaistiin myös verkkosivusto, jossa esitellään suomalaisen jazzin tarinaa. Suomijazzin syntymäpäivähaastattelussa on Jazzliiton puheenjohtaja, saksofonisti, musiikin tohtori Jari Perkiömäki. Kati Turtola haastattelee. Haastattelu on uusinta kesäkuulta.

          N. klo 14.30: Harmonikansoittaja ja kurkkulaulaja Antti Paalaseen teki suuren vaikutuksen teatteriesitys nimeltä “Viimeinen aamutähti” Kokkolassa vuonna 2011.Toimittajana Inari Tilli.
      - title: 'Kulttuuriykkönen: Perinteet käsissä Kaustisen kansanmusiikkifestivaaleilla'
        start_time: '2026-07-16T15:00:00+03:00'
        end_time: '2026-07-16T15:58:00+03:00'
        description: |-
          Suorassa lähetyksessä Kaustiselta syvennytään kansanmusiikkifestivaalin teemaan perinne käsissä. Luvassa on hyviä ja huonoja uutisia. Soitinrakentajat alkavat olla uhanalainen laji. Mutta kansallispuvut kiinnostavat nyt jälleen nuoria ja myös miehiä. Kansallispukupoliisit ovat rentoutuneet. Torstaina Kaustisella järjestetään suuri perinnepukujen ja -asujen kulkue. Ohjelmassa käsillä tekemisen merkityksestä keskustelevat soitinrakentaja Juhana Nyrhinen ja kansallispukuklinikan asiantuntijat Ritva Hänninen ja Helena Antikainen. Soitinrakentajamestari  Rauno Nieminen kommentoi myös perinnesoitinten tulevaisuutta. Toimittajana on Minna Joenniemi.  
