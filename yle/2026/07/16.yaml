      - title: 'Elokuvaohjaaja Selma Vilhunen: "Haluan kertoa tarinoita siitä, että olemme täällä yksilöitä, mutta osa jotain paljon suurempaa kokonaisuutta"'
        start_time: '2026-07-16T13:30:00+03:00'
        end_time: '2026-07-16T15:00:00+03:00'
        description: |-
          Juontajana Tatu Tamminen. Elokuvaohjaaja Selma Vilhusesta sanotaan, että hän on yksi kotimaisen elokuvataiteen kirkkaimmista nimistä. Viime talvena suomalaisohjaaja sai osakseen runsaasti suitsutusta. Hänen ohjaamansa ja Ilona Ahdin käsikirjoittama laulaja Kaija Koosta kertova elokuva "Kaunis, rietas, onnellinen" on kerännyt kehuja sekä yleisötä että kriitikoilta. Selma Vilhunen oli Miia Lahden haastattelussa Radio 1:n iltapäivässä  maaliskuussa.
