      - title: Tuuli Saksalan keidas
        start_time: '2026-07-16T17:35:00+03:00'
        end_time: '2026-07-16T18:25:00+03:00'
        description: |-
          Keidas lähetetään suorana Kaustisen kansanmusiikkijuhlilta ja Tuuli Saksala saa juontajaparikseen Kare Eskolan. Ohjelmassa festivaalihuumaa ja musiikkia festivaali konserteista. Vieraina romanimusiikin ikoni Hilja Grönfors sekä "koodinmurtaja" Roope Aarnio. Jälkimmäinen esittelee 1700-luvun Rinta-Nikkolan arvoituksellista nuottikirjaa ja soittaa esimerkkejä. Mukana menossa myös Maria Kalaniemen ja Pekko Käpin Kalevala-duoprojekti.
      - title: 'Poiminta Radio 1:n iltapäivästä '
        start_time: '2026-07-16T18:25:00+03:00'
        end_time: '2026-07-16T18:35:00+03:00'
        description: |2-

          Kesälomien aikaan moni kerää kulttuurikokemuksia kesätapahtumista ja kesämatkoilta. Minkälaisia kulttuurikokemuskia voi saada Turun Forum Marinumissa eli merenkulkua käsittelevässä museossa?
          Haastateltavana on museolehtori Noora Rummukainen ja toimittajana on Juha Virtanen. (Ensilähetys 14.6.26)
