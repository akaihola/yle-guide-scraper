      - title: 'Valon ja pimeyden välissä: Baijerin radiokuoro ja Berliinin Akademie für Alte Musik -yhtye esiintyvät Gluck-festivaalilla'
        start_time: '2026-07-01T19:02:00+03:00'
        end_time: '2026-07-01T20:28:00+03:00'
        description: |-
          Gluck-festivaalin, Baijerin radiokuoron ja Berliinin Akademie für Alte Musik -yhtyeen yhteisessä konsertissa soi musiikki lähes 400 vuoden ajalta. 
          Christoph Willibald Gluckin sovitus psalmista 130, "De profundis", joka on yksi hänen harvoista uskonnollisista laulusävellyksistään, on kehystetty Johann Michael Bachin ja Johann Sebastian Bachin kantaateilla ja moteteilla. Ranskalais-brittiläisen sopraanon ja säveltäjän Héloïse Wernerin uuden teoksen kantaesitys viitoittaa tietä nykypäivään.
