        description: |-
          Etsiessään Olhaa sairaaloista ja klinikoilta, Nora alkaa ymmärtää avuttomuutensa ja vastuunsa. Kun Olha lopulta löytää tiensä hotellille, Nora saa uuden mahdollisuuden auttaa. Samaan aikaan sodan uhka kasvaa Kiovassa, ja Nora joutuu miettimään omaa rooliaan ja motiivejaan.
          (ensies. v. 2025)
      - title: Mannerheimin agentti
        start_time: '2026-07-01T23:20:00+03:00'
        end_time: '2026-07-01T23:40:00+03:00'
        description: |
          Jakso 5/10: Dimoisin tarina.
          Vuonna 1973 Tahvanainen julkaisi toisen romaaninsa, jonka päähenkilöön hän oli viitannut Erikoistehtävä-kirjansa sivulauseessa. Kyseessä oli Dimitri Dimitrejeff. joka oli kirjan mukaan ollut Leninin uskottu. Koskinen selvittää asiantuntijoiden kanssa Dimoisina tunnetun miehen tarinaa Venäjän vallankumouksen pyörteissä. Mitä Lenin sanoi Suomesta kuolinvuoteellaan?
