      - title: 12 diktaattoria.Valtionpää Francisco Franco
        start_time: '2026-07-01T12:05:00+03:00'
        end_time: '2026-07-01T12:50:00+03:00'
        description: |-
          Kenraali Francisco Franco, Espanjan generalissimo vuodesta 1939 vuoteen 1975, on tietyllä tavalla unohdettu tyranni, sillä hänen tekonsa jäävät Adolf Hitlerin ja Josif Stalinin varjoon. Hän kuitenkin oli yksi historian todellisista hirviöistä. Tämä fasistinen sotaherra pääsi Hitlerin avittamana valtaan 1930-luvulla julman sisällissodan kautta ja jatkoi Espanjan siviiliväestön terrorisointia kuolemaansa asti. Kauheita rikoksia ympäröi yhä hiljaisuus, kertoo tietokirjailija, filosofi Leif Sundström. Toimittajana Raimo Tyykiluoto.
          (v. 2018)
      - title: 'Radio 1:n iltapäivä: Mikä on Hauhon henki? - Hauhon musiikkijuhlien Mikko Ivars ja Olli Kilpiö vieraina'
        start_time: '2026-07-01T13:30:00+03:00'
        end_time: '2026-07-01T15:00:00+03:00'
        description: |
          Jarmo Laitaneva juontaa. Suomessa on lukuisia kesän musiikkitapahtumia, jotka ovat lähteneet innosta ja ilosta soittaa Suomen suvessa. Hauhon musiikkijuhlat syntyivät kahden ammattimuusikon halusta perustaa omalle kesäpaikkakunnalle, Hauholle oma musiikkifestivaali. Nyt RSO:n muusikot, sellisti Mikko Ivars ja alttoviulisti Olli Kilpiö johtavat jo yli kaksikymmentävuotiasta kesäkonserttisarjaa, joka on vakiinnuttanut paikkansa suomalaisella kesäkonserttitarjottimella. Onko Hauholla erityinen henki, kuten niin monella muulla kesän musiikkitapahtumalla kerrotaan olevan? Joni Timonen haastattelee. N. klo 14:30  Kalevala-seuran toiminnanjohtaja, dosentti Niina Hämäläinen kertoo erityisestä kulttuurielämyksestään. Toim. Marja Vehkanen. (Uusinta 21.4.26.)
      - title: 'Kulttuuriykkönen: Mitä Suomi-muodissa tapahtuu?'
        start_time: '2026-07-01T15:00:00+03:00'
        end_time: '2026-07-01T15:58:00+03:00'
        description: |-
          Muodin kansainvälinen Fashion in Helsinki-päätapahtuma oli tänä vuonna Seurasaaressa, jossa kymmenen nuoren suunnittelijan mallistot esiteltiin suomalaisen kulttuurihistorian ja uuden muotitaiteen yhdistävässä tapahtumassa. Suomeen on syntynyt uusi ateljee-muodin toimintamalli ja useat Aallosta valmistuneet nuoret suunnittelijat ovat tästä hyvä esimerkki. Sini Saavala on monien artistien, vaikuttajien ja muodin alan toimijoiden luottovaatettaja. Millä tavalla muotitaide ja käyttövaate eroavat toisistaan? Mitä muodin saralla menestymiseen tarvitaan nyt? Mikä on suomalaisen muodin kilpailuvaltti ulkomailla?

          Ohjelman vieraina ovat taiteellinen johtaja Minttu Vesala ja muotisuunnittelija Sini Saavala.

          Ohjelman juontaa Pia-Maria Lehtola.


          Rentoa puhetta, kiinnostavimmat vieraat ja kulttuurin ajankohtaisaiheet debatoitavina. Suorana maanantaista perjantaihin.
