      - title: Bach, Bach ja Bach – Baijerin radiokuoro ja Akademie für Alte Musik esiintyvät
        start_time: '2026-07-01T19:02:00+03:00'
        end_time: '2026-07-01T21:00:00+03:00'
        description: |-
          Sukupolvesta toiseen Bachit muovasivat Keski-Saksan musiikkimaisemaa urkureina, kanttoreina, kaupunginmuusikoina ja hovitrumpetisteina.Tuomaskirkon kanttori Johann Sebastian sävelsi musiikkia ikuisuudelle, hänen poikansa lähtivät maailmalle ja löysivät paikkansa kaupungeissa kuten Hampuri, Lontoo ja Berliini. Baijerin radiokuoro esittää taiteellisen johtajansa Peter Dijkstran ja Akademie für Alte Musik -orkesterin kanssa kolmen Bach-sukupolven mestariteoksia.

          Esiintyjät: 

          Baijerin radiokuoro
          Akademie für Alte Musik, Berlin
          Peter Dijkstra, kapellimestari

          Diana Fischer, sopraano
          Veronika Sammer, mezzo-sopraano	 
          Nikolaus Pfannkuch, tenori
          Andreas Burkhart, baritoni

          Kuvassa: Baijerin radiokuoro © Astrid Ackermann
