      - title: 'Havaintoja muutoksesta: Unelma ruuduttomasta lomasta '
        start_time: '2026-07-01T10:00:00+03:00'
        end_time: '2026-07-01T10:50:00+03:00'
        description: |
          Arkena ruuduista on mahdollista pitää pieniä taukoja, mutta kokonaisvaltainen vapaus ruuduista voi olla mahdotonta. Lomalla tilanne voi olla toisin. Moni pitääkin lomalla some-ja digipaastoa. Mitä ruuduton loma voi antaa? Miksi loma on hyvä aika pohtia suhdetta älypuhelimeen ja ruutuihin? 
          Toimittaja Satu Kivelä etsii vastauksia yhdessä kasvatustieteen professori Nina Sajaniemen ja kokeneen varhaiskasvatuksen opettajan ja lapsiperheitä kohtaavien ammattilaisten kouluttaja Taina Sainion kanssa.
