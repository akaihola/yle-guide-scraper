      - title: 'Tiedetrippi: Fermin paradoksi '
        start_time: '2026-07-14T13:00:00+03:00'
        end_time: '2026-07-14T13:30:00+03:00'
        description: |-
          Missä kaikki ovat? Tämän avaruuden muukalaisiin liittyvän kysymyksen esitti Nobel-palkittu huippufyysikko Enrico Fermi vuonna 1950. Fermin paradoksina tunnettu kysymys pohtii vastausta siihen, miksi ihmiskunta ei ole havainnut muuta älyllistä elämää maailmankaikkeudessa, jos sellaista on olemassa? Vai onko älyllisen elämän synty, kehitys ja selviytyminen paljon harvinaisempaa kuin kuvittelemme?
          (9.6.2025)
      - title: 'Radio 1:n iltapäivä: Näyttelijä, äänikirjojen lukija Leena Pöysti - tarinankerronta aaltoilee ja se pitää kuulua luennasta'
        start_time: '2026-07-14T13:30:00+03:00'
        end_time: '2026-07-14T15:00:00+03:00'
        description: |-
          Juontajana Joni Timonen. Näyttelijä Leena Pöysti on mukana monessa kotimaisessa tv-sarjassa. Työssään Pöystisanoo pitävänsä erityisesti näyttelemisen ryhmätyöluonteesta. Yksi Leena  Pöystin töistä, Sekunnit-draamasarjan kaksi kautta, on katsottavissa Yle Areenassa. Sarja kertoo onnettomuustutkintakeskuksen työstä. Kirjojen lukemista rakastava näyttelijä on myös yksi Suomen tunnetuimmista äänikirjojen lukijoista. Leena Pöysti oli Jarmo Laitanevan studiovieraana huhtikuussa. 
           N. 14:30 kesälomien aikaan moni mietti matkailukohteita. Mitä erikoista nähtävää on Turun Forum Marinumissa
          eli merenkulkua käsittelevässä museossa?
          Haastatetlavana on museolehtori Noora Rummukainen ja toimittajana on Juha Virtanen
      - title: 'Kulttuuriykkönen: Raimo Goyarrola - lääketieteen tohtori, katolinen piispa ja maahanmuuttaja '
        start_time: '2026-07-14T15:00:00+03:00'
        end_time: '2026-07-14T15:58:00+03:00'
        description: |
          Espanjassa syntynyt Ramón Goyarrola muutti Suomeen ja otti nimekseen Raimo. Tänään hän johtaa Suomen katolista kirkkoa piispana – maailman suurimman kristillisen kirkon edustajana maassa, jossa katolilaiset muodostavat pienen vähemmistön. Mikä toi hänet juuri Suomeen, ja millaista on rakentaa katolista kirkkoa luterilaisessa maassa?

          Kesäkuussa Goyarrola väitteli lääketieteen tohtoriksi tutkimuksellaan saattohoidossa olevien potilaiden hengellisistä tarpeista. Miksi lääkäriksi kouluttautunut mies koki kutsun pappeuteen? Miten lääketieteellinen ajattelu ja usko kohtaavat ihmisen elämän viimeisissä kysymyksissä? Miten uskonto ja tiede sopivat saman kaavun sisään?

          Katolisessa kirkossa pappeus merkitsee elinikäistä sitoutumista: selibaattia, kuuliaisuutta kirkolle ja vihkimystä, joka on varattu miehille. Miten piispa itse ymmärtää kutsumuksen, ja mitä se vaatii ihmiseltä?

          Entä mikä oikeastaan erottaa katolisen kirkon luterilaisesta kirkosta? Mitä tarkoittavat kirkon vahva hierarkia, paavin asema ja vuosituhantinen traditio nykyajan Suomessa? 

          Keskustelemassa ovat piispa Raimo Goyarrola ja tutkija, tietokirjailija Emil Anton. Toimittajana Ville Talola.
