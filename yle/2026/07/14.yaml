      - title: 'Klasariparatiisi: Ohutta yläpilveä'
        start_time: '2026-07-14T11:00:00+03:00'
        end_time: '2026-07-14T11:57:00+03:00'
        description: |
          Ilmaa hengitämme ja ilma pitää meidät hengissä. Ilmakehä suojaa maapallon elämää.
          Värähtelevistä ilmapatsaista voi myös tehdä taidetta, jota kutsutaan musiikiksi.
          Ilmaa ihmettelee utelias äänimatkailija Eva Tigerstedt.
          Uusinta vuodelta 2017.

          Ohjelmassa kuullaan otteita seuraavista teoksista:

          Jorrit Tamminga/Erik Bosgraaf: Dialogue I 
          (Erik Bosgraaf, nokkahuilut, Jorrit Tamminga, elektroniikka).

          Orlando di Lasso: Veni creator spiritus (Die Singphoniker).

          Jean-Féry Rebel: Les Elemens, osat Kaaos, Ilma ja Satakielet
          (Les musiciens du Louvre/Marc Minkowski).

          Jean Sibelius: Myrsky, sarja orkesterille n:o 1, osa Myrsky
          (Helsingin kaupunginorkesteri/Leif Segerstam).

          Jean Sibelius: Luonnotar Op.70
          (Soile Isokoski, sopraano, ja Göteborgin sinfoniaorkesteri/Neeme Järvi).

          Kaija Saariaho: Couleurs du vent
          (Camilla Hoitenga, alttohuilu).

          Rebecca Saunders: Caerulean bassoklarinetille 
          (Carl Rosman, bassoklarinetti).

          György Ligeti: Kymmenen kappaletta puhallinkvintetille, osa Molto sostenuto e calmo
          (Berliinin filharmoninen puhallinkvintetti).

          Claude Debussy: Nocturnes, osa Nuages
          (Clevelandin orkesteri/ Pierre Boulez).

          W. A. Mozart: Serenadi B-duuri KV361 "Gran Partita", osa Adagio
          (18. vuosisadan orkesteri/Frans Brueggen).
