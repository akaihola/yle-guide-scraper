      - title: Maailmanpolitiikan arkipäivää
        start_time: '2026-07-14T20:35:00+03:00'
        end_time: '2026-07-14T21:00:00+03:00'
        description: |
          Yhdysvaltain presidentti Donald Trump on tehnyt sotilasliitto Naton huippukokouksista dramaattisia näytöksiä. 

          Tämän viikon Ankaran-huippukokoukseen Trump toi mielipahansa Grönlannin kontrollista ja liittolaisten haluttomuudesta osallistua sotaan Irania vastaan. Trump myös uhkasi katkaista kauppasuhteet Espanjaan, joka ei ole innokas nostamaan puolustusmenojaan.

          Eurooppalaiset liittolaiset saivat jännittää Trumpin mielialaa mutta saattoivat lopulta huokaista helpotuksesta, kun kokous päättyi sopuisissa tunnelmissa. 

          Trumpin äkkipikainen politiikka pakottaa eurooppalaisia Nato-maita ottamaan aiempaa enemmän vastuuta omasta puolustuksestaan. Maailmanpolitiikan arkipäivää -ohjelma pohtii, mitä Trump Natolta haluaa. Ohjelman ovat toimittaneet Maria Stenroos, Rain Kooli ja Heikki Heiskanen. Äänitarkkailijana on Katri Koivula. Tunnusmusiikki: Petri Alanko, kuva: Tuuli Laukkanen/Yle. 
