        description: |+
          Fröhlich (sov. Andresen): Rondo neljälle käyrätorvelle (Tanskan kuninkaallisen orkesterin vaskiyhtye).

          J. Haydn: Allegro molto jousikvartetosta n:o 8 (John Williams, kitara, Alan Loveday, viulu, Cecil Aronowitz, alttoviulu, Amaryllis Fleming, sello). 

          Grieg: Jeg elsker dig (Rakastan sinua) kokoelmasta Hjertets melodier (Håkan Hagegård, baritoni, ja Warren Jones, piano).

          Raitio: Kukkien kuningatar (Tapiola Sinfonietta/Tuomas Hannikainen).

          Kaski: Preludi Ges-duuri pianolle (Janne Mertanen, piano). 

          Alfvén: Vallflickans dans (Paimentytön tanssi) balettisarj. Bergakungen (Vuorenkuningas) (Ruotsin radion SO/Esa-Pekka Salonen).

          Bizet: Carmenin habanera "L'amour est un oiseau rebelle" oopp. Carmen (Grace Bumbry, mezzosopraano, sekä Pariisin kansallisoopperan kuoro ja ork./Rafael Frühbeck de Burgos).

          Chausson: Pièce (Kappale) (Lawrence Power, alttoviulu, ja Simon Crawford-Phillips, piano).

          Séverac: Valse romantique sarj. En vacances (Lomalla) (Lily Laskine, harppu).

          Rahmaninov: Preludi B-duuri (Conrad Tao, piano).

          Koch (sov. Morberg): Kesälaulu (GöteborgsMusiken/Jerker Johansson).

