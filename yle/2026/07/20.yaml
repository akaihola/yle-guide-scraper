      - title: 'Faijan vika valhe: Kun faija lähti muukalaislegioonaan'
        start_time: '2026-07-20T17:05:00+03:00'
        end_time: '2026-07-20T17:30:00+03:00'
        description: |
          Elokuussa 2020 Axa Fahlerin tytär Fredrika kysyy, mitä Axa tietää isoisästään. Kysymys saa Axan pohtimaan omaa faijaansa, patologista valehtelijaa ja toilailijaa, joka kertoi olevansa milloin supersankari, milloin suuri keksijä. Jostain syystä faija ei kuitenkaan koskaan puhunut isästään. Axa kirjoittaa isoisänsä ja tämän isän nimet Googleen ja hämmästyy. Kansallisarkistosta tietoa vasta löytyykin. Näin alkaa kahden vuoden tutkimusmatka, se kaikkein uskomattomin tarina, jota faija ei koskaan kertonut.
      - title: Yksi on hyvää seuraa
