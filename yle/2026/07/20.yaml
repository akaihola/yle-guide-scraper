      - title: 'Tiedetrippi: Luonnon ikiaikaiset jättiläiset'
        start_time: '2026-07-20T13:00:00+03:00'
        end_time: '2026-07-20T13:30:00+03:00'
        description: |-
          Kuvittele, että matkustat junalla Turusta Tampereelle ja katsot koko matkan ajan ikkunassa viliseviä puita. Nyt kuvittele, että kaikki ne puut olisivat yhtä ja samaa superorganismia. Kuulostaa käsittämättömältä, mutta luonnolle tämän kaltainen jättimäisyys ei ole mahdotonta. Esimerkiksi Yhdysvalloista on löydetty kymmenen neliökilometrin laajuinen sieni – eikä se ole likimainkaan suurin luonnon piilottamista jättiläisistä.
          (7.7.2025)
