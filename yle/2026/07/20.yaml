      - title: 'Keinuva talo - Mika Kauhanen: Kaupunkikansan musiikit: Rooma'
        start_time: '2026-07-20T17:35:00+03:00'
        end_time: '2026-07-20T18:35:00+03:00'
        description: |-
          Mitä tapahtuu, kun yhdistetään ikuinen kaupunki ja ikiaikaisista perinteistä kumpuava kansanmusiikki? Syntyykin tuoretta, elinvoimaista ja jännittävää kuunneltavaa! Kitchistä ollaan kaukana, kun sellaisetkin artikkelit kuin Bella Ciao, Tarantella ja I love Italia soivat ilmiömäisten laulajien ja soittajien voimin. Keinuvan talon kesäsarjassa vuoronsa saa Rooma, joka maansa valtasuonena kokoaa musiikkikulttuurit kaikkialta Italiasta ja kauempaakin. Toimittajana Mika Kauhanen.
