      - title: 'Väkivallan markkinat: Viihdeteollisuus markkinoi aseita'
        start_time: '2026-07-20T19:02:00+03:00'
        end_time: '2026-07-20T19:46:00+03:00'
        description: |
          Rikossarjoissa vilisee pistooleja, sotaelokuvissa kiväärejä, tankkeja ja hävittäjiä. Elokuvat ovat loistava markkinointikanava paitsi aseiden tuottajille, myös armeijalle. 
          Tässä jaksossa Ippi etsii elokuvajärjestäjä Klaus Klemolan kanssa rekvisiitta-asetta Tampereen asemessuilla.

          Jaksossa asiantuntijavieraina: elokuva- ja televisiotutkimuksen yliopistonlehtori Jaakko Seppälä Helsingin yliopistosta sekä asekeräilijä Erkki Väisänen ja elokuvajärjestäjä Klaus Klemola. 
      - title: Mannerheimin agentti
        start_time: '2026-07-20T20:05:00+03:00'
        end_time: '2026-07-20T20:25:00+03:00'
        description: |
          Jakso 8/10: Salainen sopimus.
          Vaikuttiko jatkosodan kulkuun Mannerheimin ja Stalinin salainen sopimus? Miksi Leningrad jätettiin rauhaan? Hautamäki kertoo selvittäneensä yhden salaisen yhteyden, korkean neuvostojohtajan henkilöllisyyden Stalinin lisäksi. 

          Koskinen ja Oikuri matkaavat kansallisarkistoon, josta löytyy Tahvanaisen kirjailijakirjeenvaihtoa. 
      - title: 'Hanna Tikanderin toiset todellisuudet: ‘Mulla on kirjallinen sopimus henkimaailman oppaiden kanssa”'
        start_time: '2026-07-20T20:25:00+03:00'
        end_time: '2026-07-20T20:47:00+03:00'
        description: |
          Marjaana alkoi saada automaattikirjoituksella viestejä edesmenneeltä isältä ja se muutti elämänsä suunnan. Henkiseen maailmaan tarkemmin tutustuttuaan, hän ymmärsi olevansa meedio.
          Marjaana kertoo, että meedio on välittäjä tuonpuoleisen ja näkyvän maailman välillä. Viestit voivat hänen mukaansa olla myös humoristisia, ja aina - rakkaudellisia.
          Marjaana on etsinyt henkioppaansa kuvan netistä ja kertoo podcastissa paljon yksityiskohtia entisistä elämistään.
