      - title: 'Kulttuuriykkönen: Christopher Nolanin The Odyssey'
        start_time: '2026-07-20T15:00:00+03:00'
        end_time: '2026-07-20T15:58:00+03:00'
        description: |
          Odysseia on maailmankirjallisuuden tunnetuimpia teoksia, ja kertoo eepoksen nimihenkilön Odysseuksen seikkailuista ja harharetkistä paluumatkallaan kotiin Troijan sodasta. Ohjaaja Christopher Nolan on tehnyt 250 miljoonan dollarin spektaakkelin eeppisestä runoelmasta. Jo ennen julkaisuaan filmi on herättänyt kohua näyttelijävalinnoillaan ja historiallisilla epätarkkuuksillaan. 

          Kulttuuriykkösessä tästä kesän elokuvatapauksesta ja Odysseiasta ovat puhumassa klassillisen filologian professori Marja Vierros ja klassillisen filologian yliopistonlehtori Marke Ahonen Helsingin yliopistosta sekä elokuvatutkija Jari Sedergren.

          Ohjelman juontaa NIcklas Wancke.
