        description: |-
          "Matteuksen evankeliumi: Henki vai Belsebul?"
          Näyttelijä Krista Kosonen lukee Matteuksen evankeliumia (12:21-13:17) UT2020 käännöksen mukaan. Yhdeksännessä jaksossa Jeesuksen syytetään toimivan päädemoni Belsebulin voimalla ja Jeesus kertoo vertauksen kylväjästä.
      - title: Yle Uutiset ja sää
