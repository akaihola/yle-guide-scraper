      - title: 'Tiedetrippi: Mies, joka venytti aikaa'
        start_time: '2026-07-17T13:00:00+03:00'
        end_time: '2026-07-17T13:30:00+03:00'
        description: |-
          Vuonna 1962 nuori ranskalainen geologi Michel Siffre kömpi sisään säkkipimeään luolaan mukanaan tarvikkeita pitkäaikaiseen oleiluun. Siffre oli tullut tutkimusmatkalle, mutta tutkimuksen kohde ei suinkaan ollut luola, vaan hän itse. Siffre ei ottanut mukaansa kelloa, ja se oli koko jutun juoni.
