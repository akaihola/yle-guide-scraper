          Kesän perjantai-illoissa kysytään "Mikä on pyhää?" Oppilaitospastori Marjut Mulari Helsingistä puhuu kodin pyhyydestä ja omistamisen aiheuttamista ristiriitaisista tunteista. 
      - title: 'Konsertteja: Ukrainan radion kuoro ja Kiovan kamarisolistit'
        start_time: '2026-07-17T19:02:00+03:00'
        end_time: '2026-07-17T20:01:00+03:00'
        description: |
          Ukrainan radion kuoron ja Kiovan kamarisolistien konsertti on tallennettu Kiovassa, Ukrainan radion studiotalossa 11. kesäkuuta 2026, jolloin Venäjän hyökkäyssota ylitti kestoltaan ensimmäisen maailmansodan. 
          Konsertin ohjelma yhdistää ukrainalaisen klassisen musiikin juuret laajempaan eurooppalaiseen perinteeseen ja luo vuoropuhelua kulttuurien ja vuosisatojen yli. 

          Ennen konserttia Ainomaija Pennasen haastateltavana on sellisti ja elokuvaohjaaja Lukas Stasevskij, joka kertoo huomioitaan kulttuurista ja sen merkityksestä tämän päivän Ukrainassa.
