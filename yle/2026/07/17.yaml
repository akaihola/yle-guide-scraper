        start_time: '2026-07-17T06:50:00+03:00'
        end_time: '2026-07-17T06:59:59+03:00'
        description: |-
          "Majan rakennusta ja sisäpiirivitsejä"
          Aluekappalainen Sanni Rissanen Kerimäeltä muistelee oman rippileirinsä konfirmaatiotilaisuuden tunnelmia.
      - title: Aamusoitto
        start_time: '2026-07-17T07:06:00+03:00'
        end_time: '2026-07-17T08:00:00+03:00'
        description: |+
          Anonyymi: Sonaatti pasuunalle, cembalolle ja uruille (Christian Lindberg, pasuuna, ja Neal Peres da Costa, cembalo ja urut).

          Schubert: Balettimusiikkia näyt. Rosamunde (Orpheus-kamariork.).

          Pleyel: Sonatiini klarinetille ja kitaralle G-duuri (Dieter Klöcker ja Sonja Prunnbauer).

          Godowsky: Muistoja (Marc-André Hamelin, piano).

          Mendelssohn: Häämarssi näytelmästä Kesäyön unelma (Atlantan SO/Yoel Levi).

          Arenski: Andante sostenuto bal. Egyptin öitä (Sergei Stadler, viulu, ja Bolshoi-teatterin ork./Aleksandr Lazarev).

          Cimarosa: Johdanto ja allegro giusto konsertosta C-duuri (Patrick Gallois, huilu, ja Pariisin kamarimusiikkijuhlien ork./Bernard Thomas).

          Falla (sov. Rochat - Aguirre): Espanjalainen tanssi n:o 1 oopp. La Vida breve (Nadège Rochat, sello, ja Rafael Aguirre, kitara).

          Tshaikovski: Valssi Serenadista jousiorkesterille (Pietarin filharmoninen orkesteri/Vladimir Ashkenazy).

      - title: Radio 1:n aamu
        start_time: '2026-07-17T08:07:00+03:00'
        end_time: '2026-07-17T09:00:00+03:00'
        description: |-
          Ajatuksia tarjoileva aamulähetys, jollaista et kuule mistään muualta. Radio 1:n aamu kutsuu lempeän rytmikkäälle matkalle maailman ympäri. Matkalla soivat eri aikakausien ja kulttuurien sävyttämät popin, jazzin, maailmanmusiikin ja instrumentaalimusiikin helmet. Juontajana Jalmari Laine.
      - title: Muistojen bulevardi
        start_time: '2026-07-17T09:04:00+03:00'
        end_time: '2026-07-17T09:59:00+03:00'
      - title: Kalle Haatanen
        start_time: '2026-07-17T10:00:00+03:00'
        end_time: '2026-07-17T10:55:00+03:00'
        description: |-
          Filosofista keskustelua totuudesta, kauneudesta, hyvästä ja pahasta.
      - title: 'Maisteri Lindgrenin musiikkiesitelmä: Miksi Maisteri rakastaa Bruckneria'
        start_time: '2026-07-17T11:00:00+03:00'
        end_time: '2026-07-17T11:55:00+03:00'
        description: |-
          ”Ja minun hirveä harhani oli se, että oudon pitkään sijoitin Brucknerin ja Mahlerin samaan laariin, eikä se mikään ihan pieni laari ollutkaan, pikemminkin tehdashalli, ja siellä muhivat nämä kaksi 75-minuuttisten sinfonioiden säveltäjää, jotka inspiroivat grandiositeettia potevia kapellimestareita, tosin sillä erolla, että grandioosit kapellimestarit johtavat mieluummin Mahleria kuin Bruckneria.” - Minna Lindgren esitelmöi.
      - title: Päivän mietelause ja Turun tuomiokirkon kello lyö 12
        start_time: '2026-07-17T11:57:00+03:00'
        end_time: '2026-07-17T12:00:00+03:00'
        description: |-
          Aaro Hellaakosken runo Haukka. Päivän mietelauseen on valinnut Juho-Pekka Rantala.
      - title: 'Tiedeykkönen: Millaista on tulevaisuuden sodankäynti? (Spoiler alert: ei vain drooneja)'
        start_time: '2026-07-17T12:05:00+03:00'
        end_time: '2026-07-17T12:55:00+03:00'
        description: |-
          Toimittajana Jari Mäkinen.
      - title: 'Radio 1:n iltapäivä: Kirjani tarina: Liisa Louhela kertoo romaanistaan Mies joka kantoi aurinkoa sylissään'
        start_time: '2026-07-17T13:30:00+03:00'
        end_time: '2026-07-17T15:00:00+03:00'
        description: |-
          Juontajana Jarmo Laitaneva. N. klo 14. Kirjani Tarina: Liisa Louhela kertoo romaanistaan Mies joka kantoi aurinkoa sylissään. Toimittajana Tina Cavén.
          N. klo 14:30 muusikko Harri Saksala kertoo omasta eniten häneen vaikuttaneesta kokemuksestaan. Ensilähetys oli 5.3.2026. Toimittajana Jalmari Laine.
      - title: Kulttuuriykkönen
        start_time: '2026-07-17T15:00:00+03:00'
        end_time: '2026-07-17T15:58:00+03:00'
        description: |-
          Rentoa puhetta, kiinnostavimmat vieraat ja kulttuurin ajankohtaisaiheet debatoitavina. Suorana maanantaista perjantaihin.
      - title: Faunin iltapäivän kuuntelijoiden toiveita
        start_time: '2026-07-17T16:07:00+03:00'
        end_time: '2026-07-17T16:59:00+03:00'
        description: |+
          Gershwin: Claran aaria "Summertime" oopp. Porgy ja Bess (Renee Fleming, sopraano, ja Metropolitan-oopperan ork./James Levine).

          Rameau: Chaconne oopperabal. Les Indes galantes (Jalot villit) (Le Concert des Nations/Jordi Savall).

          Mendelssohn: Lied ohne Worte n:o 2 (Sanaton laulu) a-molli (Arto Satukangas, piano).

          Wagner: Dalandin aaria "Mögst du, mein Kind" oopp. Lentävä hollantilainen (Martti Talvela, basso, ja RSO/Jussi Jalas).

          J.S. Bach (sov. Hess): Kristus valo valkeuden (Risto Lauriala, piano).

          Massenet: Meditaatio oopp. Thaïs (Anne-Sophie Mutter, viulu, ja Berliinin filharmonikot/Herbert von Karajan).

          O. Merikanto: Romanssi (Eero Heinonen, piano).

          Kuula: Suutelo (Soile Isokoski, sopraano, ja Marita Viitasalo, piano).

          Järnefelt: Berceuse (Kehtolaulu) (Mats Zetterqvist, viulu, sekä Ruotsin radion SO/Esa-Pekka Salonen).

          Porra: A song for summer teoks. Seasons in Moominvalley (Muumilaakson vuodenajat) (Antti Kujanpää, piano, Kasmir Uusitupa, viulu, Hanna Hohti, alttoviulu, ja Markus Hohti, sello).

          Mårtenson: Laulu suuresta merestä (Karita Mattila, sopraano, ja Jyväskylä Sinfonia/Riku Niemi).

      - title: 'Tuntematon Baltia: Arkielämää Nato- ja EU-Liettuassa'
        start_time: '2026-07-17T17:05:00+03:00'
        end_time: '2026-07-17T17:30:00+03:00'
        description: |
          Suomen Vilnan-suurlähettiläs Arja Makkonen ja lehdistö- ja kulttuuriassistentti Rytė Baublytė-Savaja sekä toimittaja Jari Aula keskustelevat sarjan päätösjakossa Liettuan nykypäivästä. (es. 2024)
      - title: 'Näistä levyistä en luovu: Mikki Kauste'
        start_time: '2026-07-17T17:35:00+03:00'
        end_time: '2026-07-17T18:30:00+03:00'
        description: |-
          Kiinnostavat ihmiset  kertovat lempimusiikkiinsa liittyviä muistoja ja tarinoita. Uusi jakso joka perjantai.
      - title: Hartaita säveliä
        start_time: '2026-07-17T18:35:00+03:00'
