      - title: 'Konsertteja: Ukrainan Radion kuoro ja Liatoshinsky Capella -orkesteri'
        start_time: '2026-07-17T19:02:00+03:00'
        end_time: '2026-07-17T21:00:00+03:00'
        description: |
          Ukrainan Radion kuoron ja Kiovan Kamarisolistien konsertti on tallennettu Kiovassa Ukrainan Radion studiotalossa 11. kesäkuuta 2026, jolloin Venäjän hyökkäyssota ylitti kestoltaan ensimmäisen maailmansodan. 
          Konsertin ohjelma yhdistää ukrainalaisen klassisen musiikin juuret laajempaan eurooppalaiseen perinteeseen ja luo vuoropuhelua kulttuurien ja vuosisatojen yli. Ohjelmassa kuullaan muun muassa ensimmäinen ukrainalainen sinfonia, jonka on säveltänyt Maksym Berezovskyn (17451–1777) sekä Franz Schubertin Messu G-duuri. Ohjelman täydentävät ukrainalaiset kansanlaulut, jotka yhdistävät akateemisen musiikin elävään kulttuuriseen muistiin. Konsertin toimittaa Ainomaija Pennanen.

          Maksym Berezovsky: Sinfonia nro 1 C-duuri
          Kiovan kamarisolistit
          Yuliia Tkach, kapellimestari

          Franz Schubert: Messu nro 2 G-duuri
          Solistit:
          Viktoria Chenska, sopraano	 
          Sergiy Bortnyk , tenori	 
          Oleksandr Boiko, basso	 
          Ukrainian Radion kuoro
