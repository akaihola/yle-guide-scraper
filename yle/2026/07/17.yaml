      - title: Aamusoitto
        start_time: '2026-07-17T07:06:00+03:00'
        end_time: '2026-07-17T08:00:00+03:00'
        description: |+
          Anonyymi: Sonaatti pasuunalle, cembalolle ja uruille (Christian Lindberg, pasuuna, ja Neal Peres da Costa, cembalo ja urut).

          Schubert: Balettimusiikkia näyt. Rosamunde (Orpheus-kamariork.).

          Pleyel: Sonatiini klarinetille ja kitaralle G-duuri (Dieter Klöcker ja Sonja Prunnbauer).

          Godowsky: Muistoja (Marc-André Hamelin, piano).

          Mendelssohn: Häämarssi näytelmästä Kesäyön unelma (Atlantan SO/Yoel Levi).

          Arenski: Andante sostenuto bal. Egyptin öitä (Sergei Stadler, viulu, ja Bolshoi-teatterin ork./Aleksandr Lazarev).

          Cimarosa: Johdanto ja allegro giusto konsertosta C-duuri (Patrick Gallois, huilu, ja Pariisin kamarimusiikkijuhlien ork./Bernard Thomas).

          Falla (sov. Rochat - Aguirre): Espanjalainen tanssi n:o 1 oopp. La Vida breve (Nadège Rochat, sello, ja Rafael Aguirre, kitara).

          Tshaikovski: Valssi Serenadista jousiorkesterille (Pietarin filharmoninen orkesteri/Vladimir Ashkenazy).

