      - title: Mannerheimin agentti
        start_time: '2026-07-29T23:20:00+03:00'
        end_time: '2026-07-29T23:40:00+03:00'
        description: |-
          Jakso 9/10: Kirje Kekkoselle.
          Kaksi vuotta ennen kirjansa julkaisua Tahvanainen kirjoitti presidentti Kekkoselle ja ulkoasiainministeri Karjalaiselle pyytäen näiden mielipidettä eräässä poliittisesti tulenarassa asiassa.

          Koskinen ja Oikuri ovat kansallisarkistossa lukemassa kyseistä pitkää kirjettä. Mitä kirje piti sisällään ja miten siihen reagoitiin? Jaksossa kuullaan myös Tahvanaisen vierailu Yleisradion Tässä ja nyt -ohjelmassa vuonna 1971.
