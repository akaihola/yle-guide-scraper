      - title: 'Uutispodcast: Kaikki meni -lööppi povasi kurjuutta 2012 – miten meille lopulta kävi?'
        start_time: '2026-07-29T17:05:00+03:00'
        end_time: '2026-07-29T17:30:00+03:00'
        description: |-
          Legendaarinen Kaikki meni -lööppi ilmestyi 9. helmikuuta 2012 Iltalehdessä. Tuolloin rysähti uutiset varuskuntien lakkauttamisesta, Nokian suurista irtisanomisista ja kuntien karsimisesta. Menikö kaikki? Atte Uusinoka selvitti.
          (es. 9.2.2026)
