      - title: 'Havaintoja muutoksesta: Mistä kylien elinvoima syntyy?'
        start_time: '2026-07-29T10:00:00+03:00'
        end_time: '2026-07-29T10:50:00+03:00'
        description: |
          Suomessa on arvioiden mukaan noin 4300 aktiivista kylää. Kylän rakentuu niin kulttuurihistoriallisista paikoista, yhteisöistä, jaetuista kokemuksista, muistoista ja kertomuksista. Jokaisella kylällä on omat erityiset piirteensä. Millainen merkitys kylillä on Suomelle? 
          Toimittaja Satu Kivelä keskustelee aiheesta Suomen kylät ry:n toiminnanjohtaja Suvi Louhelaisen ja kyläaktiivi Jussi Lähteen kanssa. 
