      - title: 'Pieleen mennyt historia: Verotus oli aluksi ryöväystä – talonpoikia verotettiin hengiltä'
        start_time: '2026-07-29T12:05:00+03:00'
        end_time: '2026-07-29T12:50:00+03:00'
        description: |-
          Millä tavoin verotuksen historia on mennyt pieleen? Millaista on kohtuullinen verotus? Näitä kysymyksiä pohtivat Suomen ja Venäjän historian dosentti Antti Kujala, historianopettaja Lasse Hongisto ja toimittaja Jussi Nygren.
          (2024)
      - title: 'Tiedetrippi: Mielen diagnoosien aikakausi'
        start_time: '2026-07-29T13:00:00+03:00'
        end_time: '2026-07-29T13:30:00+03:00'
        description: |-
          Miksi kukaan terve ihminen menisi mielisairaalaan esittämään mieleltään sairastunutta? Yhdysvaltalainen psykologi David Rosenhan teki niin 1960-luvun lopulla. Hän halusi kokeilla osataanko ihmismielen häiriöitä tunnistaa ja diagnosoida oikein. Entä osataanko vieläkään?
          (2025)
      - title: 'Radio 1:n iltapäivä: uskontotieteilijä Teemu Taira - ateisteihin liittyvät mielikuvat'
        start_time: '2026-07-29T13:30:00+03:00'
        end_time: '2026-07-29T15:00:00+03:00'
        description: |-
          Juontajana Miia Lahti. Onko ateisti älykäs mutta rasittava besserwisser, joka pitää itseään ainakin uskovaisia parempana? Tällaisen kuvan antaa populaarikulttuuri. Ateisteihin liittyvistä mielikuvista ja heihin suhtautumisesta kertoo asiaa tutkinut uskontotieteilijä Teemu Taira. Samppa Korhonen haastattelee.
          N. klo 14:30 Kirjailija Sirpa Kähkönen hehkuttaa hienoa kulttuurielämyksenään Suomen elokuva–arkiston elokuvatarjontaa. Toimittajana Maija Salminen. 
      - title: 'Kulttuuriykkönen: Onko Jeesuksen historiallisuus suuri huijaus?'
        start_time: '2026-07-29T15:00:00+03:00'
        end_time: '2026-07-29T15:58:00+03:00'
        description: |
          Kaksi tuhatta vuotta sitten elänyt Jeesus Nasaretilainen on kiistatta ihmiskunnan historian merkittävin henkilö. Hänen toimintansa pohjalle syntyi kristinusko, jota eri muodoissaan tunnustaa maailmanlaajuisesti yli 2,6 miljardia ihmistä.

          Mutta mitä jos koko tarina Jeesuksesta ja hänen toiminnastaan onki sepite? Tähän ajatukseen uskovat niin sanotut Jeesus-denialistit, jotka voivat vyöryttää väitteen tueksi esiin todisteita, lähtien siitä että Jeesuksen elämästä kertovat evankeliumit ovat syntyneet vasta vuosikymmeniä oletetun Jeesuksen kuoleman jälkeen. 

          Teologian tohtori, tietokirjailija Matti Kankaanniemi on kirjoittanut teoksen Historian Jeesus ja salaliittoteoriat, jossa hän käy läpi argumentteja Jeesuksen historiallisuuden puolesta ja vastaan - ja törmää salaliittoteorioita muistuavaan ajatteluun. Kankaanniemen kanssa studiossa on Uuden testamentin eksegetiikan dosentti Matti Myllykoski. Ville Talola toimittaa. 
