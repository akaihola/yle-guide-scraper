      - title: 'Konsertteja: Kuhmon Kamarimusiikki – Rohkeasti reunalla'
        start_time: '2026-07-29T19:02:00+03:00'
        end_time: '2026-07-29T21:00:00+03:00'
        description: |-
          Musiikkia maailman reunoilta. Konsertissa kuullaan kantaesitys italialais-intialaisen Suomeen kotiutuneen säveltäjän, viulistin ja alttoviulistin Krishna Nagarajan tilausteoksesta Peripheres. Valerie Coleman yhdistelee musiikissaan aineksia Afrikasta, Amerikoista ja Karibialta. Aloituskappaleena on oululaissyntyisen Leevi Madetojan pianotrio. Tuupalan alakoulussa Kuhmossa 23. heinäkuuta tallennetun konsertin toimittaa Ainomaija Pennanen.

          Konserttiohjelma:

          Leevi Madetoja: Pianotrio e-molli op. 1 
          Elina Vähälä, viulu, Bjørg Lewis, sello, Heini Kärkkäinen, piano

          Krishna Nagaraja: Peripheries jousikvartetille (2025, Kuhmon Kamarimusiikin tilausteos, kantaesitys)
          Meta4-jousikvartetti, jäsenet:
          Minna Pensola
          Antti Tikkanen
          Atte Kilpeläinen
          Tomas Djupsjöbacka

          Valerie Coleman: Danza konsertosta Afro-Cuban puhallinkvintetille 
          Orsino Ensemble

          Kuva: © Jonas Kukkonen
