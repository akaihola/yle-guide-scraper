      - title: 'Välilevyjä: Tarinoita kulta-ajalta'
        start_time: '2026-07-26T13:00:00+03:00'
        end_time: '2026-07-26T13:57:00+03:00'
        description: |-
          1900-luvun alkupuolen legendaariset muusikot olivat poikkeusyksilöitä, mutta elivätkö he sen takia poikkeukselliset elämät? Vai johtaako tilastollisesti poikkeuksellinen elämä poikkeukselliseen muusikkouteen? Taidemusiikin tarinoita kertoo ja purkaa Kare Eskola.

          Ohjelma on uusinta vuodelta 2019.
      - title: 'Klassikkokuunnelma: Työmiehen perhe'
        start_time: '2026-07-26T15:00:00+03:00'
        end_time: '2026-07-26T15:30:00+03:00'
        description: |-
          Osa 16/22: Arvin vierailu
          Hella Wuolijoen kirjoittama ja ohjaama sarja kertoo Kustaa Rantasen työläisperheen tarinan Suomen yhteiskuntahistorian avainkohtien kautta. Sarjan tapahtumat alkavat 1800-luvun lopun Suomesta ja jatkuvat aina 1950-luvulle asti. Sarjassa käsitellään mm. kaupungistumista, maanviljelijän asemaa ja kansalaissotaa.
