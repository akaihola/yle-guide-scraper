      - title: Etnokonsertti Le Mali 70 Earkestra
        start_time: '2026-07-26T17:06:00+03:00'
        end_time: '2026-07-26T18:00:00+03:00'
        description: |-
          Le Mali 70 Earkestra -on berliiniläisen The Omniversal Earkestran ja malilaisten muusikoiden yhteistyön tulos. Projekti sai alkunsa vanhoista vinyylilevyistä. Berliiniläiset löysivät vanhoja vinyylejä Malin Big band -musiikin kultakaudelta 1970-luvulta. Vuonna 2022 berliiniläiset matkustivat Maliin tutustumaan vinyylikokoelmansa sankareihin. Matkan aikana syntyi uusia sovituksia, jotka äänitettiin Salif Keitan studiolla Bamakossa. Konsertti on taltioitu Rudolstadtin maailmanmusiikkifestivaalilla 5.7.2025. Toimittajana on Miika Lauriala. 
