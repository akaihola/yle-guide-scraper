          Kämpfert: Bert's bossa n:o 2 (Bert Kämpfert).
          Kämpfert: Spanish eyes (Al Martino).
          Soloway/Wolfe: Lessons in love (Cisse Häkkinen).
          Barry/Greenwich/Morton: Leader of the pack (The Shangri-Las).
          Barry/Raleigh: Dite a Laura che l'amo (Michele Maisano).
          Hector: Neitoperho (Hector).
          Chinn/Chapman: Viisitoista kesää (Kari Tapio).
          Browne/Farnsworth: Helmet kyynelten (Maarit).
          Browne: These days (Jackson Browne).
          Legrand: Theme from summer of '42 (Michel Legrand).

          Konsertin on toimittanut Ville Vilén.
      - title: 'Elävä historia: Ensimmäisen maailmansodan itärintamalla käytiin kesällä 1916 yhtä verinen taistelu kuin Verdunissa'
        start_time: '2026-07-26T12:05:00+03:00'
