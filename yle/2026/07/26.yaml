      - title: 'Romanitarinoita: Leif Åkerlund - Kun musiikki ei tunnu työltä'
        start_time: '2026-07-26T23:12:00+03:00'
        end_time: '2026-07-26T23:37:00+03:00'
        description: |
          Tässä jaksossa pääsemme kurkistamaan lauluntekemisen maailmaan yhdessä Leif Åkerlundin kanssa. Keskustelu vie syvemmälle säveltämiseen, sanoittamiseen ja sovittamiseen.
          Leif puhuu musiikin tekemisestä intohimolla ja sydämellä. Hän sanoo, ettei se tunnu työltä – ja juuri siksi se tuntuu niin oikealta. Vaikka musiikki on vielä harrastus, lahjakkuus on ilmeinen.
          Innostava ja lämminhenkinen jakso musiikin ytimestä.
