        start_time: '2026-07-26T13:00:00+03:00'
        end_time: '2026-07-26T13:57:00+03:00'
        description: |-
          1900-luvun alkupuolen legendaariset muusikot olivat poikkeusyksilöitä, mutta elivätkö he sen takia poikkeukselliset elämät? Vai johtaako tilastollisesti poikkeuksellinen elämä poikkeukselliseen muusikkouteen? Taidemusiikin tarinoita kertoo ja purkaa Kare Eskola.

          Ohjelma on uusinta vuodelta 2019.
