      - title: Mannerheimin agentti
        start_time: '2026-07-15T23:20:00+03:00'
        end_time: '2026-07-15T23:40:00+03:00'
        description: |
          Jakso 7/10: Nimi Stalinin vieraskirjassa.
          Useat tutkijat ovat vedonneet siihen, että Mannerheim ei olisi asioinut muiden kuin upseereiden kanssa. Miten metsätyömies-Tahvanainen olisi voinut päästä hänen lähipiiriin?

          Koskinen ottaa yhteyttä venäläiseen historioitsijaan Boris Sokoloviin kysyäkseen hänen mielipidettään mahdollisesta salaisesta yhteydestä Suomen ja Neuvostoliiton johdon välillä. Lisäksi Sokolov kertoo löytäneensä Kremlin vieraskirjasta mielenkiintoisen merkinnän tammikuulta 1940. Kuka tapasi Stalinin 2.1.1940 ja keitä muita oli tapaamisessa paikalla?
