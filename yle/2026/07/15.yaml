      - title: 'Havaintoja muutoksesta: Kasvien salattu elämä'
        start_time: '2026-07-15T10:00:00+03:00'
        end_time: '2026-07-15T10:50:00+03:00'
        description: |
          Elämme lumoavien kasvien keskellä. Kaupunkiluonnossakin voi tavata liki 200 kasvilajia. Järvien pintojen alla on oma ihmeellinen maailmansa. Järvet ja kukat kutsuvat meitä aistimaan ja sulautumaan luontoon.
          Miltä lumpeen tanssi näyttää ja tuntuu? Millainen merkitys kasveilla on?
          Toimittaja Satu Kivelä etsii vastauksia yhdessä kuvataitelija, arkkitehti ja tanssijataustaisen Ulla-Maija Alasen ja ekologitaustainen kuvataiteilija ja luontoaiheisiin erikoistunut kuvittaja Milja Laineen kanssa. 
