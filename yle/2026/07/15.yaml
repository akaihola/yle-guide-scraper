      - title: 'Radio 1:n iltapäivä: Taide kuuluu kaikille'
        start_time: '2026-07-15T13:30:00+03:00'
        end_time: '2026-07-15T15:00:00+03:00'
        description: |-
          Juontajana Joni Timonen.  Jokaisella tulisi olla oikeus tehdä ja kokea taidetta esteettömästi ja yhdenvertaisesti. Kettuki on valtakunnallinen erityistaiteen asiantuntijaverkosto ja taiteilijoiden yhteisö, joka edistää yhteiskunnassa tätä tasa-arvon tavoitetta. Miksi taiteen ja kulttuurin esteettömyys on kaikkien etu? Kati Turtola haastattelee Kettuki ry:n toiminnanjohtaja Sirpa Taulua ja  Kettukin taidementori, tutkija ja taiteilija Satu Tania.

          N. klo 14:30 Lotta Emanuelsson haastattelee RSO:n lyömäsoittaja Jerry Piipposta lyömäsoittajien soitinvarastolla. Ensilähetys 21.11.2025. 
      - title: 'Kulttuuriykkönen: Naistaiteilijat historiassa ja tänään'
        start_time: '2026-07-15T15:00:00+03:00'
        end_time: '2026-07-15T15:58:00+03:00'
        description: |-
          Sara Hildénin taidemuseossa Tampereella on esillä Vastamaalattua- näyttely, jota maamme yksi tunnetuimmista naistaiteilijoista, Marika Mäkelä aikoinaan ideoi. Hän on tuonut useissa eri yhteyksissä esiin naispuolisten kollegoidensa tärkeän tuen, ja ehdotti museolle jo oman retrospektionsa yhteydessä (2014), että museossa olisi esillä maalaustaiteen katsaus, jossa näyttämö olisi kokonaan nuorten, uransa alkuun saaneiden taiteilijoiden, naisten. 
           
          Näyttely, jossa on mukana 22 tekijää, tarjoaa läpileikkauksen milleniaalisukupolven tekemiseen Suomessa ja parin taiteilijan verran laajentaen myös Ruotsin suuntaan. Mukana ohjelmassa on Siiri Haarla, Kuvataideakatemian opettajakuntaan kuuluva taiteilija.
           
          Mukana kutsuttuina ovat: Emma Ainala, Milla Aska, Siiri Haarla, Taru Happonen, Karoliina Hellberg, Kaisa Huotari, Juliana Hyrri, Annamaari Hyttinen, Eveliina Hämäläinen, Essi Kuokkanen, Raana Lehtinen, Eeva Lietonen, Emma Luukkala, Iisa Maaranen, Elin Odentia (SE), Melina Paakkonen, Sirkku Rosi, Kerttu Saali, Johanna Saikkonen, Riikka Sormunen, Astrid Strömberg ja Ebba Svensson (SE).
           
          Näyttely sisältää 22 näkökulmaa, millaisia tarinoita teoksien takaa löytyy?

          Maamme tunnetuimpiin historiallisiin naistaiteiljoihin kuuluva Helene Schjerfbeck on saanut uuden näyttelyn Raaseporin museossa, Tammisaaren Helene. Kuvataiteilija Helene Schjerfbeck (10.7.1862– 23.1.1946) asui ja työskenteli Tammisaaressa kypsän
          ikänsä ja uransa tärkeät vuodet. Hän kertoi kokeneensa syvää rauhaa kotikaupungissaan ja oli todennut että täällä hän saa istua ja lukea Degas’sta ja Lautrecista, ja elää heidän taiteilijaelämäänsä. Uusi näyttely kertoo Helenen elämästä Tammisaaressa. Millaisissa oloissa hän ihastui kaupunkiin ja minkä kriisien kautta hän asettui tänne asumaan osaksi yhteisöä? Millaista oli hänen tammisaarelainen arkensa? Missä olosuhteissa hän joutui lähtemään?

          Ohjelman vieraina ovat Siiri Haarla, Kuvataideakatemian opettajakuntaan kuuluva taiteilija, näyttelyamanuenssi Sarianne Soikkonen ja intendentti Mia Juva Raaseporin museosta. 

          Ohjelman juontaa Pia-Maria Lehtola.



          Rentoa puhetta, kiinnostavimmat vieraat ja kulttuurin ajankohtaisaiheet debatoitavina. Suorana maanantaista perjantaihin.
