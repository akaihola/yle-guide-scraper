      - title: 'Radio 1:n iltapäivä: Seurasaaressa voi tehdä monta aikamatkaa talonpoikaiseen Suomeen'
        start_time: '2026-07-15T13:30:00+03:00'
        end_time: '2026-07-15T15:00:00+03:00'
        description: |-
          Juontajana Joni Timonen. Seurasaaren ulkomuseota sanotaan usein agraarisen Suomen pienoismalliksi. Museoalueelle on tuotu 88 rakennusta eri maakunnista. Vanhin on 1600-luvulta ja uusin museorakennus on 1950-luvulta. Se on Hyvinkäältä siirretty kessämökki, joka esittelee suomalaista mökkeilykulttuuria. N. klo 14 Jalmari Laine tapaa Seurasaaressa Suomen kansallismuseon yli-intendentti Mikko Teräsvirran. 

          N. klo 14:30 Lotta Emanuelsson haastattelee RSO:n lyömäsoittaja Jerry Piipposta lyömäsoittajien soitinvarastolla. Ensilähetys 21.11.2025. 
