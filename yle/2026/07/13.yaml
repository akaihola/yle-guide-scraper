      - title: 'Keinuva talo - Mika Kauhanen: Kaupunkikansan musiikit: Dublin'
        start_time: '2026-07-13T17:35:00+03:00'
        end_time: '2026-07-13T18:35:00+03:00'
        description: |
          Irlannin pääkaupunkiin Dubliniin kukaan ei lähde sään vuoksi, mutta musiikin takia sinne todella kannattaa matkustaa. Missä muualla sävelmät olisivat niin hilpeät, laulut niin haikeat?

          Paikkana Dublin on paitsi miljöö myös aihe maailmankirjallisuuden klassikoille ja unohtumattomille lauluille. Esimerkiksi Rocky Road to Dublin, Molly Malone, Dublin Saunter, The Raglan Road ovat innoittaneet kymmeniä ellei satoja levytyksiä. 

          Vihreän saaren musiikkia tapaillaan kaikkialla maailmassa irkkumusiikin intomielisten harrastajien keskuudessa: jotain yleismaailmallisesti puhuttelevaa siinä täytyy olla. Dublinin musiikillisen kartan maamerkkeihin johdattelee toimittaja Mika Kauhanen.
