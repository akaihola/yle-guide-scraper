          Näyttelijä Krista Kosonen lukee Matteuksen evankeliumia (11:7-12:21) UT2020 käännöksen mukaan. Kahdeksannessa jaksossa Jeesus antaa ohjeita lepopäivää varten ja fariseukset alkavat suunnitella kuinka päästä hänestä eroon.
