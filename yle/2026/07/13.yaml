      - title: 'Asekauppiaat: Kuka päättää, kenelle Suomi myy aseita? '
        start_time: '2026-07-13T19:02:00+03:00'
        end_time: '2026-07-13T19:50:00+03:00'
        description: |
          Kun valtiollisia asekauppoja tehdään, julkiselle tai edes poliittiselle keskustelulle ei tunnu löytyvän sopivaa hetkeä. Suomesta on myyty aseita sotaa käyviin Arabiemiraatteihin ja Saudi-Arabiaan siitä huolimatta, että Suomi painottaa ihmisoikeuksien kunnioittamista, rauhaa ja demokratiaa. Miksi? Millainen prosessi on kranaatinheitinten myyminen Saudi-Arabiaan?

          Jaksossa asiantuntijavieraina: Sadankomitean pääsihteeri Jarmo Pykälä, Tampereen yliopiston rauhan- ja konfliktintutkimuskeskuksen väitöskirjatutkija Kari Paasonen, Puolustusministeriön resurssipoliittisen osaston materiaaliyksikön erityisasiantuntija Riikka Pitkänen, Ulkoministeriön asevalvonnan yksikön vastuuvirkamies Päivi Pihlajamäki. 
      - title: Mannerheimin agentti
        start_time: '2026-07-13T20:05:00+03:00'
        end_time: '2026-07-13T20:25:00+03:00'
        description: |
          Jakso 7/10: Nimi Stalinin vieraskirjassa.
          Useat tutkijat ovat vedonneet siihen, että Mannerheim ei olisi asioinut muiden kuin upseereiden kanssa. Miten metsätyömies-Tahvanainen olisi voinut päästä hänen lähipiiriin?

          Koskinen ottaa yhteyttä venäläiseen historioitsijaan Boris Sokoloviin kysyäkseen hänen mielipidettään mahdollisesta salaisesta yhteydestä Suomen ja Neuvostoliiton johdon välillä. Lisäksi Sokolov kertoo löytäneensä Kremlin vieraskirjasta mielenkiintoisen merkinnän tammikuulta 1940. Kuka tapasi Stalinin 2.1.1940 ja keitä muita oli tapaamisessa paikalla?
      - title: 'Hanna Tikander & Henkiset oppaat: “Tantrinen rakastelu on nautinnon meditaatiota”'
        start_time: '2026-07-13T20:25:00+03:00'
        end_time: '2026-07-13T21:00:00+03:00'
        description: |
          Maitri on tantrika eli tantran harjoittaja ja myös opettaja. Hänen henkinen polkunsa tantraan syntyi tarpeesta löytää omaan seksuaalisuuteen jotain syvempää. 
          Maitri opettaa tantraan liittyvää rakkautta, läsnäoloa - ja tietenkin sitä rakastelua. Maitrin mukaan tantrinen rakastelu saattaa kestää tunteja ja olla meditatiivinen kokemus
