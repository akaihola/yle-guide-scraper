          Paganini: Cantabile (Sarah Chang, viulu, ja Charles Abramovic, piano).

          Rossini: Don Basilion aaria "La calunnia è un venticello" oopp. Sevillan parturi (Antti Suhonen ja RSO / Alberto Hold-Garrido).

