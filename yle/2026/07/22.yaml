data:
  '':
    programmes:
      - title: 'Maisteri Lindgrenin musiikkiesitelmä: Miksi Maisteri rakastaa Bruckneria'
        start_time: '2026-07-17T11:00:00+03:00'
        end_time: '2027-07-16T23:59:00+03:00'
        description: |-
          ”Ja minun hirveä harhani oli se, että oudon pitkään sijoitin Brucknerin ja Mahlerin samaan laariin, eikä se mikään ihan pieni laari ollutkaan, pikemminkin tehdashalli, ja siellä muhivat nämä kaksi 75-minuuttisten sinfonioiden säveltäjää, jotka inspiroivat grandiositeettia potevia kapellimestareita, tosin sillä erolla, että grandioosit kapellimestarit johtavat mieluummin Mahleria kuin Bruckneria.” - Minna Lindgren esitelmöi.
      - title: Aamuhartaus
        start_time: '2026-07-22T06:50:00+03:00'
        end_time: '2026-07-22T06:59:59+03:00'
        description: |-
          Historioitsija, tietokirjailija Laura Kolbe, Helsinki
      - title: Radio 1:n aamu
        start_time: '2026-07-22T08:07:00+03:00'
        end_time: '2026-07-22T09:00:00+03:00'
      - title: 'Havaintoja muutoksesta: Miten kuulla kehon kuiskauksia?'
        start_time: '2026-07-22T10:00:00+03:00'
        end_time: '2026-07-22T10:50:00+03:00'
        description: |
          Ihminen on kehollinen ja sosiaalinen olento. Ihmiset ovat erilaisia hermostolliselta herkkyydeltään. Miten kehotietoisuutta voi vaalia? Miksi kehon viestien kuunteleminen on tärkeää? 
          Toimittaja Satu Kivelän vieraana psykoterapeutti Laura Mannila ja fokusointiohjaaja ja Core Process -terapeutti Anna Backholm. Ohjelma on uusinta ajalta 21.1.2026.
      - title: Klassinen kattaus
        start_time: '2026-07-22T11:00:00+03:00'
        end_time: '2026-07-22T11:57:00+03:00'
      - title: Päivän mietelause ja Turun tuomiokirkon kello lyö 12
        start_time: '2026-07-22T11:57:00+03:00'
        end_time: '2026-07-22T12:00:00+03:00'
        description: |-
          Johan Ludvig Runebergin Lyyrillisiä runoelmia -kokoelmasta runo Kesäyö Suomentaja Kaarlo Forsman.
      - title: 12 diktaattoria. Marx Mengistu Haile Mariam
        start_time: '2026-07-22T12:05:00+03:00'
        end_time: '2026-07-22T12:50:00+03:00'
        description: |-
          Harvan maan nykyhistoria on niin surkea kuin Etiopian, jonka kansalaisia ovat piinanneet pahat nälänhädät ja sanoin kuvaamattomia julmuuksia toteuttanut Mengistu Haile Mariamin marxilainen diktatuuri.
          Toimittajana Raimo Tyykiluoto.
          (2018)
      - title: 'Radio 1:n iltapäivä: Taide kuuluu kaikille'
        start_time: '2026-07-22T13:30:00+03:00'
        end_time: '2026-07-22T15:00:00+03:00'
        description: |-
          Juontajana Jalmari Laine. Jokaisella tulisi olla oikeus tehdä ja kokea taidetta esteettömästi ja yhdenvertaisesti. Kettuki on valtakunnallinen erityistaiteen asiantuntijaverkosto ja taiteilijoiden yhteisö, joka edistää yhteiskunnassa tätä tasa-arvon tavoitetta. Miksi taiteen ja kulttuurin esteettömyys on kaikkien etu? Kati Turtola tpimittaa.
      - title: Kulttuuriykkönen
        start_time: '2026-07-22T15:00:00+03:00'
        end_time: '2026-07-22T15:58:00+03:00'
        description: |-
          Rentoa puhetta, kiinnostavimmat vieraat ja kulttuurin ajankohtaisaiheet debatoitavina. Suorana maanantaista perjantaihin.
      - title: 'Uutispodcast: Tekoälybiisit nousevat jo listaykkösiksi – mihin ihmistä enää tarvitaan?'
        start_time: '2026-07-22T17:05:00+03:00'
        end_time: '2026-07-22T17:30:00+03:00'
        description: |-
          Tarvitaanko kohta enää ihmisartistia vai riittääkö meille hyvin tehdyt tekoälybiisit? Sami Lindforsin vieraana musiikkipäällikkö Jussi Mäntysaari Nelonen Mediasta.
          (es. 6.2.2026)
      - title: 'Kuhmon Kamarimusiikki – Yle 100: Helppotajuinen päivälliskonsertti'
        start_time: '2026-07-22T18:00:00+03:00'
        end_time: '2026-07-22T20:00:00+03:00'
        description: |-
          Musiikkiohjelmaa Suomen Yleisradion radiolähetyksen alkuaikojen tyyliin, juonnettu väliajallinen radiolähetys. Suoran lähetyksen Kuhmo-talosta toimittaa Ainomaija Pennanen.

          Ohjelmassa Kamarimusiikkia:

          Schubert: Quartettsatz, esittää Danel-kvartetti

          Soolopianoesitys:

          Leiviskä: Pianosonatiini F-duuri op. 14, esittää Anna Laakso
          Kreisler: Liebesleid ja Liebesfreud, esittää professorit Szilvay ja van de Roer

          Puhallinmusiikkia:

          Reicha: Lento. Allegro moderato puhallinkvintetosta Es-duuri op. 88/2, esittää

          Orsino-yhtye

          Väliaika

          Triomusiikkia:

          Dohányi: Marcia: Allegro jousitriosta C-duuri op. 10,
          esittää rouvat Kaakinen-Pilch, Cardas ja herra Djupsjöbacka

          Ranskalainen osasto:

          Ravel: Modéré pianotriosta esittää Storioni-trio
          Mozart: Säveleitä oopperasta Taikahuilu KV 620,
          esittää taiteelliset johtajat Minna Pensola ja Antti Tikkanen

          Dvořák: Allegro con fuoco jousikvintetosta nro 2 G-duuri op. 77,
          esittää Danel-kvartetti ja kontrabassotaiteilija Zoran Marković
      - title: Iltahartaus
        start_time: '2026-07-22T20:20:00+03:00'
        end_time: '2026-07-22T20:30:00+03:00'
        description: |-
          "Kohti syvempää todellisuutta"
          Pastori Aleksi Sakkolan-Leppänen Hampurista kertoo kirjailija Helen Kellerin elämästä ja pohtii aistinvaraisen maailman ja näkymättömän maailman suhdetta.
      - title: Jazzklubi
        start_time: '2026-07-22T20:30:00+03:00'
        end_time: '2026-07-22T21:30:00+03:00'
      - title: Havaintoja muutoksesta
        start_time: '2026-07-22T22:01:00+03:00'
        end_time: '2026-07-22T22:50:00+03:00'
      - title: 'Kuunnelma: Laskettua aikaa: Häkkieläin 8/10'
        start_time: '2026-07-22T22:51:00+03:00'
        end_time: '2026-07-22T23:09:00+03:00'
        description: |-
          Venäläisten sotilaiden otettua Noran ja hänen matkakumppaninsa kiinni, tilanne muuttuu hengenvaaralliseksi. Kun ryhmä viedään venäläisten tukikohtaan, heitä kuulustellaan ja epäillään vakoilusta. Tilanne kärjistyy lopulta pahimpaan mahdolliseen. 
      - title: Mannerheimin agentti
        start_time: '2026-07-22T23:20:00+03:00'
        end_time: '2026-07-22T23:40:00+03:00'
        description: |
          Jakso 8/10: Salainen sopimus.
          Vaikuttiko jatkosodan kulkuun Mannerheimin ja Stalinin salainen sopimus? Miksi Leningrad jätettiin rauhaan? Hautamäki kertoo selvittäneensä yhden salaisen yhteyden, korkean neuvostojohtajan henkilöllisyyden Stalinin lisäksi. 

          Koskinen ja Oikuri matkaavat kansallisarkistoon, josta löytyy Tahvanaisen kirjailijakirjeenvaihtoa. 
