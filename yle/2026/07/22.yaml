        end_time: '2026-07-22T06:59:59+03:00'
        description: |-
          "Rohkeus antaa voimaa ja mielenlujutta"
          Heinäkuun keskiviikkoaamuissa puhuu historioitsija, tietokirjailija Laura Kolbe Helsingistä. Kolmannessa osassa puhutaan rohkeudesta.
      - title: Aamusoitto
        start_time: '2026-07-22T07:06:00+03:00'
        end_time: '2026-07-22T08:00:00+03:00'
        description: |+
          Jenkins: Fantasia n:o 14 D-duuri (Phantasm).

          J.S. Bach: Allemande teoks. Ranskalainen sarja n:o 6 E-duuri (Murray Perahia, piano).

          Le Jeune: Lempeä sulho (The King's Singers ja The Consort of Musicke).

