      - title: 'Radio 1:n iltapäivä: Nina Tapio - ääni, joka lohduttaa'
        start_time: '2026-07-22T13:30:00+03:00'
        end_time: '2026-07-22T15:00:00+03:00'
        description: |-
          Juontajana Jalmari Laine. N. klo 14 Nina Tapio on laulaja, jonka ääni on yksi Suomen tunnetuimmista kevyen musiikin äänistä. Nyt NinaTapiolla on menossa konserttiprojekti nimeltä "Lohdun lauluja". Nina Tapio oli R1:n iltapäivän studiovieraana. Miia Lahti keskusteli Nina Tapion kanssa mm. äänestä, musiikin lohduttavasta voimasta ja myös äidinkielellä laulamisesta. Ohjelman ensilähetys oli 9.4.26. N. klo 14:30 Kirjailija Markku Heikkilä koki suuren elämyksen kuunnellessaan virolaisen kuoron esittämää Finlandiaa vuonna 1991. Viro oli juuri itsenäistynyt uudelleen ja kuorolaisten laulussa oli mukana väkevä tunne, joka tarttui myös kuuntelijoihin. Toimittajana on Juha Virtanen. 
      - title: 'Kulttuuriykkönen: Millaista on kirjoittaa romanttista viihdekirjallisuutta?'
        start_time: '2026-07-22T15:00:00+03:00'
        end_time: '2026-07-22T15:58:00+03:00'
        description: |-
          Romanttinen kirjallisuus, ja niin kutsuttu rakkausviihde, on suositumpaa kuin koskaan, ja etenkin kirjatiktokissa trendaavin genre. Kaksi kotimaista kirjailijaa, Anneli Vehkoo ja Tiina Lifländer kertovat ohjelmassa millaista on kirjoittaa romanttista viihdekirjallisuutta, miten hahmot syntyvät ja millainen on ollut polku kirjailijana.

          Tiina Lifländer on vaihtanut tyylilajia nykykaunosta feelgood-kirjallisuuteen. Uusin romaani Merta edemmäs kertoo Sinistä, joka ottaa vapaata töistä ja lähtee Walesiin. Rannikkokaupungin majatalon ikkunasta avautuva merimaisema lumoaa päähenkilön ja aamiaislautasen ääressä hänen ajatuksensa ajautuvat silti Suomeen ja sinne jääneeseen entiseen poikaystävään. Onko Sini tehnyt elämänsä suurimman virheen? 

          Pariisissa asuva Anneli Vehkoo kirjoittaa parisuhteen erilaisista vaiheista. Hänen neljäs  romaaninsa Kaksi askelta kaipuuseen kuvaa kahden aikuisen parisuhdetta ja arkea suuremman elämän kaipuuta. Se kertoo myös ulkomailla asumisesta, koti-ikävästä sekä Suomesta ja Ranskasta. Tapahtumat sijoittuvat Pariisiin ja Meaux'n historialliseen esikaupunkiin.  Miten kirjoitetaan romanttinen matkatarina? 

          Kummankin kirjailijan uutuusromaanissa kuvaillaan suomalaista päähenkilöä rakkauselämänsä pyörteissä romanttisissa eurooppalaismaisemissa kaukana kotoa Tiina Lifländerin romaanissa ollaan Walesissa ja Anneli Vehkoon romaanissa ollaan Pariisissa.

          Ohjelman vieraina ovat kirjailijat Anneli Vehkoo ja Tiina Lifländer.

          Ohjelman juontaa Pia-Maria Lehtola.



          Rentoa puhetta, kiinnostavimmat vieraat ja kulttuurin ajankohtaisaiheet debatoitavina. Suorana maanantaista perjantaihin.
