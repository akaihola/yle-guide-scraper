data:
  '':
    programmes:
      - title: 'Maisteri Lindgrenin musiikkiesitelmä: Miksi Maisteri rakastaa Bruckneria'
        start_time: '2026-07-17T11:00:00+03:00'
        end_time: '2027-07-16T23:59:00+03:00'
        description: |-
          ”Ja minun hirveä harhani oli se, että oudon pitkään sijoitin Brucknerin ja Mahlerin samaan laariin, eikä se mikään ihan pieni laari ollutkaan, pikemminkin tehdashalli, ja siellä muhivat nämä kaksi 75-minuuttisten sinfonioiden säveltäjää, jotka inspiroivat grandiositeettia potevia kapellimestareita, tosin sillä erolla, että grandioosit kapellimestarit johtavat mieluummin Mahleria kuin Bruckneria.” - Minna Lindgren esitelmöi.
      - title: Aamuhartaus
        start_time: '2026-07-24T06:50:00+03:00'
        end_time: '2026-07-24T06:59:59+03:00'
        description: |-
          Kirkkoherra Ilona Yliräisänen, Pelkosenniemi
      - title: Radio 1:n aamu
        start_time: '2026-07-24T08:07:00+03:00'
        end_time: '2026-07-24T09:00:00+03:00'
      - title: 'Maisteri Lindgrenin musiikkiesitelmä: Miten Verdi teki Shakespearen näytelmistä vielä alkuperäistä parempia'
        start_time: '2026-07-24T11:00:00+03:00'
        end_time: '2026-07-24T11:55:00+03:00'
        description: |-
          "Verdi on ainoa säveltäjä, joka on onnistunut tekemään kolme kestävää klassikko-oopperaa Shakespearen näytelmistä. Ne olivat suosittuja omana aikanaan, kuten monet muutkin Shakespeare-oopperat, mutta niiden ja vain niiden suosio on jatkunut tähän asti eikä loppua näy. Voi jopa sanoa, että Shakespeare elää Verdin ansiosta, sen verran harvoin Macbeth, Otello, Windsorin iloiset rouvat tai Kuningas Henrik -näytelmät nousevat puheteatterin näyttämölle muualla kuin Englannissa. - Minna Lindgren esitelmöi.
      - title: Päivän mietelause ja Turun tuomiokirkon kello lyö 12
        start_time: '2026-07-24T11:57:00+03:00'
        end_time: '2026-07-24T12:00:00+03:00'
        description: |-
          Ote Johan Ludvig Runebergin Lyyrillisiä runoelmia -kokoelman Idylliä ja Epigrammia -runosta. Suomentaja kaarlo Forsman.
      - title: 'Radio 1:n iltapäivä: Kirjani tarina - Kristiina Wallin kertoo romaanistaan Laituri'
        start_time: '2026-07-24T13:30:00+03:00'
        end_time: '2026-07-24T15:00:00+03:00'
        description: |-
          Juontajana Joni Timonen. Ymmärrämmekö elämästä jotain olennaista, jos uskallamme ajatella kuoleman vääjäämättömyyttä? Laituri-romaanin meren rannassa asuva kuvataitelija Hanna pohtii mitä ajan kuluminen, takana olevat vuodet ja muistot niin iloisista juhlista kuin elämän menetyksistä lopulta merkitsevät. Kirjailija Kristiina Wallin Jukka Kuosmasen vieraana. (Ohjelma on uusinta huhtikuulta.)
      - title: Kulttuuriykkönen
        start_time: '2026-07-24T15:00:00+03:00'
        end_time: '2026-07-24T15:58:00+03:00'
        description: |-
          Rentoa puhetta, kiinnostavimmat vieraat ja kulttuurin ajankohtaisaiheet debatoitavina. Suorana maanantaista perjantaihin.
      - title: 'Faijan vika valhe: Porilaisen orjan perintö'
        start_time: '2026-07-24T17:05:00+03:00'
        end_time: '2026-07-24T17:30:00+03:00'
        description: |
          Vintiltä löytynyt kirjeaarre vie Axan sukunimen syntymaille. Ei Saksan Kölniin, kuten faija väitti, vaan Kankaanpäähän, Pohjois-Satakunnan synkkiin nälkävuosiin. Siitä mielenmaisemasta sai alkunsa kipinä, joka ohjasi isovaari Jussi Fahlerin kohtaloa.
      - title: 'Näistä levyistä en luovu: Sirpa Kähkönen'
        start_time: '2026-07-24T17:35:00+03:00'
        end_time: '2026-07-24T18:30:00+03:00'
        description: |
          Kirjailija Sirpa Kähkönen kertoo itselleen tärkeästä musiikista. Toimittajana Maija Salminen. 
      - title: Iltahartaus
        start_time: '2026-07-24T18:50:00+03:00'
        end_time: '2026-07-24T19:00:00+03:00'
        description: |-
          Rovasti, toiminnanjohtaja Medialähetys Sanansaattajat Mikko Matikainen, Vantaa
      - title: 'Konsertteja: Kuhmon Kamarimusiikki – Villisti kaupunki'
        start_time: '2026-07-24T19:02:00+03:00'
        end_time: '2026-07-24T21:00:00+03:00'
        description: |-
          Kuhmon Kamarimusiikin konsertti vie matkalle Pariisiin ja New Yorkiin. Konsertissa saa kantaesityksensä Kuhmon Kamarimusiikin tilausteos, säveltäjä Cecilia Damströmin teos "Raakku", jonka kantaesitys on osa Oulun Euroopan kulttuuripääkaupunkivuoden juhlintaa. 20. heinäkuuta Kuhmo-talossa tallennetun konsertin toimittaa Ainomaija Pennanen.

          Kontrastien Pariisi:
          Maurice Ravel: Allegro sonaatista viululle ja sellolle
          Berit Cardas, viulu, ja Bjørg Lewis, sello

          Kiihkeä New York:
          George Gershwin: Rhapsody in Blue kahdelle pianolle
          Mackenzie Melemed ja Anna Laakso, piano

          Kansainvälinen Kuhmo:
          Cecilia Damström: Puhallinkvintetto ”Raakku” (Kuhmon Kamarimusiikin tilausteos,
          kantaesitys)
          Orsino Ensemble

          Kahviloiden Pariisi:
          Jean Françaix: L’Heure du Berger (Paimenen hetki) puhallinkvintetille ja pianolle
          Orsino Ensemble, Olli Mustonen, piano

          Kuva: ©Jonas Kukkonen
