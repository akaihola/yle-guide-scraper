      - title: Iltahartaus
        start_time: '2026-07-27T18:50:00+03:00'
        end_time: '2026-07-27T19:00:00+03:00'
        description: |-
          "Matteuksen evankeliumi: Kylväjävertauksen selitys"
          Näyttelijä Krista Kosonen lukee Matteuksen evankeliumia (13:18-13:58) UT2020 käännöksen mukaan. 10. jaksossa Jeesus selittää vertauksiensa merkitystä ja puhuu Taivaiden valtakunnasta.
