      - title: 'Keinuva talo - Mika Kauhanen: Aikamatka Euroopan etnovuoteen 1983'
        start_time: '2026-07-27T17:35:00+03:00'
        end_time: '2026-07-27T18:35:00+03:00'
        description: |
          Etnovuodesta 1983 kuulee, että syntikat ja chorus-pedaalit olivat saapuneet levytysstudioihin. Onneksi niitä osattiin käyttää tyylillä tuolloinkin. Vuosi oli hyvä vuosi, silloin uutta musiikkia julkaisivat mm. Clannad, Planxty, Amália Rodrigues ja Camarón de la Isla. Pelottavan ajankohtaiselta tuntuu Blowzabellan kappale Masters of War.

          Keinuvassa talossa tsuumataan siihen, millainen kansanmusiikki ja maailmanmusiikki innosti yleisöjä vuosikymmeniä sitten. Nostalginen minisarja kattaa vuodet 2003, 1993, 1983 ja 1973. Toimittajana Mika Kauhanen. Uusinta kesäkuulta 2023. 
