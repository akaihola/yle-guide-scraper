        description: |-
          Elämme kulttuurin häviämisen aikaa, sanoo ranskalaisprofessori Olivier Roy teoksessaan The Crisis of Culture (Kulttuurin kriisi). Kulttuuri korvautuu ohjeilla ja kärsimys-identiteeteillä. Miltä tilanne näyttää Suomessa? Royn kirjasta eskustelemassa kirjailija-toimittaja Iida Sofia Hirvonen sekä kriitikko Aleksis Salusjärvi. Jakke Holvas juontaa.
