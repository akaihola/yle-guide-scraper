      - title: 'Faijan vika valhe: Reposaari, paheiden pesä ja ahlaislaisten Amerikka'
        start_time: '2026-07-27T17:05:00+03:00'
        end_time: '2026-07-27T17:30:00+03:00'
        description: |
          Miten Jussi Fahlerista, herkästä runopojasta, tuli radikaali vallankumousaktiivi? Yksi vastaus
          löytyy Reposaaresta, 1910-luvun vilkkaasta kauppasatamasta, jossa rankka työ maksoi
          rankat huvit. Axa huomaa, että Jussi ei osannut painaa jarrua oikeaan aikaan. Niin tämä
          ajautui mukaan sisällissotaa edeltävään loppurynnistykseen.
