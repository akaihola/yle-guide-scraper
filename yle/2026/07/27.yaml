      - title: 'Väkivallan markkinat: Laiton ase on rikollisen statussymboli'
        start_time: '2026-07-27T19:02:00+03:00'
        end_time: '2026-07-27T19:50:00+03:00'
        description: |
          “Mika” myi parikymmentä vuotta kokaiinia, ja siihen maailmaan kuuluivat nopeasti myös aseet. Ensimmäiset asekauppansa hän teki huoltoaseman pihalla. Aluksi ase oli hänelle machoilun väline, kunnes “Mika” alkoi kokea sen välttämättömäksi. Miten Suomessa hankitaan laiton ase? 
      - title: Mannerheimin agentti
        start_time: '2026-07-27T20:05:00+03:00'
        end_time: '2026-07-27T20:25:00+03:00'
        description: |-
          Jakso 9/10: Kirje Kekkoselle.
          Kaksi vuotta ennen kirjansa julkaisua Tahvanainen kirjoitti presidentti Kekkoselle ja ulkoasiainministeri Karjalaiselle pyytäen näiden mielipidettä eräässä poliittisesti tulenarassa asiassa.

          Koskinen ja Oikuri ovat kansallisarkistossa lukemassa kyseistä pitkää kirjettä. Mitä kirje piti sisällään ja miten siihen reagoitiin? Jaksossa kuullaan myös Tahvanaisen vierailu Yleisradion Tässä ja nyt -ohjelmassa vuonna 1971.
      - title: 'Hanna Tikanderin toiset todellisuudet: “Sain yhteyden kuolleeseen shamaaniopettajaani hengitysharjoituksen avulla”'
        start_time: '2026-07-27T20:25:00+03:00'
        end_time: '2026-07-27T21:00:00+03:00'
        description: |
          Janne on omien sanojensa mukaan aivan pärähtänyt hengitystekniikkaan nimeltä breathwork. Sen avulla voi Jannen mukaan kokea henkimaailman läsnäoloa, purkaa omia traumoja ja vaikeita tunteita. 
          Syvähengitys, jooga ja muut henkisen maailman harjoitukset auttoivat Jannea pääsemään eroon päihteiden täyteisestä elämästä. Yhteys itseen sekä elämän tarkoituksen löytäminen kannattelevat nyt Jannea.
