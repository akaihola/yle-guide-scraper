      - title: 'Romanitarinoita: Nuorena valittu, uskollisesti kuljettu – Joni Enroth'
        start_time: '2026-07-19T23:12:00+03:00'
        end_time: '2026-07-19T23:37:00+03:00'
        description: |
          Miltä tuntuu, kun kutsumus löytyy jo 15-vuotiaana – ja sydän tietää suunnan, vaikka maailma tarjoaa vaihtoehtoja?
          Joni Enrothin tarina on vahva muistutus siitä, että nuoruudessa tehty valinta voi kantaa pitkälle. Hän on kulkenut pitkän matkan musiikin parissa: kokenut, oppinut ja samalla kasvanut isäksi ja esikuvaksi.
          Joni ei ainoastaan laula – hän kantaa viestiä, joka koskettaa ja rakentaa.
