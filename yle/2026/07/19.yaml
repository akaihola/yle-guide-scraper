      - title: 'Klassikkokuunnelma: Työmiehen perhe'
        start_time: '2026-07-19T15:00:00+03:00'
        end_time: '2026-07-19T15:20:00+03:00'
        description: |-
          Jakso 14: Kun kuolleetkin heräävät
          Hella Wuolijoen kirjoittama ja ohjaama sarja kertoo Kustaa Rantasen työläisperheen tarinan Suomen yhteiskuntahistorian avainkohtien kautta. Sarja alkaa 1800-luvun lopusta ja kattaa vuodet aina sen tekohetkeen 1950-luvun alkuun saakka. Kysymykset niin torppareiden asemasta, kaupungistumisesta, kansalaissodasta kuin lapualaisvuosistakin tulivat käsitellyiksi Rantasen perheen vaiheiden kautta. 
      - title: 'Klassikkokuunnelma: Työmiehen perhe'
        start_time: '2026-07-19T15:20:00+03:00'
        end_time: '2026-07-19T15:40:00+03:00'
        description: |-
          Osa 15/22 Liisukka menee naimisiin

          Hella Wuolijoen kirjoittama ja ohjaama sarja kertoo Kustaa Rantasen työläisperheen tarinan Suomen yhteiskuntahistorian avainkohtien kautta. Sarjan tapahtumat alkavat 1800-luvun lopun Suomesta ja jatkuvat aina 1950-luvulle asti. Sarjassa käsitellään mm. kaupungistumista, maanviljelijän asemaa ja kansalaissotaa.
      - title: Etnokonsertteja
        start_time: '2026-07-19T17:06:00+03:00'
        end_time: '2026-07-19T18:00:00+03:00'
        description: |
          Vojvodian romanialaisten kansanmusiikkiorkesteri konsertoi Festivalul de Romanțe -festivaalilla Zrenjanin kaupungin historiallisessa Toša Jovanovićin teatterissa 26.9.2025. Konsertissa kuullaan 1800-luvun lopulla kaupungeissa syntynyttä melodista ja tunteikasta Romanță-laulua, jonka teemat liikkuvat rakkaudesta kaipaukseen. Toimittajana on Miika Lauriala. 
