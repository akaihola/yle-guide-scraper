        description: |-
          Mitkä kolme asiaa suomalaisten olisi vähintään tärkeä ymmärtää Afrikan mantereesta? Ylen ulkomaantoimittaja Eeva Eronen vetää yhteen kaksi vuotta kestänyttä Afrikan-kirjeenvaihtajan pestiään ja kertoo millaista on raportoida kokonaisesta mantereesta yksin. Haastattelijana on Leonard Wilhelmus.
