      - title: Faunin iltapäivä
        start_time: '2026-07-19T16:07:00+03:00'
        end_time: '2026-07-19T16:59:59+03:00'
        description: |-
          Wolf-Ferrari: Alkusoitto ja intermezzo oopp. Susannan salaisuus (BBC:n FO/Gianandrea Noseda).

          Fauré: Le secret (Salaisuus) (Anne Sofie von Otter, mezzosopraano, ja Bengt Forsberg, piano).

          Mompou: Secreto (Salaisuus) (Stephen Hough, piano).

          T. Kuusisto: Unelma (Ylioppilaskunnan Laulajat/Heikki Peltola, ja Pertti Saurola, baritoni).

          Nielsen: Intermezzo teoks. Pieni sarja a-molli (Royal Strings/Magnus Ericsson).

          Sibelius: Reverie (Unelma) (Eero Heinonen, piano).

          Mendelssohn: Nokturni näyt. Kesäyön unelma (Orpheus-kamariorkesteri).

          Liszt: Liebestraum n:o 3 (Jussi Makkonen, sello, ja Rait Karm, piano).

          Simon: How could I ever know musik. The secret garden (Renée Fleming, sopraano, Bryn Terfel, bassobaritoni, ja Walesin kansallisoopperan ork./Paul Gemignani).

          Rozsa: English waltz (Vienna In Scotland) elok. The private life of Sherlock Holmes (Nürnbergin sinfonikot/Elmer Bernstein).

          Konsertin on laatinut Inari Tilli. 
      - title: 'Etnokonserti Romanță-lauluja Vojvodinasta '
        start_time: '2026-07-19T17:06:00+03:00'
        end_time: '2026-07-19T18:00:00+03:00'
        description: |
          Vojvodian romanialaisten kansanmusiikkiorkesteri konsertoi Festivalul de Romanțe -festivaalilla Zrenjanin kaupungin historiallisessa Toša Jovanovićin teatterissa 26.9.2025. Konsertissa kuullaan 1800-luvun lopulla kaupungeissa syntynyttä melodista ja tunteikasta Romanță-laulua, jonka teemat liikkuvat rakkaudesta kaipaukseen. Toimittajana on Miika Lauriala. 
