      - title: 'Elävä historia: Pronssikauden romahdus: kun itäisen Välimeren verkostoitunut maailma hajosi'
        start_time: '2026-07-19T12:05:00+03:00'
        end_time: '2026-07-19T12:55:00+03:00'
        description: |-
          Pronssikautinen maailma oli varsin kansainvälinen. Itäisen Välimeren kulttuurit kävivät keskenään kauppaa ja solmivat diplomaattisia kontakteja. Noin 3000 vuotta sitten järjestelmä hajosi ja useat kulttuurit romahtivat. Haastateltavina Lähi-idän tutkimuksen dosentti Joanna Töyräänvuori, Suomen Lähi-idän instituutti, ja Vanhan testamentin eksegetiikan dosentti Kirsi Valkama, Helsingin yliopisto. Toimittajana Riikka Suikkari.
      - title: Lumottuja Välilevyjä
