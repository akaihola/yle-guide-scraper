      - title: 'Klassikkokuunnelma: Työmiehen perhe'
        start_time: '2026-07-18T21:51:00+03:00'
        end_time: '2026-07-18T22:30:00+03:00'
        description: |-
          Jakso 12/22: Paljon on kärsitty vilua ja nälkää
          Hella Wuolijoen kirjoittama ja ohjaama sarja kertoo Kustaa Rantasen työläisperheen tarinan Suomen yhteiskuntahistorian avainkohtien kautta. Sarja alkaa 1800-luvun lopusta ja kattaa vuodet aina sen tekohetkeen 1950-luvun alkuun saakka. Kysymykset niin torppareiden asemasta, kaupungistumisesta, kansalaissodasta kuin lapualaisvuosistakin tulivat käsitellyiksi Rantasen perheen vaiheiden kautta. 
      - title: 'Klassikkokuunnelma: Työmiehen perhe'
        start_time: '2026-07-18T21:51:00+03:00'
        end_time: '2026-07-18T22:30:00+03:00'
        description: |-
          Osa 13/22: Elämä asettuu
          Hella Wuolijoen kirjoittama ja ohjaama sarja kertoo Kustaa Rantasen työläisperheen tarinan Suomen yhteiskuntahistorian avainkohtien kautta. Sarjan tapahtumat alkavat 1800-luvun lopun Suomesta ja jatkuvat aina 1950-luvulle asti. Sarjassa käsitellään mm. kaupungistumista, maanviljelijän asemaa ja kansalaissotaa.
      - title: 'Keinuva talo - Mika Kauhanen: Kaupunkikansan musiikit: Dublin'
        start_time: '2026-07-18T22:40:00+03:00'
        end_time: '2026-07-18T23:39:30+03:00'
        description: |
          Irlannin pääkaupunkiin Dubliniin kukaan ei lähde sään vuoksi, mutta musiikin takia sinne todella kannattaa matkustaa. Missä muualla sävelmät olisivat niin hilpeät, laulut niin haikeat?

          Paikkana Dublin on paitsi miljöö myös aihe maailmankirjallisuuden klassikoille ja unohtumattomille lauluille. Esimerkiksi Rocky Road to Dublin, Molly Malone, Dublin Saunter, The Raglan Road ovat innoittaneet kymmeniä ellei satoja levytyksiä. 

          Vihreän saaren musiikkia tapaillaan kaikkialla maailmassa irkkumusiikin intomielisten harrastajien keskuudessa: jotain yleismaailmallisesti puhuttelevaa siinä täytyy olla. Dublinin musiikillisen kartan maamerkkeihin johdattelee toimittaja Mika Kauhanen.
