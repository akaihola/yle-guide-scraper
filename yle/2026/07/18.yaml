      - title: 'Hanna Tikanderin toiset todellisuudet: ‘Mulla on kirjallinen sopimus henkimaailman oppaiden kanssa”'
        start_time: '2026-07-18T10:25:00+03:00'
        end_time: '2026-07-18T11:00:00+03:00'
        description: |
          Marjaana alkoi saada automaattikirjoituksella viestejä edesmenneeltä isältä ja se muutti elämänsä suunnan. Henkiseen maailmaan tarkemmin tutustuttuaan, hän ymmärsi olevansa meedio.
          Marjaana kertoo, että meedio on välittäjä tuonpuoleisen ja näkyvän maailman välillä. Viestit voivat hänen mukaansa olla myös humoristisia, ja aina - rakkaudellisia.
          Marjaana on etsinyt henkioppaansa kuvan netistä ja kertoo podcastissa paljon yksityiskohtia entisistä elämistään.
      - title: 'Virtasen taloushistoria: Hangon sotilasleiri'
        start_time: '2026-07-18T11:00:00+03:00'
        end_time: '2026-07-18T11:52:00+03:00'
        description: |
          Hangon Tulliniemessä sijaitsi jatkosodan aikana saksalainen sotilasleiri. Siellä majoittuneet olivat pääasiassa lomalle menijöitä tai lomalta palaavia. Arkeologi, filososofian tohtori Jan Fast on tutkinut Hangon Tulliniemen jatkosodan aikaista saksalaisten sotilasleiriä. Jo ensimmäisenä tutkimusvuotena alueelta löytyi yli kymmenentuhatta esinettä. Mitä esineistä voidaan päätellä? Millaista saksalaissotilaiden elämä leirissä oli? Toimittaja on Juha Virtanen. Ohjelma on uusinta lokakuulta 2025.
      - title: Päivän mietelause ja Turun tuomiokirkon kello lyö 12
        start_time: '2026-07-18T11:57:00+03:00'
        end_time: '2026-07-18T12:00:00+03:00'
        description: |-
