      - title: 'Maailma tarinoina: Interstellar ja ihmisen paikka maailmankaikkeudessa'
        start_time: '2026-07-18T12:05:00+03:00'
        end_time: '2026-07-18T13:00:00+03:00'
        description: |-
          Christopher Nolanin Interstellar (2014) on scifi-spektaakkeli, jossa avaruuden ja ajan ulottuvuudet, suhteellisuusteoria ja musta aukko limittyvät ympäristökatastrofiin, sekulaariin pelastuskertomukseen sekä kosmisen yksinäisyyden ja yhteyden kaipuun kuvaukseen. Elokuva sysää pohtimaan, onko ihmisen pelastautuminen toiselle planeetalle parempi pitää vain scifi-tarinana? Voiko Interstellaria tulkita simulaatioteorian valossa? Miten Maan ulkopuolisen elämän mahdollisuus vaikuttaa maailmankatsomukseen ja ihmisen rooliin osana maailmankaikkeutta? 
          Avaruudellisella ajatusmatkalla Marja Vehkasen kanssa ovat astrofyysikko Sissi Enestam ja teologian tohtori Vesa Nissinen.
