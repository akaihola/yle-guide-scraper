data:
  '':
    programmes:
      - title: 'Maisteri Lindgrenin musiikkiesitelmä: Miksi Maisteri rakastaa Bruckneria'
        start_time: '2026-07-17T11:00:00+03:00'
        end_time: '2027-07-16T23:59:00+03:00'
        description: |-
          ”Ja minun hirveä harhani oli se, että oudon pitkään sijoitin Brucknerin ja Mahlerin samaan laariin, eikä se mikään ihan pieni laari ollutkaan, pikemminkin tehdashalli, ja siellä muhivat nämä kaksi 75-minuuttisten sinfonioiden säveltäjää, jotka inspiroivat grandiositeettia potevia kapellimestareita, tosin sillä erolla, että grandioosit kapellimestarit johtavat mieluummin Mahleria kuin Bruckneria.” - Minna Lindgren esitelmöi.
      - title: Yöklassinen
        start_time: '2026-07-17T23:40:00+03:00'
        end_time: '2026-07-18T07:30:00+03:00'
      - title: 'Kirjani tarina:  Liisa Louhela kertoo romaanistaan Mies joka kantoi aurinkoa sylissään '
        start_time: '2026-07-18T07:31:00+03:00'
        end_time: '2026-07-18T07:55:00+03:00'
        description: |
          Vieraana on Mies joka kantoi aurinkoa sylissään -romaanin kirjoittanut Liisa Louhela. Toimittajana Tina Cavén.
      - title: Aamuhartaus
        start_time: '2026-07-18T08:25:00+03:00'
        end_time: '2026-07-18T08:35:00+03:00'
        description: |-
          Pastori Mika Partanen, Metodistikirkko, Tampere
      - title: 'Maailman tärkein pieni asia: nukkekotiharrastaja Eija Luoto'
        start_time: '2026-07-18T08:40:00+03:00'
        end_time: '2026-07-18T09:00:00+03:00'
        description: |
          Eija Luoto on nukkekotiharrastaja. Toimittajana Maija Salminen. 
      - title: Muistojen bulevardi
        start_time: '2026-07-18T09:04:00+03:00'
        end_time: '2026-07-18T09:59:00+03:00'
        description: |+
          Monnot: La goualante du pauvre Jean (Edith Piaf).
          Kansanlaulu: Vieni sul mar (Enrico Caruso).
          Sigman: Buona sera (Louis Prima).
          Fomin: Oi niitä aikoja (Päivi Paunu).
          Roland: Sommar, sommar, sommar (Anders Börje).
          Gershwin: I got plenty o' nuttin' (Sammy Davis, Jr.).
          Wiener: Wenn es Nacht wird in Paris (Caterina Valente).
          Rajula: Kahta en unhoita (Arvi Tikkala).
          Dorset: In the summertime (Mungo Jerry).
          Bechet: Petite fleur (Danielle Darrieux).
          DeLugg/Hilliard: (Why did I tell you I was going to) Shanghai (Doris Day).
          Almaran: Rakkauden satu (Helena Siltala).
          Brooker/Keith: Grand hotel (Procol Harum).

          Konsertin on laatinut Pasi Hiihtola. 

      - title: 'Hanna Tikanderin toiset todellisuudet: ‘Mulla on kirjallinen sopimus henkimaailman oppaiden kanssa”'
        start_time: '2026-07-18T10:25:00+03:00'
        end_time: '2026-07-18T11:00:00+03:00'
        description: |
          Marjaana alkoi saada automaattikirjoituksella viestejä edesmenneeltä isältä ja se muutti elämänsä suunnan. Henkiseen maailmaan tarkemmin tutustuttuaan, hän ymmärsi olevansa meedio.
          Marjaana kertoo, että meedio on välittäjä tuonpuoleisen ja näkyvän maailman välillä. Viestit voivat hänen mukaansa olla myös humoristisia, ja aina - rakkaudellisia.
          Marjaana on etsinyt henkioppaansa kuvan netistä ja kertoo podcastissa paljon yksityiskohtia entisistä elämistään.
      - title: Virtasen taloushistoria
        start_time: '2026-07-18T11:00:00+03:00'
        end_time: '2026-07-18T11:52:00+03:00'
        description: |-
          Tarinoita talouden myllerryksistä. Juha Virtanen sukeltaa taloushistorian syövereihin uteliaana ja ihmetellen, miksi asiat ovat niin kuin ne ovat
      - title: 'Viihdekuunnelma: Emma'
        start_time: '2026-07-18T15:00:00+03:00'
        end_time: '2026-07-18T15:25:00+03:00'
        description: |
          Osa 7/8 Huviretki 
          Emma ja hänen ystäväpiirinsä päättävät tehdä retken läheiselle Box Hillille. Huviretken tunnelma on kuitenkin vaisu eikä se parane Emman ikävän käytöksen myötä. Herra Knightley moittii Emmaa ajattelemattomuudesta. Myöhemmin Emma saa kuulla, että Jane Fairfax aikoo lähteä Highburysta, samoin herra Knightley. Emma jää kaksin iäkkään isänsä kanssa ja joutuu kohtaamaan omat virheensä. 
      - title: 'Aristoteleen kantapää: Alkuperäiskansat ovat tietämättään antaneet nimen suurimmalle osalle Yhdysvaltain osavaltioista'
        start_time: '2026-07-18T15:30:00+03:00'
        end_time: '2026-07-18T15:55:00+03:00'
        description: |
          Pasi Heikura selvittää Yhdysvaltojen osavaltioiden nimien taustoja yhdessä Kotimaisten kielten keskuksen nimistönhuoltaja Ulla Onkamon kanssa. Ohjelmassa ihmetellään myös, mitä tapahtuu, kun ilma lähtee pihasta.
          Ohjelman ovat toimittaneet Pasi Heikura ja Tina Cavén.
      - title: Marko Gustafssonin vieraana ex-jalkapalloilija Essi Sainio
        start_time: '2026-07-18T17:05:00+03:00'
        end_time: '2026-07-18T17:58:00+03:00'
        description: |
          “Olin kärsinyt jo pitkään syömishäiriöstä, mutta en tunnistanut, enkä halunnut myöntää sitä”, Essi muistelee. Raja tuli vastaan, kun Essi eräänä päivänä istahti harjoituksissa nurmelle eikä pystynyt enää liikkumaan. “Valmentajan kanssa sovimme, että pidän viikon tauon”, Essi hymähtää. Essin taistelu psyykkisten ja fyysisten oireiden kanssa kesti kolme pitkää vuotta.
          Mutta hän voitti ja palasi kentille ja aina huipulle maajoukkueeseen asti. Ohjelma on uusinta ajalta 27.2.2025.
      - title: 'Ehtookellot: Iitin kirkon kellot'
        start_time: '2026-07-18T18:00:00+03:00'
        end_time: '2026-07-18T18:01:00+03:00'
      - title: Iltahartaus
        start_time: '2026-07-18T18:01:00+03:00'
        end_time: '2026-07-18T18:10:00+03:00'
        description: |-
          "Kumpi on lyhty ja kumpi on kuu?"
          Lauantai-illan rukoushetkessä verkkoviestintäpäällikkö Hanna Paavilainen Helsingistä kertoo pimeässä suunnistavista yöperhosista ja valosta, joka pitää lentokurssin suorana.
          Rukoushetkessä 1. Mooseksen kirjaa uuden käännöksen mukaan lukee näyttelijä Krista Kosonen.
      - title: 'Musiikkikamari: Klassisen musiikin helmiä'
        start_time: '2026-07-18T19:02:00+03:00'
        end_time: '2026-07-18T21:00:00+03:00'
        description: |+
          Beethoven: Adelaide (Dietrich Fischer-Dieskau, baritoni, ja Hertha Klust, piano).

          Beethoven: Pianosonaatti n:o 8 c-molli (Pateettinen) ja n:o 14 cis-molli (Kuutamo) (Ivan Moravec).

          Grieg: Peer Gynt, näytelmämusiikkia (Urban Malmberg, baritoni, MariAnne Häggander, mezzosopraano Wendy Hoffman, sopraano, Merilyn Vaughn, sopraano, Wendy White, sopraano, ja San Franciscon SO ja -kuoro/Herbert Blomstedt). 

          Kaski: Vuorenpeikkojen iltasoitto (Juhani Lagerspetz, piano).

