          Konsertin on koonnut Pasi Hiihtola.
      - title: 'Hanna Tikanderin toiset todellisuudet: “Sain yhteyden kuolleeseen shamaaniopettajaani hengitysharjoituksen avulla”'
        start_time: '2026-07-25T10:25:00+03:00'
        end_time: '2026-07-25T11:00:00+03:00'
        description: |
          Janne on omien sanojensa mukaan aivan pärähtänyt hengitystekniikkaan nimeltä breathwork. Sen avulla voi Jannen mukaan kokea henkimaailman läsnäoloa, purkaa omia traumoja ja vaikeita tunteita. 
          Syvähengitys, jooga ja muut henkisen maailman harjoitukset auttoivat Jannea pääsemään eroon päihteiden täyteisestä elämästä. Yhteys itseen sekä elämän tarkoituksen löytäminen kannattelevat nyt Jannea.
      - title: 'Virtasen taloushistoria: Tervakoski - työläisten paratiisi'
        start_time: '2026-07-25T11:00:00+03:00'
        end_time: '2026-07-25T11:52:00+03:00'
