      - title: 'Konsertti: Sastamala Gregoriana – Iloa ja surua'
        start_time: '2026-07-25T19:02:00+03:00'
        end_time: '2026-07-25T21:00:00+03:00'
        description: |-
          Sastamala Gregoriana: Iloa ja surua
          Kreeta-Maria Kentala, viulu
          Andrew Lawrence-King, harppu

          "Kyyneleet, joita musiikki tuottaa, voivat olla myös miellyttäviä", sanoo John Dowland Seven Tears -nuottikirjansa esipuheessa. Tässä ohjelmassa saattaa tulla liikutuksen tippa silmäkulmaan. Konsertti yhdistää barokkimusiikkia eteläpohjalaisiin polskiin.

          Duke of Norfolk, kokoelmasta John Playford: Division violin 1684 

          Heinrich Ignaz Franz Biber (1644-1704): Sonata Representativa: 
          Nachtigall (Satakieli) - CuCu (Käki) - Frosch (Sammakko) - Die Henne (Kana) - Der Hahn (Kukko) - Die Wachtel (Viiriäinen) - Die Katz (Kissa) - Musketier Marsch (Musketöörien marssi)

          Wiljami Niittykoski (1895-1985): Surunvoittoinen marssi & Iloa ja surua (polska) 

          Nicola Matteis (n.1650-1713): Passaggio Rotto - Himlens polska (trad.) - 
          Giovanni Antonio Pandolfi Mealli (1624-n.1687): La Stella 

          John Dowland (1563-1626): From Lachrymae or Seven Tears (1604): 
          -Pavana Lachrimae Antiquae
          -Galliards: Sir John Souch, Mr Nicholas Gryffith, King of Denmark, Earl of Essex

          Biber: Taivaaseenastuminen kokoelmasta Mysteerisonaatit - Niittykoski: Verkkokankaan marssi 

          Tyrvään pappilan kivinavetassa äänitetyn konsertin toimittaa Noora Hirn. Äänisuunnittelijana Jari Rantakaulio ja äänitarkkailijana Hannu Perälä.

          Kuva: Jaani Föhr / Oulun juhlaviikot
