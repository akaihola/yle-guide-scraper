      - title: 'Kirjani tarina: Kristiina Wallin kertoo romaanistaan Laituri'
        start_time: '2026-07-25T07:31:00+03:00'
        end_time: '2026-07-25T07:55:00+03:00'
        description: |-
          Ymmärrämmekö elämästä jotain olennaista, jos uskallamme ajatella kuoleman vääjäämättömyyttä? Laituri-romaanin meren rannassa asuva kuvataitelija Hanna pohtii mitä ajan kuluminen, takana olevat vuodet ja muistot niin iloisista juhlista kuin elämän menetyksistä lopulta merkitsevät. Kirjailija Kristiina Wallin Jukka Kuosmasen vieraana.
      - title: Aamuhartaus
        start_time: '2026-07-25T08:25:00+03:00'
