      - title: Päivän mietelause ja Turun tuomiokirkon kello lyö 12
        start_time: '2026-07-25T11:57:00+03:00'
        end_time: '2026-07-25T12:00:00+03:00'
        description: |-
          Joel Lehtosen Hyvästijättö Lintukodolle  -kokoelman runo Vain yksi ihminen.
      - title: 'Maailma tarinoina: Prometheus, Chaplin ja Jokeri - mitä triksterit kertovat ihmisyydestä?'
        start_time: '2026-07-25T12:05:00+03:00'
        end_time: '2026-07-25T13:00:00+03:00'
        description: |-
          Mitä yhteistä on sarjakuvista, elokuvista ja tv-sarjoista tutulla Jokerilla, Charles Chaplinin kulkuri-hahmolla, Andy Kaufmanilla tai kreikkalaisen mytologian Prometheuksella? Kaikkia näitä voi pitää trikstereinä, eli kujeilijoina, jotka haastavat sääntöjä, auktoriteetteja ja moraalikäsityksiä. Mikään ei pidättele monikasvoisia trikstereitä, ei edes sukupuoli. Miten triksterit liittyvät psykiatri Carl Gustav Jungin käsitykseen ihmisyydestä? Ketkä voisi nähdä trikstereinä tosielämän puolella?
          Marja Vehkasen kanssa kujeilijoiden ydintä ja moninaisuutta hahmottaa trikstereistä kirjaansa viimeistelevä huumorin filosofian dosentti Jarno Hietalahti.
      - title: 'Näistä levyistä en luovu: Sirpa Kähkönen'
        start_time: '2026-07-25T13:00:00+03:00'
        end_time: '2026-07-25T13:55:00+03:00'
        description: |
          Kirjailija Sirpa Kähkönen kertoo itselleen tärkeästä musiikista. Toimittajana Maija Salminen. 
      - title: 'Viihdekuunnelma: Emma '
        start_time: '2026-07-25T15:00:00+03:00'
        end_time: '2026-07-25T15:25:00+03:00'
        description: |
          Osa 8/8: Kosinta 
          Rouva Weston on saanut yllättäviä uutisia ja kutsuu Emman luokseen. 
          Ystävien salaisuudet paljastuvat yksi toisensa jälkeen Emmalle, joka on aina ajatellut näkevänsä itse kunkin sydämeen. Ja nyt hän ymmärtää olleensa todella väärässä.
          Viimein Emma kohtaa omat tunteensa ja oivaltaa kenen kädessä hänen onnensa oikeastaan on - ellei se ole vain jo liian myöhäistä. 
      - title: 'Aristoteleen kantapää: Sweetbaby, Moneymaker, Tanskan vienti - rakkaalla tomaatilla on tuhansia lajikkeita'
        start_time: '2026-07-25T15:30:00+03:00'
        end_time: '2026-07-25T15:55:00+03:00'
        description: |
          Pasi Heikura uppoutuu tomaattiasiantuntija ja viljelyneuvoja Jorma Seppälän kanssa tomaattilajikkeiden mehevään maailmaan. Viikon fraasirikoksessa mietitään haastateltavaa, jonka huulet ovat sidotut. Ohjelman ovat toimittaneet Pasi Heikura ja Tina Cavén. Ohjelma on uusinta.
      - title: Faunin iltapäivä
