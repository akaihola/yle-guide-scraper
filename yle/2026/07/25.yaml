  '':
    programmes:
      - title: 'Maisteri Lindgrenin musiikkiesitelmä: Miksi Maisteri rakastaa Bruckneria'
        start_time: '2026-07-17T11:00:00+03:00'
        end_time: '2027-07-16T23:59:00+03:00'
        description: |-
          ”Ja minun hirveä harhani oli se, että oudon pitkään sijoitin Brucknerin ja Mahlerin samaan laariin, eikä se mikään ihan pieni laari ollutkaan, pikemminkin tehdashalli, ja siellä muhivat nämä kaksi 75-minuuttisten sinfonioiden säveltäjää, jotka inspiroivat grandiositeettia potevia kapellimestareita, tosin sillä erolla, että grandioosit kapellimestarit johtavat mieluummin Mahleria kuin Bruckneria.” - Minna Lindgren esitelmöi.
      - title: 'Kirjani tarina: Kristiina Wallin kertoo romaanistaan Laituri'
        start_time: '2026-07-25T07:31:00+03:00'
        end_time: '2026-07-25T07:55:00+03:00'
        description: |-
          Ymmärrämmekö elämästä jotain olennaista, jos uskallamme ajatella kuoleman vääjäämättömyyttä? Laituri-romaanin meren rannassa asuva kuvataitelija Hanna pohtii mitä ajan kuluminen, takana olevat vuodet ja muistot niin iloisista juhlista kuin elämän menetyksistä lopulta merkitsevät. Kirjailija Kristiina Wallin Jukka Kuosmasen vieraana.
      - title: Aamuhartaus
        start_time: '2026-07-25T08:25:00+03:00'
        end_time: '2026-07-25T08:35:00+03:00'
        description: |-
          "Ajattoman maailman rauhaa"
          Kanttori Valeria Rahilainen, Ortodoksinen kirkko, Jyväskylä rohkaisee löytämään iloa jakamisesta ja rauhaa Jumalan rakkaudesta.
      - title: 'Maailman tärkein pieni asia: Heidi Nordström'
        start_time: '2026-07-25T08:40:00+03:00'
        end_time: '2026-07-25T09:00:00+03:00'
        description: |
          Heidi Nordströmin elämäntapa on saabismi. Toimittajana Maija Salminen. 
      - title: Muistojen bulevardi
        start_time: '2026-07-25T09:04:00+03:00'
        end_time: '2026-07-25T09:59:00+03:00'
        description: |
          Hoffman/Goodhart/Sigler: Why don't you practice what you preach? (The Boswell Sisters).
          Jurva: Ihminen älä hermostu (Matti Jurva).
          Astaire: Not my girl (Fred Astaire).
          Porter: Begin the beguine (Irene Manning).
          Brel: Days of the waltz (Liza Minnelli).
          Durand: Pariisin neitonen (Olavi Virta).
          Monnot: Les amants d'un jour (Edith Piaf).
          Lawrence/Gross: Tenderly (Rosemary Clooney).
          Leandros/Munro: Ich liebe das Leben (Vicky Leandros).
          Bricusse/Newley: Gonna build a mountain (Sammy Davis, Jr.).
          LaRocca: Tiger rag (Louis Armstrong).
          Lennon/McCartney: Goodbye (Mary Hopkin).
          Albert: Dis-lui (Mike Brant).

          Konsertin on koonnut Pasi Hiihtola.
      - title: 'Hanna Tikanderin toiset todellisuudet: “Sain yhteyden kuolleeseen shamaaniopettajaani hengitysharjoituksen avulla”'
        start_time: '2026-07-25T10:25:00+03:00'
        end_time: '2026-07-25T11:00:00+03:00'
        description: |
          Janne on omien sanojensa mukaan aivan pärähtänyt hengitystekniikkaan nimeltä breathwork. Sen avulla voi Jannen mukaan kokea henkimaailman läsnäoloa, purkaa omia traumoja ja vaikeita tunteita. 
          Syvähengitys, jooga ja muut henkisen maailman harjoitukset auttoivat Jannea pääsemään eroon päihteiden täyteisestä elämästä. Yhteys itseen sekä elämän tarkoituksen löytäminen kannattelevat nyt Jannea.
      - title: 'Virtasen taloushistoria: Tervakoski - työläisten paratiisi'
        start_time: '2026-07-25T11:00:00+03:00'
