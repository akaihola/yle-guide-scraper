      - title: 'Uutispodcast: Naisia kiusataan ja häiritään intissä – miten se saadaan loppumaan?'
        start_time: '2026-07-25T21:00:31+03:00'
        end_time: '2026-07-25T21:23:22+03:00'
        description: |-
          Naisia kohdellaan yhä erittäin usein epäasiallisesti varusmiespalveluksessa. Noin 40 prosenttia palveluksen suorittavista naisista kokee palveluksen aikana häirintää tai kiusaamista. Miksi häirintä on edelleen niin yleistä? Ylen politiikan toimittaja Kalle Hyttinen on Leonard Wilhelmuksen haastateltavana.
      - title: 'Klassikkokuunnelma: Työmiehen perhe'
        start_time: '2026-07-25T21:53:00+03:00'
        end_time: '2026-07-25T22:13:03+03:00'
        description: |-
          Jakso 14: Kun kuolleetkin heräävät
          Hella Wuolijoen kirjoittama ja ohjaama sarja kertoo Kustaa Rantasen työläisperheen tarinan Suomen yhteiskuntahistorian avainkohtien kautta. Sarja alkaa 1800-luvun lopusta ja kattaa vuodet aina sen tekohetkeen 1950-luvun alkuun saakka. Kysymykset niin torppareiden asemasta, kaupungistumisesta, kansalaissodasta kuin lapualaisvuosistakin tulivat käsitellyiksi Rantasen perheen vaiheiden kautta. 
      - title: 'Klassikkokuunnelma: Työmiehen perhe'
