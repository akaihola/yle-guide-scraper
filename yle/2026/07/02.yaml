      - title: Tuuli Saksalan keidas
        start_time: '2026-07-02T17:35:00+03:00'
        end_time: '2026-07-02T18:25:00+03:00'
        description: |
          Tiesitkö, että brasilialainen jalkapallolegenda Pelé teki yli sata laulua, useat salanimellä? Tai että suomenjuutalaiseen perinteeseen kuuluu satiiri jalkapallotähdistä jo vuodelta 1910? Tuuli Saksalan Keitaalla kuullaan Pelén ja espanjalaisen puolustajan Sergio Ramoksen omia lauluja, Lionel Messin ja Kylian Mbappén suosikkilauluja sekä legendaarisia jalkapallobiisejä. Peléstä Mbappéen - Jalkapallon soundtrack MM-kisojen hengessä.
