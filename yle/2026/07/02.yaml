      - title: 'Viihdekuunnelma: Emma'
        start_time: '2026-07-02T22:31:00+03:00'
        end_time: '2026-07-02T22:59:00+03:00'
        description: |
          Osa 4/8 Hurmaava nuori mies

          Highburyn seurapiireissä tapahtuu: vaitelias neiti Jane Fairfax on saapunut tätinsä luo, kirkkoherra Eltonilla on uutisia ja Emman nuori ystävä Harriet Smith kaipaa tukea. Kaikkia kiinnostava herra Frank Churchill palaa viimein isänsä luo ja hänet esitellään Emmalle. Seurapiireille on luvassa myös juhlia. Tanssien ja juorujen pyörteissä Emma havahtuu uudenlaisiin tunteisiinsa. 
