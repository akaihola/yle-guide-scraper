      - title: 'Radio 1:n iltapäivä: Vuoden ITE-taiteilija Jyri Rastas - Vapaus on äärettömän tärkeää'
        start_time: '2026-07-02T13:30:00+03:00'
        end_time: '2026-07-02T15:00:00+03:00'
        description: |2
           Juontajana Tatu Tamminen. N. klo 14 ITE-taide on taidetta vailla rajoja. Vapaus ja rajattomuus viettävät juhlaa parhaillaan Hämeen keskiaikaisessa linnassa, jossa on esillä ite-taiteen näyttely Karnevaali. Kati Turtola tapasi keskellä karnevaalia Maaseudun sivistysliiton nimeämän vuoden -26 ite-taiteilijan Jyri Rastaan, joka pohtii taiteen keskellä omaa taiteen tekemistään ja maailmaa. N. ko 14:30 kirjailija Sirpa Kähkönen kertoo häntä erityisesti ilahduttavasta kulttuuritarjonnasta. Toim. Maija Salminen.
