      - title: 'Maailma tarinoina: Neljäntienristeys näyttää lestadiolaisyhteisön kontrollin ja hoivan'
        start_time: '2026-07-02T12:05:00+03:00'
        end_time: '2026-07-02T13:00:00+03:00'
        description: |-
          Tommi Kinnusen Neljäntienristeys on avausosa tarinalliselle jatkumolle, joka täydentyy syksyllä julkaistavalla Pitkä aukea -romaanilla. Kinnusen esikoisromaani Neljäntienristeys reilun kymmenen vuoden takaa lukeutuu teoksiin, jotka kuvaavat vanhoillislestadiolaisuuden vaikutusta yksilöihin ja yhteisön normeihin. Kuusamoon sijoittuva tarina ulottuu 1800-luvun lopulta vuoteen 1996. Kuinka lähelle todellisuutta romaani osuu? Mikä on muuttunut vanhoillislestadiolaisuuden piirissä, mikä ei? Millaista on olla nainen tai vähemmistön edustaja vanhoillislestadiolaisuuden vaikutuspiirissä? 
          Neljäntienristeyksen esiin nostaman aihepiirin äärelle pysähtyvät kulttuurintutkimuksen dosentti Teija Rantala ja teologian tohtori, lestadiolaisuustutkija Meri-Anna Paloniemi, joka on lähestynyt tutkimusaluettaan myös taiteen keinoin. Keskustelua johtaa Marja Vehkanen.
      - title: 'Radio 1:n iltapäivä: Vuoden ITE-taiteilija Jyri Rastas - Vapaus on äärettömän tärkeää'
        start_time: '2026-07-02T13:30:00+03:00'
        end_time: '2026-07-02T15:00:00+03:00'
        description: |2
           Juontajana Tatu Tamminen. N. klo 14 ITE-taide on taidetta vailla rajoja. Vapaus ja rajattomuus viettävät juhlaa parhaillaan Hämeen keskiaikaisessa linnassa, jossa on esillä ite-taiteen näyttely Karnevaali. Kati Turtola tapasi keskellä karnevaalia Maaseudun sivistysliiton nimeämän vuoden -26 ite-taiteilijan Jyri Rastaan, joka pohtii taiteen keskellä omaa taiteen tekemistään ja maailmaa. N. klo 14:30 Sari Valto keskustelee unipuheesta unitutkija, kokeellisen aivotutkimuksen professori Anu-Katriina Pesosen kanssa.
