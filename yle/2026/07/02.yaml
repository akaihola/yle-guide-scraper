        description: |-
          Suomalaiseen kesään liittyy olennaisesti vesi ja uinti.  Päivi Pälvimäki on Suomen Ladun avovesiuintivastaava, joka ui avovesissä vuoden ympäri. Pari vuotta sitten ilmestyneessä kirjassaan Uintiretkellä avovesissä Pälvimäki antaa mm. vinkkejä siihen, miten retkeillä uiden.  Miia Lahti toimittaa. Haastattelu on ote 26.5. kuullusta ohjelmasta.
