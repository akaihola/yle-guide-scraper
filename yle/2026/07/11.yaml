      - title: 'Keinuva talo - Mika Kauhanen: Kaupunkikansan musiikit: Madrid'
        start_time: '2026-07-11T22:39:44+03:00'
        end_time: '2026-07-11T23:39:00+03:00'
        description: |-
          Kesän 2025 teemasarja kaupunkikansan musiikit jatkuu nyt Keinuvassa talossa uusin jaksoin. Madridissa flamenco dominoi etnoskeneä erilaisina variaatioina: klubeja ja festivaaleja riittää. Vaikka lajin syntykoti on Andalusiassa, juuri Madrid on niitä paikkoja, joissa flamenco nykyisin vaikuttaa voimakkaasti. Suurkaupunkien tavoin mahdollisuuksia on monenlaiseen kansanmusiikkiin ja maailmanmusiikkiin, esimerkiksi afrikkalaiseen sekä tietenkin latinalaisamerikkalaiseen, jolla on espanjalaisia juuriakin. 

          Jaksossa selviää myös, kuka on Pepe-setä ja mitä hän tekee Madridin kansalaisaukion Puerta del Solin katolla? Toimittajana Mika Kauhanen.
