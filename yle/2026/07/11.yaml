      - title: 'Maailma tarinoina: Mummola - sukupolvien ja ihanteiden ristivetoa joulupöydässä'
        start_time: '2026-07-11T12:05:00+03:00'
        end_time: '2026-07-11T13:00:00+03:00'
        description: |-
          Tia Kouvon elokuva Mummola on rakkaudenosoitus epätäydelliselle perheelle, jossa kaikki yrittävät parhaansa mukaan tulla toimeen toistensa kanssa. Miksi juhlapyhät nostavat esiin perheen jännitteet? Onko nykyinen tunteista puhumisen eetos tai jopa edellytys tie parisuhde- ja perheonneen? Mistä syntyy "virtahepo olohuoneessa" ja miten sen kanssa voi elää? 

          Elokuvan innoittamana perhedynamiikasta, vaikenemisen kulttuurista ja sen purkamisesta keskustelevat Marja Vehkasen kanssa ohjaaja-käsikirjoittaja Tia Kouvo ja  psykoterapeutti, tietokirjailija Katriina Järvinen.
