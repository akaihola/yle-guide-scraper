      - title: 'Tiedetrippi: Ragnarök ja kohtalokas vuosi 536'
        start_time: '2026-07-07T13:00:00+03:00'
        end_time: '2026-07-07T13:30:00+03:00'
        description: |-
          Viikingeillä ei ollut ikuista paratiisia kuten kristinuskossa. Heidän kohtalonsa oli odottaa Ragnarökin taistelua, jonka päätteeksi kaikki olennot ihmisistä jumaliin tulisivat kuolemaan. Voisiko olla niin, että karu tarina maailmanlopusta oli osittain perimätietoa vuoden 536 luonnonkatastrofista? Toimittajana Henry Tikkanen.
          (27.1.2025)
      - title: 'Radio 1:n iltapäivä: Elokuvaohjaaja Dome Karukoski - elokuvista, työnteosta, perheestä ja huumorista'
        start_time: '2026-07-07T13:30:00+03:00'
        end_time: '2026-07-07T15:00:00+03:00'
        description: |-
          Juontajana Jalmari Laine. Palkittu elokuvaohjaaja Dome Karukoski teki vuosia töitä kiivaasti monessa maassa yhtä aikaa. Viime vuosina ohjaaja pyrkinyt työskentelemään enemmän kotimaisissa hankkeissa. Miten ohjaajien työnkuva on muuttunut, kun yhä useampi elokuva tule katsottavaksi suoratoistopalveluissa? Karukosken ohjaama  Antti Tuomaisen romaaniin pohjaava Pikku Siperia on muuten Suomen ensimmäinen Netflix-elokuva. Se julkaisiin vuosi sitten yhtä aikaa 190 maassa.  Dome Karukoski on valmistellut kevään ajan viime kesänä Kreikassa kuvattua romanttista draamaelokuvaa Rakkautta ja virtahepoja. Karukoski kävi Jarmo Laitanevalla haastattelussa viime helmikuussa (2.2.26). 

          N. klo 14:30 Millainen kulttuurikokemus voi olla Turun linna?
          Haastateltavana on amanuenssi Bengt Selin ja toimittajana on Juha Virtanen.
      - title: 'Kulttuuriykkönen: Miten perinnesaunominen tapahtuu? Millaisia uskomuksia saunomiseen liittyy?'
        start_time: '2026-07-07T15:00:00+03:00'
        end_time: '2026-07-07T15:58:00+03:00'
        description: |-
          Kuvittaja-kirjailija Sanna Pelliccioni on alkuperäiseltä koulutukseltaan biologi ja nykyään sivutyökseen perinnesaunottaja. Hän on tutkinut saunomista historian ja eri kulttuurien näkökulmasta. Uudessa Saunan sylissä – kaikuja perinnesaunasta -kirjassaan perinnesaunottaja johdattaa lukijat saunapolun mittaisen matkan vanhan saunan ovelle, itämerensuomalaisen saunan muinaisiin perinteisiin. Millä tavalla perinnesaunottaja voi uudistaa näitä vanhoja, mystisiäkin perinteitä? Miksi löylyjä kuuluu tervehtiä? Ja millaisia ovat Suomen Kansan Vanhoista Runoista ammentavat saunalaulut?

          Ohjelman vieraina ovat kirjailija Sanna Pelliccioni, tutkija ja perinnesaunaopettaja Maaria Alen ja tutkija Kaarina Kailo.

          Ohjelman juontaa Pia-Maria Lehtola.




          Rentoa puhetta, kiinnostavimmat vieraat ja kulttuurin ajankohtaisaiheet debatoitavina. Suorana maanantaista perjantaihin.
