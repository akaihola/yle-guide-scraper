        description: |-
          Venäläisten piirityksen uhka kasvaa. Nora ja Kalle keskustelevat mahdollisuudesta palata Lvivin turvaan. Olha puolestaan haluaa pelastaa perheensä Tšernihivistä, vaikka se tarkoittaa vaarallista matkaa. Nora, Kalle ja Kyrolo ovat nyt kaikki äärimmäisen päätöksen edessä – auttaako vai ei. 
          (ensies. v. 2025)
      - title: 'Romanitarinoita: Rainer Friskin tie gospelin äärelle'
        start_time: '2026-07-07T20:00:00+03:00'
        end_time: '2026-07-07T20:26:00+03:00'
        description: |
          Rainer Frisk on mies, jonka näky on ollut alusta asti kirkas: hän haluaa käyttää lahjansa Jumalan kunniaksi. Lauluyhtye VIA:sta tutuksi tullut Frisk kertoo matkasta, johon on mahtunut musiikin iloa, epävarmuutta ja rohkeuden etsimistä.

          Vaikka soittotaito ja ääni olivat mukana jo nuoruudessa, usko omaan soolouraansa ei aina ollut itsestäänselvyys.

          Silti intohimo ja nöyrä sydän ovat vieneet eteenpäin – ja tehneet hänestä arvostetun artistin romanigospelin kentällä.
      - title: Maailmanpolitiikan arkipäivää
        start_time: '2026-07-07T20:35:00+03:00'
        end_time: '2026-07-07T21:00:00+03:00'
        description: |
          Väkivaltaiset  kriisit rapauttavat ihmiskunnan kulttuuriperintöä. Toisaalta yhteiset kokemukset ja muistot auttavat selviytymään vaikeina aikoina. 
          Maailmanpolitiikan arkipäivää-ohjelmassa tarkastellaan tällä viikolla sitä, miten kulttuuria voidaan suojella sodan tuhoilta.  
          Ukrainassa apuna on digitalisaatio. Lähi-Idässä tuhottujen kohteiden jälleenrakennukseen ja entisöintiin yritetään päästä mahdollisimman pian kriisin laannuttua. 
          Epävakaat ajat lisäävät riskejä kulttuurikohteisiin myös vakaissa maissa. Mielipide halutaan esiin mahdollisimman näyttävästi esimerkiksi värjäämällä monumentteja tai tuhrimalla taideteoksia. Kuulemme, miten turvajärjestelyjä hoidetaan Oslon kuulussa Munck-museossa. Maailmanpolitiikan arkipäivää -ohjelman toimittavat Maxim Fedorov ja Erja Tuomaala. .  

          Äänitarkkailijana on Juha Hjelm. Tunnusmusiikki: Petri Alanko, kuva: Tuuli Laukkanen/Yle.
