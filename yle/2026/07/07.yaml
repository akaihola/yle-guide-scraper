          Kirjailija Suvi Auvinen on ehtinyt moneksi. Lama-ajan lapsi on profetoinut seurakuntaväkeä, vallannut taloja, mellakoinut maailmalla - ja toisaalta konsultoinut yritysjohtajia. Tunne on vienyt usein syvään päätyyn, niin kävi karhukaistenkin kohdalla.

          Matka karhukaisten maailmaan avasi uuden näkökulman ihmisen ja luonnon väliseen suhteeseen. Pienenpienistä karhukaisista ei tiettävästi ole mitään hyötyä tai haittaa ihmiselle. Mikään ekosysteemi tuskin romahtaisi, jos karhukaista ei olisi. Sen sijaan karhukaisella on kadehdittava kyky vaipua kryptobioosiin, kun ympäristö muuttuu uhkaavaksi. Lasiseinän takana karhukainen odottaa turvassa parempia aikoja, ja siksi se on selviytymisen mestari. Kun Auvisen puoliso sairastui vakavaan masennukseen, Suvi alkoi pohtia, voisiko masennus olla ihmisen suojakuori oloissa, joissa elinympäristö alkaa uhata ihmisen hyvinvointia?
          Toimittajana Maarit Tastula
