        description: |-
          "Missä Jumala on, kun ahdistaa?"
          Kirkkokunnanjohtaja Jari Portaankorva, Baptistikirkko, Helsingistä puhuu maailman tuskan ja ahdistuksen keskellä ihmiskunnan kärsimykseen osallistuvasta Jumalasta.
      - title: Yle Uutiset ja sää
