      - title: 'Kuunnelma: Laskettua aikaa: Ratkaiseva päätös 6/10'
        start_time: '2026-07-07T19:02:00+03:00'
        end_time: '2026-07-07T19:20:00+03:00'
        description: |-
          Venäläisten piirityksen uhka kasvaa. Nora ja Kalle keskustelevat mahdollisuudesta palata Lvivin turvaan. Olha puolestaan haluaa pelastaa perheensä Tšernihivistä, vaikka se tarkoittaa vaarallista matkaa. Nora, Kalle ja Kyrolo ovat nyt kaikki äärimmäisen päätöksen edessä – auttaako vai ei. 
          (ensies. v. 2025)
      - title: 'Romanitarinoita: Rainer Friskin tie gospelin äärelle'
        start_time: '2026-07-07T20:00:00+03:00'
        end_time: '2026-07-07T20:25:00+03:00'
        description: |
          Rainer Frisk on mies, jonka näky on ollut alusta asti kirkas: hän haluaa käyttää lahjansa Jumalan kunniaksi. Lauluyhtye VIA:sta tutuksi tullut Frisk kertoo matkasta, johon on mahtunut musiikin iloa, epävarmuutta ja rohkeuden etsimistä.

          Vaikka soittotaito ja ääni olivat mukana jo nuoruudessa, usko omaan soolouraansa ei aina ollut itsestäänselvyys.

          Silti intohimo ja nöyrä sydän ovat vieneet eteenpäin – ja tehneet hänestä arvostetun artistin romanigospelin kentällä.
