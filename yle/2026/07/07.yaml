      - title: 'Klasariparatiisi: Tuli, joka varastettiin'
        start_time: '2026-07-07T11:00:00+03:00'
        end_time: '2026-07-07T11:57:00+03:00'
        description: |+
          Kun ihminen kesytti tulen, avautui polku kohti uudenlaista sivilisaatiota. Miten se näkyy maailmassamme ja kuuluu musiikissamme?
          Utelias äänimatkailija Eva Tigerstedt tieteen, taiteen ja musiikin risteyksessä, äänisunnittelijana Anders Wiksten.
          Uusinta vuodelta 2018.

          Ohjelman musiikit:

          Sebastian Fagerlund: Ignite (Radion sinfoniaorkesteri/Hannu Lintu).

          Tomas Luis de Victoria: Veni, creator spiritus( Ensemble Plus Ultra/Michael Noone). 

          W.A.Mozart: Don Giovanni, Finaali (Simon Keenlyside, baritoni/Don Giovanni, Matti Salminen, basso/Komtuuri, Bryn Terfel, baritoni/Leporello, Coro di Ferrara Musica- kuoro, Eroopan kamariorkesteri/Claudio Abbado).

          Ludwig van Beethoven: Sonaatti pianolle no 23 "Appassionata" (Svjatoslav Richter, piano).

          Aleksandr Skrjabin: Prometheus, Tulen runoelma op.60 pianolle, kuorolle ja orkesterille (Pjotr Izotov, piano, Moskovan radion kuoro ja Venäjän valtion sinfoniaorkesteri/Jevgeni Svetlanov).
            
          Bernd Alois Zimmermann: Stille und Umkehr (Reininmaan ja Pfalzin valtiollinen filharmoninen orkesteri/Karl-Heinz Steffens).

          Hans Abrahamsen: Liebeslied (Ensemble Recherche).

